on an energy diagram:", "a": ["Higher", "Lower", "Same", "Off the chart"], "c": 1}, {"q": "In an endothermic reaction, products are ___ on an energy diagram:", "a": ["Lower", "Higher", "Same", "Off the chart"], "c": 1}, {"q": "The heat of fusion is energy to change from:", "a": ["Liquid to gas", "Solid to liquid", "Gas to solid", "Solid to gas"], "c": 1}, {"q": "The heat of vaporization changes:", "a": ["Solid to liquid", "Liquid to gas", "Gas to solid", "Solid to gas"], "c": 1}, {"q": "During a phase change, temperature:", "a": ["Rises", "Falls", "Stays constant", "Fluctuates"], "c": 2}, {"q": "Heating curve: flat sections represent:", "a": ["Heating", "Phase changes (constant T)", "Cooling", "Nothing"], "c": 1}, {"q": "Heating curve: rising sections represent:", "a": ["Phase changes", "Temperature increasing", "Cooling", "Nothing"], "c": 1}, {"q": "Joules (J) and calories (cal) both measure:", "a": ["Mass", "Energy/heat", "Volume", "Temperature"], "c": 1}, {"q": "1 cal = ___ J:", "a": ["1.00", "2.50", "4.184", "10.0"], "c": 2}, {"q": "1 food Calorie (Cal) = 1 kilocalorie = ___ cal:", "a": ["1", "100", "1,000", "1,000,000"], "c": 2}, {"q": "Heat capacity (C) = q ÷ ΔT, measured in:", "a": ["J/g", "J/°C", "J/g·°C", "°C/J"], "c": 1}, {"q": "Specific heat capacity is heat capacity per:", "a": ["Mole", "Gram (per °C)", "Liter", "Kilogram only"], "c": 1}, {"q": "Molar heat capacity is heat capacity per:", "a": ["Gram", "Mole (per °C)", "Liter", "Kilogram"], "c": 1}, {"q": "Metals generally have ___ specific heats than water:", "a": ["Higher", "Lower (heat up and cool faster)", "Same", "Variable"], "c": 1}, {"q": "Iron's specific heat (~0.45 J/g·°C) is much ___ than water's (4.18):", "a": ["Higher", "Lower", "Same", "Variable"], "c": 1}, {"q": "A substance with LOW specific heat heats up:", "a": ["Slowly", "Quickly (less energy needed per °C)", "Not at all", "Inconsistently"], "c": 1}, {"q": "100 g of water heated from 20°C to 70°C: q = 100 × 4.184 × 50 =:", "a": ["4,184 J", "20,920 J", "41,840 J", "209,200 J"], "c": 1}, {"q": "Standard conditions for enthalpy: 25°C (298 K) and 1 atm. Symbol:", "a": ["Δ", "°", "ΔH° (standard enthalpy)", "ΔG"], "c": 2}, {"q": "The sign convention: q positive means system:", "a": ["Lost heat", "Gained heat (endothermic)", "No change", "Exploded"], "c": 1}, {"q": "The sign convention: q negative means system:", "a": ["Gained heat", "Lost heat (exothermic)", "No change", "Froze"], "c": 1}, {"q": "Enthalpy of combustion (ΔH_comb) is always:", "a": ["Positive", "Negative (exothermic)", "Zero", "Variable"], "c": 1}, {"q": "Enthalpy of formation (ΔH_f) is for forming 1 mol of compound from:", "a": ["Other compounds", "Elements in standard states", "Only gases", "Only solids"], "c": 1}, {"q": "ΔH°_f of any element in its standard state is:", "a": ["1", "−1", "0", "Variable"], "c": 2}, {"q": "ΔH°_f of O₂(g) is:", "a": ["−100", "0 (element in standard state)", "100", "50"], "c": 1}, {"q": "Bond breaking requires energy (endothermic). Bond forming:", "a": ["Also endothermic", "Releases energy (exothermic)", "Neither", "Both"], "c": 1}, {"q": "If more energy is released forming bonds than breaking:", "a": ["Endothermic", "Exothermic overall", "Neutral", "Impossible"], "c": 1}, {"q": "ΔH ≈ Σ(bonds broken) − Σ(bonds formed):", "a": ["True", "False", "Sometimes", "Never"], "c": 0}, {"q": "An ice pack works because dissolving the salt is:", "a": ["Exothermic", "Endothermic (absorbs heat from surroundings)", "Neutral", "Nuclear"], "c": 1}, {"q": "A hand warmer works because the reaction is:", "a": ["Endothermic", "Exothermic (releases heat)", "Neutral", "Nuclear"], "c": 1}, {"q": "In a calorimeter, insulation minimizes heat exchange with:", "a": ["The solution", "The environment outside", "The thermometer", "Nothing"], "c": 1}, {"q": "Bomb calorimeters are used for:", "a": ["Solutions only", "Combustion reactions", "Only acids", "Only bases"], "c": 1}, {"q": "The relationship q = nΔH uses n =:", "a": ["Grams", "Moles of substance", "Liters", "Temperature"], "c": 1}, {"q": "For 2 mol of a reaction with ΔH = −100 kJ/mol: q =:", "a": ["−50 kJ", "−100 kJ", "−200 kJ", "−400 kJ"], "c": 2}, {"q": "If ΔH is per mole of reaction as written, doubling coefficients:", "a": ["Halves ΔH", "Doubles ΔH", "No change", "Triples ΔH"], "c": 1}, {"q": "Reversing a reaction ___ the sign of ΔH:", "a": ["Keeps same", "Reverses (+ becomes −)", "Doubles", "Halves"], "c": 1}, {"q": "If A → B has ΔH = +50 kJ, then B → A has ΔH =:", "a": ["+50 kJ", "+100 kJ", "−50 kJ", "0 kJ"], "c": 2}, {"q": "Thermodynamic standard state for solutes:", "a": ["0 M", "1 M", "2 M", "Saturated"], "c": 1}, {"q": "Thermodynamic standard state for gases:", "a": ["0 atm", "1 atm", "2 atm", "STP only"], "c": 1}, {"q": "Enthalpy is useful because most reactions occur at constant:", "a": ["Volume", "Pressure (open to atmosphere)", "Temperature", "Mass"], "c": 1}, {"q": "At constant pressure: ΔH = q_p (heat at constant pressure):", "a": ["True", "False", "Sometimes", "Only in labs"], "c": 0}, {"q": "Energy is measured in joules (SI) or:", "a": ["Meters", "Calories", "Grams", "Liters"], "c": 1}, {"q": "The calorie was originally defined as heat to raise 1 g water by:", "a": ["10°C", "1°C", "100°C", "0.1°C"], "c": 1}, {"q": "Phase changes: energy goes into breaking ___ bonds, not raising T:", "a": ["Covalent", "Intermolecular (H-bonds, etc.)", "Nuclear", "Ionic"], "c": 1}, {"q": "Melting point of water:", "a": ["100°C", "0°C", "−100°C", "50°C"], "c": 1}, {"q": "Boiling point of water at 1 atm:", "a": ["0°C", "50°C", "100°C", "200°C"], "c": 2}, {"q": "Heat of fusion of water: ~334 J/g or ~6.01 kJ/:", "a": ["Gram", "Mole", "Liter", "Kilogram"], "c": 1}, {"q": "Heat of vaporization of water: ~2,260 J/g or ~40.7 kJ/:", "a": ["Gram", "Mole", "Liter", "Kilogram"], "c": 1}, {"q": "Vaporization requires ___ energy than fusion because:", "a": ["Less", "More (completely separating molecules vs partially)", "Same", "None"], "c": 1}, {"q": "Endothermic dissolution: solution gets:", "a": ["Warmer", "Cooler", "No change", "Hotter"], "c": 1}, {"q": "Exothermic dissolution: solution gets:", "a": ["Cooler", "Warmer", "No change", "Colder"], "c": 1}, {"q": "Chemical potential energy is stored in:", "a": ["Motion", "Chemical bonds", "Temperature", "Light"], "c": 1}, {"q": "Higher bond energy means a ___ bond:", "a": ["Weaker", "Stronger", "Same", "Nonexistent"], "c": 1}, {"q": "Triple bonds have ___ energy than single bonds:", "a": ["Less", "More (stronger)", "Same", "No"], "c": 1}, {"q": "C≡C bond energy > C=C > C−C because:", "a": ["More electrons shared = stronger", "Fewer electrons = stronger", "All equal", "Random"], "c": 0}, {"q": "Enthalpy of neutralization for strong acid + strong base ≈:", "a": ["0 kJ", "−57 kJ/mol", "−100 kJ/mol", "+57 kJ/mol"], "c": 1}, {"q": "All combustion reactions are:", "a": ["Endothermic", "Exothermic", "Neutral", "Variable"], "c": 1}, {"q": "Photosynthesis is:", "a": ["Exothermic", "Endothermic (stores energy)", "Neutral", "Both"], "c": 1}, {"q": "Cellular respiration is:", "a": ["Endothermic", "Exothermic (releases energy)", "Neutral", "Both"], "c": 1}, {"q": "The universe = system +:", "a": ["Nothing", "Surroundings", "Only heat", "Only work"], "c": 1}, {"q": "In a closed system, matter ___ exchange but energy ___:", "a": ["Can/can't", "Can't/can", "Both can", "Neither can"], "c": 1}, {"q": "In an open system, both matter and energy ___ exchange:", "a": ["Cannot", "Can", "Only energy", "Only matter"], "c": 1}, {"q": "An isolated system exchanges:", "a": ["Energy", "Matter", "Neither matter nor energy", "Both"], "c": 2}, {"q": "The universe is considered an ___ system:", "a": ["Open", "Closed", "Isolated", "None"], "c": 2}, {"q": "Enthalpy of sublimation = enthalpy of fusion + enthalpy of:", "a": ["Condensation", "Vaporization", "Freezing", "Deposition"], "c": 1}, {"q": "q = nΔH_fus for:", "a": ["Boiling", "Melting (at melting point)", "Sublimation", "Deposition"], "c": 1}, {"q": "q = nΔH_vap for:", "a": ["Melting", "Boiling (at boiling point)", "Freezing", "Condensation"], "c": 1}, {"q": "To calculate total energy to heat ice from −20°C to steam at 120°C requires ___ steps:", "a": ["1", "3", "5", "7"], "c": 2}, {"q": "The 5 steps: heat ice → melt ice → heat water → boil water → heat:", "a": ["Ice", "Water", "Steam", "Solid"], "c": 2}, {"q": "During phase changes, added energy goes into breaking ___ bonds:", "a": ["Covalent", "Intermolecular", "Nuclear", "Ionic"], "c": 1}, {"q": "Temperature remains constant during phase changes because energy goes into:", "a": ["Raising temperature", "Overcoming intermolecular forces", "Creating new atoms", "Destroying bonds"], "c": 1}]}, {"id": "chem-ch5b", "title": "Chapter 5 (cont): Enthalpy & Hess's Law", "ln": "CHEM 260 · Ch 5 cont.", "notes": [{"heading": "Internal Energy (U)", "body": "<b>Internal energy (U):</b> the total of ALL possible kinds of energy present in a substance (kinetic + potential of all particles). It is a <b>state function</b> — its value depends only on the current state of the system, NOT on the path taken to reach that state. Like altitude on a mountain: same height at the peak regardless of which trail you hiked."}, {"heading": "State Functions", "body": "A <b>state function</b> depends only on the initial and final states, not the path between them. Examples: mass, pressure, temperature, volume, internal energy (U), enthalpy (H). <b>NOT</b> state functions: heat (q) and work (w) individually — they depend on the path. But ΔU = q + w IS a state function."}, {"heading": "First Law of Thermodynamics", "body": "<b>ΔU = q + w</b>. The change in internal energy equals the heat added to the system plus the work done ON the system. Energy is conserved — cannot be created or destroyed. If q is positive (heat absorbed) and w is positive (work done on system), ΔU increases."}, {"heading": "Enthalpy (H)", "body": "<b>H = U + PV</b> (internal energy + pressure × volume). At constant pressure: <b>ΔH = ΔU + PΔV</b>. For most reactions in open containers (constant P), the heat measured IS ΔH. Enthalpy is a <b>state function</b>. YES — enthalpy is a state function just like U."}, {"heading": "Enthalpy Sign Convention", "body": "<b>ΔH > 0 (positive):</b> endothermic — system absorbs heat from surroundings. <b>ΔH < 0 (negative):</b> exothermic — system releases heat to surroundings. The sign tells you the direction of heat flow relative to the system."}, {"heading": "Thermochemical Equations", "body": "Show changes in BOTH matter AND energy. Include <b>ΔH</b> as part of the equation. Example: H₂(g) + ½O₂(g) → H₂O(l), ΔH = <b>−286 kJ</b>. The 286 kJ is released (negative) when 1 mol H₂ reacts with ½ mol O₂ to form 1 mol liquid water."}, {"heading": "Coefficient Rules for ΔH", "body": "If you <b>multiply</b> all coefficients by a factor, multiply ΔH by the <b>same factor</b>. Example: 2H₂ + O₂ → 2H₂O has ΔH = 2(−286) = <b>−572 kJ</b>. Half the reaction: ½H₂ + ¼O₂ → ½H₂O has ΔH = ½(−286) = <b>−143 kJ</b>. If you <b>reverse</b> a reaction, flip the sign of ΔH."}, {"heading": "Practice Q5: Scaling ΔH", "body": "Given: H₂ + ½O₂ → H₂O, ΔH = −286 kJ. <b>For 2 mol H₂:</b> double everything → ΔH = 2(−286) = <b>−572 kJ</b>. <b>For ½ mol H₂:</b> halve everything → ΔH = ½(−286) = <b>−143 kJ</b>. The ratio always stays the same."}, {"heading": "Practice Q6: Writing Thermochemical Equations", "body": "0.0500 mol HCl + 0.0500 mol NaOH → 0.0500 mol NaCl, producing 2.9 kJ. For ONE mole: scale up by factor of 20 (1/0.05). ΔH = 20 × (−2.9) = <b>−58 kJ</b>. Equation: <b>HCl(aq) + NaOH(aq) → NaCl(aq) + H₂O(l), ΔH° = −58 kJ</b>."}, {"heading": "Standard State Conditions", "body": "IUPAC standard state (denoted by ° superscript): <b>Pressure:</b> 1 bar (≈ 1 atm, both accepted). <b>Solutions:</b> 1 M concentration. <b>Temperature:</b> no official specification, but <b>25°C (298.15 K)</b> assumed unless stated otherwise. Standard state is the reference point for all thermochemical data."}, {"heading": "Standard Enthalpy of Combustion", "body": "<b>ΔH°c:</b> enthalpy change when <b>1 mole</b> of a substance burns completely under standard conditions. Also called heat of combustion. Always negative (exothermic). Example: isooctane C₈H₁₈ has ΔH°c = −5460 kJ/mol."}, {"heading": "Combustion Practice Q7", "body": "Burn 1.00 L of isooctane (density 0.692 g/mL, MM = 114 g/mol, ΔH°c = −5460 kJ/mol). <b>Step 1:</b> mass = 1000 mL × 0.692 g/mL = 692 g. <b>Step 2:</b> moles = 692 / 114 = 6.07 mol. <b>Step 3:</b> heat = 6.07 × 5460 = <b>33,100 kJ</b> = 33.1 MJ released. That's a lot of energy from 1 liter of gasoline!"}, {"heading": "Standard Enthalpy of Formation (ΔH°f)", "body": "Enthalpy change when <b>1 mole of a pure substance</b> is formed from its <b>constituent free elements in their most stable states</b> under standard conditions. Example: C(s, graphite) + O₂(g) → CO₂(g), ΔH°f = −393.5 kJ/mol. This is THE definition — memorize it."}, {"heading": "ΔH°f of Elements = 0", "body": "The standard enthalpy of formation of any <b>element in its most stable form</b> is <b>exactly zero</b> by definition. O₂(g) = 0. C(s, graphite) = 0. H₂(g) = 0. Fe(s) = 0. This is the reference point — everything else is measured relative to elements."}, {"heading": "Formation Practice Q8", "body": "H₂(g) + Cl₂(g) → 2HCl(g). ΔH°f of HCl(g) = −92.3 kJ/mol. Since 2 mol HCl formed: ΔH° = 2(−92.3) = <b>−184.6 kJ</b>. Reactants are elements in standard states (ΔH°f = 0), so the reaction enthalpy equals the sum of formation enthalpies of products."}, {"heading": "Hess's Law — Concept", "body": "The enthalpy change ΔH of the <b>total process equals the sum of ΔH of the individual steps</b>. Because enthalpy is a state function, ΔH depends only on initial and final states, NOT the path. Analogy: driving to Detroit — total elevation change is the same whether you take the highway or back roads."}, {"heading": "Hess's Law — How to Use", "body": "<b>1)</b> Write the target reaction. <b>2)</b> Find known reactions that can be combined to give the target. <b>3)</b> If a reaction needs to be reversed, flip the sign of ΔH. <b>4)</b> If coefficients need to be multiplied, multiply ΔH too. <b>5)</b> Add all ΔH values. Intermediate species cancel when you add the steps."}, {"heading": "Hess's Law Example: Burning Carbon", "body": "Target: C(s) + O₂(g) → CO₂(g). Can happen directly OR in two steps: <b>Step 1:</b> C(s) + ½O₂(g) → CO(g), ΔH₁ = −110.5 kJ. <b>Step 2:</b> CO(g) + ½O₂(g) → CO₂(g), ΔH₂ = −283.0 kJ. <b>Sum:</b> C + O₂ → CO₂, ΔH = −110.5 + (−283.0) = <b>−393.5 kJ</b>. CO cancels out!"}, {"heading": "ΔH° from Formation Data — The Master Equation", "body": "<b>ΔH°rxn = Σ[n × ΔH°f(products)] − Σ[n × ΔH°f(reactants)]</b>. Σ = sum, n = coefficient. This is the most powerful equation for calculating reaction enthalpies. Works for ANY reaction if you have formation data tables. Elements in standard states have ΔH°f = 0."}, {"heading": "Master Equation Example", "body": "3NO₂(g) + H₂O(l) → 2HNO₃(aq) + NO(g). ΔH° = [2×ΔH°f(HNO₃) + 1×ΔH°f(NO)] − [3×ΔH°f(NO₂) + 1×ΔH°f(H₂O)]. Look up each ΔH°f value from the table, plug in, and calculate. Systematic and reliable."}, {"heading": "When to Use Which Method", "body": "<b>q = mcΔT:</b> when you have mass, specific heat, and temperature change (calorimetry). <b>Hess's Law (adding steps):</b> when you have multiple known reactions that combine to give your target. <b>ΔH°f master equation:</b> when you have a table of formation enthalpies (most common on exams)."}, {"heading": "Reversing Reactions", "body": "If you reverse a chemical equation, <b>flip the sign of ΔH</b>. Forward: A → B, ΔH = −100 kJ. Reverse: B → A, ΔH = <b>+100 kJ</b>. Exothermic forward → endothermic reverse. This makes sense: if forming B releases heat, decomposing B must absorb the same amount."}, {"heading": "Common Exam Pitfalls", "body": "<b>1)</b> Forgetting to multiply ΔH when scaling coefficients. <b>2)</b> Forgetting to flip sign when reversing. <b>3)</b> Assuming ΔH°f of elements ≠ 0 (it IS zero). <b>4)</b> Mixing up ΔH°f (formation) with ΔH°c (combustion). <b>5)</b> Using wrong signs: exo = negative, endo = positive."}, {"heading": "Key Equations Summary", "body": "<b>ΔU = q + w</b> (First Law)<br><b>H = U + PV</b><br><b>ΔH > 0 = endothermic; ΔH < 0 = exothermic</b><br><b>ΔH°rxn = Σ[nΔH°f(products)] − Σ[nΔH°f(reactants)]</b><br><b>Hess's Law: ΔH_total = ΔH₁ + ΔH₂ + ...</b><br><b>ΔH°f of elements in standard state = 0</b><br><b>Reverse reaction → flip ΔH sign</b><br><b>Scale coefficients → scale ΔH</b>"}], "quiz": [{"q": "Internal energy (U) is:", "a": ["Only kinetic energy", "Only potential energy", "Total of all possible energies", "Temperature only"], "c": 2}, {"q": "A state function depends on:", "a": ["The path taken", "Initial and final states only", "Speed of reaction", "Catalyst used"], "c": 1}, {"q": "Which is a state function?", "a": ["Heat (q)", "Work (w)", "Enthalpy (H)", "Both q and w"], "c": 2}, {"q": "First Law: ΔU =:", "a": ["q only", "w only", "q + w", "q − w"], "c": 2}, {"q": "H = U +:", "a": ["ST", "PV", "mc", "nR"], "c": 1}, {"q": "At constant pressure, ΔH =:", "a": ["q_p", "w", "ΔU exactly", "PV"], "c": 0}, {"q": "Enthalpy is a state function:", "a": ["True", "False", "Only at high T", "Only for gases"], "c": 0}, {"q": "ΔH > 0 means:", "a": ["Exothermic", "Endothermic", "No change", "Equilibrium"], "c": 1}, {"q": "ΔH < 0 means:", "a": ["Endothermic", "Exothermic", "No change", "Equilibrium"], "c": 1}, {"q": "Thermochemical equations include:", "a": ["Only formulas", "Only ΔH", "Both matter changes and ΔH", "Only states"], "c": 2}, {"q": "H₂ + ½O₂ → H₂O, ΔH = −286 kJ. For 2H₂ + O₂ → 2H₂O, ΔH =:", "a": ["−286 kJ", "−143 kJ", "−572 kJ", "−1144 kJ"], "c": 2}, {"q": "Same reaction halved: ½H₂ + ¼O₂ → ½H₂O, ΔH =:", "a": ["−286 kJ", "−572 kJ", "−143 kJ", "−71.5 kJ"], "c": 2}, {"q": "Reversing a reaction ___ the sign of ΔH:", "a": ["Keeps the same", "Flips", "Doubles", "Zeros out"], "c": 1}, {"q": "0.05 mol HCl + NaOH produces 2.9 kJ. For 1 mol, ΔH =:", "a": ["−2.9 kJ", "−29 kJ", "−58 kJ", "−290 kJ"], "c": 2}, {"q": "Standard state pressure:", "a": ["0.5 bar", "1 bar", "2 bar", "10 bar"], "c": 1}, {"q": "Standard state assumes temperature:", "a": ["0°C", "25°C", "100°C", "273°C"], "c": 1}, {"q": "Standard state solutions:", "a": ["0.1 M", "0.5 M", "1 M", "2 M"], "c": 2}, {"q": "ΔH°c is enthalpy of:", "a": ["Formation", "Combustion", "Dissolution", "Neutralization"], "c": 1}, {"q": "Combustion ΔH is always:", "a": ["Positive", "Negative", "Zero", "Variable"], "c": 1}, {"q": "1 L isooctane (692g, MM=114, ΔH°c=−5460) releases ≈:", "a": ["5,460 kJ", "15,000 kJ", "33,100 kJ", "55,000 kJ"], "c": 2}, {"q": "ΔH°f is enthalpy of:", "a": ["Combustion", "Decomposition", "Formation from elements", "Neutralization"], "c": 2}, {"q": "ΔH°f of O₂(g) =:", "a": ["+100 kJ", "−100 kJ", "0 kJ", "Unknown"], "c": 2}, {"q": "ΔH°f of C(s, graphite) =:", "a": ["+393 kJ", "−393 kJ", "0 kJ", "Unknown"], "c": 2}, {"q": "ΔH°f of ANY element in standard state:", "a": ["Positive", "Negative", "Zero", "Varies"], "c": 2}, {"q": "ΔH°f of CO₂(g) =:", "a": ["0 kJ", "+393.5 kJ", "−393.5 kJ", "Unknown"], "c": 2}, {"q": "H₂ + Cl₂ → 2HCl. If ΔH°f(HCl)=−92.3, ΔH°rxn =:", "a": ["−92.3 kJ", "−184.6 kJ", "+92.3 kJ", "+184.6 kJ"], "c": 1}, {"q": "Hess's Law: ΔH depends on:", "a": ["Path taken", "Initial and final states only", "Catalyst", "Speed"], "c": 1}, {"q": "Hess's Law: ΔH_total =:", "a": ["ΔH₁ × ΔH₂", "ΔH₁ + ΔH₂ + ...", "ΔH₁ − ΔH₂", "ΔH₁ / ΔH₂"], "c": 1}, {"q": "C→CO (−110.5 kJ) + CO→CO₂ (−283.0 kJ). C→CO₂ =:", "a": ["−110.5 kJ", "−283.0 kJ", "−393.5 kJ", "+393.5 kJ"], "c": 2}, {"q": "When adding Hess's Law steps, intermediate species:", "a": ["Stay", "Cancel out", "Double", "Change sign"], "c": 1}, {"q": "Master equation: ΔH°rxn = Σ products −:", "a": ["Σ elements", "Σ reactants", "Σ coefficients", "Σ masses"], "c": 1}, {"q": "In master equation, n represents:", "a": ["Moles measured", "Coefficient in balanced equation", "Avogadro's number", "Number of elements"], "c": 1}, {"q": "Exothermic forward means reverse is:", "a": ["Also exothermic", "Endothermic", "Zero", "Impossible"], "c": 1}, {"q": "Multiply coefficients by 3 →:", "a": ["ΔH stays same", "ΔH × 3", "ΔH ÷ 3", "ΔH flips sign"], "c": 1}, {"q": "q = mcΔT is used for:", "a": ["Formation calculations", "Hess's Law", "Calorimetry problems", "Gas law problems"], "c": 2}, {"q": "The master equation needs:", "a": ["Specific heats", "ΔH°f values from tables", "Masses", "Volumes"], "c": 1}, {"q": "Standard state denoted by:", "a": ["* superscript", "° superscript", "# subscript", "No symbol"], "c": 1}, {"q": "At standard state, 1 bar ≈:", "a": ["0.5 atm", "1 atm", "2 atm", "10 atm"], "c": 1}, {"q": "If forming a product releases heat, decomposing it:", "a": ["Also releases heat", "Absorbs the same amount", "No energy change", "Doubles the heat"], "c": 1}, {"q": "Mountain analogy for state functions: altitude depends on:", "a": ["Which trail you take", "Only start and end points", "Speed of hiking", "Weather"], "c": 1}, {"q": "Heat (q) is ___ a state function:", "a": ["Always", "Never", "Sometimes", "Only at standard state"], "c": 1}, {"q": "Work (w) is ___ a state function:", "a": ["Always", "Never", "Sometimes", "Only for gases"], "c": 1}, {"q": "But ΔU = q + w IS a state function because:", "a": ["q and w cancel", "The sum is path-independent", "Only q matters", "Only w matters"], "c": 1}, {"q": "For most lab reactions (open container), we measure:", "a": ["ΔU directly", "ΔH (at constant pressure)", "w only", "PV only"], "c": 1}, {"q": "ΔH for dissolving NH₄NO₃:", "a": ["Negative (exo)", "Positive (endo)", "Zero", "Depends"], "c": 1}, {"q": "ΔH for combustion of methane:", "a": ["Positive", "Negative", "Zero", "Unknown"], "c": 1}, {"q": "Burning 1 mol C₈H₁₈ releases:", "a": ["286 kJ", "393 kJ", "5460 kJ", "92.3 kJ"], "c": 2}, {"q": "692g isooctane ÷ 114 g/mol =:", "a": ["3.04 mol", "6.07 m ity: energy change when an atom:", "a": ["Loses electron", "Gains an electron", "Loses proton", "Gains proton"], "c": 1}, {"q": "Sublimation energy converts:", "a": ["Liquid to gas", "Solid to gas (for metals in Born-Haber)", "Gas to solid", "Liquid to solid"], "c": 1}, {"q": "Bond dissociation energy breaks a:", "a": ["Ionic bond", "Covalent bond in a diatomic molecule", "Hydrogen bond", "Van der Waals"], "c": 1}, {"q": "For Hess's law problems with 3 given reactions, you must:", "a": ["Use all three", "Manipulate (reverse/multiply) to sum to target", "Use only one", "Ignore them"], "c": 1}, {"q": "When you reverse a reaction in Hess's law:", "a": ["ΔH stays same", "ΔH changes sign", "ΔH doubles", "ΔH halves"], "c": 1}, {"q": "When you multiply a reaction by 2:", "a": ["ΔH stays same", "ΔH doubles", "ΔH halves", "ΔH reverses"], "c": 1}, {"q": "When you multiply by ½:", "a": ["ΔH doubles", "ΔH halves", "ΔH stays same", "ΔH reverses"], "c": 1}, {"q": "ΔH°f(H₂O, l) = −286 kJ/mol means forming liquid water from H₂ and O₂:", "a": ["Absorbs 286 kJ", "Releases 286 kJ (exothermic)", "Has no energy change", "Requires 286 kJ"], "c": 1}, {"q": "ΔH°f(CO₂, g) = −393.5 kJ/mol. Forming CO₂ is:", "a": ["Endothermic", "Exothermic", "Neutral", "Variable"], "c": 1}, {"q": "Standard enthalpy of formation of Na(s):", "a": ["−100 kJ", "+50 kJ", "0 kJ (element in standard state)", "−200 kJ"], "c": 2}, {"q": "Standard enthalpy of formation of Br₂(l):", "a": ["−100 kJ", "0 kJ (element in standard state)", "+50 kJ", "−200 kJ"], "c": 1}, {"q": "Note: Br₂ standard state is liquid (not gas), so ΔH°f = 0 for Br₂(l):", "a": ["True", "False", "Sometimes", "Only at STP"], "c": 0}, {"q": "ΔH°f for Br₂(g) is NOT zero because Br₂(g) is not the:", "a": ["Right formula", "Standard state (liquid is standard for Br₂)", "Right element", "Right symbol"], "c": 1}, {"q": "Using ΔH°f: for reaction aA + bB → cC + dD:", "a": ["ΔH° = [a·ΔHf(A) + b·ΔHf(B)] − [c·ΔHf(C) + d·ΔHf(D)]", "ΔH° = [c·ΔHf(C) + d·ΔHf(D)] − [a·ΔHf(A) + b·ΔHf(B)]", "Sum everything", "Multiply everything"], "c": 1}, {"q": "Products minus reactants for ΔH°f calculation:", "a": ["Σ(reactants) − Σ(products)", "Σ(products) − Σ(reactants)", "Only products", "Only reactants"], "c": 1}, {"q": "Calorimetry with a bomb calorimeter: q = C_cal × ΔT where C_cal is:", "a": ["Specific heat", "Heat capacity of the entire calorimeter", "Molar mass", "Volume"], "c": 1}, {"q": "Typical units for C_cal:", "a": ["J/g·°C", "kJ/°C", "mol/L", "g/mL"], "c": 1}, {"q": "In a bomb calorimeter, no gases escape so it measures:", "a": ["ΔH", "ΔE (internal energy at constant volume)", "ΔG", "ΔS"], "c": 1}, {"q": "ΔH ≈ ΔE for reactions involving only solids and liquids:", "a": ["True (volume change is negligible)", "False", "Sometimes", "Never"], "c": 0}, {"q": "For gas-phase reactions, ΔH = ΔE + PΔV:", "a": ["True", "False", "Sometimes", "Only for ideal gases"], "c": 0}, {"q": "Thermite reaction (Fe₂O₃ + 2Al → 2Fe + Al₂O₃) is highly:", "a": ["Endothermic", "Exothermic (ΔH ≈ −850 kJ)", "Neutral", "Slow"], "c": 1}, {"q": "Dissolving NaOH in water is:", "a": ["Endothermic", "Exothermic (solution heats up)", "Neutral", "Variable"], "c": 1}, {"q": "Dissolving NH₄NO₃ in water is:", "a": ["Exothermic", "Endothermic (solution cools — cold packs)", "Neutral", "Variable"], "c": 1}, {"q": "Enthalpy of atomization: energy to convert 1 mol of substance to:", "a": ["Liquid", "Gaseous atoms", "Solid", "Ions"], "c": 1}, {"q": "For monoatomic elements (e.g., Ar), ΔH_atomization =:", "a": ["0 (already individual atoms in gas)", "100 kJ", "Varies greatly", "−100 kJ"], "c": 0}, {"q": "For H₂(g) → 2H(g), the enthalpy equals the:", "a": ["Ionization energy", "H-H bond dissociation energy", "Electron affinity", "Lattice energy"], "c": 1}, {"q": "Heating curves are plotted as ___ vs heat added:", "a": ["Volume", "Temperature", "Mass", "Pressure"], "c": 1}, {"q": "On a heating curve, horizontal lines correspond to:", "a": ["Temperature increase", "Phase transitions (melting/boiling)", "Cooling", "Nothing"], "c": 1}, {"q": "The longer a horizontal section, the more energy the phase change:", "a": ["Releases", "Requires", "Doesn't need", "Creates"], "c": 1}, {"q": "Water's long boiling plateau shows vaporization requires:", "a": ["Little energy", "Lots of energy (high ΔH_vap)", "No energy", "Negative energy"], "c": 1}, {"q": "Cooling curves are the reverse of:", "a": ["Nothing", "Heating curves", "Pressure curves", "Volume curves"], "c": 1}, {"q": "On a cooling curve, horizontal lines are:", "a": ["Heating", "Condensation and freezing", "Nothing", "Random"], "c": 1}, {"q": "Supercooling: a liquid cooled below freezing without:", "a": ["Cooling", "Solidifying (metastable state)", "Evaporating", "Dissolving"], "c": 1}, {"q": "Hess's law is a consequence of enthalpy being a:", "a": ["Path function", "State function", "Random variable", "Constant"], "c": 1}, {"q": "If you can't directly measure ΔH for a reaction, use:", "a": ["Guessing", "Hess's law or ΔH°f values", "Only calorimetry", "Nothing"], "c": 1}, {"q": "The standard state for a solution is:", "a": ["Any concentration", "1 M", "0.1 M", "Saturated"], "c": 1}, {"q": "The standard temperature for thermodynamics is:", "a": ["0°C", "25°C (298 K)", "100°C", "−273°C"], "c": 1}, {"q": "ΔH is positive when heat flows from ___ to system:", "a": ["System to surroundings", "Surroundings to system (endothermic)", "Nowhere", "Both ways"], "c": 1}, {"q": "ΔH is negative when heat flows from system to:", "a": ["Surroundings (exothermic)", "System", "Nowhere", "Both"], "c": 0}, {"q": "Enthalpy diagrams: the y-axis is H, arrows pointing down = :", "a": ["Endothermic", "Exothermic (ΔH negative)", "No change", "Unknown"], "c": 1}, {"q": "Enthalpy diagrams: arrows pointing up = :", "a": ["Exothermic", "Endothermic (ΔH positive)", "No change", "Unknown"], "c": 1}, {"q": "The total enthalpy of the universe ___ in any process:", "a": ["Decreases", "Increases", "Is conserved (1st law)", "Doubles"], "c": 2}, {"q": "Energy can change forms but total energy is:", "a": ["Created", "Destroyed", "Conserved", "Random"], "c": 2}]}, {"id": "chem-ch6", "title": "Chapter 6: Electronic Structure (Part I)", "ln": "CHEM 260 · Ch 6", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Explain properties of electromagnetic energy. <b>2)</b> Describe features of the Bohr model. <b>3)</b> Summarize key aspects of quantum theory. <b>4)</b> Determine electron configurations for atoms. <b>5)</b> Relate electronic structure to periodic trends."}, {"heading": "Electromagnetic Radiation (EMR)", "body": "A <b>self-propagating wave</b> of the electromagnetic field that carries momentum and radiant energy through space. Examples: radio waves, microwaves, infrared, visible light, ultraviolet, X-rays, gamma rays. <b>Waves</b> are oscillations that transport energy from one point to another."}, {"heading": "Wave Properties", "body": "<b>Wavelength (λ):</b> distance between two consecutive peaks or troughs. <b>Frequency (ν):</b> number of cycles per second (units: Hz = s⁻¹). ν = 1/T where T is the period. <b>Amplitude (a):</b> magnitude of displacement (half the height between peak and trough). Higher amplitude = brighter/more intense light."}, {"heading": "The Wave Equation", "body": "<b>c = λν</b> — the most important equation here. c = speed of light = <b>3.00 × 10⁸ m/s</b>. If you know wavelength, you can find frequency (and vice versa). λ and ν are <b>inversely proportional</b>: longer wavelength = lower frequency, and shorter wavelength = higher frequency."}, {"heading": "The Electromagnetic Spectrum", "body": "From longest λ (lowest energy) to shortest λ (highest energy): <b>Radio → Microwave → Infrared → Visible (ROYGBIV) → Ultraviolet → X-ray → Gamma</b>. Visible light is a tiny sliver of the full spectrum. Red has the longest visible λ; violet has the shortest."}, {"heading": "Practice Q1: Wavelength → Frequency", "body": "Sodium streetlight: yellow light, λ = 589 nm. Convert: 589 nm × 10⁻⁹ m/nm = 5.89 × 10⁻⁷ m. Use c = λν → ν = c/λ = (3.00×10⁸)/(5.89×10⁻⁷) = <b>5.09 × 10¹⁴ Hz</b>. Always convert nm to meters first!"}, {"heading": "The Photoelectric Effect", "body": "<b>Metals emit electrons</b> when light shines on their surface. The light energy must exceed a minimum <b>threshold energy</b> for this to occur. Below threshold → no electrons ejected regardless of intensity. This proved light has particle-like properties (<b>photons</b>)."}, {"heading": "Photon Energy — Planck's Formula", "body": "<b>E = hν</b> where h = <b>6.626 × 10⁻³⁴ J·s</b> (Planck's constant). Since c = λν, we also get <b>E = hc/λ</b>. Shorter wavelength = higher frequency = <b>higher energy</b>. Energy is <b>quantized</b> — comes in discrete packets (photons), not continuous."}, {"heading": "Practice Q2: Photon Energy", "body": "Neon sign: λ = 640 nm = 6.40 × 10⁻⁷ m. E = hc/λ = (6.626×10⁻³⁴)(3.00×10⁸) / (6.40×10⁻⁷) = <b>3.11 × 10⁻¹⁹ J</b>. This is the energy of ONE photon. Very small — but billions of photons make visible light."}, {"heading": "Photoelectric Effect — Key Points", "body": "<b>1)</b> Light must exceed threshold energy → depends on the metal. <b>2)</b> Shorter λ = higher energy photons = higher energy ejected electrons. <b>3)</b> More intense light (more photons) ejects more electrons, but each electron's energy depends on photon energy (frequency), not intensity."}, {"heading": "The Bohr Model (1913)", "body": "Niels Bohr's model explains: <b>1)</b> Stability of the hydrogen atom. <b>2)</b> Line spectrum (discrete energies emitted). Key postulate: electrons can only have <b>specific, quantized energy values</b> called energy levels. Not any energy — only certain allowed ones."}, {"heading": "Bohr Energy Levels", "body": "Energy of level n: <b>E = −k/n²</b> where k = <b>2.179 × 10⁻¹⁸ J</b> (for hydrogen-like atoms) and n = principal quantum number (1, 2, 3...). n=1 is the ground state (lowest energy, most negative). As n increases, energy increases (becomes less negative) and orbital gets larger."}, {"heading": "Energy Transitions", "body": "When an electron moves between levels: <b>ΔE = E_final − E_initial = E₂ − E₁</b>. <b>Emission:</b> electron drops to lower level → releases photon (ΔE negative). <b>Absorption:</b> electron jumps to higher level → absorbs photon (ΔE positive). The photon energy exactly equals |ΔE|."}, {"heading": "Practice Q3: Bohr Transition", "body": "Electron moves from n=4 to n=6 in hydrogen. ΔE = −k(1/n₂² − 1/n₁²) = −2.179×10⁻¹⁸(1/36 − 1/16) = −2.179×10⁻¹⁸(0.02778 − 0.0625) = −2.179×10⁻¹⁸(−0.03472) = <b>+7.56 × 10⁻²⁰ J</b>. Positive → absorption (electron goes UP). Wavelength: λ = hc/E."}, {"heading": "De Broglie Wavelength", "body": "Louis de Broglie (1924): particles have <b>wave-like character</b>. Wavelength is inversely proportional to momentum: <b>λ = h/(mv)</b>. h = Planck's constant, m = mass, v = velocity. Macroscopic objects have immeasurably tiny wavelengths. Electrons have significant wavelengths — they behave as waves!"}, {"heading": "Practice Q4: De Broglie", "body": "1.00 kg at 1.00 km/hr (= 0.278 m/s): λ = 6.626×10⁻³⁴/(1.00 × 0.278) = <b>2.38 × 10⁻³³ m</b> → impossibly small, undetectable. Electron (9.11×10⁻³¹ kg at 4.19×10⁶ m/s): λ = 6.626×10⁻³⁴/(9.11×10⁻³¹ × 4.19×10⁶) = <b>1.74 × 10⁻¹⁰ m</b> → measurable! About the size of an atom."}, {"heading": "Schrödinger Equation", "body": "Schrödinger's equation calculates the <b>probability</b> of finding an electron with a particular energy at a particular location. Solutions to the wave function (ψ) yield <b>quantum numbers</b> that describe the electron's state. We don't know exactly WHERE an electron is — only the probability of finding it in a region."}, {"heading": "Principal Quantum Number (n)", "body": "Characterizes the <b>energy</b> of the electron in its orbital. Values: any <b>integer ≥ 1</b> (1, 2, 3, 4...). Larger n = <b>higher energy</b> (less negative) and <b>larger orbital</b>. Farther from nucleus = higher energy because the electron-nucleus attraction is weaker."}, {"heading": "Angular Momentum Quantum Number (l)", "body": "Determines the <b>shape</b> of the orbital. Values: integers from <b>0 to (n−1)</b>. Each value has a letter: <b>l=0 → s</b> (sphere), <b>l=1 → p</b> (two balloons), <b>l=2 → d</b> (four balloons), <b>l=3 → f</b> (eight balloons). Example: if n=3, l can be 0, 1, or 2 (s, p, d)."}, {"heading": "s Orbitals (l = 0)", "body": "<b>Spherical</b> shape. <b>1 per energy level</b> (1s, 2s, 3s...). Each is larger than the previous. Lowest energy orbital within a given n. Present at ALL energy levels (n ≥ 1)."}, {"heading": "p Orbitals (l = 1)", "body": "<b>Dumbbell</b> shape (two balloons tied at knots). <b>3 per energy level</b> (px, py, pz — one along each axis). Start at <b>n = 2</b> (because l must be ≤ n−1; for n=1, max l=0). Each set of three p orbitals are degenerate (same energy)."}, {"heading": "d Orbitals (l = 2)", "body": "<b>Clover/complex</b> shapes. <b>5 per energy level</b> (dxy, dyz, dxz, dx²−y², dz²). Start at <b>n = 3</b>. Four are in different planes; the fifth (dz²) is along the z-axis. Important for transition metal chemistry."}, {"heading": "f Orbitals (l = 3)", "body": "Even more complex shapes. <b>7 per energy level</b>. Start at <b>n = 4</b>. Less important for this course than s, p, d. Relevant for lanthanides and actinides on the periodic table."}, {"heading": "Magnetic Quantum Number (mₗ)", "body": "Specifies the <b>orientation</b> of the orbital in space. Values: integers from <b>−l to +l</b> (including 0). Number of orbitals in a subshell = <b>2l + 1</b>. For l=1 (p): mₗ = −1, 0, +1 → 3 orbitals. For l=2 (d): mₗ = −2,−1,0,+1,+2 → 5 orbitals."}, {"heading": "Describing an Orbital", "body": "Each unique set of <b>n, l, mₗ</b> describes ONE orbital. n=2 level has 2 sublevels: l=0 (2s, 1 orbital) and l=1 (2p, 3 orbitals). Total orbitals in level n = <b>n²</b>. Sublevels in level n = <b>n</b>. Orbitals in sublevel l = <b>2l+1</b>."}, {"heading": "Pauli Exclusion Principle", "body": "<b>No two electrons</b> in the same atom can have the <b>exact same set of all four quantum numbers</b> (n, l, mₗ, mₛ). Since mₛ = +½ or −½, each orbital holds <b>max 2 electrons</b> with opposite spins. Max electrons: s=2, p=6, d=10, f=14."}, {"heading": "Quantum Number Summary Table", "body": "<b>n:</b> 1,2,3... → energy/size. <b>l:</b> 0 to n−1 → shape (s,p,d,f). <b>mₗ:</b> −l to +l → orientation. <b>mₛ:</b> +½ or −½ → spin. Each orbital: unique (n,l,mₗ). Each electron: unique (n,l,mₗ,mₛ). Total electrons in level n = <b>2n²</b>."}, {"heading": "Key Constants to Remember", "body": "<b>c = 3.00 × 10⁸ m/s</b> (speed of light)<br><b>h = 6.626 × 10⁻³⁴ J·s</b> (Planck's constant)<br><b>k = 2.179 × 10⁻¹⁸ J</b> (Bohr constant for H)<br><b>c = λν</b>, <b>E = hν = hc/λ</b>, <b>E = −k/n²</b>, <b>λ = h/(mv)</b>"}], "quiz": [{"q": "EMR is a self-propagating:", "a": ["Particle", "Wave", "Solid", "Liquid"], "c": 1}, {"q": "Wavelength (λ) is:", "a": ["Cycles per second", "Distance between peaks", "Wave height", "Energy per photon"], "c": 1}, {"q": "Frequency (ν) is measured in:", "a": ["Meters", "Joules", "Hz (s⁻¹)", "Kg"], "c": 2}, {"q": "c = λν: c is:", "a": ["Planck's constant", "Speed of light", "Electron charge", "Boltzmann constant"], "c": 1}, {"q": "Speed of light =:", "a": ["3.00 × 10⁶", "3.00 × 10⁸", "6.626 × 10⁻³⁴", "6.022 × 10²³"], "c": 1}, {"q": "Longer wavelength means ___ frequency:", "a": ["Higher", "Lower", "Same", "Zero"], "c": 1}, {"q": "Shorter wavelength means ___ energy:", "a": ["Lower", "Higher", "Same", "Zero"], "c": 1}, {"q": "Most energetic type of EMR:", "a": ["Radio", "Visible", "UV", "Gamma"], "c": 3}, {"q": "Longest wavelength visible color:", "a": ["Violet", "Blue", "Green", "Red"], "c": 3}, {"q": "589 nm = ___ m:", "a": ["5.89 × 10⁻⁵", "5.89 × 10⁻⁷", "5.89 × 10⁻⁹", "589"], "c": 1}, {"q": "Photoelectric effect: light ejects:", "a": ["Protons", "Neutrons", "Electrons", "Photons"], "c": 2}, {"q": "Below threshold energy:", "a": ["More electrons ejected", "No electrons ejected", "Protons ejected", "Light absorbed only"], "c": 1}, {"q": "E = hν: h is:", "a": ["Speed of light", "Planck's constant", "Bohr constant", "Avogadro's number"], "c": 1}, {"q": "Planck's constant =:", "a": ["3.00 × 10⁸", "6.626 × 10⁻³⁴", "2.179 × 10⁻¹⁸", "6.022 × 10²³"], "c": 1}, {"q": "E = hc/λ means shorter λ =:", "a": ["Lower energy", "Higher energy", "Same energy", "No energy"], "c": 1}, {"q": "Energy is quantized means it comes in:", "a": ["Continuous amounts", "Discrete packets", "Waves only", "Random amounts"], "c": 1}, {"q": "Bohr model: energy levels are:", "a": ["Continuous", "Quantized (discrete)", "Random", "Infinite"], "c": 1}, {"q": "E = −k/n²: larger n means:", "a": ["Lower energy", "Higher energy (less negative)", "Same energy", "Zero energy"], "c": 1}, {"q": "Ground state is n =:", "a": ["0", "1", "2", "∞"], "c": 1}, {"q": "Emission: electron goes:", "a": ["Up levels", "Down levels", "Nowhere", "Out of atom"], "c": 1}, {"q": "Absorption: electron goes:", "a": ["Down levels", "Up levels", "Nowhere", "Into nucleus"], "c": 1}, {"q": "De Broglie: λ = h/(mv). Larger mass =:", "a": ["Longer wavelength", "Shorter wavelength", "Same wavelength", "No wavelength"], "c": 1}, {"q": "Macroscopic objects have ___ de Broglie wavelengths:", "a": ["Large", "Immeasurably tiny", "Zero", "Infinite"], "c": 1}, {"q": "Schrödinger equation calculates:", "a": ["Exact electron position", "Probability of finding electron", "Electron mass", "Nuclear charge"], "c": 1}, {"q": "Principal quantum number n determines:", "a": ["Shape", "Orientation", "Energy and size", "Spin"], "c": 2}, {"q": "Angular momentum l determines:", "a": ["Energy", "Shape", "Orientation", "Spin"], "c": 1}, {"q": "Magnetic mₗ determines:", "a": ["Energy", "Shape", "Orientation", "Spin"], "c": 2}, {"q": "l = 0 corresponds to:", "a": ["p orbital", "d orbital", "s orbital", "f orbital"], "c": 2}, {"q": "l = 1 corresponds to:", "a": ["s orbital", "p orbital", "d orbital", "f orbital"], "c": 1}, {"q": "l = 2 corresponds to:", "a": ["s orbital", "p orbital", "d orbital", "f orbital"], "c": 2}, {"q": "s orbitals are:", "a": ["Dumbbell", "Clover", "Spherical", "Complex"], "c": 2}, {"q": "How many p orbitals per shell?", "a": ["1", "3", "5", "7"], "c": 1}, {"q": "How many d orbitals per shell?", "a": ["1", "3", "5", "7"], "c": 2}, {"q": "p orbitals start at n =:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "d orbitals start at n =:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "f orbitals start at n =:", "a": ["1", "2", "3", "4"], "c": 3}, {"q": "For l = 2, mₗ values are:", "a": ["0 only", "−1,0,+1", "−2,−1,0,+1,+2", "−3 to +3"], "c": 2}, {"q": "Number of orbitals in sublevel l = 2l+1. For d (l=2):", "a": ["1", "3", "5", "7"], "c": 2}, {"q": "Total orbitals in level n = n². For n=3:", "a": ["3", "6", "9", "12"], "c": 2}, {"q": "Pauli exclusion: max electrons per orbital:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Pauli: no two electrons have same:", "a": ["Mass", "Charge", "Set of all 4 quantum numbers", "Energy"], "c": 2}, {"q": "Max electrons in s subshell:", "a": ["2", "6", "10", "14"], "c": 0}, {"q": "Max electrons in p subshell:", "a": ["2", "6", "10", "14"], "c": 1}, {"q": "Max electrons in d subshell:", "a": ["2", "6", "10", "14"], "c": 2}, {"q": "Max electrons in f subshell:", "a": ["2", "6", "10", "14"], "c": 3}, {"q": "Total electrons in level n = 2n². For n=2:", "a": ["2", "4", "8", "18"], "c": 2}, {"q": "Spin quantum number mₛ values:", "a": ["0 only", "±1", "±½", "±2"], "c": 2}, {"q": "Number of sublevels in level n =:", "a": ["n", "n²", "2n", "2n²"], "c": 0}, {"q": "k (Bohr constant) =:", "a": ["3.00 × 10⁸", "6.626 × 10⁻³⁴", "2.179 × 10⁻¹⁸", "6.022 × 10²³"], "c": 2}, {"q": "n=4 to n=6 is ___ (absorption/emission):", "a": ["Emission", "Absorption", "Neither", "Both"], "c": 1}, {"q": "Light is a form of ___ radiation:", "a": ["Nuclear", "Electromagnetic", "Sound", "Gravitational"], "c": 1}, {"q": "The speed of light (c):", "a": ["3.00 × 10⁶ m/s", "3.00 × 10⁸ m/s", "3.00 × 10¹⁰ m/s", "186 m/s"], "c": 1}, {"q": "c = λν. λ is:", "a": ["Frequency", "Wavelength", "Speed", "Energy"], "c": 1}, {"q": "c = λν. ν is:", "a": ["Wavelength", "Frequency", "Speed", "Energy"], "c": 1}, {"q": "Wavelength and frequency are ___ proportional:", "a": ["Directly", "Inversely (longer λ = lower ν)", "Not", "Equally"], "c": 1}, {"q": "Higher frequency means ___ energy:", "a": ["Lower", "Higher", "Same", "No"], "c": 1}, {"q": "E = hν. h is:", "a": ["Speed of light", "Planck's constant (6.626 × 10⁻³⁴ J·s)", "Frequency", "Wavelength"], "c": 1}, {"q": "Electromagnetic spectrum (low to high energy):", "a": ["Gamma, X-ray, UV, visible, IR, micro, radio", "Radio, micro, IR, visible, UV, X-ray, gamma", "Visible only", "Random"], "c": 1}, {"q": "Visible light order (low to high energy): ROY G BIV means:", "a": ["Red lowest, violet highest", "Violet lowest, red highest", "All equal", "Random"], "c": 0}, {"q": "Planck proposed that energy is:", "a": ["Continuous", "Quantized (comes in discrete packets)", "Random", "Infinite"], "c": 1}, {"q": "A quantum is a:", "a": ["Large amount", "Discrete packet of energy", "Continuous wave", "Sound wave"], "c": 1}, {"q": "Photoelectric effect: light ejects ___ from metal:", "a": ["Protons", "Electrons", "Neutrons", "Photons"], "c": 1}, {"q": "Einstein explained the photoelectric effect using:", "a": ["Waves", "Photons (particles of light)", "Sound", "Gravity"], "c": 1}, {"q": "A photon has energy:", "a": ["E = mc²", "E = hν", "E = ½mv²", "E = PV"], "c": 1}, {"q": "Wave-particle duality: light behaves as both:", "a": ["Solid and liquid", "Wave and particle", "Only wave", "Only particle"], "c": 1}, {"q": "Bohr model: electrons orbit in fixed:", "a": ["Random paths", "Energy levels (orbits/shells)", "Straight lines", "Spirals"], "c": 1}, {"q": "Bohr model works well for:", "a": ["All atoms", "Only hydrogen (1 electron)", "Only helium", "All metals"], "c": 1}, {"q": "In Bohr model, energy levels are:", "a": ["Continuous", "Quantized (n = 1, 2, 3...)", "Random", "Infinite"], "c": 1}, {"q": "n = 1 is the:", "a": ["Excited state", "Ground state (lowest energy)", "Ionized state", "Highest energy"], "c": 1}, {"q": "When an electron absorbs energy, it moves to a ___ energy level:", "a": ["Lower", "Higher (excited state)", "Same", "Ground"], "c": 1}, {"q": "When an electron falls to a lower level, it ___ a photon:", "a": ["Absorbs", "Emits (releases)", "Destroys", "Creates matter"], "c": 1}, {"q": "The energy of emitted photon = difference between:", "a": ["Mass levels", "Energy levels (ΔE = E_high − E_low)", "Wavelengths", "Frequencies"], "c": 1}, {"q": "Emission spectrum: bright lines on dark background from:", "a": ["Absorption", "Excited atoms emitting specific wavelengths", "White light", "Reflection"], "c": 1}, {"q": "Absorption spectrum: dark lines on bright background from:", "a": ["Emission", "Atoms absorbing specific wavelengths from white light", "Only gases", "Only solids"], "c": 1}, {"q": "Each element has a ___ emission spectrum (fingerprint):", "a": ["Same", "Unique", "Random", "Variable"], "c": 1}, {"q": "De Broglie: matter (like electrons) also has:", "a": ["Only particle nature", "Wave properties (wave-particle duality)", "No properties", "Only mass"], "c": 1}, {"q": "λ = h/mv. This is the de Broglie:", "a": ["Energy", "Wavelength", "Frequency", "Speed"], "c": 1}, {"q": "Heisenberg uncertainty principle: cannot simultaneously know exact ___ and ___:", "a": ["Mass/charge", "Position/momentum of electron", "Color/shape", "Size/weight"], "c": 1}, {"q": "The quantum mechanical model replaced Bohr with:", "a": ["Fixed orbits", "Electron probability clouds (orbitals)", "Random positions", "No model"], "c": 1}, {"q": "An orbital is a region of ___ probability of finding an electron:", "a": ["Zero", "High", "No", "Exact"], "c": 1}, {"q": "Schrödinger's equation describes electron behavior using:", "a": ["Particles only", "Wave functions (ψ)", "Classical mechanics", "Newton's laws"], "c": 1}, {"q": "The principal quantum number (n) determines:", "a": ["Shape", "Energy level and size (1, 2, 3...)", "Orientation", "Spin"], "c": 1}, {"q": "The angular momentum quantum number (l) determines:", "a": ["Energy", "Shape of orbital (0=s, 1=p, 2=d, 3=f)", "Orientation", "Spin"], "c": 1}, {"q": "l = 0 is an ___ orbital:", "a": ["p", "d", "s (spherical)", "f"], "c": 2}, {"q": "l = 1 is a ___ orbital:", "a": ["s", "p (dumbbell)", "d", "f"], "c": 1}, {"q": "l = 2 is a ___ orbital:", "a": ["s", "p", "d (cloverleaf)", "f"], "c": 2}, {"q": "l = 3 is an ___ orbital:", "a": ["s", "p", "d", "f (complex shapes)"], "c": 3}, {"q": "The magnetic quantum number (ml) determines:", "a": ["Shape", "Size", "Orientation in space", "Spin"], "c": 2}, {"q": "ml ranges from −l to +l, so for l=1 (p): ml =:", "a": ["Only 0", "−1, 0, +1 (3 orientations → 3 p orbitals)", "−2 to +2", "Only +1"], "c": 1}, {"q": "Spin quantum number (ms) = +½ or −½:", "a": ["True", "False", "Sometimes", "Depends on n"], "c": 0}, {"q": "An s sublevel has ___ orbital(s):", "a": ["1", "3", "5", "7"], "c": 0}, {"q": "A p sublevel has ___ orbitals:", "a": ["1", "3", "5", "7"], "c": 1}, {"q": "A d sublevel has ___ orbitals:", "a": ["1", "3", "5", "7"], "c": 2}, {"q": "An f sublevel has ___ orbitals:", "a": ["1", "3", "5", "7"], "c": 3}, {"q": "Each orbital holds a maximum of ___ electrons:", "a": ["1", "2", "4", "8"], "c": 1}, {"q": "Pauli exclusion principle: no two electrons can have the same ___ quantum numbers:", "a": ["3", "4 (all four must differ)", "2", "1"], "c": 1}, {"q": "Aufbau principle: electrons fill ___ energy orbitals first:", "a": ["Highest", "Lowest", "Random", "Middle"], "c": 1}, {"q": "Hund's rule: electrons fill orbitals of equal energy:", "a": ["In pairs first", "Singly first (one per orbital, same spin, before pairing)", "Randomly", "Backwards"], "c": 1}, {"q": "The filling order starts: 1s, 2s, 2p, 3s, 3p, ___:", "a": ["3d", "4s (before 3d)", "4p", "4d"], "c": 1}, {"q": "Why 4s fills before 3d:", "a": ["Random", "4s is lower in energy than 3d", "3d doesn't exist", "4s is bigger"], "c": 1}, {"q": "The diagonal rule helps determine:", "a": ["Electron configuration filling order", "Periodic table layout", "Chemical reactions", "Nothing"], "c": 0}, {"q": "Shell n can hold a maximum of ___ electrons:", "a": ["n", "2n", "2n²", "n²"], "c": 2}, {"q": "Shell n=1 holds max:", "a": ["1", "2", "8", "18"], "c": 1}, {"q": "Shell n=2 holds max:", "a": ["2", "8", "18", "32"], "c": 1}, {"q": "Shell n=3 holds max:", "a": ["8", "18", "32", "50"], "c": 1}, {"q": "Shell n=4 holds max:", "a": ["8", "18", "32", "50"], "c": 2}, {"q": "Valence electrons are in the:", "a": ["Inner shells", "Outermost energy level", "Nucleus", "Core"], "c": 1}, {"q": "Core electrons are in:", "a": ["The outermost level", "Inner energy levels", "The nucleus", "Empty orbitals"], "c": 1}, {"q": "Hydrogen's electron configuration:", "a": ["1s²", "1s¹", "2s¹", "1p¹"], "c": 1}, {"q": "Helium's electron configuration:", "a": ["1s¹", "1s²", "2s²", "1p²"], "c": 1}, {"q": "Carbon (Z=6) electron configuration:", "a": ["1s²2s²2p²", "1s²2s²2p⁴", "1s²2s²3s²", "1s²2p⁴"], "c": 0}, {"q": "Neon (Z=10) electron configuration:", "a": ["1s²2s²2p⁴", "1s²2s²2p⁶", "1s²2s²3s²", "1s²2s²2p⁵"], "c": 1}, {"q": "Sodium (Z=11) config: [Ne]:", "a": ["3s²", "3s¹", "3p¹", "2p⁷"], "c": 1}, {"q": "Noble gas shorthand for Na: [Ne]3s¹. [Ne] represents:", "a": ["Nothing", "The first 10 electrons (1s²2s²2p⁶)", "Only 2 electrons", "8 electrons"], "c": 1}, {"q": "Electron configurations explain:", "a": ["Only color", "Periodic trends and chemical behavior", "Only mass", "Only density"], "c": 1}, {"q": "Elements in the same group have the same number of:", "a": ["Total electrons", "Valence electrons", "Neutrons", "Protons"], "c": 1}, {"q": "Paramagnetic atoms have ___ electrons:", "a": ["All paired", "Unpaired", "No", "Only s"], "c": 1}, {"q": "Diamagnetic atoms have:", "a": ["Unpaired electrons", "All electrons paired", "No electrons", "Only d electrons"], "c": 1}, {"q": "Paramagnetic substances are attracted to:", "a": ["Nothing", "Magnetic fields", "Only heat", "Only light"], "c": 1}, {"q": "Chromium is an exception: actual config is [Ar]3d⁵4s¹ instead of:", "a": ["[Ar]3d⁴4s²", "[Ar]3d⁶", "[Ar]3d³4s²", "[Ar]4s²"], "c": 0}, {"q": "Copper exception: actual config is [Ar]3d¹⁰4s¹ instead of:", "a": ["[Ar]3d⁹4s²", "[Ar]3d¹⁰4s²", "[Ar]3d⁸4s²", "[Ar]4s²"], "c": 0}, {"q": "Half-filled and fully filled d subshells are extra:", "a": ["Unstable", "Stable (lower energy)", "Random", "Reactive"], "c": 1}, {"q": "Electron configurations can be read from:", "a": ["Only a table", "The periodic table structure", "Only a calculator", "Only Bohr model"], "c": 1}, {"q": "s-block includes groups:", "a": ["3-12", "13-18", "1 and 2 (+ He)", "17 and 18"], "c": 2}, {"q": "p-block includes groups:", "a": ["1-2", "13-18", "3-12", "Only 18"], "c": 1}, {"q": "d-block includes groups:", "a": ["1-2", "13-18", "3-12 (transition metals)", "Only 18"], "c": 2}, {"q": "f-block is the:", "a": ["Main group", "Lanthanides and actinides", "Noble gases", "Halogens"], "c": 1}, {"q": "Wavelength is measured in:", "a": ["Hertz", "Meters (or nm)", "Joules", "Seconds"], "c": 1}, {"q": "Frequency is measured in:", "a": ["Meters", "Hertz (s⁻¹)", "Joules", "Kilograms"], "c": 1}, {"q": "1 nm = 10⁻⁹:", "a": ["Kilometers", "Centimeters", "Meters", "Millimeters"], "c": 2}, {"q": "UV light has ___ energy than visible:", "a": ["Less", "More (shorter wavelength)", "Same", "No"], "c": 1}, {"q": "IR light has ___ energy than visible:", "a": ["More", "Less (longer wavelength)", "Same", "No"], "c": 1}, {"q": "Gamma rays have the ___ energy:", "a": ["Lowest", "Highest", "Medium", "No"], "c": 1}, {"q": "Radio waves have the ___ energy:", "a": ["Highest", "Lowest", "Medium", "Same as gamma"], "c": 1}, {"q": "Continuous spectrum contains:", "a": ["Only certain colors", "All wavelengths (rainbow)", "Only UV", "Only IR"], "c": 1}, {"q": "Line spectrum contains:", "a": ["All wavelengths", "Only specific wavelengths (from excited atoms)", "Only white light", "Only radio waves"], "c": 1}, {"q": "Hydrogen's visible emission lines are called the ___ series:", "a": ["Lyman", "Balmer", "Paschen", "Brackett"], "c": 1}, {"q": "Balmer series transitions end at n =:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Lyman series transitions end at n = 1 and are in the:", "a": ["Visible", "UV region", "IR", "Microwave"], "c": 1}, {"q": "The Balmer series lines are in the ___ region:", "a": ["UV", "Visible", "IR", "Microwave"], "c": 1}, {"q": "Lyman series: UV. Balmer: visible. Paschen:", "a": ["UV", "Visible", "Infrared", "Microwave"], "c": 2}, {"q": "As n increases, energy levels get ___ together:", "a": ["Further apart", "Closer (converge)", "Same distance", "Random"], "c": 1}, {"q": "At n = ∞, the electron is:", "a": ["At ground state", "Ionized (free from atom)", "In the nucleus", "Destroyed"], "c": 1}, {"q": "Ionization energy = energy to go from n=1 to n=:", "a": ["2", "3", "∞ (free electron)", "0"], "c": 2}, {"q": "For hydrogen: E = −2.18 × 10⁻¹⁸ J × (1/n²):", "a": ["True (Bohr equation)", "False", "Sometimes", "Only for metals"], "c": 0}, {"q": "ΔE = E_final − E_initial. If ΔE is negative:", "a": ["Energy absorbed", "Energy emitted (photon released)", "No change", "Error"], "c": 1}, {"q": "If ΔE is positive:", "a": ["Energy emitted", "Energy absorbed (photon absorbed)", "No change", "Error"], "c": 1}, {"q": "The quantum mechanical model treats electrons as:", "a": ["Particles only", "Waves (probability distributions)", "Points", "Billiard balls"], "c": 1}, {"q": "An orbital shape (s, p, d, f) is determined by quantum number:", "a": ["n", "l", "ml", "ms"], "c": 1}, {"q": "The Aufbau diagram follows the diagonal rule filling order:", "a": ["True", "False", "Sometimes", "Only for H"], "c": 0}]}, {"id": "chem-ch6b", "title": "Chapter 6 (cont): Electron Config & Periodic Trends", "ln": "CHEM 260 · Ch 6 cont.", "notes": [{"heading": "Review — Quantum Numbers", "body": "<b>n:</b> principal (energy/size), integer ≥1. <b>l:</b> angular momentum (shape), 0 to n−1. <b>mₗ:</b> magnetic (orientation), −l to +l. <b>mₛ:</b> spin, +½ or −½. Each set of (n, l, mₗ) = one orbital. Each set of (n, l, mₗ, mₛ) = one electron."}, {"heading": "Review — Orbital Shapes Table", "body": "<b>l=0 → s:</b> spherical, 1 orbital. <b>l=1 → p:</b> dumbbell, 3 orbitals (px, py, pz). <b>l=2 → d:</b> clover, 5 orbitals (dxy, dyz, dxz, dx²−y², dz²). <b>l=3 → f:</b> complex, 7 orbitals. Number of orbitals per subshell = 2l+1."}, {"heading": "s Orbitals — Details", "body": "Each energy level has <b>one s orbital</b>. 1s, 2s, 3s... all spherical but each <b>larger</b> than the last. Important distinction: '1 s orbital' (quantity) vs '1s orbital' (the specific n=1 s orbital). Lowest energy orbital within any given n."}, {"heading": "p Orbitals — Details", "body": "Start at <b>n=2</b> (because l goes 0 to n−1; at n=1, max l=0). Three per level: px, py, pz — each along a different Cartesian axis. All three are <b>degenerate</b> (same energy within a subshell)."}, {"heading": "d Orbitals — Details", "body": "Start at <b>n=3</b>. Five per level: dxy, dyz, dxz, dx²−y², dz². Four lie in planes between axes; dz² points along z-axis. All five are degenerate. Essential for transition metal chemistry."}, {"heading": "f Orbitals — Details", "body": "Start at <b>n=4</b>. Seven per level. Complex shapes — you do NOT need to memorize their individual names. Important for lanthanides and actinides."}, {"heading": "Magnetic Quantum Number — Why Orbital Counts", "body": "mₗ ranges from −l to +l, giving <b>2l+1 values</b>. For l=3 (f): mₗ = −3,−2,−1,0,+1,+2,+3 = <b>7 orbitals</b>. This is WHY each subshell has a specific number of orbitals — it comes directly from the allowed mₗ values."}, {"heading": "Subshells and Degenerate Orbitals", "body": "<b>Subshell:</b> orbitals with the same value of l (e.g., all three 2p orbitals). <b>Degenerate orbitals:</b> orbitals within the same subshell that have <b>identical energy</b>. The three 2p orbitals are degenerate; the five 3d orbitals are degenerate."}, {"heading": "Spin Quantum Number (mₛ)", "body": "Describes the <b>spin direction</b> of an electron (NOT the orbital). Only two possible values: <b>+½ (spin up ↑)</b> or <b>−½ (spin down ↓)</b>. Every electron in the universe has one of these two spins. This is why each orbital holds exactly 2 electrons."}, {"heading": "Pauli Exclusion Principle", "body": "<b>No two electrons</b> in the same atom can have the <b>same set of all four quantum numbers</b>. Since mₛ has only 2 values, each orbital (defined by n, l, mₗ) holds <b>max 2 electrons</b> with opposite spins. Max electrons: s=2, p=6, d=10, f=14."}, {"heading": "Orbital Energy Ordering", "body": "As <b>n increases</b>, orbital energy increases (farther from nucleus = weaker attraction). For same n but different l: energy increases <b>s < p < d < f</b>. Remember this order! It explains why 4s fills before 3d."}, {"heading": "Electron Configuration Notation", "body": "Written as: <b>nX<sup>e</sup></b> where n = principal quantum number, X = subshell letter (s,p,d,f), superscript = number of electrons. Example: <b>1s¹</b> means n=1, l=0 (s orbital), 1 electron. <b>2p⁴</b> means n=2, l=1 (p orbital), 4 electrons."}, {"heading": "Aufbau Principle", "body": "Electrons fill orbitals of <b>lowest available energy first</b>, then move to higher energy. The filling order follows the diagonal rule: <b>1s → 2s → 2p → 3s → 3p → 4s → 3d → 4p → 5s → 4d → 5p → 6s → 4f → 5d → 6p → 7s → 5f → 6d → 7p</b>. Note: 4s fills BEFORE 3d!"}, {"heading": "Hund's Rule", "body": "When filling orbitals of the <b>same energy</b> (degenerate), place <b>one electron in each orbital before pairing</b>. All unpaired electrons have the <b>same spin</b> (all up ↑ first). Example: for 2p³ (nitrogen), put one electron in each of the three p orbitals → ↑ ↑ ↑, NOT ↑↓ ↑ _."}, {"heading": "Three Rules Summary", "body": "<b>1) Aufbau:</b> lowest energy first. <b>2) Pauli:</b> max 2 electrons per orbital, opposite spins. <b>3) Hund's:</b> spread out before pairing in degenerate orbitals. Apply all three to write any electron configuration."}, {"heading": "Orbital Diagrams", "body": "Visual representation using boxes (orbitals) and arrows (electrons). ↑ = spin up, ↓ = spin down. Each box = one orbital. Fill following Aufbau → Pauli → Hund's rules. Example for C (6 e⁻): [↑↓] [↑↓] [↑][↑][ ] → 1s² 2s² 2p²."}, {"heading": "Core vs Valence Electrons", "body": "<b>Valence electrons:</b> in the <b>outermost shell</b> (highest n). Determine chemical behavior and bonding. <b>Core electrons:</b> in <b>inner shells</b>. Shield valence electrons from full nuclear charge. Noble gas shorthand: [Ne] 3s² 3p³ for phosphorus (core = [Ne], valence = 3s²3p³)."}, {"heading": "Practice: Phosphorus (P, Z=15)", "body": "15 electrons. Config: <b>1s² 2s² 2p⁶ 3s² 3p³</b>. Or [Ne] 3s² 3p³. Orbital diagram for 3p: [↑][↑][↑] (Hund's rule — one in each before pairing). Last electron: n=3, l=1, mₗ=+1, mₛ=+½."}, {"heading": "Periodic Trends — Atomic/Covalent Radius", "body": "<b>Covalent radius:</b> ½ the distance between nuclei of two identical bonded atoms. <b>Down a group:</b> radius <b>increases</b> (more shells). <b>Across a period (left→right):</b> radius <b>decreases</b> (more protons pull electrons closer despite same shell). Shielding by inner electrons partially offsets nuclear charge."}, {"heading": "Ion Size vs Atom Size", "body": "<b>Cation < parent atom:</b> losing electrons reduces electron-electron repulsion → electrons pulled closer. <b>Anion > parent atom:</b> gaining electrons increases repulsion → electron cloud expands. Going down the table, both cation and anion sizes increase."}, {"heading": "Isoelectronic Series", "body": "Atoms/ions with the <b>same electron configuration</b>. Example: N³⁻, O²⁻, F⁻, Ne, Na⁺, Mg²⁺, Al³⁺ — all have 10 electrons (same as Ne). The more nuclear charge (protons) with same electrons → <b>smaller radius</b>. Order largest to smallest: <b>N³⁻ > O²⁻ > F⁻ > Ne > Na⁺ > Mg²⁺ > Al³⁺</b>."}, {"heading": "Why Isoelectronic Size Decreases", "body": "Same number of electrons but increasing number of protons. More protons = stronger pull on the same electron cloud = smaller radius. Al³⁺ has 13 protons pulling on 10 electrons (very tight). N³⁻ has only 7 protons holding 10 electrons (very loose)."}, {"heading": "Ionization Energy Trend", "body": "<b>Ionization energy (IE):</b> energy to remove one electron. <b>Increases left→right</b> (stronger nuclear hold). <b>Increases bottom→up</b> (electrons closer to nucleus). Metals: low IE (easy to lose e⁻). Nonmetals: high IE (hard to lose e⁻). Noble gases: highest IE."}, {"heading": "Electron Affinity & Electronegativity Preview", "body": "<b>Electron affinity:</b> energy change when atom gains an electron. <b>Electronegativity:</b> tendency to attract bonding electrons. Both generally increase going up and to the right (same trend as IE). F is the most electronegative element."}, {"heading": "Key Equations & Rules", "body": "<b>Filling order:</b> 1s 2s 2p 3s 3p 4s 3d 4p 5s 4d...<br><b>Aufbau:</b> lowest energy first<br><b>Pauli:</b> max 2 e⁻/orbital, opposite spins<br><b>Hund's:</b> one in each degenerate orbital before pairing<br><b>Atomic radius:</b> ↑ down, ↓ right<br><b>IE:</b> ↓ down, ↑ right<br><b>Isoelectronic:</b> more protons = smaller"}], "quiz": [{"q": "Subshell energy order for same n:", "a": ["f < d < p < s", "s < p < d < f", "p < s < d < f", "All equal"], "c": 1}, {"q": "4s fills before:", "a": ["3p", "3d", "2p", "3s"], "c": 1}, {"q": "Aufbau means fill ___ energy first:", "a": ["Highest", "Lowest", "Random", "Middle"], "c": 1}, {"q": "Hund's rule: in degenerate orbitals:", "a": ["Pair immediately", "One in each before pairing", "Fill only one", "Skip every other"], "c": 1}, {"q": "Pauli: max electrons per orbital:", "a": ["1", "2", "3", "6"], "c": 1}, {"q": "Electron config of H (Z=1):", "a": ["1s²", "1s¹", "2s¹", "1p¹"], "c": 1}, {"q": "Electron config of He (Z=2):", "a": ["1s¹", "1s²", "2s²", "1p²"], "c": 1}, {"q": "Electron config of C (Z=6):", "a": ["1s²2s²2p²", "1s²2s²2p⁴", "1s²2p⁴", "1s²2s⁴"], "c": 0}, {"q": "Electron config of N (Z=7):", "a": ["1s²2s²2p³", "1s²2s²2p⁵", "1s²2s³2p²", "1s²2p⁵"], "c": 0}, {"q": "Electron config of Ne (Z=10):", "a": ["1s²2s²2p⁶", "1s²2s²2p⁴", "1s²2s²3s²", "1s¹⁰"], "c": 0}, {"q": "Electron config of Na (Z=11):", "a": ["1s²2s²2p⁶3s¹", "1s²2s²2p⁶3p¹", "[Ne]3p¹", "[Ar]3s¹"], "c": 0}, {"q": "Electron config of P (Z=15):", "a": ["[Ne]3s²3p³", "[Ne]3s²3p⁵", "[Ar]3s²3p³", "[Ne]3s¹3p⁴"], "c": 0}, {"q": "Valence electrons are in the:", "a": ["Inner shells", "Outermost shell", "Nucleus", "d orbitals only"], "c": 1}, {"q": "Core electrons are in:", "a": ["Outermost shell", "Inner shells", "Only s orbitals", "Only p orbitals"], "c": 1}, {"q": "P has ___ valence electrons:", "a": ["2", "3", "5", "15"], "c": 2}, {"q": "Na has ___ valence electron(s):", "a": ["1", "2", "8", "11"], "c": 0}, {"q": "Noble gas shorthand for P:", "a": ["[He]3s²3p³", "[Ne]3s²3p³", "[Ar]3s²3p³", "[Ne]3p⁵"], "c": 1}, {"q": "Hund's rule for 2p³: orbital diagram is:", "a": ["↑↓ ↑ _", "↑ ↑ ↑", "↑↓ ↑↓ ↑", "↑↓ _ _"], "c": 1}, {"q": "Degenerate orbitals have:", "a": ["Different energies", "Same energy", "No energy", "Infinite energy"], "c": 1}, {"q": "Number of subshells in n=3:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Max electrons in n=3:", "a": ["8", "10", "14", "18"], "c": 3}, {"q": "Filling order after 3p:", "a": ["3d", "4s", "4p", "4d"], "c": 1}, {"q": "Filling order after 4s:", "a": ["4p", "3d", "5s", "4d"], "c": 1}, {"q": "Atomic radius increases going:", "a": ["Up and right", "Down and left", "Up and left", "Down and right"], "c": 1}, {"q": "Atomic radius decreases going:", "a": ["Down", "Left", "Left to right across a period", "Down left", "Upper right (halogens)", "Lower right", "Upper left"], "c": 1}, {"q": "Electronegativity is measured on the ___ scale:", "a": ["Kelvin", "Pauling", "Celsius", "Richter"], "c": 1}, {"q": "Period 2 has elements from:", "a": ["H to He", "Li to Ne", "Na to Ar", "K to Kr"], "c": 1}, {"q": "Period 3 has elements from:", "a": ["H to He", "Li to Ne", "Na to Ar", "K to Kr"], "c": 2}, {"q": "Lanthanides are in period:", "a": ["4", "5", "6", "7"], "c": 2}, {"q": "Actinides are in period:", "a": ["5", "6", "7", "8"], "c": 2}, {"q": "Transition metals are in the ___ block:", "a": ["s", "p", "d", "f"], "c": 2}, {"q": "Inner transition metals are in the ___ block:", "a": ["s", "p", "d", "f"], "c": 3}, {"q": "Main group elements are in the ___ blocks:", "a": ["d and f", "s and p", "Only d", "Only f"], "c": 1}, {"q": "The diagonal relationship: Li resembles ___ more than Na:", "a": ["K", "Mg (diagonal neighbor)", "Ca", "Fr"], "c": 1}, {"q": "Amphoteric elements/compounds can act as:", "a": ["Only acid", "Only base", "Both acid and base", "Neither"], "c": 2}, {"q": "Al₂O₃ is amphoteric — it reacts with both:", "a": ["Water and air", "Acids and bases", "Only acids", "Only bases"], "c": 1}, {"q": "Successive ionization energies always:", "a": ["Decrease", "Increase", "Stay same", "Alternate"], "c": 1}, {"q": "Electron shielding is less effective from electrons in the:", "a": ["Inner shells", "Same shell", "Nucleus", "Different atom"], "c": 1}, {"q": "Slater's rules help calculate:", "a": ["Mass", "Effective nuclear charge (Zeff)", "Volume", "Temperature"], "c": 1}, {"q": "Atomic radius is typically measured in:", "a": ["Meters", "Picometers (pm) or angstroms (Å)", "Kilometers", "Centimeters"], "c": 1}, {"q": "1 Å = ___ pm:", "a": ["1", "10", "100", "1,000"], "c": 2}, {"q": "Covalent radius: half the distance between nuclei of:", "a": ["Ionic compound", "Two bonded identical atoms", "Any two atoms", "Only metals"], "c": 1}, {"q": "Ionic radius: size of an:", "a": ["Neutral atom", "Ion", "Nucleus", "Electron"], "c": 1}, {"q": "Van der Waals radius: half the distance between:", "a": ["Bonded atoms", "Non-bonded atoms in contact", "Nucleus and electron", "Proton and neutron"], "c": 1}, {"q": "Across period 3 (Na to Ar), atomic radius goes from ~186 to ~71 pm:", "a": ["Increasing", "Decreasing (true — Zeff pulls in)", "Constant", "Random"], "c": 1}, {"q": "Down group 1 (Li to Fr), atomic radius goes from ~152 to ~265 pm:", "a": ["Decreasing", "Increasing (more shells)", "Constant", "Random"], "c": 1}, {"q": "The octet rule exceptions include:", "a": ["Only H", "H (duet), Be/B (incomplete), P/S/Xe (expanded)", "No exceptions", "Only noble gases"], "c": 1}, {"q": "Elements in period 3+ can have expanded octets because:", "a": ["They're magic", "They have available d orbitals", "They're small", "They have no electrons"], "c": 1}, {"q": "SF₆ has ___ bonds to S (expanded octet):", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "Boron often has only ___ electrons in compounds (incomplete octet):", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "BF₃ has ___ electrons around B:", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "Beryllium in BeCl₂ has only ___ electrons:", "a": ["2", "4", "6", "8"], "c": 1}, {"q": "The periodic law: properties of elements are periodic functions of:", "a": ["Mass", "Atomic number", "Neutron count", "Electron mass"], "c": 1}, {"q": "Mendeleev predicted properties of undiscovered elements using:", "a": ["Magic", "Periodic trends and gaps in his table", "Random guess", "Only mass"], "c": 1}, {"q": "Germanium was predicted by Mendeleev as:", "a": ["Eka-silicon", "Eka-boron", "Eka-aluminum", "Eka-carbon"], "c": 0}, {"q": "Gallium was predicted as:", "a": ["Eka-silicon", "Eka-aluminum", "Eka-boron", "Eka-carbon"], "c": 1}, {"q": "Scandium was predicted as:", "a": ["Eka-aluminum", "Eka-boron", "Eka-silicon", "Eka-carbon"], "c": 1}, {"q": "Modern periodic table is arranged by ___ (not mass as Mendeleev used):", "a": ["Mass", "Atomic number", "Density", "Volume"], "c": 1}, {"q": "Henry Moseley established atomic number using:", "a": ["Mass spectrometry", "X-ray spectroscopy", "Visible light", "Sound waves"], "c": 1}, {"q": "The s sublevel can hold max ___ electrons:", "a": ["1", "2", "6", "10"], "c": 1}, {"q": "The p sublevel can hold max ___ electrons:", "a": ["2", "6", "10", "14"], "c": 1}, {"q": "The d sublevel can hold max ___ electrons:", "a": ["2", "6", "10", "14"], "c": 2}, {"q": "The f sublevel can hold max ___ electrons:", "a": ["2", "6", "10", "14"], "c": 3}, {"q": "Total electrons in shell n: 2n². For n=4:", "a": ["8", "18", "32", "50"], "c": 2}, {"q": "Chem review Q1: The mole is central to:", "a": ["Only physics", "All stoichiometry calculations", "Only biology", "Only geology"], "c": 1}, {"q": "Chem review Q2: Balanced equations conserve:", "a": ["Only mass", "Mass and charge", "Only energy", "Only volume"], "c": 1}, {"q": "Chem review Q3: Molar mass has units:", "a": ["g", "g/mol", "mol/g", "kg"], "c": 1}, {"q": "Chem review Q4: Avogadro's number:", "a": ["6.02×10²³", "3.14×10⁸", "1.66×10⁻²⁴", "9.81"], "c": 0}, {"q": "Chem review Q5: SI unit of energy:", "a": ["Calorie", "Joule", "Watt", "Newton"], "c": 1}]}, {"id": "chem-ch7", "title": "Chapter 7: Chemical Bonding & Molecular Geometry (I)", "ln": "CHEM 260 · Ch 7", "notes": [{"heading": "Bonding Theories — Why They Matter", "body": "Bonding theories explain: <b>how and why atoms attach</b> to form molecules, and why some combinations are stable while others aren't. Example: Why is water H₂O, not HO or H₃O? They also <b>predict</b> molecular shapes and chemical/physical properties — critical for things like targeted drug design."}, {"heading": "Ionic Bonding", "body": "<b>Ionic compounds:</b> composed of ions held together by <b>ionic bonds</b> — electrostatic forces of attraction between <b>oppositely charged cations and anions</b>. Formed between a <b>metal</b> (forms cation) and a <b>nonmetal</b> (forms anion). Example: 2Na + Cl₂ → 2NaCl. Ionic bonds are normally <b>strong</b>."}, {"heading": "Covalent Bonding", "body": "<b>Covalent bonds:</b> result from the <b>mutual attraction of atoms for shared electron pairs</b>. Formed normally between <b>nonmetals</b>. Example: H₂ formation — two H atoms share their electrons. Bond length occurs at the <b>lowest potential energy</b>. Breaking covalent bonds <b>requires energy</b>."}, {"heading": "Pure (Nonpolar) Covalent Bonds", "body": "Atoms forming the bond are <b>identical</b> → electrons shared <b>equally</b>. No partial charges. ΔEN = 0. Examples: H₂, Cl₂, N₂, O₂. The electron density is perfectly symmetric between the two nuclei."}, {"heading": "Polar Covalent Bonds", "body": "Atoms are <b>different</b> → electrons shared <b>unequally</b>. The more electronegative atom pulls electron density toward itself → <b>partial charges</b>: δ+ on less electronegative, δ− on more electronegative atom. Examples: HCl, HF, CO. ΔEN between ~0.4 and ~1.8."}, {"heading": "Electronegativity", "body": "A measure of an atom's tendency to <b>attract electrons</b> (or electron density) toward itself in a bond. Determines how shared electrons are distributed. Electrons shift toward the <b>MORE electronegative</b> atom. <b>Increases going right and up</b> the periodic table. F is most electronegative (4.0)."}, {"heading": "Electronegativity vs Electron Affinity", "body": "Don't confuse them! <b>Electronegativity:</b> tendency to attract bonding electrons (in a bond, relative scale, no units). <b>Electron affinity:</b> energy released or absorbed when an isolated gas-phase atom gains an electron (measurable energy in kJ/mol). Different concepts!"}, {"heading": "ΔEN and Bond Type", "body": "The <b>absolute difference in electronegativity (ΔEN)</b> predicts bond type. <b>ΔEN ≈ 0:</b> nonpolar covalent. <b>0.4 < ΔEN < 1.8:</b> polar covalent. <b>ΔEN > 1.8:</b> ionic. It's a continuous spectrum, not sharp boundaries. The larger ΔEN, the more polar the bond."}, {"heading": "Practice Q2: Ranking Bond Polarity", "body": "Bonds in amino acids ranked by increasing polarity (ΔEN): <b>C–H (0.4) < S–H (0.4) < C–N (0.5) < N–H (0.9) < C–O (1.0) < O–H (1.4)</b>. More electronegative atom gets δ−. O–H is the most polar of these common bonds."}, {"heading": "Lewis Symbols", "body": "An <b>element symbol surrounded by dots</b> representing its <b>valence electrons</b>. Example: Na has 1 valence electron → Na with 1 dot. Ca has 2 → Ca with 2 dots. Can represent atoms AND ions. Essential first step to drawing Lewis structures."}, {"heading": "Lewis Symbols Practice Q3", "body": "Write config + Lewis symbol: <b>Na</b> [Ne]3s¹ → 1 dot. <b>Mg</b> [Ne]3s² → 2 dots. <b>Al</b> [Ne]3s²3p¹ → 3 dots. <b>Si</b> → 4 dots. <b>P</b> → 5 dots. <b>S</b> → 6 dots. <b>Cl</b> → 7 dots. <b>Ar</b> → 8 dots. Dots = valence electrons = group number (for main group)."}, {"heading": "Lewis Structures — What They Are", "body": "Diagrams showing <b>bonding pairs</b> (as dashes —) and <b>lone pairs</b> (as dot pairs) in molecules or polyatomic ions. Bonding pair: shared between two atoms. Lone pair: belongs to one atom, not shared. These show how atoms are connected and where electrons are."}, {"heading": "The Octet Rule", "body": "Main group atoms tend to form enough bonds to obtain <b>8 valence electrons</b> (noble gas configuration). H is satisfied with <b>2</b> (duet rule). This is the driving force for bond formation — atoms want stability through full outer shells."}, {"heading": "Drawing Lewis Structures — Steps", "body": "<b>1)</b> Count total valence electrons (add for anions, subtract for cations). <b>2)</b> Draw skeleton with central atom (least electronegative, NEVER H). <b>3)</b> Distribute remaining electrons as lone pairs to give outer atoms octets. <b>4)</b> Place leftover electrons on central atom. <b>5)</b> If central atom lacks octet, form multiple bonds by converting lone pairs."}, {"heading": "Step-by-Step: SiH₄", "body": "<b>Step 1:</b> Valence e⁻ = Si(4) + 4×H(1) = 8. <b>Step 2:</b> Si is central (less EN than H? Actually H is NEVER central). <b>Step 3:</b> 4 bonds use all 8 electrons. <b>Step 4:</b> No remaining electrons. Si has octet (4 bonds = 8 e⁻), each H has duet. Done! H—Si—H with 4 single bonds, no lone pairs."}, {"heading": "Practice Q4: NH₃", "body": "Valence e⁻ = N(5) + 3×H(1) = 8. N is central. Three N—H bonds use 6 e⁻. Remaining 2 e⁻ → lone pair on N. <b>Structure:</b> N with 3 bonding pairs and 1 lone pair. N has octet (3 bonds + 1 lone pair = 8 e⁻). Each H has duet. ✓"}, {"heading": "Practice Q4: HCN", "body": "Valence e⁻ = H(1) + C(4) + N(5) = 10. C is central (least EN, H never central). H—C—N skeleton. Single bonds use 4 e⁻; 6 remain. Put lone pair on N → N has 4 e⁻ from bond + 2 = 6 (not 8). C has 4. Need multiple bonds → make <b>triple bond</b>: H—C≡N. C gets 8, N gets 8. ✓"}, {"heading": "Choosing the Central Atom", "body": "The <b>least electronegative</b> atom goes in the center (it shares electrons most readily). <b>H is NEVER central</b> (it can only form 1 bond). For same element appearing multiple times, the unique atom is usually central. C is almost always central in organic molecules."}, {"heading": "Multiple Bonds", "body": "If after distributing lone pairs the central atom doesn't have an octet → convert a lone pair from an adjacent atom into a <b>bonding pair</b>. <b>Double bond:</b> 2 shared pairs (4 e⁻). <b>Triple bond:</b> 3 shared pairs (6 e⁻). Multiple bonds are shorter and stronger than single bonds."}, {"heading": "Exception 1: Odd-Electron Molecules (Free Radicals)", "body": "Molecules with an <b>odd number of total electrons</b> → impossible for all atoms to have octets. One atom will have 7 e⁻. Example: <b>NO</b> (11 valence e⁻). The unpaired electron goes on <b>N</b> (less electronegative → better able to handle the deficiency). Free radicals are very reactive."}, {"heading": "Why Unpaired e⁻ on N in NO?", "body": "N is <b>less electronegative</b> than O, so it's better for N to be electron-deficient than O. The more electronegative atom (O) gets its full octet preferentially. This is a general rule for odd-electron species."}, {"heading": "Exception 2: Electron-Deficient Molecules", "body": "Central atoms from <b>Groups 2 and 13</b> (Be, B) often have <b>fewer than 8 electrons</b>. <b>BeH₂:</b> Be has only 4 e⁻ (2 bonds, no lone pairs). <b>BF₃:</b> B has only 6 e⁻ (3 bonds, no lone pairs). These molecules are very <b>reactive</b> — they seek electrons from other molecules (Lewis acids)."}, {"heading": "Exception 3: Hypervalent Molecules", "body": "Elements in <b>period 3 and higher</b> (n ≥ 3) can accommodate <b>more than 8 electrons</b> because they have available d orbitals. Examples: <b>PCl₅</b> (P has 10 e⁻, 5 bonds). <b>SF₆</b> (S has 12 e⁻, 6 bonds). Only possible for central atoms in period 3+, never for C, N, O, F."}, {"heading": "Summary of Octet Exceptions", "body": "<b>1) Odd-electron:</b> radicals with unpaired e⁻ (NO, NO₂). <b>2) Electron-deficient:</b> < 8 e⁻ on central atom (BF₃ = 6, BeH₂ = 4). <b>3) Hypervalent:</b> > 8 e⁻ on central atom (PCl₅ = 10, SF₆ = 12). Know examples for each!"}, {"heading": "Key Concepts Summary", "body": "<b>Ionic:</b> metal+nonmetal, electron transfer. <b>Covalent:</b> nonmetal+nonmetal, electron sharing. <b>Nonpolar:</b> ΔEN≈0. <b>Polar:</b> 0.4<ΔEN<1.8. <b>Ionic:</b> ΔEN>1.8. <b>EN increases:</b> up+right. <b>Lewis steps:</b> count e⁻, skeleton, distribute, check octets. <b>Exceptions:</b> odd-e⁻, deficient, hypervalent."}], "quiz": [{"q": "Ionic bonds form between:", "a": ["Two nonmetals", "Two metals", "Metal + nonmetal", "Noble gases"], "c": 2}, {"q": "Covalent bonds involve:", "a": ["Electron transfer", "Sharing electrons", "Losing protons", "Gaining neutrons"], "c": 1}, {"q": "Pure covalent bonds: electrons shared:", "a": ["Unequally", "Equally", "Not at all", "By one atom only"], "c": 1}, {"q": "Polar covalent: electrons shifted toward:", "a": ["Less EN atom", "More EN atom", "Neither
