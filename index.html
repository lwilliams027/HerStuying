e dilution", "Successive dilutions of a solution", "Concentration increase", "Evaporation"], "c": 1}, {"q": "ppb stands for parts per:", "a": ["Percent", "Million", "Billion", "Thousand"], "c": 2}, {"q": "1 ppb = 1 μg per:", "a": ["Gram", "Kilogram (or 1 μg/L)", "Milligram", "Metric ton"], "c": 1}, {"q": "Electrolytes in solution:", "a": ["Don't conduct", "Conduct electricity (form ions)", "Only in solid form", "Never dissolve"], "c": 1}, {"q": "Strong electrolytes ___ dissociate in water:", "a": ["Partially", "Completely (100%)", "Never", "Rarely"], "c": 1}, {"q": "Weak electrolytes ___ dissociate:", "a": ["Completely", "Partially", "Never", "100%"], "c": 1}, {"q": "Non-electrolytes:", "a": ["Fully ionize", "Do not form ions in solution", "Always conduct", "Are always metals"], "c": 1}, {"q": "NaCl in water is a ___ electrolyte:", "a": ["Weak", "Strong", "Non", "Variable"], "c": 1}, {"q": "Sugar (glucose) in water is a:", "a": ["Strong electrolyte", "Weak electrolyte", "Non-electrolyte", "Acid"], "c": 2}, {"q": "Acetic acid (vinegar) is a ___ electrolyte:", "a": ["Strong", "Weak (partially ionizes)", "Non", "Complete"], "c": 1}, {"q": "Saturated solution: ___ can dissolve at that temperature:", "a": ["More solute", "No more solute", "Unlimited solute", "Only gas"], "c": 1}, {"q": "Unsaturated solution: ___ solute can still dissolve:", "a": ["No more", "More", "Only solid", "Only gas"], "c": 1}, {"q": "Supersaturated solution has ___ solute than normally possible:", "a": ["Less", "More (unstable — excess crystallizes out)", "Same", "None"], "c": 1}, {"q": "Solubility generally ___ with temperature for solids:", "a": ["Decreases", "Increases", "Stays same", "Varies randomly"], "c": 1}, {"q": "Solubility of gases ___ with temperature:", "a": ["Increases", "Decreases", "Stays same", "Doubles"], "c": 1}, {"q": "Solubility of gases ___ with pressure:", "a": ["Decreases", "Increases (Henry's law)", "Stays same", "Halves"], "c": 1}, {"q": "Henry's law: gas solubility is proportional to:", "a": ["Temperature", "Partial pressure of that gas", "Volume", "Color"], "c": 1}, {"q": "Like dissolves like means:", "a": ["Everything dissolves everything", "Polar dissolves polar; nonpolar dissolves nonpolar", "Only water dissolves things", "Only acids dissolve things"], "c": 1}, {"q": "Water is the universal solvent because it's:", "a": ["Nonpolar", "Polar (dissolves many ionic and polar substances)", "Neutral", "Heavy"], "c": 1}, {"q": "Immiscible liquids:", "a": ["Mix completely", "Do NOT mix (form layers)", "Are identical", "Always solid"], "c": 1}, {"q": "Miscible liquids:", "a": ["Form layers", "Mix completely in all proportions", "Never mix", "Are always water"], "c": 1}, {"q": "Oil and water are:", "a": ["Miscible", "Immiscible", "The same", "Both polar"], "c": 1}, {"q": "Ethanol and water are:", "a": ["Immiscible", "Miscible", "Reactive", "Incompatible"], "c": 1}, {"q": "Colligative properties depend on the ___ of solute particles:", "a": ["Type", "Number (concentration)", "Color", "Mass"], "c": 1}, {"q": "Boiling point elevation: adding solute ___ boiling point:", "a": ["Lowers", "Raises", "Doesn't change", "Eliminates"], "c": 1}, {"q": "Freezing point depression: adding solute ___ freezing point:", "a": ["Raises", "Lowers", "Doesn't change", "Eliminates"], "c": 1}, {"q": "Road salt lowers the freezing point of water — this is:", "a": ["Boiling point elevation", "Freezing point depression", "Osmosis", "Evaporation"], "c": 1}, {"q": "Adding antifreeze to a car radiator ___ the boiling point:", "a": ["Lowers", "Raises", "Doesn't change", "Eliminates"], "c": 1}, {"q": "Osmotic pressure drives water across a:", "a": ["Metal sheet", "Semipermeable membrane", "Vacuum", "Wire"], "c": 1}, {"q": "Vapor pressure lowering: adding nonvolatile solute ___ vapor pressure:", "a": ["Increases", "Decreases", "Doesn't change", "Doubles"], "c": 1}, {"q": "Colligative properties depend on particle ___, not identity:", "a": ["Mass", "Number/concentration", "Color", "Size"], "c": 1}, {"q": "NaCl dissociates into ___ particles per formula unit:", "a": ["1", "2 (Na⁺ + Cl⁻)", "3", "4"], "c": 1}, {"q": "CaCl₂ dissociates into ___ particles:", "a": ["1", "2", "3 (Ca²⁺ + 2Cl⁻)", "4"], "c": 2}, {"q": "The van 't Hoff factor (i) for NaCl is:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "The van 't Hoff factor for glucose (doesn't dissociate) is:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "The van 't Hoff factor for CaCl₂ is:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "ΔTb = i × Kb × m. Kb is the:", "a": ["Freezing constant", "Boiling point elevation constant", "Gas constant", "Rate constant"], "c": 1}, {"q": "ΔTf = i × Kf × m. Kf is the:", "a": ["Boiling constant", "Freezing point depression constant", "Gas constant", "Equilibrium constant"], "c": 1}, {"q": "For water, Kb =:", "a": ["0.512 °C/m", "1.86 °C/m", "100 °C", "0 °C"], "c": 0}, {"q": "For water, Kf =:", "a": ["0.512 °C/m", "1.86 °C/m", "100 °C", "0 °C"], "c": 1}, {"q": "Raoult's law: vapor pressure of solution = mole fraction × pure solvent vapor pressure:", "a": ["P = χ × P°", "PV=nRT", "M₁V₁=M₂V₂", "ΔG=ΔH−TΔS"], "c": 0}, {"q": "Molality is preferred over molarity for colligative properties because:", "a": ["It's bigger", "It doesn't change with temperature (uses mass, not volume)", "It's easier", "It's always 1"], "c": 1}, {"q": "A solution with higher solute concentration has ___ osmotic pressure:", "a": ["Lower", "Higher", "Same", "No"], "c": 1}, {"q": "Reverse osmosis forces water through a membrane against osmotic pressure using:", "a": ["Nothing", "Applied pressure greater than osmotic pressure", "Heat", "Light"], "c": 1}, {"q": "Reverse osmosis is used for:", "a": ["Only chemistry labs", "Water purification/desalination", "Only cooking", "Only swimming pools"], "c": 1}, {"q": "An isotonic IV solution has ___ osmotic pressure as blood:", "a": ["Higher", "Lower", "The same", "No"], "c": 2}, {"q": "Hypertonic solutions cause cells to:", "a": ["Swell", "Shrink (water leaves)", "Stay same", "Divide"], "c": 1}, {"q": "Hypotonic solutions cause cells to:", "a": ["Shrink", "Swell (water enters)", "Stay same", "Die immediately"], "c": 1}, {"q": "Dissolving is a process where solute particles are:", "a": ["Destroyed", "Surrounded by solvent molecules (solvation)", "Frozen", "Melted"], "c": 1}, {"q": "Hydration is solvation specifically by:", "a": ["Any solvent", "Water", "Ethanol", "Acetone"], "c": 1}, {"q": "When ionic compounds dissolve, ions are:", "a": ["Destroyed", "Separated and surrounded by water (dissociation)", "Unchanged", "Fused"], "c": 1}, {"q": "Enthalpy of solution (ΔHsoln) can be:", "a": ["Only positive", "Only negative", "Positive (endothermic) or negative (exothermic)", "Always zero"], "c": 2}, {"q": "If ΔHsoln is negative, dissolving:", "a": ["Absorbs heat", "Releases heat (exothermic — solution warms)", "Has no thermal effect", "Freezes"], "c": 1}, {"q": "If ΔHsoln is positive, dissolving:", "a": ["Releases heat", "Absorbs heat (endothermic — solution cools)", "Has no thermal effect", "Evaporates"], "c": 1}, {"q": "A hot pack uses an ___ dissolving reaction:", "a": ["Endothermic", "Exothermic", "Neither", "Both"], "c": 1}, {"q": "A cold pack uses an ___ dissolving reaction:", "a": ["Exothermic", "Endothermic", "Neither", "Both"], "c": 1}, {"q": "Ammonium nitrate in cold packs dissolves ___:", "a": ["Exothermically", "Endothermically (absorbs heat)", "With no change", "Only in hot water"], "c": 1}, {"q": "Solubility curves show how solubility changes with:", "a": ["Pressure", "Temperature", "Color", "pH"], "c": 1}, {"q": "Points above a solubility curve represent ___ solutions:", "a": ["Unsaturated", "Supersaturated", "Saturated", "Dilute"], "c": 1}, {"q": "Points below a solubility curve represent ___ solutions:", "a": ["Supersaturated", "Saturated", "Unsaturated", "Concentrated"], "c": 2}, {"q": "Points on the curve represent ___ solutions:", "a": ["Unsaturated", "Supersaturated", "Saturated (at equilibrium)", "Empty"], "c": 2}, {"q": "The dissolution of NaCl: NaCl(s) → Na⁺(aq) + Cl⁻(aq). The (aq) means:", "a": ["Solid", "Aqueous (dissolved in water)", "Gas", "Liquid"], "c": 1}, {"q": "Tincture is a solution with ___ as solvent:", "a": ["Water", "Alcohol", "Oil", "Acid"], "c": 1}, {"q": "Amalgam is a solution of metals with:", "a": ["Water", "Mercury", "Oil", "Acid"], "c": 1}, {"q": "Alloys are ___ solutions:", "a": ["Liquid", "Solid (metal in metal)", "Gas", "Only liquid"], "c": 1}, {"q": "Air is a ___ solution:", "a": ["Liquid", "Solid", "Gas (N₂, O₂, Ar, etc.)", "Plasma"], "c": 2}, {"q": "Brass is an alloy of:", "a": ["Iron and carbon", "Copper and zinc", "Copper and tin", "Gold and silver"], "c": 1}, {"q": "The solubility of most salts ___ with temperature:", "a": ["Decreases", "Increases", "Stays constant", "Varies randomly"], "c": 1}, {"q": "The solubility of gases in water ___ with temperature:", "a": ["Increases", "Decreases", "Stays constant", "Doubles"], "c": 1}, {"q": "Carbonated drinks go flat when opened because:", "a": ["Temperature drops", "Pressure drops → CO₂ escapes (Henry's law)", "Sugar dissolves", "Nothing happens"], "c": 1}, {"q": "Deep sea divers get 'the bends' because:", "a": ["Cold water", "N₂ dissolved at high pressure comes out of solution as bubbles when ascending", "O₂ toxicity", "CO₂ poisoning"], "c": 1}, {"q": "Formula for dilution: moles before = moles after, so:", "a": ["M₁V₁ = M₂V₂", "PV = nRT", "E = mc²", "ΔG = ΔH − TΔS"], "c": 0}, {"q": "If 50 mL of 12 M HCl is diluted to 600 mL, M₂ =:", "a": ["0.5 M", "1.0 M", "2.0 M", "6.0 M"], "c": 1}, {"q": "Titration determines concentration by reacting with a:", "a": ["Random solution", "Standard solution of known concentration", "Pure water", "Only acid"], "c": 1}, {"q": "At the equivalence point of a titration:", "a": ["Nothing happens", "Moles of acid = moles of base", "Only color changes", "Reaction hasn't started"], "c": 1}, {"q": "An indicator changes color at or near the:", "a": ["Start", "Equivalence/endpoint", "Middle", "Never"], "c": 1}]}, {"id": "chem-ch4", "title": "Chapter 4: Stoichiometry of Chemical Reactions", "ln": "CHEM 260 · Ch 4", "notes": [{"heading": "Learning Objectives", "body": "By the end of Ch 4: <b>1)</b> Write and balance chemical equations. <b>2)</b> Classify common types of chemical reactions. <b>3)</b> Perform stoichiometric calculations. <b>4)</b> Calculate theoretical and percent yields."}, {"heading": "Chemical Reactions", "body": "Reactions involve <b>chemical changes</b> resulting in new substances. Atoms <b>rearrange</b> to produce new molecules. Chemical equations are shorthand descriptions providing: formulas of reactants/products, states, relative numbers of molecules, and info to determine masses consumed/produced."}, {"heading": "Chemical Equation Format", "body": "<b>Reactants → Products</b>. Example: CH₄(g) + O₂(g) → CO₂(g) + 2H₂O(g). Equations show formulas, coefficients (how many), and state symbols: <b>(s)</b> solid, <b>(l)</b> liquid, <b>(g)</b> gas, <b>(aq)</b> aqueous (dissolved in water)."}, {"heading": "Balancing Equations — Why", "body": "'Balanced' means <b>equal numbers of atoms</b> for each element on both sides. Required by the <b>Law of Conservation of Mass</b> — atoms are neither created nor destroyed. We adjust <b>coefficients</b> (numbers in front), NEVER subscripts (changing subscripts changes the substance!)."}, {"heading": "Balancing — How", "body": "<b>Step 1:</b> Write unbalanced equation. <b>Step 2:</b> Count atoms of each element on both sides. <b>Step 3:</b> Add coefficients to balance one element at a time. <b>Step 4:</b> Check ALL elements. <b>Step 5:</b> Add state symbols. Tip: save O and H for last; start with unique elements."}, {"heading": "Balancing Example: Methane", "body": "CH₄ + O₂ → CO₂ + H₂O (unbalanced). C: 1=1 ✓. H: 4≠2 → put 2 in front of H₂O. O: 2≠(2+2)=4 → put 2 in front of O₂. Final: <b>CH₄(g) + 2O₂(g) → CO₂(g) + 2H₂O(g)</b>. Check: C:1=1, H:4=4, O:4=4 ✓."}, {"heading": "Practice: Ethane Combustion", "body": "C₂H₆ + O₂ → CO₂ + H₂O. C: need 2 CO₂. H: need 3 H₂O. O: products have 2(2)+3(1)=7 O atoms → need 7/2 O₂. Multiply all by 2: <b>2C₂H₆(g) + 7O₂(g) → 4CO₂(g) + 6H₂O(g)</b>. Always verify every element balances."}, {"heading": "Equations for Ionic Reactions", "body": "Many reactions occur in <b>aqueous media</b> involving ions. Three levels of detail: <b>Molecular equation:</b> shows complete formulas. <b>Complete ionic equation:</b> shows all dissolved substances as individual ions. <b>Net ionic equation:</b> shows only the species that actually change."}, {"heading": "Molecular Equation Example", "body": "CaCl₂(aq) + 2AgNO₃(aq) → Ca(NO₃)₂(aq) + 2AgCl(s). Written with regular complete formulas. Does NOT explicitly show the ions present in solution. AgCl is solid (precipitate) — it does NOT dissociate."}, {"heading": "Complete Ionic Equation", "body": "Break all aqueous compounds into ions: Ca²⁺(aq) + 2Cl⁻(aq) + 2Ag⁺(aq) + 2NO₃⁻(aq) → Ca²⁺(aq) + 2NO₃⁻(aq) + 2AgCl(s). Solids, liquids, and gases stay as complete formulas. Only (aq) compounds split into ions."}, {"heading": "Net Ionic Equation", "body": "Remove <b>spectator ions</b> (appear unchanged on both sides). Ca²⁺ and NO₃⁻ are spectators. What remains: <b>Cl⁻(aq) + Ag⁺(aq) → AgCl(s)</b>. Use smallest whole-number coefficients. This shows ONLY what actually reacts."}, {"heading": "Spectator Ions", "body": "Ions that are present to maintain charge neutrality but are <b>neither chemically nor physically changed</b>. They appear on BOTH sides of the complete ionic equation. Identified by canceling identical ions from each side."}, {"heading": "Three Reaction Types", "body": "The three main types to remember: <b>1) Precipitation</b> — solid forms from mixing solutions. <b>2) Acid-Base</b> — H⁺ transfer. <b>3) Oxidation-Reduction (redox)</b> — electron transfer. Many reactions fall into one of these categories."}, {"heading": "Precipitation Reactions", "body": "A <b>solid (precipitate)</b> forms when two aqueous solutions are mixed. The precipitate is an ionic compound that is <b>insoluble</b> in water. Use solubility rules (Table 4.1) to predict which products precipitate. Example: AgCl, BaSO₄, PbI₂ are common precipitates."}, {"heading": "Acid-Base Reactions", "body": "A <b>hydrogen ion (H⁺)</b> is transferred from one species to another. <b>Acid:</b> produces H₃O⁺ (hydronium) in water. <b>Base:</b> produces OH⁻ (hydroxide) in water. HCl(aq) + H₂O → Cl⁻(aq) + H₃O⁺(aq)."}, {"heading": "Strong vs Weak Acids", "body": "<b>Strong acids:</b> H⁺ <b>completely</b> transfers to water → 100% dissociation. Examples: <b>HCl, HBr, HI, HNO₃, H₂SO₄, HClO₄</b> — memorize these! <b>Weak acids:</b> H⁺ <b>partially</b> transfers → equilibrium. Example: CH₃COOH (acetic acid). Most acids are weak."}, {"heading": "Bases", "body": "Substance that produces <b>OH⁻</b> in water. <b>Strong bases:</b> completely dissociate — mostly Group I/II metal hydroxides. NaOH → Na⁺ + OH⁻. <b>Common strong bases:</b> NaOH, KOH, Ca(OH)₂, Ba(OH)₂. <b>Weak bases:</b> partially produce OH⁻ by reacting with water. Example: NH₃ + H₂O ⇌ NH₄⁺ + OH⁻."}, {"heading": "Neutralization Reactions", "body": "A specific acid-base reaction: <b>Acid + Base → Salt + Water</b>. The salt is an ionic compound formed from the cation of the base and anion of the acid. Example: Mg(OH)₂(s) + 2HCl(aq) → MgCl₂(aq) + 2H₂O(l). MgCl₂ is the salt."}, {"heading": "Oxidation-Reduction (Redox)", "body": "Reactions where <b>electrons are transferred</b> from one reactant to another. Many (not all) involve oxygen. Examples: 2Na(s) + Cl₂(g) → 2NaCl(s). 2H₂(g) + O₂(g) → 2H₂O(g). Combustion reactions are always redox."}, {"heading": "Half-Reactions", "body": "The overall redox reaction can be split into two <b>half-reactions</b>. Example for 2Na + Cl₂ → 2NaCl: <b>Oxidation half:</b> 2Na → 2Na⁺ + 2e⁻ (Na loses electrons). <b>Reduction half:</b> Cl₂ + 2e⁻ → 2Cl⁻ (Cl gains electrons). Electrons lost = electrons gained."}, {"heading": "Oxidation and Reduction Defined", "body": "<b>Oxidation = LOSS of electrons</b> (oxidation number increases). <b>Reduction = GAIN of electrons</b> (oxidation number decreases). Memory aid: <b>OIL RIG</b> — Oxidation Is Loss, Reduction Is Gain. Or <b>LEO the lion says GER</b> — Lose Electrons Oxidation, Gain Electrons Reduction."}, {"heading": "Oxidizing and Reducing Agents", "body": "<b>Reducing agent:</b> the species that IS oxidized (it reduces others by giving them electrons). <b>Oxidizing agent:</b> the species that IS reduced (it oxidizes others by taking their electrons). In 2Na + Cl₂ → 2NaCl: Na is the reducing agent (oxidized), Cl₂ is the oxidizing agent (reduced)."}, {"heading": "Oxidation Numbers (States)", "body": "The charge an atom WOULD have if the compound were ionic. Rules: element = 0. Monatomic ion = charge. H = +1 (with nonmetals), −1 (with metals). O = −2 (usually). F = always −1. Sum = 0 for molecule, charge for ion. Oxidation = increase in ox #. Reduction = decrease."}, {"heading": "Identifying Redox Reactions", "body": "If <b>any element changes oxidation number</b> from reactants to products, it's a redox reaction. Track oxidation numbers for each element. If none change → NOT redox (could be precipitation or acid-base instead)."}, {"heading": "Key Equations & Definitions", "body": "<b>Balanced equation:</b> equal atoms each side, use coefficients. <b>Net ionic:</b> remove spectators. <b>Neutralization:</b> acid + base → salt + water. <b>OIL RIG:</b> Oxidation Is Loss, Reduction Is Gain. <b>Strong acids (6):</b> HCl, HBr, HI, HNO₃, H₂SO₄, HClO₄. <b>Strong bases:</b> Group I/II hydroxides."}], "quiz": [{"q": "When balancing, adjust:", "a": ["Subscripts", "Coefficients", "Atomic numbers", "State symbols"], "c": 1}, {"q": "Why can't you change subscripts?", "a": ["It's illegal", "It changes the substance", "It's too hard", "No reason"], "c": 1}, {"q": "Balanced equation obeys:", "a": ["Law of Gravity", "Law of Conservation of Mass", "Hess's Law", "Avogadro's Law"], "c": 1}, {"q": "CH₄ + 2O₂ → CO₂ + 2H₂O has ___ O atoms each side:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "(aq) means:", "a": ["Solid", "Liquid", "Gas", "Dissolved in water"], "c": 3}, {"q": "(s) means:", "a": ["Solution", "Solid", "Sublimate", "Solvent"], "c": 1}, {"q": "Molecular equation shows:", "a": ["All ions", "Complete formulas", "Only net reaction", "Only precipitates"], "c": 1}, {"q": "Complete ionic equation shows:", "a": ["Complete formulas only", "All dissolved substances as ions", "Only net ions", "Only solids"], "c": 1}, {"q": "Net ionic equation removes:", "a": ["All ions", "Spectator ions", "Products", "Reactants"], "c": 1}, {"q": "Spectator ions are:", "a": ["Changed in reaction", "Unchanged on both sides", "Only in products", "Only in reactants"], "c": 1}, {"q": "AgCl is a common:", "a": ["Acid", "Base", "Precipitate", "Gas"], "c": 2}, {"q": "Precipitate is a(n) ___ product:", "a": ["Aqueous", "Gaseous", "Insoluble solid", "Liquid"], "c": 2}, {"q": "Three main reaction types:", "a": ["Synthesis/decomposition/combustion", "Precipitation/acid-base/redox", "Exo/endo/neutral", "Fast/slow/equilibrium"], "c": 1}, {"q": "Acids produce ___ in water:", "a": ["OH⁻", "H₃O⁺", "Na⁺", "Cl⁻"], "c": 1}, {"q": "Bases produce ___ in water:", "a": ["H₃O⁺", "OH⁻", "H₂", "O₂"], "c": 1}, {"q": "Strong acids dissociate:", "a": ["Partially", "Completely", "Never", "Only when heated"], "c": 1}, {"q": "Which is a strong acid?", "a": ["CH₃COOH", "HF", "HCl", "H₂CO₃"], "c": 2}, {"q": "Which is a strong acid?", "a": ["HNO₃", "CH₃COOH", "HCN", "H₃PO₄"], "c": 0}, {"q": "Most acids are:", "a": ["Strong", "Weak", "Neutral", "Basic"], "c": 1}, {"q": "NaOH is a:", "a": ["Weak acid", "Strong acid", "Weak base", "Strong base"], "c": 3}, {"q": "NH₃ is a:", "a": ["Strong acid", "Weak acid", "Strong base", "Weak base"], "c": 3}, {"q": "Neutralization: acid + base →:", "a": ["Only water", "Only salt", "Salt + water", "Gas"], "c": 2}, {"q": "Mg(OH)₂ + 2HCl → MgCl₂ + 2H₂O — MgCl₂ is the:", "a": ["Acid", "Base", "Salt", "Water"], "c": 2}, {"q": "Redox reactions involve transfer of:", "a": ["Protons", "Neutrons", "Electrons", "Atoms"], "c": 2}, {"q": "Oxidation means:", "a": ["Gain of electrons", "Loss of electrons", "Gain of protons", "No change"], "c": 1}, {"q": "Reduction means:", "a": ["Loss of electrons", "Gain of electrons", "Loss of protons", "No change"], "c": 1}, {"q": "OIL RIG stands for:", "a": ["Oxygen Is Light, Reduction Is Good", "Oxidation Is Loss, Reduction Is Gain", "Only Ionic Lattices", "None"], "c": 1}, {"q": "In 2Na + Cl₂ → 2NaCl, Na is:", "a": ["Oxidized", "Reduced", "Unchanged", "A spectator"], "c": 0}, {"q": "In 2Na + Cl₂ → 2NaCl, Cl₂ is:", "a": ["Oxidized", "Reduced", "Unchanged", "A spectator"], "c": 1}, {"q": "The reducing agent is the species that:", "a": ["Is reduced", "Is oxidized", "Gains electrons", "Stays neutral"], "c": 1}, {"q": "The oxidizing agent is the species that:", "a": ["Is oxidized", "Is reduced", "Loses electrons", "Stays neutral"], "c": 1}, {"q": "Na is the ___ agent:", "a": ["Oxidizing", "Reducing", "Neutral", "Spectator"], "c": 1}, {"q": "Cl₂ is the ___ agent:", "a": ["Reducing", "Oxidizing", "Neutral", "Spectator"], "c": 1}, {"q": "Oxidation number of an element in its standard state:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Oxidation number of O in most compounds:", "a": ["0", "−1", "−2", "+2"], "c": 2}, {"q": "Oxidation number of H with nonmetals:", "a": ["−1", "0", "+1", "+2"], "c": 2}, {"q": "F oxidation number is always:", "a": ["0", "−1", "+1", "−2"], "c": 1}, {"q": "Sum of ox #s in a neutral molecule:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Oxidation = ___ in oxidation number:", "a": ["Decrease", "Increase", "No change", "Doubling"], "c": 1}, {"q": "Reduction = ___ in oxidation number:", "a": ["Increase", "Decrease", "No change", "Halving"], "c": 1}, {"q": "Combustion is always a ___ reaction:", "a": ["Acid-base", "Precipitation", "Redox", "Decomposition"], "c": 2}, {"q": "Strong bases are mostly ___ hydroxides:", "a": ["Nonmetal", "Transition metal", "Group I/II", "Noble gas"], "c": 2}, {"q": "H₂SO₄ is a:", "a": ["Weak acid", "Strong acid", "Base", "Salt"], "c": 1}, {"q": "HClO₄ is a:", "a": ["Weak acid", "Strong acid", "Base", "Salt"], "c": 1}, {"q": "HF is a:", "a": ["Strong acid", "Weak acid", "Base", "Salt"], "c": 1}, {"q": "Ca(OH)₂ is a:", "a": ["Weak base", "Strong base", "Acid", "Salt"], "c": 1}, {"q": "In a net ionic equation, only ___ species appear:", "a": ["All", "Spectator", "Reacting", "Dissolved"], "c": 2}, {"q": "2C₂H₆ + 7O₂ → 4CO₂ + 6H₂O — coefficient of O₂:", "a": ["2", "4", "6", "7"], "c": 3}, {"q": "Solubility rules help predict:", "a": ["Acid strength", "Precipitate formation", "Oxidation numbers", "Bond type"], "c": 1}, {"q": "Half-reactions separate oxidation from:", "a": ["Acids", "Bases", "Reduction", "Precipitation"], "c": 2}, {"q": "A balanced equation has equal ___ on both sides:", "a": ["Molecules", "Atoms of each element", "Volume", "Mass only"], "c": 1}, {"q": "Coefficients in balanced equations represent:", "a": ["Atoms", "Mole ratios", "Grams", "Liters"], "c": 1}, {"q": "2H₂ + O₂ → 2H₂O means ___ mol H₂ reacts with ___ mol O₂:", "a": ["1/1", "2/1", "1/2", "2/2"], "c": 1}, {"q": "The law behind balancing equations:", "a": ["Conservation of energy", "Conservation of mass", "Thermodynamics", "Gravity"], "c": 1}, {"q": "In stoichiometry, the mole ratio comes from:", "a": ["Molar masses", "Coefficients in balanced equation", "Subscripts", "Superscripts"], "c": 1}, {"q": "Grams of A → moles of A → moles of B → grams of B uses:", "a": ["Only molar masses", "Molar masses AND mole ratios", "Only ratios", "Only density"], "c": 1}, {"q": "Types of reactions: synthesis (combination): A + B →:", "a": ["A + B", "AB", "A + C", "Nothing"], "c": 1}, {"q": "Decomposition: AB →:", "a": ["AB", "A + B", "ABC", "Nothing"], "c": 1}, {"q": "Single replacement: A + BC →:", "a": ["AB + C", "AC + B", "ABC", "A + B + C"], "c": 1}, {"q": "Double replacement: AB + CD →:", "a": ["AC + BD", "A + B + C + D", "ABCD", "AB + CD"], "c": 0}, {"q": "Combustion of hydrocarbons produces:", "a": ["Only CO₂", "CO₂ + H₂O", "Only H₂O", "Only carbon"], "c": 1}, {"q": "CH₄ + 2O₂ → CO₂ + 2H₂O is a ___ reaction:", "a": ["Synthesis", "Decomposition", "Combustion", "Single replacement"], "c": 2}, {"q": "2Na + 2H₂O → 2NaOH + H₂ is:", "a": ["Double replacement", "Single replacement", "Synthesis", "Decomposition"], "c": 1}, {"q": "NaOH + HCl → NaCl + H₂O is:", "a": ["Single replacement", "Double replacement (neutralization)", "Combustion", "Decomposition"], "c": 1}, {"q": "CaCO₃ → CaO + CO₂ is:", "a": ["Synthesis", "Decomposition", "Combustion", "Single replacement"], "c": 1}, {"q": "2Mg + O₂ → 2MgO is:", "a": ["Decomposition", "Synthesis (combination)", "Single replacement", "Combustion"], "c": 1}, {"q": "The activity series predicts whether a:", "a": ["Gas forms", "Single replacement reaction occurs", "Compound dissolves", "Color changes"], "c": 1}, {"q": "A more active metal can replace a ___ active metal:", "a": ["More", "Less", "Equally", "No"], "c": 1}, {"q": "Solubility rules predict if a ___ forms in double replacement:", "a": ["Gas", "Precipitate (insoluble product)", "Nothing", "Color"], "c": 1}, {"q": "(aq) means:", "a": ["Solid", "Aqueous (dissolved)", "Gas", "Liquid (pure)"], "c": 1}, {"q": "(s) means:", "a": ["Solution", "Solid", "Solvent", "Standard"], "c": 1}, {"q": "(g) means:", "a": ["Ground", "Gas", "Gram", "Gold"], "c": 1}, {"q": "(l) means:", "a": ["Liter", "Liquid", "Light", "Large"], "c": 1}, {"q": "Net ionic equations show only:", "a": ["All ions", "Species that participate in the reaction", "Spectator ions", "Molecular formulas"], "c": 1}, {"q": "Spectator ions:", "a": ["React", "Don't change — appear on both sides", "Precipitate", "Evaporate"], "c": 1}, {"q": "To balance an equation, change only:", "a": ["Subscripts", "Coefficients", "Formulas", "Both subscripts and coefficients"], "c": 1}, {"q": "Never change subscripts when balancing because it:", "a": ["Looks wrong", "Changes the compound's identity", "Is too easy", "Is illegal"], "c": 1}, {"q": "How many grams of O₂ needed to burn 16 g CH₄? (CH₄ + 2O₂ → CO₂ + 2H₂O):", "a": ["32 g", "64 g", "96 g", "128 g"], "c": 1}, {"q": "16g CH₄ = 1 mol. Mole ratio CH₄:O₂ = 1:2, so need 2 mol O₂ = ___ g:", "a": ["32", "64", "96", "128"], "c": 1}, {"q": "Theoretical yield is the ___ amount of product:", "a": ["Minimum", "Maximum (calculated from stoichiometry)", "Average", "Random"], "c": 1}, {"q": "Actual yield is the amount:", "a": ["Calculated", "Actually obtained in experiment", "Always equal to theoretical", "Always zero"], "c": 1}, {"q": "% yield = (actual ÷ theoretical) × 100. A yield of 85% means:", "a": ["85% of expected product was obtained", "15% was obtained", "100% was obtained", "0% was obtained"], "c": 0}, {"q": "Acid-base neutralization produces:", "a": ["Only water", "Salt + water", "Only salt", "Only gas"], "c": 1}, {"q": "HCl + NaOH → NaCl + H₂O. NaCl is the:", "a": ["Acid", "Base", "Salt", "Water"], "c": 2}, {"q": "An indicator signals the:", "a": ["Start of a reaction", "Endpoint (equivalence point)", "Middle", "Nothing"], "c": 1}, {"q": "Phenolphthalein turns ___ in base:", "a": ["Clear", "Pink/magenta", "Blue", "Yellow"], "c": 1}, {"q": "Phenolphthalein is ___ in acid:", "a": ["Pink", "Colorless", "Blue", "Green"], "c": 1}, {"q": "In a titration, the analyte is the substance of:", "a": ["Known concentration", "Unknown concentration", "Known volume only", "Known mass only"], "c": 1}, {"q": "The titrant is the substance of:", "a": ["Unknown concentration", "Known concentration (added from buret)", "Unknown volume", "Unknown mass"], "c": 1}, {"q": "At equivalence point: moles acid × stoichiometry = moles base:", "a": ["True", "False", "Sometimes", "Never"], "c": 0}, {"q": "MᴬVᴬ = MᴮVᴮ works for 1:1 acid-base reactions:", "a": ["True", "False", "Only for HCl", "Only at high T"], "c": 0}, {"q": "Molarity of unknown = (M known × V known) ÷ V unknown. This is:", "a": ["Dilution", "Titration calculation", "Density", "Equilibrium"], "c": 1}, {"q": "Precipitation reactions form an:", "a": ["Gas", "Insoluble solid (precipitate)", "Only liquid", "Only ions"], "c": 1}, {"q": "Most sodium (Na) compounds are:", "a": ["Insoluble", "Soluble", "Gases", "Acids"], "c": 1}, {"q": "Most nitrate (NO₃⁻) compounds are:", "a": ["Insoluble", "Soluble", "Gases", "Only solid"], "c": 1}, {"q": "Most silver (Ag⁺) compounds are:", "a": ["Soluble", "Insoluble (except AgNO₃)", "Gases", "Liquids"], "c": 1}, {"q": "AgNO₃ + NaCl → AgCl(s) + NaNO₃. The precipitate is:", "a": ["NaCl", "NaNO₃", "AgCl", "AgNO₃"], "c": 2}, {"q": "To write a net ionic equation: first write the:", "a": ["Net ionic", "Molecular equation, then full ionic, then net ionic", "Only symbols", "Nothing"], "c": 1}, {"q": "Complete ionic equation shows all ___ ions:", "a": ["Spectator only", "Dissolved strong electrolytes as separate ions", "Solids as ions", "Gases as ions"], "c": 1}, {"q": "Gas-evolution reactions produce a:", "a": ["Precipitate", "Gas (bubbles)", "Only heat", "Only light"], "c": 1}, {"q": "H₂CO₃ is unstable and decomposes to:", "a": ["HCl + O₂", "H₂O + CO₂", "NaCl + H₂", "H₂ + CO₃"], "c": 1}, {"q": "Recognizing reaction types helps predict:", "a": ["Color", "Products", "Only mass", "Only volume"], "c": 1}, {"q": "Balancing redox equations requires balancing both mass and:", "a": ["Volume", "Charge", "Color", "Temperature"], "c": 1}, {"q": "Oxidation number (state) tracks:", "a": ["Mass", "Electrons (assigned charge)", "Volume", "Temperature"], "c": 1}, {"q": "In a balanced molecular equation, the total mass of reactants equals:", "a": ["Half of products", "Total mass of products", "Double the products", "None"], "c": 1}, {"q": "Stoichiometric calculations start with a:", "a": ["Random equation", "Balanced chemical equation", "Guess", "Physical observation"], "c": 1}, {"q": "When given grams, always convert to ___ first:", "a": ["Liters", "Moles", "Atoms", "Kilograms"], "c": 1}, {"q": "Mole ratios bridge:", "a": ["Colors", "Moles of one substance to moles of another", "Mass to volume", "Nothing"], "c": 1}, {"q": "If 2 mol A produces 3 mol B, the ratio is:", "a": ["2:3", "3:2", "1:1", "5:1"], "c": 0}, {"q": "Excess reagent is the reactant that:", "a": ["Runs out first", "Is left over after reaction", "Is always the solvent", "Is never present"], "c": 1}, {"q": "Synthesis reactions generally have ___ product(s):", "a": ["Zero", "One", "Two", "Many"], "c": 1}, {"q": "Decomposition reactions have ___ reactant(s):", "a": ["Zero", "One", "Two", "Many"], "c": 1}, {"q": "A balanced equation must also conserve:", "a": ["Only atoms", "Atoms AND charge", "Only energy", "Only mass"], "c": 1}, {"q": "C₃H₈ + 5O₂ → 3CO₂ + 4H₂O: mol ratio of propane to water:", "a": ["1:3", "1:4", "1:5", "3:4"], "c": 1}, {"q": "How many mol CO₂ from burning 2 mol C₃H₈?", "a": ["3", "6", "9", "12"], "c": 1}, {"q": "The coefficients in a balanced equation also represent:", "a": ["Only atoms", "Relative volumes of gases (at same T,P)", "Only grams", "Only density"], "c": 1}, {"q": "Avogadro's law: equal mol of gas at same T,P = equal:", "a": ["Mass", "Volume", "Density", "Color"], "c": 1}, {"q": "Metathesis reactions are the same as:", "a": ["Single replacement", "Double replacement", "Combustion", "Synthesis"], "c": 1}, {"q": "Acid + metal → salt + ___:", "a": ["Water", "H₂ gas", "O₂", "CO₂"], "c": 1}, {"q": "Acid + carbonate → salt + H₂O + ___:", "a": ["H₂", "CO₂", "O₂", "N₂"], "c": 1}, {"q": "Balancing equations is done by:", "a": ["Changing subscripts", "Trial and error (adjusting coefficients)", "Adding new elements", "Removing elements"], "c": 1}, {"q": "For complex equations, balance in this order:", "a": ["H first", "Metals first, then nonmetals, then H, then O", "O first", "Random"], "c": 1}, {"q": "A catalyst ___ the rate but is NOT consumed:", "a": ["Slows", "Speeds up", "Doesn't change", "Stops"], "c": 1}, {"q": "Catalysts appear ___ the arrow in equations:", "a": ["Before", "Above (or below)", "After", "In products"], "c": 1}, {"q": "Δ above an arrow means:", "a": ["Catalyst", "Heat is applied", "Pressure", "Light"], "c": 1}, {"q": "Energy diagrams show if a reaction is exothermic or:", "a": ["Fast", "Endothermic", "Slow", "Purple"], "c": 1}, {"q": "Exothermic reactions have products at ___ energy than reactants:", "a": ["Higher", "Lower", "Same", "Variable"], "c": 1}, {"q": "Endothermic reactions have products at ___ energy:", "a": ["Lower", "Higher", "Same", "Variable"], "c": 1}, {"q": "Complete combustion has sufficient:", "a": ["Fuel", "O₂", "Both fuel and O₂", "Water"], "c": 1}, {"q": "Incomplete combustion produces CO (carbon monoxide) instead of:", "a": ["H₂O", "CO₂", "O₂", "N₂"], "c": 1}, {"q": "CO is dangerous because it:", "a": ["Smells bad", "Binds to hemoglobin (prevents O₂ transport)", "Is visible", "Freezes"], "c": 1}, {"q": "Stoichiometry problems always begin with:", "a": ["The answer", "A balanced equation and given quantity", "A guess", "Random numbers"], "c": 1}, {"q": "The step grams→moles uses:", "a": ["Mole ratio", "Molar mass (÷)", "Avogadro's number", "Volume"], "c": 1}, {"q": "The step moles A→moles B uses:", "a": ["Molar mass", "Mole ratio from balanced equation", "Avogadro's", "Density"], "c": 1}, {"q": "The step moles→grams uses:", "a": ["Mole ratio", "Molar mass (×)", "Avogadro's", "Volume"], "c": 1}, {"q": "A combustion reaction always requires:", "a": ["Water", "Oxygen (O₂)", "Nitrogen", "Hydrogen"], "c": 1}, {"q": "The products of complete combustion of any hydrocarbon:", "a": ["CO + H₂", "CO₂ + H₂O", "C + H₂O", "Only CO₂"], "c": 1}, {"q": "Zn + 2HCl → ZnCl₂ + H₂ is a ___ reaction:", "a": ["Synthesis", "Decomposition", "Single replacement", "Double replacement"], "c": 2}, {"q": "Activity series: K > Na > Ca > Mg > Al > Zn > Fe > Cu > Ag > Au. Gold is:", "a": ["Most active", "Least active (hardest to oxidize)", "Moderately active", "Not a metal"], "c": 1}, {"q": "Cu cannot replace ___ from solution:", "a": ["Ag", "Zn (more active than Cu)", "Au", "Nothing"], "c": 1}, {"q": "Fe can replace Cu from CuSO₄ because Fe is ___ active:", "a": ["Less", "More", "Equally", "Not"], "c": 1}, {"q": "In a complete ionic equation, strong electrolytes are written as:", "a": ["Molecules", "Separate ions", "Solids", "Gases"], "c": 1}, {"q": "Weak electrolytes are written as:", "a": ["Separate ions", "Whole molecules/formulas", "Only gases", "Only solids"], "c": 1}, {"q": "Solids, liquids, and gases are written as:", "a": ["Ions", "Whole formulas (not split)", "Only symbols", "Only names"], "c": 1}, {"q": "A driving force for a reaction can be: precipitate, gas, or:", "a": ["More ions", "Water formation", "More color", "More heat only"], "c": 1}, {"q": "Neutralization reactions form water, which is a:", "a": ["Strong electrolyte", "Weak electrolyte/molecular", "Gas", "Strong base"], "c": 1}, {"q": "The net ionic equation for strong acid + strong base is typically:", "a": ["NaCl → Na⁺ + Cl⁻", "H⁺(aq) + OH⁻(aq) → H₂O(l)", "NaOH → Na⁺ + OH⁻", "HCl → H⁺ + Cl⁻"], "c": 1}, {"q": "Oxidation and reduction always occur:", "a": ["Separately", "Together (one can't happen without the other)", "Only in metals", "Only in acids"], "c": 1}, {"q": "In a redox reaction, total electrons lost = total electrons:", "a": ["Created", "Gained (conserved)", "Destroyed", "Doubled"], "c": 1}, {"q": "Balancing redox in acidic solution adds ___ to balance O:", "a": ["OH⁻", "H₂O", "O₂", "H₂"], "c": 1}]}, {"id": "chem-ch4b", "title": "Chapter 4 (cont): Redox, Limiting Reagents & Yield", "ln": "CHEM 260 · Ch 4 cont.", "notes": [{"heading": "Oxidation Number Rules (REMEMBER!)", "body": "<b>1)</b> Atom in elemental substance = <b>0</b>. <b>2)</b> Monatomic ion = ion's charge. <b>3)</b> H: <b>+1</b> with nonmetals (H₂O, NH₃), <b>−1</b> with metals (LiH). <b>4)</b> O: <b>−2</b> in most compounds; −1 in peroxides (O₂²⁻); very rarely −½ in superoxides. <b>5)</b> F: <b>always −1</b>. <b>6)</b> Other halogens: −1 except with O or other halogens. <b>7)</b> Sum of all ox #s = 0 (molecule) or = charge (ion)."}, {"heading": "Assigning Oxidation Numbers — Examples", "body": "<b>H₂S:</b> H = +1 each (with nonmetal), so S = −2 [2(+1) + S = 0]. <b>SO₃²⁻:</b> O = −2 each, so S + 3(−2) = −2 → S = <b>+4</b>. <b>Na₂SO₄:</b> Na = +1 each, O = −2 each, so 2(+1) + S + 4(−2) = 0 → S = <b>+6</b>. Practice: always solve for the unknown using the sum rule."}, {"heading": "Oxidation vs Reduction — Review", "body": "<b>Oxidation = increase</b> in oxidation number (loss of electrons). <b>Reduction = decrease</b> in oxidation number (gain of electrons). In NaCl: Na goes from 0 → +1 (oxidized). Cl goes from 0 → −1 (reduced). If ANY element changes ox #, it's a redox reaction."}, {"heading": "Types of Redox: Combustion", "body": "<b>Combustion:</b> fuel (reductant) + oxidant (often O₂) react vigorously → heat and light (flame). Examples: CH₄(g) + 2O₂(g) → CO₂ + 2H₂O. Rocket fuel: 10Al(s) + 6NH₄ClO₄(s) → 4Al₂O₃(s) + 2AlCl₃(s) + 12H₂O(g) + 3N₂(g). Always redox because carbon/metals change ox #."}, {"heading": "Types of Redox: Single Displacement", "body": "An ion in solution is <b>displaced (replaced)</b> by oxidation of a metallic element. More reactive metal pushes out less reactive one. Example: Cu(s) + 2AgNO₃(aq) → Cu(NO₃)₂(aq) + 2Ag(s). Cu is oxidized (0→+2); Ag is reduced (+1→0). Use the activity series to predict if a reaction occurs."}, {"heading": "Balancing Redox — Half-Reaction Method (Acidic)", "body": "<b>Step 1:</b> Write two half-reactions (oxidation and reduction). <b>Step 2:</b> Balance all elements EXCEPT O and H. <b>Step 3:</b> Balance O by adding H₂O. <b>Step 4:</b> Balance H by adding H⁺. <b>Step 5:</b> Balance charge by adding electrons (e⁻). This is the systematic approach that always works."}, {"heading": "Balancing Redox — Combining Half-Reactions", "body": "<b>Step 6:</b> Multiply each half-reaction by smallest integers to make electrons EQUAL in both. <b>Step 7:</b> Add the balanced half-reactions together. Simplify by canceling species on both sides (electrons must completely cancel!)."}, {"heading": "Balancing Redox — Basic Solution", "body": "<b>Step 8:</b> For basic media, add additional steps after balancing in acidic: add OH⁻ to both sides (equal to # of H⁺). Combine H⁺ + OH⁻ → H₂O. Simplify by canceling redundant H₂O molecules. <b>Step 9:</b> Final check — atoms AND charge must both balance."}, {"heading": "Redox Practice 1", "body": "<b>Cu + H⁺ + NO₃⁻ → Cu²⁺ + NO + H₂O</b> (acidic). Oxidation: Cu → Cu²⁺ + 2e⁻. Reduction: NO₃⁻ + 4H⁺ + 3e⁻ → NO + 2H₂O. Multiply: 3Cu and 2NO₃⁻. Final: <b>3Cu + 8H⁺ + 2NO₃⁻ → 3Cu²⁺ + 2NO + 4H₂O</b>. Check atoms and charge on both sides."}, {"heading": "Redox Practice 2", "body": "<b>Cl₂(aq) + OH⁻(aq) → Cl⁻(aq) + ClO₃⁻(aq) + H₂O(l)</b> (basic). This is a disproportionation reaction — Cl₂ is both oxidized AND reduced. Cl goes from 0 to −1 (reduction) and 0 to +5 (oxidation). Balance using the half-reaction method + basic media steps."}, {"heading": "Stoichiometry — The Baking Analogy", "body": "Just like baking: a recipe needs specific <b>ratios</b> of ingredients. If you only have 1 egg instead of 2, you must cut ALL other ingredients in half → can only make half a cake. In chemistry: reactants must be in the correct <b>mole ratios</b> from the balanced equation."}, {"heading": "Limiting Reagent — Definition", "body": "The <b>limiting reagent</b> (limiting reactant) is the reactant that <b>runs out first</b>. It determines the <b>maximum amount of product</b> that can form. The other reactant(s) are in <b>excess</b> — some will be left over when the reaction is complete."}, {"heading": "Identifying the Limiting Reagent", "body": "<b>Method:</b> For each reactant, calculate how much product it could make. The reactant that produces the <b>LEAST product</b> is the limiting reagent. Steps: <b>1)</b> Convert each reactant to moles. <b>2)</b> Use mole ratios to find moles of product from each. <b>3)</b> Smallest result → that reactant is limiting."}, {"heading": "Limiting Reagent Example: H₂ Combustion (moles)", "body": "2H₂ + O₂ → 2H₂O. Given: 2 mol H₂ and 2 mol O₂. From H₂: 2 mol H₂ × (2 mol H₂O / 2 mol H₂) = <b>2 mol H₂O</b>. From O₂: 2 mol O₂ × (2 mol H₂O / 1 mol O₂) = <b>4 mol H₂O</b>. H₂ produces less → <b>H₂ is limiting</b>. 1 mol O₂ left over (excess)."}, {"heading": "Limiting Reagent Example: H₂ Combustion (grams)", "body": "8 g H₂ + 8 g O₂ → H₂O? Convert to moles: H₂: 8/2.02 = 3.96 mol. O₂: 8/32.00 = 0.25 mol. Product from H₂: 3.96 × (2/2) = 3.96 mol H₂O. Product from O₂: 0.25 × (2/1) = 0.50 mol H₂O. O₂ gives less → <b>O₂ is limiting</b>. Max product = 0.50 mol H₂O."}, {"heading": "Limiting Reagent — Step-by-Step Method", "body": "<b>1)</b> Convert ALL reactant masses to moles (÷ molar mass). <b>2)</b> For each reactant, calculate moles of ONE product using mole ratios. <b>3)</b> Compare: whichever reactant gives the <b>smallest</b> amount of product is the limiting reagent. <b>4)</b> Use the limiting reagent amount for all further calculations."}, {"heading": "Theoretical Yield — Definition", "body": "The <b>maximum amount of product</b> that could be formed from the limiting reagent, assuming: <b>1)</b> No side reactions. <b>2)</b> Complete reaction (100% conversion). Calculated from the limiting reagent using mole ratios, then convert moles → grams if needed."}, {"heading": "Theoretical Yield Example", "body": "CH₄ + 2O₂ → CO₂ + 2H₂O. 10 g CH₄ + 10 g O₂. From CH₄: 10/16.04 = 0.624 mol → 0.624 × 2 = 1.247 mol H₂O → 22.5 g. From O₂: 10/32.00 = 0.3125 mol → 0.3125 × (2/2) = 0.3125 mol H₂O → <b>5.63 g</b>. O₂ is limiting. Theoretical yield = <b>5.63 g H₂O</b>."}, {"heading": "Actual Yield", "body": "The amount of product <b>actually obtained</b> from a real experiment. Always ≤ theoretical yield because of: incomplete reactions, side reactions, loss during transfer/purification, impure reactants. Measured experimentally."}, {"heading": "Percent Yield", "body": "Measures the <b>efficiency</b> of a reaction. Formula: <b>% yield = (actual yield ÷ theoretical yield) × 100</b>. 100% = perfect (rare). Example: theoretical = 5.59 g H₂O, actual = 5.00 g. % yield = (5.00/5.59) × 100 = <b>89.4%</b>."}, {"heading": "Percent Yield — What It Means", "body": "High % yield (>90%): very efficient reaction. Moderate (60-90%): typical for many lab reactions. Low (<60%): significant losses or side reactions. Industrial processes aim for highest possible yields. Knowing % yield helps evaluate and optimize reactions."}, {"heading": "Excess Reagent Calculation", "body": "Amount of excess reagent left over = initial amount − amount consumed. Amount consumed: use moles of limiting reagent × mole ratio to find moles of excess used. Convert back to grams if needed. Example: if 0.25 mol O₂ is limiting and requires 0.50 mol H₂, but you started with 3.96 mol H₂ → excess H₂ = 3.96 − 0.50 = 3.46 mol leftover."}, {"heading": "Complete Stoichiometry Problem Strategy", "body": "<b>1)</b> Write and balance the equation. <b>2)</b> Convert all given masses to moles. <b>3)</b> Identify limiting reagent (produces least product). <b>4)</b> Calculate theoretical yield from limiting reagent. <b>5)</b> If actual yield given, calculate percent yield. <b>6)</b> If asked, calculate excess reagent remaining."}, {"heading": "Mole Ratios from Balanced Equation", "body": "The coefficients in a balanced equation give <b>mole ratios</b>. CH₄ + 2O₂ → CO₂ + 2H₂O: 1 mol CH₄ : 2 mol O₂ : 1 mol CO₂ : 2 mol H₂O. These ratios are the conversion factors for stoichiometry. Always use the balanced equation — never skip this step."}, {"heading": "Key Equations & Definitions Summary", "body": "<b>Ox # rules:</b> element=0, ion=charge, H=+1/−1, O=−2, F=−1, sum=0 or charge.<br><b>Limiting reagent:</b> produces least product.<br><b>Theoretical yield:</b> max product from limiting reagent.<br><b>% yield = (actual/theoretical) × 100</b>.<br><b>Half-reaction method:</b> 7 steps (acidic) + 2 more for basic."}], "quiz": [{"q": "Ox # of an element in its standard state:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Ox # of H with nonmetals:", "a": ["−1", "0", "+1", "+2"], "c": 2}, {"q": "Ox # of H with metals:", "a": ["+1", "0", "−1", "+2"], "c": 2}, {"q": "Ox # of O in most compounds:", "a": ["0", "−1", "−2", "+2"], "c": 2}, {"q": "Ox # of O in peroxides:", "a": ["0", "−1", "−2", "+1"], "c": 1}, {"q": "Ox # of F is always:", "a": ["0", "−1", "+1", "−2"], "c": 1}, {"q": "Sum of ox #s in a neutral molecule:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Sum of ox #s in a polyatomic ion equals:", "a": ["0", "The ion's charge", "+1", "−1"], "c": 1}, {"q": "In H₂S, S has ox # of:", "a": ["+2", "−2", "+4", "−4"], "c": 1}, {"q": "In SO₃²⁻, S has ox # of:", "a": ["+2", "+4", "+6", "−2"], "c": 1}, {"q": "In Na₂SO₄, S has ox # of:", "a": ["+2", "+4", "+6", "−2"], "c": 2}, {"q": "Oxidation = ___ in oxidation number:", "a": ["Decrease", "Increase", "No change", "Doubling"], "c": 1}, {"q": "Reduction = ___ in oxidation number:", "a": ["Increase", "Decrease", "No change", "Halving"], "c": 1}, {"q": "Combustion is a type of ___ reaction:", "a": ["Acid-base", "Precipitation", "Redox", "Decomposition only"], "c": 2}, {"q": "Single displacement involves:", "a": ["Two compounds switching", "A metal replacing an ion", "Only gases", "Only acids"], "c": 1}, {"q": "Cu + 2AgNO₃ → Cu(NO₃)₂ + 2Ag — Cu is:", "a": ["Reduced", "Oxidized", "Unchanged", "A spectator"], "c": 1}, {"q": "In the same reaction, Ag⁺ is:", "a": ["Oxidized", "Reduced", "Unchanged", "Dissolved"], "c": 1}, {"q": "Balancing redox step 1:", "a": ["Add H₂O", "Write two half-reactions", "Add electrons", "Add OH⁻"], "c": 1}, {"q": "Balance O atoms by adding:", "a": ["O₂", "H⁺", "H₂O", "OH⁻"], "c": 2}, {"q": "Balance H atoms (acidic) by adding:", "a": ["H₂O", "H⁺", "OH⁻", "H₂"], "c": 1} , {"q": "If % yield = 90% and theoretical = 100 g: actual yield =:", "a": ["90 g", "100 g", "110 g", "80 g"], "c": 0}, {"q": "Stoichiometric amounts means reactants are in exact:", "a": ["Random ratio", "Mole ratio from equation (none in excess)", "Equal grams", "Equal volumes"], "c": 1}, {"q": "If one reactant is 'in excess,' the other is the:", "a": ["Excess", "Limiting reagent", "Catalyst", "Product"], "c": 1}, {"q": "To find grams of excess left: grams initially − grams consumed:", "a": ["True", "False", "Sometimes", "Never"], "c": 0}, {"q": "Grams consumed = moles consumed ×:", "a": ["Avogadro's number", "Molar mass", "22.4", "Density"], "c": 1}, {"q": "Moles consumed of excess = moles of limiting × mole ratio:", "a": ["True", "False", "Sometimes", "Never"], "c": 0}, {"q": "A reaction with 100% yield means:", "a": ["Impossible", "All theoretical product was actually obtained", "No product formed", "Excess remained"], "c": 1}, {"q": "Industrial processes aim to maximize:", "a": ["Waste", "% yield and atom economy", "Cost", "Pollution"], "c": 1}, {"q": "Combustion analysis is used mainly for:", "a": ["Metals", "Organic compounds (C, H, O)", "Noble gases", "Ionic compounds"], "c": 1}, {"q": "Electrochemistry applies redox in:", "a": ["Only labs", "Batteries, corrosion, electrolysis, electroplating", "Only theory", "Only organic chemistry"], "c": 1}, {"q": "Electroplating uses electrolysis to coat a metal with:", "a": ["Plastic", "Another metal (e.g., chrome, gold, silver)", "Paint", "Glass"], "c": 1}, {"q": "The anode is where ___ occurs:", "a": ["Reduction", "Oxidation", "Nothing", "Equilibrium"], "c": 1}, {"q": "The cathode is where ___ occurs:", "a": ["Oxidation", "Reduction", "Nothing", "Equilibrium"], "c": 1}, {"q": "AN OX, RED CAT: Anode-Oxidation, Reduction-Cathode:", "a": ["True (mnemonic)", "False", "Sometimes", "Only for batteries"], "c": 0}, {"q": "In a galvanic cell, the anode is ___ and cathode is ___:", "a": ["Positive/negative", "Negative/positive", "Both positive", "Both negative"], "c": 1}, {"q": "In an electrolytic cell, anode is ___ and cathode is ___:", "a": ["Negative/positive", "Positive/negative", "Both positive", "Both negative"], "c": 1}, {"q": "Rust prevention by galvanizing uses zinc because zinc is:", "a": ["Less reactive", "More reactive (oxidizes first, sacrificial)", "Nonreactive", "A noble metal"], "c": 1}, {"q": "The activity series helps predict which single replacement reactions will:", "a": ["Always occur", "Occur spontaneously", "Never occur", "Produce gas"], "c": 1}, {"q": "A metal higher on the activity series can displace one:", "a": ["Higher", "Lower", "Equal", "None"], "c": 1}]}, {"id": "chem-ch5", "title": "Chapter 5: Thermochemistry (Part I)", "ln": "CHEM 260 · Ch 5", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Define system, surroundings, and forms of energy. <b>2)</b> Apply the First Law of Thermodynamics. <b>3)</b> Calculate heat, work, and internal energy changes. <b>4)</b> Interpret enthalpy changes using calorimetry data."}, {"heading": "Energy Basics", "body": "Chemistry studies matter; <b>energy affects matter</b> (e.g., gas molecular velocities). <b>Energy:</b> the capacity to supply heat or do work. Two types: <b>Potential energy</b> (related to position/composition) and <b>Kinetic energy</b> (related to motion). <b>Law of conservation of energy:</b> energy can be neither created nor destroyed, only changed in form."}, {"heading": "Thermal Energy & Temperature", "body": "<b>Thermal energy:</b> a type of kinetic energy from the random motion of atoms and molecules. <b>Temperature:</b> quantitative measure of 'hot' or 'cold.' Fast-moving molecules ↔ high thermal energy ↔ 'hot.' Slow-moving molecules ↔ low thermal energy ↔ 'cold.' Hot water molecules move <b>faster</b> than cold water molecules."}, {"heading": "Heat — Definition", "body": "<b>Heat:</b> the transfer of thermal energy between two bodies at <b>different temperatures</b>. Flows from high T → low T until temperatures equalize. Matter undergoing reactions can <b>release</b> heat (<b>exothermic</b>) or <b>absorb</b> heat (<b>endothermic</b>)."}, {"heading": "Exothermic vs Endothermic", "body": "<b>Exothermic (exothermal):</b> system releases heat to surroundings — surroundings get warmer. Feels hot. Examples: combustion, neutralization, freezing. <b>Endothermic (endothermal):</b> system absorbs heat from surroundings — surroundings get cooler. Feels cold. Examples: melting ice, dissolving NH₄NO₃."}, {"heading": "Energy Units", "body": "Two commonly used: <b>calorie (cal)</b> and <b>joule (J)</b>. Relationship: <b>1 cal = 4.184 J</b>. The joule is the SI unit. A calorie = energy to raise 1 g water by 1°C. Food Calories (capital C) = kilocalories = 1000 cal."}, {"heading": "Heat Capacity (C)", "body": "The quantity of heat (q) a body absorbs or releases when its temperature changes by <b>1°C</b>. Formula: <b>C = q / ΔT</b>. Units: <b>J/°C</b>. This is an <b>extensive</b> property — depends on the amount of material. A bigger pan needs more heat than a smaller one."}, {"heading": "Specific Heat Capacity (c)", "body": "The quantity of heat required to raise <b>1 gram</b> of a substance by <b>1°C</b>. Formula: <b>q = mcΔT</b> (or c = q/(mΔT)). Units: <b>J/(g·°C)</b>. This is an <b>intensive</b> property — same regardless of sample size. Water's specific heat = <b>4.184 J/(g·°C)</b> — very high compared to most substances."}, {"heading": "Heat Capacity vs Specific Heat", "body": "<b>Heat capacity (C):</b> for the whole object (extensive). <b>Specific heat (c):</b> per gram (intensive). Related by: <b>C = m × c</b>. If you know mass and specific heat, you know the heat capacity. If you know heat capacity and mass, you can find specific heat."}, {"heading": "Practice Q4: Heat Capacity", "body": "Cast iron frying pan: 18,150 J raises T by 50.0°C. <b>C = q/ΔT = 18,150 / 50.0 = 363 J/°C</b> (3 sig figs). This tells us how much energy the whole pan needs per degree of temperature change."}, {"heading": "Practice Q5: Specific Heat", "body": "The pan has mass 808 g. <b>c = C/m = 363 / 808 = 0.449 J/(g·°C)</b> (3 sig figs). This is a property of cast iron itself, regardless of pan size. Compare: water = 4.184 (iron heats up ~9× faster than water for same mass)."}, {"heading": "The q = mcΔT Equation", "body": "The most important equation in this chapter. <b>q = mcΔT</b>. q = heat (J or cal). m = mass (g). c = specific heat (J/g·°C). ΔT = T_final − T_initial (°C). Positive q = heat absorbed (endothermic). Negative q = heat released (exothermic)."}, {"heading": "Measuring Heat — Example", "body": "800 g of water heated from 21°C to 85°C. How much heat absorbed? <b>q = mcΔT = 800 × 4.184 × (85 − 21) = 800 × 4.184 × 64 = 214,221 J ≈ 214 kJ</b>. Always use specific heat of the substance being heated and ΔT = final − initial."}, {"heading": "Calorimetry", "body": "<b>Calorimetry:</b> technique to measure heat in chemical/physical processes. <b>Calorimeter:</b> device used (simplest = coffee cup calorimeter). Key terms: <b>System</b> = substances undergoing the change. <b>Surroundings</b> = all other matter providing/absorbing heat from the system."}, {"heading": "System and Surroundings", "body": "In chemistry, we define what we're studying as the <b>system</b> and everything else as the <b>surroundings</b>. Energy flows between them. In a calorimeter, the reaction is the system; the water and cup are the surroundings. Total energy is conserved."}, {"heading": "Calorimetry Principle", "body": "In an insulated calorimeter: <b>q_system = −q_surroundings</b>. Heat lost by one = heat gained by the other. The negative sign means: if the system releases heat (−), the surroundings gain it (+), and vice versa. This is conservation of energy in action."}, {"heading": "Calorimetry Practice Q6: Rebar Problem", "body": "360.0 g steel rebar (c = 0.449 J/g·°C) dropped into 425 mL water (c = 4.184 J/g·°C) at 24.0°C. Final T = 42.7°C. Find initial T of rebar. <b>q_water = −q_rebar</b>. q_water = 425 × 4.184 × (42.7−24.0) = 425 × 4.184 × 18.7 = <b>33,240 J</b>."}, {"heading": "Rebar Problem — Solving for T", "body": "q_rebar = −33,240 J (releases heat). q = mcΔT → −33,240 = 360.0 × 0.449 × (42.7 − T_initial). −33,240 = 161.6 × (42.7 − T_i). (42.7 − T_i) = −33,240/161.6 = −205.7. T_i = 42.7 + 205.7 = <b>248°C</b> (3 sig figs). Hot rebar cooled down in cold water."}, {"heading": "Neutralization Calorimetry", "body": "50.0 mL of 1.00 M HCl + 50.0 mL of 1.00 M NaOH, both at 22.0°C. Final T = 28.9°C. Heat produced: total volume ≈ 100 mL water (dilute solution ≈ water). <b>q = 100 × 4.184 × (28.9 − 22.0) = 100 × 4.184 × 6.9 ≈ 2887 J ≈ 2.89 kJ</b>. This is exothermic (T increased)."}, {"heading": "Why Specific Heat Matters", "body": "Water has an unusually <b>high specific heat (4.184)</b> compared to metals (~0.1–0.9). This means water resists temperature change — it's a great thermal buffer. This is why coastal climates are moderate, and why water is used as a coolant. Metals heat up and cool down much faster."}, {"heading": "Signs and Directions", "body": "<b>q > 0 (positive):</b> system absorbs heat (endothermic, T increases). <b>q < 0 (negative):</b> system releases heat (exothermic). <b>ΔT > 0:</b> temperature increased. <b>ΔT < 0:</b> temperature decreased. Always define clearly what is your system vs surroundings."}, {"heading": "Converting Units", "body": "<b>J to kJ:</b> divide by 1000. <b>cal to J:</b> multiply by 4.184. <b>kcal to kJ:</b> multiply by 4.184. <b>°C to K:</b> add 273.15. Note: ΔT in °C = ΔT in K (the degree size is the same). You do NOT need to convert to Kelvin for ΔT calculations."}, {"heading": "Calorimetry Assumptions", "body": "Coffee cup calorimeter assumes: <b>1)</b> Perfect insulation (no heat loss to environment). <b>2)</b> Heat capacity of the cup itself is negligible. <b>3)</b> Dilute aqueous solutions have the same specific heat and density as pure water. These are approximations — real calorimeters need corrections."}, {"heading": "Review: Limiting Reagent & Yield", "body": "This lecture also reviewed: <b>Limiting reagent:</b> reactant that runs out first → determines max product. <b>Theoretical yield:</b> max product from limiting reagent. <b>% yield = (actual/theoretical) × 100</b>. Example: 10g CH₄ + 10g O₂ → 5.00g H₂O (actual). Theoretical = 5.59g. % yield = 89.4%."}, {"heading": "Key Equations Summary", "body": "<b>q = mcΔT</b> (heat from specific heat)<br><b>C = q/ΔT</b> (heat capacity)<br><b>c = q/(mΔT)</b> (specific heat)<br><b>C = mc</b> (heat capacity from specific heat)<br><b>q_system = −q_surroundings</b> (calorimetry)<br><b>1 cal = 4.184 J</b><br><b>ΔT = T_final − T_initial</b>"}], "quiz": [{"q": "Energy is the capacity to:", "a": ["Create matter", "Supply heat or do work", "Destroy atoms", "Change elements"], "c": 1}, {"q": "Potential energy is related to:", "a": ["Motion", "Position/composition", "Temperature", "Pressure"], "c": 1}, {"q": "Kinetic energy is related to:", "a": ["Position", "Composition", "Motion", "Charge"], "c": 2}, {"q": "Thermal energy is a type of:", "a": ["Potential energy", "Kinetic energy", "Nuclear energy", "Chemical energy"], "c": 1}, {"q": "Temperature measures:", "a": ["Total energy", "Average kinetic energy of particles", "Potential energy", "Mass"], "c": 1}, {"q": "Hot water molecules move ___ than cold:", "a": ["Slower", "Faster", "Same speed", "Not at all"], "c": 1}, {"q": "Heat flows from:", "a": ["Cold to hot", "Hot to cold", "Equal temps", "Random"], "c": 1}, {"q": "Exothermic means the system:", "a": ["Absorbs heat", "Releases heat", "No heat change", "Gains mass"], "c": 1}, {"q": "Endothermic means the system:", "a": ["Releases heat", "Absorbs heat", "No heat change", "Loses mass"], "c": 1}, {"q": "1 cal = ___ J:", "a": ["1.000", "2.718", "4.184", "8.314"], "c": 2}, {"q": "The SI unit of energy is:", "a": ["Calorie", "Joule", "Watt", "Newton"], "c": 1}, {"q": "Heat capacity (C) is ___ property:" ": "Limiting reagent produces the ___ product:", "a": ["Most", "Least", "Average", "No"], "c": 1}, {"q": "Theoretical yield is based on the:", "a": ["Excess reagent", "Limiting reagent", "Total reactants", "Products"], "c": 1}, {"q": "89.4% yield means:", "a": ["89.4% of theoretical was obtained", "10.6% was obtained", "100% efficient", "No product formed"], "c": 0}, {"q": "Heat is transferred between bodies at:", "a": ["Same temperature", "Different temperatures", "Same pressure", "Same volume"], "c": 1}, {"q": "Thermochemistry studies ___ changes in reactions:", "a": ["Color", "Heat/energy", "Volume", "Mass"], "c": 1}, {"q": "The system is the part being:", "a": ["Ignored", "Studied", "Discarded", "Outside"], "c": 1}, {"q": "The surroundings are everything ___ the system:", "a": ["Inside", "Outside/around", "Equal to", "Below"], "c": 1}, {"q": "Energy cannot be created or destroyed (1st Law of:", "a": ["Newton", "Thermodynamics", "Kinetics", "Gravity"], "c": 1}, {"q": "Exothermic reactions ___ heat:", "a": ["Absorb", "Release (feel hot)", "Neither", "Create"], "c": 1}, {"q": "Endothermic reactions ___ heat:", "a": ["Release", "Absorb (feel cold)", "Neither", "Destroy"], "c": 1}, {"q": "Exothermic: ΔH is:", "a": ["Positive", "Negative", "Zero", "Undefined"], "c": 1}, {"q": "Endothermic: ΔH is:", "a": ["Negative", "Positive", "Zero", "Undefined"], "c": 1}, {"q": "Enthalpy (H) is heat at constant:", "a": ["Volume", "Pressure", "Temperature", "Mass"], "c": 1}, {"q": "ΔH = H(products) − H(reactants):", "a": ["True", "False", "Sometimes", "Never"], "c": 0}, {"q": "If products have less energy than reactants, reaction is:", "a": ["Endothermic", "Exothermic (energy released)", "Neither", "Both"], "c": 1}, {"q": "q = mcΔT. q is:", "a": ["Mass", "Heat transferred", "Temperature", "Specific heat"], "c": 1}, {"q": "q = mcΔT. m is:", "a": ["Heat", "Mass", "Molarity", "Moles"], "c": 1}, {"q": "q = mcΔT. c is:", "a": ["Heat", "Mass", "Specific heat capacity", "Temperature"], "c"
