cal/g·°C) compared to most substances. This means water changes temperature slowly — it <b>buffers temperature</b> for organisms and the environment."}, {"heading": "Cohesion vs Adhesion", "body": "<b>Cohesion:</b> water sticks to water (H-bonds between water molecules). <b>Adhesion:</b> water sticks to other surfaces. Together they create <b>capillary action</b> — water can climb up narrow tubes against gravity. This is how water moves from roots to leaves in plants."}, {"heading": "Key Concepts Summary", "body": "<b>Water:</b> polar, high specific heat, densest at 4°C, cohesive, excellent solvent. <b>pH:</b> −log[H⁺], <7 acid, >7 base. <b>Buffers</b> resist pH change. <b>Carbon:</b> valence 4, forms diverse molecules. <b>Functional groups:</b> amino, carboxyl, aldehyde, hydroxyl, sulfhydryl, phosphate. <b>Chirality:</b> mirror images not superimposable."}], "quiz": [{"q": "Water's most critical attribute for life:", "a": ["Color", "Density", "Polarity", "Mass"], "c": 2}, {"q": "Water is densest at:", "a": ["0°C", "4°C", "25°C", "100°C"], "c": 1}, {"q": "Ice floats because it:", "a": ["Is heavier", "Expands when freezing (less dense)", "Has no bonds", "Is colder"], "c": 1}, {"q": "Why is ice floating important for life?", "a": ["Looks pretty", "Life survives beneath ice", "Makes fishing easier", "No reason"], "c": 1}, {"q": "Water's high specific heat helps:", "a": ["Nothing", "Moderate/stabilize temperature", "Increase boiling", "Decrease density"], "c": 1}, {"q": "Cohesion means water sticks to:", "a": ["Other substances", "Itself", "Nothing", "Only metals"], "c": 1}, {"q": "High surface tension results from:", "a": ["Low cohesion", "High cohesion", "No polarity", "Low density"], "c": 1}, {"q": "Capillary action uses:", "a": ["Gravity only", "Cohesion + adhesion", "Electricity", "Magnetism"], "c": 1}, {"q": "Hydrophilic means:", "a": ["Water hating", "Water loving", "Oil loving", "Neutral"], "c": 1}, {"q": "Hydrophobic means:", "a": ["Water loving", "Water hating", "Charged", "Polar"], "c": 1}, {"q": "Sphere of hydration is:", "a": ["A water droplet", "Water surrounding an ion", "Ice crystal", "Water vapor"], "c": 1}, {"q": "Amphipathic molecules have:", "a": ["Only hydrophilic parts", "Only hydrophobic parts", "Both hydrophilic and hydrophobic parts", "Neither"], "c": 2}, {"q": "Cell membranes are:", "a": ["Hydrophilic only", "Hydrophobic only", "Amphipathic", "Not water-related"], "c": 2}, {"q": "pH = −log of:", "a": ["[OH⁻]", "[H⁺]", "[H₂O]", "[Na⁺]"], "c": 1}, {"q": "pH 7 is:", "a": ["Acidic", "Basic", "Neutral", "Unknown"], "c": 2}, {"q": "pH < 7 is:", "a": ["Basic", "Neutral", "Acidic", "Impossible"], "c": 2}, {"q": "pH > 7 is:", "a": ["Acidic", "Neutral", "Basic", "Impossible"], "c": 2}, {"q": "Each pH unit = ___ difference in [H⁺]:", "a": ["2×", "5×", "10×", "100×"], "c": 2}, {"q": "Buffers minimize changes in:", "a": ["Temperature", "pH", "Volume", "Mass"], "c": 1}, {"q": "Blood pH is maintained near:", "a": ["5.0", "6.0", "7.4", "9.0"], "c": 2}, {"q": "Carbon's valence is:", "a": ["1", "2", "3", "4"], "c": 3}, {"q": "Carbon forms ___ bonds:", "a": ["Ionic", "Covalent", "Metallic", "Hydrogen only"], "c": 1}, {"q": "Organic chemistry studies:", "a": ["All chemicals", "Carbon compounds", "Only living things", "Only minerals"], "c": 1}, {"q": "In structural formulas, angles represent:", "a": ["Oxygen", "Nitrogen", "Carbon atoms", "Hydrogen"], "c": 2}, {"q": "Free valence in structures assumed to be:", "a": ["Oxygen", "Nitrogen", "Carbon", "Hydrogen"], "c": 3}, {"q": "UV light damages DNA by breaking:", "a": ["H-bonds only", "C−C and C−N bonds", "Ionic bonds", "Nothing"], "c": 1}, {"q": "Most UV light blocked by:", "a": ["Clouds", "Ozone", "Water", "CO₂"], "c": 1}, {"q": "Light energy is key in:", "a": ["Digestion", "Photosynthesis", "Respiration only", "Nothing"], "c": 1}, {"q": "Hydrocarbon = only ___ and ___:", "a": ["C and O", "C and N", "H and C", "H and O"], "c": 2}, {"q": "Functional groups give molecules new:", "a": ["Mass only", "Properties and reactive sites", "Color", "Nothing"], "c": 1}, {"q": "Amino group:", "a": ["−OH", "−NH₃⁺", "−SH", "−COO⁻"], "c": 1}, {"q": "Carboxyl (acid) group:", "a": ["−NH₃⁺", "−COO⁻", "−OH", "−SH"], "c": 1}, {"q": "Hydroxyl group:", "a": ["−OH", "−SH", "−NH₃⁺", "−COO⁻"], "c": 0}, {"q": "Sulfhydryl group:", "a": ["−OH", "−NH₃⁺", "−SH", "−PO₄"], "c": 2}, {"q": "Phosphate group found in:", "a": ["Only lipids", "DNA, RNA, some proteins", "Only sugars", "Only water"], "c": 1}, {"q": "Chirality means mirror images:", "a": ["Are identical", "Cannot be superimposed", "Always match", "Don't exist"], "c": 1}, {"q": "A chiral center has ___ different bonds:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "Miller experiment mimicked:", "a": ["Modern Earth", "Early Earth conditions", "Space", "Ocean floor"], "c": 1}, {"q": "Miller used sparks to mimic:", "a": ["Sunlight", "Lightning", "Volcanos", "Earthquakes"], "c": 1}, {"q": "Miller produced ___ from simple gases:", "a": ["Living cells", "Organic molecules", "Gold", "Water"], "c": 1}, {"q": "Primordial soup refers to:", "a": ["Modern ocean", "Early Earth chemical mixture", "A recipe", "Nothing scientific"], "c": 1}, {"q": "Specific heat = energy to raise ___ by 1°C:", "a": ["1 mL", "1 g", "1 kg", "1 mol"], "c": 1}, {"q": "Water's specific heat is:", "a": ["Very low", "Average", "Very high", "Zero"], "c": 2}, {"q": "Key atoms in organic molecules: H, O, N, and:", "a": ["Fe", "Na", "C", "Cl"], "c": 2}, {"q": "Bond energy of C,H,O,N bonds ranges:", "a": ["1-10 kcal/mol", "70-212 kcal/mol", "500-1000 kcal/mol", "0 kcal/mol"], "c": 1}, {"q": "Food 'Calories' are actually:", "a": ["Calories", "Kilocalories", "Megacalories", "Joules"], "c": 1}, {"q": "Lake effect snow is caused by:", "a": ["Cold water", "Air warming over water, cooling on land", "Wind only", "Snow machines"], "c": 1}, {"q": "Organisms without water:", "a": ["Function normally", "Shut down until water is added", "Die immediately", "Grow faster"], "c": 1}, {"q": "Carbonate buffer system involves:", "a": ["NaCl", "CO₂ + H₂O ⇌ H₂CO₃ ⇌ HCO₃⁻", "Only phosphate", "Only proteins"], "c": 1}, {"q": "Adhesion means water sticks to:", "a": ["Itself", "Other surfaces", "Nothing", "Only glass"], "c": 1}]}, {"id": "bio-l3", "title": "Lesson 3: Biological Molecules", "ln": "BIO · L3", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Identify similarities/differences between DNA and RNA. <b>2)</b> Classify amino acids into 3 main groups. <b>3)</b> Identify carbohydrates and their two major bond types. <b>4)</b> Classify lipids into 6 groups with distinguishing features."}, {"heading": "Nucleotides — Building Blocks", "body": "Two types of nucleic acids: <b>DNA</b> (deoxyribonucleic acid) and <b>RNA</b> (ribonucleic acid). Each nucleotide has <b>3 parts:</b> phosphate group, sugar (ribose or deoxyribose), and nitrogenous base. <b>Deoxyribose</b> is missing the <b>2' hydroxyl group</b> (that's the 'deoxy')."}, {"heading": "Nucleotide Bonds", "body": "<b>Phosphoester bond:</b> connects phosphate to the 5' carbon of the sugar. Sugar-phosphate and sugar-base connections are both <b>condensation reactions</b> (release water). In polymers, the phosphate backbone connects via <b>phosphodiester bonds</b> (sugar-phosphate-sugar)."}, {"heading": "Purines vs Pyrimidines", "body": "<b>Purines:</b> 2 connected rings, 4 nitrogen atoms. <b>Adenine (A)</b> and <b>Guanine (G)</b>. <b>Pyrimidines:</b> 1 ring, 2 nitrogen atoms. <b>Cytosine (C)</b>, <b>Thymine (T, DNA only)</b>, <b>Uracil (U, RNA only)</b>. Sugar binds to nitrogen in pyrimidines and the smaller ring of purines."}, {"heading": "Base Pairing", "body": "<b>Adenine pairs with Thymine</b> (DNA) or <b>Uracil</b> (RNA) — 2 hydrogen bonds. <b>Guanine pairs with Cytosine</b> — 3 hydrogen bonds. Thymine and uracil differ by the addition of a <b>methyl group</b> in thymine."}, {"heading": "Nucleosides & Nucleotides", "body": "<b>Nucleoside:</b> base + sugar (NO phosphate). <b>Nucleotide:</b> base + sugar + phosphate(s). Can have mono-, di-, or triphosphate (e.g., ATP = adenosine <b>tri</b>phosphate). <b>Phosphoanhydride bonds:</b> connect phosphates to each other (high energy bonds in ATP!)."}, {"heading": "DNA Structure — Double Helix", "body": "DNA is a <b>double helix</b> — bases stacked like rungs on a twisted ladder. One strand goes <b>3'→5'</b>, the other <b>5'→3'</b> (antiparallel). Strands are <b>complementary</b> — if you know one base, you know its partner. Charged phosphates on the outside. This form = <b>B-DNA</b>. Has major and minor grooves."}, {"heading": "RNA Structure", "body": "RNA uses same base pairing logic: <b>G-C and A-U</b> (uracil replaces thymine). DNA is the template for making RNA. <b>Transcription:</b> RNA polymerase transcribes RNA from DNA 5'→3'. RNA is <b>single-stranded</b> — can't form double helix because of 2' hydroxyl group. But can fold and base-pair with itself → <b>hairpins</b>."}, {"heading": "Amino Acids — Overview", "body": "Protein monomers with both <b>amino (−NH₃⁺)</b> and <b>carboxyl (−COO⁻)</b> groups. <b>20 amino acids</b> in 3 major groups. The <b>side chain</b> (R group) = 4th group off the chiral carbon (besides amine, carboxyl, and H). Virtually all natural amino acids in proteins are <b>L-isomer</b>."}, {"heading": "Amino Acid Group 1: Nonpolar", "body": "<b>9 nonpolar amino acids.</b> Side chains are basically <b>hydrocarbons</b> — hydrophobic. Found in protein interiors, away from water. Examples include glycine (simplest), alanine, valine, leucine, isoleucine, proline, phenylalanine, tryptophan, methionine."}, {"heading": "Amino Acid Group 2: Uncharged Polar", "body": "<b>6 uncharged polar amino acids.</b> Have at least <b>1 polar group</b> in side chain (−OH, −SH, −NH₂). Hydrophilic. Found on protein surfaces. Examples: serine, threonine, cysteine, tyrosine, asparagine, glutamine."}, {"heading": "Amino Acid Group 3: Charged Polar", "body": "<b>5 charged polar amino acids</b> at cellular pH. <b>2 acidic (negative):</b> aspartate (Asp), glutamate (Glu). <b>3 basic (positive):</b> lysine (Lys), arginine (Arg), histidine (His). Very hydrophilic — always on protein surfaces."}, {"heading": "Peptide Bonds", "body": "A specific <b>condensation reaction</b> joining amino acids. Also called <b>amide bond</b>. Connects the carboxyl of one AA to the amino of the next, releasing water. Peptides have an <b>N-terminus</b> (amino end) and <b>C-terminus</b> (carboxyl end)."}, {"heading": "Protein Structure — 4 Levels", "body": "<b>1° Primary:</b> sequence of amino acids connected by peptide bonds. Listed from N-terminus. Determines all other folding. <b>2° Secondary:</b> local twisting — <b>α-helix</b> (corkscrew) and <b>β-sheets</b> (up-and-down bends). Both held by <b>H-bonds</b>."}, {"heading": "Protein Structure — 3° and 4°", "body": "<b>3° Tertiary:</b> arrangement of secondary structures in <b>3D space</b>. The overall shape of one protein chain. Stabilized by various interactions (H-bonds, disulfide bridges, hydrophobic interactions, ionic bonds). <b>4° Quaternary:</b> interaction of <b>several protein chains</b> (subunits) together."}, {"heading": "Carbohydrates — Basics", "body": "'Hydrate of carbon' — general formula: <b>CₙH₂ₙOₙ</b>. <b>Glucose:</b> 6-carbon aldohexose, C₆H₁₂O₆. Multiple chiral carbons → many <b>stereoisomers</b> (same formula, different 3D arrangement). Glucose has 4 asymmetric carbons → <b>16 possible stereoisomers</b>, each with a different name."}, {"heading": "Glucose Ring Form", "body": "Glucose exists in equilibrium between <b>linear</b> and <b>ring</b> forms. Ring form is <b>more stable</b> (lower energy). Stereochemistry gives each sugar different names and some different chemical properties. Don't memorize names — recognize importance of stereoisomers."}, {"heading": "Glycosidic Bonds", "body": "Bond joining two sugars via a <b>shared oxygen</b> from the hydroxyl group — a <b>condensation reaction</b> (releases water). Two types: <b>α bonds:</b> oriented in same direction (both up or down). <b>β bonds:</b> oriented oppositely (one up, one down). The α or β configuration determines <b>biological role</b>."}, {"heading": "Storage Polysaccharides", "body": "Two major functions of polysaccharides: <b>structure and storage</b>. Storage: <b>Starch</b> (plants) and <b>Glycogen</b> (animals). Both are polymers of D-glucose in <b>α(1-4)</b> configuration with <b>α(1-6) branches</b>. Glycogen has <b>MORE branches</b> than starch."}, {"heading": "Structural Polysaccharides", "body": "<b>Cellulose:</b> most common structural polysaccharide (by far). Polymer of D-glucose in <b>β(1-4)</b> configuration. Humans <b>cannot digest β(1-4)</b> linkage — we can't use cellulose for food! <b>Chitin:</b> insect exoskeleton, contains β(1-4) N-acetylglucosamine units."}, {"heading": "Lipids — Overview", "body": "Formed by stepwise addition of <b>2-carbon acyl chains</b>. Mostly hydrocarbon chains (hydrophobic). <b>6 types:</b> fatty acids, triacylglycerols, phospholipids, glycolipids, steroids, terpenes."}, {"heading": "Fatty Acids", "body": "Long unbranched hydrocarbon chain + <b>carboxyl group</b>. 12-24 carbons, generally <b>even number</b>. Efficient energy storage. <b>Saturated:</b> max hydrogens, no double bonds, packs tightly. <b>Unsaturated:</b> one or more double bonds → kinks → packs <b>less tightly</b>, lower melting point."}, {"heading": "Triacylglycerols & Phospholipids", "body": "<b>Triacylglycerol:</b> 3 fatty acids bonded to glycerol by <b>ester bonds</b> (condensation). Designed for energy storage. Unsaturated fats (vegetable oils) = lower melting points. <b>Phospholipids:</b> phosphorylated alcohol + 2 fatty acids. Two groups: <b>phosphoglycerides</b> (glycerol backbone) and <b>sphingolipids</b> (sphingosine backbone, amide bond)."}, {"heading": "Glycolipids & Steroids", "body": "<b>Glycolipids:</b> replace phosphate of phospholipids with <b>carbohydrates</b>. Found on cell surface. <b>Steroids:</b> 4-ring lipid structure. <b>Cholesterol</b> regulates membrane fluidity. Other steroids (testosterone, estrogen, cortisone) act as <b>hormones</b>."}, {"heading": "Terpenes", "body": "Also called isoprenoids. Synthesized from 5-carbon <b>isoprene</b>. Forms <b>vitamin A</b>, some pigments, and electron carriers. Creates much of the <b>chemical diversity in plants</b> (flavors, scents, colors)."}, {"heading": "Selectively Permeable Membranes", "body": "Many different lipids make up cell membranes. Some lipids form clusters → <b>lipid rafts</b> that attract specific membrane proteins. Cells need high concentrations of right chemicals and must remove waste. <b>Small molecules</b> (O₂, CO₂, ethanol) can diffuse across. <b>Ions</b> (Na⁺, Mg²⁺) <b>cannot</b>. Membranes are <b>amphipathic</b>."}], "quiz": [{"q": "DNA stands for:", "a": ["Deoxyribonucleic acid", "Dinitrogen acid", "Deoxyribo-nitrogen acid", "None"], "c": 0}, {"q": "Deoxyribose is missing the:", "a": ["1' hydroxyl", "2' hydroxyl", "3' hydroxyl", "5' phosphate"], "c": 1}, {"q": "Three parts of a nucleotide:", "a": ["Amino, carboxyl, R group", "Phosphate, sugar, base", "Lipid, protein, carb", "H, O, N"], "c": 1}, {"q": "Purines have ___ ring(s):", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Pyrimidines have ___ ring(s):", "a": ["1", "2", "3", "4"], "c": 0}, {"q": "Which are purines?", "a": ["A and G", "C and T", "U and C", "T and A"], "c": 0}, {"q": "Which are pyrimidines?", "a": ["A and G", "C, T, and U", "Only C", "Only T"], "c": 1}, {"q": "Adenine pairs with (DNA):", "a": ["Cytosine", "Guanine", "Thymine", "Adenine"], "c": 2}, {"q": "Guanine pairs with:", "a": ["Adenine", "Thymine", "Cytosine", "Uracil"], "c": 2}, {"q": "In RNA, uracil replaces:", "a": ["Adenine", "Cytosine", "Guanine", "Thymine"], "c": 3}, {"q": "DNA strands are:", "a": ["Parallel", "Antiparallel", "Perpendicular", "Random"], "c": 1}, {"q": "Complementary means:", "a": ["Identical strands", "Knowing one base tells the partner", "Random pairing", "No pairing"], "c": 1}, {"q": "RNA is:", "a": ["Double-stranded", "Single-stranded", "Triple-stranded", "No strands"], "c": 1}, {"q": "A hairpin forms when RNA:", "a": ["Breaks apart", "Base-pairs with itself", "Becomes DNA", "Dissolves"], "c": 1}, {"q": "Phosphoanhydride bonds connect:", "a": ["Bases", "Sugars", "Phosphates to each other", "Amino acids"], "c": 2}, {"q": "ATP is adenosine:", "a": ["Monophosphate", "Diphosphate", "Triphosphate", "No phosphate"], "c": 2}, {"q": "How many amino acids in proteins?", "a": ["4", "12", "20", "26"], "c": 2}, {"q": "Nonpolar amino acids have ___ side chains:", "a": ["Charged", "Hydrocarbon (hydrophobic)", "Acidic", "Basic"], "c": 1}, {"q": "How many nonpolar amino acids?", "a": ["5", "6", "9", "12"], "c": 2}, {"q": "Charged polar: acidic AAs have ___ charge:", "a": ["Positive", "Negative", "Neutral", "Variable"], "c": 1}, {"q": "Peptide bond is a type of:", "a": ["Hydrolysis", "Condensation reaction", "Oxidation", "Reduction"], "c": 1}, {"q": "Peptide bond connects:", "a": ["Two sugars", "Carboxyl to amino", "Phosphate to sugar", "Base to sugar"], "c": 1}, {"q": "Primary structure is:", "a": ["3D shape", "AA sequence", "Helix/sheet", "Subunit interactions"], "c": 1}, {"q": "α-helix and β-sheet are ___ structure:", "a": ["Primary", "Secondary", "Tertiary", "Quaternary"], "c": 1}, {"q": "Secondary structure held by:", "a": ["Peptide bonds", "Hydrogen bonds", "Ionic bonds", "Covalent only"], "c": 1}, {"q": "Tertiary structure is:", "a": ["AA sequence", "Local twisting", "Overall 3D arrangement", "Multiple chains"], "c": 2}, {"q": "Quaternary structure involves:", "a": ["One chain", "Multiple protein chains together", "Only α-helices", "Only β-sheets"], "c": 1}, {"q": "General carbohydrate formula:", "a": ["CₙH₂ₙOₙ", "CₙHₙOₙ", "CₙH₂ₙ₊₂", "CHO"], "c": 0}, {"q": "Glucose has ___ asymmetric carbons:", "a": ["0", "2", "4", "6"], "c": 2}, {"q": "Glucose ring form is ___ than linear:", "a": ["Less stable", "More stable", "Same", "Impossible"], "c": 1}, {"q": "α glycosidic bonds are oriented:", "a": ["Oppositely", "Same direction", "Random", "No direction"], "c": 1}, {"q": "β glycosidic bonds are oriented:", "a": ["Same direction", "Oppositely", "Random", "No direction"], "c": 1}, {"q": "Starch is a ___ polysaccharide:", "a": ["Structural", "Storage", "Neither", "Both"], "c": 1}, {"q": "Glycogen is found in:", "a": ["Plants", "Animals", "Bacteria only", "Fungi only"], "c": 1}, {"q": "Glycogen has ___ branches than starch:", "a": ["Fewer", "More", "Same", "No"], "c": 1}, {"q": "Cellulose uses ___ linkage:", "a": ["α(1-4)", "β(1-4)", "α(1-6)", "β(1-6)"], "c": 1}, {"q": "Humans ___ digest cellulose:", "a": ["Can easily", "Cannot", "Sometimes can", "Only when cooked"], "c": 1}, {"q": "Chitin is found in:", "a": ["Plants", "Insect exoskeletons", "Human bones", "Fish scales"], "c": 1}, {"q": "Saturated fats have:", "a": ["Double bonds", "No double bonds", "Triple bonds", "Rings"], "c": 1}, {"q": "Unsaturated fats have ___ melting points:", "a": ["Higher", "Lower", "Same", "No"], "c": 1}, {"q": "Triacylglycerol = glycerol + ___ fatty acids:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "How many types of lipids?", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "Cholesterol is a:", "a": ["Fatty acid", "Phospholipid", "Steroid", "Terpene"], "c": 2}, {"q": "Cholesterol regulates:", "a": ["pH", "Membrane fluidity", "DNA replication", "Protein folding"], "c": 1}, {"q": "Terpenes are made from:", "a": ["Glucose", "Amino acids", "Isoprene (5-carbon)", "Glycerol"], "c": 2}, {"q": "Small molecules like O₂ ___ cross membranes:", "a": ["Cannot", "Can diffuse across", "Need pumps", "Need ATP"], "c": 1}, {"q": "Ions like Na⁺ ___ cross membranes freely:", "a": ["Can", "Cannot", "Sometimes", "Always"], "c": 1}, {"q": "Lipid rafts are:", "a": ["Boats", "Clusters of lipids in membrane", "Storage vesicles", "Protein channels"], "c": 1}, {"q": "Virtually all protein amino acids are:", "a": ["D-isomer", "L-isomer", "Both equally", "Neither"], "c": 1}, {"q": "Transcription makes ___ from DNA:", "a": ["Protein", "Lipid", "RNA", "More DNA"], "c": 2}]}, {"id": "bio-l4", "title": "Lesson 4: Enzymes & ATP", "ln": "BIO · L4", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Recognize ATP structure and how it releases energy. <b>2)</b> Understand the role of enzymes in regulating reactions. <b>3)</b> Describe key features allowing enzymes to function as catalysts. <b>4)</b> Discuss how regulating enzyme function is important for normal cell function and medicine."}, {"heading": "ATP — Structure", "body": "ATP (<b>adenosine triphosphate</b>) is a high-energy compound. Phosphates are connected by <b>phosphoanhydride bonds</b> — this is where most energy is stored. Structure: adenine base + ribose sugar + 3 phosphate groups. The bonds between the 2nd and 3rd phosphate are the 'high energy' bonds."}, {"heading": "ATP — Energy Release", "body": "<b>Hydrolyze 1 phosphate:</b> ATP → ADP + Pᵢ (most reactions). For reactions demanding MORE energy: ATP → <b>AMP + PPᵢ</b> (e.g., charging tRNAs for protein synthesis). Hydrolysis = adding water to break the bond. The energy released powers cellular work."}, {"heading": "Exergonic vs Endergonic Reactions", "body": "<b>Exergonic:</b> give off energy (−ΔG). Don't require ATP unless storing the energy. Products have LESS energy than reactants. <b>Endergonic:</b> need energy input, usually from ATP. Products have MORE energy than reactants. Reactions linking ATP to a process are called <b>coupled reactions</b>."}, {"heading": "Energy Flow in Life", "body": "Energy comes from <b>food</b> and, through ATP, powers the rest of life. Food → broken down → energy captured as ATP → ATP powers cellular work. ATP is the universal <b>energy currency</b> of the cell."}, {"heading": "Why Cells Need Enzymes", "body": "Some reactions happen spontaneously, but these are <b>NOT regulated</b> by the cell. Cells want reactions to happen <b>when needed</b> (muscles aren't always contracting). Many required reactions <b>won't happen on their own</b> at body temperature. Solution: <b>enzymes</b>."}, {"heading": "Enzymes — Definition", "body": "<b>Enzymes</b> are biomolecules (usually <b>proteins</b>) that <b>speed up reactions</b>. They are a type of <b>catalyst</b> — any molecule that speeds up a chemical reaction without being consumed. Living cells MUST use enzymes to capture energy and use it for their purposes."}, {"heading": "The Fire Analogy", "body": "Sugars like cellulose (paper) give off energy when burned. Paper, once ignited, continues burning. But cells don't have flames — they use <b>enzymes</b> instead. Enzymes couple the energy from breaking sugars into CO₂ + H₂O (just like burning) and use it to <b>make ATP</b>."}, {"heading": "Enzyme Property 1: Cannot Change Products", "body": "Enzymes <b>cannot change WHAT is produced</b> — sugar still converts to CO₂ + H₂O. The enzyme only changes <b>HOW FAST</b> the reaction occurs. The same products form with or without the enzyme; the enzyme just makes it happen fast enough to be useful."}, {"heading": "Enzyme Property 2: Specificity", "body": "Enzymes are <b>specific</b> — they only work on a few types of molecules. Different enzymes speed up different reactions. Like a lock and key — each enzyme fits specific substrates. This specificity allows cells to control which reactions happen and when."}, {"heading": "Enzyme Property 3: Lower Activation Energy", "body": "Enzymes work by <b>lowering the activation energy</b> (Ea) — the energy required to START a reaction. The <b>total energy released or consumed does NOT change</b> — only the barrier to get the reaction started is reduced. Think of it as lowering a hill that reactants must climb over."}, {"heading": "Active Site & Substrate", "body": "Enzymes must bind their target molecule (<b>substrate</b>) at the <b>active site</b> — the specific chemical site where the reaction takes place. Process: <b>1)</b> Enzyme binds substrate. <b>2)</b> Carries out the reaction. <b>3)</b> Releases the product. Binding at the active site is what lowers activation energy."}, {"heading": "Induced Fit Model", "body": "When the substrate binds, the enzyme <b>changes shape slightly</b> to fit the substrate more tightly (induced fit). This is more accurate than the simple 'lock and key' model. The shape change helps position the substrate correctly for the reaction to occur."}, {"heading": "ATP Coupling with Enzymes", "body": "For coupled reactions, the enzyme must bind <b>BOTH ATP and the substrate</b>. ATP causes the enzyme to <b>change its shape</b>. When the reaction occurs, energy from the shape change is <b>transferred to the substrate</b> to make the product. ATP → ADP + Pᵢ in the process."}, {"heading": "Cofactors", "body": "A <b>cofactor</b> is an additional molecule an enzyme needs to function. Many cofactors are <b>essential vitamins and minerals</b> (this is WHY vitamins are essential!). Cofactors do NOT permanently change when bound. <b>ATP is NOT a cofactor</b> because it gets converted to ADP + Pᵢ (it's consumed, not recycled)."}, {"heading": "Factors Affecting Enzyme Function", "body": "Enzymes are affected by: <b>1) pH</b> — each enzyme has an optimal pH (stomach enzymes need low pH). <b>2) Temperature</b> — too hot denatures the enzyme. <b>3) Ion concentration</b> — affects enzyme shape. Deviations from optimal conditions reduce or eliminate enzyme activity."}, {"heading": "Enzyme Pathways", "body": "Different enzymes control <b>different steps</b> in chemical processes (metabolic pathways). Turning off <b>one enzyme</b> can stop the <b>entire set of reactions</b>. This is how cells regulate complex processes — control one key enzyme and the whole pathway responds."}, {"heading": "Enzyme Inhibitors — Overview", "body": "<b>Enzyme inhibitors</b> are molecules that <b>block an enzyme from working</b>. Two main types: competitive and non-competitive (allosteric). Inhibitors are just as <b>specific</b> as enzymes — one inhibitor usually only works well against one enzyme."}, {"heading": "Competitive Inhibitors", "body": "Bind at the <b>active site</b> — they 'compete' with the substrate for the same binding spot. Usually have a <b>similar chemical structure</b> to the substrate. Can be overcome by increasing substrate concentration (more substrate outcompetes the inhibitor)."}, {"heading": "Non-Competitive (Allosteric) Inhibitors", "body": "Bind <b>somewhere else on the enzyme</b> (NOT the active site) and cause it to <b>change shape</b>, distorting the active site. The substrate can still bind but the reaction can't proceed properly. CANNOT be overcome by adding more substrate."}, {"heading": "Drugs as Enzyme Inhibitors", "body": "Many commonly used <b>drugs are enzyme inhibitors</b>. Examples: aspirin inhibits COX enzymes (reduces inflammation), statins inhibit HMG-CoA reductase (lowers cholesterol), ACE inhibitors (lower blood pressure). Drug design often focuses on making specific enzyme inhibitors."}, {"heading": "Activation Energy — Diagram", "body": "Energy diagram: reactants at one level, products at another. The <b>hump</b> between them = activation energy (Ea). <b>Without enzyme:</b> high Ea (reaction is slow). <b>With enzyme:</b> lower Ea (reaction is fast). The ΔG (overall energy change) is the <b>SAME</b> either way."}, {"heading": "Enzyme Saturation", "body": "At low substrate concentration, increasing substrate speeds up the reaction. At high concentration, all active sites are occupied → <b>saturation</b>. Adding more substrate doesn't help — the reaction rate plateaus at <b>Vmax</b>. The only way to go faster is to add more enzyme."}, {"heading": "Enzyme Nomenclature", "body": "Most enzyme names end in <b>-ase</b>. Named after their substrate or reaction type. Examples: <b>lactase</b> (breaks down lactose), <b>lipase</b> (breaks down lipids), <b>DNA polymerase</b> (builds DNA polymers), <b>ATP synthase</b> (synthesizes ATP)."}, {"heading": "Key Concepts Summary", "body": "<b>ATP:</b> energy currency, phosphoanhydride bonds, ATP→ADP+Pᵢ. <b>Exergonic:</b> releases energy. <b>Endergonic:</b> requires energy. <b>Enzymes:</b> protein catalysts, lower Ea, specific, unchanged. <b>Active site:</b> where substrate binds. <b>Cofactors:</b> helpers (vitamins/minerals). <b>Inhibitors:</b> competitive (active site) vs allosteric (elsewhere)."}], "quiz": [{"q": "ATP stands for:", "a": ["Adenine triphosphate", "Adenosine triphosphate", "Amino triphosphate", "Acid triphosphate"], "c": 1}, {"q": "High-energy bonds in ATP are:", "a": ["Covalent C-C", "Phosphoanhydride", "Hydrogen bonds", "Ionic bonds"], "c": 1}, {"q": "ATP → ADP releases energy by removing:", "a": ["A base", "A sugar", "1 phosphate", "All 3 phosphates"], "c": 2}, {"q": "For extra energy, ATP converts to:", "a": ["ADP", "AMP", "GTP", "NAD"], "c": 1}, {"q": "Exergonic reactions:", "a": ["Need energy input", "Release energy", "Are always slow", "Require ATP"], "c": 1}, {"q": "Endergonic reactions:", "a": ["Release energy", "Need energy (usually ATP)", "Happen spontaneously", "Don't involve enzymes"], "c": 1}, {"q": "ATP is the cell's energy:", "a": ["Storage", "Currency", "Waste", "Structure"], "c": 1}, {"q": "Enzymes are usually:", "a": ["Lipids", "Carbohydrates", "Proteins", "Nucleic acids"], "c": 2}, {"q": "A catalyst:", "a": ["Slows reactions", "Speeds up reactions", "Changes products", "Is consumed"], "c": 1}, {"q": "Enzymes ___ the products of a reaction:", "a": ["Change", "Cannot change", "Destroy", "Create new"], "c": 1}, {"q": "Enzymes are:", "a": ["Nonspecific", "Specific to few molecules", "Universal", "Random"], "c": 1}, {"q": "Enzymes lower:", "a": ["Total energy change", "Activation energy", "Product energy", "Substrate energy"], "c": 1}, {"q": "Activation energy is:", "a": ["Total energy released", "Energy to START a reaction", "Product energy", "ATP energy"], "c": 1}, {"q": "With an enzyme, total ΔG:", "a": ["Increases", "Decreases", "Stays the same", "Becomes zero"], "c": 2}, {"q": "The substrate binds at the:", "a": ["Random location", "Active site", "Allosteric site", "Membrane"], "c": 1}, {"q": "Enzyme steps: bind substrate, react, then:", "a": ["Bind again", "Release product", "Dissolve", "Break apart"], "c": 1}, {"q": "Cofactors are:", "a": ["Substrates", "Additional molecules enzymes need", "Products", "Inhibitors"], "c": 1}, {"q": "Many cofactors are:", "a": ["Sugars", "Essential vitamins and minerals", "Fats", "Water"], "c": 1}, {"q": "ATP is NOT a cofactor because it:", "a": ["Doesn't bind", "Gets converted (consumed)", "Is too small", "Is not organic"], "c": 1}, {"q": "Enzymes are affected by:", "a": ["Only temperature", "Only pH", "pH, temperature, ion concentration", "Nothing"], "c": 2}, {"q": "Stomach enzymes need ___ pH:", "a": ["High (basic)", "Neutral", "Low (acidic)", "Any"], "c": 2}, {"q": "Too much heat ___ enzymes:", "a": ["Activates", "Denatures (destroys shape)", "Has no effect", "Strengthens"], "c": 1}, {"q": "Turning off one enzyme in a pathway:", "a": ["Has no effect", "Can stop the entire pathway", "Speeds it up", "Only affects that step"], "c": 1}, {"q": "Competitive inhibitors bind at:", "a": ["Allosteric site", "Active site", "The membrane", "Nowhere specific"], "c": 1}, {"q": "Competitive inhibitors resemble the:", "a": ["Product", "Cofactor", "Substrate", "Enzyme itself"], "c": 2}, {"q": "Non-competitive inhibitors bind:", "a": ["At the active site", "Somewhere else on the enzyme", "To the substrate", "To ATP"], "c": 1}, {"q": "Allosteric inhibitors cause the enzyme to:", "a": ["Work faster", "Change shape", "Break apart", "Duplicate"], "c": 1}, {"q": "Competitive inhibition can be overcome by:", "a": ["Adding more inhibitor", "Adding more substrate", "Lowering temperature", "Nothing"], "c": 1}, {"q": "Non-competitive inhibition ___ be overcome by more substrate:", "a": ["Can", "Cannot", "Sometimes can", "Always can"], "c": 1}, {"q": "Many drugs work as:", "a": ["Substrates", "Cofactors", "Enzyme inhibitors", "Enzymes themselves"], "c": 2}, {"q": "Aspirin inhibits ___ enzymes:", "a": ["DNA polymerase", "COX", "Lactase", "ATP synthase"], "c": 1}, {"q": "Coupled reactions link ___ to a process:", "a": ["DNA", "Water", "ATP", "Oxygen"], "c": 2}, {"q": "Cells use enzymes instead of:", "a": ["Water", "Flames (heat)", "Light", "Sound"], "c": 1}, {"q": "Energy from food is captured as:", "a": ["Heat only", "ATP", "Light", "Sound"], "c": 1}, {"q": "Breaking sugars → CO₂ + H₂O is like:", "a": ["Freezing", "Burning", "Melting", "Evaporating"], "c": 1}, {"q": "Enzyme names usually end in:", "a": ["‑ose", "‑ase", "‑ine", "‑ate"], "c": 1}, {"q": "Lactase breaks down:", "a": ["Lipids", "Proteins", "Lactose", "DNA"], "c": 2}, {"q": "At Vmax, all active sites are:", "a": ["Empty", "Occupied (saturated)", "Broken", "Inhibited"], "c": 1}, {"q": "To go faster than Vmax, you must:", "a": ["Add more substrate", "Add more enzyme", "Increase temperature", "Lower pH"], "c": 1}, {"q": "Induced fit means the enzyme:", "a": ["Stays rigid", "Changes shape slightly when substrate binds", "Breaks apart", "Doesn't bind"], "c": 1}, {"q": "The energy diagram hump represents:", "a": ["Products", "ΔG", "Activation energy", "Substrate"], "c": 2}, {"q": "Without enzymes, most reactions at body temperature:", "a": ["Are very fast", "Are too slow to sustain life", "Don't change", "Produce heat"], "c": 1}, {"q": "Hydrolysis means breaking bonds by adding:", "a": ["Heat", "Light", "Water", "ATP"], "c": 2}, {"q": "ATP has ___ phosphate groups:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "ADP has ___ phosphate groups:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "AMP has ___ phosphate group(s):", "a": ["1", "2", "3", "0"], "c": 0}, {"q": "Enzymes are NOT consumed — they are:", "a": ["Destroyed", "Recycled/reused", "Excreted", "Stored"], "c": 1}, {"q": "Vitamins are important because they serve as:", "a": ["Energy sources", "Enzyme cofactors", "Structural molecules", "Genetic material"], "c": 1}, {"q": "Spontaneous reactions are:", "a": ["Regulated by cells", "NOT regulated by cells", "Always fast", "Always slow"], "c": 1}, {"q": "An enzyme inhibitor is ___ as the enzyme:", "a": ["Less specific", "Just as specific", "More general", "Random"], "c": 1}]}, {"id": "bio-l5", "title": "Lesson 5: Organelles & Microscopes", "ln": "BIO · L5", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Characterize bacteria by shape and growth character. <b>2)</b> Describe various microscope types and uses. <b>3)</b> Discuss structure and function of cellular organelles."}, {"heading": "Prokaryotes vs Eukaryotes", "body": "<b>Prokaryotic cells:</b> generally <b>smaller</b>, lack membrane-bound organelles. Include bacteria and archaea. <b>Eukaryotic cells:</b> larger, have more organized DNA, contain <b>multiple membrane-bound organelles</b>. Include plants, animals, fungi, protists. Life requires cells."}, {"heading": "Bacterial Shapes", "body": "Three main shapes: <b>Cocci</b> — spherical. <b>Bacillus</b> — rod-shaped. <b>Spirillum</b> — spiral. Also classified by clustering: <b>Staphylo-</b> = clusters (like grapes). <b>Strepto-</b> = chains. Example: <i>Streptococcus</i> = chains of spheres; <i>Staphylococcus</i> = clusters of spheres."}, {"heading": "Light Microscopes", "body": "Most common in biology. <b>Brightfield:</b> transmitted light + colored stains. Includes <b>phase contrast</b> and <b>differential interference contrast (DIC)</b> — make unstained samples more visible. <b>Fluorescent:</b> uses emitted light from special chemicals to stain target molecules specifically."}, {"heading": "Advanced Light Microscopes", "body": "<b>Confocal:</b> lasers + fluorescence + special optics → 3D images. <b>Deconvolution:</b> computers improve image quality for 3D structures. <b>Super-resolution:</b> fluorescence + lasers + quantum mechanics → see structures never before visible with light microscopes (beyond diffraction limit)."}, {"heading": "Electron Microscopes", "body": "See the smallest structures but <b>cannot be used with living specimens</b>. Use electron beams and magnets instead of light and lenses. Two types: <b>SEM (Scanning):</b> looks at surface only, sample coated with gold ('gold sputter'), creates 3D surface image. <b>TEM (Transmission):</b> shoots electrons through ultra-thin samples, higher magnification (200×+), sees internal structures."}, {"heading": "Plasma Membrane", "body": "<b>Lipid bilayer</b> with polar heads and hydrophobic interior. Found in <b>BOTH</b> prokaryotes and eukaryotes. Forms the <b>limiting boundary</b> of the cell. <b>Semi-permeable:</b> gases pass through; water and ions cannot cross freely. Proteins transport specific molecules in/out. Many carbohydrates attached to proteins and lipids."}, {"heading": "Cytoplasm", "body": "Material <b>outside the nucleus</b> and <b>inside the plasma membrane</b>. Contains all organelles, cytoskeleton, and the cytosol (liquid portion). Site of many metabolic reactions. Gel-like consistency."}, {"heading": "Nucleus", "body": "The '<b>brain</b>' of the cell — holds information (DNA) and controls cell functions. Has its own <b>lipid bilayer</b> (nuclear envelope) with <b>nuclear pores</b> regulating movement in/out. DNA organized into <b>chromosomes</b>. Place where chromosomes are <b>replicated</b> and RNA is <b>transcribed</b>."}, {"heading": "Cytoskeleton — Overview", "body": "The '<b>bones</b>' of the cell — provides structure and support. Also acts as a <b>highway</b> to move products from one place to another. Three major fiber types: <b>microfilaments</b> (smallest), <b>intermediate filaments</b> (middle), <b>microtubules</b> (largest)."}, {"heading": "Microfilaments", "body": "Made of <b>actin</b>. Smallest fiber (<b>5-6 nm</b> wide). Have polarity (grow on one end, disassemble on other). Functions: form the <b>cleavage furrow</b> during cell division, serve as <b>contractile fibers in muscles</b>. Essential for cell movement and shape changes."}, {"heading": "Intermediate Filaments", "body": "Middle size (~<b>10 nm</b> wide). Most <b>stable</b> — change less frequently than others. Common at sites of <b>mechanical stress</b>. <b>Tissue-specific</b> — used as diagnostic tools in medicine (e.g., keratin in skin, vimentin in connective tissue). Provide structural integrity."}, {"heading": "Microtubules", "body": "<b>Largest</b> fibers (~<b>25 nm</b> wide). Made of <b>α and β tubulin</b> subunits. Like actin, they are <b>polarized</b> (+ and − end). Provide a '<b>superhighway</b>' for directional transport in the cell. Also form cilia, flagella, and the mitotic spindle."}, {"heading": "Cilia and Flagella", "body": "Both built from microtubules. <b>Cilia:</b> short, oar-like processes that beat back and forth (power + return stroke). Line respiratory tract, fallopian tubes. <b>Flagella:</b> long processes that spin propeller-like to push cells forward. Example: sperm cells. Both anchored by <b>basal bodies</b>."}, {"heading": "Centrosomes and Basal Bodies", "body": "<b>Basal bodies:</b> serve as base/anchor for cilia and flagella. <b>Centrosomes:</b> organize microtubules during <b>cell division</b>. 2 per cell, one on each side of the nucleus. Similar in structure to basal bodies. Contain <b>centrioles</b>."}, {"heading": "Ribosomes", "body": "Found in <b>BOTH</b> prokaryotes and eukaryotes. Location of <b>protein synthesis</b>. Complex of proteins + structural RNAs. <b>Most numerous organelle</b> in cells. Relatively small (prokaryotes: 25 nm, eukaryotes: 30 nm). <b>NOT membrane-bound</b>."}, {"heading": "Endoplasmic Reticulum (ER)", "body": "Series of <b>folded membranes</b> within the cell. Found in <b>eukaryotes only</b>. <b>Rough ER:</b> has ribosomes on surface (looks 'spotted'), site of membrane/secreted protein synthesis. <b>Smooth ER:</b> site of most <b>membrane lipid synthesis</b>. Cells have both; ratio depends on cell function."}, {"heading": "Golgi Complex", "body": "Series of <b>flattened membranes</b> that processes proteins and lipids. Adds <b>complex carbohydrates</b> to proteins (glycosylation). Adds <b>phosphates</b> to membrane lipids. Vesicles carry proteins between stacks. Major <b>processing and sorting center</b> of the cell — packages proteins for their final destination."}, {"heading": "Vacuole", "body": "Extremely <b>large and prominent in plant cells</b>; smaller and more numerous in animal cells. In animals: primarily <b>storage</b> granules. In plants: storage, some digestive functions, but primarily regulates <b>turgor pressure</b> — supplies rigidity to the plant cell (why plants wilt without water)."}, {"heading": "Lysosome", "body": "'<b>Digestive</b>' organelle — breaks down storage molecules, endocytosed material, or cellular components no longer needed. Must be <b>isolated</b> from the rest of the cell (to prevent self-digestion!). Digested particles released into cytoplasm and <b>recycled</b>. Contains hydrolytic enzymes at acidic pH."}, {"heading": "Peroxisome", "body": "Both <b>generates AND degrades hydrogen peroxide</b> (H₂O₂). <b>Detoxifies</b> certain chemicals. Breaks down <b>long-chain fatty acids</b>. Has a role in <b>photorespiration</b> (plants). First isolated as a biochemical fraction. Named for its peroxide-related functions."}, {"heading": "Mitochondria", "body": "Found in <b>both plants and animals</b>. About the size of a <b>bacterium</b>. Has <b>2 membranes</b> (inner and outer). <b>Cristae:</b> folds of inner membrane (increase surface area). <b>Matrix:</b> semi-liquid material between cristae. <b>Oxidizes sugars/food for energy</b> — primary site of <b>ATP generation</b>."}, {"heading": "Chloroplast", "body": "Found <b>only in plants</b>. Large (5-10 μm). Has <b>3 membrane systems:</b> inner, outer, and thylakoid. <b>Thylakoid:</b> flattened membrane sacs. <b>Grana:</b> stacks of thylakoids. <b>Stroma:</b> fluid around thylakoids. Site of <b>photosynthesis</b> (carbon fixation in stroma). Also converts nitrates → ammonia for amino acids."}, {"heading": "Endosymbiont Theory", "body": "Both mitochondria and chloroplasts have their own <b>circular DNA, ribosomes, tRNAs</b>, and internal membranes. Ribosomes are more similar to <b>prokaryotic</b> than eukaryotic. Size similar to prokaryotes (~2 μm). Theory: early eukaryotes engulfed bacteria (<b>phagocytosis</b>) → developed <b>symbiotic relationship</b>. Cyanobacteria → chloroplasts; aerobic bacteria → mitochondria."}, {"heading": "Cell Wall & Extracellular Matrix", "body": "<b>Plant cell wall:</b> primary wall (cellulose + polysaccharides), secondary wall (lignin, more cellulose). <b>Plasmodesmata:</b> cytoplasmic links between plant cells through walls. <b>Bacterial walls:</b> peptidoglycans. <b>Animal ECM:</b> collagen + proteoglycans, elastic, aids support/recognition. <b>Basal lamina:</b> ECM around muscle cells."}, {"heading": "Cell Junctions", "body": "<b>Plasmodesmata</b> (plants): connections through cell walls allowing chemical passage. <b>Animal cell junctions:</b> many types serving as barriers (tight junctions) or providing signaling/structural connections (gap junctions, desmosomes). Connections serve as both <b>barriers</b> and <b>signaling conduits</b>."}], "quiz": [{"q": "Prokaryotes lack:", "a": ["DNA", "Ribosomes", "Membrane-bound organelles", "Cell membrane"], "c": 2}, {"q": "Cocci bacteria are:", "a": ["Rod-shaped", "Spherical", "Spiral", "Square"], "c": 1}, {"q": "Bacillus bacteria are:", "a": ["Spherical", "Rod-shaped", "Spiral", "Flat"], "c": 1}, {"q": "Strepto- means:", "a": ["Clusters", "Chains", "Singles", "Pairs"], "c": 1}, {"q": "Staphylo- means:", "a": ["Chains", "Singles", "Clusters", "Spirals"], "c": 2}, {"q": "SEM microscope shows:", "a": ["Internal structures", "Surface only", "Living cells", "DNA"], "c": 1}, {"q": "TEM microscope shows:", "a": ["Surface only", "Internal structures", "Only live cells", "Only bacteria"], "c": 1}, {"q": "Electron microscopes cannot view:", "a": ["Bacteria", "Viruses", "Living specimens", "Metals"], "c": 2}, {"q": "Fluorescent microscopes use:", "a": ["Transmitted light only", "Emitted light from special chemicals", "Electron beams", "X-rays"], "c": 1}, {"q": "Plasma membrane is a:", "a": ["Protein layer", "Lipid bilayer", "Carbohydrate wall", "DNA strand"], "c": 1}, {"q": "Plasma membrane is found in:", "a": ["Eukaryotes only", "Prokaryotes only", "Both", "Neither"], "c": 2}, {"q": "Semi-permeable means:", "a": ["Nothing passes", "Everything passes", "Some things pass, others don't", "Only water passes"], "c": 2}, {"q": "The nucleus is the ___ of the cell:", "a": ["Stomach", "Brain", "Heart", "Skin"], "c": 1}, {"q": "DNA is organized into:", "a": ["Ribosomes", "Chromosomes", "Vacuoles", "Lysosomes"], "c": 1}, {"q": "Nuclear pores regulate:", "a": ["DNA replication", "Movement in/out of nucleus", "Cell division only", "pH"], "c": 1}, {"q": "Smallest cytoskeleton fiber:", "a": ["Microtubule", "Intermediate filament", "Microfilament", "Cilia"], "c": 2}, {"q": "Microfilaments are made of:", "a": ["Tubulin", "Keratin", "Actin", "Collagen"], "c": 2}, {"q": "Microtubules are made of:", "a": ["Actin", "α and β tubulin", "Keratin", "Collagen"], "c": 1}, {"q": "Largest cytoskeleton fiber (~25 nm):", "a": ["Microfilament", "Intermediate filament", "Microtubule", "Actin"], "c": 2}, {"q": "Intermediate filaments are used as ___ tools:", "a": ["Cooking", "Diagnostic (tissue-specific)", "Cleaning", "Construction"], "c": 1}, {"q": "Cilia are ___ and beat back and forth:", "a": ["Long", "Short", "Microscopic dots", "Flat"], "c": 1}, {"q": "Flagella move by:", "a": ["Beating", "Spinning propeller-like", "Sliding", "Vibrating"], "c": 1}, {"q": "Ribosomes are the site of:", "a": ["DNA replication", "Protein synthesis", "Lipid synthesis", "ATP production"], "c": 1}, {"q": "Ribosomes are found in:", "a": ["Only eukaryotes", "Only prokaryotes", "Both", "Neither"], "c": 2}, {"q": "Ribosomes are:", "a": ["Membrane-bound", "NOT membrane-bound", "Nuclear only", "Cytoskeleton"], "c": 1}, {"q": "Rough ER has ___ on its surface:", "a": ["Lipids", "Carbohydrates", "Ribosomes", "DNA"], "c": 2}, {"q": "Smooth ER makes:", "a": ["Proteins", "Membrane lipids", "DNA", "ATP"], "c": 1}, {"q": "ER is found in:", "a": ["Prokaryotes only", "Eukaryotes only", "Both", "Neither"], "c": 1}, {"q": "Golgi complex is the cell's:", "a": ["Energy factory", "Processing and sorting center", "DNA storage", "Waste disposal"], "c": 1}, {"q": "Golgi adds ___ to proteins:", "a": ["DNA", "Complex carbohydrates", "Lipids only", "Nothing"], "c": 1}, {"q": "Vacuoles are largest in:", "a": ["Animal cells", "Plant cells", "Bacteria", "Viruses"], "c": 1}, {"q": "Plant vacuoles regulate:", "a": ["DNA replication", "Turgor pressure", "Photosynthesis", "Cell division"], "c": 1}, {"q": "Lysosomes are ___ organelles:", "a": ["Energy", "Digestive", "Storage", "Structural"], "c": 1}, {"q": "Lysosomes must be isolated to prevent:", "a": ["Overheating", "Self-digestion of the cell", "DNA damage", "Osmosis"], "c": 1}, {"q": "Peroxisomes deal with:", "a": ["DNA", "Hydrogen peroxide", "Glucose only", "Proteins only"], "c": 1}, {"q": "Mitochondria have ___ membranes:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Cristae are folds of the:", "a": ["Outer membrane", "Inner mitochondrial membrane", "Nuclear envelope", "ER"], "c": 1}, {"q": "Mitochondria generate:", "a": ["DNA", "Lipids", "ATP", "Carbohydrates"], "c": 2}, {"q": "Chloroplasts are found only in:", "a": ["Animals", "Plants", "Bacteria", "Fungi"], "c": 1}, {"q": "Grana are stacks of:", "a": ["Cristae", "Thylakoids", "Ribosomes", "Nuclei"], "c": 1}, {"q": "Photosynthesis occurs in:", "a": ["Mitochondria", "Chloroplasts", "Nucleus", "ER"], "c": 1}, {"q": "Endosymbiont theory: mitochondria were once:", "a": ["Viruses", "Free-living bacteria", "Plant cells", "Nuclei"], "c": 1}, {"q": "Evidence for endosymbiont theory: mitochondria have own:", "a": ["Cell wall", "Circular DNA and ribosomes", "Nucleus", "Flagella"], "c": 1}, {"q": "Plant cell walls contain:", "a": ["Collagen", "Peptidoglycan", "Cellulose", "Chitin"], "c": 2}, {"q": "Bacterial cell walls contain:", "a": ["Cellulose", "Peptidoglycan", "Collagen", "Lignin"], "c": 1}, {"q": "Plasmodesmata connect:", "a": ["Animal cells", "Plant cells through cell walls", "Bacteria", "Organelles"], "c": 1}, {"q": "Animal extracellular matrix contains mostly:", "a": ["Cellulose", "Collagen and proteoglycans", "Peptidoglycan", "Chitin"], "c": 1}, {"q": "Confocal microscopes create:", "a": ["2D images", "3D images", "Only surface images", "Only DNA images"], "c": 1}, {"q": "Cytoplasm is between:", "a": ["Two cells", "Nucleus and plasma membrane", "ER and Golgi", "Two nuclei"], "c": 1}, {"q": "Centrosomes organize microtubules during:", "a": ["Protein synthesis", "Cell division", "Photosynthesis", "Digestion"], "c": 1}]}, {"id": "bio-l6", "title": "Lesson 6: Membranes & Membrane Proteins", "ln": "BIO · L6", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Describe biological functions of cellular membranes. <b>2)</b> Describe the fluid-mosaic model. <b>3)</b> Characterize 3 major types of membrane proteins by how they interact with the membrane. <b>4)</b> Describe main functional classes of membrane proteins."}, {"heading": "Membranes as Barriers", "body": "Membranes serve as <b>semi-permeable barriers</b> for cells. Semi-permeable = some things pass through, others cannot. Membranes contain both <b>lipids</b> and <b>proteins</b>. This selective permeability is essential for maintaining the internal environment of the cell."}, {"heading": "What Crosses and What Doesn't", "body": "<b>Ions</b> need water around them — will <b>NEVER</b> pass through a membrane on their own. <b>Uncharged gases</b> (O₂, CO₂, N₂) pass through <b>easily</b>. <b>Water</b> does NOT pass easily — hydrogen bonds prevent it from entering the hydrophobic core. Small nonpolar molecules cross freely; large or charged molecules cannot."}, {"heading": "Concentration Gradient", "body": "A <b>concentration gradient</b> is a difference in concentration across a membrane (often ions, but doesn't have to be). <b>Passive transport:</b> movement of substances <b>DOWN</b> their concentration gradient <b>without</b> adding energy. Substances naturally move from high → low concentration."}, {"heading": "Osmosis", "body": "<b>Osmosis:</b> movement of <b>water</b> across a membrane to reduce a concentration gradient. Water moves toward the side with MORE solute (to dilute it). <b>Hypertonic</b> outside → cell shrivels (water leaves). <b>Hypotonic</b> outside → cell swells and may burst (water enters). <b>Isotonic</b> → no net water movement."}, {"heading": "Tonicity Effects on Cells", "body": "<b>Hypertonic solution:</b> more solute outside → water leaves cell → cell shrinks/crenates. <b>Hypotonic solution:</b> less solute outside → water enters cell → cell swells/lyses. <b>Isotonic:</b> equal solute inside and outside → no change. Swollen or shriveled cells don't pass through capillaries well — this is medically important!"}, {"heading": "Fluid Mosaic Model — Overview", "body": "<b>Fluid:</b> lipids and proteins in membranes <b>MOVE</b> — they're not fixed in place. <b>Mosaic:</b> different proteins and lipids found on <b>different parts</b> of the cell — like tiles in a mosaic. The combination = the <b>fluid-mosaic model</b> (Singer & Nicolson, 1972)."}, {"heading": "Lipid Bilayer Asymmetry", "body": "Lipids are <b>NOT distributed evenly</b> between the two leaflets. <b>Glycolipids:</b> found ONLY on the extracellular surface. Other lipids found primarily on the inner surface. The head group can vary: choline, serine, inositol, ethanolamine, etc. — different heads = different properties."}, {"heading": "Lipid Movement in Membranes", "body": "Three types of lipid movement: <b>1) Rotation:</b> spinning of a lipid in place (fast). <b>2) Lateral diffusion:</b> movement within the same leaflet/plane (fast). <b>3) Transverse diffusion (flip-flop):</b> changing sides of the membrane (very slow without help). <b>Flippases:</b> enzymes that aid transverse diffusion."}, {"heading": "Saturated vs Unsaturated in Membranes", "body": "<b>Saturated fatty acids:</b> pack tightly → membrane is more rigid, lipids move <b>slowly</b>. <b>Unsaturated fatty acids:</b> kinks from double bonds → don't pack well → membrane is more fluid, lipids move <b>easily</b>. The ratio of saturated:unsaturated controls <b>membrane fluidity</b>."}, {"heading": "Glycolipids on Cell Surface", "body": "Glycolipids spread on the <b>outside</b> of cells. <b>Blood type (ABO)</b> is determined by glycolipids! Type A has a different sugar than Type B. Type O has no sugar in that position. Glycolipids are <b>species-specific</b> and can distinguish different bacteria — important for immune recognition."}, {"heading": "Membrane Protein Functions — 5 Classes", "body": "Membrane proteins serve many functions: <b>1) Signaling</b> (receive and transmit information). <b>2) Enzymes</b> (catalyze reactions at membrane). <b>3) Transporters</b> (move molecules across). <b>4) Cell-cell recognition</b> (identify self vs foreign). <b>5) Binding/junctions</b> (connect cells together)."}, {"heading": "Glycoproteins", "body": "Most membrane proteins are <b>glycoproteins</b> — proteins with carbohydrates attached. Most glycoproteins <b>require their sugars to function</b> properly. The carbohydrate portions face the extracellular side and are important for recognition, signaling, and protection."}, {"heading": "3 Types of Membrane Proteins", "body": "<b>1) Integral membrane proteins:</b> embedded IN the bilayer, may cross it completely. <b>2) Peripheral membrane proteins:</b> bind non-covalently to ONE side only. <b>3) Lipid-anchored proteins:</b> covalently bound to lipids that insert into the membrane. Each type interacts with the membrane differently."}, {"heading": "Integral Membrane Proteins — Overview", "body": "Key feature: enter completely into the <b>hydrophobic part</b> of the membrane. To move things across, must cross the membrane completely (<b>transmembrane</b>). Alpha helices that cross the membrane are easy to identify — look for <b>hydrophobic amino acids all in a row</b>. 4 major kinds."}, {"heading": "Integral Type 1: Membrane Receptors", "body": "Transmit information <b>only INTO the cell</b>. Use <b>signal transduction</b> to move information from membrane to nucleus. Include: <b>hormone receptors</b>, <b>growth factor receptors</b>, <b>chemical sensors</b> (smell, taste). Help cells respond to their environment."}, {"heading": "Integral Type 2: Protein Channels", "body": "Allow small molecules and ions to pass through the membrane. Always move substances <b>DOWN their concentration gradient</b> (passive). Work like <b>tunnels</b> through the membrane. Open only when triggered (e.g., by neurotransmitters like dopamine). Used mostly for <b>ions</b>, especially in nervous system and muscles."}, {"heading": "Integral Type 3: Protein Transporters", "body": "Bind to specific substrates and <b>physically change shape</b> to move molecules across. May be <b>active</b> (energy-requiring, can go AGAINST gradient) or <b>passive</b> (no energy, down gradient). Move sugars, amino acids, wastes, and key ions. Active transport often uses ATP."}, {"heading": "Integral Type 4: Membrane Resident Proteins", "body": "Bound to membrane but may be there for <b>structural reasons</b> or to help other molecules function. Often hold <b>cytoskeleton</b> or <b>enzymes</b> to the membrane surface. Part of signal transduction — <b>effector proteins</b> are often membrane-bound."}, {"heading": "Peripheral Membrane Proteins", "body": "Bind to a membrane on <b>ONE side only</b>. May bind to other membrane proteins or to hydrophilic lipid head groups. <b>Not embedded</b> in the hydrophobic core. Many serve as <b>regulators and signaling proteins</b> of receptors. Can be washed off with salt solutions (loosely attached)."}, {"heading": "Lipid-Linked (Anchored) Proteins", "body": "Don't attach to membranes by themselves — use a <b>lipid 'tail'</b> covalently bound to the protein. <b>Fatty acids or terpenes</b> can attach intracellular proteins. <b>GPI-linked proteins:</b> use carbohydrates + phospholipids to attach on the extracellular side. GPI proteins can be <b>cleaved off</b> by phospholipase. Often very small."}, {"heading": "Active vs Passive Transport", "body": "<b>Passive transport:</b> no energy needed, moves DOWN concentration gradient. Includes diffusion, osmosis, facilitated diffusion (channels/passive transporters). <b>Active transport:</b> requires energy (usually ATP), moves AGAINST concentration gradient. Essential for maintaining ion gradients (Na⁺/K⁺ pump)."}, {"heading": "Channels vs Transporters", "body": "<b>Channels:</b> form a pore/tunnel, substance flows through when open, always passive, very fast, selective by size/charge. <b>Transporters:</b> bind substrate, change shape, release on other side, can be active or passive, slower than channels, highly specific."}, {"heading": "Membrane Fluidity Factors", "body": "Fluidity affected by: <b>1) Unsaturated fatty acids</b> → increase fluidity (kinks prevent tight packing). <b>2) Cholesterol</b> → moderates fluidity (prevents too fluid or too rigid). <b>3) Temperature</b> → higher T = more fluid. <b>4) Chain length</b> → shorter chains = more fluid. Cells adjust composition to maintain optimal fluidity."}, {"heading": "Key Concepts Summary", "body": "<b>Semi-permeable:</b> gases cross, ions don't. <b>Osmosis:</b> water follows solute (hyper/hypo/isotonic). <b>Fluid mosaic:</b> lipids+proteins move, asymmetric distribution. <b>3 protein types:</b> integral (embedded), peripheral (one side), lipid-anchored. <b>4 integral types:</b> receptors, channels, transporters, resident. <b>Active:</b> needs ATP, against gradient. <b>Passive:</b> no ATP, down gradient."}], "quiz": [{"q": "Semi-permeable means:", "a": ["Everything passes", "Nothing passes", "Some things pass, others don't", "Only water passes"], "c": 2}, {"q": "Ions ___ cross membranes on their own:", "a": ["Easily", "Cannot", "Sometimes", "Always"], "c": 1}, {"q": "O₂ and CO₂ pass through membranes:", "a": ["With difficulty", "Not at all", "Easily", "Only with ATP"], "c": 2}, {"q": "Concentration gradient is a difference in ___ across a membrane:", "a": ["Temperature", "Pressure", "Concentration", "pH only"], "c": 2}, {"q": "Passive transport moves substances:", "a": ["Against gradient", "Down gradient without energy", "Only with ATP", "Randomly"], "c": 1}, {"q": "Osmosis is movement of:", "a": ["Ions", "Proteins", "Water", "Sugars"], "c": 2}, {"q": "Hypertonic solution outside causes cells to:", "a": ["Swell", "Shrivel", "Stay same", "Divide"], "c": 1}, {"q": "Hypotonic solution outside causes cells to:", "a": ["Shrivel", "Swell (may burst)", "Stay same", "Divide"], "c": 1}, {"q": "Isotonic means:", "a": ["More solute outside", "Less solute outside", "Equal solute inside and outside", "No solute"], "c": 2}, {"q": "Fluid mosaic model: 'fluid' means:", "a": ["Made of water", "Lipids and proteins move", "Always liquid", "Transparent"], "c": 1}, {"q": "Fluid mosaic: 'mosaic' means:", "a": ["All the same", "Different components in different areas", "Only proteins", "Only lipids"], "c": 1}, {"q": "Glycolipids are found on the ___ surface:", "a": ["Intracellular", "Extracellular only", "Both equally", "Neither"], "c": 1}, {"q": "Lateral diffusion is lipid movement:", "a": ["Across to other side", "Within the same leaflet", "Spinning in place", "Out of membrane"], "c": 1}, {"q": "Transverse diffusion (flip-flop) is:", "a": ["Very fast", "Very slow without help", "Impossible", "Constant"], "c": 1}, {"q": "Flippases help with:", "a": ["Lateral movement", "Transverse diffusion", "Rotation", "Protein folding"], "c": 1}, {"q": "Saturated fatty acids make membranes:", "a": ["More fluid", "More rigid", "No effect", "Thinner"], "c": 1}, {"q": "Unsaturated fatty acids make membranes:", "a": ["More rigid", "More fluid", "No effect", "Thicker"], "c": 1}, {"q": "Blood type (ABO) is determined by:", "a": ["Proteins", "DNA directly", "Glycolipids", "Cholesterol"], "c": 2}, {"q": "Type O blood has ___ at the glycolipid position:", "a": ["Sugar A", "Sugar B", "No sugar", "Both A and B"], "c": 2}, {"q": "Most membrane proteins are:", "a": ["Naked proteins", "Glycoproteins (with carbohydrates)", "Lipoproteins", "DNA-binding"], "c": 1}, {"q": "Integral membrane proteins are:", "a": ["On one surface only", "Embedded in the bilayer", "Floating free", "Lipid-linked"], "c": 1}, {"q": "Peripheral membrane proteins bind:", "a": ["Through the whole membrane", "Non-covalently to one side", "To lipid tails only", "Inside the nucleus"], "c": 1}, {"q": "Lipid-anchored proteins attach via:", "a": ["Hydrogen bonds", "Covalent bond to a lipid", "Ionic bonds", "No attachment"], "c": 1}, {"q": "Membrane receptors transmit info:", "a": ["Out of the cell", "Into the cell", "Both directions equally", "Nowhere"], "c": 1}, {"q": "Signal transduction moves information from:", "a": ["Nucleus to membrane", "Membrane to nucleus", "Cell to cell only", "DNA to RNA"], "c": 1}, {"q": "Protein channels move substances:", "a": ["Against gradient", "Down gradient (passive)", "Both directions equally", "Only active"], "c": 1}, {"q": "Channels work like:", "a": ["Pumps", "Tunnels through the membrane", "Scissors", "Glue"], "c": 1}, {"q": "Protein transporters ___ to move substrates:", "a": ["Don't change", "Change shape", "Break apart", "Dissolve"], "c": 1}, {"q": "Active transport requires:", "a": ["No energy", "Energy (usually ATP)", "Only gravity", "Light"], "c": 1}, {"q": "Active transport moves against the:", "a": ["Cell wall", "Concentration gradient", "Temperature", "pH"], "c": 1}, {"q": "Membrane resident proteins may serve ___ roles:", "a": ["Only transport", "Structural", "Only signaling", "Only enzymatic"], "c": 1}, {"q": "GPI-linked proteins attach via:", "a": ["Direct insertion", "Carbohydrates + phospholipids", "Hydrogen bonds", "Ionic bonds"], "c": 1}, {"q": "GPI proteins can be cleaved by:", "a": ["Proteases", "Phospholipase", "DNase", "RNase"], "c": 1}, {"q": "Transmembrane α-helices have ___ amino acids:", "a": ["Polar", "Charged", "Hydrophobic", "Acidic"], "c": 2}, {"q": "How many functional classes of membrane proteins?", "a": ["2", "3", "5", "7"], "c": 2}, {"q": "How many structural types of membrane proteins?", "a": ["2", "3", "5", "7"], "c": 1}, {"q": "4 types of integral proteins:", "a": ["Receptors, channels, transporters, resident", "Only channels", "Only receptors", "Only transporters"], "c": 0}, {"q": "Channels are used mostly for:", "a": ["Large proteins", "Ions (nervous system/muscles)", "DNA", "Lipids"], "c": 1}, {"q": "Neurotransmitters like dopamine can open:", "a": ["Nuclear pores", "Protein channels", "Cell walls", "DNA"], "c": 1}, {"q": "Cholesterol's role in membranes:", "a": ["Increases fluidity only", "Decreases fluidity only", "Moderates fluidity", "No effect"], "c": 2}, {"q": "Shorter fatty acid chains =:", "a": ["Less fluid", "More fluid", "No effect", "More rigid"], "c": 1}, {"q": "Higher temperature =:", "a": ["Less fluid", "More fluid", "No change", "Solid membrane"], "c": 1}, {"q": "Water doesn't easily cross membranes because of:", "a": ["Its size", "H-bonds can't enter hydrophobic core", "It's too heavy", "It's charged"], "c": 1}, {"q": "Na⁺/K⁺ pump is an example of:", "a": ["Passive transport", "Active transport", "Osmosis", "Diffusion"], "c": 1}, {"q": "Facilitated diffusion uses ___ but no energy:", "a": ["Light", "Proteins (channels/transporters)", "DNA", "ATP"], "c": 1}, {"q": "Rotation of a lipid means:", "a": ["Flipping sides", "Spinning in place", "Moving laterally", "Leaving membrane"], "c": 1}, {"q": "Glycoproteins need their sugars to:", "a": ["Look pretty", "Function properly", "Stay hydrophobic", "Enter nucleus"], "c": 1}, {"q": "Peripheral proteins can be washed off with:", "a": ["Water only", "Salt solutions", "Acid only", "Nothing"], "c": 1}, {"q": "Swollen/shriveled cells don't pass through:", "a": ["Membranes", "Capillaries", "DNA", "Ribosomes"], "c": 1}, {"q": "Membranes contain both:", "a": ["Only lipids", "Only proteins", "Lipids and proteins", "Only carbohydrates"], "c": 2}]}, {"id": "bio-l7", "title": "Lesson 7: Sugar Metabolism", "ln": "BIO · L7", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Describe major steps of glycolysis (chemical & energetic). <b>2)</b> Describe TCA cycle steps. <b>3)</b> Describe electron transport chain in mitochondria. <b>4)</b> Describe how H⁺ gradients make ATP. <b>5)</b> List major reactants and products of metabolism."}, {"heading": "Why Not Just Burn Sugar?", "body": "Normal combustion occurs at temperatures <b>too high for cells</b>. Energy from glucose must be <b>captured and coupled</b> to ATP generation — cells can't use raw heat. This is why we need enzymes and a multi-step process rather than one giant reaction."}, {"heading": "Aerobic vs Anaerobic Respiration", "body": "<b>Aerobic respiration:</b> extracting energy <b>with oxygen</b> — much more efficient. <b>Anaerobic respiration:</b> extracting energy <b>without oxygen</b> — less efficient. More energy per sugar is extracted with oxygen. We use plant 'waste product' (O₂ from photosynthesis) to make most of our ATP."}, {"heading": "The Overall Equation", "body": "Glucose is the base sugar for metabolism — <b>ALL organisms use it</b>. Overall: <b>C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ENERGY</b>. This happens in 3 main steps: <b>1) Glycolysis</b>, <b>2) TCA (Krebs) cycle</b>, <b>3) Electron transport chain</b>."}, {"heading": "Three Steps — Summary", "body": "<b>1) Glycolysis:</b> 1 glucose → 2 ATP, 2 NADH, 2 pyruvate. <b>2) TCA cycle:</b> 2 pyruvate → 2 ATP, 8 NADH, 2 FADH₂, 6 CO₂. <b>3) Electron transport chain:</b> 10 NADH + 2 FADH₂ + 6 O₂ → ~27 ATP + 6 H₂O. <b>Total: ~31 ATP per glucose</b>."}, {"heading": "Glycolysis — Overview", "body": "A <b>10-step reaction</b> that converts glucose into pyruvate with ATP generation. Occurs in the <b>cytoplasm</b> (not mitochondria). Does NOT require oxygen. Focus on the <b>big picture</b>, not individual steps!"}, {"heading": "Glycolysis — Energy Investment Phase", "body": "Energy must be <b>put INTO</b> the reaction to start it. Cells spend <b>2 ATP</b> to activate glucose. You have to <b>spend ATP to make more ATP</b> — like investing money to earn more money."}, {"heading": "Glycolysis — Sugar Splitting", "body": "One <b>6-carbon glucose</b> breaks down into <b>2 × 3-carbon sugars</b> (G3P). All remaining steps happen <b>TWICE per glucose molecule</b>. This is why you get 2 of everything (2 pyruvate, 2 NADH, etc.)."}, {"heading": "Glycolysis — ATP Production", "body": "ATP is made late in the process. <b>2 × 2 = 4 ATP</b> molecules are made per glucose. But 2 were invested → <b>net gain = 2 ATP</b>. Not very much per glucose! This ATP is made by <b>substrate-level phosphorylation</b> — direct transfer of phosphate to ADP."}, {"heading": "Glycolysis — NADH Production", "body": "<b>NADH</b> is another key product — an energy carrier. <b>2 NADH</b> made per glucose. NADH carries electrons to the electron transport chain later. Total glycolysis output per glucose: <b>2 pyruvate + 2 ATP (net) + 2 NADH</b>."}, {"heading": "Pyruvate's Three Fates", "body": "After glycolysis, pyruvate has 3 options: <b>1)</b> Become <b>lactate</b> (uses up NADH, anaerobic). <b>2)</b> Lose CO₂ → become <b>ethanol</b> (uses up NADH, fermentation). <b>3)</b> Lose CO₂ + bind <b>coenzyme A</b> → acetyl-CoA (makes NADH, requires oxygen to continue into TCA)."}, {"heading": "Fermentation", "body": "Metabolism of sugars <b>without oxygen</b>. Very <b>inefficient</b> but happens when O₂ is scarce. <b>Yeast fermentation:</b> makes alcohol (ethanol + CO₂) — only happens without O₂. Alcohol production is big business! <b>Muscle fermentation:</b> makes lactic acid — 'oxygen debt.' Lets muscles work longer without O₂."}, {"heading": "TCA Cycle (Krebs/Citric Acid Cycle)", "body": "Only in the presence of <b>oxygen</b>! Takes place in the <b>mitochondria</b> (where most ATP is made). Pyruvate (3 carbons) enters and <b>loses all 3 carbons as CO₂</b>. This is where <b>carbon dioxide</b>, a waste product, is produced."}, {"heading": "TCA Cycle — ATP", "body": "Only <b>1 ATP per pyruvate</b> (2 per glucose) is produced in TCA. Made by <b>substrate-level phosphorylation</b>. Not very impressive for ATP — the real payoff comes from the electron carriers."}, {"heading": "TCA Cycle — Electron Carriers", "body": "<b>4 NADH + 1 FADH₂</b> produced per pyruvate. Per glucose (2 pyruvates): <b>8 NADH + 2 FADH₂</b>. Combined with glycolysis: <b>10 NADH + 2 FADH₂ total</b>. More NADH has been produced than ATP so far! These carriers hold the real energy."}, {"heading": "After Glycolysis + TCA: The Score", "body": "All glucose is now <b>CO₂</b>. Only <b>4 ATP</b> produced so far (2 glycolysis + 2 TCA). But <b>10 NADH + 2 FADH₂</b> are loaded with energy. <b>Oxygen has NOT been required yet!</b> (except to allow pyruvate → acetyl-CoA). The big ATP payoff is next."}, {"heading": "Electron Transport Chain (ETC) — Setup", "body": "NADH and FADH₂ are <b>energy carriers</b> but cannot transfer energy to ATP directly — <b>intermediates</b> needed. The <b>cristae</b> (inner membrane folds) separate mitochondria into low and high pH compartments. ETC takes energy from carriers and converts it to an <b>H⁺ gradient</b>."}, {"heading": "ETC — How It Works", "body": "Located in the <b>cristae membrane</b> of mitochondria. NADH and FADH₂ pass their energy to <b>protein complexes</b>. Those proteins use the energy to <b>pump H⁺ ions across the membrane</b>, creating a concentration gradient (more H⁺ on one side). This is like charging a battery."}, {"heading": "ETC — Oxygen's Role", "body": "At the end of the chain, <b>oxygen gas + H⁺ ions → water</b>. This is the LAST product in glucose breakdown. Oxygen is <b>REQUIRED</b> — without it, NADH can't be regenerated and the whole system stops. This is why we breathe!"}, {"heading": "Chemiosmotic ATP Synthesis", "body": "<b>Chemiosmosis:</b> using H⁺ gradients to make ATP. A special transporter, the <b>F-type ATPase (ATP synthase)</b>, uses H⁺ flowing back across the membrane to <b>synthesize ATP</b>. Like water flowing through a turbine to generate electricity. About <b>~27 ATP</b> per glucose from this step alone!"}, {"heading": "Oxidative vs Substrate-Level Phosphorylation", "body": "<b>Substrate-level phosphorylation:</b> direct transfer of phosphate to ADP (glycolysis + TCA = 4 ATP). <b>Oxidative phosphorylation:</b> uses electron transport + chemiosmosis (ETC = ~27 ATP). Oxidative phosphorylation produces the <b>vast majority</b> of ATP. Requires oxygen = oxidative metabolism."}, {"heading": "Aerobic Metabolism — Total", "body": "<b>C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ~31 ATP</b>. Very efficient. Requires oxygen. Glycolysis (2 ATP) + TCA (2 ATP) + ETC (~27 ATP) = ~31 ATP total. Some textbooks say 36-38; the exact number depends on shuttle systems used."}, {"heading": "Anaerobic Metabolism — Total", "body": "<b>C₆H₁₂O₆ → 2CO₂ + 2C₂H₅OH + 2 ATP</b> (fermentation). Much less efficient — only <b>2 ATP per glucose</b> vs ~31 with oxygen. But happens when O₂ is unavailable. Yeast makes ethanol; muscles make lactate."}, {"heading": "Obligate vs Facultative Anaerobes", "body": "<b>Obligate anaerobes:</b> organisms that <b>cannot live WITH oxygen</b> — it's toxic to them. Found at bottom of lakes, underground, etc. <b>Facultative anaerobes:</b> can use EITHER fermentation or aerobic metabolism. Our muscles are facultative — temporarily make lactate when O₂ runs short."}, {"heading": "Key Concepts Summary", "body": "<b>Glycolysis:</b> cytoplasm, no O₂, 1 glucose → 2 pyruvate + 2 ATP + 2 NADH. <b>TCA:</b> mitochondria, 2 pyruvate → 6 CO₂ + 2 ATP + 8 NADH + 2 FADH₂. <b>ETC:</b> cristae, 10 NADH + 2 FADH₂ + O₂ → ~27 ATP + H₂O. <b>Total aerobic: ~31 ATP. Fermentation: 2 ATP.</b> ATP synthase uses H⁺ gradient. O₂ is final electron acceptor."}], "quiz": [{"q": "Overall equation: C₆H₁₂O₆ + 6O₂ →:", "a": ["6CO₂ + 6H₂O + energy", "6O₂ + glucose", "Only CO₂", "Only water"], "c": 0}, {"q": "Three steps of glucose metabolism:", "a": ["Glycolysis, TCA, ETC", "Digestion, absorption, excretion", "Transcription, translation, folding", "Osmosis, diffusion, transport"], "c": 0}, {"q": "Glycolysis occurs in the:", "a": ["Mitochondria", "Nucleus", "Cytoplasm", "Chloroplast"], "c": 2}, {"q": "Glycolysis requires oxygen:", "a": ["True", "False", "Sometimes", "Only at high temperature"], "c": 1}, {"q": "Net ATP from glycolysis per glucose:", "a": ["0", "2", "4", "10"], "c": 1}, {"q": "Glycolysis invests ___ ATP to start:", "a": ["0", "1", "2", "4"], "c": 2}, {"q": "Glycolysis produces ___ gross ATP:", "a": ["2", "4", "6", "10"], "c": 1}, {"q": "1 glucose (6C) splits into:", "a": ["1 × 6C", "2 × 3C sugars", "3 × 2C sugars", "6 × 1C"], "c": 1}, {"q": "NADH produced in glycolysis per glucose:", "a": ["1", "2", "4", "8"], "c": 1}, {"q": "Glycolysis end products per glucose:", "a": ["2 pyruvate + 2 ATP + 2 NADH", "1 pyruvate + 4 ATP", "6 CO₂ + 2 ATP", "Only ATP"], "c": 0}, {"q": "Substrate-level phosphorylation is:", "a": ["Using O₂", "Direct phosphate transfer to ADP", "Chemiosmosis", "ETC"], "c": 1}, {"q": "Without O₂, pyruvate becomes:", "a": ["Acetyl-CoA", "Lactate or ethanol (fermentation)", "More glucose", "CO₂ only"], "c": 1}, {"q": "Yeast fermentation produces:", "a": ["Lactate", "Ethanol + CO₂", "Acetyl-CoA", "Water"], "c": 1}, {"q": "Muscle 'oxygen debt' produces:", "a": ["Ethanol", "Lactic acid", "CO₂ only", "ATP only"], "c": 1}, {"q": "Fermentation yields only ___ ATP per glucose:", "a": ["0", "2", "4", "31"], "c": 1}, {"q": "TCA cycle takes place in:", "a": ["Cytoplasm", "Mitochondria", "Nucleus", "ER"], "c": 1}, {"q": "TCA cycle requires:", "a": ["No oxygen", "Oxygen (aerobic)", "Only light", "Only heat"], "c": 1}, {"q": "Pyruvate (3C) loses all carbons as:", "a": ["Water", "CO₂", "O₂", "NADH"], "c": 1}, {"q": "ATP from TCA cycle per glucose:", "a": ["0", "2", "4", "27"], "c": 1}, {"q": "NADH from TCA cycle per glucose:", "a": ["2", "4", "8", "10"], "c": 2}, {"q": "FADH₂ from TCA cycle per glucose:", "a": ["1", "2", "4", "6"], "c": 1}, {"q": "After glycolysis + TCA, total ATP so far:", "a": ["2", "4", "10", "31"], "c": 1}, {"q": "After glycolysis + TCA, total NADH:", "a": ["2", "4", "8", "10"], "c": 3}, {"q": "ETC is located in:", "a": ["Cytoplasm", "Cristae membrane of mitochondria", "Nucleus", "Outer membrane"], "c": 1}, {"q": "NADH/FADH₂ pass energy to:", "a": ["ATP directly", "Protein complexes in ETC", "DNA", "Ribosomes"], "c": 1}, {"q": "ETC creates a gradient of:", "a": ["Na⁺", "K⁺", "H⁺ (protons)", "Ca²⁺"], "c": 2}, {"q": "The final electron acceptor in ETC is:", "a": ["CO₂", "NADH", "Oxygen (O₂)", "Glucose"], "c": 2}, {"q": "O₂ + H⁺ → ___ at the end of ETC:", "a": ["CO₂", "ATP", "Water (H₂O)", "Glucose"], "c": 2}, {"q": "ATP synthase (F-type ATPase) uses ___ to make ATP:", "a": ["NADH directly", "H⁺ gradient (chemiosmosis)", "Substrate phosphorylation", "Light"], "c": 1}, {"q": "~___ ATP from ETC per glucose:", "a": ["2", "4", "10", "27"], "c": 3}, {"q": "Total aerobic ATP per glucose ≈:", "a": ["2", "4", "10", "31"], "c": 3}, {"q": "Oxidative phosphorylation requires:", "a": ["No oxygen", "Oxygen", "Only glucose", "Only NADH"], "c": 1}, {"q": "Chemiosmosis is like:", "a": ["Burning fuel", "Water through a turbine", "Osmosis of water", "Diffusion of gases"], "c": 1}, {"q": "Obligate anaerobes ___ live with oxygen:", "a": ["Can easily", "Cannot", "Sometimes can", "Prefer to"], "c": 1}, {"q": "Facultative anaerobes can use:", "a": ["Only fermentation", "Only aerobic", "Either fermentation or aerobic", "Neither"], "c": 2}, {"q": "Our muscles are ___ anaerobes:", "a": ["Obligate", "Facultative", "Neither", "Always aerobic"], "c": 1}, {"q": "Aerobic is ___ efficient than anaerobic:", "a": ["Less", "Much more", "Equally", "Not at all"], "c": 1}, {"q": "CO₂ is produced during:", "a": ["Glycolysis only", "TCA cycle", "ETC only", "All three"], "c": 1}, {"q": "Water is produced during:", "a": ["Glycolysis", "TCA cycle", "ETC", "Fermentation"], "c": 2}, {"q": "We breathe because we need O₂ for:", "a": ["Glycolysis", "Fermentation", "ETC (final electron acceptor)", "Protein synthesis"], "c": 2}, {"q": "NADH is an:", "a": ["Energy carrier", "Enzyme", "Hormone", "Lipid"], "c": 0}, {"q": "FADH₂ is an:", "a": ["Enzyme", "Energy carrier", "Sugar", "Amino acid"], "c": 1}, {"q": "Cristae are folds of the ___ membrane:", "a": ["Outer mitochondrial", "Inner mitochondrial", "Nuclear", "Plasma"], "c": 1}, {"q": "Cristae create ___ pH compartments:", "a": ["Equal", "Low and high", "Only high", "Only low"], "c": 1}, {"q": "Coenzyme A binds to pyruvate to form:", "a": ["Lactate", "Ethanol", "Acetyl-CoA", "Glucose"], "c": 2}, {"q": "Alcohol production requires:", "a": ["Oxygen", "Absence of oxygen", "High temperature", "UV light"], "c": 1}, {"q": "Cells can't use raw heat because:", "a": ["Combustion temperature too high", "Heat is useless", "Cells are cold", "No reason"], "c": 0}, {"q": "Glycolysis has ___ steps:", "a": ["3", "5", "10", "20"], "c": 2}, {"q": "Plants produce O₂ which animals use for:", "a": ["Photosynthesis", "Aerobic respiration", "Fermentation", "DNA replication"], "c": 1}, {"q": "Without O₂, NADH ___ be regenerated:", "a": ["Can easily", "Cannot (system stops)", "Doubles", "Tripled"], "c": 1}]}, {"id": "bio-l8", "title": "Lesson 8: Photosynthesis", "ln": "BIO · L8", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Describe how various colors of light are absorbed. <b>2)</b> Discuss the mechanism converting light → chemical energy in photosystem light reactions. <b>3)</b> Discuss how the Calvin cycle stores chemical energy. <b>4)</b> Understand the key role of Rubisco in life."}, {"heading": "Photosynthesis — Overview", "body": "The process by which plants convert <b>light energy → chemical energy</b>. Two parts: <b>Light reactions</b> (in thylakoid membranes) and <b>Dark reactions/Calvin cycle</b> (in stroma). Overall: <b>6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂</b>. Essentially the reverse of cellular respiration."}, {"heading": "Where It Happens", "body": "<b>Light reactions:</b> in the <b>thylakoid membranes</b> (like ETC in mitochondria). <b>Dark reactions:</b> in the <b>stroma</b> (fluid around thylakoids). Remember: <b>grana</b> = stacks of thylakoids. Chloroplasts have inner, outer, and thylakoid membranes."}, {"heading": "Light Reactions — H⁺ Gradient", "body": "H⁺ ions are pumped <b>INTO the thylakoids</b> (opposite of mitochondria where they're pumped OUT). H⁺ used to make ATP via <b>F-type ATPase</b> (same mechanism as mitochondria — chemiosmosis). Light reactions also make <b>NADPH</b> (similar to NADH). ATP + NADPH → used in dark reactions."}, {"heading": "Light Absorption by Pigments", "body": "<b>Photons</b> of light are absorbed by various <b>pigments</b> and transferred to chlorophyll. Different pigment colors seen in fall when leaves change color (carotenoids = orange/yellow, anthocyanins = red). The <b>reaction center</b> is an 'energy funnel' — collects energy from all pigments and passes it to the photosystem."}, {"heading": "Chlorophyll Structure", "body": "Chlorophyll has a long <b>lipid chain</b> to anchor it in the membrane (hydrophobic). Structure similar to <b>heme</b> (the part of hemoglobin that binds O₂). Uses <b>magnesium (Mg)</b> instead of iron → green instead of red. <b>Chlorophyll a:</b> simplest form. <b>Chlorophyll b:</b> has a carbonyl group (slight structural difference)."}, {"heading": "Photosystems 1 & 2", "body": "<b>Photosystems</b> are protein complexes that capture light energy and store it for sugar production. Work i
