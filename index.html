t energy first<br><b>Pauli:</b> max 2 e⁻/orbital, opposite spins<br><b>Hund's:</b> one in each degenerate orbital before pairing<br><b>Atomic radius:</b> ↑ down, ↓ right<br><b>IE:</b> ↓ down, ↑ right<br><b>Isoelectronic:</b> more protons = smaller"}], "quiz": [{"q": "Subshell energy order for same n:", "a": ["f < d < p < s", "s < p < d < f", "p < s < d < f", "All equal"], "c": 1}, {"q": "4s fills before:", "a": ["3p", "3d", "2p", "3s"], "c": 1}, {"q": "Aufbau means fill ___ energy first:", "a": ["Highest", "Lowest", "Random", "Middle"], "c": 1}, {"q": "Hund's rule: in degenerate orbitals:", "a": ["Pair immediately", "One in each before pairing", "Fill only one", "Skip every other"], "c": 1}, {"q": "Pauli: max electrons per orbital:", "a": ["1", "2", "3", "6"], "c": 1}, {"q": "Electron config of H (Z=1):", "a": ["1s²", "1s¹", "2s¹", "1p¹"], "c": 1}, {"q": "Electron config of He (Z=2):", "a": ["1s¹", "1s²", "2s²", "1p²"], "c": 1}, {"q": "Electron config of C (Z=6):", "a": ["1s²2s²2p²", "1s²2s²2p⁴", "1s²2p⁴", "1s²2s⁴"], "c": 0}, {"q": "Electron config of N (Z=7):", "a": ["1s²2s²2p³", "1s²2s²2p⁵", "1s²2s³2p²", "1s²2p⁵"], "c": 0}, {"q": "Electron config of Ne (Z=10):", "a": ["1s²2s²2p⁶", "1s²2s²2p⁴", "1s²2s²3s²", "1s¹⁰"], "c": 0}, {"q": "Electron config of Na (Z=11):", "a": ["1s²2s²2p⁶3s¹", "1s²2s²2p⁶3p¹", "[Ne]3p¹", "[Ar]3s¹"], "c": 0}, {"q": "Electron config of P (Z=15):", "a": ["[Ne]3s²3p³", "[Ne]3s²3p⁵", "[Ar]3s²3p³", "[Ne]3s¹3p⁴"], "c": 0}, {"q": "Valence electrons are in the:", "a": ["Inner shells", "Outermost shell", "Nucleus", "d orbitals only"], "c": 1}, {"q": "Core electrons are in:", "a": ["Outermost shell", "Inner shells", "Only s orbitals", "Only p orbitals"], "c": 1}, {"q": "P has ___ valence electrons:", "a": ["2", "3", "5", "15"], "c": 2}, {"q": "Na has ___ valence electron(s):", "a": ["1", "2", "8", "11"], "c": 0}, {"q": "Noble gas shorthand for P:", "a": ["[He]3s²3p³", "[Ne]3s²3p³", "[Ar]3s²3p³", "[Ne]3p⁵"], "c": 1}, {"q": "Hund's rule for 2p³: orbital diagram is:", "a": ["↑↓ ↑ _", "↑ ↑ ↑", "↑↓ ↑↓ ↑", "↑↓ _ _"], "c": 1}, {"q": "Degenerate orbitals have:", "a": ["Different energies", "Same energy", "No energy", "Infinite energy"], "c": 1}, {"q": "Number of subshells in n=3:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Max electrons in n=3:", "a": ["8", "10", "14", "18"], "c": 3}, {"q": "Filling order after 3p:", "a": ["3d", "4s", "4p", "4d"], "c": 1}, {"q": "Filling order after 4s:", "a": ["4p", "3d", "5s", "4d"], "c": 1}, {"q": "Atomic radius increases going:", "a": ["Up and right", "Down and left", "Up and left", "Down and right"], "c": 1}, {"q": "Atomic radius decreases going:", "a": ["Down", "Left", "Left to right across a period", "Down a group"], "c": 2}, {"q": "Why does radius decrease across a period?", "a": ["Fewer electrons", "More protons pull electrons closer", "Less shielding", "Fewer shells"], "c": 1}, {"q": "Why does radius increase down a group?", "a": ["More protons", "More electron shells", "Fewer neutrons", "Less mass"], "c": 1}, {"q": "Cation is ___ than parent atom:", "a": ["Larger", "Smaller", "Same", "Depends"], "c": 1}, {"q": "Anion is ___ than parent atom:", "a": ["Smaller", "Larger", "Same", "Depends"], "c": 1}, {"q": "Isoelectronic means same:", "a": ["Mass", "Charge", "Electron configuration", "Atomic number"], "c": 2}, {"q": "N³⁻, O²⁻, F⁻, Ne, Na⁺, Mg²⁺, Al³⁺ all have ___ electrons:", "a": ["7", "8", "10", "18"], "c": 2}, {"q": "In an isoelectronic series, more protons =:", "a": ["Larger radius", "Smaller radius", "Same radius", "No effect"], "c": 1}, {"q": "Largest in the series N³⁻ through Al³⁺:", "a": ["Al³⁺", "Ne", "F⁻", "N³⁻"], "c": 3}, {"q": "Smallest in the series N³⁻ through Al³⁺:", "a": ["N³⁻", "O²⁻", "Na⁺", "Al³⁺"], "c": 3}, {"q": "Ionization energy increases going:", "a": ["Down and left", "Up and right", "Down and right", "Up and left"], "c": 1}, {"q": "Metals have ___ ionization energy:", "a": ["High", "Low", "Zero", "Variable"], "c": 1}, {"q": "Noble gases have ___ ionization energy:", "a": ["Lowest", "Highest", "Zero", "Moderate"], "c": 1}, {"q": "Most electronegative element:", "a": ["O", "N", "F", "Cl"], "c": 2}, {"q": "Electronegativity increases going:", "a": ["Down and left", "Up and right", "Down only", "Left only"], "c": 1}, {"q": "For n=2: subshells are:", "a": ["s only", "s and p", "s, p, and d", "s, p, d, and f"], "c": 1}, {"q": "For n=3: subshells are:", "a": ["s only", "s and p", "s, p, and d", "s, p, d, and f"], "c": 2}, {"q": "mₗ for l=3 ranges from:", "a": ["0 to 3", "−1 to +1", "−2 to +2", "−3 to +3"], "c": 3}, {"q": "2l+1 for d orbitals (l=2):", "a": ["3", "5", "7", "9"], "c": 1}, {"q": "Config of Cl (Z=17):", "a": ["[Ne]3s²3p⁵", "[Ne]3s²3p⁶", "[Ar]3s²3p⁵", "[Ne]3s²3d⁵"], "c": 0}, {"q": "Config of Ar (Z=18):", "a": ["[Ne]3s²3p⁶", "[Ne]3s²3p⁵", "[He]2s²2p⁶", "[Ne]3s²3d⁶"], "c": 0}, {"q": "Config of K (Z=19):", "a": ["[Ar]3d¹", "[Ar]4s¹", "[Ar]4p¹", "[Ne]3s²3p⁶4s¹"], "c": 1}, {"q": "Config of Ca (Z=20):", "a": ["[Ar]3d²", "[Ar]4s²", "[Ar]4p²", "[Ar]4s¹3d¹"], "c": 1}, {"q": "The last electron of P has quantum numbers:", "a": ["n=3,l=1,mₗ=+1,mₛ=+½", "n=3,l=0,mₗ=0,mₛ=+½", "n=2,l=1,mₗ=0,mₛ=−½", "n=3,l=2,mₗ=0,mₛ=+½"], "c": 0}, {"q": "Shielding is when ___ electrons block nuclear charge:", "a": ["Valence", "Core/inner", "Bonding", "Antibonding"], "c": 1}]}, {"id": "chem-ch7", "title": "Chapter 7: Chemical Bonding & Molecular Geometry (I)", "ln": "CHEM 260 · Ch 7", "notes": [{"heading": "Bonding Theories — Why They Matter", "body": "Bonding theories explain: <b>how and why atoms attach</b> to form molecules, and why some combinations are stable while others aren't. Example: Why is water H₂O, not HO or H₃O? They also <b>predict</b> molecular shapes and chemical/physical properties — critical for things like targeted drug design."}, {"heading": "Ionic Bonding", "body": "<b>Ionic compounds:</b> composed of ions held together by <b>ionic bonds</b> — electrostatic forces of attraction between <b>oppositely charged cations and anions</b>. Formed between a <b>metal</b> (forms cation) and a <b>nonmetal</b> (forms anion). Example: 2Na + Cl₂ → 2NaCl. Ionic bonds are normally <b>strong</b>."}, {"heading": "Covalent Bonding", "body": "<b>Covalent bonds:</b> result from the <b>mutual attraction of atoms for shared electron pairs</b>. Formed normally between <b>nonmetals</b>. Example: H₂ formation — two H atoms share their electrons. Bond length occurs at the <b>lowest potential energy</b>. Breaking covalent bonds <b>requires energy</b>."}, {"heading": "Pure (Nonpolar) Covalent Bonds", "body": "Atoms forming the bond are <b>identical</b> → electrons shared <b>equally</b>. No partial charges. ΔEN = 0. Examples: H₂, Cl₂, N₂, O₂. The electron density is perfectly symmetric between the two nuclei."}, {"heading": "Polar Covalent Bonds", "body": "Atoms are <b>different</b> → electrons shared <b>unequally</b>. The more electronegative atom pulls electron density toward itself → <b>partial charges</b>: δ+ on less electronegative, δ− on more electronegative atom. Examples: HCl, HF, CO. ΔEN between ~0.4 and ~1.8."}, {"heading": "Electronegativity", "body": "A measure of an atom's tendency to <b>attract electrons</b> (or electron density) toward itself in a bond. Determines how shared electrons are distributed. Electrons shift toward the <b>MORE electronegative</b> atom. <b>Increases going right and up</b> the periodic table. F is most electronegative (4.0)."}, {"heading": "Electronegativity vs Electron Affinity", "body": "Don't confuse them! <b>Electronegativity:</b> tendency to attract bonding electrons (in a bond, relative scale, no units). <b>Electron affinity:</b> energy released or absorbed when an isolated gas-phase atom gains an electron (measurable energy in kJ/mol). Different concepts!"}, {"heading": "ΔEN and Bond Type", "body": "The <b>absolute difference in electronegativity (ΔEN)</b> predicts bond type. <b>ΔEN ≈ 0:</b> nonpolar covalent. <b>0.4 < ΔEN < 1.8:</b> polar covalent. <b>ΔEN > 1.8:</b> ionic. It's a continuous spectrum, not sharp boundaries. The larger ΔEN, the more polar the bond."}, {"heading": "Practice Q2: Ranking Bond Polarity", "body": "Bonds in amino acids ranked by increasing polarity (ΔEN): <b>C–H (0.4) < S–H (0.4) < C–N (0.5) < N–H (0.9) < C–O (1.0) < O–H (1.4)</b>. More electronegative atom gets δ−. O–H is the most polar of these common bonds."}, {"heading": "Lewis Symbols", "body": "An <b>element symbol surrounded by dots</b> representing its <b>valence electrons</b>. Example: Na has 1 valence electron → Na with 1 dot. Ca has 2 → Ca with 2 dots. Can represent atoms AND ions. Essential first step to drawing Lewis structures."}, {"heading": "Lewis Symbols Practice Q3", "body": "Write config + Lewis symbol: <b>Na</b> [Ne]3s¹ → 1 dot. <b>Mg</b> [Ne]3s² → 2 dots. <b>Al</b> [Ne]3s²3p¹ → 3 dots. <b>Si</b> → 4 dots. <b>P</b> → 5 dots. <b>S</b> → 6 dots. <b>Cl</b> → 7 dots. <b>Ar</b> → 8 dots. Dots = valence electrons = group number (for main group)."}, {"heading": "Lewis Structures — What They Are", "body": "Diagrams showing <b>bonding pairs</b> (as dashes —) and <b>lone pairs</b> (as dot pairs) in molecules or polyatomic ions. Bonding pair: shared between two atoms. Lone pair: belongs to one atom, not shared. These show how atoms are connected and where electrons are."}, {"heading": "The Octet Rule", "body": "Main group atoms tend to form enough bonds to obtain <b>8 valence electrons</b> (noble gas configuration). H is satisfied with <b>2</b> (duet rule). This is the driving force for bond formation — atoms want stability through full outer shells."}, {"heading": "Drawing Lewis Structures — Steps", "body": "<b>1)</b> Count total valence electrons (add for anions, subtract for cations). <b>2)</b> Draw skeleton with central atom (least electronegative, NEVER H). <b>3)</b> Distribute remaining electrons as lone pairs to give outer atoms octets. <b>4)</b> Place leftover electrons on central atom. <b>5)</b> If central atom lacks octet, form multiple bonds by converting lone pairs."}, {"heading": "Step-by-Step: SiH₄", "body": "<b>Step 1:</b> Valence e⁻ = Si(4) + 4×H(1) = 8. <b>Step 2:</b> Si is central (less EN than H? Actually H is NEVER central). <b>Step 3:</b> 4 bonds use all 8 electrons. <b>Step 4:</b> No remaining electrons. Si has octet (4 bonds = 8 e⁻), each H has duet. Done! H—Si—H with 4 single bonds, no lone pairs."}, {"heading": "Practice Q4: NH₃", "body": "Valence e⁻ = N(5) + 3×H(1) = 8. N is central. Three N—H bonds use 6 e⁻. Remaining 2 e⁻ → lone pair on N. <b>Structure:</b> N with 3 bonding pairs and 1 lone pair. N has octet (3 bonds + 1 lone pair = 8 e⁻). Each H has duet. ✓"}, {"heading": "Practice Q4: HCN", "body": "Valence e⁻ = H(1) + C(4) + N(5) = 10. C is central (least EN, H never central). H—C—N skeleton. Single bonds use 4 e⁻; 6 remain. Put lone pair on N → N has 4 e⁻ from bond + 2 = 6 (not 8). C has 4. Need multiple bonds → make <b>triple bond</b>: H—C≡N. C gets 8, N gets 8. ✓"}, {"heading": "Choosing the Central Atom", "body": "The <b>least electronegative</b> atom goes in the center (it shares electrons most readily). <b>H is NEVER central</b> (it can only form 1 bond). For same element appearing multiple times, the unique atom is usually central. C is almost always central in organic molecules."}, {"heading": "Multiple Bonds", "body": "If after distributing lone pairs the central atom doesn't have an octet → convert a lone pair from an adjacent atom into a <b>bonding pair</b>. <b>Double bond:</b> 2 shared pairs (4 e⁻). <b>Triple bond:</b> 3 shared pairs (6 e⁻). Multiple bonds are shorter and stronger than single bonds."}, {"heading": "Exception 1: Odd-Electron Molecules (Free Radicals)", "body": "Molecules with an <b>odd number of total electrons</b> → impossible for all atoms to have octets. One atom will have 7 e⁻. Example: <b>NO</b> (11 valence e⁻). The unpaired electron goes on <b>N</b> (less electronegative → better able to handle the deficiency). Free radicals are very reactive."}, {"heading": "Why Unpaired e⁻ on N in NO?", "body": "N is <b>less electronegative</b> than O, so it's better for N to be electron-deficient than O. The more electronegative atom (O) gets its full octet preferentially. This is a general rule for odd-electron species."}, {"heading": "Exception 2: Electron-Deficient Molecules", "body": "Central atoms from <b>Groups 2 and 13</b> (Be, B) often have <b>fewer than 8 electrons</b>. <b>BeH₂:</b> Be has only 4 e⁻ (2 bonds, no lone pairs). <b>BF₃:</b> B has only 6 e⁻ (3 bonds, no lone pairs). These molecules are very <b>reactive</b> — they seek electrons from other molecules (Lewis acids)."}, {"heading": "Exception 3: Hypervalent Molecules", "body": "Elements in <b>period 3 and higher</b> (n ≥ 3) can accommodate <b>more than 8 electrons</b> because they have available d orbitals. Examples: <b>PCl₅</b> (P has 10 e⁻, 5 bonds). <b>SF₆</b> (S has 12 e⁻, 6 bonds). Only possible for central atoms in period 3+, never for C, N, O, F."}, {"heading": "Summary of Octet Exceptions", "body": "<b>1) Odd-electron:</b> radicals with unpaired e⁻ (NO, NO₂). <b>2) Electron-deficient:</b> < 8 e⁻ on central atom (BF₃ = 6, BeH₂ = 4). <b>3) Hypervalent:</b> > 8 e⁻ on central atom (PCl₅ = 10, SF₆ = 12). Know examples for each!"}, {"heading": "Key Concepts Summary", "body": "<b>Ionic:</b> metal+nonmetal, electron transfer. <b>Covalent:</b> nonmetal+nonmetal, electron sharing. <b>Nonpolar:</b> ΔEN≈0. <b>Polar:</b> 0.4<ΔEN<1.8. <b>Ionic:</b> ΔEN>1.8. <b>EN increases:</b> up+right. <b>Lewis steps:</b> count e⁻, skeleton, distribute, check octets. <b>Exceptions:</b> odd-e⁻, deficient, hypervalent."}], "quiz": [{"q": "Ionic bonds form between:", "a": ["Two nonmetals", "Two metals", "Metal + nonmetal", "Noble gases"], "c": 2}, {"q": "Covalent bonds involve:", "a": ["Electron transfer", "Sharing electrons", "Losing protons", "Gaining neutrons"], "c": 1}, {"q": "Pure covalent bonds: electrons shared:", "a": ["Unequally", "Equally", "Not at all", "By one atom only"], "c": 1}, {"q": "Polar covalent: electrons shifted toward:", "a": ["Less EN atom", "More EN atom", "Neither", "Both equally"], "c": 1}, {"q": "δ+ goes on the ___ electronegative atom:", "a": ["More", "Less", "Either", "Neither"], "c": 1}, {"q": "EN increases going:", "a": ["Down and left", "Up and right", "Down and right", "Up and left"], "c": 1}, {"q": "Most electronegative element:", "a": ["O", "N", "F", "Cl"], "c": 2}, {"q": "ΔEN ≈ 0 means:", "a": ["Ionic", "Polar covalent", "Nonpolar covalent", "No bond"], "c": 2}, {"q": "ΔEN > 1.8 means:", "a": ["Nonpolar", "Polar covalent", "Ionic", "Metallic"], "c": 2}, {"q": "Which is most polar? C-H, N-H, O-H, S-H:", "a": ["C-H", "N-H", "O-H", "S-H"], "c": 2}, {"q": "Lewis symbols show:", "a": ["All electrons", "Only valence electrons", "Only core electrons", "Nuclear charge"], "c": 1}, {"q": "Na has ___ dot(s) in its Lewis symbol:", "a": ["1", "2", "3", "8"], "c": 0}, {"q": "Cl has ___ dots in its Lewis symbol:", "a": ["1", "5", "7", "8"], "c": 2}, {"q": "Lewis structures use dashes for:", "a": ["Lone pairs", "Bonding pairs", "Nuclear bonds", "Ionic bonds"], "c": 1}, {"q": "Lone pairs belong to:", "a": ["Two atoms", "One atom (not shared)", "The bond", "No atoms"], "c": 1}, {"q": "Octet rule: atoms want ___ valence e⁻:", "a": ["2", "4", "6", "8"], "c": 3}, {"q": "H is satisfied with ___ electrons:", "a": ["2", "4", "8", "18"], "c": 0}, {"q": "Lewis structure step 1:", "a": ["Draw bonds", "Count total valence electrons", "Assign charges", "Find EN"], "c": 1}, {"q": "Central atom should be:", "a": ["Most EN", "Least EN", "Hydrogen", "Any atom"], "c": 1}, {"q": "H is ___ the central atom:", "a": ["Always", "Sometimes", "Never", "Usually"], "c": 2}, {"q": "SiH₄ total valence e⁻:", "a": ["4", "6", "8", "10"], "c": 2}, {"q": "NH₃ total valence e⁻:", "a": ["6", "8", "10", "14"], "c": 1}, {"q": "HCN total valence e⁻:", "a": ["8", "10", "12", "14"], "c": 1}, {"q": "NH₃ has ___ lone pair(s) on N:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "HCN has a ___ bond between C and N:", "a": ["Single", "Double", "Triple", "Ionic"], "c": 2}, {"q": "Multiple bonds form when central atom:", "a": ["Has too many e⁻", "Lacks an octet after distributing lone pairs", "Is hydrogen", "Is a metal"], "c": 1}, {"q": "Double bond = ___ shared pairs:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Triple bond = ___ shared pairs:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Multiple bonds are ___ and ___ than single:", "a": ["Longer/weaker", "Shorter/stronger", "Same", "Longer/stronger"], "c": 1}, {"q": "Odd-electron molecules are called:", "a": ["Ions", "Free radicals", "Isotopes", "Isomers"], "c": 1}, {"q": "NO has ___ total valence e⁻:", "a": ["10", "11", "12", "13"], "c": 1}, {"q": "In NO, the unpaired e⁻ goes on:", "a": ["O (more EN)", "N (less EN)", "Both", "Neither"], "c": 1}, {"q": "BF₃: B has only ___ e⁻ around it:", "a": ["4", "6", "8", "10"], "c": 1}, {"q": "BeH₂: Be has only ___ e⁻ around it:", "a": ["2", "4", "6", "8"], "c": 1}, {"q": "Electron-deficient molecules are:", "a": ["Very stable", "Very reactive", "Noble gases", "Ionic"], "c": 1}, {"q": "Hypervalent: central atom has ___ 8 e⁻:", "a": ["Less than", "Exactly", "More than", "No"], "c": 2}, {"q": "Hypervalent is possible for period ___ and higher:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "PCl₅: P has ___ bonds (how many e⁻ around P):", "a": ["3 (6)", "4 (8)", "5 (10)", "6 (12)"], "c": 2}, {"q": "SF₆: S has ___ bonds (how many e⁻ around S):", "a": ["4 (8)", "5 (10)", "6 (12)", "8 (16)"], "c": 2}, {"q": "Can C be hypervalent?", "a": ["Yes", "No (period 2, no d orbitals)", "Only with F", "Only in ions"], "c": 1}, {"q": "Electronegativity is:", "a": ["Energy to remove e⁻", "Tendency to attract bonding e⁻", "Energy when gaining e⁻", "Size of atom"], "c": 1}, {"q": "Electron affinity is:", "a": ["Tendency to attract bonding e⁻", "Energy change when atom gains e⁻", "Size of atom", "Ionization energy"], "c": 1}, {"q": "Which bond type involves electron transfer?", "a": ["Covalent", "Polar covalent", "Ionic", "Metallic"], "c": 2}, {"q": "Bond length occurs at:", "a": ["Maximum potential energy", "Minimum potential energy", "Zero distance", "Infinite distance"], "c": 1}, {"q": "Breaking bonds requires:", "a": ["Energy input", "Energy release", "No energy", "Only heat"], "c": 0}, {"q": "For cations, electrons are:", "a": ["Gained", "Lost", "Shared", "Unchanged"], "c": 1}, {"q": "Lewis structure for Cl₂: each Cl has ___ lone pairs:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "When counting valence e⁻ for anions:", "a": ["Subtract the charge", "Add the charge value", "No change", "Multiply by charge"], "c": 1}, {"q": "When counting valence e⁻ for cations:", "a": ["Add the charge", "Subtract the charge value", "No change", "Divide by charge"], "c": 1}, {"q": "Groups 2 and 13 central atoms often have:", "a": ["Expanded octets", "Full octets", "Fewer than 8 e⁻", "No bonds"], "c": 2}]}, {"id": "chem-ch7", "title": "Chapter 7: Chemical Bonding & Molecular Geometry (I)", "ln": "CHEM 260 · Ch 7", "notes": [{"heading": "Why Bonding Theories Matter", "body": "Bonding theories explain: <b>how and why</b> atoms attach together to form molecules, and why some combinations are stable while others are not. Example: why is water H₂O, not HO or H₃O? Bonding theories also <b>predict</b> molecular shapes and chemical/physical properties — critical for designing drugs, materials, etc."}, {"heading": "Ionic Bonding", "body": "<b>Ionic compounds:</b> composed of ions held together by <b>ionic bonds</b> — electrostatic forces of attraction between oppositely charged cations (+) and anions (−). Formation: a <b>metal</b> (forms cation) + <b>nonmetal</b> (forms anion). Example: 2Na + Cl₂ → 2NaCl. Ionic bonds are normally <b>strong</b>."}, {"heading": "Covalent Bonding", "body": "<b>Covalent bonds:</b> result from mutual attraction of atoms for a <b>shared pair of electrons</b>. Formed normally between <b>nonmetals</b>. Example: H₂ formation — two H atoms share electrons. Bond length is determined at the point of <b>lowest potential energy</b>. Breaking covalent bonds <b>requires energy</b>."}, {"heading": "Pure (Nonpolar) Covalent Bonds", "body": "Atoms forming the bond are <b>identical</b> → electrons shared <b>equally</b>. No partial charges. ΔEN = 0. Examples: H₂, Cl₂, N₂, O₂. The electron cloud is symmetric between the two identical atoms."}, {"heading": "Polar Covalent Bonds", "body": "Atoms are <b>different</b> → bonding electrons shared <b>unequally</b>. More electronegative atom pulls electrons closer → develops <b>partial negative charge (δ−)</b>; other atom gets <b>partial positive charge (δ+)</b>. Examples: HCl, HF, CO. Most bonds in organic/biological molecules are polar covalent."}, {"heading": "Electronegativity", "body": "<b>Electronegativity:</b> measure of an atom's tendency to attract electrons (electron density) toward itself. Determines how shared electrons are distributed. Electrons shift toward the <b>MORE electronegative</b> atom. <b>Trend:</b> increases going <b>UP and RIGHT</b> on the periodic table. F is most electronegative. Don't confuse with electron affinity (energy when gaining e⁻)."}, {"heading": "ΔEN and Bond Type", "body": "The <b>absolute difference in electronegativity (ΔEN)</b> predicts bond type: <b>ΔEN ≈ 0:</b> nonpolar covalent (equal sharing). <b>0.4 < ΔEN < 1.8:</b> polar covalent (unequal sharing). <b>ΔEN > 1.8:</b> ionic (electron transfer). These are rough guidelines — it's a continuous spectrum, not rigid boundaries."}, {"heading": "Practice Q2: Ranking Bond Polarity", "body": "Amino acid bonds ranked by increasing polarity: <b>C–H < S–H < C–N < N–H < C–O < O–H</b>. Larger ΔEN = more polar. In each bond, the more electronegative atom is δ− and the less electronegative is δ+. Example: O–H → O is δ−, H is δ+."}, {"heading": "Lewis Symbols", "body": "<b>Lewis symbol:</b> element symbol surrounded by <b>one dot for each valence electron</b>. Shows bonding capacity at a glance. Example: Na has 1 dot (1 valence e⁻), Ca has 2 dots, C has 4 dots, Cl has 7 dots. Can represent atoms OR ions."}, {"heading": "Practice Q3: Lewis Symbols", "body": "Write electron configs and Lewis symbols for: <b>Na</b> (1 dot), <b>Mg</b> (2), <b>Al</b> (3), <b>Si</b> (4), <b>P</b> (5), <b>S</b> (6), <b>Cl</b> (7), <b>Ar</b> (8). The number of dots = number of valence electrons = group number (for main group elements)."}, {"heading": "Lewis Structures", "body": "<b>Lewis structures:</b> diagrams showing <b>bonding pairs</b> (represented by dashes —) and <b>lone pairs</b> (dots) in molecules or polyatomic ions. They show which atoms are connected and how electrons are distributed. The most important tool in this chapter!"}, {"heading": "Bonding Pairs vs Lone Pairs", "body": "<b>Bonding pair:</b> a pair of electrons shared between two atoms (shown as a dash). <b>Lone pair:</b> a pair of electrons NOT shared — belongs to one atom only (shown as two dots). Both types count toward satisfying the octet rule."}, {"heading": "The Octet Rule", "body": "Main group atoms tend to form enough bonds to obtain <b>eight valence electrons</b> (noble gas configuration). Hydrogen is satisfied with just <b>2 electrons</b> (duet rule — mimics He). The octet rule is a powerful tool for predicting bonding, but there ARE exceptions."}, {"heading": "Drawing Lewis Structures — Simple Molecules", "body": "For simple molecules (diatomics): just <b>pair up the unpaired electrons</b>. Examples: <b>HBr:</b> H–Br with 3 lone pairs on Br. <b>H₂S:</b> H–S–H with 2 lone pairs on S. <b>N₂:</b> N≡N (triple bond, 1 lone pair on each N to satisfy octet)."}, {"heading": "Drawing Lewis Structures — Steps", "body": "For complicated molecules/ions: <b>Step 1:</b> Count total valence electrons (add for anions, subtract for cations). <b>Step 2:</b> Draw skeleton — least electronegative atom as central atom. <b>Step 3:</b> Distribute remaining e⁻ as lone pairs to complete octets on outer atoms. <b>Step 4:</b> Place remaining e⁻ on central atom. <b>Step 5:</b> If central atom lacks octet, form multiple bonds by converting lone pairs from outer atoms."}, {"heading": "Central Atom Selection", "body": "The <b>least electronegative</b> atom is generally the central atom. <b>H is NEVER central</b> (it can only form one bond). C is very commonly central. If there's only one of an atom, it's usually central. Symmetric molecules often have the unique atom in the center."}, {"heading": "Practice: SiH₄", "body": "<b>Step 1:</b> Valence e⁻: Si(4) + 4×H(1) = 8 total. <b>Step 2:</b> Si is central (less EN than H? Actually Si is central because H can't be). <b>Step 3:</b> 4 Si–H bonds use all 8 electrons. <b>Step 4:</b> No lone pairs needed — Si has 8 e⁻ (4 bonds × 2), each H has 2 e⁻. Done!"}, {"heading": "Practice: NH₃", "body": "Valence e⁻: N(5) + 3×H(1) = 8. N is central. 3 N–H bonds use 6 e⁻. Remaining 2 e⁻ = 1 lone pair on N. Final: H–N–H with one lone pair on N. N has octet (3 bonds + 1 lone pair = 8 e⁻). Each H has duet ✓."}, {"heading": "Practice: HCN", "body": "Valence e⁻: H(1) + C(4) + N(5) = 10. C is central (least EN of C,N). H–C–N skeleton. H–C uses 2 e⁻, C–N uses 2 e⁻. 6 remaining → 3 lone pairs on N → N has octet but C has only 4 e⁻. Convert 2 lone pairs to bonds: H–C≡N. C has 8 e⁻ (1 single + 1 triple), N has 8 e⁻ (1 triple + 1 lone pair) ✓."}, {"heading": "Exception 1: Odd-Electron Molecules (Free Radicals)", "body": "Molecules with an <b>odd number of total electrons</b> → impossible for all atoms to have octets. Called <b>free radicals</b>. Example: <b>NO</b> (5+6 = 11 e⁻). One atom will have an unpaired electron. The lone electron is placed on the <b>less electronegative atom</b> (N in NO) because it has lower EN → more willing to be e⁻ deficient."}, {"heading": "Exception 2: Electron-Deficient Molecules", "body": "Central atoms from <b>Groups 2 and 13</b> may have <b>fewer than 8 electrons</b>. Examples: <b>BeH₂</b> (Be has only 4 e⁻), <b>BF₃</b> (B has only 6 e⁻). These molecules are <b>very reactive</b> — they want to gain electrons (Lewis acids). They do NOT satisfy the octet rule and that's OK for these specific elements."}, {"heading": "Exception 3: Hypervalent Molecules (Expanded Octets)", "body": "Elements in <b>period 3 and higher</b> can accommodate <b>more than 8 valence electrons</b>. Why? Because they have available d orbitals (n≥3 → d orbitals exist). Examples: <b>PCl₅</b> (P has 10 e⁻ around it, 5 bonds), <b>SF₆</b> (S has 12 e⁻, 6 bonds). Period 2 elements (C, N, O, F) can NEVER expand their octet."}, {"heading": "Summary of Octet Exceptions", "body": "<b>1) Odd-electron:</b> free radicals like NO — one atom has 7 e⁻. <b>2) Electron-deficient:</b> Be (4 e⁻), B (6 e⁻) — Groups 2 and 13. <b>3) Expanded octet:</b> Period 3+ elements can have >8 e⁻ using d orbitals (PCl₅, SF₆, XeF₂). Period 2 elements CANNOT expand."}, {"heading": "Multiple Bonds Review", "body": "<b>Single bond:</b> 1 shared pair (1 dash) — longest, weakest. <b>Double bond:</b> 2 shared pairs (2 dashes) — shorter, stronger. <b>Triple bond:</b> 3 shared pairs (3 dashes) — shortest, strongest. Multiple bonds form when single bonds alone can't satisfy octets."}, {"heading": "Key Equations & Concepts", "body": "<b>ΔEN ≈ 0 → nonpolar covalent; 0.4–1.8 → polar; >1.8 → ionic</b><br><b>EN increases up and right</b><br><b>Lewis structure steps: count e⁻ → skeleton → distribute → complete octets → multiple bonds if needed</b><br><b>Octet = 8 e⁻; duet = 2 e⁻ (H only)</b><br><b>Exceptions: odd-e⁻, e⁻-deficient (Be,B), expanded octet (period 3+)</b>"}], "quiz": [{"q": "Ionic bonds form between:", "a": ["Two nonmetals", "Two metals", "Metal + nonmetal", "Noble gases"], "c": 2}, {"q": "Covalent bonds involve:", "a": ["Electron transfer", "Shared electron pairs", "Nuclear fusion", "Proton sharing"], "c": 1}, {"q": "Pure covalent bonds have ΔEN =:", "a": ["0", "0.5", "1.0", "2.0"], "c": 0}, {"q": "Polar covalent bonds have ΔEN roughly:", "a": ["0", "0.4–1.8", ">1.8", "<0"], "c": 1}, {"q": "ΔEN > 1.8 suggests:", "a": ["Nonpolar covalent", "Polar covalent", "Ionic", "Metallic"], "c": 2}, {"q": "Electronegativity increases going:", "a": ["Down and left", "Up and right", "Down and right", "Up and left"], "c": 1}, {"q": "Most electronegative element:", "a": ["O", "N", "F", "Cl"], "c": 2}, {"q": "In HCl, which atom is δ−?", "a": ["H", "Cl", "Both", "Neither"], "c": 1}, {"q": "In O–H bond, δ− is on:", "a": ["H", "O", "Both", "Neither"], "c": 1}, {"q": "Lewis symbol shows:", "a": ["All electrons", "Only core electrons", "Valence electrons as dots", "Nuclear charge"], "c": 2}, {"q": "Na Lewis symbol has ___ dot(s):", "a": ["1", "2", "7", "11"], "c": 0}, {"q": "Cl Lewis symbol has ___ dots:", "a": ["1", "3", "5", "7"], "c": 3}, {"q": "Lewis structures show ___ and ___:", "a": ["Protons/neutrons", "Bonding pairs/lone pairs", "Mass/charge", "Core/valence"], "c": 1}, {"q": "Bonding pair shown as:", "a": ["Two dots", "A dash (line)", "An arrow", "A circle"], "c": 1}, {"q": "Lone pair is:", "a": ["Shared between atoms", "On one atom only", "In the nucleus", "Between molecules"], "c": 1}, {"q": "Octet rule: main group atoms want ___ valence e⁻:", "a": ["2", "4", "6", "8"], "c": 3}, {"q": "H is satisfied with ___ electrons:", "a": ["2", "4", "6", "8"], "c": 0}, {"q": "Central atom is usually the:", "a": ["Most electronegative", "Least electronegative", "Smallest", "Lightest"], "c": 1}, {"q": "H can ___ be the central atom:", "a": ["Always", "Sometimes", "Never", "Only in water"], "c": 2}, {"q": "Step 1 of Lewis structures:", "a": ["Draw skeleton", "Count total valence e⁻", "Add lone pairs", "Make multiple bonds"], "c": 1}, {"q": "SiH₄ total valence electrons:", "a": ["4", "6", "8", "10"], "c": 2}, {"q": "NH₃ total valence electrons:", "a": ["6", "8", "10", "12"], "c": 1}, {"q": "NH₃ has ___ lone pair(s) on N:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "HCN total valence electrons:", "a": ["8", "10", "12", "14"], "c": 1}, {"q": "HCN has a ___ bond between C and N:", "a": ["Single", "Double", "Triple", "No bond"], "c": 2}, {"q": "Free radicals have ___ total electrons:", "a": ["Even number", "Odd number", "Zero", "Always 8"], "c": 1}, {"q": "In NO, the unpaired electron is on:", "a": ["O", "N", "Both", "Neither"], "c": 1}, {"q": "BF₃: B has ___ electrons around it:", "a": ["4", "6", "8", "10"], "c": 1}, {"q": "BF₃ is an example of:", "a": ["Expanded octet", "Electron-deficient", "Free radical", "Normal octet"], "c": 1}, {"q": "PCl₅: P has ___ electrons around it:", "a": ["6", "8", "10", "12"], "c": 2}, {"q": "SF₆: S has ___ electrons around it:", "a": ["8", "10", "12", "14"], "c": 2}, {"q": "Expanded octets are possible for period ___ and higher:", "a": ["1", "2", "3", "Any"], "c": 2}, {"q": "Period 2 elements ___ expand their octet:", "a": ["Can", "Cannot", "Sometimes can", "Always"], "c": 1}, {"q": "Why can period 3+ expand octet?", "a": ["More protons", "Available d orbitals", "Fewer electrons", "Smaller size"], "c": 1}, {"q": "Triple bond is ___ and ___ than single:", "a": ["Longer/weaker", "Shorter/stronger", "Same", "Longer/stronger"], "c": 1}, {"q": "Bond strength order: single < double <:", "a": ["Triple", "Ionic", "Hydrogen", "None"], "c": 0}, {"q": "Multiple bonds form when:", "a": ["Single bonds satisfy octets", "Single bonds can't satisfy octets", "Atoms are identical", "Ions form"], "c": 1}, {"q": "N₂ has a ___ bond:", "a": ["Single", "Double", "Triple", "Quadruple"], "c": 2}, {"q": "How many lone pairs on each N in N₂?", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "Electrons shift toward ___ EN atom:", "a": ["Lower", "Higher", "Equal", "Neither"], "c": 1}, {"q": "Which bond is most polar? C–H, C–O, C–N:", "a": ["C–H", "C–N", "C–O", "All equal"], "c": 2}, {"q": "Ionic bonds are normally:", "a": ["Weak", "Strong", "Moderate", "Nonexistent"], "c": 1}, {"q": "Breaking covalent bonds ___ energy:", "a": ["Releases", "Requires", "Creates", "Destroys"], "c": 1}, {"q": "Bond length is at ___ potential energy:", "a": ["Maximum", "Lowest", "Zero", "Infinite"], "c": 1}, {"q": "BeH₂: Be has ___ electrons:", "a": ["2", "4", "6", "8"], "c": 1}, {"q": "Groups 2 and 13 central atoms are often:", "a": ["Hypervalent", "Electron-deficient", "Free radicals", "Normal octet"], "c": 1}, {"q": "Electron-deficient molecules are:", "a": ["Very stable", "Very reactive", "Inert", "Noble"], "c": 1}, {"q": "δ+ and δ− indicate:", "a": ["Full charges", "Partial charges", "No charges", "Ion charges"], "c": 1}, {"q": "Which is NOT an octet exception?", "a": ["NO", "BF₃", "PCl₅", "CH₄"], "c": 3}, {"q": "Valence electrons for carbon:", "a": ["2", "4", "6", "12"], "c": 1}]}, {"id": "chem-ch7b", "title": "Chapter 7 (cont): Formal Charge, Resonance & VSEPR", "ln": "CHEM 260 · Ch 7 cont.", "notes": [{"heading": "Formal Charge — Definition", "body": "<b>Formal charge (FC):</b> the hypothetical charge an atom would have if bonding electrons were shared <b>equally</b> between atoms. NOT the real charge — just a bookkeeping tool. Formula: <b>FC = valence e⁻ − (lone pair e⁻ + ½ bonding e⁻)</b>. Sum of all FCs must equal 0 for a molecule or the ion's charge for an ion."}, {"heading": "Formal Charge — How to Calculate", "body": "For each atom: <b>FC = V − (L + ½B)</b> where V = valence electrons of the free atom, L = lone pair electrons on the atom, B = bonding electrons around the atom. Example: in CO, C has FC = 4 − (2 + ½×6) = 4 − 5 = −1. O has FC = 6 − (2 + ½×6) = 6 − 5 = +1. Sum = 0 ✓."}, {"heading": "Practice Q1-Q3: Formal Charges", "body": "<b>ICl₄⁻:</b> I is central with 4 bonds + 2 lone pairs. FC(I) = 7−(4+½×8) = 7−8 = −1. Each Cl: FC = 7−(6+½×2) = 0. Sum = −1 ✓. <b>CO:</b> C≡O with lone pairs on each. <b>BrCl₃:</b> Br central with 3 bonds + 2 lone pairs. Practice calculating each atom's FC."}, {"heading": "Using FC to Predict Best Structure", "body": "When multiple Lewis structures are possible, prefer the one where: <b>1)</b> All formal charges are zero (best). <b>2)</b> If nonzero FCs unavoidable: smallest possible values. <b>3)</b> Adjacent atoms have zero or opposite-sign FCs. <b>4)</b> Negative FCs on the more electronegative atoms."}, {"heading": "Practice Q4: NO₂⁻ Best Structure", "body": "Three possible arrangements. The best one: <b>O=N−O⁻</b> (and its resonance partner). N is central because it's less electronegative. This gives smallest formal charges with negative charge on the more electronegative O atom. Answer: ONO⁻."}, {"heading": "Resonance — What It Is", "body": "When <b>two or more valid Lewis structures</b> can be drawn with the same atom arrangement. The <b>real structure is the average</b> of all resonance forms — no single structure is 'correct' alone. Indicated by double-headed arrows (↔) between structures."}, {"heading": "Resonance — NO₂⁻ Example", "body": "NO₂⁻ can be drawn as O=N−O⁻ OR ⁻O−N=O. Based on a single structure, one N−O should be shorter (double) and one longer (single). But experiments show <b>both bonds are the same length and strength</b>. This proves the real structure is a resonance hybrid — the average of both forms."}, {"heading": "Resonance Practice Q5: CO₃²⁻", "body": "Carbonate has <b>3 resonance structures</b>. Each has C double-bonded to one O and single-bonded to the other two. The double bond 'moves' around all three positions. In reality, all three C−O bonds are identical (intermediate between single and double). Each bond order = 4/3."}, {"heading": "Resonance — Key Points", "body": "<b>1)</b> Atoms don't move — only electron arrangement changes. <b>2)</b> The true structure is a hybrid (average) of all resonance forms. <b>3)</b> Resonance stabilizes molecules (delocalized electrons = lower energy). <b>4)</b> Equivalent resonance structures contribute equally. <b>5)</b> All resonance structures must have the same atom connectivity."}, {"heading": "Bond (Dissociation) Energy", "body": "Energy required to break a specific covalent bond in <b>1 mole of gaseous molecules</b>. Always positive (breaking bonds costs energy). <b>Multiple bonds are stronger:</b> triple > double > single. Average bond energies: C−H ≈ 415 kJ/mol. Values provided on exams."}, {"heading": "Calculating ΔH from Bond Energies", "body": "<b>ΔH ≈ Σ D(bonds broken) − Σ D(bonds formed)</b>. Breaking bonds = energy IN (positive). Forming bonds = energy OUT (negative). If result is negative → exothermic. If positive → endothermic. This is an approximation using average bond energies."}, {"heading": "Bond Energy Example", "body": "For any reaction: <b>1)</b> Draw Lewis structures of all reactants and products. <b>2)</b> Identify all bonds broken (reactants) and formed (products). <b>3)</b> Look up bond energies. <b>4)</b> Sum broken, sum formed, subtract. Remember: this uses AVERAGE values so answers are approximate."}, {"heading": "Lattice Energy", "body": "<b>Lattice energy (ΔH_lattice):</b> energy released when gaseous ions come together to form an ionic solid. Measures the strength of ionic bonding. <b>Larger charges + smaller ions = greater lattice energy</b> (stronger attraction). Cannot be measured directly — calculated using Born-Haber cycle."}, {"heading": "Born-Haber Cycle", "body": "An application of <b>Hess's Law</b> that breaks ionic compound formation into individual steps: atomization, ionization, electron affinity, and lattice formation. Allows <b>indirect calculation of lattice energy</b> from measurable quantities. Less important for exams — focus on the concept, not detailed calculations."}, {"heading": "Bond Angle and Bond Distance", "body": "<b>Bond angle:</b> angle between any two bonds sharing a common atom. <b>Bond distance (length):</b> distance between nuclei of two bonded atoms. Measured in Ångströms (1 Å = 10⁻¹⁰ m) or picometers (1 pm = 10⁻¹² m). Both are predicted by molecular geometry."}, {"heading": "VSEPR Theory — Overview", "body": "<b>Valence Shell Electron-Pair Repulsion</b> theory. Predicts geometry by assuming electron pairs around a central atom <b>maximize their distance from each other</b> (minimize repulsion). Count ALL electron regions: bonds (single, double, or triple each count as ONE region) AND lone pairs."}, {"heading": "Basic Electron-Pair Geometries", "body": "Based on number of electron regions: <b>2 regions → Linear (180°). 3 → Trigonal planar (120°). 4 → Tetrahedral (109.5°). 5 → Trigonal bipyramidal (90°/120°). 6 → Octahedral (90°).</b> These are the IDEAL geometries when all regions are equivalent."}, {"heading": "Electron-Pair vs Molecular Structure", "body": "<b>Electron-pair geometry:</b> arrangement of ALL electron regions (bonds + lone pairs). <b>Molecular structure:</b> arrangement of ATOMS only (what you'd 'see'). They're the <b>same only when there are no lone pairs</b>. With lone pairs, molecular structure differs from e-pair geometry."}, {"heading": "CH₄ vs NH₃ Comparison", "body": "Both have 4 electron regions → <b>tetrahedral e-pair geometry</b>. <b>CH₄:</b> 4 bonding pairs, 0 lone pairs → molecular structure = tetrahedral (109.5°). <b>NH₃:</b> 3 bonding pairs, 1 lone pair → molecular structure = <b>trigonal pyramidal</b> (≈107°). Lone pair compresses angles."}, {"heading": "Lone Pair Effects on Geometry", "body": "Lone pairs take up <b>more space</b> than bonding pairs → they compress bond angles below ideal values. Repulsion order: <b>LP-LP > LP-BP > BP-BP</b>. Size order of regions: <b>lone pair > triple bond > double bond > single bond</b>. This is why NH₃ is 107° not 109.5°, and H₂O is 104.5° not 109.5°."}, {"heading": "Common Molecular Shapes — 4 Regions", "body": "4 e⁻ regions (tetrahedral e-pair geometry): <b>0 LP → Tetrahedral</b> (CH₄, 109.5°). <b>1 LP → Trigonal pyramidal</b> (NH₃, ~107°). <b>2 LP → Bent</b> (H₂O, ~104.5°). More lone pairs = more compression of bond angles."}, {"heading": "Common Molecular Shapes — 2 and 3 Regions", "body": "<b>2 regions → Linear</b> (CO₂, BeCl₂, 180°). <b>3 regions, 0 LP → Trigonal planar</b> (BF₃, 120°). <b>3 regions, 1 LP → Bent</b> (SO₂, <120°). Count double/triple bonds as ONE region each."}, {"heading": "Predicting Geometry — Step by Step", "body": "<b>1)</b> Draw the Lewis structure. <b>2)</b> Count electron regions around central atom (bonds + lone pairs; multiple bonds = 1 region). <b>3)</b> Determine e-pair geometry from count. <b>4)</b> Determine molecular structure by considering only atom positions. <b>5)</b> Estimate bond angles (adjust for LP effects)."}, {"heading": "Molecular Polarity", "body": "A molecule is <b>polar</b> if it has a net dipole moment (bond dipoles don't cancel). <b>Nonpolar:</b> symmetric geometry → dipoles cancel (CO₂, CH₄, BF₃). <b>Polar:</b> asymmetric → dipoles don't cancel (H₂O, NH₃, HCl). Depends on BOTH bond polarity AND molecular geometry."}, {"heading": "Key Equations & Rules", "body": "<b>FC = V − (L + ½B)</b><br><b>ΔH ≈ ΣD(broken) − ΣD(formed)</b><br><b>VSEPR regions:</b> 2=linear, 3=trig planar, 4=tetrahedral, 5=trig bipyramidal, 6=octahedral<br><b>LP-LP > LP-BP > BP-BP</b> (repulsion order)<br><b>Resonance:</b> real structure = average of all valid Lewis structures<br><b>Polar molecule:</b> net dipole ≠ 0"}], "quiz": [{"q": "Formal charge formula: FC = V −:", "a": ["(L + B)", "(L + ½B)", "(½L + B)", "(L − B)"], "c": 1}, {"q": "Sum of all formal charges in a molecule:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Sum of formal charges in an ion:", "a": ["0", "The ion's charge", "+1 always", "−1 always"], "c": 1}, {"q": "Best Lewis structure has formal charges:", "a": ["All as large as possible", "All zero (ideally)", "All positive", "All negative"], "c": 1}, {"q": "Negative FC should be on:", "a": ["Less EN atom", "More EN atom", "Central atom", "Any atom"], "c": 1}, {"q": "Resonance means:", "a": ["Atoms vibrate", "Multiple valid Lewis structures exist", "Bonds break", "Electrons are lost"], "c": 1}, {"q": "The real structure is:", "a": ["One resonance form", "Average of all forms", "The simplest form", "None of them"], "c": 1}, {"q": "In resonance structures, ___ don't move:", "a": ["Electrons", "Atoms", "Bonds", "Lone pairs"], "c": 1}, {"q": "CO₃²⁻ has ___ resonance structures:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "All C−O bonds in CO₃²⁻ are:", "a": ["Different lengths", "Identical (average)", "Single bonds", "Triple bonds"], "c": 1}, {"q": "Resonance ___ molecules:", "a": ["Destabilizes", "Stabilizes", "Doesn't affect", "Destroys"], "c": 1}, {"q": "Bond dissociation energy is always:", "a": ["Negative", "Zero", "Positive", "Variable sign"], "c": 2}, {"q": "Stronger bond: single, double, or triple?", "a": ["Single", "Double", "Triple", "All equal"], "c": 2}, {"q": "ΔH from bond energies = Σ broken −:", "a": ["Σ broken again", "Σ formed", "Σ atoms", "Σ charges"], "c": 1}, {"q": "Breaking bonds requires:", "a": ["Energy input", "Energy release", "No energy", "Only heat"], "c": 0}, {"q": "Forming bonds:", "a": ["Requires energy", "Releases energy", "No change", "Requires light"], "c": 1}, {"q": "Lattice energy: larger charges =:", "a": ["Weaker", "Stronger", "No effect", "Same"], "c": 1}, {"q": "Lattice energy: smaller ions =:", "a": ["Weaker", "Stronger", "No effect", "Same"], "c": 1}, {"q": "Born-Haber cycle is an application of:", "a": ["Bohr model", "Hess's Law", "VSEPR", "Aufbau"], "c": 1}, {"q": "VSEPR stands for:", "a": ["Valence Shell Electron-Pair Repulsion", "Very Simple Electron Prediction Rule", "Valence Structure Electron Placement", "None"], "c": 0}, {"q": "VSEPR: electron pairs try to:", "a": ["Get closer", "Maximize distance", "Stay still", "Pair up"], "c": 1}, {"q": "2 electron regions → geometry:", "a": ["Bent", "Trigonal planar", "Linear", "Tetrahedral"], "c": 2}, {"q": "3 electron regions, 0 LP → geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Bent"], "c": 1}, {"q": "4 electron regions, 0 LP → geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 2}, {"q": "Linear bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 3}, {"q": "Tetrahedral bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 1}, {"q": "Trigonal planar bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 2}, {"q": "A double bond counts as ___ electron region(s):", "a": ["1", "2", "3", "4"], "c": 0}, {"q": "A triple bond counts as ___ electron region(s):", "a": ["1", "2", "3", "6"], "c": 0}, {"q": "E-pair geometry = molecular structure when:", "a": ["Always", "Never", "No lone pairs present", "Lone pairs present"], "c": 2}, {"q": "CH₄ molecular structure:", "a": ["Linear", "Bent", "Trigonal pyramidal", "Tetrahedral"], "c": 3}, {"q": "NH₃ molecular structure:", "a": ["Tetrahedral", "Trigonal pyramidal", "Bent", "Linear"], "c": 1}, {"q": "H₂O molecular structure:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Bent"], "c": 3}, {"q": "NH₃ bond angle ≈:", "a": ["90°", "104.5°", "107°", "109.5°"], "c": 2}, {"q": "H₂O bond angle ≈:", "a": ["90°", "104.5°", "109.5°", "120°"], "c": 1}, {"q": "Strongest repulsion:", "a": ["BP-BP", "LP-BP", "LP-LP", "All equal"], "c": 2}, {"q": "Lone pairs take up ___ space than bonding pairs:", "a": ["Less", "More", "Same", "No"], "c": 1}, {"q": "Lone pairs ___ bond angles:", "a": ["Increase", "Compress (decrease)", "Don't affect", "Eliminate"], "c": 1}, {"q": "CO₂ shape:", "a": ["Bent", "Trigonal", "Linear", "Tetrahedral"], "c": 2}, {"q": "CO₂ is ___ because dipoles cancel:", "a": ["Polar", "Nonpolar", "Ionic", "Metallic"], "c": 1}, {"q": "H₂O is ___ because dipoles don't cancel:", "a": ["Nonpolar", "Polar", "Ionic", "Metallic"], "c": 1}, {"q": "Polar molecule has:", "a": ["No dipole", "Net dipole moment", "Only ionic bonds", "Symmetric shape"], "c": 1}, {"q": "BF₃ is nonpolar because:", "a": ["No polar bonds", "Symmetric → dipoles cancel", "It's ionic", "B is noble gas"], "c": 1}, {"q": "4 regions with 2 LP → shape:", "a": ["Tetrahedral", "Trigonal pyramidal", "Bent", "Linear"], "c": 2}, {"q": "4 regions with 1 LP → shape:", "a": ["Tetrahedral", "Trigonal pyramidal", "Bent", "Linear"], "c": 1}, {"q": "3 regions with 1 LP → shape:", "a": ["Trigonal planar", "Linear", "Bent", "T-shaped"], "c": 2}, {"q": "5 electron regions → e-pair geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 1}, {"q": "6 electron regions → e-pair geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 2}, {"q": "Bond distance measured in:", "a": ["Moles", "Ångströms or pm", "Liters", "Joules"], "c": 1}, {"q": "Average C−H bond energy ≈:", "a": ["150 kJ/mol", "250 kJ/mol", "415 kJ/mol", "800 kJ/mol"], "c": 2}]}, {"id": "chem-ch8", "title": "Chapter 8: Advanced Bonding — VB Theory & Hybridization", "ln": "CHEM 260 · Ch 8", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Explain how valence bond theory explains covalent bonding. <b>2)</b> Describe the role of hybrid orbitals in molecular shapes. <b>3)</b> Differentiate between multiple bonds using bonding theories. <b>4)</b> Interpret molecular orbital diagrams to predict molecule properties."}, {"heading": "Why We Need More Than Lewis/VSEPR", "body": "Lewis structures and VSEPR fall short of accurately describing the <b>electronic distribution</b> in molecules. They predict shapes but don't explain HOW or WHY electrons are shared the way they are. We need <b>valence bond theory</b> and <b>hybridization</b> for a deeper understanding."}, {"heading": "Valence Bond (VB) Theory", "body": "A quantum mechanical model of covalent bonding. Key ideas: <b>1)</b> An orbital on one atom <b>overlaps</b> with an orbital on a second atom. <b>2)</b> Single electrons in each orbital combine to form an <b>electron pair</b>. <b>3)</b> Each atom keeps its own atomic orbitals. <b>4)</b> The electron pair is shared in the overlap region. <b>5)</b> Greater overlap = stronger bond."}, {"heading": "Sigma (σ) Bonds", "body": "Formed by <b>end-to-end (head-on) overlap</b>. Three types: <b>s + s</b> (e.g., H₂), <b>s + p</b> (e.g., HCl), <b>p + p end-to-end</b> (e.g., Cl₂). ALL single bonds are σ bonds. The first bond formed between any two atoms is always a σ bond. Allow free rotation around the bond axis."}, {"heading": "Pi (π) Bonds", "body": "Formed by <b>side-by-side overlap</b> of two p orbitals. Found in <b>multiple bonds alongside σ bonds</b>. Generally weaker than σ bonds (less overlap). Restrict rotation around the bond (important for cis/trans isomerism). π bonds use unhybridized p orbitals."}, {"heading": "Counting σ and π Bonds — Rules", "body": "<b>Rule 1:</b> The first bond between two atoms is ALWAYS a σ bond. <b>Rule 2:</b> All remaining bonds in a multiple bond are π bonds. So: <b>Single bond = 1σ</b>. <b>Double bond = 1σ + 1π</b>. <b>Triple bond = 1σ + 2π</b>. Count every bond in the molecule."}, {"heading": "Practice: Counting Bonds", "body": "For any molecule: count every connection. Each single line = 1σ. Each double = 1σ + 1π. Each triple = 1σ + 2π. Example: C₂H₄ (H₂C=CH₂): 4 C−H single bonds (4σ) + 1 C=C double (1σ + 1π) = <b>5σ + 1π</b> total."}, {"heading": "Practice Q2: Overlap Types", "body": "Side-by-side overlap of 4p and 2p = <b>π bond</b>. End-to-end overlap of 4p and 4p = <b>σ bond</b>. End-to-end overlap of 4p and 2p = <b>σ bond</b>. Total: <b>2σ + 1π bonds</b>. Answer: (B). Remember: end-to-end = σ, side-by-side = π."}, {"heading": "Hybridization — Why We Need It", "body": "VB theory alone only works for diatomic molecules. To explain molecules with 3+ atoms, we need <b>hybrid atomic orbitals</b>. Hybridization = mixing (combining) atomic orbital wave functions to form new hybrid orbitals suited for bonding. The number of hybrid orbitals = number of atomic orbitals combined."}, {"heading": "Key Hybridization Concepts", "body": "<b>1)</b> Only in covalently bonded atoms — isolated atoms don't hybridize. <b>2)</b> # hybrid orbitals = # atomic orbitals combined. <b>3)</b> Hybrid orbitals form σ bonds. <b>4)</b> Unhybridized p orbitals form π bonds. <b>5)</b> Hybridization is determined by the number of electron regions around the central atom."}, {"heading": "sp Hybridization", "body": "Mix <b>1 s + 1 p</b> → 2 equivalent <b>sp hybrid orbitals</b>. Geometry: <b>linear (180°)</b>. 2 electron regions. 2 unhybridized p orbitals remain (available for π bonds). Examples: BeCl₂, HgCl₂, CO₂ (C is sp), C₂H₂ (each C is sp)."}, {"heading": "sp² Hybridization", "body": "Mix <b>1 s + 2 p</b> → 3 equivalent <b>sp² hybrid orbitals</b>. Geometry: <b>trigonal planar (120°)</b>. 3 electron regions. 1 unhybridized p orbital remains (for π bonding). Examples: BF₃, BH₃, C₂H₄ (each C is sp²), carbonate ion."}, {"heading": "sp³ Hybridization", "body": "Mix <b>1 s + 3 p</b> → 4 equivalent <b>sp³ hybrid orbitals</b>. Geometry: <b>tetrahedral (109.5°)</b>. 4 electron regions. 0 unhybridized p orbitals. Examples: CH₄, CCl₄, both C atoms in C₂H₆. Most common hybridization."}, {"heading": "sp³ with Lone Pairs", "body": "sp³ hybridization also applies when lone pairs are present! <b>NH₃:</b> N is sp³ — 3 bonding pairs + 1 lone pair → trigonal pyramidal (107.3°). <b>H₂O:</b> O is sp³ — 2 bonding pairs + 2 lone pairs → bent (104.5°). The hybrid orbitals hold lone pairs too!"}, {"heading": "sp³d Hybridization", "body": "Mix <b>1 s + 3 p + 1 d</b> → 5 sp³d hybrid orbitals. Geometry: <b>trigonal bipyramidal</b>. 5 electron regions. Requires d orbitals → only possible for <b>period 3+ elements</b>. Example: PCl₅ (P is sp³d)."}, {"heading": "sp³d² Hybridization", "body": "Mix <b>1 s + 3 p + 2 d</b> → 6 sp³d² hybrid orbitals. Geometry: <b>octahedral (90°)</b>. 6 electron regions. Examples: SF₆ (S is sp³d²), PCl₆⁻, IF₆⁺. If these seem complicated, remember the examples and their structures."}, {"heading": "Quick Reference: Regions → Hybridization", "body": "<b>2 regions → sp</b> (linear, 180°). <b>3 regions → sp²</b> (trigonal planar, 120°). <b>4 regions → sp³</b> (tetrahedral, 109.5°). <b>5 regions → sp³d</b> (trigonal bipyramidal). <b>6 regions → sp³d²</b> (octahedral, 90°). Count ALL electron regions (bonds + lone pairs)."}, {"heading": "Determining Hybridization — 3 Steps", "body": "<b>Step 1:</b> Draw the Lewis structure (you REALLY need to know how!). <b>Step 2:</b> Use VSEPR to predict electron-group geometry (count regions). <b>Step 3:</b> Match the geometry to the hybridization using the table. The number of electron regions = number of hybrid orbitals needed."}, {"heading": "Practice Q3: SeF₄", "body": "Se is central. Lewis structure: 4 bonds + 1 lone pair = <b>5 electron regions</b>. 5 regions → sp³d hybridization → trigonal bipyramidal e-pair geometry → <b>seesaw molecular shape</b>. Answer: <b>(D) sp³d</b>."}, {"heading": "Multiple Bonds: C₂H₄ (Ethylene)", "body": "Each C has 3 regions (2 C−H + 1 C=C) → <b>sp² hybridized</b>. 3 sp² orbitals form: 2 C−H σ bonds + 1 C−C σ bond. 1 remaining unhybridized p orbital on each C → <b>side-by-side overlap → π bond</b>. Total C=C: 1σ + 1π. The π bond is above and below the molecular plane."}, {"heading": "Multiple Bonds: C₂H₂ (Acetylene)", "body": "Each C has 2 regions (1 C−H + 1 C≡C) → <b>sp hybridized</b>. 2 sp orbitals form: 1 C−H σ bond + 1 C−C σ bond. 2 remaining unhybridized p orbitals on each C → <b>2 π bonds</b>. Total C≡C: 1σ + 2π. Linear molecule (180°)."}, {"heading": "σ vs π Bond Summary", "body": "<b>σ bonds:</b> formed by hybrid orbitals, end-to-end overlap, stronger, allow rotation. <b>π bonds:</b> formed by unhybridized p orbitals, side-by-side overlap, weaker, restrict rotation. Every bond between atoms starts with σ; additional bonds are π."}, {"heading": "Unhybridized Orbitals Count", "body": "<b>sp:</b> 2 unhybridized p orbitals (can form 2 π bonds). <b>sp²:</b> 1 unhybridized p orbital (can form 1 π bond). <b>sp³:</b> 0 unhybridized p orbitals (no π bonds). <b>sp³d:</b> 0. <b>sp³d²:</b> 0. This is why sp carbons can have triple bonds but sp³ cannot."}, {"heading": "Review: VSEPR Geometries", "body": "This lecture also reviewed: <b>E-pair geometry ≠ molecular structure</b> when lone pairs are present. CH₄ = tetrahedral (0 LP). NH₃ = trigonal pyramidal (1 LP). H₂O = bent (2 LP). Repulsion order: LP-LP > LP-BP > BP-BP. Region size: LP > triple > double > single."}, {"heading": "Key Equations & Rules", "body": "<b>Single = 1σ. Double = 1σ+1π. Triple = 1σ+2π.</b><br><b>Regions→Hybrid:</b> 2→sp, 3→sp², 4→sp³, 5→sp³d, 6→sp³d²<br><b>Hybrid orbitals → σ bonds. Unhybridized p → π bonds.</b><br><b>Steps:</b> Lewis → VSEPR (count regions) → hybridization table<br><b>sp: 2 unhybridized p. sp²: 1. sp³: 0.</b>"}], "quiz": [{"q": "VB theory: covalent bonds form by orbital:", "a": ["Transfer", "Overlap", "Destruction", "Creation"], "c": 1}, {"q": "Greater orbital overlap =:", "a": ["Weaker bond", "Stronger bond", "No bond", "Ionic bond"], "c": 1}, {"q": "σ bonds form by ___ overlap:", "a": ["Side-by-side", "End-to-end", "No overlap", "Random"], "c": 1}, {"q": "π bonds form by ___ overlap:", "a": ["End-to-end", "Side-by-side", "Head-on", "s+s"], "c": 1}, {"q": "ALL single bonds are:", "a": ["π bonds", "σ bonds", "Ionic", "Hydrogen bonds"], "c": 1}, {"q": "The first bond between two atoms is always:", "a": ["π", "σ", "Ionic", "Hydrogen"], "c": 1}, {"q": "Double bond =:", "a": ["2σ", "2π", "1σ + 1π", "1π + 1σ + 1π"], "c": 2}, {"q": "Triple bond =:", "a": ["3σ", "3π", "1σ + 2π", "2σ + 1π"], "c": 2}, {"q": "C₂H₄ total σ bonds:", "a": ["3", "4", "5", "6"], "c": 2}, {"q": "C₂H₄ total π bonds:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "Side-by-side p+p overlap makes:", "a": ["σ bond", "π bond", "Ionic bond", "No bond"], "c": 1}, {"q": "End-to-end p+p overlap makes:", "a": ["σ bond", "π bond", "Ionic bond", "Hybrid"], "c": 0}, {"q": "Hybridization only occurs in:", "a": ["Isolated atoms", "Covalently bonded atoms", "Ions only", "Noble gases"], "c": 1}, {"q": "# hybrid orbitals = # ___ combined:", "a": ["Electrons", "Protons", "Atomic orbitals", "Bonds"], "c": 2}, {"q": "Hybrid orbitals form ___ bonds:", "a": ["π", "σ", "Ionic", "Hydrogen"], "c": 1}, {"q": "Unhybridized p orbitals form ___ bonds:", "a": ["σ", "π", "Ionic", "No"], "c": 1}, {"q": "sp hybridization: mix ___ orbitals:", "a": ["1s + 1p", "1s + 2p", "1s + 3p", "1s + 3p + 1d"], "c": 0}, {"q": "sp gives ___ hybrid orbitals:", "a": ["2", "3", "4", "5"], "c": 0}, {"q": "sp geometry:", "a": ["Bent", "Trigonal planar", "Linear", "Tetrahedral"], "c": 2}, {"q": "sp bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 3}, {"q": "sp² gives ___ hybrid orbitals:", "a": ["2", "3", "4", "5"], "c": 1}, {"q": "sp² geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 1}, {"q": "sp² bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 2}, {"q": "sp³ gives ___ hybrid orbitals:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "sp³ geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 2}, {"q": "sp³ bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 1}, {"q": "CH₄ carbon hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 2}, {"q": "CO₂ carbon hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 0}, {"q": "BF₃ boron hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 1}, {"q": "NH₃ nitrogen hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 2}, {"q": "H₂O oxygen hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 2}, {"q": "PCl₅ phosphorus hybridization:", "a": ["sp²", "sp³", "sp³d", "sp³d²"], "c": 2}, {"q": "SF₆ sulfur hybridization:", "a": ["sp³", "sp³d", "sp³d²", "sp⁴"], "c": 2}, {"q": "sp³d geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 1}, {"q": "sp³d² geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 2}, {"q": "SeF₄ (5 regions) hybridization:", "a": ["sp²", "sp³", "sp³d", "sp³d²"], "c": 2}, {"q": "sp has ___ unhybridized p orbitals:", "a": ["0", "1", "2", "3"], "c": 2}, {"q": "sp² has ___ unhybridized p orbital(s):", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "sp³ has ___ unhybridized p orbitals:", "a": ["0", "1", "2", "3"], "c": 0}, {"q": "C₂H₂ each carbon is:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 0}, {"q": "C₂H₄ each carbon is:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 1}, {"q": "C₂H₆ each carbon is:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 2}, {"q": "σ bonds allow:", "a": ["No rotation", "Free rotation", "Only vibration", "Shrinking"], "c": 1}, {"q": "π bonds:", "a": ["Allow free rotation", "Restrict rotation", "Don't exist", "Are stronger than σ"], "c": 1}, {"q": "Step 1 to find hybridization:", "a": ["Count protons", "Draw Lewis structure", "Find mass", "Balance equation"], "c": 1}, {"q": "Step 2:", "a": ["Use VSEPR to count electron regions", "Find molar mass", "Balance charges", "Identify isotopes"], "c": 0}, {"q": "Hybridization requires d orbitals starting at period:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "How many σ bonds in C₂H₂?", "a": ["2", "3", "4", "5"], "c": 1}, {"q": "How many π bonds in C₂H₂?", "a": ["0", "1", "2", "3"], "c": 2}, {"q": "Lone pairs occupy ___ orbitals:", "a": ["Only s", "Only p", "Hybrid", "Only d"], "c": 2}]}]}, "biology": {"name": "BIO", "sub": "Biology", "icon": "🧬", "lessons": [{"id": "bio-l1", "title": "Lesson 1: Scientific Method & Measurement", "ln": "BIO · L1", "notes": [{"heading": "What Science IS", "body": "Science is <b>NOT memorizing facts</b> — that's the opposite of science. Ask a scientist what they do, and they'll answer with a <b>question</b>. Science is a <b>tool</b> — a useful tool, but nothing more. It's a systematic way of asking questions about the natural world."}, {"heading": "The Scientific Method", "body": "A formalized way of asking questions. The process: <b>Observations/data → Question → Literature review → Hypothesis → Prediction → Experiment → Conclusion</b>. Each step builds on the previous one. It's iterative — results lead to new questions."}, {"heading": "Observations and Data", "body": "<b>Observations or data</b> provide the raw material to ask questions. Data can be <b>qualitative</b> (descriptive) or <b>quantitative</b> (numerical). Good observations are reproducible and objective."}, {"heading": "Literature Review", "body": "Others may have already asked the same question — <b>what did they find?</b> Using what's already known, how does it fit together? This step prevents reinventing the wheel and helps frame your hypothesis in the context of existing knowledge."}, {"heading": "Inductive Reasoning", "body": "A logical skill that builds a <b>generalized result from specific observations</b>. Example: 'I saw 100 white swans → all swans are white.' Goes from specific → general. Used to form hypotheses from patterns in data."}, {"heading": "Deductive Reasoning", "body": "Using <b>general information to make a specific prediction</b>. Required to <b>design experiments</b>. Example: 'All mammals breathe air → whales breathe air.' Goes from general → specific. Predictions must be testable."}, {"heading": "Hypothesis", "body": "A <b>preliminary answer</b> to a question based on both data and prior knowledge. Must be <b>testable and falsifiable</b>. Not a guess — it's an informed prediction based on evidence. Can be confirmed or rejected through experimentation."}, {"heading": "Experiments", "body": "<b>Controlled observations</b> — setting conditions to collect data regarding a hypothesis. If results are <b>consistent</b> with hypothesis → confirmed (supported). If <b>inconsistent</b> → hypothesis may be changed or rejected. Experiments can also fail for technical reasons."}, {"heading": "Theory and Scientific Law", "body": "A <b>theory</b> is a hypothesis that has been <b>repeatedly tested and verified</b>. Anyone can propose one. Even well-regarded theories can change — Newton's laws of motion aren't correct at very small scales (quantum mechanics). New data can change any theory. <b>Scientific laws</b> describe what consistently happens but may not explain why."}, {"heading": "Technology — Applied Science", "body": "<b>Science</b> = asking questions. <b>Technology</b> = solving problems using scientific results (applied science). Finding a disease gene = science. Developing a treatment = technology. Society decides what <b>should</b> be done vs what <b>can</b> be done — science provides info, society makes value judgments."}, {"heading": "Metric System", "body": "Everything in science uses <b>metric</b>. Conversions are easy — all units related by powers of 10. Base units: <b>liters</b> (volume), <b>meters</b> (distance), <b>grams</b> (mass), <b>calories</b> (energy in biology), <b>Kelvin</b> (temperature = °C + 273.15)."}, {"heading": "Metric Prefixes", "body": "<b>kilo (k) = 10³</b>, hecto = 10², deka = 10¹, <b>base = 1</b>, deci = 10⁻¹, <b>centi (c) = 10⁻²</b>, <b>milli (m) = 10⁻³</b>, <b>micro (μ) = 10⁻⁶</b>, <b>nano (n) = 10⁻⁹</b>, pico = 10⁻¹². Also: mega (M) = 10⁶, giga (G) = 10⁹, tera (T) = 10¹²."}, {"heading": "Key Metric Relationships", "body": "<b>1 mL water = 1 gram</b>. <b>1 cm³ = 1 mL</b>. Water density = 1 g/mL. Water freezes at <b>0°C</b>, boils at <b>100°C</b>. <b>1 calorie</b> = energy to raise 1 mL water by 1°C. Food Calories (capital C) = <b>kilocalories</b> (1000 cal)!"}, {"heading": "Unit Conversion Practice", "body": "2.5 grams = ? mg. Move decimal 3 places right (×1000): <b>2500 mg</b>. How many calories to raise 0.5 L water by 50°C? 0.5 L × 1000 mL/L × 50°C = <b>25,000 calories</b>. Always include units in every step and cancel systematically."}, {"heading": "Elements", "body": "Substances that <b>cannot be changed by chemical means</b> (only by nuclear reactions like in the sun and supernovae). The basic building blocks of all matter. ~118 known elements on the periodic table."}, {"heading": "Compounds", "body": "Mixtures of <b>1 or more elements</b> that can be changed and recombined, provided the elements themselves are <b>conserved</b>. Properties differ from constituent elements. Examples: water (H₂O), carbon dioxide (CO₂)."}, {"heading": "Atoms and Subatomic Particles", "body": "Atoms are the <b>smallest unit of an element</b> retaining its properties. <b>Electrons</b> are mobile; <b>nuclei don't change</b>. <b># protons</b> determines the element. <b># neutrons</b> determines the isotope. <b>Atomic number</b> = protons = position in periodic table. <b>Atomic mass</b> differs between isotopes."}, {"heading": "Covalent Bonds", "body": "Formed by two atoms <b>sharing electrons</b>. Only <b>outer shell (valence) electrons</b> can be shared. <b>Valence number</b> = number of electrons an atom can share. <b>Single bond:</b> 1 shared electron pair. <b>Double bond:</b> 2 shared electron pairs. Shown as lines between atoms (each line = 2 electrons)."}, {"heading": "Periodic Table and Valence", "body": "Elements in the same <b>group (column)</b> have similar properties because they have the same number of valence electrons. Sulfur (S) is most similar to <b>Oxygen (O)</b> — both in Group 16 with 6 valence electrons."}, {"heading": "Electronegativity and Polarity", "body": "<b>Lone pairs:</b> outer shell electrons NOT shared between atoms. More <b>electronegative</b> atoms attract shared electrons more → electrons spend more time near them → creates <b>partial negative (δ−)</b> and <b>partial positive (δ+)</b> charges. This is the basis of polar bonds."}, {"heading": "Hydrogen Bonds", "body": "Formed between <b>partial positive and partial negative charges</b>. Hydrogens (δ+) are usual H-bond acceptors. Atoms with <b>lone pairs</b> (N, O, F with δ−) are H-bond donors. Individually weak but collectively very important (hold water together, stabilize DNA)."}, {"heading": "Ions and Ionic Bonds", "body": "<b>Ions:</b> charged atoms with different numbers of protons and electrons. More electrons → <b>negative (−)</b> charge. Fewer electrons → <b>positive (+)</b> charge. Number of protons <b>NEVER changes</b>. Water helps stabilize ions. <b>Ionic bonds:</b> attraction between positive and negative ions."}, {"heading": "Chemical Reactions", "body": "Chemical reactions <b>rearrange chemical bonds</b>. Life is basically a <b>regulated series of reactions</b>. Depending on which chemicals interact, different products may be formed. Reactions can be controlled by enzymes, temperature, concentration."}, {"heading": "Chemical Equilibrium", "body": "A reaction that can go in <b>both directions</b>. Change conditions (concentration, temperature, etc.) → direction of reaction changes. <b>Equilibrium</b> = reactions moving at the <b>same rate in each direction</b> (dynamic balance, not stopped)."}, {"heading": "Key Concepts Summary", "body": "<b>Scientific method:</b> observe→question→hypothesis→experiment→conclude. <b>Inductive:</b> specific→general. <b>Deductive:</b> general→specific. <b>Metric:</b> powers of 10. <b>1 mL = 1 g water = 1 cm³.</b> <b>Covalent:</b> share e⁻. <b>Ionic:</b> transfer e⁻. <b>H-bonds:</b> δ+ to δ−. <b>Equilibrium:</b> both directions, equal rates."}], "quiz": [{"q": "Science is best described as:", "a": ["Memorizing facts", "A tool for asking questions", "Making technology", "Proving theories"], "c": 1}, {"q": "Inductive reasoning goes:", "a": ["General → specific", "Specific → general", "Theory → law", "Random"], "c": 1}, {"q": "Deductive reasoning goes:", "a": ["Specific → general", "General → specific", "Data → observation", "Law → theory"], "c": 1}, {"q": "Deductive reasoning is required to design:", "a": ["Observations", "Hypotheses", "Experiments", "Theories"], "c": 2}, {"q": "A hypothesis must be:", "a": ["Proven true", "Testable and falsifiable", "A law", "An observation"], "c": 1}, {"q": "A theory is a hypothesis that has been:", "a": ["Proposed once", "Repeatedly tested and verified", "Disproven", "Accepted without testing"], "c": 1}, {"q": "Technology is:", "a": ["Pure science", "Applied science", "Theory only", "Observation only"], "c": 1}, {"q": "Finding a disease gene is:", "a": ["Technology", "Science", "Both", "Neither"], "c": 1}, {"q": "Developing a treatment is:", "a": ["Science", "Technology", "Both", "Neither"], "c": 1}, {"q": "Society decides what ___ be done:", "a": ["Can", "Should", "Must never", "Scientists alone"], "c": 1}, {"q": "1 mL of water weighs:", "a": ["0.1 g", "1 g", "10 g", "100 g"], "c": 1}, {"q": "1 cm³ equals:", "a": ["1 L", "1 mL", "1 m³", "1 kg"], "c": 1}, {"q": "Water freezes at:", "a": ["−10°C", "0°C", "32°C", "100°C"], "c": 1}, {"q": "Water boils at:", "a": ["0°C", "37°C", "100°C", "212°C"], "c": 2}, {"q": "1 calorie raises 1 mL water by:", "a": ["0.1°C", "1°C", "10°C", "100°C"], "c": 1}, {"q": "Food Calories are actually:", "a": ["Calories", "Kilocalories", "Megacalories", "Joules"], "c": 1}, {"q": "Milli means:", "a": ["10⁻¹", "10⁻²", "10⁻³", "10⁻⁶"], "c": 2}, {"q": "Micro means:", "a": ["10⁻²", "10⁻³", "10⁻⁶", "10⁻⁹"], "c": 2}, {"q": "Nano means:", "a": ["10⁻³", "10⁻⁶", "10⁻⁹", "10⁻¹²"], "c": 2}, {"q": "Kilo means:", "a": ["10", "100", "1000", "1,000,000"], "c": 2}, {"q": "2.5 g = ___ mg:", "a": ["0.0025", "25", "250", "2500"], "c": 3}, {"q": "Calories to raise 0.5 L water 50°C:", "a": ["25", "250", "2500", "25,000"], "c": 3}, {"q": "Number of protons determines:", "a": ["Isotope", "Element", "Ion charge", "Mass"], "c": 1}, {"q": "Number of neutrons determines:", "a": ["Element", "Isotope", "Valence", "Charge"], "c": 1}, {"q": "Covalent bonds involve:", "a": ["Transferring electrons", "Sharing electrons", "Losing protons", "Gaining neutrons"], "c": 1}, {"q": "Valence electrons are in the:", "a": ["Nucleus", "Inner shell", "Outer shell", "Core"], "c": 2}, {"q": "A single bond shares ___ electron pair(s):", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "A double bond shares ___ electron pair(s):", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Each line in a structural formula = ___ electrons:", "a": ["1", "2", "4", "6"], "c": 1}, {"q": "Sulfur is most similar to:", "a": ["Potassium", "Boron", "Carbon", "Oxygen"], "c": 3}, {"q": "Elements in same group have similar:", "a": ["Mass", "Properties", "Atomic number", "Neutrons"], "c": 1}, {"q": "More electronegative atoms attract electrons:", "a": ["Less", "More", "Equally", "Not at all"], "c": 1}, {"q": "Lone pairs are electrons that are:", "a": ["Shared between atoms", "Not shared", "In the nucleus", "Lost"], "c": 1}, {"q": "Hydrogen bonds form between:", "a": ["Full charges", "Partial charges (δ+ and δ−)", "Nuclei", "Neutrons"], "c": 1}, {"q": "H-bond acceptors are usually:", "a": ["Oxygens", "Hydrogens (δ+)", "Metals", "Noble gases"], "c": 1}, {"q": "Ions have different numbers of:", "a": ["Protons and neutrons", "Protons and electrons", "Only neutrons", "Only protons"], "c": 1}, {"q": "In ions, the number of ___ NEVER changes:", "a": ["Electrons", "Neutrons", "Protons", "Bonds"], "c": 2}, {"q": "More electrons than protons = ___ charge:", "a": ["Positive", "Negative", "Neutral", "No charge"], "c": 1}, {"q": "Ionic bonds are between:", "a": ["Shared electrons", "Positive and negative ions", "Neutral atoms", "Noble gases"], "c": 1}, {"q": "Chemical reactions rearrange:", "a": ["Protons", "Neutrons", "Chemical bonds", "Nuclei"], "c": 2}, {"q": "Life is a regulated series of:", "a": ["Measurements", "Chemical reactions", "Observations", "Theories"], "c": 1}, {"q": "Equilibrium means reactions go:", "a": ["Only forward", "Only backward", "Both directions at equal rates", "Nowhere"], "c": 2}, {"q": "Changing concentration at equilibrium:", "a": ["Stops the reaction", "Shifts direction", "Has no effect", "Destroys products"], "c": 1}, {"q": "Atomic number equals number of:", "a": ["Neutrons", "Electrons", "Protons", "Mass units"], "c": 2}, {"q": "Experiments that fail may fail for:", "a": ["No reason", "Technical reasons", "Theoretical reasons", "Always bad hypothesis"], "c": 1}, {"q": "Newton's laws fail at:", "a": ["Large scales", "Small (quantum) scales", "Room temperature", "Normal speeds"], "c": 1}, {"q": "Kelvin = Celsius +:", "a": ["100", "212", "273.15", "373"], "c": 2}, {"q": "Density of water:", "a": ["0.5 g/mL", "1.0 g/mL", "2.0 g/mL", "10 g/mL"], "c": 1}, {"q": "Scientific method is:", "a": ["Linear and done once", "Iterative — results lead to new questions", "Only for professionals", "Only in labs"], "c": 1}, {"q": "Water helps stabilize:", "a": ["Covalent bonds", "Ions", "Nuclear reactions", "Neutrons"], "c": 1}]}, {"id": "bio-l2", "title": "Lesson 2: Water & Carbon", "ln": "BIO · L2", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Understand the physical characteristics of water and their implications for life. <b>2)</b> Use pH to describe ionic conditions of a solution. <b>3)</b> Recognize features of carbon that make it key to life. <b>4)</b> Name and characterize major functional groups in organic molecules."}, {"heading": "Water Moderates Temperature", "body": "Water has a <b>high specific heat</b> — it resists temperature changes. Air warms over water, cools when it hits land → causes <b>lake effect snow</b> downwind of the Great Lakes. Coasts are cooler than inland in summer. Water is a critical <b>regulator of climate</b>."}, {"heading": "Water Density & Ice", "body": "Water is densest at <b>4°C</b>. Ice <b>expands when it freezes</b> (unusual for a substance). Icebergs float on water — this is critical because <b>life can survive beneath ice</b> in frozen lakes/oceans. If ice sank, bodies of water would freeze solid from the bottom up."}, {"heading": "Water as a Solvent", "body": "Water is the <b>primary solvent in living tissue</b>. The chemistry of life is solution chemistry — gases aren't trapped well, solids don't allow enough interconnections. Organisms that survive without water basically <b>shut down</b> until water is added. Water's most critical attribute: it is <b>polar</b>."}, {"heading": "Polarity of Water", "body": "<b>Polarity:</b> unequal distribution of electrons within a molecule resulting in a net charge. Water's O is more electronegative than H → electrons spend more time near O → O is δ−, H atoms are δ+. This polarity is responsible for nearly ALL of water's special properties."}, {"heading": "Consequence 1: Cohesion", "body": "Water <b>sticks to itself</b> (cohesion) better than many other solvents. Results in: <b>high surface tension</b> → allows capillary action (water climbs up narrow tubes/plant vessels). <b>High specific heat</b> → stabilizes organism temperature. <b>High boiling point</b> → water stays liquid at body temperature."}, {"heading": "Consequence 2: Polar Solvent", "body": "Water is a <b>strongly polar solvent</b>. Ions require a polar solvent to dissolve. <b>Hydrophilic:</b> 'water loving' — very soluble in water (polar/ionic substances). <b>Hydrophobic:</b> 'water hating' — insoluble in water (nonpolar substances like oils). <b>Sphere of hydration:</b> water molecules surrounding an ion to stabilize its charge."}, {"heading": "Consequence 3: Amphipathic Molecules", "body": "<b>Amphipathic</b> molecules have both hydrophobic AND hydrophilic parts. Example: phospholipids. <b>Membrane bilayers</b> are amphipathic — interior avoids water, outer parts form H-bonds with water. Essential for keeping <b>cell compartments separate</b> (inside vs outside)."}, {"heading": "Solutions and Molarity", "body": "A <b>mole</b> = Avogadro's number = 6.022 × 10²³. A mole of a substance weighs (in grams) its molecular weight. <b>Molarity</b> = moles per liter (concentration measure). To calculate: M = weight(g) / [molecular weight × volume(L)]. Basic chemistry essential to all sciences."}, {"heading": "Water Equilibrium & pH", "body": "Water is in equilibrium: H₂O ⇌ <b>H⁺ + OH⁻</b>. <b>pH = −log[H⁺]</b>. At [H⁺] = 1×10⁻⁷ M → pH = <b>7.0</b> (neutral). <b>pH < 7 = acidic</b> (more H⁺). <b>pH > 7 = basic/alkaline</b> (more OH⁻). pH scale goes from 0-14. Each unit = 10× difference in [H⁺]."}, {"heading": "Acid Lakes & Environmental pH", "body": "Water pollution from burning coal or volcanic gases <b>acidifies lakes</b>. Acid lakes look bright clear blue but <b>little can live there</b>. Acidification of water sources is a <b>major environmental problem</b> that kills aquatic creatures. pH changes devastate ecosystems."}, {"heading": "Buffers", "body": "A <b>buffer</b> is a chemical that minimizes pH change when acid or base is added. Cellular reactions are <b>very sensitive</b> to pH changes. Key body buffers: <b>Phosphate buffer:</b> H₃PO₄ ⇌ H₂PO₄⁻ ⇌ HPO₄²⁻ ⇌ PO₄³⁻. <b>Carbonate buffer:</b> CO₂ + H₂O ⇌ H₂CO₃ ⇌ HCO₃⁻. Buffers keep blood pH near 7.4."}, {"heading": "Carbon — Why It's Special", "body": "Carbon makes life possible. Key features: <b>1)</b> Valence of 4 — forms many bond types. <b>2)</b> All covalent bonds (sharing electrons). <b>3)</b> Very stable bonds with many different atoms. <b>4)</b> Huge diversity of molecules possible. <b>Organic chemistry</b> = the chemistry of carbon."}, {"heading": "Carbon in Molecular Structures", "body": "In structural formulas: carbon atoms are <b>assumed at each angle</b>. Free valence electrons are assumed to be <b>hydrogens</b> (most common). Carbon may form <b>single, double, or triple bonds</b> to carbon or other elements. This flexibility allows the incredible diversity of organic molecules."}, {"heading": "Four Key Atoms in Organic Molecules", "body": "<b>Hydrogen (H):</b> valence 1. <b>Oxygen (O):</b> valence 2. <b>Nitrogen (N):</b> valence 3. <b>Carbon (C):</b> valence 4. Covalent bonds between these range from <b>70–212 kilocalories/mol</b> in bond energy. A calorie raises 1g water 1°C; food 'Calories' = kilocalories."}, {"heading": "Light and Bond Energy", "body": "Light is a form of <b>energy</b> that can break bonds. Must be the <b>correct wavelength</b> to transfer energy. <b>UV light breaks C−C and C−N bonds</b> — both essential for DNA stability → UV damages DNA. Most UV is blocked by <b>ozone layer</b>. Light carrying energy is the key idea in <b>photosynthesis</b>."}, {"heading": "Hydrocarbons", "body": "<b>Hydrocarbon:</b> compound composed of ONLY hydrogen and carbon. Examples: methane (CH₄), ethane (C₂H₆), propane (C₃H₈). Nonpolar → hydrophobic. The simplest organic molecules. Backbone of many biological molecules."}, {"heading": "Functional Groups — Overview", "body": "<b>Functional groups:</b> bonds to different atoms (N, O, P, S) that confer <b>new properties and reactive sites</b> to organic molecules. Each group has specific chemical behavior. Memorize these — they appear throughout biochemistry."}, {"heading": "Functional Groups — List", "body": "<b>Amino (−NH₃⁺):</b> proteins, DNA, vitamins. <b>Carboxyl/acid (−COO⁻):</b> proteins, lipids. <b>Aldehyde (−C=O with H):</b> DNA, RNA, sugars. <b>Hydroxyl (−OH):</b> sugars, proteins, DNA, RNA. <b>Sulfhydryl (−SH):</b> proteins, vitamins. <b>Phosphate (−OPO₃²⁻):</b> DNA, RNA, some proteins."}, {"heading": "Chirality & Stereoisomers", "body": "Carbon forms <b>tetrahedral bonds</b> (4 bonds around central atom = chiral center). <b>Chirality:</b> property where a mirror-image molecule <b>cannot be superimposed</b> on itself no matter how rotated. Like left and right hands — mirror images but not identical. Important in drug design and biology."}, {"heading": "Origin of Organic Molecules — Miller Experiment", "body": "Stanley Miller (1953) mimicked early Earth conditions: electrical sparks (lightning) + heat (volcanic activity) + basic gases (methane, ammonia, water, hydrogen). Result: <b>key organic molecules formed</b> from simple starting materials! More recent experiments suggest <b>comet impacts</b> could also generate organic molecules."}, {"heading": "Primordial Soup", "body": "<b>Primordial soup:</b> collection of naturally occurring chemicals in early Earth's environment that led to the <b>formation of life</b>. Simple molecules → complex organic molecules → self-replicating systems → early cells. The transition from chemistry to biology."}, {"heading": "Specific Heat — Definition", "body": "<b>Specific heat:</b> energy required to raise <b>1 gram</b> of a substance by <b>1°C</b>. Water's specific heat is very high (1
