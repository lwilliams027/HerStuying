To get molarity from grams, first:", "a": ["Find volume", "Convert grams to moles", "Add water", "Measure temperature"], "c": 1}, {"q": "25.2 g acetic acid (MW=60.05) in 0.500 L = ___ M:", "a": ["0.420", "0.839", "1.26", "25.2"], "c": 1}, {"q": "Dilution does NOT change:", "a": ["Volume", "Concentration", "Moles of solute", "Temperature"], "c": 2}, {"q": "The dilution equation is:", "a": ["M = n/V", "M₁V₁ = M₂V₂", "PV = nRT", "q = mcΔT"], "c": 1}, {"q": "5.00 M × 0.850 L diluted to 1.80 L = ___ M:", "a": ["1.00", "2.36", "5.00", "9.44"], "c": 1}, {"q": "Adding solvent to solution ___ concentration:", "a": ["Increases", "Decreases", "Doesn't change", "Doubles"], "c": 1}, {"q": "Solvent is the ___ component:", "a": ["Minority", "Majority", "Solid", "Gas"], "c": 1}, {"q": "Solute is the ___ component:", "a": ["Majority", "Minority", "Liquid always", "Gas always"], "c": 1}, {"q": "Aqueous means dissolved in:", "a": ["Alcohol", "Oil", "Water", "Acid"], "c": 2}, {"q": "Mass % = mass solute ÷:", "a": ["Mass solvent × 100", "Mass solution × 100", "Volume × 100", "Moles × 100"], "c": 1}, {"q": "5 g NaCl in 95 g water = ___ mass %:", "a": ["5.0%", "5.26%", "9.5%", "95%"], "c": 0}, {"q": "Volume % is used for:", "a": ["Solid in solid", "Liquid in liquid", "Gas in solid", "Ion in crystal"], "c": 1}, {"q": "0.9% saline is a ___ percentage:", "a": ["Mass", "Volume", "Mass-volume", "Molarity"], "c": 2}, {"q": "1 ppm =:", "a": ["1 g/kg", "1 mg/kg", "1 kg/g", "1 mol/L"], "c": 1}, {"q": "1 ppm = ___ ppb:", "a": ["10", "100", "1000", "1,000,000"], "c": 2}, {"q": "ppm is used for:", "a": ["Concentrated solutions", "Trace amounts", "Pure substances", "Gases only"], "c": 1}, {"q": "ppb stands for parts per:", "a": ["Billion", "Base", "Batch", "Block"], "c": 0}, {"q": "EPA lead limit in water is about:", "a": ["15 ppm", "15 ppb", "15 g/L", "15 M"], "c": 1}, {"q": "For dilute aqueous solutions, 1 ppm ≈:", "a": ["1 g/L", "1 mg/L", "1 kg/L", "1 mol/L"], "c": 1}, {"q": "Solution = ___ mixture:", "a": ["Heterogeneous", "Homogeneous", "Suspension", "Colloid"], "c": 1}, {"q": "Convert 500 mL to L:", "a": ["5.00", "0.500", "50.0", "0.050"], "c": 1}, {"q": "0.175 g (MW=77.08) = ___ mol:", "a": ["0.00227", "0.175", "77.08", "13.5"], "c": 0}, {"q": "0.00227 mol in 0.045 L = ___ M:", "a": ["0.0504", "0.102", "0.227", "0.450"], "c": 0}, {"q": "Concentrated means:", "a": ["Low solute amount", "High solute amount", "Pure solvent", "No solute"], "c": 1}, {"q": "Dilute means:", "a": ["High solute amount", "Low solute amount", "Pure solute", "Saturated"], "c": 1}, {"q": "In M₁V₁ = M₂V₂, if V increases then M:", "a": ["Increases", "Decreases", "Stays same", "Doubles"], "c": 1}, {"q": "Which is NOT a concentration unit?", "a": ["Molarity", "Mass %", "ppm", "Molar mass"], "c": 3}, {"q": "Moles of solute = M ×:", "a": ["Mass", "Volume in L", "Nₐ", "Temperature"], "c": 1}, {"q": "V in molarity must be in:", "a": ["mL", "cm³", "Liters", "μL"], "c": 2}, {"q": "150.0 g Mg ÷ 24.305 g/mol =:", "a": ["3.65 mol", "6.17 mol", "24.3 mol", "150 mol"], "c": 1}, {"q": "C₁₂H₂₂O₁₁ molar mass ≈:", "a": ["180", "270", "342", "510"], "c": 2}, {"q": "Empirical formula of C₆H₁₂O₆:", "a": ["C₆H₁₂O₆", "CH₂O", "C₃H₆O₃", "CHO"], "c": 1}, {"q": "CH₂O (30 amu), molecular mass 180, n =:", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "C₄H₁₀O (74.12), molecular mass 222.1, n =:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Molecular formula = empirical ×:", "a": ["Nₐ", "n", "Molar mass", "Density"], "c": 1}, {"q": "% composition of all elements should sum to:", "a": ["0", "50", "100", "Varies"], "c": 2}, {"q": "23 g NaOH (MM=40) = ___ mol:", "a": ["0.40", "0.58", "1.00", "23"], "c": 1}, {"q": "Al₂(SO₄)₃ molar mass:", "a": ["150", "270", "342", "450"], "c": 2}, {"q": "1 mol Ca weighs:", "a": ["20 g", "40 g", "60 g", "80 g"], "c": 1}, {"q": "Molar mass units:", "a": ["amu", "g/mol", "kg", "mol/L"], "c": 1}, {"q": "Avogadro's number:", "a": ["6.022 × 10²³", "3.14 × 10²³", "1.602 × 10⁻¹⁹", "9.109 × 10⁻³¹"], "c": 0}, {"q": "To convert mass % to molarity you need:", "a": ["Only mass", "Solution density and molar mass", "Only volume", "Temperature"], "c": 1}, {"q": "70% rubbing alcohol is expressed as:", "a": ["Mass %", "Volume %", "Molarity", "ppm"], "c": 1}, {"q": "Mass of solution =:", "a": ["Mass solute only", "Mass solvent only", "Mass solute + mass solvent", "Volume × density"], "c": 2}, {"q": "The conversion chain grams→moles→molarity requires knowing:", "a": ["Molar mass and volume", "Only mass", "Only density", "Only temperature"], "c": 0}]}, {"id": "chem-ch4", "title": "Chapter 4: Stoichiometry of Chemical Reactions", "ln": "CHEM 260 · Ch 4", "notes": [{"heading": "Learning Objectives", "body": "By the end of Ch 4: <b>1)</b> Write and balance chemical equations. <b>2)</b> Classify common types of chemical reactions. <b>3)</b> Perform stoichiometric calculations. <b>4)</b> Calculate theoretical and percent yields."}, {"heading": "Chemical Reactions", "body": "Reactions involve <b>chemical changes</b> resulting in new substances. Atoms <b>rearrange</b> to produce new molecules. Chemical equations are shorthand descriptions providing: formulas of reactants/products, states, relative numbers of molecules, and info to determine masses consumed/produced."}, {"heading": "Chemical Equation Format", "body": "<b>Reactants → Products</b>. Example: CH₄(g) + O₂(g) → CO₂(g) + 2H₂O(g). Equations show formulas, coefficients (how many), and state symbols: <b>(s)</b> solid, <b>(l)</b> liquid, <b>(g)</b> gas, <b>(aq)</b> aqueous (dissolved in water)."}, {"heading": "Balancing Equations — Why", "body": "'Balanced' means <b>equal numbers of atoms</b> for each element on both sides. Required by the <b>Law of Conservation of Mass</b> — atoms are neither created nor destroyed. We adjust <b>coefficients</b> (numbers in front), NEVER subscripts (changing subscripts changes the substance!)."}, {"heading": "Balancing — How", "body": "<b>Step 1:</b> Write unbalanced equation. <b>Step 2:</b> Count atoms of each element on both sides. <b>Step 3:</b> Add coefficients to balance one element at a time. <b>Step 4:</b> Check ALL elements. <b>Step 5:</b> Add state symbols. Tip: save O and H for last; start with unique elements."}, {"heading": "Balancing Example: Methane", "body": "CH₄ + O₂ → CO₂ + H₂O (unbalanced). C: 1=1 ✓. H: 4≠2 → put 2 in front of H₂O. O: 2≠(2+2)=4 → put 2 in front of O₂. Final: <b>CH₄(g) + 2O₂(g) → CO₂(g) + 2H₂O(g)</b>. Check: C:1=1, H:4=4, O:4=4 ✓."}, {"heading": "Practice: Ethane Combustion", "body": "C₂H₆ + O₂ → CO₂ + H₂O. C: need 2 CO₂. H: need 3 H₂O. O: products have 2(2)+3(1)=7 O atoms → need 7/2 O₂. Multiply all by 2: <b>2C₂H₆(g) + 7O₂(g) → 4CO₂(g) + 6H₂O(g)</b>. Always verify every element balances."}, {"heading": "Equations for Ionic Reactions", "body": "Many reactions occur in <b>aqueous media</b> involving ions. Three levels of detail: <b>Molecular equation:</b> shows complete formulas. <b>Complete ionic equation:</b> shows all dissolved substances as individual ions. <b>Net ionic equation:</b> shows only the species that actually change."}, {"heading": "Molecular Equation Example", "body": "CaCl₂(aq) + 2AgNO₃(aq) → Ca(NO₃)₂(aq) + 2AgCl(s). Written with regular complete formulas. Does NOT explicitly show the ions present in solution. AgCl is solid (precipitate) — it does NOT dissociate."}, {"heading": "Complete Ionic Equation", "body": "Break all aqueous compounds into ions: Ca²⁺(aq) + 2Cl⁻(aq) + 2Ag⁺(aq) + 2NO₃⁻(aq) → Ca²⁺(aq) + 2NO₃⁻(aq) + 2AgCl(s). Solids, liquids, and gases stay as complete formulas. Only (aq) compounds split into ions."}, {"heading": "Net Ionic Equation", "body": "Remove <b>spectator ions</b> (appear unchanged on both sides). Ca²⁺ and NO₃⁻ are spectators. What remains: <b>Cl⁻(aq) + Ag⁺(aq) → AgCl(s)</b>. Use smallest whole-number coefficients. This shows ONLY what actually reacts."}, {"heading": "Spectator Ions", "body": "Ions that are present to maintain charge neutrality but are <b>neither chemically nor physically changed</b>. They appear on BOTH sides of the complete ionic equation. Identified by canceling identical ions from each side."}, {"heading": "Three Reaction Types", "body": "The three main types to remember: <b>1) Precipitation</b> — solid forms from mixing solutions. <b>2) Acid-Base</b> — H⁺ transfer. <b>3) Oxidation-Reduction (redox)</b> — electron transfer. Many reactions fall into one of these categories."}, {"heading": "Precipitation Reactions", "body": "A <b>solid (precipitate)</b> forms when two aqueous solutions are mixed. The precipitate is an ionic compound that is <b>insoluble</b> in water. Use solubility rules (Table 4.1) to predict which products precipitate. Example: AgCl, BaSO₄, PbI₂ are common precipitates."}, {"heading": "Acid-Base Reactions", "body": "A <b>hydrogen ion (H⁺)</b> is transferred from one species to another. <b>Acid:</b> produces H₃O⁺ (hydronium) in water. <b>Base:</b> produces OH⁻ (hydroxide) in water. HCl(aq) + H₂O → Cl⁻(aq) + H₃O⁺(aq)."}, {"heading": "Strong vs Weak Acids", "body": "<b>Strong acids:</b> H⁺ <b>completely</b> transfers to water → 100% dissociation. Examples: <b>HCl, HBr, HI, HNO₃, H₂SO₄, HClO₄</b> — memorize these! <b>Weak acids:</b> H⁺ <b>partially</b> transfers → equilibrium. Example: CH₃COOH (acetic acid). Most acids are weak."}, {"heading": "Bases", "body": "Substance that produces <b>OH⁻</b> in water. <b>Strong bases:</b> completely dissociate — mostly Group I/II metal hydroxides. NaOH → Na⁺ + OH⁻. <b>Common strong bases:</b> NaOH, KOH, Ca(OH)₂, Ba(OH)₂. <b>Weak bases:</b> partially produce OH⁻ by reacting with water. Example: NH₃ + H₂O ⇌ NH₄⁺ + OH⁻."}, {"heading": "Neutralization Reactions", "body": "A specific acid-base reaction: <b>Acid + Base → Salt + Water</b>. The salt is an ionic compound formed from the cation of the base and anion of the acid. Example: Mg(OH)₂(s) + 2HCl(aq) → MgCl₂(aq) + 2H₂O(l). MgCl₂ is the salt."}, {"heading": "Oxidation-Reduction (Redox)", "body": "Reactions where <b>electrons are transferred</b> from one reactant to another. Many (not all) involve oxygen. Examples: 2Na(s) + Cl₂(g) → 2NaCl(s). 2H₂(g) + O₂(g) → 2H₂O(g). Combustion reactions are always redox."}, {"heading": "Half-Reactions", "body": "The overall redox reaction can be split into two <b>half-reactions</b>. Example for 2Na + Cl₂ → 2NaCl: <b>Oxidation half:</b> 2Na → 2Na⁺ + 2e⁻ (Na loses electrons). <b>Reduction half:</b> Cl₂ + 2e⁻ → 2Cl⁻ (Cl gains electrons). Electrons lost = electrons gained."}, {"heading": "Oxidation and Reduction Defined", "body": "<b>Oxidation = LOSS of electrons</b> (oxidation number increases). <b>Reduction = GAIN of electrons</b> (oxidation number decreases). Memory aid: <b>OIL RIG</b> — Oxidation Is Loss, Reduction Is Gain. Or <b>LEO the lion says GER</b> — Lose Electrons Oxidation, Gain Electrons Reduction."}, {"heading": "Oxidizing and Reducing Agents", "body": "<b>Reducing agent:</b> the species that IS oxidized (it reduces others by giving them electrons). <b>Oxidizing agent:</b> the species that IS reduced (it oxidizes others by taking their electrons). In 2Na + Cl₂ → 2NaCl: Na is the reducing agent (oxidized), Cl₂ is the oxidizing agent (reduced)."}, {"heading": "Oxidation Numbers (States)", "body": "The charge an atom WOULD have if the compound were ionic. Rules: element = 0. Monatomic ion = charge. H = +1 (with nonmetals), −1 (with metals). O = −2 (usually). F = always −1. Sum = 0 for molecule, charge for ion. Oxidation = increase in ox #. Reduction = decrease."}, {"heading": "Identifying Redox Reactions", "body": "If <b>any element changes oxidation number</b> from reactants to products, it's a redox reaction. Track oxidation numbers for each element. If none change → NOT redox (could be precipitation or acid-base instead)."}, {"heading": "Key Equations & Definitions", "body": "<b>Balanced equation:</b> equal atoms each side, use coefficients. <b>Net ionic:</b> remove spectators. <b>Neutralization:</b> acid + base → salt + water. <b>OIL RIG:</b> Oxidation Is Loss, Reduction Is Gain. <b>Strong acids (6):</b> HCl, HBr, HI, HNO₃, H₂SO₄, HClO₄. <b>Strong bases:</b> Group I/II hydroxides."}], "quiz": [{"q": "When balancing, adjust:", "a": ["Subscripts", "Coefficients", "Atomic numbers", "State symbols"], "c": 1}, {"q": "Why can't you change subscripts?", "a": ["It's illegal", "It changes the substance", "It's too hard", "No reason"], "c": 1}, {"q": "Balanced equation obeys:", "a": ["Law of Gravity", "Law of Conservation of Mass", "Hess's Law", "Avogadro's Law"], "c": 1}, {"q": "CH₄ + 2O₂ → CO₂ + 2H₂O has ___ O atoms each side:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "(aq) means:", "a": ["Solid", "Liquid", "Gas", "Dissolved in water"], "c": 3}, {"q": "(s) means:", "a": ["Solution", "Solid", "Sublimate", "Solvent"], "c": 1}, {"q": "Molecular equation shows:", "a": ["All ions", "Complete formulas", "Only net reaction", "Only precipitates"], "c": 1}, {"q": "Complete ionic equation shows:", "a": ["Complete formulas only", "All dissolved substances as ions", "Only net ions", "Only solids"], "c": 1}, {"q": "Net ionic equation removes:", "a": ["All ions", "Spectator ions", "Products", "Reactants"], "c": 1}, {"q": "Spectator ions are:", "a": ["Changed in reaction", "Unchanged on both sides", "Only in products", "Only in reactants"], "c": 1}, {"q": "AgCl is a common:", "a": ["Acid", "Base", "Precipitate", "Gas"], "c": 2}, {"q": "Precipitate is a(n) ___ product:", "a": ["Aqueous", "Gaseous", "Insoluble solid", "Liquid"], "c": 2}, {"q": "Three main reaction types:", "a": ["Synthesis/decomposition/combustion", "Precipitation/acid-base/redox", "Exo/endo/neutral", "Fast/slow/equilibrium"], "c": 1}, {"q": "Acids produce ___ in water:", "a": ["OH⁻", "H₃O⁺", "Na⁺", "Cl⁻"], "c": 1}, {"q": "Bases produce ___ in water:", "a": ["H₃O⁺", "OH⁻", "H₂", "O₂"], "c": 1}, {"q": "Strong acids dissociate:", "a": ["Partially", "Completely", "Never", "Only when heated"], "c": 1}, {"q": "Which is a strong acid?", "a": ["CH₃COOH", "HF", "HCl", "H₂CO₃"], "c": 2}, {"q": "Which is a strong acid?", "a": ["HNO₃", "CH₃COOH", "HCN", "H₃PO₄"], "c": 0}, {"q": "Most acids are:", "a": ["Strong", "Weak", "Neutral", "Basic"], "c": 1}, {"q": "NaOH is a:", "a": ["Weak acid", "Strong acid", "Weak base", "Strong base"], "c": 3}, {"q": "NH₃ is a:", "a": ["Strong acid", "Weak acid", "Strong base", "Weak base"], "c": 3}, {"q": "Neutralization: acid + base →:", "a": ["Only water", "Only salt", "Salt + water", "Gas"], "c": 2}, {"q": "Mg(OH)₂ + 2HCl → MgCl₂ + 2H₂O — MgCl₂ is the:", "a": ["Acid", "Base", "Salt", "Water"], "c": 2}, {"q": "Redox reactions involve transfer of:", "a": ["Protons", "Neutrons", "Electrons", "Atoms"], "c": 2}, {"q": "Oxidation means:", "a": ["Gain of electrons", "Loss of electrons", "Gain of protons", "No change"], "c": 1}, {"q": "Reduction means:", "a": ["Loss of electrons", "Gain of electrons", "Loss of protons", "No change"], "c": 1}, {"q": "OIL RIG stands for:", "a": ["Oxygen Is Light, Reduction Is Good", "Oxidation Is Loss, Reduction Is Gain", "Only Ionic Lattices", "None"], "c": 1}, {"q": "In 2Na + Cl₂ → 2NaCl, Na is:", "a": ["Oxidized", "Reduced", "Unchanged", "A spectator"], "c": 0}, {"q": "In 2Na + Cl₂ → 2NaCl, Cl₂ is:", "a": ["Oxidized", "Reduced", "Unchanged", "A spectator"], "c": 1}, {"q": "The reducing agent is the species that:", "a": ["Is reduced", "Is oxidized", "Gains electrons", "Stays neutral"], "c": 1}, {"q": "The oxidizing agent is the species that:", "a": ["Is oxidized", "Is reduced", "Loses electrons", "Stays neutral"], "c": 1}, {"q": "Na is the ___ agent:", "a": ["Oxidizing", "Reducing", "Neutral", "Spectator"], "c": 1}, {"q": "Cl₂ is the ___ agent:", "a": ["Reducing", "Oxidizing", "Neutral", "Spectator"], "c": 1}, {"q": "Oxidation number of an element in its standard state:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Oxidation number of O in most compounds:", "a": ["0", "−1", "−2", "+2"], "c": 2}, {"q": "Oxidation number of H with nonmetals:", "a": ["−1", "0", "+1", "+2"], "c": 2}, {"q": "F oxidation number is always:", "a": ["0", "−1", "+1", "−2"], "c": 1}, {"q": "Sum of ox #s in a neutral molecule:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Oxidation = ___ in oxidation number:", "a": ["Decrease", "Increase", "No change", "Doubling"], "c": 1}, {"q": "Reduction = ___ in oxidation number:", "a": ["Increase", "Decrease", "No change", "Halving"], "c": 1}, {"q": "Combustion is always a ___ reaction:", "a": ["Acid-base", "Precipitation", "Redox", "Decomposition"], "c": 2}, {"q": "Strong bases are mostly ___ hydroxides:", "a": ["Nonmetal", "Transition metal", "Group I/II", "Noble gas"], "c": 2}, {"q": "H₂SO₄ is a:", "a": ["Weak acid", "Strong acid", "Base", "Salt"], "c": 1}, {"q": "HClO₄ is a:", "a": ["Weak acid", "Strong acid", "Base", "Salt"], "c": 1}, {"q": "HF is a:", "a": ["Strong acid", "Weak acid", "Base", "Salt"], "c": 1}, {"q": "Ca(OH)₂ is a:", "a": ["Weak base", "Strong base", "Acid", "Salt"], "c": 1}, {"q": "In a net ionic equation, only ___ species appear:", "a": ["All", "Spectator", "Reacting", "Dissolved"], "c": 2}, {"q": "2C₂H₆ + 7O₂ → 4CO₂ + 6H₂O — coefficient of O₂:", "a": ["2", "4", "6", "7"], "c": 3}, {"q": "Solubility rules help predict:", "a": ["Acid strength", "Precipitate formation", "Oxidation numbers", "Bond type"], "c": 1}, {"q": "Half-reactions separate oxidation from:", "a": ["Acids", "Bases", "Reduction", "Precipitation"], "c": 2}]}, {"id": "chem-ch4b", "title": "Chapter 4 (cont): Redox, Limiting Reagents & Yield", "ln": "CHEM 260 · Ch 4 cont.", "notes": [{"heading": "Oxidation Number Rules (REMEMBER!)", "body": "<b>1)</b> Atom in elemental substance = <b>0</b>. <b>2)</b> Monatomic ion = ion's charge. <b>3)</b> H: <b>+1</b> with nonmetals (H₂O, NH₃), <b>−1</b> with metals (LiH). <b>4)</b> O: <b>−2</b> in most compounds; −1 in peroxides (O₂²⁻); very rarely −½ in superoxides. <b>5)</b> F: <b>always −1</b>. <b>6)</b> Other halogens: −1 except with O or other halogens. <b>7)</b> Sum of all ox #s = 0 (molecule) or = charge (ion)."}, {"heading": "Assigning Oxidation Numbers — Examples", "body": "<b>H₂S:</b> H = +1 each (with nonmetal), so S = −2 [2(+1) + S = 0]. <b>SO₃²⁻:</b> O = −2 each, so S + 3(−2) = −2 → S = <b>+4</b>. <b>Na₂SO₄:</b> Na = +1 each, O = −2 each, so 2(+1) + S + 4(−2) = 0 → S = <b>+6</b>. Practice: always solve for the unknown using the sum rule."}, {"heading": "Oxidation vs Reduction — Review", "body": "<b>Oxidation = increase</b> in oxidation number (loss of electrons). <b>Reduction = decrease</b> in oxidation number (gain of electrons). In NaCl: Na goes from 0 → +1 (oxidized). Cl goes from 0 → −1 (reduced). If ANY element changes ox #, it's a redox reaction."}, {"heading": "Types of Redox: Combustion", "body": "<b>Combustion:</b> fuel (reductant) + oxidant (often O₂) react vigorously → heat and light (flame). Examples: CH₄(g) + 2O₂(g) → CO₂ + 2H₂O. Rocket fuel: 10Al(s) + 6NH₄ClO₄(s) → 4Al₂O₃(s) + 2AlCl₃(s) + 12H₂O(g) + 3N₂(g). Always redox because carbon/metals change ox #."}, {"heading": "Types of Redox: Single Displacement", "body": "An ion in solution is <b>displaced (replaced)</b> by oxidation of a metallic element. More reactive metal pushes out less reactive one. Example: Cu(s) + 2AgNO₃(aq) → Cu(NO₃)₂(aq) + 2Ag(s). Cu is oxidized (0→+2); Ag is reduced (+1→0). Use the activity series to predict if a reaction occurs."}, {"heading": "Balancing Redox — Half-Reaction Method (Acidic)", "body": "<b>Step 1:</b> Write two half-reactions (oxidation and reduction). <b>Step 2:</b> Balance all elements EXCEPT O and H. <b>Step 3:</b> Balance O by adding H₂O. <b>Step 4:</b> Balance H by adding H⁺. <b>Step 5:</b> Balance charge by adding electrons (e⁻). This is the systematic approach that always works."}, {"heading": "Balancing Redox — Combining Half-Reactions", "body": "<b>Step 6:</b> Multiply each half-reaction by smallest integers to make electrons EQUAL in both. <b>Step 7:</b> Add the balanced half-reactions together. Simplify by canceling species on both sides (electrons must completely cancel!)."}, {"heading": "Balancing Redox — Basic Solution", "body": "<b>Step 8:</b> For basic media, add additional steps after balancing in acidic: add OH⁻ to both sides (equal to # of H⁺). Combine H⁺ + OH⁻ → H₂O. Simplify by canceling redundant H₂O molecules. <b>Step 9:</b> Final check — atoms AND charge must both balance."}, {"heading": "Redox Practice 1", "body": "<b>Cu + H⁺ + NO₃⁻ → Cu²⁺ + NO + H₂O</b> (acidic). Oxidation: Cu → Cu²⁺ + 2e⁻. Reduction: NO₃⁻ + 4H⁺ + 3e⁻ → NO + 2H₂O. Multiply: 3Cu and 2NO₃⁻. Final: <b>3Cu + 8H⁺ + 2NO₃⁻ → 3Cu²⁺ + 2NO + 4H₂O</b>. Check atoms and charge on both sides."}, {"heading": "Redox Practice 2", "body": "<b>Cl₂(aq) + OH⁻(aq) → Cl⁻(aq) + ClO₃⁻(aq) + H₂O(l)</b> (basic). This is a disproportionation reaction — Cl₂ is both oxidized AND reduced. Cl goes from 0 to −1 (reduction) and 0 to +5 (oxidation). Balance using the half-reaction method + basic media steps."}, {"heading": "Stoichiometry — The Baking Analogy", "body": "Just like baking: a recipe needs specific <b>ratios</b> of ingredients. If you only have 1 egg instead of 2, you must cut ALL other ingredients in half → can only make half a cake. In chemistry: reactants must be in the correct <b>mole ratios</b> from the balanced equation."}, {"heading": "Limiting Reagent — Definition", "body": "The <b>limiting reagent</b> (limiting reactant) is the reactant that <b>runs out first</b>. It determines the <b>maximum amount of product</b> that can form. The other reactant(s) are in <b>excess</b> — some will be left over when the reaction is complete."}, {"heading": "Identifying the Limiting Reagent", "body": "<b>Method:</b> For each reactant, calculate how much product it could make. The reactant that produces the <b>LEAST product</b> is the limiting reagent. Steps: <b>1)</b> Convert each reactant to moles. <b>2)</b> Use mole ratios to find moles of product from each. <b>3)</b> Smallest result → that reactant is limiting."}, {"heading": "Limiting Reagent Example: H₂ Combustion (moles)", "body": "2H₂ + O₂ → 2H₂O. Given: 2 mol H₂ and 2 mol O₂. From H₂: 2 mol H₂ × (2 mol H₂O / 2 mol H₂) = <b>2 mol H₂O</b>. From O₂: 2 mol O₂ × (2 mol H₂O / 1 mol O₂) = <b>4 mol H₂O</b>. H₂ produces less → <b>H₂ is limiting</b>. 1 mol O₂ left over (excess)."}, {"heading": "Limiting Reagent Example: H₂ Combustion (grams)", "body": "8 g H₂ + 8 g O₂ → H₂O? Convert to moles: H₂: 8/2.02 = 3.96 mol. O₂: 8/32.00 = 0.25 mol. Product from H₂: 3.96 × (2/2) = 3.96 mol H₂O. Product from O₂: 0.25 × (2/1) = 0.50 mol H₂O. O₂ gives less → <b>O₂ is limiting</b>. Max product = 0.50 mol H₂O."}, {"heading": "Limiting Reagent — Step-by-Step Method", "body": "<b>1)</b> Convert ALL reactant masses to moles (÷ molar mass). <b>2)</b> For each reactant, calculate moles of ONE product using mole ratios. <b>3)</b> Compare: whichever reactant gives the <b>smallest</b> amount of product is the limiting reagent. <b>4)</b> Use the limiting reagent amount for all further calculations."}, {"heading": "Theoretical Yield — Definition", "body": "The <b>maximum amount of product</b> that could be formed from the limiting reagent, assuming: <b>1)</b> No side reactions. <b>2)</b> Complete reaction (100% conversion). Calculated from the limiting reagent using mole ratios, then convert moles → grams if needed."}, {"heading": "Theoretical Yield Example", "body": "CH₄ + 2O₂ → CO₂ + 2H₂O. 10 g CH₄ + 10 g O₂. From CH₄: 10/16.04 = 0.624 mol → 0.624 × 2 = 1.247 mol H₂O → 22.5 g. From O₂: 10/32.00 = 0.3125 mol → 0.3125 × (2/2) = 0.3125 mol H₂O → <b>5.63 g</b>. O₂ is limiting. Theoretical yield = <b>5.63 g H₂O</b>."}, {"heading": "Actual Yield", "body": "The amount of product <b>actually obtained</b> from a real experiment. Always ≤ theoretical yield because of: incomplete reactions, side reactions, loss during transfer/purification, impure reactants. Measured experimentally."}, {"heading": "Percent Yield", "body": "Measures the <b>efficiency</b> of a reaction. Formula: <b>% yield = (actual yield ÷ theoretical yield) × 100</b>. 100% = perfect (rare). Example: theoretical = 5.59 g H₂O, actual = 5.00 g. % yield = (5.00/5.59) × 100 = <b>89.4%</b>."}, {"heading": "Percent Yield — What It Means", "body": "High % yield (>90%): very efficient reaction. Moderate (60-90%): typical for many lab reactions. Low (<60%): significant losses or side reactions. Industrial processes aim for highest possible yields. Knowing % yield helps evaluate and optimize reactions."}, {"heading": "Excess Reagent Calculation", "body": "Amount of excess reagent left over = initial amount − amount consumed. Amount consumed: use moles of limiting reagent × mole ratio to find moles of excess used. Convert back to grams if needed. Example: if 0.25 mol O₂ is limiting and requires 0.50 mol H₂, but you started with 3.96 mol H₂ → excess H₂ = 3.96 − 0.50 = 3.46 mol leftover."}, {"heading": "Complete Stoichiometry Problem Strategy", "body": "<b>1)</b> Write and balance the equation. <b>2)</b> Convert all given masses to moles. <b>3)</b> Identify limiting reagent (produces least product). <b>4)</b> Calculate theoretical yield from limiting reagent. <b>5)</b> If actual yield given, calculate percent yield. <b>6)</b> If asked, calculate excess reagent remaining."}, {"heading": "Mole Ratios from Balanced Equation", "body": "The coefficients in a balanced equation give <b>mole ratios</b>. CH₄ + 2O₂ → CO₂ + 2H₂O: 1 mol CH₄ : 2 mol O₂ : 1 mol CO₂ : 2 mol H₂O. These ratios are the conversion factors for stoichiometry. Always use the balanced equation — never skip this step."}, {"heading": "Key Equations & Definitions Summary", "body": "<b>Ox # rules:</b> element=0, ion=charge, H=+1/−1, O=−2, F=−1, sum=0 or charge.<br><b>Limiting reagent:</b> produces least product.<br><b>Theoretical yield:</b> max product from limiting reagent.<br><b>% yield = (actual/theoretical) × 100</b>.<br><b>Half-reaction method:</b> 7 steps (acidic) + 2 more for basic."}], "quiz": [{"q": "Ox # of an element in its standard state:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Ox # of H with nonmetals:", "a": ["−1", "0", "+1", "+2"], "c": 2}, {"q": "Ox # of H with metals:", "a": ["+1", "0", "−1", "+2"], "c": 2}, {"q": "Ox # of O in most compounds:", "a": ["0", "−1", "−2", "+2"], "c": 2}, {"q": "Ox # of O in peroxides:", "a": ["0", "−1", "−2", "+1"], "c": 1}, {"q": "Ox # of F is always:", "a": ["0", "−1", "+1", "−2"], "c": 1}, {"q": "Sum of ox #s in a neutral molecule:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Sum of ox #s in a polyatomic ion equals:", "a": ["0", "The ion's charge", "+1", "−1"], "c": 1}, {"q": "In H₂S, S has ox # of:", "a": ["+2", "−2", "+4", "−4"], "c": 1}, {"q": "In SO₃²⁻, S has ox # of:", "a": ["+2", "+4", "+6", "−2"], "c": 1}, {"q": "In Na₂SO₄, S has ox # of:", "a": ["+2", "+4", "+6", "−2"], "c": 2}, {"q": "Oxidation = ___ in oxidation number:", "a": ["Decrease", "Increase", "No change", "Doubling"], "c": 1}, {"q": "Reduction = ___ in oxidation number:", "a": ["Increase", "Decrease", "No change", "Halving"], "c": 1}, {"q": "Combustion is a type of ___ reaction:", "a": ["Acid-base", "Precipitation", "Redox", "Decomposition only"], "c": 2}, {"q": "Single displacement involves:", "a": ["Two compounds switching", "A metal replacing an ion", "Only gases", "Only acids"], "c": 1}, {"q": "Cu + 2AgNO₃ → Cu(NO₃)₂ + 2Ag — Cu is:", "a": ["Reduced", "Oxidized", "Unchanged", "A spectator"], "c": 1}, {"q": "In the same reaction, Ag⁺ is:", "a": ["Oxidized", "Reduced", "Unchanged", "Dissolved"], "c": 1}, {"q": "Balancing redox step 1:", "a": ["Add H₂O", "Write two half-reactions", "Add electrons", "Add OH⁻"], "c": 1}, {"q": "Balance O atoms by adding:", "a": ["O₂", "H⁺", "H₂O", "OH⁻"], "c": 2}, {"q": "Balance H atoms (acidic) by adding:", "a": ["H₂O", "H⁺", "OH⁻", "H₂"], "c": 1}, {"q": "Balance charge by adding:", "a": ["Protons", "Neutrons", "Electrons", "Ions"], "c": 2}, {"q": "For basic solution, add ___ equal to # of H⁺:", "a": ["H₂O", "H₂", "OH⁻", "O₂"], "c": 2}, {"q": "The limiting reagent is the one that:", "a": ["Is in excess", "Runs out first", "Is most expensive", "Weighs the most"], "c": 1}, {"q": "The limiting reagent determines:", "a": ["Reaction speed", "Maximum product", "Color", "Temperature"], "c": 1}, {"q": "To find limiting reagent, compare:", "a": ["Masses directly", "Moles of product each could make", "Colors", "Volumes"], "c": 1}, {"q": "2H₂ + O₂ → 2H₂O: 2 mol H₂ + 2 mol O₂. Limiting:", "a": ["O₂", "H₂", "Neither", "Both equally"], "c": 1}, {"q": "8g H₂ + 8g O₂ → H₂O. Limiting:", "a": ["H₂", "O₂", "Neither", "Cannot tell"], "c": 1}, {"q": "8g H₂ = ___ mol H₂ (MM=2.02):", "a": ["2.02", "3.96", "8.00", "16.0"], "c": 1}, {"q": "8g O₂ = ___ mol O₂ (MM=32.00):", "a": ["0.25", "0.50", "4.00", "8.00"], "c": 0}, {"q": "Theoretical yield assumes:", "a": ["Incomplete reaction", "Complete reaction, no side products", "50% conversion", "Excess reagent runs out"], "c": 1}, {"q": "Actual yield is always:", "a": ["Greater than theoretical", "Equal to theoretical", "≤ theoretical", "Double theoretical"], "c": 2}, {"q": "% yield = (actual ÷ theoretical) ×:", "a": ["10", "50", "100", "1000"], "c": 2}, {"q": "Theoretical=5.59g, actual=5.00g. % yield:", "a": ["55.9%", "89.4%", "100%", "111.8%"], "c": 1}, {"q": "High % yield (>90%) means:", "a": ["Inefficient", "Very efficient", "No reaction", "Side reactions"], "c": 1}, {"q": "The baking analogy: limiting reagent is like:", "a": ["The oven temperature", "The ingredient you run out of first", "The recipe book", "The mixing bowl"], "c": 1}, {"q": "Excess reagent is:", "a": ["Completely consumed", "Left over after reaction", "The product", "The catalyst"], "c": 1}, {"q": "Mole ratios come from:", "a": ["Subscripts", "Atomic numbers", "Coefficients in balanced equation", "Molar masses"], "c": 2}, {"q": "CH₄ + 2O₂ → CO₂ + 2H₂O: mole ratio CH₄:O₂:", "a": ["1:1", "1:2", "2:1", "1:3"], "c": 1}, {"q": "In stoichiometry, you must FIRST:", "a": ["Find density", "Balance the equation", "Measure temperature", "Add catalyst"], "c": 1}, {"q": "Grams → ___ → mole ratio → ___ → grams:", "a": ["Liters/atoms", "Moles/moles", "Volume/density", "Pressure/temp"], "c": 1}, {"q": "If % yield = 100%, actual equals:", "a": ["Zero", "Half of theoretical", "Theoretical exactly", "Double theoretical"], "c": 2}, {"q": "Disproportionation: one element is both:", "a": ["Acid and base", "Oxidized and reduced", "Solid and gas", "Created and destroyed"], "c": 1}, {"q": "Activity series predicts:", "a": ["Boiling points", "Whether displacement occurs", "Acid strength", "Solubility"], "c": 1}, {"q": "After finding limiting reagent, all calculations use:", "a": ["Excess reagent amount", "Limiting reagent amount", "Total of both", "Average"], "c": 1}, {"q": "Excess remaining = initial −:", "a": ["Products", "Amount consumed", "Theoretical yield", "Percent yield"], "c": 1}, {"q": "10g CH₄ + 10g O₂ → H₂O. Limiting is:", "a": ["CH₄", "O₂", "Neither", "Both"], "c": 1}, {"q": "Theoretical yield of H₂O in above ≈:", "a": ["5.6 g", "10 g", "22.5 g", "32 g"], "c": 0}, {"q": "Half-reactions have how many steps in acidic?", "a": ["3", "5", "7", "9"], "c": 2}, {"q": "Basic solution adds ___ extra steps:", "a": ["0", "1", "2", "5"], "c": 2}, {"q": "Final check in redox balancing: both ___ and ___ balance:", "a": ["Mass/volume", "Atoms/charge", "Color/state", "Temperature/pressure"], "c": 1}]}, {"id": "chem-ch5", "title": "Chapter 5: Thermochemistry (Part I)", "ln": "CHEM 260 · Ch 5", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Define system, surroundings, and forms of energy. <b>2)</b> Apply the First Law of Thermodynamics. <b>3)</b> Calculate heat, work, and internal energy changes. <b>4)</b> Interpret enthalpy changes using calorimetry data."}, {"heading": "Energy Basics", "body": "Chemistry studies matter; <b>energy affects matter</b> (e.g., gas molecular velocities). <b>Energy:</b> the capacity to supply heat or do work. Two types: <b>Potential energy</b> (related to position/composition) and <b>Kinetic energy</b> (related to motion). <b>Law of conservation of energy:</b> energy can be neither created nor destroyed, only changed in form."}, {"heading": "Thermal Energy & Temperature", "body": "<b>Thermal energy:</b> a type of kinetic energy from the random motion of atoms and molecules. <b>Temperature:</b> quantitative measure of 'hot' or 'cold.' Fast-moving molecules ↔ high thermal energy ↔ 'hot.' Slow-moving molecules ↔ low thermal energy ↔ 'cold.' Hot water molecules move <b>faster</b> than cold water molecules."}, {"heading": "Heat — Definition", "body": "<b>Heat:</b> the transfer of thermal energy between two bodies at <b>different temperatures</b>. Flows from high T → low T until temperatures equalize. Matter undergoing reactions can <b>release</b> heat (<b>exothermic</b>) or <b>absorb</b> heat (<b>endothermic</b>)."}, {"heading": "Exothermic vs Endothermic", "body": "<b>Exothermic (exothermal):</b> system releases heat to surroundings — surroundings get warmer. Feels hot. Examples: combustion, neutralization, freezing. <b>Endothermic (endothermal):</b> system absorbs heat from surroundings — surroundings get cooler. Feels cold. Examples: melting ice, dissolving NH₄NO₃."}, {"heading": "Energy Units", "body": "Two commonly used: <b>calorie (cal)</b> and <b>joule (J)</b>. Relationship: <b>1 cal = 4.184 J</b>. The joule is the SI unit. A calorie = energy to raise 1 g water by 1°C. Food Calories (capital C) = kilocalories = 1000 cal."}, {"heading": "Heat Capacity (C)", "body": "The quantity of heat (q) a body absorbs or releases when its temperature changes by <b>1°C</b>. Formula: <b>C = q / ΔT</b>. Units: <b>J/°C</b>. This is an <b>extensive</b> property — depends on the amount of material. A bigger pan needs more heat than a smaller one."}, {"heading": "Specific Heat Capacity (c)", "body": "The quantity of heat required to raise <b>1 gram</b> of a substance by <b>1°C</b>. Formula: <b>q = mcΔT</b> (or c = q/(mΔT)). Units: <b>J/(g·°C)</b>. This is an <b>intensive</b> property — same regardless of sample size. Water's specific heat = <b>4.184 J/(g·°C)</b> — very high compared to most substances."}, {"heading": "Heat Capacity vs Specific Heat", "body": "<b>Heat capacity (C):</b> for the whole object (extensive). <b>Specific heat (c):</b> per gram (intensive). Related by: <b>C = m × c</b>. If you know mass and specific heat, you know the heat capacity. If you know heat capacity and mass, you can find specific heat."}, {"heading": "Practice Q4: Heat Capacity", "body": "Cast iron frying pan: 18,150 J raises T by 50.0°C. <b>C = q/ΔT = 18,150 / 50.0 = 363 J/°C</b> (3 sig figs). This tells us how much energy the whole pan needs per degree of temperature change."}, {"heading": "Practice Q5: Specific Heat", "body": "The pan has mass 808 g. <b>c = C/m = 363 / 808 = 0.449 J/(g·°C)</b> (3 sig figs). This is a property of cast iron itself, regardless of pan size. Compare: water = 4.184 (iron heats up ~9× faster than water for same mass)."}, {"heading": "The q = mcΔT Equation", "body": "The most important equation in this chapter. <b>q = mcΔT</b>. q = heat (J or cal). m = mass (g). c = specific heat (J/g·°C). ΔT = T_final − T_initial (°C). Positive q = heat absorbed (endothermic). Negative q = heat released (exothermic)."}, {"heading": "Measuring Heat — Example", "body": "800 g of water heated from 21°C to 85°C. How much heat absorbed? <b>q = mcΔT = 800 × 4.184 × (85 − 21) = 800 × 4.184 × 64 = 214,221 J ≈ 214 kJ</b>. Always use specific heat of the substance being heated and ΔT = final − initial."}, {"heading": "Calorimetry", "body": "<b>Calorimetry:</b> technique to measure heat in chemical/physical processes. <b>Calorimeter:</b> device used (simplest = coffee cup calorimeter). Key terms: <b>System</b> = substances undergoing the change. <b>Surroundings</b> = all other matter providing/absorbing heat from the system."}, {"heading": "System and Surroundings", "body": "In chemistry, we define what we're studying as the <b>system</b> and everything else as the <b>surroundings</b>. Energy flows between them. In a calorimeter, the reaction is the system; the water and cup are the surroundings. Total energy is conserved."}, {"heading": "Calorimetry Principle", "body": "In an insulated calorimeter: <b>q_system = −q_surroundings</b>. Heat lost by one = heat gained by the other. The negative sign means: if the system releases heat (−), the surroundings gain it (+), and vice versa. This is conservation of energy in action."}, {"heading": "Calorimetry Practice Q6: Rebar Problem", "body": "360.0 g steel rebar (c = 0.449 J/g·°C) dropped into 425 mL water (c = 4.184 J/g·°C) at 24.0°C. Final T = 42.7°C. Find initial T of rebar. <b>q_water = −q_rebar</b>. q_water = 425 × 4.184 × (42.7−24.0) = 425 × 4.184 × 18.7 = <b>33,240 J</b>."}, {"heading": "Rebar Problem — Solving for T", "body": "q_rebar = −33,240 J (releases heat). q = mcΔT → −33,240 = 360.0 × 0.449 × (42.7 − T_initial). −33,240 = 161.6 × (42.7 − T_i). (42.7 − T_i) = −33,240/161.6 = −205.7. T_i = 42.7 + 205.7 = <b>248°C</b> (3 sig figs). Hot rebar cooled down in cold water."}, {"heading": "Neutralization Calorimetry", "body": "50.0 mL of 1.00 M HCl + 50.0 mL of 1.00 M NaOH, both at 22.0°C. Final T = 28.9°C. Heat produced: total volume ≈ 100 mL water (dilute solution ≈ water). <b>q = 100 × 4.184 × (28.9 − 22.0) = 100 × 4.184 × 6.9 ≈ 2887 J ≈ 2.89 kJ</b>. This is exothermic (T increased)."}, {"heading": "Why Specific Heat Matters", "body": "Water has an unusually <b>high specific heat (4.184)</b> compared to metals (~0.1–0.9). This means water resists temperature change — it's a great thermal buffer. This is why coastal climates are moderate, and why water is used as a coolant. Metals heat up and cool down much faster."}, {"heading": "Signs and Directions", "body": "<b>q > 0 (positive):</b> system absorbs heat (endothermic, T increases). <b>q < 0 (negative):</b> system releases heat (exothermic). <b>ΔT > 0:</b> temperature increased. <b>ΔT < 0:</b> temperature decreased. Always define clearly what is your system vs surroundings."}, {"heading": "Converting Units", "body": "<b>J to kJ:</b> divide by 1000. <b>cal to J:</b> multiply by 4.184. <b>kcal to kJ:</b> multiply by 4.184. <b>°C to K:</b> add 273.15. Note: ΔT in °C = ΔT in K (the degree size is the same). You do NOT need to convert to Kelvin for ΔT calculations."}, {"heading": "Calorimetry Assumptions", "body": "Coffee cup calorimeter assumes: <b>1)</b> Perfect insulation (no heat loss to environment). <b>2)</b> Heat capacity of the cup itself is negligible. <b>3)</b> Dilute aqueous solutions have the same specific heat and density as pure water. These are approximations — real calorimeters need corrections."}, {"heading": "Review: Limiting Reagent & Yield", "body": "This lecture also reviewed: <b>Limiting reagent:</b> reactant that runs out first → determines max product. <b>Theoretical yield:</b> max product from limiting reagent. <b>% yield = (actual/theoretical) × 100</b>. Example: 10g CH₄ + 10g O₂ → 5.00g H₂O (actual). Theoretical = 5.59g. % yield = 89.4%."}, {"heading": "Key Equations Summary", "body": "<b>q = mcΔT</b> (heat from specific heat)<br><b>C = q/ΔT</b> (heat capacity)<br><b>c = q/(mΔT)</b> (specific heat)<br><b>C = mc</b> (heat capacity from specific heat)<br><b>q_system = −q_surroundings</b> (calorimetry)<br><b>1 cal = 4.184 J</b><br><b>ΔT = T_final − T_initial</b>"}], "quiz": [{"q": "Energy is the capacity to:", "a": ["Create matter", "Supply heat or do work", "Destroy atoms", "Change elements"], "c": 1}, {"q": "Potential energy is related to:", "a": ["Motion", "Position/composition", "Temperature", "Pressure"], "c": 1}, {"q": "Kinetic energy is related to:", "a": ["Position", "Composition", "Motion", "Charge"], "c": 2}, {"q": "Thermal energy is a type of:", "a": ["Potential energy", "Kinetic energy", "Nuclear energy", "Chemical energy"], "c": 1}, {"q": "Temperature measures:", "a": ["Total energy", "Average kinetic energy of particles", "Potential energy", "Mass"], "c": 1}, {"q": "Hot water molecules move ___ than cold:", "a": ["Slower", "Faster", "Same speed", "Not at all"], "c": 1}, {"q": "Heat flows from:", "a": ["Cold to hot", "Hot to cold", "Equal temps", "Random"], "c": 1}, {"q": "Exothermic means the system:", "a": ["Absorbs heat", "Releases heat", "No heat change", "Gains mass"], "c": 1}, {"q": "Endothermic means the system:", "a": ["Releases heat", "Absorbs heat", "No heat change", "Loses mass"], "c": 1}, {"q": "1 cal = ___ J:", "a": ["1.000", "2.718", "4.184", "8.314"], "c": 2}, {"q": "The SI unit of energy is:", "a": ["Calorie", "Joule", "Watt", "Newton"], "c": 1}, {"q": "Heat capacity (C) is ___ property:", "a": ["Intensive", "Extensive", "Chemical", "Nuclear"], "c": 1}, {"q": "Specific heat (c) is ___ property:", "a": ["Extensive", "Intensive", "Chemical", "Nuclear"], "c": 1}, {"q": "q = mcΔT: q is:", "a": ["Mass", "Specific heat", "Heat", "Temperature"], "c": 2}, {"q": "q = mcΔT: c is:", "a": ["Heat capacity", "Specific heat", "Heat", "Temperature change"], "c": 1}, {"q": "ΔT = T_final −:", "a": ["T_average", "T_initial", "T_maximum", "0"], "c": 1}, {"q": "Water specific heat =:", "a": ["1.00 J/g°C", "2.09 J/g°C", "4.184 J/g°C", "0.449 J/g°C"], "c": 2}, {"q": "Iron specific heat (0.449) vs water (4.184) means iron:", "a": ["Heats slower", "Heats faster", "Same rate", "Doesn't heat"], "c": 1}, {"q": "18,150 J ÷ 50.0°C =:", "a": ["363 J/°C", "363 g", "363 mol", "363 J"], "c": 0}, {"q": "363 J/°C ÷ 808 g =:", "a": ["0.449 J/g°C", "4.49 J/g°C", "44.9 J/g°C", "449 J/g°C"], "c": 0}, {"q": "Calorimetry measures:", "a": ["Mass", "Volume", "Heat in reactions", "Pressure"], "c": 2}, {"q": "System is:", "a": ["Everything", "Substance undergoing change", "The container", "The thermometer"], "c": 1}, {"q": "Surroundings is:", "a": ["The reaction", "All other matter", "Only the water", "Only the cup"], "c": 1}, {"q": "q_system = ___ q_surroundings:", "a": ["Equal to", "Negative of", "Double", "Half"], "c": 1}, {"q": "Coffee cup calorimeter is:", "a": ["Very expensive", "A simple constant-pressure device", "For gases only", "For nuclear reactions"], "c": 1}, {"q": "If system releases heat, surroundings:", "a": ["Also release heat", "Gain heat", "No change", "Lose mass"], "c": 1}, {"q": "Positive q means system:", "a": ["Released heat", "Absorbed heat", "No change", "Lost mass"], "c": 1}, {"q": "Negative q means system:", "a": ["Absorbed heat", "Released heat", "No change", "Gained mass"], "c": 1}, {"q": "Rebar (360g, c=0.449) dropped in water — heat goes from:", "a": ["Water to rebar", "Rebar to water", "Neither", "Both directions equally"], "c": 1}, {"q": "In the rebar problem, final T was 42.7°C. Water started at 24.0°C, so ΔT_water =:", "a": ["18.7°C", "42.7°C", "24.0°C", "66.7°C"], "c": 0}, {"q": "800g water heated 21→85°C. ΔT =:", "a": ["21°C", "64°C", "85°C", "106°C"], "c": 1}, {"q": "q for 800g water (ΔT=64°C): 800×4.184×64 ≈:", "a": ["21.4 kJ", "214 kJ", "2140 kJ", "21,400 kJ"], "c": 1}, {"q": "HCl + NaOH mixing: temperature went UP, so reaction is:", "a": ["Endothermic", "Exothermic", "Neither", "Equilibrium"], "c": 1}, {"q": "Neutralization is typically:", "a": ["Endothermic", "Exothermic", "Neither", "Variable"], "c": 1}, {"q": "ΔT in °C equals ΔT in:", "a": ["Fahrenheit", "Kelvin", "Rankine", "Joules"], "c": 1}, {"q": "You do NOT convert to Kelvin for:", "a": ["Absolute temperature", "ΔT calculations", "Gas laws", "Nothing"], "c": 1}, {"q": "J to kJ:", "a": ["Multiply by 1000", "Divide by 1000", "Multiply by 4.184", "Divide by 4.184"], "c": 1}, {"q": "cal to J:", "a": ["Divide by 4.184", "Multiply by 4.184", "Add 273", "Subtract 273"], "c": 1}, {"q": "Water resists temperature change because of its:", "a": ["Low specific heat", "High specific heat", "Low density", "High mass"], "c": 1}, {"q": "Conservation of energy:", "a": ["Energy can be created", "Energy can be destroyed", "Energy changes form but total is constant", "Energy always increases"], "c": 2}, {"q": "Freezing water is:", "a": ["Endothermic", "Exothermic", "Neither", "Both"], "c": 1}, {"q": "Melting ice is:", "a": ["Exothermic", "Endothermic", "Neither", "Both"], "c": 1}, {"q": "C = m × c relates:", "a": ["Heat capacity and specific heat", "Mass and volume", "Energy and temperature", "Pressure and volume"], "c": 0}, {"q": "Calorimeter assumes:", "a": ["Perfect insulation", "Heat loss is large", "Cup absorbs most heat", "Density doesn't matter"], "c": 0}, {"q": "For dilute solutions, assume specific heat ≈:", "a": ["0", "1.00", "4.184 (water)", "8.314"], "c": 2}, {"q": "% yield = actual ÷ ___ × 100:", "a": ["Excess", "Theoretical", "Total mass", "Moles"], "c": 1}, {"q": "Limiting reagent produces the ___ product:", "a": ["Most", "Least", "Average", "No"], "c": 1}, {"q": "Theoretical yield is based on the:", "a": ["Excess reagent", "Limiting reagent", "Total reactants", "Products"], "c": 1}, {"q": "89.4% yield means:", "a": ["89.4% of theoretical was obtained", "10.6% was obtained", "100% efficient", "No product formed"], "c": 0}, {"q": "Heat is transferred between bodies at:", "a": ["Same temperature", "Different temperatures", "Same pressure", "Same volume"], "c": 1}]}, {"id": "chem-ch5b", "title": "Chapter 5 (cont): Enthalpy & Hess's Law", "ln": "CHEM 260 · Ch 5 cont.", "notes": [{"heading": "Internal Energy (U)", "body": "<b>Internal energy (U):</b> the total of ALL possible kinds of energy present in a substance (kinetic + potential of all particles). It is a <b>state function</b> — its value depends only on the current state of the system, NOT on the path taken to reach that state. Like altitude on a mountain: same height at the peak regardless of which trail you hiked."}, {"heading": "State Functions", "body": "A <b>state function</b> depends only on the initial and final states, not the path between them. Examples: mass, pressure, temperature, volume, internal energy (U), enthalpy (H). <b>NOT</b> state functions: heat (q) and work (w) individually — they depend on the path. But ΔU = q + w IS a state function."}, {"heading": "First Law of Thermodynamics", "body": "<b>ΔU = q + w</b>. The change in internal energy equals the heat added to the system plus the work done ON the system. Energy is conserved — cannot be created or destroyed. If q is positive (heat absorbed) and w is positive (work done on system), ΔU increases."}, {"heading": "Enthalpy (H)", "body": "<b>H = U + PV</b> (internal energy + pressure × volume). At constant pressure: <b>ΔH = ΔU + PΔV</b>. For most reactions in open containers (constant P), the heat measured IS ΔH. Enthalpy is a <b>state function</b>. YES — enthalpy is a state function just like U."}, {"heading": "Enthalpy Sign Convention", "body": "<b>ΔH > 0 (positive):</b> endothermic — system absorbs heat from surroundings. <b>ΔH < 0 (negative):</b> exothermic — system releases heat to surroundings. The sign tells you the direction of heat flow relative to the system."}, {"heading": "Thermochemical Equations", "body": "Show changes in BOTH matter AND energy. Include <b>ΔH</b> as part of the equation. Example: H₂(g) + ½O₂(g) → H₂O(l), ΔH = <b>−286 kJ</b>. The 286 kJ is released (negative) when 1 mol H₂ reacts with ½ mol O₂ to form 1 mol liquid water."}, {"heading": "Coefficient Rules for ΔH", "body": "If you <b>multiply</b> all coefficients by a factor, multiply ΔH by the <b>same factor</b>. Example: 2H₂ + O₂ → 2H₂O has ΔH = 2(−286) = <b>−572 kJ</b>. Half the reaction: ½H₂ + ¼O₂ → ½H₂O has ΔH = ½(−286) = <b>−143 kJ</b>. If you <b>reverse</b> a reaction, flip the sign of ΔH."}, {"heading": "Practice Q5: Scaling ΔH", "body": "Given: H₂ + ½O₂ → H₂O, ΔH = −286 kJ. <b>For 2 mol H₂:</b> double everything → ΔH = 2(−286) = <b>−572 kJ</b>. <b>For ½ mol H₂:</b> halve everything → ΔH = ½(−286) = <b>−143 kJ</b>. The ratio always stays the same."}, {"heading": "Practice Q6: Writing Thermochemical Equations", "body": "0.0500 mol HCl + 0.0500 mol NaOH → 0.0500 mol NaCl, producing 2.9 kJ. For ONE mole: scale up by factor of 20 (1/0.05). ΔH = 20 × (−2.9) = <b>−58 kJ</b>. Equation: <b>HCl(aq) + NaOH(aq) → NaCl(aq) + H₂O(l), ΔH° = −58 kJ</b>."}, {"heading": "Standard State Conditions", "body": "IUPAC standard state (denoted by ° superscript): <b>Pressure:</b> 1 bar (≈ 1 atm, both accepted). <b>Solutions:</b> 1 M concentration. <b>Temperature:</b> no official specification, but <b>25°C (298.15 K)</b> assumed unless stated otherwise. Standard state is the reference point for all thermochemical data."}, {"heading": "Standard Enthalpy of Combustion", "body": "<b>ΔH°c:</b> enthalpy change when <b>1 mole</b> of a substance burns completely under standard conditions. Also called heat of combustion. Always negative (exothermic). Example: isooctane C₈H₁₈ has ΔH°c = −5460 kJ/mol."}, {"heading": "Combustion Practice Q7", "body": "Burn 1.00 L of isooctane (density 0.692 g/mL, MM = 114 g/mol, ΔH°c = −5460 kJ/mol). <b>Step 1:</b> mass = 1000 mL × 0.692 g/mL = 692 g. <b>Step 2:</b> moles = 692 / 114 = 6.07 mol. <b>Step 3:</b> heat = 6.07 × 5460 = <b>33,100 kJ</b> = 33.1 MJ released. That's a lot of energy from 1 liter of gasoline!"}, {"heading": "Standard Enthalpy of Formation (ΔH°f)", "body": "Enthalpy change when <b>1 mole of a pure substance</b> is formed from its <b>constituent free elements in their most stable states</b> under standard conditions. Example: C(s, graphite) + O₂(g) → CO₂(g), ΔH°f = −393.5 kJ/mol. This is THE definition — memorize it."}, {"heading": "ΔH°f of Elements = 0", "body": "The standard enthalpy of formation of any <b>element in its most stable form</b> is <b>exactly zero</b> by definition. O₂(g) = 0. C(s, graphite) = 0. H₂(g) = 0. Fe(s) = 0. This is the reference point — everything else is measured relative to elements."}, {"heading": "Formation Practice Q8", "body": "H₂(g) + Cl₂(g) → 2HCl(g). ΔH°f of HCl(g) = −92.3 kJ/mol. Since 2 mol HCl formed: ΔH° = 2(−92.3) = <b>−184.6 kJ</b>. Reactants are elements in standard states (ΔH°f = 0), so the reaction enthalpy equals the sum of formation enthalpies of products."}, {"heading": "Hess's Law — Concept", "body": "The enthalpy change ΔH of the <b>total process equals the sum of ΔH of the individual steps</b>. Because enthalpy is a state function, ΔH depends only on initial and final states, NOT the path. Analogy: driving to Detroit — total elevation change is the same whether you take the highway or back roads."}, {"heading": "Hess's Law — How to Use", "body": "<b>1)</b> Write the target reaction. <b>2)</b> Find known reactions that can be combined to give the target. <b>3)</b> If a reaction needs to be reversed, flip the sign of ΔH. <b>4)</b> If coefficients need to be multiplied, multiply ΔH too. <b>5)</b> Add all ΔH values. Intermediate species cancel when you add the steps."}, {"heading": "Hess's Law Example: Burning Carbon", "body": "Target: C(s) + O₂(g) → CO₂(g). Can happen directly OR in two steps: <b>Step 1:</b> C(s) + ½O₂(g) → CO(g), ΔH₁ = −110.5 kJ. <b>Step 2:</b> CO(g) + ½O₂(g) → CO₂(g), ΔH₂ = −283.0 kJ. <b>Sum:</b> C + O₂ → CO₂, ΔH = −110.5 + (−283.0) = <b>−393.5 kJ</b>. CO cancels out!"}, {"heading": "ΔH° from Formation Data — The Master Equation", "body": "<b>ΔH°rxn = Σ[n × ΔH°f(products)] − Σ[n × ΔH°f(reactants)]</b>. Σ = sum, n = coefficient. This is the most powerful equation for calculating reaction enthalpies. Works for ANY reaction if you have formation data tables. Elements in standard states have ΔH°f = 0."}, {"heading": "Master Equation Example", "body": "3NO₂(g) + H₂O(l) → 2HNO₃(aq) + NO(g). ΔH° = [2×ΔH°f(HNO₃) + 1×ΔH°f(NO)] − [3×ΔH°f(NO₂) + 1×ΔH°f(H₂O)]. Look up each ΔH°f value from the table, plug in, and calculate. Systematic and reliable."}, {"heading": "When to Use Which Method", "body": "<b>q = mcΔT:</b> when you have mass, specific heat, and temperature change (calorimetry). <b>Hess's Law (adding steps):</b> when you have multiple known reactions that combine to give your target. <b>ΔH°f master equation:</b> when you have a table of formation enthalpies (most common on exams)."}, {"heading": "Reversing Reactions", "body": "If you reverse a chemical equation, <b>flip the sign of ΔH</b>. Forward: A → B, ΔH = −100 kJ. Reverse: B → A, ΔH = <b>+100 kJ</b>. Exothermic forward → endothermic reverse. This makes sense: if forming B releases heat, decomposing B must absorb the same amount."}, {"heading": "Common Exam Pitfalls", "body": "<b>1)</b> Forgetting to multiply ΔH when scaling coefficients. <b>2)</b> Forgetting to flip sign when reversing. <b>3)</b> Assuming ΔH°f of elements ≠ 0 (it IS zero). <b>4)</b> Mixing up ΔH°f (formation) with ΔH°c (combustion). <b>5)</b> Using wrong signs: exo = negative, endo = positive."}, {"heading": "Key Equations Summary", "body": "<b>ΔU = q + w</b> (First Law)<br><b>H = U + PV</b><br><b>ΔH > 0 = endothermic; ΔH < 0 = exothermic</b><br><b>ΔH°rxn = Σ[nΔH°f(products)] − Σ[nΔH°f(reactants)]</b><br><b>Hess's Law: ΔH_total = ΔH₁ + ΔH₂ + ...</b><br><b>ΔH°f of elements in standard state = 0</b><br><b>Reverse reaction → flip ΔH sign</b><br><b>Scale coefficients → scale ΔH</b>"}], "quiz": [{"q": "Internal energy (U) is:", "a": ["Only kinetic energy", "Only potential energy", "Total of all possible energies", "Temperature only"], "c": 2}, {"q": "A state function depends on:", "a": ["The path taken", "Initial and final states only", "Speed of reaction", "Catalyst used"], "c": 1}, {"q": "Which is a state function?", "a": ["Heat (q)", "Work (w)", "Enthalpy (H)", "Both q and w"], "c": 2}, {"q": "First Law: ΔU =:", "a": ["q only", "w only", "q + w", "q − w"], "c": 2}, {"q": "H = U +:", "a": ["ST", "PV", "mc", "nR"], "c": 1}, {"q": "At constant pressure, ΔH =:", "a": ["q_p", "w", "ΔU exactly", "PV"], "c": 0}, {"q": "Enthalpy is a state function:", "a": ["True", "False", "Only at high T", "Only for gases"], "c": 0}, {"q": "ΔH > 0 means:", "a": ["Exothermic", "Endothermic", "No change", "Equilibrium"], "c": 1}, {"q": "ΔH < 0 means:", "a": ["Endothermic", "Exothermic", "No change", "Equilibrium"], "c": 1}, {"q": "Thermochemical equations include:", "a": ["Only formulas", "Only ΔH", "Both matter changes and ΔH", "Only states"], "c": 2}, {"q": "H₂ + ½O₂ → H₂O, ΔH = −286 kJ. For 2H₂ + O₂ → 2H₂O, ΔH =:", "a": ["−286 kJ", "−143 kJ", "−572 kJ", "−1144 kJ"], "c": 2}, {"q": "Same reaction halved: ½H₂ + ¼O₂ → ½H₂O, ΔH =:", "a": ["−286 kJ", "−572 kJ", "−143 kJ", "−71.5 kJ"], "c": 2}, {"q": "Reversing a reaction ___ the sign of ΔH:", "a": ["Keeps the same", "Flips", "Doubles", "Zeros out"], "c": 1}, {"q": "0.05 mol HCl + NaOH produces 2.9 kJ. For 1 mol, ΔH =:", "a": ["−2.9 kJ", "−29 kJ", "−58 kJ", "−290 kJ"], "c": 2}, {"q": "Standard state pressure:", "a": ["0.5 bar", "1 bar", "2 bar", "10 bar"], "c": 1}, {"q": "Standard state assumes temperature:", "a": ["0°C", "25°C", "100°C", "273°C"], "c": 1}, {"q": "Standard state solutions:", "a": ["0.1 M", "0.5 M", "1 M", "2 M"], "c": 2}, {"q": "ΔH°c is enthalpy of:", "a": ["Formation", "Combustion", "Dissolution", "Neutralization"], "c": 1}, {"q": "Combustion ΔH is always:", "a": ["Positive", "Negative", "Zero", "Variable"], "c": 1}, {"q": "1 L isooctane (692g, MM=114, ΔH°c=−5460) releases ≈:", "a": ["5,460 kJ", "15,000 kJ", "33,100 kJ", "55,000 kJ"], "c": 2}, {"q": "ΔH°f is enthalpy of:", "a": ["Combustion", "Decomposition", "Formation from elements", "Neutralization"], "c": 2}, {"q": "ΔH°f of O₂(g) =:", "a": ["+100 kJ", "−100 kJ", "0 kJ", "Unknown"], "c": 2}, {"q": "ΔH°f of C(s, graphite) =:", "a": ["+393 kJ", "−393 kJ", "0 kJ", "Unknown"], "c": 2}, {"q": "ΔH°f of ANY element in standard state:", "a": ["Positive", "Negative", "Zero", "Varies"], "c": 2}, {"q": "ΔH°f of CO₂(g) =:", "a": ["0 kJ", "+393.5 kJ", "−393.5 kJ", "Unknown"], "c": 2}, {"q": "H₂ + Cl₂ → 2HCl. If ΔH°f(HCl)=−92.3, ΔH°rxn =:", "a": ["−92.3 kJ", "−184.6 kJ", "+92.3 kJ", "+184.6 kJ"], "c": 1}, {"q": "Hess's Law: ΔH depends on:", "a": ["Path taken", "Initial and final states only", "Catalyst", "Speed"], "c": 1}, {"q": "Hess's Law: ΔH_total =:", "a": ["ΔH₁ × ΔH₂", "ΔH₁ + ΔH₂ + ...", "ΔH₁ − ΔH₂", "ΔH₁ / ΔH₂"], "c": 1}, {"q": "C→CO (−110.5 kJ) + CO→CO₂ (−283.0 kJ). C→CO₂ =:", "a": ["−110.5 kJ", "−283.0 kJ", "−393.5 kJ", "+393.5 kJ"], "c": 2}, {"q": "When adding Hess's Law steps, intermediate species:", "a": ["Stay", "Cancel out", "Double", "Change sign"], "c": 1}, {"q": "Master equation: ΔH°rxn = Σ products −:", "a": ["Σ elements", "Σ reactants", "Σ coefficients", "Σ masses"], "c": 1}, {"q": "In master equation, n represents:", "a": ["Moles measured", "Coefficient in balanced equation", "Avogadro's number", "Number of elements"], "c": 1}, {"q": "Exothermic forward means reverse is:", "a": ["Also exothermic", "Endothermic", "Zero", "Impossible"], "c": 1}, {"q": "Multiply coefficients by 3 →:", "a": ["ΔH stays same", "ΔH × 3", "ΔH ÷ 3", "ΔH flips sign"], "c": 1}, {"q": "q = mcΔT is used for:", "a": ["Formation calculations", "Hess's Law", "Calorimetry problems", "Gas law problems"], "c": 2}, {"q": "The master equation needs:", "a": ["Specific heats", "ΔH°f values from tables", "Masses", "Volumes"], "c": 1}, {"q": "Standard state denoted by:", "a": ["* superscript", "° superscript", "# subscript", "No symbol"], "c": 1}, {"q": "At standard state, 1 bar ≈:", "a": ["0.5 atm", "1 atm", "2 atm", "10 atm"], "c": 1}, {"q": "If forming a product releases heat, decomposing it:", "a": ["Also releases heat", "Absorbs the same amount", "No energy change", "Doubles the heat"], "c": 1}, {"q": "Mountain analogy for state functions: altitude depends on:", "a": ["Which trail you take", "Only start and end points", "Speed of hiking", "Weather"], "c": 1}, {"q": "Heat (q) is ___ a state function:", "a": ["Always", "Never", "Sometimes", "Only at standard state"], "c": 1}, {"q": "Work (w) is ___ a state function:", "a": ["Always", "Never", "Sometimes", "Only for gases"], "c": 1}, {"q": "But ΔU = q + w IS a state function because:", "a": ["q and w cancel", "The sum is path-independent", "Only q matters", "Only w matters"], "c": 1}, {"q": "For most lab reactions (open container), we measure:", "a": ["ΔU directly", "ΔH (at constant pressure)", "w only", "PV only"], "c": 1}, {"q": "ΔH for dissolving NH₄NO₃:", "a": ["Negative (exo)", "Positive (endo)", "Zero", "Depends"], "c": 1}, {"q": "ΔH for combustion of methane:", "a": ["Positive", "Negative", "Zero", "Unknown"], "c": 1}, {"q": "Burning 1 mol C₈H₁₈ releases:", "a": ["286 kJ", "393 kJ", "5460 kJ", "92.3 kJ"], "c": 2}, {"q": "692g isooctane ÷ 114 g/mol =:", "a": ["3.04 mol", "6.07 mol", "12.1 mol", "0.165 mol"], "c": 1}, {"q": "Common exam mistake: assuming ΔH°f of element ≠ 0:", "a": ["Correct assumption", "Incorrect — it IS zero", "Only for metals", "Only for gases"], "c": 1}, {"q": "Hess's Law works because enthalpy is:", "a": ["Path-dependent", "A state function", "Always negative", "Unmeasurable"], "c": 1}]}, {"id": "chem-ch6", "title": "Chapter 6: Electronic Structure (Part I)", "ln": "CHEM 260 · Ch 6", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Explain properties of electromagnetic energy. <b>2)</b> Describe features of the Bohr model. <b>3)</b> Summarize key aspects of quantum theory. <b>4)</b> Determine electron configurations for atoms. <b>5)</b> Relate electronic structure to periodic trends."}, {"heading": "Electromagnetic Radiation (EMR)", "body": "A <b>self-propagating wave</b> of the electromagnetic field that carries momentum and radiant energy through space. Examples: radio waves, microwaves, infrared, visible light, ultraviolet, X-rays, gamma rays. <b>Waves</b> are oscillations that transport energy from one point to another."}, {"heading": "Wave Properties", "body": "<b>Wavelength (λ):</b> distance between two consecutive peaks or troughs. <b>Frequency (ν):</b> number of cycles per second (units: Hz = s⁻¹). ν = 1/T where T is the period. <b>Amplitude (a):</b> magnitude of displacement (half the height between peak and trough). Higher amplitude = brighter/more intense light."}, {"heading": "The Wave Equation", "body": "<b>c = λν</b> — the most important equation here. c = speed of light = <b>3.00 × 10⁸ m/s</b>. If you know wavelength, you can find frequency (and vice versa). λ and ν are <b>inversely proportional</b>: longer wavelength = lower frequency, and shorter wavelength = higher frequency."}, {"heading": "The Electromagnetic Spectrum", "body": "From longest λ (lowest energy) to shortest λ (highest energy): <b>Radio → Microwave → Infrared → Visible (ROYGBIV) → Ultraviolet → X-ray → Gamma</b>. Visible light is a tiny sliver of the full spectrum. Red has the longest visible λ; violet has the shortest."}, {"heading": "Practice Q1: Wavelength → Frequency", "body": "Sodium streetlight: yellow light, λ = 589 nm. Convert: 589 nm × 10⁻⁹ m/nm = 5.89 × 10⁻⁷ m. Use c = λν → ν = c/λ = (3.00×10⁸)/(5.89×10⁻⁷) = <b>5.09 × 10¹⁴ Hz</b>. Always convert nm to meters first!"}, {"heading": "The Photoelectric Effect", "body": "<b>Metals emit electrons</b> when light shines on their surface. The light energy must exceed a minimum <b>threshold energy</b> for this to occur. Below threshold → no electrons ejected regardless of intensity. This proved light has particle-like properties (<b>photons</b>)."}, {"heading": "Photon Energy — Planck's Formula", "body": "<b>E = hν</b> where h = <b>6.626 × 10⁻³⁴ J·s</b> (Planck's constant). Since c = λν, we also get <b>E = hc/λ</b>. Shorter wavelength = higher frequency = <b>higher energy</b>. Energy is <b>quantized</b> — comes in discrete packets (photons), not continuous."}, {"heading": "Practice Q2: Photon Energy", "body": "Neon sign: λ = 640 nm = 6.40 × 10⁻⁷ m. E = hc/λ = (6.626×10⁻³⁴)(3.00×10⁸) / (6.40×10⁻⁷) = <b>3.11 × 10⁻¹⁹ J</b>. This is the energy of ONE photon. Very small — but billions of photons make visible light."}, {"heading": "Photoelectric Effect — Key Points", "body": "<b>1)</b> Light must exceed threshold energy → depends on the metal. <b>2)</b> Shorter λ = higher energy photons = higher energy ejected electrons. <b>3)</b> More intense light (more photons) ejects more electrons, but each electron's energy depends on photon energy (frequency), not intensity."}, {"heading": "The Bohr Model (1913)", "body": "Niels Bohr's model explains: <b>1)</b> Stability of the hydrogen atom. <b>2)</b> Line spectrum (discrete energies emitted). Key postulate: electrons can only have <b>specific, quantized energy values</b> called energy levels. Not any energy — only certain allowed ones."}, {"heading": "Bohr Energy Levels", "body": "Energy of level n: <b>E = −k/n²</b> where k = <b>2.179 × 10⁻¹⁸ J</b> (for hydrogen-like atoms) and n = principal quantum number (1, 2, 3...). n=1 is the ground state (lowest energy, most negative). As n increases, energy increases (becomes less negative) and orbital gets larger."}, {"heading": "Energy Transitions", "body": "When an electron moves between levels: <b>ΔE = E_final − E_initial = E₂ − E₁</b>. <b>Emission:</b> electron drops to lower level → releases photon (ΔE negative). <b>Absorption:</b> electron jumps to higher level → absorbs photon (ΔE positive). The photon energy exactly equals |ΔE|."}, {"heading": "Practice Q3: Bohr Transition", "body": "Electron moves from n=4 to n=6 in hydrogen. ΔE = −k(1/n₂² − 1/n₁²) = −2.179×10⁻¹⁸(1/36 − 1/16) = −2.179×10⁻¹⁸(0.02778 − 0.0625) = −2.179×10⁻¹⁸(−0.03472) = <b>+7.56 × 10⁻²⁰ J</b>. Positive → absorption (electron goes UP). Wavelength: λ = hc/E."}, {"heading": "De Broglie Wavelength", "body": "Louis de Broglie (1924): particles have <b>wave-like character</b>. Wavelength is inversely proportional to momentum: <b>λ = h/(mv)</b>. h = Planck's constant, m = mass, v = velocity. Macroscopic objects have immeasurably tiny wavelengths. Electrons have significant wavelengths — they behave as waves!"}, {"heading": "Practice Q4: De Broglie", "body": "1.00 kg at 1.00 km/hr (= 0.278 m/s): λ = 6.626×10⁻³⁴/(1.00 × 0.278) = <b>2.38 × 10⁻³³ m</b> → impossibly small, undetectable. Electron (9.11×10⁻³¹ kg at 4.19×10⁶ m/s): λ = 6.626×10⁻³⁴/(9.11×10⁻³¹ × 4.19×10⁶) = <b>1.74 × 10⁻¹⁰ m</b> → measurable! About the size of an atom."}, {"heading": "Schrödinger Equation", "body": "Schrödinger's equation calculates the <b>probability</b> of finding an electron with a particular energy at a particular location. Solutions to the wave function (ψ) yield <b>quantum numbers</b> that describe the electron's state. We don't know exactly WHERE an electron is — only the probability of finding it in a region."}, {"heading": "Principal Quantum Number (n)", "body": "Characterizes the <b>energy</b> of the electron in its orbital. Values: any <b>integer ≥ 1</b> (1, 2, 3, 4...). Larger n = <b>higher energy</b> (less negative) and <b>larger orbital</b>. Farther from nucleus = higher energy because the electron-nucleus attraction is weaker."}, {"heading": "Angular Momentum Quantum Number (l)", "body": "Determines the <b>shape</b> of the orbital. Values: integers from <b>0 to (n−1)</b>. Each value has a letter: <b>l=0 → s</b> (sphere), <b>l=1 → p</b> (two balloons), <b>l=2 → d</b> (four balloons), <b>l=3 → f</b> (eight balloons). Example: if n=3, l can be 0, 1, or 2 (s, p, d)."}, {"heading": "s Orbitals (l = 0)", "body": "<b>Spherical</b> shape. <b>1 per energy level</b> (1s, 2s, 3s...). Each is larger than the previous. Lowest energy orbital within a given n. Present at ALL energy levels (n ≥ 1)."}, {"heading": "p Orbitals (l = 1)", "body": "<b>Dumbbell</b> shape (two balloons tied at knots). <b>3 per energy level</b> (px, py, pz — one along each axis). Start at <b>n = 2</b> (because l must be ≤ n−1; for n=1, max l=0). Each set of three p orbitals are degenerate (same energy)."}, {"heading": "d Orbitals (l = 2)", "body": "<b>Clover/complex</b> shapes. <b>5 per energy level</b> (dxy, dyz, dxz, dx²−y², dz²). Start at <b>n = 3</b>. Four are in different planes; the fifth (dz²) is along the z-axis. Important for transition metal chemistry."}, {"heading": "f Orbitals (l = 3)", "body": "Even more complex shapes. <b>7 per energy level</b>. Start at <b>n = 4</b>. Less important for this course than s, p, d. Relevant for lanthanides and actinides on the periodic table."}, {"heading": "Magnetic Quantum Number (mₗ)", "body": "Specifies the <b>orientation</b> of the orbital in space. Values: integers from <b>−l to +l</b> (including 0). Number of orbitals in a subshell = <b>2l + 1</b>. For l=1 (p): mₗ = −1, 0, +1 → 3 orbitals. For l=2 (d): mₗ = −2,−1,0,+1,+2 → 5 orbitals."}, {"heading": "Describing an Orbital", "body": "Each unique set of <b>n, l, mₗ</b> describes ONE orbital. n=2 level has 2 sublevels: l=0 (2s, 1 orbital) and l=1 (2p, 3 orbitals). Total orbitals in level n = <b>n²</b>. Sublevels in level n = <b>n</b>. Orbitals in sublevel l = <b>2l+1</b>."}, {"heading": "Pauli Exclusion Principle", "body": "<b>No two electrons</b> in the same atom can have the <b>exact same set of all four quantum numbers</b> (n, l, mₗ, mₛ). Since mₛ = +½ or −½, each orbital holds <b>max 2 electrons</b> with opposite spins. Max electrons: s=2, p=6, d=10, f=14."}, {"heading": "Quantum Number Summary Table", "body": "<b>n:</b> 1,2,3... → energy/size. <b>l:</b> 0 to n−1 → shape (s,p,d,f). <b>mₗ:</b> −l to +l → orientation. <b>mₛ:</b> +½ or −½ → spin. Each orbital: unique (n,l,mₗ). Each electron: unique (n,l,mₗ,mₛ). Total electrons in level n = <b>2n²</b>."}, {"heading": "Key Constants to Remember", "body": "<b>c = 3.00 × 10⁸ m/s</b> (speed of light)<br><b>h = 6.626 × 10⁻³⁴ J·s</b> (Planck's constant)<br><b>k = 2.179 × 10⁻¹⁸ J</b> (Bohr constant for H)<br><b>c = λν</b>, <b>E = hν = hc/λ</b>, <b>E = −k/n²</b>, <b>λ = h/(mv)</b>"}], "quiz": [{"q": "EMR is a self-propagating:", "a": ["Particle", "Wave", "Solid", "Liquid"], "c": 1}, {"q": "Wavelength (λ) is:", "a": ["Cycles per second", "Distance between peaks", "Wave height", "Energy per photon"], "c": 1}, {"q": "Frequency (ν) is measured in:", "a": ["Meters", "Joules", "Hz (s⁻¹)", "Kg"], "c": 2}, {"q": "c = λν: c is:", "a": ["Planck's constant", "Speed of light", "Electron charge", "Boltzmann constant"], "c": 1}, {"q": "Speed of light =:", "a": ["3.00 × 10⁶", "3.00 × 10⁸", "6.626 × 10⁻³⁴", "6.022 × 10²³"], "c": 1}, {"q": "Longer wavelength means ___ frequency:", "a": ["Higher", "Lower", "Same", "Zero"], "c": 1}, {"q": "Shorter wavelength means ___ energy:", "a": ["Lower", "Higher", "Same", "Zero"], "c": 1}, {"q": "Most energetic type of EMR:", "a": ["Radio", "Visible", "UV", "Gamma"], "c": 3}, {"q": "Longest wavelength visible color:", "a": ["Violet", "Blue", "Green", "Red"], "c": 3}, {"q": "589 nm = ___ m:", "a": ["5.89 × 10⁻⁵", "5.89 × 10⁻⁷", "5.89 × 10⁻⁹", "589"], "c": 1}, {"q": "Photoelectric effect: light ejects:", "a": ["Protons", "Neutrons", "Electrons", "Photons"], "c": 2}, {"q": "Below threshold energy:", "a": ["More electrons ejected", "No electrons ejected", "Protons ejected", "Light absorbed only"], "c": 1}, {"q": "E = hν: h is:", "a": ["Speed of light", "Planck's constant", "Bohr constant", "Avogadro's number"], "c": 1}, {"q": "Planck's constant =:", "a": ["3.00 × 10⁸", "6.626 × 10⁻³⁴", "2.179 × 10⁻¹⁸", "6.022 × 10²³"], "c": 1}, {"q": "E = hc/λ means shorter λ =:", "a": ["Lower energy", "Higher energy", "Same energy", "No energy"], "c": 1}, {"q": "Energy is quantized means it comes in:", "a": ["Continuous amounts", "Discrete packets", "Waves only", "Random amounts"], "c": 1}, {"q": "Bohr model: energy levels are:", "a": ["Continuous", "Quantized (discrete)", "Random", "Infinite"], "c": 1}, {"q": "E = −k/n²: larger n means:", "a": ["Lower energy", "Higher energy (less negative)", "Same energy", "Zero energy"], "c": 1}, {"q": "Ground state is n =:", "a": ["0", "1", "2", "∞"], "c": 1}, {"q": "Emission: electron goes:", "a": ["Up levels", "Down levels", "Nowhere", "Out of atom"], "c": 1}, {"q": "Absorption: electron goes:", "a": ["Down levels", "Up levels", "Nowhere", "Into nucleus"], "c": 1}, {"q": "De Broglie: λ = h/(mv). Larger mass =:", "a": ["Longer wavelength", "Shorter wavelength", "Same wavelength", "No wavelength"], "c": 1}, {"q": "Macroscopic objects have ___ de Broglie wavelengths:", "a": ["Large", "Immeasurably tiny", "Zero", "Infinite"], "c": 1}, {"q": "Schrödinger equation calculates:", "a": ["Exact electron position", "Probability of finding electron", "Electron mass", "Nuclear charge"], "c": 1}, {"q": "Principal quantum number n determines:", "a": ["Shape", "Orientation", "Energy and size", "Spin"], "c": 2}, {"q": "Angular momentum l determines:", "a": ["Energy", "Shape", "Orientation", "Spin"], "c": 1}, {"q": "Magnetic mₗ determines:", "a": ["Energy", "Shape", "Orientation", "Spin"], "c": 2}, {"q": "l = 0 corresponds to:", "a": ["p orbital", "d orbital", "s orbital", "f orbital"], "c": 2}, {"q": "l = 1 corresponds to:", "a": ["s orbital", "p orbital", "d orbital", "f orbital"], "c": 1}, {"q": "l = 2 corresponds to:", "a": ["s orbital", "p orbital", "d orbital", "f orbital"], "c": 2}, {"q": "s orbitals are:", "a": ["Dumbbell", "Clover", "Spherical", "Complex"], "c": 2}, {"q": "How many p orbitals per shell?", "a": ["1", "3", "5", "7"], "c": 1}, {"q": "How many d orbitals per shell?", "a": ["1", "3", "5", "7"], "c": 2}, {"q": "p orbitals start at n =:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "d orbitals start at n =:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "f orbitals start at n =:", "a": ["1", "2", "3", "4"], "c": 3}, {"q": "For l = 2, mₗ values are:", "a": ["0 only", "−1,0,+1", "−2,−1,0,+1,+2", "−3 to +3"], "c": 2}, {"q": "Number of orbitals in sublevel l = 2l+1. For d (l=2):", "a": ["1", "3", "5", "7"], "c": 2}, {"q": "Total orbitals in level n = n². For n=3:", "a": ["3", "6", "9", "12"], "c": 2}, {"q": "Pauli exclusion: max electrons per orbital:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Pauli: no two electrons have same:", "a": ["Mass", "Charge", "Set of all 4 quantum numbers", "Energy"], "c": 2}, {"q": "Max electrons in s subshell:", "a": ["2", "6", "10", "14"], "c": 0}, {"q": "Max electrons in p subshell:", "a": ["2", "6", "10", "14"], "c": 1}, {"q": "Max electrons in d subshell:", "a": ["2", "6", "10", "14"], "c": 2}, {"q": "Max electrons in f subshell:", "a": ["2", "6", "10", "14"], "c": 3}, {"q": "Total electrons in level n = 2n². For n=2:", "a": ["2", "4", "8", "18"], "c": 2}, {"q": "Spin quantum number mₛ values:", "a": ["0 only", "±1", "±½", "±2"], "c": 2}, {"q": "Number of sublevels in level n =:", "a": ["n", "n²", "2n", "2n²"], "c": 0}, {"q": "k (Bohr constant) =:", "a": ["3.00 × 10⁸", "6.626 × 10⁻³⁴", "2.179 × 10⁻¹⁸", "6.022 × 10²³"], "c": 2}, {"q": "n=4 to n=6 is ___ (absorption/emission):", "a": ["Emission", "Absorption", "Neither", "Both"], "c": 1}]}, {"id": "chem-ch6b", "title": "Chapter 6 (cont): Electron Config & Periodic Trends", "ln": "CHEM 260 · Ch 6 cont.", "notes": [{"heading": "Review — Quantum Numbers", "body": "<b>n:</b> principal (energy/size), integer ≥1. <b>l:</b> angular momentum (shape), 0 to n−1. <b>mₗ:</b> magnetic (orientation), −l to +l. <b>mₛ:</b> spin, +½ or −½. Each set of (n, l, mₗ) = one orbital. Each set of (n, l, mₗ, mₛ) = one electron."}, {"heading": "Review — Orbital Shapes Table", "body": "<b>l=0 → s:</b> spherical, 1 orbital. <b>l=1 → p:</b> dumbbell, 3 orbitals (px, py, pz). <b>l=2 → d:</b> clover, 5 orbitals (dxy, dyz, dxz, dx²−y², dz²). <b>l=3 → f:</b> complex, 7 orbitals. Number of orbitals per subshell = 2l+1."}, {"heading": "s Orbitals — Details", "body": "Each energy level has <b>one s orbital</b>. 1s, 2s, 3s... all spherical but each <b>larger</b> than the last. Important distinction: '1 s orbital' (quantity) vs '1s orbital' (the specific n=1 s orbital). Lowest energy orbital within any given n."}, {"heading": "p Orbitals — Details", "body": "Start at <b>n=2</b> (because l goes 0 to n−1; at n=1, max l=0). Three per level: px, py, pz — each along a different Cartesian axis. All three are <b>degenerate</b> (same energy within a subshell)."}, {"heading": "d Orbitals — Details", "body": "Start at <b>n=3</b>. Five per level: dxy, dyz, dxz, dx²−y², dz². Four lie in planes between axes; dz² points along z-axis. All five are degenerate. Essential for transition metal chemistry."}, {"heading": "f Orbitals — Details", "body": "Start at <b>n=4</b>. Seven per level. Complex shapes — you do NOT need to memorize their individual names. Important for lanthanides and actinides."}, {"heading": "Magnetic Quantum Number — Why Orbital Counts", "body": "mₗ ranges from −l to +l, giving <b>2l+1 values</b>. For l=3 (f): mₗ = −3,−2,−1,0,+1,+2,+3 = <b>7 orbitals</b>. This is WHY each subshell has a specific number of orbitals — it comes directly from the allowed mₗ values."}, {"heading": "Subshells and Degenerate Orbitals", "body": "<b>Subshell:</b> orbitals with the same value of l (e.g., all three 2p orbitals). <b>Degenerate orbitals:</b> orbitals within the same subshell that have <b>identical energy</b>. The three 2p orbitals are degenerate; the five 3d orbitals are degenerate."}, {"heading": "Spin Quantum Number (mₛ)", "body": "Describes the <b>spin direction</b> of an electron (NOT the orbital). Only two possible values: <b>+½ (spin up ↑)</b> or <b>−½ (spin down ↓)</b>. Every electron in the universe has one of these two spins. This is why each orbital holds exactly 2 electrons."}, {"heading": "Pauli Exclusion Principle", "body": "<b>No two electrons</b> in the same atom can have the <b>same set of all four quantum numbers</b>. Since mₛ has only 2 values, each orbital (defined by n, l, mₗ) holds <b>max 2 electrons</b> with opposite spins. Max electrons: s=2, p=6, d=10, f=14."}, {"heading": "Orbital Energy Ordering", "body": "As <b>n increases</b>, orbital energy increases (farther from nucleus = weaker attraction). For same n but different l: energy increases <b>s < p < d < f</b>. Remember this order! It explains why 4s fills before 3d."}, {"heading": "Electron Configuration Notation", "body": "Written as: <b>nX<sup>e</sup></b> where n = principal quantum number, X = subshell letter (s,p,d,f), superscript = number of electrons. Example: <b>1s¹</b> means n=1, l=0 (s orbital), 1 electron. <b>2p⁴</b> means n=2, l=1 (p orbital), 4 electrons."}, {"heading": "Aufbau Principle", "body": "Electrons fill orbitals of <b>lowest available energy first</b>, then move to higher energy. The filling order follows the diagonal rule: <b>1s → 2s → 2p → 3s → 3p → 4s → 3d → 4p → 5s → 4d → 5p → 6s → 4f → 5d → 6p → 7s → 5f → 6d → 7p</b>. Note: 4s fills BEFORE 3d!"}, {"heading": "Hund's Rule", "body": "When filling orbitals of the <b>same energy</b> (degenerate), place <b>one electron in each orbital before pairing</b>. All unpaired electrons have the <b>same spin</b> (all up ↑ first). Example: for 2p³ (nitrogen), put one electron in each of the three p orbitals → ↑ ↑ ↑, NOT ↑↓ ↑ _."}, {"heading": "Three Rules Summary", "body": "<b>1) Aufbau:</b> lowest energy first. <b>2) Pauli:</b> max 2 electrons per orbital, opposite spins. <b>3) Hund's:</b> spread out before pairing in degenerate orbitals. Apply all three to write any electron configuration."}, {"heading": "Orbital Diagrams", "body": "Visual representation using boxes (orbitals) and arrows (electrons). ↑ = spin up, ↓ = spin down. Each box = one orbital. Fill following Aufbau → Pauli → Hund's rules. Example for C (6 e⁻): [↑↓] [↑↓] [↑][↑][ ] → 1s² 2s² 2p²."}, {"heading": "Core vs Valence Electrons", "body": "<b>Valence electrons:</b> in the <b>outermost shell</b> (highest n). Determine chemical behavior and bonding. <b>Core electrons:</b> in <b>inner shells</b>. Shield valence electrons from full nuclear charge. Noble gas shorthand: [Ne] 3s² 3p³ for phosphorus (core = [Ne], valence = 3s²3p³)."}, {"heading": "Practice: Phosphorus (P, Z=15)", "body": "15 electrons. Config: <b>1s² 2s² 2p⁶ 3s² 3p³</b>. Or [Ne] 3s² 3p³. Orbital diagram for 3p: [↑][↑][↑] (Hund's rule — one in each before pairing). Last electron: n=3, l=1, mₗ=+1, mₛ=+½."}, {"heading": "Periodic Trends — Atomic/Covalent Radius", "body": "<b>Covalent radius:</b> ½ the distance between nuclei of two identical bonded atoms. <b>Down a group:</b> radius <b>increases</b> (more shells). <b>Across a period (left→right):</b> radius <b>decreases</b> (more protons pull electrons closer despite same shell). Shielding by inner electrons partially offsets nuclear charge."}, {"heading": "Ion Size vs Atom Size", "body": "<b>Cation < parent atom:</b> losing electrons reduces electron-electron repulsion → electrons pulled closer. <b>Anion > parent atom:</b> gaining electrons increases repulsion → electron cloud expands. Going down the table, both cation and anion sizes increase."}, {"heading": "Isoelectronic Series", "body": "Atoms/ions with the <b>same electron configuration</b>. Example: N³⁻, O²⁻, F⁻, Ne, Na⁺, Mg²⁺, Al³⁺ — all have 10 electrons (same as Ne). The more nuclear charge (protons) with same electrons → <b>smaller radius</b>. Order largest to smallest: <b>N³⁻ > O²⁻ > F⁻ > Ne > Na⁺ > Mg²⁺ > Al³⁺</b>."}, {"heading": "Why Isoelectronic Size Decreases", "body": "Same number of electrons but increasing number of protons. More protons = stronger pull on the same electron cloud = smaller radius. Al³⁺ has 13 protons pulling on 10 electrons (very tight). N³⁻ has only 7 protons holding 10 electrons (very loose)."}, {"heading": "Ionization Energy Trend", "body": "<b>Ionization energy (IE):</b> energy to remove one electron. <b>Increases left→right</b> (stronger nuclear hold). <b>Increases bottom→up</b> (electrons closer to nucleus). Metals: low IE (easy to lose e⁻). Nonmetals: high IE (hard to lose e⁻). Noble gases: highest IE."}, {"heading": "Electron Affinity & Electronegativity Preview", "body": "<b>Electron affinity:</b> energy change when atom gains an electron. <b>Electronegativity:</b> tendency to attract bonding electrons. Both generally increase going up and to the right (same trend as IE). F is the most electronegative element."}, {"heading": "Key Equations & Rules", "body": "<b>Filling order:</b> 1s 2s 2p 3s 3p 4s 3d 4p 5s 4d...<br><b>Aufbau:</b> lowes
