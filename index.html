<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anhelina's Study Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0A1A;--card:#1A1230;--card2:#241A42;--accent:#9B59FF;--glow:#B07AFF;--dim:#6B3FA0;--hi:#E0C6FF;--tx:#E8DFF5;--txd:#9B8FBB;--ok:#7CFF8E;--err:#FF6B8A;--bdr:#2E2250;--gs:#1A0A3E}
body{min-height:100vh;background:linear-gradient(170deg,var(--gs) 0%,var(--bg) 40%,#0A0718 100%);color:var(--tx);font-family:'Segoe UI','Helvetica Neue',sans-serif;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes sparkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:.7;transform:scale(1.2)}}
@keyframes floatAcross{0%{transform:translateX(-100%)}100%{transform:translateX(calc(100vw + 100%))}}
.sparkle{position:fixed;width:4px;height:4px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--glow);opacity:.4;animation:sparkle 3s ease-in-out infinite;pointer-events:none}
.wrap{max-width:820px;margin:0 auto;padding:0 20px 60px}
.badge{display:inline-block;padding:6px 20px;border-radius:99px;background:rgba(155,89,255,.09);border:1px solid rgba(155,89,255,.2);font-size:13px;color:var(--glow);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent),var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15}
.sub{color:var(--txd);font-size:16px}
.pill{padding:12px 28px;border-radius:99px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .25s ease}
.pill:hover{transform:translateY(-2px)}
.pill-a{background:linear-gradient(135deg,var(--accent),var(--dim));color:#fff;box-shadow:0 4px 20px rgba(155,89,255,.27)}
.pill-i{background:rgba(26,18,48,.8);color:var(--txd);border:1px solid var(--bdr)}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:20px 24px;margin-bottom:14px;cursor:pointer;transition:all .35s ease}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(155,89,255,.13)}
.card.exp{background:linear-gradient(135deg,var(--card),var(--card2));border-color:rgba(155,89,255,.33)}
.arrow{font-size:20px;color:var(--accent);transition:transform .3s ease;display:inline-block}
.card.exp .arrow{transform:rotate(180deg)}
.st{color:var(--txd);font-size:14.5px;line-height:1.65}
.opt{background:transparent;border:1.5px solid var(--bdr);border-radius:12px;padding:14px 18px;text-align:left;cursor:pointer;color:var(--tx);font-size:15px;font-family:inherit;display:flex;align-items:center;gap:12px;transition:all .25s ease;width:100%;margin-bottom:10px}
.opt:hover:not(.done){border-color:var(--accent);background:rgba(155,89,255,.08)}
.opt.ok{background:rgba(124,255,142,.08);border-color:var(--ok)}
.opt.no{background:rgba(255,107,138,.08);border-color:var(--err)}
.circ{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:rgba(155,89,255,.13);color:var(--accent)}
.opt.ok .circ{background:var(--ok);color:#000}
.opt.no .circ{background:var(--err);color:#000}
.abtn{background:linear-gradient(135deg,var(--accent),var(--dim));border:none;border-radius:12px;padding:12px 32px;color:#fff;font-weight:700;cursor:pointer;font-size:15px;font-family:inherit}
.abtn:hover{transform:translateY(-1px)}
.abtn:disabled{background:var(--bdr);cursor:not-allowed;transform:none}
.bbtn{background:transparent;border:1px solid var(--bdr);border-radius:10px;padding:8px 18px;color:var(--txd);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.bbtn:hover{border-color:var(--accent);color:var(--hi)}
.cc{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:32px 24px;cursor:pointer;transition:all .35s ease;text-align:center;display:inline-block;width:calc(33.33% - 14px);min-width:220px;vertical-align:top;margin:7px}
.cc:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(155,89,255,.2);border-color:rgba(155,89,255,.4)}
.tc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:18px 22px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.tc:hover{transform:translateX(4px);border-color:rgba(155,89,255,.4);background:var(--card2)}
.rw{background:rgba(255,107,138,.03);border:1px solid rgba(255,107,138,.2);border-radius:14px;padding:18px 22px;margin-bottom:12px}
.ln{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(155,89,255,.12);color:var(--glow);font-weight:700;white-space:nowrap}
.pbar{height:4px;border-radius:2px;background:var(--bdr);margin-bottom:24px}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--glow));transition:width .5s ease}
.qs{padding:60px 24px 80px;text-align:center;position:relative;overflow:hidden;min-height:320px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bq{font-size:clamp(24px,4.5vw,40px);font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent),var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3;max-width:600px;margin:0 auto 20px;transition:all .4s ease}
.fq{position:absolute;color:var(--accent);opacity:.06;font-weight:800;white-space:nowrap;font-size:18px;animation:floatAcross linear infinite}
.footer{text-align:center;padding:20px 24px 32px;font-size:13px;color:var(--txd);border-top:1px solid var(--bdr)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(155,89,255,.27);border-radius:3px}
@media(max-width:740px){.cc{width:calc(50% - 14px)}}
@media(max-width:500px){.cc{width:100%;margin:7px 0}}
</style>
</head>
<body>
<div id="sparkles"></div>
<div style="text-align:center;padding:48px 24px 16px;animation:fadeUp .8s ease">
<div class="badge">From Landon to Anhelina &#x1F49C;</div>
<h1 id="mt">Anhelina's Study Hub</h1>
<p class="sub" id="ms">Pick a class to start studying</p>
</div>

<div class="wrap" id="ct"></div>
<div class="qs">

<div class="bq" id="bq"></div>
<div style="font-size:14px;color:var(--glow);letter-spacing:1px;font-weight:600;opacity:.7">&mdash; Landon</div>
</div>

<script>

setupQ();

// Data
var D={"chemistry": {"name": "CHEM 260", "sub": "General Chemistry", "icon": "🧪", "topics": [{"t": "Lesson 1: Matter & Properties", "ln": "CHEM 260 · Ch 1", "s": [{"h": "States of Matter", "x": "Solid: atoms close-packed, NOT free to move — fixed volume and shape. Liquid: close-packed, free to move — fixed volume, no fixed shape, flows to fill container. Gas: NOT close-packed, free to move — no fixed volume or shape, compressible. Freedom increases: solid → liquid → gas."}, {"h": "Classification of Matter", "x": "Pure substance: one component, invariant composition. Mixture: 2+ components, variable proportions. Pure substances divide into: Elements (cannot be chemically broken down, single type of atom) and Compounds (2+ elements in fixed definite proportions, can be decomposed)."}, {"h": "Types of Mixtures", "x": "Heterogeneous: composition varies region to region — can see different parts (sand+salt, trail mix). Homogeneous: appears uniform, all portions same composition (sweetened tea, saltwater, air). Also called solutions."}, {"h": "Separating Mixtures", "x": "Decanting: carefully pour off liquid from settled solid. Distillation: heat to boil off more volatile liquid, recondense to collect separately. Filtration: pour through filter paper to separate insoluble solid from liquid."}, {"h": "Physical vs Chemical Properties", "x": "Physical change: atoms/molecules don't change identity — only state or appearance (melting, boiling, dissolving). Chemical change: new substances form with different composition (burning, rusting, cooking). Physical properties: color, density, melting point, boiling point. Chemical properties: flammability, reactivity."}], "q": [{"q": "Which state of matter has atoms close-packed but free to move?", "a": ["Solid", "Liquid", "Gas", "Plasma"], "c": 1}, {"q": "Distillation separates by:", "a": ["Filtering through paper", "Boiling and recondensing", "Pouring off liquid", "Using magnets"], "c": 1}, {"q": "Burning wood is a:", "a": ["Physical change", "Chemical change", "Phase change", "No change"], "c": 1}, {"q": "A pure substance with invariant composition that cannot be broken down is a(n):", "a": ["Compound", "Mixture", "Element", "Solution"], "c": 2}, {"q": "Sweetened tea is an example of:", "a": ["Heterogeneous mixture", "Pure substance", "Homogeneous mixture", "Compound"], "c": 2}, {"q": "Which is NOT a physical change?", "a": ["Melting ice", "Dissolving sugar", "Boiling water", "Rusting iron"], "c": 3}, {"q": "Gases differ from liquids because gases are:", "a": ["Close-packed and fixed shape", "Close-packed and no fixed shape", "NOT close-packed and compressible", "Dense and rigid"], "c": 2}, {"q": "Filtration separates:", "a": ["Two liquids", "Insoluble solid from liquid", "Gases from liquids", "Elements from compounds"], "c": 1}, {"q": "A compound differs from an element because it:", "a": ["Cannot be broken down", "Can be decomposed into simpler substances", "Has no fixed composition", "Is always a gas"], "c": 1}, {"q": "Which property is chemical rather than physical?", "a": ["Boiling point", "Density", "Flammability", "Color"], "c": 2}]}, {"t": "Lesson 2: Formulas & Periodic Table", "ln": "CHEM 260 · Ch 2", "s": [{"h": "Chemical Formulas", "x": "Three types: Empirical (simplest whole-number ratio, e.g. CH for benzene), Molecular (actual atom count, e.g. C₆H₆), Structural (shows bonds with lines, e.g. H-O-H). Chemical symbols indicate atom types; subscripts indicate number of each."}, {"h": "Isomers", "x": "Compounds with same molecular formula but different structures and properties. Example: acetic acid and methyl formate both C₂H₄O₂ but different structures — one is vinegar, other is a solvent. Stereoisomers: same formula, different 3D arrangement (e.g. carvone — one smells like caraway, other like spearmint)."}, {"h": "The Periodic Table", "x": "Mendeleev (1869) and Meyer (1870) independently proposed it. 18 groups (vertical columns), 7 periods (horizontal rows). Three classes: Metals (shiny, malleable, good conductors), Nonmetals (dull, poor conductors), Metalloids (properties of both). Modern law: organized by atomic number."}, {"h": "Ions", "x": "Cation: atom that LOST electrons → positive charge (metals tend to form cations). Anion: atom that GAINED electrons → negative charge (nonmetals form anions). Monatomic: single atom ion. Polyatomic: group of bonded atoms with overall charge."}, {"h": "Naming Ions & Acids", "x": "Polyatomic naming: -ate = more oxygen, -ite = fewer oxygen. Prefixes: per- = most O, hypo- = least O. Example: ClO₄⁻ perchlorate, ClO₃⁻ chlorate, ClO₂⁻ chlorite, ClO⁻ hypochlorite. Binary acids: hydro-...-ic acid. Oxyacids: -ate→-ic, -ite→-ous + acid."}], "q": [{"q": "Empirical formula gives:", "a": ["Actual atom count", "Simplest whole-number ratio", "Bond structure", "Molecular weight"], "c": 1}, {"q": "How many groups in the periodic table?", "a": ["7", "14", "18", "20"], "c": 2}, {"q": "A cation has:", "a": ["Gained electrons", "Lost electrons", "No charge", "Extra neutrons"], "c": 1}, {"q": "Isomers have the same ___ but different ___:", "a": ["Mass, color", "Formula, structure", "Charge, size", "Electrons, protons"], "c": 1}, {"q": "The suffix -ate in polyatomic naming indicates:", "a": ["Fewer oxygen atoms", "More oxygen atoms", "No oxygen", "A metal ion"], "c": 1}, {"q": "Metals tend to form:", "a": ["Anions", "Cations", "Neither", "Both equally"], "c": 1}, {"q": "Which is a metalloid property?", "a": ["Excellent conductor", "Poor conductor", "Properties of both metals and nonmetals", "No conductivity"], "c": 2}, {"q": "ClO₂⁻ is called:", "a": ["Perchlorate", "Chlorate", "Chlorite", "Hypochlorite"], "c": 2}, {"q": "Hydrochloric acid is an example of a:", "a": ["Oxyacid", "Binary acid", "Polyatomic acid", "Organic acid"], "c": 1}, {"q": "How many periods in the periodic table?", "a": ["7", "14", "18", "20"], "c": 0}]}, {"t": "Lesson 3: Moles & Composition", "ln": "CHEM 260 · Ch 3", "s": [{"h": "Formula Mass", "x": "Sum of average atomic masses of all atoms in the formula. Also called molecular mass/weight. Example: H₂O = 2(1.01 amu) + 16.00 amu = 18.02 amu. Ionic compounds use 'formula mass' not 'molar mass' since they don't exist as discrete molecules."}, {"h": "The Mole & Avogadro's Number", "x": "1 mole = 6.022 × 10²³ particles (Avogadro's number, Nₐ). The chemist's 'dozen.' Molar mass (g/mol) is numerically equal to atomic/formula mass in amu. A single ¹²C atom = 12 amu; one mole of ¹²C = 12 g."}, {"h": "Mole Conversions", "x": "Grams → moles: divide by molar mass. Moles → particles: multiply by Nₐ. Example: 150.0 g Mg ÷ 24.305 g/mol = 6.171 mol → × 6.022×10²³ = 3.716×10²⁴ atoms. Practice: 1.3 mol H₂O = 7.83×10²³ molecules. 23 g NaOH = 0.58 mol."}, {"h": "Percent Composition", "x": "% by mass = (mass of element in formula / formula mass) × 100. Example: NH₃ → %N = 14.01/17.03 × 100 = 82.27%."}, {"h": "Empirical Formula from Data", "x": "Steps: 1) Convert masses to moles using molar masses. 2) Divide each by smallest mole value. 3) If needed, multiply by integer to get whole numbers. From percent composition: assume 100 g sample first, then follow same steps."}], "q": [{"q": "Avogadro's number is:", "a": ["6.022×10²³", "3.14×10²³", "6.022×10²⁶", "1.602×10⁻¹⁹"], "c": 0}, {"q": "To find moles from grams, you:", "a": ["Multiply by molar mass", "Divide by molar mass", "Add atomic numbers", "Square root"], "c": 1}, {"q": "How many molecules in 1.3 mol H₂O?", "a": ["7.83×10²³", "6.02×10²³", "1.3×10²³", "4.63×10²³"], "c": 0}, {"q": "Molar mass of a substance in g/mol equals its:", "a": ["Density", "Formula mass in amu", "Atomic number", "Electron count"], "c": 1}, {"q": "To find empirical formula from % composition, first:", "a": ["Find molecular weight", "Assume 100 g and convert to moles", "Balance the equation", "Calculate density"], "c": 1}, {"q": "Formula mass of H₂O is:", "a": ["16.00 amu", "18.02 amu", "20.00 amu", "2.02 amu"], "c": 1}, {"q": "How much does 1.6 mol NaCl weigh?", "a": ["58 g", "92.8 g", "35.5 g", "116 g"], "c": 1}, {"q": "23 g of NaOH equals how many moles?", "a": ["0.23", "0.58", "1.0", "2.3"], "c": 1}]}, {"t": "Lesson 4: Stoichiometry", "ln": "CHEM 260 · Ch 4", "s": [{"h": "Balancing Equations", "x": "'Balanced' = equal numbers of each element on both sides. Adjust coefficients (NEVER subscripts). Obeys Law of Conservation of Mass. Example: CH₄ + 2O₂ → CO₂ + 2H₂O. Check each element: C(1=1), H(4=4), O(4=4)."}, {"h": "Types of Reactions", "x": "Molecular equation: regular formulas. Complete ionic: shows all dissolved ions. Net ionic: removes spectator ions (unchanged). Three main types: Precipitation (insoluble solid forms), Acid-Base (H⁺ transfer; strong acids fully dissociate like HCl, H₂SO₄; weak acids partially like CH₃COOH), Redox (oxidation number changes)."}, {"h": "Oxidation Numbers", "x": "Rules: Element = 0. Monatomic ion = charge. H = +1 with nonmetals, -1 with metals. O = -2 (usually; -1 in peroxides). F always = -1. Sum for molecule = 0; for ion = charge. Oxidation = INCREASE in oxidation number (loss of electrons). Reduction = DECREASE (gain of electrons)."}, {"h": "Limiting Reagent & Yield", "x": "Limiting reagent: runs out first → determines maximum product. Convert each reactant to moles of product → smallest amount = limiting. Theoretical yield = max product from limiting reagent assuming complete reaction. Percent yield = (actual yield / theoretical yield) × 100%."}, {"h": "Redox Reactions", "x": "Combustion: fuel + O₂ → heat/light (e.g. CH₄ + 2O₂ → CO₂ + 2H₂O). Single displacement: metal replaces ion in solution (e.g. Cu + 2AgNO₃ → Cu(NO₃)₂ + 2Ag). Balancing redox: write half-reactions, balance elements, then O with H₂O, H with H⁺, charge with e⁻."}], "q": [{"q": "When balancing equations, you adjust:", "a": ["Subscripts", "Coefficients", "Atomic numbers", "Charges"], "c": 1}, {"q": "Oxidation means:", "a": ["Decrease in oxidation number", "Increase in oxidation number", "Gain of protons", "Loss of neutrons"], "c": 1}, {"q": "The limiting reagent determines:", "a": ["Reaction speed", "Maximum amount of product", "Color of solution", "Temperature change"], "c": 1}, {"q": "Spectator ions are:", "a": ["Ions forming precipitates", "Ions unchanged in reaction", "Ions that are oxidized", "Ions with no charge"], "c": 1}, {"q": "In a combustion reaction, the fuel reacts with:", "a": ["Water", "Nitrogen", "Oxygen", "Helium"], "c": 2}, {"q": "H in H₂O has oxidation number:", "a": ["-1", "0", "+1", "+2"], "c": 2}, {"q": "Percent yield equals:", "a": ["Actual/theoretical × 100", "Theoretical/actual × 100", "Moles produced/moles used", "Mass in/mass out"], "c": 0}, {"q": "Strong acids like HCl:", "a": ["Partially dissociate", "Fully dissociate", "Don't dissociate", "Only dissociate in heat"], "c": 1}, {"q": "In redox, reduction means:", "a": ["Loss of electrons", "Gain of electrons", "No electron change", "Loss of protons"], "c": 1}]}, {"t": "Lesson 5: Thermochemistry", "ln": "CHEM 260 · Ch 5", "s": [{"h": "Energy & Heat", "x": "Units: 1 cal = 4.184 J. Heat capacity (C): heat to raise entire body by 1°C (extensive property). Specific heat capacity (c): heat to raise 1 gram by 1°C (intensive property). Formula: q = mcΔT."}, {"h": "Calorimetry", "x": "Measures heat in chemical/physical processes. Coffee cup calorimeter: simple, constant pressure. Key principle: q_system = -q_surroundings (in insulated systems). System = substances undergoing change; surroundings = everything else."}, {"h": "Enthalpy", "x": "H = U + PV (internal energy + pressure×volume). State function (path independent). ΔH > 0 = endothermic (absorbs heat). ΔH < 0 = exothermic (releases heat). First Law of Thermodynamics: ΔU = q + w."}, {"h": "Thermochemical Equations & Hess's Law", "x": "Show matter + energy changes with ΔH. Multiply coefficients by factor → ΔH multiplied by same factor. Reverse reaction → sign of ΔH flips. Standard state: 1 bar, 1M, 25°C assumed. ΔH°f of elements in standard state = 0. Hess's Law: ΔH_total = sum of individual step ΔH values."}], "q": [{"q": "An exothermic reaction has ΔH that is:", "a": ["Positive", "Zero", "Negative", "Undefined"], "c": 2}, {"q": "1 calorie equals:", "a": ["1.000 J", "4.184 J", "2.718 J", "0.239 J"], "c": 1}, {"q": "Hess's Law states ΔH equals:", "a": ["Path-dependent energy", "Sum of step enthalpies", "Always negative", "Cannot be calculated"], "c": 1}, {"q": "Specific heat capacity is which type of property?", "a": ["Extensive", "Intensive", "Chemical", "Nuclear"], "c": 1}, {"q": "The formula q = mcΔT calculates:", "a": ["Pressure change", "Work done", "Heat absorbed or released", "Enthalpy of formation"], "c": 2}, {"q": "Standard enthalpy of formation of O₂(g) is:", "a": ["-273 kJ", "Unknown", "0", "Variable"], "c": 2}, {"q": "In calorimetry, q_system equals:", "a": ["q_surroundings", "−q_surroundings", "2×q_surroundings", "½q_surroundings"], "c": 1}, {"q": "Reversing a reaction does what to ΔH?", "a": ["Doubles it", "Halves it", "Flips the sign", "Nothing"], "c": 2}]}, {"t": "Lesson 6: Electronic Structure", "ln": "CHEM 260 · Ch 6", "s": [{"h": "Electromagnetic Radiation", "x": "Waves: wavelength (λ), frequency (ν), amplitude. Speed of light: c = λν (c = 3×10⁸ m/s). Spectrum: radio → microwave → infrared → visible → UV → X-ray → gamma. Shorter wavelength = higher energy."}, {"h": "Photoelectric Effect & Bohr", "x": "Metals emit electrons when light hits surface — must exceed threshold energy. E = hν = hc/λ (h = 6.626×10⁻³⁴ J·s, Planck's constant). Bohr model: electrons in quantized energy levels. E = -k/n² (k = 2.179×10⁻¹⁸ J for hydrogen). Energy change: ΔE = E_final - E_initial."}, {"h": "Quantum Numbers", "x": "Principal (n): energy/size, integer ≥ 1, larger = higher energy. Angular momentum (l): shape, 0 to n-1 (s=0, p=1, d=2, f=3). Magnetic (mₗ): orientation, integers from -l to +l. Spin (mₛ): +½ or -½. Each set of n, l, mₗ describes one orbital."}, {"h": "Orbital Shapes", "x": "s: spherical, 1 per shell. p: dumbbell, 3 per shell (px, py, pz), start at n=2. d: 5 per shell, start at n=3. f: 7 per shell, start at n=4. Degenerate orbitals = same energy within a subshell."}, {"h": "Electron Configuration", "x": "Aufbau: fill lowest energy first (1s→2s→2p→3s→3p→4s→3d...). Pauli exclusion: max 2 electrons per orbital with opposite spins. Hund's rule: one electron in each equal-energy orbital before pairing. Core electrons = inner shells. Valence = outermost shell (highest n)."}, {"h": "Periodic Trends", "x": "Covalent radius: increases DOWN table, slightly decreases LEFT to RIGHT (shielding). Cation < atom size; Anion > atom size. Isoelectronic series: same e⁻ config, greater nuclear charge = smaller radius (e.g. Al³⁺ < Mg²⁺ < Na⁺ < Ne < F⁻ < O²⁻ < N³⁻)."}], "q": [{"q": "c = λν relates:", "a": ["Energy and mass", "Speed of light, wavelength, frequency", "Charge and voltage", "Pressure and volume"], "c": 1}, {"q": "Energy of a photon: E = :", "a": ["mc²", "hν", "½mv²", "PV"], "c": 1}, {"q": "Principal quantum number (n) determines:", "a": ["Shape", "Orientation", "Energy level and size", "Spin"], "c": 2}, {"q": "How many p orbitals per energy level?", "a": ["1", "3", "5", "7"], "c": 1}, {"q": "Aufbau principle says electrons fill:", "a": ["Highest energy first", "Lowest energy first", "Randomly", "Only s orbitals"], "c": 1}, {"q": "Hund's rule says:", "a": ["Pair electrons immediately", "One electron per orbital before pairing", "Fill d before p", "Skip empty orbitals"], "c": 1}, {"q": "Quantum number l determines:", "a": ["Energy level", "Orbital shape", "Orientation", "Spin direction"], "c": 1}, {"q": "d orbitals start at n=:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "In an isoelectronic series, greater nuclear charge means:", "a": ["Larger radius", "Smaller radius", "Same radius", "No effect"], "c": 1}, {"q": "The Pauli exclusion principle states max ___ electrons per orbital:", "a": ["1", "2", "3", "4"], "c": 1}]}, {"t": "Lesson 7: Chemical Bonding", "ln": "CHEM 260 · Ch 7", "s": [{"h": "Bond Types", "x": "Ionic: metal + nonmetal, electron transfer, electrostatic attraction. Covalent: nonmetal + nonmetal, electrons shared. Pure (nonpolar) covalent: identical atoms, equal sharing (H₂, Cl₂). Polar covalent: different atoms, unequal sharing, δ+/δ- partial charges (HCl, HF)."}, {"h": "Electronegativity", "x": "Tendency to attract electrons. Increases going RIGHT and UP on periodic table. ΔEN determines bond type: ~0 = nonpolar covalent, 0.4-1.8 = polar covalent, >1.8 = ionic. Electrons shift toward MORE electronegative atom."}, {"h": "Lewis Structures", "x": "Show bonding pairs (dashes) and lone pairs (dots). Octet rule: atoms tend to get 8 valence electrons. Steps: 1) Count total valence e⁻. 2) Draw skeleton (least EN = center, never H). 3) Distribute lone pairs for octets. 4) Remaining e⁻ on central atom. 5) Form multiple bonds if needed."}, {"h": "Formal Charge & Resonance", "x": "FC = valence e⁻ - (lone pair e⁻ + ½ bonding e⁻). Preferred: all FC = 0; smallest charges; negative on more EN atom. Resonance: multiple valid Lewis structures, real structure = average of all resonance forms."}, {"h": "Bond Energy", "x": "Bond dissociation energy: energy to break 1 mol of a covalent bond. ΔH = Σ(bonds broken) - Σ(bonds formed). Lattice energy: strength of ionic attraction in crystal. Born-Haber cycle: application of Hess's Law to calculate lattice energy."}, {"h": "VSEPR & Molecular Geometry", "x": "Valence Shell Electron Pair Repulsion theory. Electron pairs maximize distance. Repulsion order: lone-lone > lone-bonding > bonding-bonding. Geometries: 2 regions = linear (180°), 3 = trigonal planar (120°), 4 = tetrahedral (109.5°). With lone pairs: trigonal pyramidal, bent, T-shaped, etc. Electron-pair geometry ≠ molecular structure unless no lone pairs."}], "q": [{"q": "Ionic bonds form between:", "a": ["Two nonmetals", "Two metals", "Metal and nonmetal", "Noble gases"], "c": 2}, {"q": "Electronegativity increases going:", "a": ["Down and left", "Up and right", "Down and right", "Up and left"], "c": 1}, {"q": "In Lewis structures, the center atom is:", "a": ["Most electronegative", "Least electronegative", "Smallest atom", "Hydrogen"], "c": 1}, {"q": "4 electron regions, no lone pairs =:", "a": ["Trigonal planar", "Linear", "Tetrahedral", "Octahedral"], "c": 2}, {"q": "Resonance means:", "a": ["Atoms vibrate", "Multiple valid Lewis structures exist", "Bonds break", "Electrons are lost"], "c": 1}, {"q": "VSEPR predicts shape based on:", "a": ["Atomic mass", "Electron pair repulsion", "Bond energy", "Electronegativity"], "c": 1}, {"q": "Strongest electron-pair repulsion is:", "a": ["Bonding-bonding", "Lone-bonding", "Lone-lone", "All equal"], "c": 2}, {"q": "ΔEN > 1.8 indicates a ___ bond:", "a": ["Nonpolar covalent", "Polar covalent", "Ionic", "Metallic"], "c": 2}, {"q": "Formal charge formula is:", "a": ["Valence - (lone + ½ bonding)", "Valence + lone + bonding", "Protons - electrons", "Atomic number - mass"], "c": 0}, {"q": "A molecule with 3 bonding pairs and 1 lone pair on center has ___ molecular shape:", "a": ["Tetrahedral", "Trigonal planar", "Trigonal pyramidal", "Bent"], "c": 2}]}, {"t": "Lesson 8: Advanced Bonding", "ln": "CHEM 260 · Ch 8", "s": [{"h": "Valence Bond Theory", "x": "Covalent bonds form when atomic orbitals overlap. Single electrons combine into shared pair. Greater overlap = stronger bond. Each atom keeps its own atomic orbitals. VB theory alone only explains diatomic molecules — need hybridization for larger ones."}, {"h": "Sigma (σ) Bonds", "x": "End-to-end overlap: two s orbitals (H₂), s + p orbital (HCl), two p orbitals end-to-end (Cl₂). First bond between any two atoms is ALWAYS σ. ALL single bonds are σ bonds."}, {"h": "Pi (π) Bonds", "x": "Side-by-side overlap of p orbitals. Found alongside σ in multiple bonds. Double bond = 1σ + 1π. Triple bond = 1σ + 2π. π bonds are generally weaker than σ."}, {"h": "Hybridization", "x": "Atomic orbitals mix to form hybrid orbitals. sp: 2 hybrids → linear (180°), e.g. BeCl₂, CO₂. sp²: 3 hybrids → trigonal planar (120°), e.g. BF₃. sp³: 4 hybrids → tetrahedral (109.5°), e.g. CH₄. sp³d: 5 hybrids → trigonal bipyramidal. sp³d²: 6 hybrids → octahedral."}, {"h": "Identifying Hybridization", "x": "Count electron regions (bonds + lone pairs) around central atom: 2 regions = sp, 3 = sp², 4 = sp³, 5 = sp³d, 6 = sp³d². Number of hybrid orbitals = number of atomic orbitals combined. Only in covalently bonded atoms — no hybridization in isolated atoms."}], "q": [{"q": "First bond between two atoms is always:", "a": ["Pi", "Sigma", "Hydrogen", "Ionic"], "c": 1}, {"q": "A double bond consists of:", "a": ["2 sigma bonds", "2 pi bonds", "1 sigma + 1 pi", "1 sigma only"], "c": 2}, {"q": "sp² hybridization gives:", "a": ["Linear", "Tetrahedral", "Trigonal planar", "Octahedral"], "c": 2}, {"q": "sp³ produces how many hybrid orbitals?", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "Pi bonds form from:", "a": ["End-to-end s orbital overlap", "Side-by-side p orbital overlap", "d orbital overlap", "Electron transfer"], "c": 1}, {"q": "An atom with 2 electron regions has ___ hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 0}, {"q": "A triple bond contains:", "a": ["3 sigma bonds", "3 pi bonds", "1 sigma + 2 pi", "2 sigma + 1 pi"], "c": 2}, {"q": "sp³d hybridization gives ___ geometry:", "a": ["Linear", "Tetrahedral", "Trigonal bipyramidal", "Octahedral"], "c": 2}, {"q": "Greater orbital overlap means:", "a": ["Weaker bond", "Stronger bond", "No bond", "Ionic bond"], "c": 1}]}]}, "biology": {"name": "BIO", "sub": "Biology", "icon": "🧬", "topics": [{"t": "Lesson 1: Scientific Method & Measurement", "ln": "BIO · L1", "s": [{"h": "Scientific Method", "x": "Science is NOT memorizing facts — it is asking questions. Observations/data → question → literature review → hypothesis (preliminary answer based on data). Inductive reasoning: specific observations → general conclusion. Deductive reasoning: general info → specific prediction (needed to design experiments)."}, {"h": "Experiments & Theories", "x": "Experiment: controlled observations testing a hypothesis. Consistent with data → confirmed. If not → revise hypothesis. Theory/law: hypothesis repeatedly tested and verified. Experiments can fail for technical reasons. New data can change well-regarded ideas."}, {"h": "Science vs Technology", "x": "Science = asking questions. Technology = solving problems using scientific results (applied science). Finding a disease gene = science. Developing treatment = technology. Society decides what SHOULD be done vs what CAN be done."}, {"h": "Metric System & Measurements", "x": "All science uses metric. Prefixes: kilo(10³), centi(10⁻²), milli(10⁻³), micro(10⁻⁶), nano(10⁻⁹). 1 mL water = 1 g = 1 cm³. Water freezes 0°C, boils 100°C. 1 calorie = energy to raise 1 mL water 1°C. Food calories = kilocalories!"}, {"h": "Basic Chemistry", "x": "Elements: cannot be changed by chemical means. Compounds: mixtures of elements that can be recombined. Atoms: smallest unit retaining element properties. Protons determine element; neutrons determine isotope. Covalent bonds: atoms share outer shell electrons. Valence: number of electrons an atom can share."}, {"h": "Bond Types", "x": "Single bonds: share 1 electron pair. Double bonds: share 2 pairs. Electronegativity: some atoms attract electrons more. Hydrogen bonds: between partial +/- charges. Ions: charged atoms (more e⁻ = negative, fewer = positive). Ionic bonds: between + and - ions."}], "q": [{"q": "Inductive reasoning goes from:", "a": ["General to specific", "Specific to general", "Theory to law", "Random"], "c": 1}, {"q": "A theory is a hypothesis that has been:", "a": ["Proposed once", "Repeatedly tested and verified", "Disproven", "Ignored"], "c": 1}, {"q": "1 mL of water weighs:", "a": ["0.1 g", "1 g", "10 g", "100 g"], "c": 1}, {"q": "Food calories are actually:", "a": ["Calories", "Kilocalories", "Megacalories", "Joules"], "c": 1}, {"q": "The number of protons determines:", "a": ["The isotope", "The element", "The ion charge", "The mass"], "c": 1}, {"q": "Technology is best described as:", "a": ["Pure science", "Applied science", "Theory building", "Data collection"], "c": 1}, {"q": "Deductive reasoning is needed to:", "a": ["Collect observations", "Design experiments", "Build hypotheses", "Review literature"], "c": 1}, {"q": "A covalent bond involves:", "a": ["Transferring electrons", "Sharing electrons", "Losing protons", "Gaining neutrons"], "c": 1}, {"q": "Which prefix means 10⁻³?", "a": ["Kilo", "Centi", "Milli", "Micro"], "c": 2}]}, {"t": "Lesson 2: Water & Carbon", "ln": "BIO · L2", "s": [{"h": "Water Properties", "x": "High specific heat (moderates temperature — lake effect snow, coastal cooling). Densest at 4°C → ice floats → life survives beneath ice. Primary solvent in living tissue. Most critical attribute: water is POLAR (unequal electron distribution)."}, {"h": "Consequences of Polarity", "x": "1) Cohesive: high surface tension, capillary action, high specific heat, high boiling point. 2) Strongly polar solvent: ions need polar solvent to dissolve. Hydrophilic = water-loving (polar). Hydrophobic = water-hating (nonpolar). 3) Sphere of hydration: water shell around ions stabilizes charge."}, {"h": "Amphipathic & Membranes", "x": "Amphipathic molecules: both hydrophobic and hydrophilic parts. Membrane bilayers are amphipathic — interior avoids water, outer parts form H-bonds with water. Essential for keeping cell compartments separate."}, {"h": "Solutions & pH", "x": "Solution: homogeneous mixture. Molarity = moles/liter. pH = -log[H⁺]. pH 7 = neutral. <7 = acidic. >7 = basic. Buffers: chemicals that minimize pH change when acid/base added (e.g. phosphate buffer, carbonate buffer). Cells are very sensitive to pH changes."}, {"h": "Carbon & Organic Chemistry", "x": "Carbon has valence of 4 → forms diverse covalent bonds → basis of all life. Forms single, double, triple bonds. 4 key atoms: H(1), O(2), N(3), C(4) valences. Organic chemistry = chemistry of carbon compounds."}], "q": [{"q": "Water is densest at:", "a": ["0°C", "4°C", "25°C", "100°C"], "c": 1}, {"q": "Amphipathic molecules have:", "a": ["Only hydrophobic parts", "Only hydrophilic parts", "Both hydrophobic and hydrophilic", "No polar regions"], "c": 2}, {"q": "pH < 7 is:", "a": ["Neutral", "Basic", "Acidic", "Buffered"], "c": 2}, {"q": "Carbon's valence is:", "a": ["1", "2", "3", "4"], "c": 3}, {"q": "A buffer does what?", "a": ["Makes solutions acidic", "Minimizes pH change", "Increases H⁺ concentration", "Removes all ions"], "c": 1}, {"q": "Hydrophobic means:", "a": ["Water-loving", "Water-hating", "Neutral", "Amphipathic"], "c": 1}, {"q": "Sphere of hydration is:", "a": ["Ice crystal", "Water shell around ions", "Lipid membrane", "Protein fold"], "c": 1}, {"q": "Water's most critical attribute is being:", "a": ["Cold", "Dense", "Polar", "Heavy"], "c": 2}, {"q": "Molarity is measured in:", "a": ["Grams/liter", "Moles/liter", "Atoms/mL", "Calories/gram"], "c": 1}]}, {"t": "Lesson 3: Biological Molecules", "ln": "BIO · L3", "s": [{"h": "Nucleic Acids", "x": "Two types: DNA (deoxyribose, missing 2' OH) and RNA (ribose). 3 parts of nucleotide: phosphate + sugar + base. Purines (A, G): 2 rings, 4 nitrogens. Pyrimidines (C, T, U): 1 ring, 2 nitrogens. Base pairing: A-T (DNA), A-U (RNA), G-C. Phosphodiester bonds form backbone."}, {"h": "DNA & RNA Structure", "x": "DNA: double helix, antiparallel (one 3'→5', other 5'→3'), complementary strands, charged phosphates on outside, B-form. RNA: single-stranded, uses uracil instead of thymine, can form hairpin structures by base-pairing with itself. Transcription: RNA polymerase makes RNA from DNA template (5'→3')."}, {"h": "Amino Acids & Proteins", "x": "20 amino acids in 3 groups: nonpolar (9, hydrocarbon side chains), uncharged polar (6), charged polar (5: 2 acidic/negative, 3 basic/positive). Peptide bonds join amino acids (condensation). N-terminal and C-terminal ends. 4 structure levels: primary (sequence), secondary (α-helix, β-sheet from H-bonds), tertiary (3D arrangement), quaternary (multiple chains)."}, {"h": "Carbohydrates", "x": "General formula CₙH₂ₙOₙ. Glucose: 6-carbon aldohexose, 16 stereoisomers. Ring form more stable. Glycosidic bonds join sugars (condensation). α bonds: same direction (starch, glycogen — storage). β bonds: opposite direction (cellulose — structure, humans can't digest). Chitin: β(1-4) N-acetylglucosamine (insect exoskeleton)."}, {"h": "Lipids", "x": "6 types: fatty acids, triacylglycerols, phospholipids, glycolipids, steroids, terpenes. Saturated: no double bonds, packed tight. Unsaturated: double bonds, kinks, lower melting point. Triacylglycerols: 3 fatty acids + glycerol (energy storage). Phospholipids: amphipathic → form membranes. Steroids: 4-ring structure (cholesterol, testosterone, estrogen)."}], "q": [{"q": "DNA uses which sugar?", "a": ["Ribose", "Deoxyribose", "Glucose", "Fructose"], "c": 1}, {"q": "Purines have ___ rings:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Adenine pairs with:", "a": ["Guanine", "Cytosine", "Thymine/Uracil", "Adenine"], "c": 2}, {"q": "How many amino acid groups are there?", "a": ["2", "3", "4", "5"], "c": 1}, {"q": "Primary protein structure is:", "a": ["3D folding", "Amino acid sequence", "α-helix", "Multiple chains"], "c": 1}, {"q": "α-glycosidic bonds are found in:", "a": ["Cellulose", "Chitin", "Starch and glycogen", "DNA"], "c": 2}, {"q": "Humans cannot digest:", "a": ["Starch", "Glycogen", "Cellulose", "Glucose"], "c": 2}, {"q": "Saturated fats have:", "a": ["Many double bonds", "No double bonds", "Triple bonds", "Ionic bonds"], "c": 1}, {"q": "Cholesterol is a type of:", "a": ["Fatty acid", "Phospholipid", "Steroid", "Terpene"], "c": 2}, {"q": "RNA uses ___ instead of thymine:", "a": ["Adenine", "Guanine", "Uracil", "Cytosine"], "c": 2}, {"q": "Peptide bonds form between:", "a": ["Sugars", "Amino acids", "Nucleotides", "Lipids"], "c": 1}]}, {"t": "Lesson 4: Enzymes & ATP", "ln": "BIO · L4", "s": [{"h": "ATP Structure", "x": "ATP is a high-energy compound. Energy stored in phosphoanhydride bonds between phosphates. ATP→ADP: hydrolyze 1 phosphate for most reactions. ATP→AMP: for high-energy demand reactions (e.g. charging tRNAs)."}, {"h": "Energy Coupling", "x": "Exergonic reactions release energy (don't need ATP unless storing). Endergonic reactions need energy (usually from ATP). Coupled reactions link ATP hydrolysis to endergonic reactions. Cells regulate reactions using enzymes — muscles don't always contract."}, {"h": "How Enzymes Work", "x": "Enzymes are catalysts (usually proteins). Properties: 1) Cannot change products. 2) Specific to certain molecules. 3) Lower activation energy. 4) Bind substrate at active site. 5) Bind → react → release product. Many drugs are enzyme inhibitors."}, {"h": "Enzyme Regulation", "x": "Cofactors: additional molecules needed (vitamins, minerals) — not permanently changed. ATP is NOT a cofactor (gets converted). pH dependent — digestive enzymes need low pH. Temperature, ion concentration affect function. Competitive inhibitors: bind active site. Non-competitive (allosteric) inhibitors: bind elsewhere, change enzyme shape."}], "q": [{"q": "ATP energy is stored in:", "a": ["Sugar bonds", "Phosphoanhydride bonds", "Base pairs", "Hydrogen bonds"], "c": 1}, {"q": "Enzymes speed reactions by:", "a": ["Raising temperature", "Lowering activation energy", "Changing products", "Adding substrates"], "c": 1}, {"q": "Enzymes are specific, meaning:", "a": ["Work on all molecules", "Only work on certain molecules", "Work once then die", "Don't need substrates"], "c": 1}, {"q": "Exergonic reactions:", "a": ["Need energy", "Release energy", "Use ATP always", "Are endothermic"], "c": 1}, {"q": "Competitive inhibitors bind at:", "a": ["The active site", "An allosteric site", "The substrate", "The product"], "c": 0}, {"q": "Cofactors are often:", "a": ["Sugars", "Essential vitamins and minerals", "Fatty acids", "Nucleotides"], "c": 1}, {"q": "ATP→ADP releases energy by removing:", "a": ["A sugar", "A base", "One phosphate", "An electron"], "c": 2}, {"q": "Allosteric inhibitors work by:", "a": ["Competing at active site", "Changing enzyme shape from another site", "Destroying the enzyme", "Removing cofactors"], "c": 1}, {"q": "The active site is where:", "a": ["ATP is made", "The chemical reaction occurs", "Inhibitors are stored", "Cofactors are destroyed"], "c": 1}]}, {"t": "Lesson 5: Organelles & Microscopes", "ln": "BIO · L5", "s": [{"h": "Cell Types", "x": "Prokaryotic: smaller, lack membrane-bound organelles, simpler DNA organization. Eukaryotic: larger, organized DNA, multiple membrane-bound organelles. Both have plasma membrane, ribosomes, DNA."}, {"h": "Bacteria Classification", "x": "By shape: cocci (sphere), bacillus (rod), spirillum (spiral). By clustering: staphylo (clusters), strepto (chains)."}, {"h": "Microscopes", "x": "Light/brightfield: transmitted light + stains, most common. Phase contrast/DIC: unstained samples visible. Fluorescent: emitted light from special chemicals. Confocal: lasers + fluorescence → 3D. Super-resolution: fluorescence + quantum mechanics. SEM: surface imaging, gold sputter, 3D, non-living. TEM: electrons through thin sample, highest magnification, internal structures, non-living."}, {"h": "Key Organelles", "x": "Plasma membrane: lipid bilayer, semi-permeable, in both pro/eukaryotes. Nucleus: 'brain,' holds DNA, nuclear pores, chromosomes replicated here. Cytoskeleton: structural support + transport highway. Three fibers: microfilaments (actin, 5-6nm, cleavage furrow, muscle), intermediate filaments (~10nm, mechanical stress), microtubules (tubulin, 25nm, highway, cell division)."}, {"h": "Membrane Organelles", "x": "Rough ER: ribosomes on surface, membrane/secreted protein synthesis. Smooth ER: membrane lipid synthesis. Golgi: processes proteins/lipids, adds carbohydrates, sorting center. Lysosomes: digestive, break down waste. Peroxisomes: generate/degrade H₂O₂, detoxify. Vacuoles: storage (huge in plants for turgor pressure)."}, {"h": "Energy Organelles", "x": "Mitochondria: 2 membranes, cristae (inner folds), matrix, oxidize sugars → ATP. Own circular DNA. Chloroplasts: plants only, 3 membranes (inner/outer/thylakoid), grana (thylakoid stacks), stroma, photosynthesis. Both support endosymbiont theory — similar to prokaryotes in size, DNA, ribosomes."}, {"h": "Cell Structures", "x": "Cilia: short, oar-like beating (microtubule core). Flagella: long, propeller-like spinning. Centrosomes: organize microtubules during division. Ribosomes: protein synthesis, most numerous organelle. Cell wall: cellulose in plants, peptidoglycans in bacteria. Extracellular matrix: collagen/proteoglycans in animals."}], "q": [{"q": "Prokaryotes lack:", "a": ["DNA", "Ribosomes", "Membrane-bound organelles", "Cell wall"], "c": 2}, {"q": "Cocci bacteria are:", "a": ["Rod-shaped", "Spiral", "Spherical", "Square"], "c": 2}, {"q": "TEM works by:", "a": ["Reflecting light", "Shooting electrons through sample", "Scanning surface", "Using fluorescence only"], "c": 1}, {"q": "Which organelle is the cell's 'brain'?", "a": ["Ribosome", "Golgi", "Nucleus", "Mitochondria"], "c": 2}, {"q": "Rough ER has ___ on its surface:", "a": ["Lysosomes", "Ribosomes", "Golgi stacks", "Mitochondria"], "c": 1}, {"q": "The Golgi complex functions as:", "a": ["Energy producer", "Processing and sorting center", "DNA storage", "Protein synthesis site"], "c": 1}, {"q": "Mitochondria produce:", "a": ["Glucose", "ATP", "DNA only", "Lipids"], "c": 1}, {"q": "Microfilaments are made of:", "a": ["Tubulin", "Keratin", "Actin", "Collagen"], "c": 2}, {"q": "Endosymbiont theory explains origin of:", "a": ["Nucleus", "Ribosomes", "Mitochondria and chloroplasts", "Cell wall"], "c": 2}, {"q": "Lysosomes function as:", "a": ["Energy producers", "Digestive organelles", "Protein makers", "DNA storage"], "c": 1}, {"q": "Plant cell walls contain:", "a": ["Peptidoglycan", "Cellulose", "Collagen", "Chitin"], "c": 1}, {"q": "SEM microscopes image:", "a": ["Internal structures", "Surface of sample", "DNA sequences", "Chemical bonds"], "c": 1}]}, {"t": "Lesson 6: Membranes", "ln": "BIO · L6", "s": [{"h": "Membrane Function", "x": "Semi-permeable barriers. Gases (O₂, CO₂, N₂) pass easily. Ions need water → cannot cross. Concentration gradient: difference across membrane. Passive transport: down gradient, no energy needed."}, {"h": "Osmosis", "x": "Water movement across membrane to reduce concentration gradient. Hypertonic (more solute outside): cell shrinks. Hypotonic (less outside): cell swells/bursts. Isotonic (equal): no net movement. Swollen/shriveled cells don't pass through capillaries well."}, {"h": "Fluid Mosaic Model", "x": "Fluid: lipids and proteins MOVE within membrane. Mosaic: different proteins/lipids in different areas. Lipid bilayer but NOT evenly distributed (glycolipids only extracellular). Movements: rotation (spin in place), lateral diffusion (move in plane), transverse diffusion (flip-flop, aided by flippases)."}, {"h": "Membrane Proteins", "x": "5 functions: signaling, enzymes, transporters, cell-cell recognition, binding junctions. 3 types: Integral (embedded, may cross bilayer), Peripheral (bind one side), Lipid-anchored (covalently bound to lipids). Most are glycoproteins (need sugars to function)."}, {"h": "Integral Membrane Proteins", "x": "4 kinds: 1) Receptors: transmit info INTO cell via signal transduction (hormones, growth factors). 2) Channels: let ions through when opened (nerves, muscles), always DOWN gradient. 3) Transporters: bind substrates, change shape to move across — active (energy) or passive. 4) Resident: structural, hold cytoskeleton to membrane."}], "q": [{"q": "Which passes through membranes easily?", "a": ["Ions", "Water", "Oxygen gas", "Proteins"], "c": 2}, {"q": "A hypertonic solution causes cells to:", "a": ["Swell", "Shrink", "Stay same", "Divide"], "c": 1}, {"q": "The fluid mosaic model describes membranes as:", "a": ["Rigid and uniform", "Fluid with varied components", "Solid protein sheets", "Pure lipid layers"], "c": 1}, {"q": "Integral membrane proteins are:", "a": ["Loosely attached to one side", "Embedded in the bilayer", "Free-floating in cytoplasm", "Only in prokaryotes"], "c": 1}, {"q": "Membrane channels primarily transport:", "a": ["Proteins", "Lipids", "Ions", "DNA"], "c": 2}, {"q": "Flippases help with:", "a": ["Lateral diffusion", "Transverse diffusion", "Osmosis", "Active transport"], "c": 1}, {"q": "Isotonic solution means:", "a": ["More solute outside", "Less solute outside", "Equal solute inside and outside", "No water present"], "c": 2}, {"q": "Signal transduction is performed by membrane:", "a": ["Channels", "Transporters", "Receptors", "Resident proteins"], "c": 2}, {"q": "Glycolipids are found only on the ___ surface:", "a": ["Intracellular", "Extracellular", "Both equally", "Neither"], "c": 1}, {"q": "Active transporters require:", "a": ["No energy", "Energy", "Only gravity", "Osmosis"], "c": 1}]}, {"t": "Lesson 7: Sugar Metabolism", "ln": "BIO · L7", "s": [{"h": "Overview", "x": "Overall equation: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + energy. Aerobic (with O₂) extracts MORE energy than anaerobic. Three main steps: Glycolysis → TCA Cycle → Electron Transport Chain. Glucose is the base sugar ALL organisms use."}, {"h": "Glycolysis", "x": "10-step reaction in cytoplasm. Glucose → 2 pyruvate. Must spend 2 ATP to start. Makes 4 ATP total = net 2 ATP + 2 NADH. One 6-carbon glucose → two 3-carbon sugars (all remaining steps happen TWICE). Substrate-level phosphorylation. Net 2 ATP is not much per glucose."}, {"h": "TCA Cycle", "x": "Also called Krebs cycle or citric acid cycle. In mitochondrial matrix. 2 pyruvate → 2 ATP + 8 NADH + 2 FADH₂ + 6 CO₂. This is where most electron carriers (NADH, FADH₂) are generated."}, {"h": "Electron Transport Chain", "x": "In inner mitochondrial membrane (cristae). Uses NADH and FADH₂ + O₂ → ~27 ATP + 6 H₂O. Electrons pass through protein complexes, pumping H⁺ across membrane. H⁺ gradient drives ATP synthase. Total from glucose: ~31 ATP (2 glycolysis + 2 TCA + ~27 ETC)."}], "q": [{"q": "Net ATP from glycolysis per glucose:", "a": ["0", "2", "4", "36"], "c": 1}, {"q": "Electron transport chain requires:", "a": ["Glucose only", "Oxygen", "Carbon dioxide", "Nitrogen"], "c": 1}, {"q": "Glycolysis occurs in:", "a": ["Mitochondria", "Nucleus", "Cytoplasm", "Chloroplast"], "c": 2}, {"q": "Total ATP per glucose (all 3 stages):", "a": ["2", "4", "~31", "~100"], "c": 2}, {"q": "TCA cycle occurs in:", "a": ["Cytoplasm", "Cristae", "Mitochondrial matrix", "Nucleus"], "c": 2}, {"q": "NADH and FADH₂ are:", "a": ["Sugars", "Electron carriers", "Enzymes", "Lipids"], "c": 1}, {"q": "Glycolysis converts glucose into:", "a": ["CO₂", "Ethanol", "2 pyruvate", "Acetyl-CoA"], "c": 2}, {"q": "The ETC pumps ___ to create a gradient:", "a": ["Na⁺", "K⁺", "H⁺", "Ca²⁺"], "c": 2}, {"q": "Aerobic respiration yields ___ energy than anaerobic:", "a": ["Less", "Same", "More", "No"], "c": 2}, {"q": "Substrate-level phosphorylation occurs in:", "a": ["ETC only", "Glycolysis", "Photosynthesis", "DNA replication"], "c": 1}]}, {"t": "Lesson 8: Photosynthesis", "ln": "BIO · L8", "s": [{"h": "Overview", "x": "Plants convert light energy → chemical energy. Light reactions in thylakoid membranes. Dark reactions (Calvin cycle) in stroma. Light reactions produce ATP + NADPH → used by Calvin cycle to fix CO₂ into sugar."}, {"h": "Light Reactions", "x": "Photosystem II: uses light to break H₂O → O₂ (waste vital for us!) + H⁺. Some energy pumps H⁺ across membrane. Photosystem I: uses light to make NADPH. PS I REQUIRES PS II to function. H⁺ gradient drives F-type ATPase to make ATP (like in mitochondria). Two photosystems work in series."}, {"h": "Chlorophyll & Pigments", "x": "Structure like heme but with Mg instead of Fe → green. Long lipid chain anchors in membrane. Multiple pigment types (seen in fall colors) funnel energy to reaction center chlorophyll. Chlorophyll a is simplest (methyl group); Chlorophyll b has carbonyl group."}, {"h": "Calvin Cycle (Dark Reactions)", "x": "Don't need light directly but use ATP + NADPH from light reactions. Fix 3 CO₂ → one 3-carbon sugar (triose). Rubisco: key enzyme that fixes CO₂ — most abundant protein on Earth. Critical for all life as we know it."}], "q": [{"q": "Light reactions occur in:", "a": ["Stroma", "Thylakoid membranes", "Cytoplasm", "Nucleus"], "c": 1}, {"q": "Photosystem II produces which 'waste':", "a": ["CO₂", "Glucose", "O₂", "NADPH"], "c": 2}, {"q": "Chlorophyll contains which metal:", "a": ["Iron", "Calcium", "Magnesium", "Zinc"], "c": 2}, {"q": "Calvin cycle occurs in the:", "a": ["Thylakoids", "Stroma", "Cytoplasm", "Matrix"], "c": 1}, {"q": "Rubisco fixes:", "a": ["O₂", "N₂", "CO₂", "H₂O"], "c": 2}, {"q": "PS I requires ___ to function:", "a": ["PS II", "Calvin cycle", "Rubisco", "Glucose"], "c": 0}, {"q": "Light reactions produce:", "a": ["Glucose only", "ATP + NADPH", "CO₂ + H₂O", "Pyruvate"], "c": 1}, {"q": "Chlorophyll's structure is similar to:", "a": ["Cellulose", "Heme", "ATP", "Glucose"], "c": 1}, {"q": "F-type ATPase uses ___ gradient to make ATP:", "a": ["Na⁺", "K⁺", "H⁺", "Ca²⁺"], "c": 2}, {"q": "Dark reactions need light:", "a": ["Always directly", "Indirectly (use light reaction products)", "Never", "Only at night"], "c": 1}]}, {"t": "Lesson 9: Mendelian Inheritance", "ln": "BIO · L9", "s": [{"h": "Mendel's Work", "x": "Monk at St Thomas Abbey, studied peas 1856-63. Published 1866, ignored until 1900. Special because: quantitative, carefully documented, elegantly designed. Could control pollination; chose unambiguous phenotypes."}, {"h": "Key Terms", "x": "Cross: sexual reproduction between 2 organisms. Hybrid: cross between parents differing in trait. Phenotype: observable trait. True-breeding: only produces own phenotype. P₀/F₀ = parental generation. F₁ = offspring of parents. F₂ = F₁ crossed to itself."}, {"h": "Laws of Inheritance", "x": "Dominant: visible in F₁ generation. Recessive: reappears in F₂ at ~3:1 ratio. Law of Segregation: two alleles separate into gametes (each gets one). Law of Independent Assortment: genes on different chromosomes sort independently during gamete formation."}, {"h": "Beyond Simple Dominance", "x": "Mendel went further: in F₃, 201 of 593 green plants were true-breeding, 392 segregated 3:1 again. This proved the 1:2:1 genotypic ratio (homozygous dominant : heterozygous : homozygous recessive). Pedigrees used to analyze family inheritance patterns."}], "q": [{"q": "F₁ generation shows which trait?", "a": ["Recessive", "Dominant", "Both equally", "Neither"], "c": 1}, {"q": "F₂ monohybrid ratio:", "a": ["1:1", "2:1", "3:1", "4:1"], "c": 2}, {"q": "True-breeding means:", "a": ["Produces varied offspring", "Only produces own phenotype", "Is always dominant", "Is always recessive"], "c": 1}, {"q": "Law of Segregation states:", "a": ["Genes blend together", "Alleles separate into gametes", "All traits are dominant", "Chromosomes don't divide"], "c": 1}, {"q": "Independent Assortment applies to genes on:", "a": ["Same chromosome", "Different chromosomes", "No chromosomes", "Only sex chromosomes"], "c": 1}, {"q": "Mendel studied:", "a": ["Fruit flies", "Mice", "Garden peas", "Corn"], "c": 2}, {"q": "The genotypic ratio in F₂ is:", "a": ["3:1", "1:2:1", "1:1", "2:2:1"], "c": 1}, {"q": "A heterozygous organism has:", "a": ["Two identical alleles", "Two different alleles", "No alleles", "Three alleles"], "c": 1}, {"q": "Phenotype means:", "a": ["Genetic makeup", "Observable trait", "DNA sequence", "Chromosome number"], "c": 1}]}, {"t": "Lesson 10: Chromosomes & Inheritance", "ln": "BIO · L10", "s": [{"h": "Chromosome Structure", "x": "Centromere: central joining of sister chromatids. Chromatid: one copy of recently replicated chromosome. Telomere: specialized end structure. Each gene has a specific chromosomal location. Hundreds to thousands of genes per chromosome."}, {"h": "Human Karyotype", "x": "Humans: 23 pairs (22 autosomal + X/Y). Karyotype: ordered presentation of metaphase chromosomes in pairs. Giemsa stain shows G-bands — each chromosome has characteristic band pattern. Chromosome 1 is the largest. Diploid = 2 copies of each. Haploid (gametes) = half."}, {"h": "Gene Linkage & Mapping", "x": "Genes on same chromosome are linked — don't assort independently. Genetic map: diagram of relative gene order based on recombination frequency. More recombination = farther apart on chromosome. Recombination only during meiosis when chromosomes pair up."}], "q": [{"q": "Humans have ___ chromosome pairs:", "a": ["22", "23", "46", "44"], "c": 1}, {"q": "Telomeres are at:", "a": ["Centromere", "Chromosome ends", "Nucleus center", "Membrane"], "c": 1}, {"q": "A karyotype shows chromosomes at:", "a": ["Interphase", "Prophase", "Metaphase", "Telophase"], "c": 2}, {"q": "Diploid means:", "a": ["Half the chromosomes", "Two copies of each", "One copy", "Four copies"], "c": 1}, {"q": "Linked genes are on the:", "a": ["Same chromosome", "Different chromosomes", "No chromosome", "Only Y chromosome"], "c": 0}, {"q": "Giemsa stain shows:", "a": ["DNA sequence", "G-bands on chromosomes", "Protein structure", "RNA"], "c": 1}, {"q": "The largest human chromosome is:", "a": ["Chromosome 22", "Chromosome X", "Chromosome 1", "Chromosome Y"], "c": 2}, {"q": "Genetic map order is determined by:", "a": ["Chromosome size", "Recombination frequency", "Gene name", "Protein size"], "c": 1}]}, {"t": "Lesson 11: Mitosis & Meiosis", "ln": "BIO · L11", "s": [{"h": "Cell Cycle", "x": "G1 (gap/resting, no DNA synthesis) → S (DNA synthesis & chromosome duplication) → G2 (double DNA) → M (mitosis, 0.5-2 hrs). Interphase = G1+S+G2. Cells double every 18-24 hrs in culture. Most cells in G0 (non-dividing), stops in G1 before S."}, {"h": "Mitosis (PMAT)", "x": "Prophase: chromosomes condense, paired chromatids at centromere, nuclear membrane disappears. Metaphase: spindle forms from centrosomes, microtubules attach to kinetochores, chromosomes align at metaphase plate, spindle checkpoint. Anaphase: chromatids separate, pulled to opposite poles. Telophase: nuclear envelope reforms, spindle disappears, chromosomes decondense, cleavage furrow → cytokinesis."}, {"h": "Cell Cycle Control", "x": "Cyclins: proteins made progressively controlling the cycle. Cyclin D starts, Cyclin B ends. Mutation in cyclin D → constant cell division → cancer. Checkpoints verify key events. Rb must be phosphorylated to enter S phase. Growth factors bind receptors to signal division."}, {"h": "Inhibition & Tumors", "x": "Contact (density-dependent) inhibition: blocks division when crowded. Anchorage-dependent inhibition: cells must be attached. Loss of contact inhibition → benign tumors (extra divisions but stop). Loss of contact + cycle control → malignant tumors. Loss of anchorage dependence → metastatic tumors (spread)."}, {"h": "Meiosis Overview", "x": "Reduces chromosomes by half (diploid→haploid) for gametes. Occurs after normal division with NO second S phase. Mitosis: 46→46. Meiosis: 46→23. Recombination combines parental traits — only when tetrad (4 chromosomes) lined up. Random → different children get different mixes."}, {"h": "Prophase I Stages", "x": "Leptotene: initial condensation, thin threads with chromomeres. Zygotene: synapsis (lateral pairing) of homologs → bivalent. Pachytene ⭐: further condensation, tetrad forms, CROSSING OVER begins — genetic exchange between chromosomes. Diplotene: chromosomes separate, chiasmata visible. Diakinesis: homologs repel (except at chiasmata), max condensation, nuclear membrane breaks."}, {"h": "Where Meiosis Occurs", "x": "Meiocytes: primary spermatocytes and oocytes. Females: only 1 of 4 daughters survives as oocyte (other 3 = polar bodies, absorbed). Males: all 4 become sperm. Plants: haploid daughters → spores → mitosis → gametophyte → gametes by mitosis → fusion → diploid zygote → sporophyte."}, {"h": "Binary Fission", "x": "Bacteria use origins of replication (like centrosomes). DNA replicates and moves to cell ends. Cell elongates, membrane pinches in when DNA finished. Simpler than mitosis — no spindle, no chromosomes visible."}], "q": [{"q": "DNA synthesis occurs in:", "a": ["G1", "S phase", "G2", "M phase"], "c": 1}, {"q": "Correct mitosis order:", "a": ["Prophase, Metaphase, Anaphase, Telophase", "Metaphase, Prophase, Telophase, Anaphase", "Anaphase, Metaphase, Prophase, Telophase", "Telophase, Prophase, Metaphase, Anaphase"], "c": 0}, {"q": "Crossing over occurs in:", "a": ["Leptotene", "Zygotene", "Pachytene", "Diakinesis"], "c": 2}, {"q": "Malignant tumors have lost:", "a": ["Contact inhibition only", "Contact inhibition + cycle control", "Anchorage dependence only", "Nothing"], "c": 1}, {"q": "Meiosis produces ___ chromosomes:", "a": ["46", "92", "23", "12"], "c": 2}, {"q": "In females, ___ of 4 daughter cells survive:", "a": ["4", "3", "2", "1"], "c": 3}, {"q": "What must be phosphorylated for S phase entry?", "a": ["Cyclin D", "DNA polymerase", "Rb protein", "ATP"], "c": 2}, {"q": "A bivalent is:", "a": ["4 chromosomes", "A synapsed pair of homologs", "A haploid cell", "A type of bond"], "c": 1}, {"q": "What is a chiasma?", "a": ["A spindle fiber", "Cross connection from crossing over", "A condensed chromosome", "An enzyme"], "c": 1}, {"q": "Metastatic tumors have also lost:", "a": ["Contact inhibition", "Cell cycle control", "Anchorage dependence", "DNA replication"], "c": 2}, {"q": "Cyclins are:", "a": ["Chromosomes", "Proteins controlling cell cycle", "DNA strands", "Lipids"], "c": 1}, {"q": "The kinetochore is:", "a": ["A cyclin", "Structure at centromere binding spindle", "Growth factor", "Cleavage furrow"], "c": 1}, {"q": "G0 is the:", "a": ["Synthesis phase", "Mitotic phase", "Non-dividing stage", "Gap 2 phase"], "c": 2}]}]}, "psychology": {"name": "PSY 309", "sub": "Abnormal Psychology", "icon": "🧠", "topics": [{"t": "Lesson 1: Abnormal Psych Past & Present", "ln": "PSY 309 · Ch 1", "s": [{"h": "Psychopathology", "x": "Scientific study of mental disorders — explanations, causes, progression, symptoms, assessment, diagnosis, treatment. Workers: clinical scientists (research) and clinical practitioners (treatment)."}, {"h": "The Four Ds", "x": "Deviance: different from cultural norms. Distress: unpleasant/upsetting to the person. Dysfunction: interferes with daily functioning. Danger: poses risk to self or others. Influenced by societal norms, culture, and context. Criteria often vague/subjective."}, {"h": "Defining Abnormality", "x": "Szasz: deviations are 'problems in living,' not illness — society invents mental illness to control people. Overattention to norms may confuse eccentricity with disorder. ~1 in 5,000 people are 'classic eccentrics.' Tattoos once considered abnormal, now ~40% of US adults have one."}, {"h": "Treatment Basics", "x": "Procedure to change abnormal→normal behavior. Three essentials: sufferer seeking help, trained socially-accepted healer, series of therapeutic contacts. Every society past and present has witnessed psychological abnormality."}], "q": [{"q": "The Four Ds are:", "a": ["Deviance/Distress/Dysfunction/Danger", "Diagnosis/Disease/Disorder/Disability", "Depression/Delusion/Dementia/Denial", "None of these"], "c": 0}, {"q": "Szasz argued abnormality is:", "a": ["A brain disease", "Problems in living", "Genetic only", "Untreatable"], "c": 1}, {"q": "Psychopathology is the study of:", "a": ["Normal behavior", "Mental disorders", "Physical illness", "Intelligence"], "c": 1}, {"q": "Treatment requires all EXCEPT:", "a": ["A sufferer", "A trained healer", "Therapeutic contacts", "A laboratory"], "c": 3}, {"q": "The Four Ds are influenced by:", "a": ["Only biology", "Culture, norms, and context", "Nothing", "Only genetics"], "c": 1}]}, {"t": "Lesson 2: Research Methods", "ln": "PSY 309 · Ch 2", "s": [{"h": "Research Methods", "x": "Three methods: Case study (detailed individual description — rich but low validity/generalizability), Correlational (co-relationship between variables, uses representative samples, broader conclusions), Experimental (cause-and-effect, controlled conditions). All rely on scientific method."}, {"h": "Assessment Quality", "x": "Standardization: common steps for administration, scoring, interpretation. Reliability (consistency): test-retest (same results each time) and interrater (different judges agree). Validity (accuracy): face (appears to measure right thing), predictive (predicts future outcomes), concurrent (agrees with other measures)."}, {"h": "Ethics", "x": "11-25 million animals used yearly in US research — helped increase life expectancy by 24 years but raises ethical questions. Conversion therapy: widely discredited — Robert Spitzer publicly apologized for his flawed study supporting it. Research inaccuracy in psychopathology can cause great suffering."}], "q": [{"q": "Case studies have:", "a": ["High generalizability", "Low internal validity", "Perfect reliability", "No bias"], "c": 1}, {"q": "Test-retest reliability means:", "a": ["Different judges agree", "Same results each time", "Accurate measurement", "Face validity"], "c": 1}, {"q": "Correlational research determines:", "a": ["Cause and effect", "Co-relationship between variables", "Individual life history", "Treatment effectiveness"], "c": 1}, {"q": "Interrater reliability means:", "a": ["Same results over time", "Different judges agree independently", "Test measures what it claims", "Subjects are consistent"], "c": 1}, {"q": "Experimental method establishes:", "a": ["Correlations", "Case histories", "Cause-and-effect", "Observations only"], "c": 2}, {"q": "Face validity means:", "a": ["Same results each time", "Appears to measure the right thing", "Predicts future outcomes", "Judges agree"], "c": 1}]}, {"t": "Lesson 3: Models of Abnormality", "ln": "PSY 309 · Ch 3", "s": [{"h": "Biological Model", "x": "Medical perspective: malfunctioning brain anatomy/chemistry. Neurons communicate via neurotransmitters (NTs) across synapses. Some NTs excitatory, some inhibitory. Abnormal NT activity → mental disorders. Endocrine system (hormones like cortisol) linked to anxiety/mood disorders."}, {"h": "Brain Structure & Circuits", "x": "Cerebrum structures: cortex, corpus callosum, basal ganglia, hippocampus, amygdala. Research increasingly focuses on brain circuits rather than single structures. Proper interconnectivity is key. Genetics play a role — multiple genes combine; mutations may be inherited or evolutionary."}, {"h": "Other Models", "x": "No single model explains all abnormality. Different models focus on different aspects. Multiple models often needed. Models guide both research questions and treatment approaches."}], "q": [{"q": "The biological model focuses on:", "a": ["Unconscious conflicts", "Brain anatomy and chemistry", "Learned behaviors", "Self-actualization"], "c": 1}, {"q": "Abnormal cortisol is linked to:", "a": ["Schizophrenia only", "Anxiety and mood disorders", "Personality disorders", "No disorders"], "c": 1}, {"q": "Neurotransmitters cross the:", "a": ["Cell membrane", "Synapse", "Blood-brain barrier", "Spinal cord"], "c": 1}, {"q": "Brain research now focuses on:", "a": ["Single structures", "Brain circuits", "Only neurotransmitters", "Only genetics"], "c": 1}, {"q": "Which brain structure is linked to emotion?", "a": ["Corpus callosum", "Amygdala", "Basal ganglia", "Cortex only"], "c": 1}]}, {"t": "Lesson 4: Clinical Assessment", "ln": "PSY 309 · Ch 4", "s": [{"h": "Assessment Tools", "x": "Three categories: clinical interviews (face-to-face, structured/unstructured, mental status exam), tests (projective and personality inventories), observations. Must be standardized with clear reliability and validity."}, {"h": "Projective Tests", "x": "Client interprets vague/ambiguous stimuli. Psychodynamic orientation. Examples: Rorschach (inkblots), TAT (Thematic Apperception Test, story-telling), sentence completion, drawings. Once most common for personality; now supplementary. Limitations: reliability/validity inconsistent, possible cultural bias."}, {"h": "Limitations", "x": "Clinical interview limitations: lack of validity, interviewer bias, lack of reliability. Projective test limitations: not consistently reliable/valid, may be biased against minority groups. Personality inventories: more standardized but may not capture individual complexity."}], "q": [{"q": "Rorschach is a ___ test:", "a": ["Personality inventory", "Projective", "Neurological", "Intelligence"], "c": 1}, {"q": "Interrater reliability means:", "a": ["Same results over time", "Different judges agree", "Test is accurate", "Subjects don't change"], "c": 1}, {"q": "TAT stands for:", "a": ["Total Assessment Tool", "Thematic Apperception Test", "Trait Analysis Test", "Treatment Approach Technique"], "c": 1}, {"q": "Clinical interviews can be:", "a": ["Only structured", "Only unstructured", "Structured or unstructured", "Only written"], "c": 2}, {"q": "Projective tests are based on ___ theory:", "a": ["Behavioral", "Cognitive", "Psychodynamic", "Biological"], "c": 2}]}, {"t": "Lesson 5: Anxiety & OCD", "ln": "PSY 309 · Ch 5", "s": [{"h": "Anxiety vs Fear", "x": "Fear: CNS response to SERIOUS threat. Anxiety: CNS response to VAGUE threat/danger. Most common mental disorders in US. 18% of adults yearly, 29% lifetime. Only one-third seek treatment."}, {"h": "GAD", "x": "Generalized Anxiety Disorder: persistent excessive worry about MULTIPLE matters for 6+ months. Symptoms include 3+ of: edginess, fatigue, poor concentration, irritability, muscle tension, sleep problems. Must cause significant distress or impairment."}, {"h": "Perspectives on GAD", "x": "Sociocultural: dangerous social conditions (poverty, racial discrimination). Psychodynamic (Freud): realistic anxiety (real danger), neurotic anxiety (prevented id impulses), moral anxiety (punishment for id). Humanistic (Rogers): stops honest self-acceptance. Cognitive-behavioral: maladaptive thought patterns. Short-term psychodynamic therapy most effective."}, {"h": "Separation Anxiety", "x": "Most common in young children but DSM-5 now recognizes it can develop in adults too. New categorization as anxiety disorder is controversial."}], "q": [{"q": "GAD requires symptoms for:", "a": ["2 weeks", "1 month", "6+ months", "2 years"], "c": 2}, {"q": "___% of US adults experience anxiety yearly:", "a": ["5", "12", "18", "29"], "c": 2}, {"q": "Freud's neurotic anxiety comes from:", "a": ["Real danger", "Prevented id impulses", "Punishment guilt", "Social phobia"], "c": 1}, {"q": "Fear is a response to:", "a": ["Vague threat", "Serious threat", "No threat", "Future threat only"], "c": 1}, {"q": "GAD involves worry about:", "a": ["One specific thing", "Multiple matters", "Only work", "Only health"], "c": 1}, {"q": "What fraction of anxious people seek treatment?", "a": ["One-half", "One-third", "One-quarter", "All of them"], "c": 1}, {"q": "Rogers' humanistic view links GAD to:", "a": ["Brain chemistry", "Lack of honest self-acceptance", "Childhood trauma", "Genetics only"], "c": 1}]}, {"t": "Lesson 6: Trauma & Stress", "ln": "PSY 309 · Ch 6", "s": [{"h": "Stress Response", "x": "Stressor: event creating demands/fear. Stress response: person's reactions. Fight-or-flight: sympathetic NS activates arousal; parasympathetic returns to normal. Two pathways: 1) Sympathetic NS → direct organ stimulation + adrenal medulla releases epinephrine/norepinephrine. 2) HPA: hypothalamus → pituitary → adrenal cortex → corticosteroids (stress hormones)."}, {"h": "ASD & PTSD", "x": "Acute Stress Disorder: symptoms within 4 weeks of event, last <1 month. PTSD: may begin shortly after OR months/years later. 80% of ASD → PTSD. Shared symptoms: increased arousal/anxiety/guilt, reexperiencing trauma (flashbacks, nightmares), avoidance of reminders, reduced responsiveness, dissociation."}, {"h": "Autonomic Nervous System", "x": "Sympathetic: quickens heartbeat, produces arousal (fight-or-flight). Parasympathetic: returns body to normal (rest-and-digest). Each person has unique pattern of autonomic/endocrine functioning → unique way of experiencing arousal and fear."}], "q": [{"q": "Fight-or-flight involves the:", "a": ["Parasympathetic NS only", "Sympathetic NS", "Somatic NS only", "Central NS only"], "c": 1}, {"q": "ASD symptoms last:", "a": ["Less than 1 month", "1-6 months", "Over 1 year", "Indefinitely"], "c": 0}, {"q": "___% of ASD becomes PTSD:", "a": ["20", "50", "80", "100"], "c": 2}, {"q": "HPA pathway releases:", "a": ["Dopamine", "Serotonin", "Corticosteroids", "Insulin"], "c": 2}, {"q": "The parasympathetic NS:", "a": ["Increases arousal", "Returns body to normal", "Causes fight response", "Releases epinephrine"], "c": 1}, {"q": "PTSD symptoms include all EXCEPT:", "a": ["Reexperiencing trauma", "Avoidance", "Increased arousal", "Improved memory"], "c": 3}, {"q": "Epinephrine is released by the:", "a": ["Adrenal cortex", "Adrenal medulla", "Pituitary", "Hypothalamus"], "c": 1}]}, {"t": "Lesson 7: Depressive & Bipolar", "ln": "PSY 309 · Ch 7", "s": [{"h": "Definitions", "x": "Depression: low mood, sadness, guilt, low energy, low self-worth. Mania: euphoria, frenzied activity, exaggerated beliefs. Unipolar = depression without mania history. Bipolar = alternating/intermixed mania and depression."}, {"h": "Prevalence", "x": "8% US adults severe unipolar depression yearly; 5% mild forms. 20% lifetime. Average onset: 19 years. Higher in chronically ill elderly. 6-15% with severe depression die by suicide."}, {"h": "Symptoms & Types", "x": "5 categories: emotional (miserable, empty), motivational (lacking drive), behavioral (less active/productive), cognitive (negative self-views, pessimism, self-blame), physical (headaches, pain). Major Depressive: severe, 2+ weeks, 3-4 additional symptoms. Persistent Depressive (Dysthymic): chronic, 2+ years, milder. Premenstrual Dysphoric: week before menstruation."}], "q": [{"q": "Unipolar depression means:", "a": ["Depression+mania", "Depression without mania", "Only mania", "Seasonal"], "c": 1}, {"q": "Major depressive episode: symptoms for:", "a": ["1 day", "1 week", "2 weeks", "2 months"], "c": 2}, {"q": "Persistent depressive disorder lasts:", "a": ["2 weeks", "6 months", "1 year", "2 years"], "c": 3}, {"q": "Average age of depression onset:", "a": ["12", "19", "35", "50"], "c": 1}, {"q": "___% of adults experience depression in their lifetime:", "a": ["5", "8", "15", "20"], "c": 3}, {"q": "Cognitive symptoms of depression include:", "a": ["Headaches", "Negative self-views and pessimism", "Lack of energy", "Sleep problems"], "c": 1}, {"q": "Bipolar disorder features:", "a": ["Only depression", "Only mania", "Alternating mania and depression", "Only anxiety"], "c": 2}]}, {"t": "Lesson 8: Depression Treatment", "ln": "PSY 309 · Ch 8", "s": [{"h": "Psychodynamic Therapy", "x": "Depression from unconscious grief + excessive dependence. Uses free association, therapist interpretation, review of past. Strengths: works for moderate depression with abuse history. Limits: patients too passive/weary, may quit early. Long-term only occasionally helpful."}, {"h": "Cognitive-Behavioral Therapy", "x": "Behavioral activation: increase pleasurable activities. Beck's cognitive therapy: challenge automatic negative thoughts, identify biases, change attitudes. Cognitive triad: negative views of SELF, WORLD, FUTURE. 50-60% show significant improvement. Similar to Ellis's rational-emotive therapy."}, {"h": "Other Treatments", "x": "Antidepressants (indefinite): 50-60% improve. ECT (9 sessions): 50-60%. Vagus nerve stimulation (1 session + follow-up): 50-60%. Transcranial magnetic stimulation (25 sessions): 50-60%. Interpersonal psychotherapy (20 sessions): 50-60%. Bipolar: mood stabilizers + antipsychotics + antidepressants → 60% improve."}], "q": [{"q": "Beck's cognitive triad:", "a": ["Past/present/future", "Self/world/future", "Family/work/health", "Id/ego/superego"], "c": 1}, {"q": "CBT improvement rate:", "a": ["10-20%", "30-40%", "50-60%", "80-90%"], "c": 2}, {"q": "Behavioral activation aims to:", "a": ["Increase medication", "Increase pleasurable activities", "Decrease all activity", "Analyze dreams"], "c": 1}, {"q": "ECT typically requires ___ sessions:", "a": ["1", "5", "9", "25"], "c": 2}, {"q": "Bipolar treatment includes:", "a": ["Only antidepressants", "Mood stabilizers + antipsychotics", "Only therapy", "No treatment works"], "c": 1}, {"q": "Psychodynamic therapy says depression comes from:", "a": ["Brain chemistry only", "Unconscious grief and dependence", "Learned behavior", "Genetics only"], "c": 1}]}, {"t": "Lesson 9: Suicide", "ln": "PSY 309 · Ch 9", "s": [{"h": "Overview", "x": "~1 million worldwide/year, 42,000+ US. Not classified as DSM-5 disorder (suicidal behavior disorder proposed). Types: death seeker, death initiator, death ignorer, death darer. Subintentional death: indirect/unconscious. 17%+ of teens purposely self-injure (cutting most common)."}, {"h": "Triggers", "x": "Immediate stressors: loss of loved one, job loss, financial loss, disasters. Long-term: social isolation, serious illness, abusive environment, occupational stress. Mood changes: hopelessness, psychache (psychological pain), dichotomous thinking (all-or-nothing). Alcohol/drug use. Mental disorders. Modeling (copying others)."}, {"h": "Patterns", "x": "Rates vary by country, gender, race, religion, social environment. American Indians highest US rate. Under-reporting exists. Pro-suicide websites tripled in recent years. Live-streaming suicides occur. Social networking efforts to identify at-risk people."}], "q": [{"q": "US suicide deaths per year:", "a": ["5,000", "20,000", "42,000+", "100,000+"], "c": 2}, {"q": "Dichotomous thinking:", "a": ["Flexible thinking", "All-or-nothing thinking", "Creative thinking", "Logical reasoning"], "c": 1}, {"q": "Which group has highest US suicide rate?", "a": ["White Americans", "African Americans", "American Indians", "Asian Americans"], "c": 2}, {"q": "Psychache refers to:", "a": ["Physical pain", "Psychological pain", "Brain damage", "Medication side effect"], "c": 1}, {"q": "___% of teens purposely self-injure:", "a": ["5", "10", "17+", "30"], "c": 2}, {"q": "Suicide is classified as a ___ in DSM-5:", "a": ["Mood disorder", "Anxiety disorder", "Not classified as a disorder", "Personality disorder"], "c": 2}]}, {"t": "Lesson 10: Somatic Symptom Disorders", "ln": "PSY 309 · Ch 10", "s": [{"h": "Factitious Disorder", "x": "Imposed on self: false creation of symptoms without external rewards (Munchausen syndrome). Imposed on another: creating symptoms in another person (Munchausen by proxy). Links: poor social support, extensive childhood medical treatment, grudge against medical profession. Causes poorly understood; treatment unreliable."}, {"h": "Conversion & Somatic Symptom", "x": "Conversion disorder: neurological-like symptoms with no medical basis (e.g. glove anesthesia — entire hand numb). Usually begins late childhood/young adulthood during extreme stress. Not consciously produced. Somatic symptom disorder: at least one upsetting physical symptom + unreasonable thoughts/feelings/behaviors about it, 6+ months."}, {"h": "Patterns", "x": "Somatization: long-lasting, no physical basis, dramatic, doctor-shopping. Prevalence ~4%. Predominant pain: pain source known or unknown, may follow real injury. Illness anxiety disorder: excessive worry about having/developing serious illness. All may respond to stress and are often interrelated."}], "q": [{"q": "Munchausen syndrome is:", "a": ["Conversion disorder", "Factitious disorder imposed on self", "Somatic symptom disorder", "Illness anxiety"], "c": 1}, {"q": "Conversion disorder involves:", "a": ["Faking for reward", "Neurological symptoms without medical basis", "Pain only", "Health anxiety"], "c": 1}, {"q": "Glove anesthesia is an example of:", "a": ["Factitious disorder", "Conversion disorder", "Somatic symptom disorder", "Normal sensation"], "c": 1}, {"q": "Somatic symptom disorder lasts:", "a": ["1 week", "1 month", "6+ months", "Exactly 2 years"], "c": 2}, {"q": "Munchausen by proxy is imposed on:", "a": ["Self", "Another person", "No one", "Only adults"], "c": 1}]}, {"t": "Lesson 13: Sexual Disorders", "ln": "PSY 309 · Ch 13", "s": [{"h": "Sexual Dysfunctions", "x": "Persistent inability in sexual response cycle. Affect ~30% men, ~45% women. Four phases: desire, excitement, orgasm, resolution. Often interrelated — many with one dysfunction have another. Lead to frustration, guilt, low self-esteem, interpersonal problems."}, {"h": "Disorders of Desire", "x": "Male hypoactive sexual desire: few/no sexual thoughts for 6+ months. Female sexual interest/arousal: reduced interest in 3+ areas for 6+ months. Biological causes: abnormal hormones (high prolactin, low testosterone, high/low estrogen), excess serotonin/dopamine, medications, chronic illness."}, {"h": "Psychological & Sociocultural Causes", "x": "Psychological: general anxiety, depression, anger; specific fears/memories; certain psych disorders. Sociocultural: situational pressures, relationship problems, cultural standards, sexual assault/molestation trauma."}], "q": [{"q": "Sexual response has ___ phases:", "a": ["2", "3", "4", "5"], "c": 2}, {"q": "Dysfunctions affect ~___% of women:", "a": ["10", "25", "45", "70"], "c": 2}, {"q": "High ___ can reduce sexual desire:", "a": ["Testosterone", "Prolactin", "Estrogen (low)", "Insulin"], "c": 1}, {"q": "Male hypoactive desire requires symptoms for:", "a": ["1 month", "3 months", "6+ months", "1 year"], "c": 2}, {"q": "Sexual dysfunctions are often:", "a": ["Unrelated to each other", "Interrelated", "Only biological", "Only psychological"], "c": 1}]}, {"t": "Lesson 14: Schizophrenia", "ln": "PSY 309 · Ch 14", "s": [{"h": "Overview", "x": "Psychosis: loss of reality contac
