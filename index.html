l", "Heart disease", "Better health", "Weight loss"], "c": 1}, {"q": "Olive oil is a ___ fat:", "a": ["Saturated", "Trans", "Unsaturated (liquid)", "Solid"], "c": 2}, {"q": "Butter is a ___ fat:", "a": ["Unsaturated", "Saturated (solid)", "Trans", "Liquid"], "c": 1}, {"q": "Margarine is made by ___ of oils:", "a": ["Dehydration", "Hydrogenation", "Hydrolysis", "Evaporation"], "c": 1}, {"q": "Cell membranes are made primarily of:", "a": ["Carbohydrates", "Phospholipid bilayers", "Starch", "DNA"], "c": 1}, {"q": "Bile salts are derived from:", "a": ["Glucose", "Cholesterol", "DNA", "Amino acids"], "c": 1}, {"q": "Vitamin D is derived from:", "a": ["Starch", "Cholesterol", "RNA", "Cellulose"], "c": 1}, {"q": "The central carbon of an amino acid is called:", "a": ["Beta carbon", "Alpha carbon (α-carbon)", "Gamma carbon", "Delta carbon"], "c": 1}, {"q": "How many amino acids are essential (must come from diet)?", "a": ["5", "9", "15", "20"], "c": 1}, {"q": "Ferritin is a ___ protein:", "a": ["Transport", "Storage (iron)", "Enzyme", "Hormone"], "c": 1}, {"q": "Enzymes are specific — each catalyzes:", "a": ["All reactions", "One reaction or type", "No reactions", "Random reactions"], "c": 1}, {"q": "Substrate is the molecule that:", "a": ["Makes the enzyme", "Binds to the active site", "Destroys the enzyme", "Is the product"], "c": 1}, {"q": "After a reaction, the enzyme is:", "a": ["Destroyed", "Unchanged and reusable", "Permanently altered", "Consumed"], "c": 1}, {"q": "DNA is found mainly in the:", "a": ["Cytoplasm", "Nucleus", "Cell membrane", "Ribosome"], "c": 1}, {"q": "RNA is found in:", "a": ["Only the nucleus", "Nucleus and cytoplasm", "Only cytoplasm", "Only mitochondria"], "c": 1}, {"q": "The 3 types of RNA are:", "a": ["rDNA, tDNA, mDNA", "mRNA, tRNA, rRNA", "Only mRNA", "Only tRNA"], "c": 1}, {"q": "Guanine always pairs with:", "a": ["Adenine", "Thymine", "Cytosine", "Uracil"], "c": 2}, {"q": "Adenine always pairs with ___ in DNA:", "a": ["Cytosine", "Guanine", "Thymine", "Uracil"], "c": 2}, {"q": "Which bond type forms between amino acids?", "a": ["Glycosidic", "Peptide", "Phosphodiester", "Hydrogen"], "c": 1}, {"q": "Which bond type links nucleotides?", "a": ["Peptide", "Glycosidic", "Phosphodiester", "Ester"], "c": 2}, {"q": "Which bond type links sugars?", "a": ["Peptide", "Phosphodiester", "Glycosidic", "Disulfide"], "c": 2}, {"q": "Proteins contain the elements C, H, O, N, and sometimes:", "a": ["P", "S (sulfur)", "Fe", "K"], "c": 1}, {"q": "Nucleic acids contain C, H, O, N, and:", "a": ["S", "P (phosphorus)", "Fe", "Ca"], "c": 1}, {"q": "A dipeptide has ___ amino acids:", "a": ["1", "2", "3", "Many"], "c": 1}, {"q": "N-terminus has a free:", "a": ["—COOH", "—NH₂ (amino group)", "—OH", "—SH"], "c": 1}, {"q": "C-terminus has a free:", "a": ["—NH₂", "—COOH (carboxyl group)", "—OH", "—PO₄"], "c": 1}, {"q": "Hydrophobic interactions help stabilize ___ structure:", "a": ["Primary", "Secondary", "Tertiary", "None"], "c": 2}, {"q": "Ionic bonds between R-groups stabilize ___ structure:", "a": ["Primary", "Secondary", "Tertiary", "Only quaternary"], "c": 2}, {"q": "Cooking an egg is an example of:", "a": ["Renaturation", "Denaturation", "Hydrolysis", "Synthesis"], "c": 1}, {"q": "Starch is found in:", "a": ["Animal muscles", "Potatoes, rice, wheat", "Only fruits", "Only fish"], "c": 1}, {"q": "The energy released from ATP is used for:", "a": ["Nothing", "Cellular work (muscle, transport, synthesis)", "Only heat", "Only light"], "c": 1}, {"q": "Chitin contains:", "a": ["Only C, H, O", "Nitrogen (modified glucose)", "Phosphorus", "Sulfur"], "c": 1}, {"q": "Cis configuration: hydrogens on ___ side of double bond:", "a": ["Opposite", "Same", "No", "Alternating"], "c": 1}, {"q": "Trans configuration: hydrogens on ___ sides:", "a": ["Same", "Opposite", "No", "Middle"], "c": 1}, {"q": "The cuticle on leaves is made of:", "a": ["Cellulose", "Wax", "Starch", "Protein"], "c": 1}, {"q": "Cerumen (earwax) is a:", "a": ["Protein", "Wax", "Carbohydrate", "Nucleic acid"], "c": 1}]}, {"id": "bio-l4", "title": "Lesson 4: Enzymes & ATP", "ln": "BIO · L4", "notes": [{"heading": "Energy & Metabolism Overview", "body": "<b>Metabolism:</b> all chemical reactions in a living organism. Two types: <b>Anabolism:</b> building complex molecules from simpler ones (requires energy — endergonic). Examples: protein synthesis, DNA replication. <b>Catabolism:</b> breaking complex molecules into simpler ones (releases energy — exergonic). Examples: digestion, cellular respiration. Metabolism requires enzymes to proceed at rates compatible with life."}, {"heading": "Thermodynamics in Biology", "body": "<b>1st Law of Thermodynamics:</b> energy cannot be created or destroyed, only transformed (conservation of energy). <b>2nd Law:</b> every energy transfer increases <b>entropy</b> (disorder) in the universe. No energy transformation is 100% efficient — some energy is always lost as <b>heat</b>. Living organisms maintain order locally but increase overall entropy by releasing heat."}, {"heading": "Free Energy (ΔG)", "body": "<b>Gibbs free energy (G):</b> energy available to do work. <b>ΔG = change in free energy.</b> <b>Exergonic (ΔG < 0):</b> releases free energy, spontaneous, products have less energy than reactants (e.g., cellular respiration). <b>Endergonic (ΔG > 0):</b> requires energy input, NOT spontaneous, products have more energy (e.g., photosynthesis, protein synthesis). Spontaneous ≠ fast — just thermodynamically favorable."}, {"heading": "ATP — Structure", "body": "<b>Adenosine triphosphate:</b> adenine base + ribose sugar + <b>3 phosphate groups</b>. The phosphate groups carry <b>negative charges</b> that repel each other → bonds between phosphates are <b>unstable and high-energy</b>. This instability makes ATP excellent for transferring energy. ATP is a <b>modified nucleotide</b> (same building block as RNA)."}, {"heading": "ATP — Energy Release", "body": "Hydrolysis of ATP: <b>ATP + H₂O → ADP + Pᵢ + energy (−7.3 kcal/mol)</b>. Breaking the terminal phosphate bond releases energy used for cellular work. Can also go further: <b>ADP → AMP + Pᵢ + energy</b>. The energy released powers: muscle contraction, active transport, biosynthesis, signal transduction, bioluminescence."}, {"heading": "ATP — Energy Coupling", "body": "<b>Energy coupling:</b> using energy released from an exergonic reaction (like ATP hydrolysis) to drive an endergonic reaction. Example: ATP hydrolysis powers a sodium-potassium pump (which wouldn't happen spontaneously). <b>Phosphorylation:</b> transferring a phosphate from ATP to another molecule, making it more reactive/changing its shape. This is how ATP does work."}, {"heading": "The ATP Cycle", "body": "ATP is constantly recycled: <b>ATP → ADP + Pᵢ (used for work) → ADP + Pᵢ → ATP (regenerated by cellular respiration)</b>. A human body contains only ~50 g of ATP at any time but uses ~45 kg/day — each ATP molecule is recycled <b>~1,000-1,500 times daily</b>. ATP is NOT stored long-term; it's made and used immediately. ADP is recharged back to ATP mainly in mitochondria."}, {"heading": "What Are Enzymes?", "body": "<b>Enzymes</b> are biological catalysts — mostly <b>proteins</b> (some are RNA = <b>ribozymes</b>). They <b>speed up chemical reactions</b> without being consumed or permanently altered. Without enzymes, most biological reactions would take years or never occur at body temperature. Enzymes are <b>highly specific</b> — each catalyzes one reaction or a small set of related reactions. Named by substrate + '-ase' (e.g., lactase, sucrase, lipase)."}, {"heading": "Activation Energy", "body": "<b>Activation energy (Eₐ):</b> the minimum energy required to START a chemical reaction — the energy 'hill' reactants must climb. Even exergonic reactions need Eₐ to begin. Enzymes <b>lower Eₐ</b> — they don't change ΔG (total energy released) or the equilibrium, just make reactions happen <b>faster</b> by providing an alternative reaction pathway with a lower energy barrier."}, {"heading": "How Enzymes Work — Active Site", "body": "<b>Active site:</b> a specific pocket/groove on the enzyme surface where the <b>substrate</b> binds. Formed by a precise arrangement of amino acid R-groups. The active site's shape is <b>complementary</b> to the substrate. <b>Enzyme-substrate complex:</b> temporary association of enzyme and substrate. After catalysis → products are released, enzyme returns to original shape, ready to catalyze again."}, {"heading": "Lock-and-Key vs Induced Fit", "body": "<b>Lock-and-key model:</b> (older) active site has a rigid, fixed shape that exactly matches the substrate like a key in a lock. <b>Induced fit model:</b> (current, more accurate) active site is flexible — it <b>changes shape slightly</b> when substrate binds, creating a tighter fit. Like a handshake — the hand adjusts to grip. The shape change strains substrate bonds, lowering Eₐ further."}, {"heading": "Enzyme Specificity", "body": "Each enzyme catalyzes only ONE reaction or type. <b>Specificity</b> comes from the precise 3D shape of the active site matching only specific substrates. Example: <b>sucrase</b> only breaks sucrose; <b>lactase</b> only breaks lactose. This specificity is determined by the enzyme's <b>primary structure</b> (amino acid sequence → folds into specific 3D shape). Change the shape → lose specificity."}, {"heading": "Factors Affecting Enzyme Activity — Temperature", "body": "Enzymes have an <b>optimal temperature</b> where activity is greatest. For humans: ~<b>37°C (98.6°F)</b>. Below optimal: molecules move slowly, fewer collisions, lower activity. Above optimal: enzyme <b>denatures</b> (loses 3D shape from broken H-bonds and other weak interactions) → activity drops to zero. Thermophilic organisms (hot springs) have enzymes with higher optimal temps (~80°C+)."}, {"heading": "Factors Affecting Enzyme Activity — pH", "body": "Each enzyme has an <b>optimal pH</b>. Most human enzymes: pH ~<b>6-8</b>. Exceptions: <b>pepsin</b> (stomach protease) optimal pH ~<b>2</b>; <b>trypsin</b> (intestinal protease) optimal pH ~<b>8</b>. pH too far from optimum → changes charge on R-groups → disrupts ionic bonds and H-bonds → <b>denaturation</b> → loss of function. This is why buffers are critical in biological systems."}, {"heading": "Factors Affecting Enzyme Activity — Substrate Concentration", "body": "Increasing substrate concentration → <b>increases reaction rate</b> (more collisions between enzyme and substrate). But only to a point — at <b>Vmax (maximum velocity)</b>, ALL enzyme active sites are occupied (<b>enzyme saturation</b>). Adding more substrate won't increase rate beyond Vmax. To increase rate past Vmax, must add more enzyme."}, {"heading": "Factors Affecting Enzyme Activity — Enzyme Concentration", "body": "More enzyme molecules → <b>more active sites available</b> → faster reaction rate (assuming excess substrate). Cells regulate reaction rates by controlling how much enzyme is produced (<b>gene expression</b>). Increasing enzyme concentration always increases rate as long as substrate is available."}, {"heading": "Competitive Inhibition", "body": "<b>Competitive inhibitor:</b> a molecule that <b>resembles the substrate</b> and <b>binds to the active site</b>, blocking the real substrate. Competes with substrate for the same binding spot. <b>Can be overcome</b> by adding more substrate (outcompetes the inhibitor). Does NOT permanently damage the enzyme. Example: malonate inhibits succinate dehydrogenase by mimicking succinate."}, {"heading": "Noncompetitive (Allosteric) Inhibition", "body": "<b>Noncompetitive inhibitor:</b> binds to a site <b>OTHER than the active site</b> (allosteric site). Changes the enzyme's <b>overall 3D shape</b> → distorts the active site → substrate can't bind properly. <b>Cannot be overcome</b> by adding more substrate. May be reversible or irreversible. Example: heavy metals (lead, mercury) can act as noncompetitive inhibitors by binding to enzyme and changing its shape."}, {"heading": "Allosteric Regulation", "body": "<b>Allosteric regulation:</b> molecules bind to allosteric sites (NOT the active site) and either <b>activate or inhibit</b> the enzyme. <b>Allosteric activators:</b> stabilize the active form → increase activity. <b>Allosteric inhibitors:</b> stabilize the inactive form → decrease activity. Allows fine-tuning of metabolic pathways. Many allosteric enzymes have <b>quaternary structure</b> (multiple subunits)."}, {"heading": "Feedback Inhibition", "body": "<b>Feedback (end-product) inhibition:</b> the <b>final product</b> of a metabolic pathway <b>inhibits an enzyme early</b> in the pathway. Prevents overproduction. Example: in the pathway A→B→C→D→E, product E inhibits enzyme 1 (which converts A→B). When E accumulates → pathway slows. When E is used up → inhibition is released → pathway resumes. This is a key homeostatic mechanism."}, {"heading": "Cofactors & Coenzymes", "body": "Many enzymes need <b>helper molecules</b> to function. <b>Cofactors:</b> inorganic ions (Zn²⁺, Fe²⁺, Mg²⁺, Cu²⁺) that assist enzyme function. <b>Coenzymes:</b> organic helper molecules, often derived from <b>vitamins</b>. Examples: <b>NAD⁺</b> (from niacin/B3), <b>FAD</b> (from riboflavin/B2), <b>Coenzyme A</b> (from pantothenic acid/B5). Without their cofactor/coenzyme, the enzyme is an <b>apoenzyme</b> (inactive). With it → <b>holoenzyme</b> (active)."}, {"heading": "Enzyme Classification", "body": "Enzymes classified by reaction type: <b>Oxidoreductases:</b> transfer electrons (redox). <b>Transferases:</b> transfer functional groups. <b>Hydrolases:</b> break bonds using water. <b>Lyases:</b> break bonds without water. <b>Isomerases:</b> rearrange atoms within a molecule. <b>Ligases:</b> join molecules using ATP. The suffix tells you the substrate: lipase (lipids), protease (proteins), amylase (starch), nuclease (nucleic acids)."}, {"heading": "Irreversible Inhibition & Poisons", "body": "Some inhibitors bind <b>permanently</b> to enzymes, destroying function. <b>Nerve agents</b> (sarin, VX) irreversibly inhibit <b>acetylcholinesterase</b> → acetylcholine accumulates → muscles can't relax → death. <b>Cyanide</b> inhibits cytochrome c oxidase in mitochondria → stops cellular respiration. <b>Penicillin</b> irreversibly inhibits bacterial enzyme transpeptidase → prevents cell wall synthesis → kills bacteria."}, {"heading": "Enzymes in Medicine & Industry", "body": "<b>Medicine:</b> measuring enzyme levels diagnoses disease (elevated <b>troponin</b> = heart attack; elevated <b>ALT/AST</b> = liver damage). Many drugs are enzyme inhibitors (statins inhibit HMG-CoA reductase → lower cholesterol). <b>Industry:</b> enzymes in laundry detergent (proteases, lipases break stains), food production (rennet in cheese, pectinase in juice clarification), biofuel production."}, {"heading": "Metabolic Pathways", "body": "A <b>metabolic pathway</b> is a series of connected enzymatic reactions where the product of one reaction becomes the substrate for the next: A →(E1)→ B →(E2)→ C →(E3)→ D. Each step is catalyzed by a specific enzyme. Pathways can be <b>linear</b> (glycolysis), <b>circular/cyclic</b> (Krebs cycle), or <b>branched</b>. Regulation typically occurs at the <b>rate-limiting step</b> (slowest step, often the first committed step)."}, {"heading": "Redox Reactions in Metabolism", "body": "<b>Oxidation:</b> loss of electrons (OIL — Oxidation Is Loss). <b>Reduction:</b> gain of electrons (RIG — Reduction Is Gain). Together = <b>redox reaction</b>. In metabolism, electron carriers shuttle electrons: <b>NAD⁺ + 2e⁻ + H⁺ → NADH</b> (reduced, carries energy). <b>FAD + 2e⁻ + 2H⁺ → FADH₂</b>. These carriers deliver electrons to the electron transport chain to make ATP."}, {"heading": "Key Concepts Summary", "body": "<b>Metabolism:</b> anabolism (build, endergonic) + catabolism (break, exergonic). <b>ATP:</b> adenine + ribose + 3 PO₄, −7.3 kcal/mol, recycled 1,000-1,500×/day. <b>Enzymes:</b> lower Eₐ, not consumed, specific (active site), induced fit model. <b>Factors:</b> temp (37°C optimal), pH (varies), substrate/enzyme concentration, Vmax = saturation. <b>Inhibition:</b> competitive (active site, overcome by more substrate), noncompetitive (allosteric site, can't overcome). <b>Feedback inhibition:</b> end-product inhibits early enzyme. <b>Cofactors</b> (ions) and <b>coenzymes</b> (organic, from vitamins). <b>NAD⁺/NADH, FAD/FADH₂:</b> electron carriers."}], "quiz": [{"q": "Metabolism includes:", "a": ["Only anabolism", "Only catabolism", "Both anabolism and catabolism", "Neither"], "c": 2}, {"q": "Anabolism is:", "a": ["Breaking down molecules", "Building complex molecules (requires energy)", "Releasing energy", "Digestion"], "c": 1}, {"q": "Catabolism is:", "a": ["Building molecules", "Breaking down molecules (releases energy)", "Requiring energy", "Protein synthesis"], "c": 1}, {"q": "The 1st Law of Thermodynamics states energy:", "a": ["Can be created", "Cannot be created or destroyed", "Always increases", "Doesn't exist"], "c": 1}, {"q": "The 2nd Law says entropy always:", "a": ["Decreases", "Stays the same", "Increases in the universe", "Reaches zero"], "c": 2}, {"q": "Exergonic reactions have ΔG:", "a": ["Greater than 0", "Less than 0 (release energy)", "Equal to 0", "Undefined"], "c": 1}, {"q": "Endergonic reactions:", "a": ["Release energy", "Require energy input (ΔG > 0)", "Are spontaneous", "Produce heat"], "c": 1}, {"q": "ATP stands for:", "a": ["Adenosine diphosphate", "Adenosine triphosphate", "Amino triphosphate", "Acidic triphosphate"], "c": 1}, {"q": "ATP has ___ phosphate groups:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "ATP hydrolysis releases ___ kcal/mol:", "a": ["1.0", "3.5", "7.3", "14.6"], "c": 2}, {"q": "ATP → ADP + Pᵢ is:", "a": ["Endergonic", "Exergonic (releases energy)", "Neutral", "Impossible"], "c": 1}, {"q": "Energy coupling uses exergonic reactions to drive:", "a": ["More exergonic reactions", "Endergonic reactions", "Nothing", "Only heat"], "c": 1}, {"q": "Phosphorylation means adding ___ to a molecule:", "a": ["A methyl group", "A phosphate group", "An amino group", "A hydroxyl group"], "c": 1}, {"q": "Humans use ~___ kg of ATP per day:", "a": ["1", "10", "45", "100"], "c": 2}, {"q": "Each ATP molecule is recycled ___×/day:", "a": ["10", "100", "1,000-1,500", "1 million"], "c": 2}, {"q": "ATP is mainly regenerated in:", "a": ["Nucleus", "Mitochondria", "Cell membrane", "Ribosome"], "c": 1}, {"q": "Enzymes are mostly:", "a": ["Lipids", "Carbohydrates", "Proteins", "Nucleic acids only"], "c": 2}, {"q": "Ribozymes are enzymes made of:", "a": ["Protein", "RNA", "DNA", "Lipid"], "c": 1}, {"q": "Enzymes ___ activation energy:", "a": ["Raise", "Lower", "Don't affect", "Eliminate completely"], "c": 1}, {"q": "Enzymes change the ___ of a reaction:", "a": ["ΔG", "Equilibrium", "Rate (speed)", "Products"], "c": 2}, {"q": "Activation energy (Eₐ) is:", "a": ["Energy released", "Minimum energy to start a reaction", "Total energy", "Final energy"], "c": 1}, {"q": "The active site is:", "a": ["The whole enzyme", "A specific pocket where substrate binds", "A random area", "The product"], "c": 1}, {"q": "Enzyme + substrate =:", "a": ["Product", "Enzyme-substrate complex", "Nothing", "A new enzyme"], "c": 1}, {"q": "After catalysis, the enzyme is:", "a": ["Destroyed", "Unchanged and reusable", "Permanently altered", "Denatured"], "c": 1}, {"q": "The induced fit model says the active site:", "a": ["Is completely rigid", "Changes shape slightly when substrate binds", "Doesn't exist", "Is random"], "c": 1}, {"q": "The lock-and-key model says the active site is:", "a": ["Flexible", "Rigid and exactly matches substrate", "Random", "Nonexistent"], "c": 1}, {"q": "Which model is more accurate?", "a": ["Lock-and-key", "Induced fit", "Neither", "Both equally"], "c": 1}, {"q": "Enzyme specificity comes from:", "a": ["Random chance", "Precise 3D shape of active site", "Temperature only", "pH only"], "c": 1}, {"q": "Sucrase only breaks down:", "a": ["Lactose", "Maltose", "Sucrose", "Starch"], "c": 2}, {"q": "Optimal temperature for human enzymes:", "a": ["0°C", "25°C", "37°C", "100°C"], "c": 2}, {"q": "Above optimal temperature, enzymes:", "a": ["Work faster forever", "Denature (lose shape)", "Become stronger", "Freeze"], "c": 1}, {"q": "Below optimal temperature, enzyme activity:", "a": ["Increases", "Decreases (fewer collisions)", "Stays same", "Enzyme dies"], "c": 1}, {"q": "Pepsin's optimal pH:", "a": ["2 (very acidic)", "7 (neutral)", "8 (basic)", "12 (very basic)"], "c": 0}, {"q": "Trypsin's optimal pH:", "a": ["2", "5", "8", "12"], "c": 2}, {"q": "pH too far from optimum causes:", "a": ["Activation", "Denaturation", "Nothing", "Faster reactions"], "c": 1}, {"q": "Increasing substrate concentration increases rate until:", "a": ["Infinity", "Vmax (enzyme saturation)", "Enzymes die", "pH changes"], "c": 1}, {"q": "At Vmax, all active sites are:", "a": ["Empty", "Occupied (saturated)", "Destroyed", "Open"], "c": 1}, {"q": "To increase rate past Vmax, add more:", "a": ["Substrate", "Enzyme", "Water", "Heat"], "c": 1}, {"q": "Competitive inhibitors bind to the:", "a": ["Allosteric site", "Active site", "Substrate", "Product"], "c": 1}, {"q": "Competitive inhibitors resemble the:", "a": ["Product", "Enzyme", "Substrate", "Coenzyme"], "c": 2}, {"q": "Competitive inhibition CAN be overcome by:", "a": ["Adding more inhibitor", "Adding more substrate", "Lowering temperature", "Nothing"], "c": 1}, {"q": "Noncompetitive inhibitors bind to:", "a": ["The active site", "An allosteric site (not active site)", "The substrate", "The product"], "c": 1}, {"q": "Noncompetitive inhibition ___ be overcome by adding substrate:", "a": ["Can", "Cannot", "Always can", "Sometimes"], "c": 1}, {"q": "Heavy metals (lead, mercury) act as ___ inhibitors:", "a": ["Competitive", "Noncompetitive", "Neither", "Activators"], "c": 1}, {"q": "Allosteric activators ___ enzyme activity:", "a": ["Decrease", "I molecules:", "a": ["Down their gradient", "Against their concentration gradient", "Nowhere", "Only in"], "c": 1}, {"q": "Muscle contraction is powered by:", "a": ["Lipids", "ATP", "DNA", "RNA"], "c": 1}, {"q": "Biosynthesis (making new molecules) is:", "a": ["Exergonic", "Endergonic (requires energy from ATP)", "Spontaneous", "Free"], "c": 1}, {"q": "The substrate fits into the:", "a": ["Allosteric site", "Active site", "Cell membrane", "Nucleus"], "c": 1}, {"q": "After products are released, the enzyme:", "a": ["Is destroyed", "Returns to its original shape", "Changes permanently", "Becomes a substrate"], "c": 1}, {"q": "Adding salt can denature enzymes by disrupting:", "a": ["Covalent bonds", "Ionic bonds and other weak interactions", "Only peptide bonds", "Nothing"], "c": 1}, {"q": "Heavy metal poisoning works by:", "a": ["Competitive inhibition", "Noncompetitive/irreversible inhibition", "Activation", "Nothing"], "c": 1}, {"q": "Pectinase is used in:", "a": ["Cheese making", "Juice clarification", "Bread baking", "Meat tenderizing"], "c": 1}, {"q": "Enzymes in the body function at ~ pH:", "a": ["1-3", "6-8 (most)", "10-12", "14"], "c": 1}, {"q": "When an enzyme is saturated:", "a": ["Rate = 0", "Rate = Vmax", "Rate increases", "Enzyme breaks"], "c": 1}, {"q": "Allosteric enzymes often have:", "a": ["Only primary structure", "Quaternary structure (multiple subunits)", "No structure", "Only secondary"], "c": 1}, {"q": "Cooperativity means binding of one substrate:", "a": ["Decreases affinity", "Increases affinity of other subunits", "Has no effect", "Stops the enzyme"], "c": 1}, {"q": "NAD⁺ is the ___ form:", "a": ["Reduced", "Oxidized (ready to accept electrons)", "Neutral", "Destroyed"], "c": 1}, {"q": "NADH delivers electrons to make:", "a": ["DNA", "ATP (via electron transport chain)", "Glucose", "Protein"], "c": 1}, {"q": "FADH₂ is the ___ form:", "a": ["Oxidized", "Reduced (carries electrons)", "Empty", "Inactive"], "c": 1}, {"q": "Without cofactors, some enzymes are:", "a": ["Still fully active", "Inactive (apoenzyme)", "More active", "Faster"], "c": 1}, {"q": "Zn²⁺, Fe²⁺, and Mg²⁺ are examples of:", "a": ["Coenzymes", "Cofactors (inorganic ions)", "Substrates", "Products"], "c": 1}, {"q": "Vitamins are important because many become:", "a": ["Enzymes", "Coenzymes", "Substrates", "Inhibitors"], "c": 1}, {"q": "Oxidoreductases catalyze:", "a": ["Hydrolysis", "Electron transfer (redox reactions)", "Group transfer", "Bond joining"], "c": 1}, {"q": "A reaction that is thermodynamically favorable but slow needs:", "a": ["More heat only", "An enzyme (to lower Eₐ)", "Nothing", "Less substrate"], "c": 1}, {"q": "The first committed step of a pathway is often the:", "a": ["Last step", "Rate-limiting step (most regulated)", "Fastest step", "Only step"], "c": 1}, {"q": "Enzyme inhibitors are used as:", "a": ["Only poisons", "Drugs, pesticides, and research tools", "Only in labs", "Never"], "c": 1}, {"q": "Aspirin inhibits:", "a": ["Lipase", "Cyclooxygenase (COX)", "Amylase", "DNA polymerase"], "c": 1}, {"q": "ACE inhibitors treat ___ by inhibiting an enzyme:", "a": ["Diabetes", "High blood pressure", "Cancer", "Depression"], "c": 1}, {"q": "Temperature above 60°C typically:", "a": ["Activates human enzymes", "Denatures most human enzymes", "Has no effect", "Freezes enzymes"], "c": 1}, {"q": "Freezing ___ enzymes but ___ denature them:", "a": ["Denatures / doesn't", "Slows / doesn't", "Destroys / does", "Activates / does"], "c": 1}, {"q": "The product of one enzyme becomes the ___ of the next:", "a": ["Inhibitor", "Substrate", "Coenzyme", "Cofactor"], "c": 1}, {"q": "Enzymes are catalysts, meaning they:", "a": ["Slow reactions", "Speed reactions without being consumed", "Are consumed", "Change equilibrium"], "c": 1}, {"q": "An energy diagram with enzyme shows a ___ Eₐ peak:", "a": ["Higher", "Lower", "Same", "No"], "c": 1}, {"q": "Cellular respiration converts ADP → ATP in the:", "a": ["Nucleus", "Mitochondria", "Ribosome", "Golgi"], "c": 1}, {"q": "ATP powers all EXCEPT:", "a": ["Muscle contraction", "Active transport", "Spontaneous diffusion", "Biosynthesis"], "c": 2}, {"q": "Entropy is a measure of:", "a": ["Order", "Disorder/randomness", "Energy", "Mass"], "c": 1}, {"q": "Free energy available for work ___ in exergonic reactions:", "a": ["Increases", "Decreases (released)", "Stays same", "Disappears"], "c": 1}, {"q": "Catalase breaks down ___ into water and O₂:", "a": ["Glucose", "Hydrogen peroxide (H₂O₂)", "Starch", "Protein"], "c": 1}, {"q": "Catalase is one of the ___ enzymes known:", "a": ["Slowest", "Fastest", "Rarest", "Newest"], "c": 1}, {"q": "pH changes alter charges on ___ groups:", "a": ["Methyl", "R-groups (side chains)", "Phosphate only", "Sugar"], "c": 1}, {"q": "An enzyme with broad specificity catalyzes:", "a": ["Only one substrate", "A small group of related substrates", "Everything", "Nothing"], "c": 1}, {"q": "ATP synthase is the enzyme that makes:", "a": ["DNA", "ATP (from ADP + Pᵢ)", "Glucose", "Protein"], "c": 1}, {"q": "Enzyme activity = 0 when the enzyme is:", "a": ["At optimal conditions", "Completely denatured", "At Vmax", "Saturated"], "c": 1}, {"q": "Irreversible inhibitors form ___ bonds with enzyme:", "a": ["Weak hydrogen", "Strong covalent (permanent)", "No", "Temporary"], "c": 1}]}, {"id": "bio-l5", "title": "Lesson 5: Organelles & Microscopes", "ln": "BIO · L5", "notes": [{"heading": "Cell Theory", "body": "Three principles: <b>1)</b> All living things are made of <b>one or more cells</b>. <b>2)</b> The cell is the <b>basic unit of life</b>. <b>3)</b> All cells arise from <b>pre-existing cells</b> (biogenesis). Contributors: <b>Hooke</b> (1665, named 'cells' from cork), <b>Leeuwenhoek</b> (first saw living cells — 'animalcules'), <b>Schleiden</b> (plants are cells), <b>Schwann</b> (animals are cells), <b>Virchow</b> (cells from cells). Cell theory is one of biology's unifying principles."}, {"heading": "Prokaryotic vs Eukaryotic Cells", "body": "<b>Prokaryotes:</b> NO membrane-bound nucleus or organelles. DNA in a <b>nucleoid region</b>. Have ribosomes, cell membrane, cell wall (most), flagella (some). Include <b>Bacteria and Archaea</b>. Generally smaller (1-10 μm). <b>Eukaryotes:</b> HAVE membrane-bound nucleus and organelles. Include protists, fungi, plants, animals. Generally larger (10-100 μm). Both share: DNA, ribosomes, cell membrane, cytoplasm."}, {"heading": "Why Cells Are Small — Surface Area to Volume", "body": "Cells are microscopic because of the <b>surface area-to-volume ratio (SA:V)</b>. As a cell grows, volume increases <b>faster</b> than surface area (volume ∝ r³, surface area ∝ r²). A large cell can't transport materials in/out fast enough through its membrane. <b>Smaller cells</b> have a higher SA:V → more efficient exchange. This limits cell size and explains why large organisms have many small cells, not a few huge ones."}, {"heading": "Light Microscopy", "body": "<b>Light (compound) microscope:</b> uses visible light and glass lenses. <b>Magnification:</b> typically up to <b>1,000×</b> (ocular 10× × objective 100×). <b>Resolution:</b> ~200 nm (0.2 μm) — can see cells, large organelles (nucleus, chloroplasts). Cannot see ribosomes, membranes, or viruses. Specimens can be living or fixed/stained. <b>Total magnification</b> = ocular × objective."}, {"heading": "Electron Microscopy", "body": "Uses beams of <b>electrons</b> instead of light → much higher resolution. <b>TEM (Transmission EM):</b> electrons pass THROUGH ultra-thin specimen → reveals internal structure (organelles, membranes). Resolution ~0.2 nm. Specimens must be dead (fixed, sectioned, stained with heavy metals). <b>SEM (Scanning EM):</b> electrons bounce OFF surface → 3D surface detail. Resolution ~10 nm. Both much more powerful than light microscopes."}, {"heading": "Staining & Preparation", "body": "Most cells are transparent → need <b>staining</b> to see structures. <b>Simple stains:</b> one dye (methylene blue, crystal violet). <b>Differential stains:</b> distinguish cell types (Gram stain — Gram+ = purple, Gram− = pink). <b>Fluorescence microscopy:</b> fluorescent dyes or GFP (green fluorescent protein) tag specific molecules → glow under UV light. <b>Wet mount:</b> living cells in liquid. <b>Fixed:</b> preserved and sectioned."}, {"heading": "The Nucleus", "body": "<b>Control center</b> of the eukaryotic cell. Contains <b>DNA</b> organized into <b>chromosomes</b> (chromatin when unwound). Surrounded by <b>nuclear envelope</b> (double membrane) with <b>nuclear pores</b> (regulate transport of RNA and proteins). Contains the <b>nucleolus</b> — site of <b>ribosomal RNA (rRNA) synthesis</b> and ribosome assembly. Largest organelle in most cells (~5 μm diameter)."}, {"heading": "Ribosomes", "body": "<b>Sites of protein synthesis</b> (translation). Made of rRNA + protein. Two subunits: large + small. <b>NOT membrane-bound</b> (found in both prokaryotes and eukaryotes). Two locations: <b>Free ribosomes:</b> float in cytoplasm → make proteins used WITHIN the cell. <b>Bound ribosomes:</b> attached to rough ER → make proteins for EXPORT, membranes, or organelles. Prokaryotic ribosomes are <b>70S</b>; eukaryotic are <b>80S</b>."}, {"heading": "Endomembrane System — Overview", "body": "A network of interconnected membranes: <b>nuclear envelope → rough ER → smooth ER → Golgi apparatus → vesicles → cell membrane</b>. Functions together to <b>produce, process, package, and transport</b> proteins and lipids. Membranes can bud off as vesicles and fuse with other compartments. The endomembrane system is unique to <b>eukaryotes</b>."}, {"heading": "Rough Endoplasmic Reticulum (RER)", "body": "Continuous with the nuclear envelope. <b>Studded with ribosomes</b> (gives 'rough' appearance). Functions: <b>synthesis and processing of secretory proteins</b> and membrane proteins. Proteins enter the ER lumen, where they are <b>folded</b> and may receive <b>carbohydrate tags (glycosylation)</b>. Proteins are then packaged in <b>transport vesicles</b> sent to the Golgi."}, {"heading": "Smooth Endoplasmic Reticulum (SER)", "body": "<b>No ribosomes</b> attached. Functions vary by cell type: <b>1) Lipid synthesis</b> (phospholipids, steroids). <b>2) Detoxification</b> of drugs, alcohol, and poisons (abundant in liver cells). <b>3) Carbohydrate metabolism</b>. <b>4) Calcium ion (Ca²⁺) storage</b> (in muscle cells, called <b>sarcoplasmic reticulum</b>). Continuous with the rough ER."}, {"heading": "Golgi Apparatus", "body": "Stack of flattened, membrane-bound sacs (<b>cisternae</b>). Has a <b>cis face</b> (receiving side, near ER) and a <b>trans face</b> (shipping side, near cell membrane). Functions: <b>receives, modifies, sorts, and packages</b> proteins and lipids from the ER. Modifications include: adding/trimming carbohydrates, adding phosphate groups, cleaving proteins. Sends finished products in vesicles to their final destinations."}, {"heading": "Lysosomes", "body": "Membrane-bound vesicles containing <b>digestive (hydrolytic) enzymes</b>. Function: <b>intracellular digestion</b> — break down worn-out organelles (<b>autophagy</b>), food particles, bacteria (after phagocytosis), and debris. Maintain acidic interior (<b>pH ~5</b>) — enzymes work optimally at low pH. If a lysosome ruptures, the acidic enzymes could digest the cell (<b>autolysis</b>). Found mainly in <b>animal cells</b>. Produced by the Golgi."}, {"heading": "Vacuoles", "body": "<b>Central vacuole</b> in plant cells: very large (up to 90% of cell volume). Functions: <b>water storage</b>, <b>turgor pressure</b> (keeps plant rigid), stores pigments (anthocyanins), waste products, and nutrients. <b>Contractile vacuoles</b> in freshwater protists: pump out excess water to prevent lysis. <b>Food vacuoles:</b> formed by phagocytosis, fuse with lysosomes for digestion."}, {"heading": "Mitochondria", "body": "<b>'Powerhouse of the cell'</b> — site of <b>cellular respiration</b> (produces most ATP). Double membrane: <b>outer membrane</b> (smooth) and <b>inner membrane</b> (highly folded into <b>cristae</b> — increases surface area for ATP production). Interior = <b>matrix</b> (contains its own <b>circular DNA</b> and <b>ribosomes</b>). <b>Endosymbiotic theory:</b> mitochondria were once free-living bacteria engulfed by ancestral eukaryotes. Found in nearly all eukaryotic cells. More abundant in high-energy cells (muscle, liver)."}, {"heading": "Chloroplasts", "body": "Found in <b>plant cells and algae</b>. Site of <b>photosynthesis</b>. Double membrane + internal <b>thylakoid</b> membrane system. Thylakoids stacked into <b>grana</b> (singular: granum). Space inside thylakoids = <b>thylakoid lumen</b>. Fluid surrounding thylakoids = <b>stroma</b> (where Calvin cycle occurs). Contains own <b>circular DNA and ribosomes</b>. <b>Endosymbiotic theory:</b> chloroplasts were once photosynthetic cyanobacteria."}, {"heading": "Endosymbiotic Theory", "body": "Proposed by <b>Lynn Margulis</b>. Mitochondria and chloroplasts were once <b>free-living prokaryotes</b> engulfed by a larger cell (<b>endosymbiosis</b>). Evidence: <b>1)</b> Double membrane (inner = original prokaryote, outer = host's vesicle). <b>2)</b> Own circular DNA. <b>3)</b> Own ribosomes (70S, like bacteria). <b>4)</b> Reproduce by binary fission. <b>5)</b> Similar size to bacteria. Widely accepted."}, {"heading": "Cytoskeleton — Overview", "body": "Network of protein fibers throughout the cytoplasm. Three types: <b>microfilaments, intermediate filaments, microtubules</b>. Functions: <b>cell shape, support, movement, cell division, organelle transport</b>. Dynamic — constantly assembled and disassembled. Unique to eukaryotes (prokaryotes have simpler versions)."}, {"heading": "Microfilaments, Intermediate Filaments & Microtubules", "body": "<b>Microfilaments (actin filaments):</b> thinnest (7 nm). Made of <b>actin</b>. Functions: muscle contraction, cell crawling, cytokinesis (cleavage furrow), cell shape. <b>Intermediate filaments:</b> 8-12 nm. Made of various proteins (keratin). Function: mechanical strength, anchor organelles. Most stable. <b>Microtubules:</b> thickest (25 nm). Made of <b>tubulin</b>. Functions: tracks for organelle transport (motor proteins), mitotic spindle, cilia/flagella."}, {"heading": "Centrioles, Cilia & Flagella", "body": "<b>Centrioles:</b> paired cylindrical structures made of microtubules (9+0 arrangement). Found in <b>animal cells</b> (not most plant cells). Help organize the <b>mitotic spindle</b> during cell division. <b>Cilia:</b> short, numerous, wave-like motion (move fluid — e.g., respiratory tract). <b>Flagella:</b> long, few, whip-like motion (move the cell — e.g., sperm). Both contain microtubules in a <b>9+2 arrangement</b>."}, {"heading": "Cell Wall", "body": "Found in <b>plants, fungi, bacteria, archaea</b> — NOT in animal cells. Located outside the cell membrane. <b>Plant cell walls:</b> made of <b>cellulose</b> (rigid, strong). <b>Fungal cell walls:</b> made of <b>chitin</b>. <b>Bacterial cell walls:</b> made of <b>peptidoglycan</b>. Functions: <b>structural support, protection, prevents excessive water uptake</b> (maintains shape). Plant cells have a primary wall and sometimes a thicker secondary wall."}, {"heading": "Extracellular Matrix (ECM)", "body": "Found outside <b>animal cells</b> (animals lack cell walls). Made of <b>glycoproteins</b> (especially <b>collagen</b> — most abundant protein in animals) and <b>proteoglycans</b>. Functions: support, cell adhesion, cell communication, filtering. ECM connects to the cytoskeleton inside the cell through <b>integrins</b> (transmembrane proteins). ECM provides structural framework for tissues."}, {"heading": "Peroxisomes", "body": "Small membrane-bound organelles containing <b>oxidative enzymes</b>. Functions: <b>break down fatty acids</b> (β-oxidation), <b>detoxify harmful substances</b> (alcohol → acetaldehyde in liver), <b>break down hydrogen peroxide (H₂O₂)</b> into water and O₂ using the enzyme <b>catalase</b>. Found in both plant and animal cells. Not part of the endomembrane system — grow by splitting."}, {"heading": "Plant vs Animal Cell Comparison", "body": "<b>Plant cells HAVE but animal cells DON'T:</b> cell wall (cellulose), central vacuole, chloroplasts, plasmodesmata. <b>Animal cells HAVE but plant cells DON'T:</b> centrioles, lysosomes (typically), flagella (rare in plants). <b>Both have:</b> nucleus, mitochondria, ribosomes, ER, Golgi, cell membrane, cytoskeleton, peroxisomes. Plants are typically rectangular; animals are round/irregular."}, {"heading": "Cell Junctions", "body": "<b>Tight junctions:</b> seal cells together forming a <b>waterproof barrier</b> (prevent leaking — e.g., bladder, intestinal lining). <b>Desmosomes:</b> rivet-like anchoring junctions — provide <b>mechanical strength</b> (e.g., skin, heart muscle). <b>Gap junctions:</b> channels between animal cells allowing <b>direct communication</b> (ions, small molecules pass through — e.g., heart muscle coordination). <b>Plasmodesmata:</b> channels through plant cell walls connecting adjacent cells."}, {"heading": "Key Concepts Summary", "body": "<b>Cell theory:</b> all life is cells, basic unit, cells from cells. <b>Prokaryotes:</b> no nucleus (bacteria, archaea). <b>Eukaryotes:</b> membrane-bound nucleus and organelles. <b>SA:V ratio</b> limits cell size. <b>Microscopes:</b> light (1,000×, 200 nm), TEM (internal, 0.2 nm), SEM (surface, 3D). <b>Nucleus:</b> DNA, nucleolus. <b>Ribosomes:</b> protein synthesis. <b>ER:</b> rough (proteins), smooth (lipids/detox). <b>Golgi:</b> modify/sort/ship. <b>Lysosomes:</b> digestion (pH 5). <b>Mitochondria:</b> ATP, cristae, own DNA. <b>Chloroplasts:</b> photosynthesis, thylakoids/grana/stroma, own DNA. <b>Endosymbiotic theory:</b> Margulis. <b>Cytoskeleton:</b> actin (thin), intermediate (strength), tubulin (thick/transport). <b>Cell wall:</b> plants=cellulose, fungi=chitin, bacteria=peptidoglycan."}], "quiz": [{"q": "Cell theory princip
