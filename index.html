se"], "c": 1}, {"q": "Malate in CAM plants is stored in:", "a": ["Chloroplasts", "Vacuoles", "Mitochondria", "Nucleus"], "c": 1}, {"q": "Light-independent reactions still require ___ from light reactions:", "a": ["O₂", "ATP and NADPH", "Water", "CO₂"], "c": 1}, {"q": "Without light, the Calvin cycle:", "a": ["Continues indefinitely", "Stops (no ATP/NADPH supply)", "Speeds up", "Reverses"], "c": 1}, {"q": "Sugar produced by photosynthesis is transported as ___ in plants:", "a": ["Glucose", "Sucrose (in phloem)", "Starch", "Fructose"], "c": 1}, {"q": "Starch is the ___ form of sugar in plants:", "a": ["Transport", "Storage", "Structural", "Signaling"], "c": 1}, {"q": "Most O₂ in Earth's atmosphere comes from:", "a": ["Volcanoes", "Photosynthesis (mostly marine algae/cyanobacteria)", "Lightning", "Decomposition"], "c": 1}, {"q": "The Calvin cycle is named after:", "a": ["John Calvin", "Melvin Calvin", "Calvin Klein", "Calvin Harris"], "c": 1}, {"q": "Chloroplasts have a ___ membrane:", "a": ["Single", "Double", "Triple", "No"], "c": 1}, {"q": "The stroma is analogous to the mitochondrial:", "a": ["Cristae", "Matrix", "Intermembrane space", "Outer membrane"], "c": 1}, {"q": "Thylakoid lumen is analogous to the mitochondrial:", "a": ["Matrix", "Intermembrane space", "Outer membrane", "Cytoplasm"], "c": 1}, {"q": "PSII is numbered II because it was:", "a": ["Discovered second", "Discovered first but acts second in pathway", "Less important", "Larger"], "c": 0}, {"q": "P680 and P700 refer to peak ___ wavelengths:", "a": ["Absorption", "Emission", "Reflection", "Destruction"], "c": 0}, {"q": "Photophosphorylation is ATP synthesis driven by:", "a": ["Substrate", "Light energy (via proton gradient)", "Heat", "Fermentation"], "c": 1}, {"q": "Noncyclic photophosphorylation produces:", "a": ["Only ATP", "ATP + NADPH + O₂", "Only NADPH", "Only O₂"], "c": 1}, {"q": "Cyclic photophosphorylation produces:", "a": ["ATP + NADPH + O₂", "ATP only", "NADPH only", "Glucose"], "c": 1}, {"q": "When would a plant use cyclic electron flow?", "a": ["When it needs more NADPH", "When it needs more ATP than NADPH", "Never", "Always"], "c": 1}, {"q": "Water provides ___ to replace those lost by P680:", "a": ["Protons", "Electrons", "Photons", "ATP"], "c": 1}, {"q": "Oxygen is a ___ of photosynthesis:", "a": ["Reactant", "Byproduct/waste", "Catalyst", "Essential input"], "c": 1}, {"q": "CO₂ enters the leaf through:", "a": ["Roots", "Stomata", "Flowers", "Bark"], "c": 1}, {"q": "The Calvin cycle per 3 CO₂ uses:", "a": ["3 ATP, 3 NADPH", "9 ATP, 6 NADPH", "6 ATP, 3 NADPH", "0 energy"], "c": 1}, {"q": "Net G3P per 3 turns of Calvin cycle:", "a": ["0", "1", "3", "6"], "c": 1}, {"q": "To make 1 glucose (6C), the Calvin cycle needs ___ CO₂:", "a": ["3", "6", "9", "12"], "c": 1}, {"q": "G3P has ___ carbons:", "a": ["2", "3", "5", "6"], "c": 1}, {"q": "Chlorophyll is located in the ___ membrane:", "a": ["Outer", "Thylakoid", "Cell", "Nuclear"], "c": 1}, {"q": "Photosystems contain:", "a": ["Only chlorophyll a", "Antenna/light-harvesting complex + reaction center", "Only carotenoids", "Only proteins"], "c": 1}, {"q": "Antenna pigments funnel light energy to:", "a": ["The stroma", "The reaction center chlorophyll", "The nucleus", "The cytoplasm"], "c": 1}, {"q": "An excited electron has ___ energy:", "a": ["Lower", "Higher", "Same", "No"], "c": 1}, {"q": "Energy from sunlight is ultimately stored in:", "a": ["O₂", "Chemical bonds of glucose", "CO₂", "H₂O"], "c": 1}, {"q": "Photosynthesis provides:", "a": ["Only O₂", "Food (organic molecules) and O₂ for most life", "Only water", "Only minerals"], "c": 1}, {"q": "Chemoautotrophs get energy from:", "a": ["Light", "Chemical reactions (not light)", "Organic molecules", "Other organisms"], "c": 1}, {"q": "Photoautotrophs get energy from:", "a": ["Chemicals", "Light", "Other organisms", "Heat"], "c": 1}, {"q": "Plants carry out both photosynthesis and:", "a": ["Only photosynthesis", "Cellular respiration", "Only fermentation", "Neither"], "c": 1}, {"q": "At night, plants:", "a": ["Photosynthesize", "Only respire (no light)", "Do nothing", "Die"], "c": 1}, {"q": "The compensation point is when photosynthesis rate equals:", "a": ["Zero", "Respiration rate", "Maximum", "Double"], "c": 1}, {"q": "Above the compensation point, net O₂ is:", "a": ["Consumed", "Released (photosynthesis > respiration)", "Zero", "Negative"], "c": 1}, {"q": "Chloroplasts are most abundant in:", "a": ["Root cells", "Mesophyll cells of leaves", "Flower cells", "Bark"], "c": 1}, {"q": "Variegated leaves have white parts because:", "a": ["They have extra chlorophyll", "Those cells lack chloroplasts", "They're dead", "They have too much light"], "c": 1}, {"q": "Engelmann's experiment with algae and bacteria showed:", "a": ["Nothing", "Most photosynthesis occurs with red and blue light", "Green light is best", "UV is required"], "c": 1}, {"q": "Paper chromatography separates pigments by:", "a": ["Size only", "Solubility/polarity", "Color", "Weight"], "c": 1}, {"q": "In chromatography, the most soluble pigment travels:", "a": ["Least", "Farthest", "Not at all", "To the bottom"], "c": 1}, {"q": "Carotenoids are more ___ than chlorophyll:", "a": ["Polar", "Nonpolar/soluble in solvent (travel farther)", "Heavy", "Green"], "c": 1}, {"q": "Xanthophylls are ___ pigments:", "a": ["Green", "Yellow", "Red", "Blue"], "c": 1}, {"q": "Anthocyanins give leaves ___ colors in fall:", "a": ["Green", "Red/purple", "Yellow only", "Brown only"], "c": 1}, {"q": "Water-splitting complex (OEC) contains:", "a": ["Iron", "Manganese (Mn)", "Copper", "Zinc"], "c": 1}, {"q": "Herbicides like DCMU block:", "a": ["Calvin cycle", "Electron flow from PSII", "Stomata", "Root absorption"], "c": 1}, {"q": "If PSII is blocked, ___ stops being produced:", "a": ["CO₂", "O₂ (no water splitting)", "Glucose", "Starch"], "c": 1}, {"q": "Rubisco's oxygenase activity is a 'design flaw' because:", "a": ["It's helpful", "It wastes energy (photorespiration)", "It makes glucose", "It fixes CO₂"], "c": 1}, {"q": "C4 plants are more efficient in ___ climates:", "a": ["Cold, wet", "Hot, bright", "Dark", "Arctic"], "c": 1}, {"q": "C3 plants dominate in ___ climates:", "a": ["Hot, dry", "Cool, moist (moderate)", "Desert", "Tropical only"], "c": 1}, {"q": "Most crop plants worldwide are:", "a": ["C4", "CAM", "C3", "All equal"], "c": 2}, {"q": "Sucrose is transported in plant:", "a": ["Xylem", "Phloem", "Both equally", "Neither"], "c": 1}, {"q": "Water is transported in plant:", "a": ["Phloem", "Xylem", "Both equally", "Neither"], "c": 1}, {"q": "Chloroplast DNA is ___ like bacterial DNA:", "a": ["Linear", "Circular", "Square", "None"], "c": 1}, {"q": "Chloroplast ribosomes are ___ like bacterial:", "a": ["80S", "70S", "60S", "90S"], "c": 1}, {"q": "Light energy excites electrons to ___ energy levels:", "a": ["Lower", "Higher", "Same", "Zero"], "c": 1}, {"q": "Without NADPH, the Calvin cycle cannot perform:", "a": ["Fixation", "Reduction (3-PGA → G3P)", "Regeneration", "Any step"], "c": 1}, {"q": "Without ATP, the Calvin cycle cannot perform:", "a": ["Only fixation", "Reduction AND regeneration", "Only regeneration", "It works fine"], "c": 1}, {"q": "The products of photosynthesis feed into:", "a": ["Nothing", "Cellular respiration (and all food chains)", "Only fermentation", "Only decomposition"], "c": 1}]}, {"id": "bio-l9", "title": "Lesson 9: Mendelian Inheritance", "ln": "BIO · L9", "notes": [{"heading": "Gregor Mendel — Father of Genetics", "body": "<b>Gregor Mendel</b> (1822-1884), Austrian monk, studied inheritance in <b>pea plants (Pisum sativum)</b> in the 1860s. Chose peas because: short generation time, easy to grow, many observable traits, could control mating (self- or cross-pollination). Studied 7 traits (seed shape, color, flower color, etc.). His work was ignored until ~1900. Established the foundations of modern genetics."}, {"heading": "Key Genetics Vocabulary", "body": "<b>Gene:</b> unit of heredity; segment of DNA coding for a trait. <b>Allele:</b> different versions of a gene (e.g., tall vs short). <b>Locus:</b> specific location of a gene on a chromosome. <b>Genotype:</b> genetic makeup (allele combination — e.g., Tt). <b>Phenotype:</b> physical expression/appearance (e.g., tall). <b>Homozygous:</b> two identical alleles (TT or tt). <b>Heterozygous:</b> two different alleles (Tt). <b>Dominant:</b> allele expressed in heterozygote (T). <b>Recessive:</b> only expressed when homozygous (tt)."}, {"heading": "Mendel's Crosses — P, F1, F2", "body": "<b>P generation:</b> parental (true-breeding). <b>F1 generation:</b> first filial (offspring of P). <b>F2 generation:</b> second filial (offspring of F1×F1). Mendel crossed true-breeding tall (TT) × short (tt): <b>F1 = all tall (Tt)</b>. F1 × F1: <b>F2 = 3 tall : 1 short (3:1 ratio)</b>. The 'disappeared' short trait reappeared in F2 → Mendel realized traits are carried by discrete 'factors' (alleles), not blended."}, {"heading": "Law of Segregation", "body": "<b>Mendel's 1st Law:</b> each organism has <b>two alleles</b> for each trait. During gamete formation (<b>meiosis</b>), alleles <b>segregate</b> (separate) so each gamete gets only <b>one allele</b>. At fertilization, offspring receive one allele from each parent → restoring the pair. Example: Tt parent produces gametes with T or t (50/50 chance). This explains the 3:1 ratio in F2."}, {"heading": "Law of Independent Assortment", "body": "<b>Mendel's 2nd Law:</b> alleles of <b>different genes</b> assort <b>independently</b> during gamete formation — the inheritance of one trait doesn't affect another. Only true for genes on <b>different chromosomes</b> (or far apart on same chromosome). Dihybrid cross (TtRr × TtRr) → <b>9:3:3:1 phenotypic ratio</b>. 4 phenotype classes."}, {"heading": "Punnett Squares — Monohybrid", "body": "A <b>Punnett square</b> predicts offspring genotype/phenotype ratios. <b>Monohybrid cross</b> (one trait): Tt × Tt → <b>genotype: 1 TT : 2 Tt : 1 tt (1:2:1)</b>. <b>Phenotype: 3 tall : 1 short (3:1)</b>. Steps: write parent gametes on top/side, fill in boxes by combining alleles. Dominant allele written first (uppercase)."}, {"heading": "Punnett Squares — Dihybrid", "body": "<b>Dihybrid cross</b> (two traits): TtRr × TtRr → 4×4 grid (16 boxes). Each parent produces 4 gamete types (TR, Tr, tR, tr). Phenotypic ratio: <b>9:3:3:1</b> (9 both dominant : 3 first dominant/second recessive : 3 first recessive/second dominant : 1 both recessive). Genotypic ratios are more complex (9 different genotypes)."}, {"heading": "Test Cross", "body": "A <b>test cross</b> determines the <b>genotype of a dominant phenotype</b> individual. Cross the unknown with a <b>homozygous recessive (tt)</b>. If ALL offspring are dominant → unknown is <b>TT</b>. If ~50% dominant and ~50% recessive → unknown is <b>Tt</b>. The recessive parent can only contribute recessive alleles, so offspring phenotype reveals the unknown parent's genotype."}, {"heading": "Incomplete Dominance", "body": "Neither allele is fully dominant. <b>Heterozygote shows an intermediate (blended) phenotype.</b> Example: red (RR) × white (WW) snapdragons → <b>F1 = all pink (RW)</b>. F1 × F1: <b>1 red : 2 pink : 1 white (1:2:1)</b>. Phenotypic and genotypic ratios are the <b>same</b> (1:2:1) because heterozygote is visibly different. NOT blending inheritance — alleles remain distinct."}, {"heading": "Codominance", "body": "<b>Both alleles are fully expressed</b> simultaneously in the heterozygote. Neither is dominant or recessive — both are visible. Example: <b>blood type</b> — Iᴬ and Iᴮ are codominant. Iᴬ Iᴮ genotype → <b>type AB blood</b> (both A and B antigens present). Roan cattle: red (RR) × white (WW) → roan (RW) with both red AND white hairs (not blended pink). Different from incomplete dominance."}, {"heading": "Multiple Alleles — Blood Type", "body": "Some genes have <b>more than 2 alleles</b> in the population (but each individual still has only 2). <b>ABO blood type:</b> 3 alleles — <b>Iᴬ, Iᴮ, i</b>. Iᴬ and Iᴮ are <b>codominant</b>; both are <b>dominant over i</b>. Genotypes: Iᴬ Iᴬ or Iᴬi = type A. Iᴮ Iᴮ or Iᴮi = type B. Iᴬ Iᴮ = type AB. ii = type O. 6 genotypes → 4 phenotypes."}, {"heading": "Pleiotropy", "body": "<b>One gene affects multiple phenotypic traits.</b> Example: <b>sickle cell anemia</b> — single mutation in hemoglobin gene causes: sickle-shaped RBCs, anemia, pain crises, organ damage, resistance to malaria. <b>Marfan syndrome:</b> one gene (fibrillin-1) affects heart, eyes, skeleton, lungs. <b>PKU:</b> one enzyme deficiency → intellectual disability, light skin/hair, seizures."}, {"heading": "Epistasis", "body": "<b>One gene affects the expression of another gene.</b> Example: Labrador coat color. Gene E (pigment deposition) is epistatic to gene B (black vs brown). ee genotype → <b>yellow coat</b> regardless of B genotype (pigment not deposited). EE or Ee + BB or Bb → black. EE or Ee + bb → chocolate. Modifies the expected 9:3:3:1 ratio to <b>9:3:4</b> or other modified ratios."}, {"heading": "Polygenic Inheritance", "body": "<b>Multiple genes contribute to one trait.</b> Results in <b>continuous variation</b> (bell curve distribution). Examples: <b>skin color</b> (at least 3+ genes), <b>height</b>, <b>eye color</b>, <b>weight</b>, <b>intelligence</b>. Many possible phenotypes, not just 2-3. Environment also plays a role. Opposite of pleiotropy (one gene → many traits). Here: many genes → one trait."}, {"heading": "Sex-Linked Inheritance", "body": "Genes on <b>sex chromosomes</b> (usually X). <b>X-linked recessive:</b> affects males more (males have only one X — no second allele to mask). Carrier females (Xᴬ Xᵃ) are unaffected but can pass to sons. Examples: <b>color blindness, hemophilia, Duchenne muscular dystrophy</b>. Affected fathers pass the allele to ALL daughters (carriers) but NO sons. <b>Y-linked traits</b> are rare (few genes on Y)."}, {"heading": "Pedigree Analysis", "body": "A <b>pedigree</b> is a family tree showing inheritance of a trait. <b>Squares:</b> males. <b>Circles:</b> females. <b>Filled/shaded:</b> affected. <b>Half-filled:</b> carrier. <b>Horizontal line:</b> mating. <b>Vertical line:</b> offspring. Used to determine: dominant vs recessive, autosomal vs sex-linked, genotypes of family members. <b>Autosomal recessive:</b> skips generations, appears equally in both sexes. <b>Autosomal dominant:</b> every generation, affected parent required."}, {"heading": "Linked Genes & Recombination", "body": "Genes on the <b>same chromosome</b> tend to be inherited together = <b>linked genes</b>. They violate the law of independent assortment. <b>Crossing over</b> during meiosis can separate linked genes → <b>recombinant offspring</b>. The farther apart genes are on a chromosome, the more likely crossing over occurs between them. <b>Genetic map (linkage map):</b> shows relative gene positions based on recombination frequency. 1% recombination = <b>1 centimorgan (cM)</b>."}, {"heading": "Chi-Square Test", "body": "Statistical test to determine if observed results differ significantly from <b>expected ratios</b>. <b>χ² = Σ (observed − expected)² / expected</b>. Compare χ² to critical value from a table using <b>degrees of freedom (df = categories − 1)</b> and a <b>p-value (usually 0.05)</b>. If χ² > critical value → reject null hypothesis (results DON'T fit expected ratio). If χ² < critical value → fail to reject (results fit)."}, {"heading": "Environmental Effects on Phenotype", "body": "<b>Phenotype = genotype + environment.</b> Genes set the <b>range of possibilities</b>; environment determines where within that range the phenotype falls. Examples: identical twins raised apart may differ in height/weight. <b>Hydrangea</b> flower color depends on soil pH (same genotype, different phenotype). <b>Siamese cats:</b> darker fur on cooler extremities (temperature-sensitive enzyme). <b>Norm of reaction:</b> range of phenotypes a genotype can produce."}, {"heading": "Key Concepts Summary", "body": "<b>Mendel's Laws:</b> Segregation (alleles separate in meiosis), Independent Assortment (different genes sort independently). <b>Monohybrid 3:1, Dihybrid 9:3:3:1.</b> <b>Test cross:</b> unknown × homozygous recessive. <b>Incomplete dominance:</b> blend (1:2:1). <b>Codominance:</b> both expressed (AB blood). <b>Multiple alleles:</b> ABO (Iᴬ, Iᴮ, i). <b>Pleiotropy:</b> 1 gene → many traits. <b>Epistasis:</b> 1 gene controls another. <b>Polygenic:</b> many genes → 1 trait. <b>Sex-linked:</b> X-linked recessive affects males more. <b>Chi-square</b> tests fit to expected ratios."}], "quiz": [{"q": "Mendel studied inheritance in:", "a": ["Fruit flies", "Pea plants (Pisum sativum)", "Mice", "Bacteria"], "c": 1}, {"q": "An allele is:", "a": ["A whole chromosome", "A different version of a gene", "A protein", "An organism"], "c": 1}, {"q": "Genotype refers to:", "a": ["Physical appearance", "Genetic makeup (allele combination)", "Only dominant traits", "Only recessive traits"], "c": 1}, {"q": "Phenotype refers to:", "a": ["Genetic makeup", "Physical expression/appearance", "DNA sequence", "Chromosome number"], "c": 1}, {"q": "Homozygous means:", "a": ["Two different alleles", "Two identical alleles", "No alleles", "Three alleles"], "c": 1}, {"q": "Heterozygous means:", "a": ["Two identical alleles", "Two different alleles", "Only one allele", "No alleles"], "c": 1}, {"q": "Dominant alleles are expressed in:", "a": ["Only homozygous", "Heterozygous AND homozygous", "Only recessive", "Never"], "c": 1}, {"q": "Recessive alleles are expressed only when:", "a": ["Heterozygous", "Homozygous recessive", "Always", "Dominant is present"], "c": 1}, {"q": "F1 generation is offspring of:", "a": ["F2 × F2", "P (parental) generation", "F1 × F2", "Random"], "c": 1}, {"q": "Mendel's F2 ratio for monohybrid cross:", "a": ["1:1", "1:2:1", "3:1", "9:3:3:1"], "c": 2}, {"q": "Law of Segregation states alleles ___ during meiosis:", "a": ["Stay together", "Separate (segregate)", "Duplicate", "Mutate"], "c": 1}, {"q": "Each gamete receives ___ allele(s) per gene:", "a": ["0", "1", "2", "4"], "c": 1}, {"q": "Law of Independent Assortment applies to genes on:", "a": ["Same chromosome", "Different chromosomes", "Only X chromosome", "No chromosomes"], "c": 1}, {"q": "Dihybrid cross phenotypic ratio:", "a": ["3:1", "1:2:1", "9:3:3:1", "1:1:1:1"], "c": 2}, {"q": "Tt × Tt genotypic ratio:", "a": ["3:1", "1:2:1 (1TT:2Tt:1tt)", "9:3:3:1", "All Tt"], "c": 1}, {"q": "Tt × Tt phenotypic ratio (complete dominance):", "a": ["1:2:1", "3:1 (3 dominant:1 recessive)", "9:3:3:1", "1:1"], "c": 1}, {"q": "A test cross uses a ___ individual:", "a": ["Heterozygous", "Homozygous recessive", "Homozygous dominant", "Unknown"], "c": 1}, {"q": "If test cross produces ALL dominant offspring, unknown is:", "a": ["Tt", "TT (homozygous dominant)", "tt", "Unknown still"], "c": 1}, {"q": "If test cross produces ~50:50, unknown is:", "a": ["TT", "Tt (heterozygous)", "tt", "Neither"], "c": 1}, {"q": "Incomplete dominance F1 phenotype:", "a": ["Same as dominant parent", "Intermediate (blended)", "Same as recessive", "Unrelated"], "c": 1}, {"q": "Incomplete dominance example:", "a": ["Pea plant height", "Red × white snapdragon → pink", "Blood type", "Freckles"], "c": 1}, {"q": "Incomplete dominance F2 ratio:", "a": ["3:1", "1:2:1 (phenotypic = genotypic)", "9:3:3:1", "1:1"], "c": 1}, {"q": "In codominance, the heterozygote shows:", "a": ["Blend of traits", "Both alleles fully expressed", "Only dominant", "Only recessive"], "c": 1}, {"q": "Blood type AB is an example of:", "a": ["Incomplete dominance", "Codominance (both A and B expressed)", "Complete dominance", "Epistasis"], "c": 1}, {"q": "ABO blood has ___ alleles in the population:", "a": ["2", "3 (Iᴬ, Iᴮ, i)", "4", "6"], "c": 1}, {"q": "Type O blood genotype:", "a": ["Iᴬ Iᴬ", "Iᴮ Iᴮ", "ii", "Iᴬ Iᴮ"], "c": 2}, {"q": "Type AB genotype:", "a": ["ii", "Iᴬ i", "Iᴬ Iᴮ", "Iᴮ i"], "c": 2}, {"q": "Iᴬ and Iᴮ are ___ to each other:", "a": ["Recessive", "Codominant", "Incompletely dominant", "Epistatic"], "c": 1}, {"q": "Both Iᴬ and Iᴮ are dominant over:", "a": ["Each other", "i (recessive)", "Nothing", "Everything"], "c": 1}, {"q": "Pleiotropy means:", "a": ["Many genes → 1 trait", "1 gene → many traits", "No genes involved", "Only in plants"], "c": 1}, {"q": "Sickle cell anemia is an example of:", "a": ["Polygenic inheritance", "Pleiotropy (1 gene → many effects)", "Codominance only", "Epistasis"], "c": 1}, {"q": "Epistasis means:", "a": ["1 gene → many traits", "1 gene controls expression of another gene", "Many genes → 1 trait", "No gene interaction"], "c": 1}, {"q": "Labrador coat color involves:", "a": ["Only 1 gene", "Epistasis (gene E affects gene B)", "Incomplete dominance", "Only environment"], "c": 1}, {"q": "ee Labradors are always:", "a": ["Black", "Chocolate", "Yellow (regardless of B genotype)", "White"], "c": 2}, {"q": "Polygenic inheritance results in:", "a": ["Two phenotypes", "Continuous variation (bell curve)", "Only dominant/recessive", "No variation"], "c": 1}, {"q": "Skin color is an example of:", "a": ["Simple dominance", "Polygenic inheritance (3+ genes)", "Epistasis", "Sex-linkage"], "c": 1}, {"q": "Height is determined by:", "a": ["One gene", "Multiple genes + environment (polygenic)", "Only environment", "Only one allele"], "c": 1}, {"q": "X-linked recessive traits affect ___ more:", "a": ["Females", "Males (only 1 X, no backup allele)", "Both equally", "Neither"], "c": 1}, {"q": "Color blindness is:", "a": ["Autosomal dominant", "X-linked recessive", "Y-linked", "Autosomal recessive"], "c": 1}, {"q": "Hemophilia is:", "a": ["Autosomal", "X-linked recessive", "Y-linked", "Codominant"], "c": 1}, {"q": "A carrier female for hemophilia is:", "a": ["Affected", "Unaffected but can pass to sons (Xᴴ Xʰ)", "Always symptomatic", "Homozygous"], "c": 1}, {"q": "An affected father passes X-linked allele to:", "a": ["All sons", "All daughters (carriers)", "No children", "Only affected children"], "c": 1}, {"q": "In a pedigree, squares represent:", "a": ["Females", "Males", "Both", "Neither"], "c": 1}, {"q": "In a pedigree, circles represent:", "a": ["Males", "Females", "Both", "Neither"], "c": 1}, {"q": "Filled/shaded symbols mean:", "a": ["Carrier", "Affected individual", "Unaffected", "Dead"], "c": 1}, {"q": "Autosomal recessive traits:", "a": ["Appear every generation", "Skip generations, equal in both sexes", "Only affect males", "Only affect females"], "c": 1}, {"q": "Autosomal dominant traits:", "a": ["Skip generations", "Appear every generation, affected parent needed", "Only affect males", "Are always lethal"], "c": 1}, {"q": "Linked genes are on the:", "a": ["Different chromosomes", "Same chromosome", "No chromosome", "Only Y"], "c": 1}, {"q": "Linked genes violate the law of:", "a": ["Segregation", "Independent Assortment", "Dominance", "All laws"], "c": 1}, {"q": "Crossing over during meiosis creates:", "a": ["Identical chromosomes", "Recombinant offspring", "Mutations only", "Nothing"], "c": 1}, {"q": "1% recombination frequency = 1:", "a": ["Kilobase", "Centimorgan (cM)", "Megabase", "Percent"], "c": 1}, {"q": "Genes farther apart on a chromosome have ___ recombination:", "a": ["Less", "More", "No", "Same"], "c": 1}, {"q": "Chi-square (χ²) tests whether observed data fit:", "a": ["No pattern", "Expected ratios", "Only 1:1", "Only 9:3:3:1"], "c": 1}, {"q": "χ² formula: Σ (observed − expected)² ÷:", "a": ["Observed", "Expected", "Total", "Degrees of freedom"], "c": 1}, {"q": "Degrees of freedom = categories minus:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "If χ² > critical value:", "a": ["Accept null", "Reject null (data don't fit expected)", "Experiment failed", "No conclusion"], "c": 1}, {"q": "If χ² < critical value:", "a": ["Reject null", "Fail to reject null (data fit expected)", "Experiment failed", "Start over"], "c": 1}, {"q": "P-value of 0.05 means ___% chance results are due to chance:", "a": ["0.5", "5", "50", "95"] ract them", "Divide them"], "c": 1}, {"q": "Probability Tt × Tt → child with at least one T allele:", "a": ["1/4", "1/2", "3/4 (75%)", "1"], "c": 2}, {"q": "In a cross Tt × Tt, each offspring's genotype is:", "a": ["Determined by previous offspring", "Independent of other offspring", "Always the same", "Predictable exactly"], "c": 1}, {"q": "Monohybrid testcross ratio (Tt × tt):", "a": ["3:1", "1:1", "9:3:3:1", "1:2:1"], "c": 1}, {"q": "Dihybrid testcross (TtRr × ttrr) ratio:", "a": ["9:3:3:1", "1:1:1:1", "3:1", "1:2:1"], "c": 1}, {"q": "Mendel's particulate hypothesis states hereditary units:", "a": ["Blend and disappear", "Remain discrete particles through generations", "Are only in males", "Don't exist"], "c": 1}, {"q": "Alleles reside on ___ chromosomes:", "a": ["Only sex", "Homologous", "Only autosomal", "No"], "c": 1}, {"q": "Humans have ___ pairs of autosomes:", "a": ["22", "23", "44", "46"], "c": 0}, {"q": "Humans have ___ pair(s) of sex chromosomes:", "a": ["0", "1", "2", "22"], "c": 1}, {"q": "Female sex chromosomes:", "a": ["XY", "XX", "XO", "YY"], "c": 1}, {"q": "Male sex chromosomes:", "a": ["XX", "XY", "YY", "XO"], "c": 1}, {"q": "X-linked traits pass from carrier mothers to ___ of sons:", "a": ["0%", "25%", "50%", "100%"], "c": 2}, {"q": "If both parents are carriers (Aa × Aa), chance of affected child:", "a": ["0%", "25%", "50%", "75%"], "c": 1}, {"q": "Two carrier parents: chance of carrier child:", "a": ["25%", "50%", "75%", "100%"], "c": 1}, {"q": "Two carrier parents: chance of homozygous dominant child:", "a": ["25%", "50%", "75%", "0%"], "c": 0}, {"q": "Cystic fibrosis is:", "a": ["X-linked dominant", "Autosomal recessive", "Autosomal dominant", "Y-linked"], "c": 1}, {"q": "Huntington's disease is:", "a": ["Autosomal recessive", "X-linked", "Autosomal dominant", "Y-linked"], "c": 2}, {"q": "Autosomal dominant disorders need ___ copy of mutant allele:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "Autosomal recessive disorders need ___ copies of mutant allele:", "a": ["0", "1", "2", "3"], "c": 2}, {"q": "Genetic counselors use ___ to assess risk:", "a": ["X-rays", "Pedigree analysis + probability", "Only blood tests", "Only imaging"], "c": 1}, {"q": "Tay-Sachs disease is:", "a": ["Autosomal dominant", "Autosomal recessive", "X-linked", "Y-linked"], "c": 1}, {"q": "Amniocentesis can detect:", "a": ["Only sex", "Chromosomal abnormalities (prenatal genetic testing)", "Only blood type", "Only height"], "c": 1}, {"q": "A 9:3:3:1 ratio indicates:", "a": ["Monohybrid, complete dominance", "Dihybrid, independent assortment, complete dominance", "Epistasis", "Incomplete dominance"], "c": 1}, {"q": "A 1:2:1 phenotypic ratio indicates:", "a": ["Complete dominance", "Incomplete dominance or codominance", "Epistasis", "Sex-linkage"], "c": 1}, {"q": "A 1:1 ratio indicates:", "a": ["Dihybrid cross", "Testcross (heterozygous × homozygous recessive)", "Incomplete dominance", "Epistasis"], "c": 1}, {"q": "Modifier genes:", "a": ["Have no effect", "Alter the expression of other genes", "Replace genes", "Delete genes"], "c": 1}, {"q": "Penetrance refers to:", "a": ["How far a gene enters", "Percentage of individuals with genotype who show phenotype", "Gene location", "Allele dominance"], "c": 1}, {"q": "Expressivity refers to:", "a": ["How loudly a gene is expressed", "Degree to which a phenotype is expressed", "Gene location", "Penetrance"], "c": 1}, {"q": "Variable expressivity means:", "a": ["All individuals look the same", "Same genotype can produce different degrees of phenotype", "No expression", "Only full expression"], "c": 1}, {"q": "Complete penetrance means ___ of individuals with genotype show phenotype:", "a": ["0%", "50%", "100%", "Variable"], "c": 2}, {"q": "Reduced penetrance means:", "a": ["100% express", "Not all individuals with genotype show phenotype", "No one expresses", "Gene is deleted"], "c": 1}, {"q": "Barr bodies are:", "a": ["Active X chromosomes", "Inactivated X chromosomes in females", "Y chromosomes", "Autosomes"], "c": 1}, {"q": "X-inactivation (Lyon hypothesis) occurs in:", "a": ["Males", "Females (one X silenced per cell)", "Both", "Neither"], "c": 1}, {"q": "Calico cats demonstrate:", "a": ["Y-linkage", "X-inactivation (random patches of color)", "Autosomal dominance", "Codominance only"], "c": 1}, {"q": "Thomas Hunt Morgan used ___ to study genetics:", "a": ["Peas", "Fruit flies (Drosophila melanogaster)", "Mice", "Bacteria"], "c": 1}, {"q": "Morgan discovered:", "a": ["Mendel's laws", "Sex-linkage and gene linkage", "DNA structure", "RNA"], "c": 1}, {"q": "Lethal alleles cause ___ when homozygous:", "a": ["No effect", "Death (often embryonic)", "Extra growth", "Only in adults"], "c": 1}, {"q": "Yellow mice (Aʸ) demonstrate lethal alleles because:", "a": ["All are yellow", "AʸAʸ embryos die (homozygous lethal)", "Only females die", "No mice die"], "c": 1}, {"q": "Modified 9:3:3:1 ratio of 9:7 indicates:", "a": ["No modification", "Complementary gene interaction (epistasis)", "Simple dominance", "Incomplete dominance"], "c": 1}, {"q": "Modified 9:3:3:1 ratio of 12:3:1 indicates:", "a": ["Incomplete dominance", "Dominant epistasis", "Codominance", "No epistasis"], "c": 1}, {"q": "Reciprocal crosses give DIFFERENT results when inheritance is:", "a": ["Autosomal", "Sex-linked (X-linked)", "Always the same", "Never different"], "c": 1}, {"q": "In X-linked inheritance, affected father × carrier mother:", "a": ["No affected children", "50% of daughters affected, 50% of sons affected", "All children affected", "Only sons affected"], "c": 1}, {"q": "Tightly linked genes have ___ recombination frequency:", "a": ["50%", "High", "Low (close together)", "100%"], "c": 2}, {"q": "Genes showing 50% recombination behave as if:", "a": ["Tightly linked", "Unlinked (on different chromosomes)", "Identical", "Deleted"], "c": 1}, {"q": "Mendel was lucky his 7 traits were on ___ different chromosomes:", "a": ["1", "3", "5", "7 (or far apart, so they assorted independently)"], "c": 3}, {"q": "The law of segregation is explained by separation of ___ during meiosis:", "a": ["Sister chromatids", "Homologous chromosomes (Anaphase I)", "Only autosomes", "Only X chromosomes"], "c": 1}]}, {"id": "bio-l10", "title": "Lesson 10: Mitosis & Meiosis", "ln": "BIO · L10", "notes": [{"heading": "Why Cells Divide", "body": "Cell division is essential for: <b>1) Growth</b> (single cell → trillions). <b>2) Repair</b> (replace damaged/dead cells — skin, blood). <b>3) Reproduction</b> (asexual: 1 parent; sexual: 2 parents). Two types: <b>Mitosis</b> (growth/repair — produces identical cells) and <b>Meiosis</b> (produces gametes — eggs and sperm with half the chromosomes). Both require prior <b>DNA replication</b>."}, {"heading": "Chromosome Structure", "body": "<b>Chromatin:</b> loose DNA + histone proteins during interphase. <b>Chromosome:</b> condensed, visible chromatin during division. Each chromosome is one long DNA molecule. <b>Sister chromatids:</b> two identical copies of a chromosome joined at the <b>centromere</b> (formed after DNA replication). <b>Kinetochore:</b> protein complex at centromere where spindle fibers attach. <b>Homologous chromosomes (homologs):</b> matching chromosome pair (one from each parent) — same genes, potentially different alleles."}, {"heading": "Chromosome Numbers", "body": "<b>Diploid (2n):</b> two sets of chromosomes (one from each parent). Humans: <b>2n = 46</b> (23 pairs). All somatic (body) cells are diploid. <b>Haploid (n):</b> one set of chromosomes. Humans: <b>n = 23</b>. Only gametes (sperm/egg) are haploid. <b>Autosomes:</b> 22 pairs (non-sex). <b>Sex chromosomes:</b> 1 pair (XX female, XY male). Fertilization: n + n → 2n (restores diploid)."}, {"heading": "The Cell Cycle — Overview", "body": "Ordered sequence: <b>Interphase → M phase (mitosis + cytokinesis)</b>. <b>Interphase</b> (~90% of cell cycle): <b>G₁</b> (growth, organelle production), <b>S</b> (DNA synthesis/replication), <b>G₂</b> (growth, prep for division). <b>M phase</b> (~10%): <b>Mitosis</b> (nuclear division into 2 identical nuclei) + <b>Cytokinesis</b> (cytoplasm division → 2 daughter cells). Some cells exit to <b>G₀</b> (non-dividing state — neurons, muscle)."}, {"heading": "Interphase in Detail", "body": "<b>G₁ (Gap 1):</b> cell grows, produces proteins/organelles, carries out normal functions. Longest phase for most cells. <b>G₁ checkpoint:</b> cell checks if conditions are favorable before committing to DNA replication. <b>S (Synthesis):</b> DNA replication → each chromosome now has 2 sister chromatids. Centrosome also duplicates. <b>G₂ (Gap 2):</b> continued growth, produces proteins needed for mitosis, checks for DNA replication errors (<b>G₂ checkpoint</b>)."}, {"heading": "Mitosis — Prophase", "body": "<b>Chromatin condenses</b> into visible chromosomes (each = 2 sister chromatids joined at centromere). <b>Nucleolus disappears.</b> <b>Mitotic spindle forms</b> from centrosomes (centrioles in animals). Centrosomes move to opposite poles. In late prophase (<b>prometaphase</b>): <b>nuclear envelope breaks down</b>. Spindle fibers (microtubules) attach to <b>kinetochores</b> at centromeres."}, {"heading": "Mitosis — Metaphase", "body": "Chromosomes align at the <b>metaphase plate</b> (cell's equator/middle). Each chromosome's kinetochores are attached to spindle fibers from <b>opposite poles</b>. <b>Metaphase checkpoint (spindle checkpoint):</b> ensures ALL chromosomes are properly attached before proceeding. If not → cell halts. This prevents unequal chromosome distribution."}, {"heading": "Mitosis — Anaphase", "body": "<b>Sister chromatids separate</b> (cohesin proteins cleaved). Each chromatid is now an individual <b>chromosome</b>. Chromosomes are pulled to <b>opposite poles</b> by shortening spindle fibers (kinetochore microtubules). Cell <b>elongates</b> as polar microtubules push poles apart. <b>Fastest phase</b> of mitosis. Results in identical sets of chromosomes at each pole."}, {"heading": "Mitosis — Telophase", "body": "<b>Reverse of prophase:</b> chromosomes <b>decondense</b> back into chromatin. <b>Nuclear envelopes reform</b> around each set of chromosomes. <b>Nucleoli reappear.</b> Spindle fibers disassemble. Two distinct but still-connected nuclei exist. <b>Cytokinesis</b> usually overlaps with telophase."}, {"heading": "Cytokinesis", "body": "Division of the <b>cytoplasm</b> into two daughter cells. <b>Animal cells:</b> <b>cleavage furrow</b> forms — a ring of <b>actin microfilaments</b> contracts inward, pinching the cell in two. <b>Plant cells:</b> <b>cell plate</b> forms — vesicles from Golgi fuse at the center, building a new cell wall between the two cells. Result: <b>2 genetically identical diploid daughter cells.</b>"}, {"heading": "Mitosis Summary", "body": "<b>PMAT:</b> Prophase → Metaphase → Anaphase → Telophase. Purpose: <b>growth and repair</b>. Starts with 1 diploid cell (2n) → ends with <b>2 identical diploid cells (2n)</b>. No change in chromosome number. No crossing over. One division. Occurs in <b>somatic cells</b>. Daughter cells are <b>clones</b> (genetically identical to parent and each other)."}, {"heading": "Meiosis — Overview", "body": "Produces <b>gametes</b> (sex cells) for sexual reproduction. <b>Two divisions:</b> meiosis I (separates homologous pairs) + meiosis II (separates sister chromatids). Starts with <b>1 diploid cell (2n=46)</b> → ends with <b>4 haploid cells (n=23)</b>. Chromosome number is <b>halved</b>. Introduces <b>genetic variation</b> through crossing over and independent assortment. Occurs only in <b>gonads</b> (ovaries/testes)."}, {"heading": "Meiosis I — Prophase I", "body": "<b>Longest and most complex phase.</b> Chromosomes condense. <b>Homologous chromosomes pair up</b> → <b>synapsis</b> (forming a <b>tetrad/bivalent</b> = 4 chromatids). <b>Crossing over</b> occurs: nonsister chromatids exchange segments at <b>chiasmata</b> (singular: chiasma). This <b>recombines alleles</b> → genetic diversity. Nuclear envelope breaks down. Spindle forms."}, {"heading": "Meiosis I — Metaphase I, Anaphase I, Telophase I", "body": "<b>Metaphase I:</b> <b>tetrads</b> (homologous pairs) align at the metaphase plate. Orientation is <b>random</b> → <b>independent assortment</b>. <b>Anaphase I:</b> <b>homologous chromosomes separate</b> (NOT sister chromatids) → one homolog to each pole. <b>Reduces chromosome number by half</b> (2n → n). <b>Telophase I + Cytokinesis I:</b> two haploid cells form. Each chromosome still has 2 sister chromatids."}, {"heading": "Meiosis II — Similar to Mitosis", "body": "No DNA replication between meiosis I and II (no S phase). <b>Prophase II:</b> spindle forms. <b>Metaphase II:</b> chromosomes align at metaphase plate. <b>Anaphase II:</b> <b>sister chromatids separate</b> (like mitosis). <b>Telophase II + Cytokinesis II:</b> 4 haploid daughter cells. Each has <b>n chromosomes</b> (23 in humans). In males → 4 sperm. In females → 1 egg + 3 polar bodies (unequal cytokinesis)."}, {"heading": "Sources of Genetic Variation", "body": "Meiosis generates diversity via: <b>1) Crossing over</b> (prophase I) — new allele combinations on chromosomes. <b>2) Independent assortment</b> (metaphase I) — random orientation of homologs → 2²³ = <b>~8.4 million</b> possible gamete combinations in humans (without crossing over). <b>3) Random fertilization:</b> any sperm × any egg → <b>(8.4M)² ≈ 70 trillion</b> possible zygotes. These ensure each individual is genetically unique (except identical twins)."}, {"heading": "Mitosis vs Meiosis Comparison", "body": "<b>Mitosis:</b> 1 division, 2 diploid (2n) identical daughters, somatic cells, growth/repair, no crossing over, no pairing. <b>Meiosis:</b> 2 divisions, 4 haploid (n) genetically unique daughters, germ cells (gametes), reproduction, crossing over in prophase I, homologous pairing. <b>Both</b> start with DNA replication in S phase. Both use PMAT stages. Both require spindle fibers."}, {"heading": "Nondisjunction", "body": "<b>Failure of chromosomes to separate properly</b> during meiosis (or mitosis). Can occur in <b>meiosis I</b> (homologs don't separate) or <b>meiosis II</b> (sister chromatids don't separate). Results in gametes with wrong chromosome number: <b>aneuploidy</b>. <b>Trisomy:</b> one extra chromosome (2n+1). <b>Monosomy:</b> one missing (2n-1). Example: <b>Down syndrome (trisomy 21)</b> — three copies of chromosome 21."}, {"heading": "Chromosomal Disorders", "body": "<b>Down syndrome:</b> trisomy 21 (47 chromosomes). Most common autosomal trisomy. Risk increases with maternal age. <b>Turner syndrome:</b> XO (45 chromosomes, monosomy X) — female, short stature, infertile. <b>Klinefelter syndrome:</b> XXY (47) — male, tall, infertile. <b>Trisomy X:</b> XXX — female, usually mild/no symptoms. <b>XYY syndrome:</b> tall males. <b>Edwards syndrome:</b> trisomy 18. <b>Patau syndrome:</b> trisomy 13."}, {"heading": "Cell Cycle Regulation", "body": "<b>Checkpoints:</b> control mechanisms ensuring proper cell division. <b>G₁ checkpoint:</b> cell size, nutrients, growth signals, DNA damage → proceed to S or enter G₀. <b>G₂ checkpoint:</b> DNA replication complete and accurate? <b>M (spindle) checkpoint:</b> all chromosomes attached to spindle? <b>Cyclins and CDKs</b> (cyclin-dependent kinases) drive the cell cycle. CDKs are active only when bound to cyclins (which rise and fall)."}, {"heading": "Cancer & Cell Cycle", "body": "<b>Cancer:</b> uncontrolled cell division from accumulated mutations in cell cycle genes. <b>Proto-oncogenes:</b> normal genes promoting cell growth. When mutated → <b>oncogenes</b> (accelerators stuck ON). <b>Tumor suppressor genes:</b> slow/stop cell division or trigger apoptosis. When mutated → brakes removed (e.g., <b>p53</b> — 'guardian of the genome,' mutated in >50% of cancers, <b>Rb</b>). Need multiple mutations = <b>multi-hit hypothesis</b>. <b>Apoptosis:</b> programmed cell death — eliminates damaged cells."}, {"heading": "Spermatogenesis vs Oogenesis", "body": "<b>Spermatogenesis:</b> in testes, continuous from puberty, 1 spermatogonium → 4 functional sperm. Takes ~64 days. Millions produced daily. <b>Oogenesis:</b> in ovaries, begins before birth, pauses at prophase I, resumes at puberty (1/month). 1 oogonium → <b>1 large egg + 3 small polar bodies</b> (unequal cytokinesis gives egg most cytoplasm). Egg completes meiosis II only if fertilized."}, {"heading": "Key Concepts Summary", "body": "<b>Cell cycle:</b> G₁→S→G₂→M (mitosis + cytokinesis). <b>Mitosis:</b> PMAT, 1 division, 2n→2n, 2 identical cells, somatic. <b>Meiosis:</b> 2 divisions, 2n→n, 4 unique cells, gametes, crossing over + independent assortment + random fertilization = genetic diversity. 2²³ × 2²³ ≈ 70 trillion combinations. <b>Nondisjunction:</b> chromosome separation failure → aneuploidy (Down=trisomy 21). <b>Regulation:</b> checkpoints (G₁, G₂, M), cyclins/CDKs. <b>Cancer:</b> oncogenes (gas) + lost tumor suppressors (brakes)."}], "quiz": [{"q": "Mitosis produces ___ daughter cells:", "a": ["1", "2", "4", "8"], "c": 1}, {"q": "Meiosis produces ___ daughter cells:", "a": ["1", "2", "4", "8"], "c": 2}, {"q": "Mitosis daughter cells are:", "a": ["Haploid", "Diploid and identical (2n)", "Haploid and unique", "Triploid"], "c": 1}, {"q": "Meiosis daughter cells are:", "a": ["Diploid", "Haploid and genetically unique (n)", "Diploid and identical", "Triploid"], "c": 1}, {"q": "Human diploid number (2n):", "a": ["23", "44", "46", "92"], "c": 2}, {"q": "Human haploid number (n):", "a": ["23", "44", "46", "92"], "c": 0}, {"q": "Somatic cells are:", "a": ["Haploid", "Diploid (body cells)", "Only in gonads", "Gametes"], "c": 1}, {"q": "Gametes are:", "a": ["Diploid", "Haploid (sex cells)", "Somatic", "Identical to parent"], "c": 1}, {"q": "DNA replication occurs in ___ phase:", "a": ["G₁", "S (synthesis)", "G₂", "M"], "c": 1}, {"q": "Interphase includes:", "a": ["Only G₁", "G₁, S, G₂", "Only mitosis", "Only cytokinesis"], "c": 1}, {"q": "Interphase is osome alignment", "Chromatid separation"], "c": 1}, {"q": "The spindle (M) checkpoint ensures:", "a": ["DNA is replicated", "All chromosomes attached to spindle", "Cell is big enough", "Nutrients available"], "c": 1}, {"q": "Cyclins:", "a": ["Are always constant", "Rise and fall during cell cycle", "Only appear in cancer", "Are enzymes"], "c": 1}, {"q": "CDKs are active when bound to:", "a": ["DNA", "Cyclins", "ATP only", "Nothing"], "c": 1}, {"q": "CDKs are:", "a": ["Lipids", "Cyclin-dependent kinases (enzymes)", "Sugars", "Nucleic acids"], "c": 1}, {"q": "Proto-oncogenes normally:", "a": ["Stop division", "Promote cell growth/division", "Kill cells", "Do nothing"], "c": 1}, {"q": "Oncogenes are mutated ___ stuck in 'ON':", "a": ["Tumor suppressors", "Proto-oncogenes", "Cyclins", "CDKs"], "c": 1}, {"q": "Tumor suppressor genes normally:", "a": ["Promote division", "Slow/stop division or trigger apoptosis", "Do nothing", "Cause cancer"], "c": 1}, {"q": "p53 is a:", "a": ["Oncogene", "Tumor suppressor ('guardian of the genome')", "Cyclin", "CDK"], "c": 1}, {"q": "p53 is mutated in >___% of cancers:", "a": ["10", "25", "50", "75"], "c": 2}, {"q": "Apoptosis is:", "a": ["Uncontrolled growth", "Programmed cell death", "Cell division", "DNA replication"], "c": 1}, {"q": "Cancer requires ___ mutation(s) (multi-hit hypothesis):", "a": ["1", "Multiple", "0", "Only 1"], "c": 1}, {"q": "Rb (retinoblastoma) is a:", "a": ["Oncogene", "Tumor suppressor gene", "Cyclin", "CDK"], "c": 1}, {"q": "Benign tumors are:", "a": ["Invasive", "Non-invasive (don't spread)", "Always fatal", "Metastatic"], "c": 1}, {"q": "Malignant tumors are:", "a": ["Non-invasive", "Invasive (cancerous, can metastasize)", "Harmless", "Always benign"], "c": 1}, {"q": "Metastasis means cancer:", "a": ["Stays in one place", "Spreads to other parts of the body", "Is cured", "Shrinks"], "c": 1}, {"q": "Autosomes are chromosomes:", "a": ["X and Y", "1-22 (non-sex chromosomes)", "Only sex chromosomes", "Only in gametes"], "c": 1}, {"q": "Humans have ___ pairs of autosomes:", "a": ["22", "23", "44", "46"], "c": 0}, {"q": "Fertilization restores the ___ number:", "a": ["Haploid", "Diploid (n + n = 2n)", "Triploid", "Tetraploid"], "c": 1}, {"q": "Histones are proteins that DNA wraps around for:", "a": ["Replication", "Packaging/organization (chromatin)", "Translation", "Transcription only"], "c": 1}, {"q": "Centrosomes contain ___ in animal cells:", "a": ["Ribosomes", "Centrioles", "Nucleoli", "Golgi"], "c": 1}, {"q": "Spindle fibers are made of:", "a": ["Actin", "Microtubules (tubulin)", "Keratin", "Collagen"], "c": 1}, {"q": "Polar microtubules push ___ apart:", "a": ["Chromosomes", "The two cell poles", "Organelles", "DNA strands"], "c": 1}, {"q": "Kinetochore microtubules pull:", "a": ["Poles apart", "Chromosomes toward poles", "DNA apart", "Nothing"], "c": 1}, {"q": "Anaphase is the ___ phase of mitosis:", "a": ["Longest", "Shortest (fastest)", "Same as others", "Second longest"], "c": 1}, {"q": "Cohesin proteins hold:", "a": ["Homologs together", "Sister chromatids together (at centromere)", "Spindle fibers", "Cell membrane"], "c": 1}, {"q": "Cohesin is cleaved in:", "a": ["Prophase", "Metaphase", "Anaphase (allowing separation)", "Telophase"], "c": 2}, {"q": "Crossing over increases:", "a": ["Chromosome number", "Genetic variation (new allele combinations)", "Cell size", "Division speed"], "c": 1}, {"q": "Without meiosis, chromosome number would ___ each generation:", "a": ["Stay the same", "Double", "Halve", "Disappear"], "c": 1}, {"q": "Reduction division refers to:", "a": ["Mitosis", "Meiosis I (2n → n)", "Meiosis II", "Cytokinesis"], "c": 1}, {"q": "Equational division refers to:", "a": ["Meiosis I", "Meiosis II (like mitosis)", "Mitosis only", "Neither"], "c": 1}, {"q": "Genetic recombination from crossing over means:", "a": ["Chromosomes look the same", "Chromosomes have new combinations of alleles", "All alleles are identical", "No change"], "c": 1}, {"q": "Identic 1}, {"q": "Pluripotent stem cells can become:", "a": ["Only one cell type", "Almost any cell type (not placenta)", "Only blood", "Only muscle"], "c": 1}, {"q": "Multipotent stem cells can become:", "a": ["Any cell", "Several related cell types", "Only one type", "Nothing"], "c": 1}, {"q": "Embryonic stem cells are:", "a": ["Multipotent", "Pluripotent", "Unipotent", "Dead"], "c": 1}, {"q": "Adult stem cells are typically:", "a": ["Totipotent", "Pluripotent", "Multipotent", "Unable to divide"], "c": 2}, {"q": "Binary fission is division in:", "a": ["Eukaryotes", "Prokaryotes (bacteria)", "Only animals", "Only plants"], "c": 1}, {"q": "Binary fission produces:", "a": ["4 cells", "2 identical cells", "1 cell", "8 cells"], "c": 1}, {"q": "Binary fission does NOT involve:", "a": ["DNA replication", "Mitosis or meiosis", "Cell growth", "Cytokinesis"], "c": 1}, {"q": "Asexual reproduction uses:", "a": ["Meiosis", "Mitosis", "Both", "Neither"], "c": 1}, {"q": "Sexual reproduction uses:", "a": ["Mitosis", "Meiosis (to make gametes)", "Neither", "Binary fission"], "c": 1}, {"q": "Advantage of sexual reproduction:", "a": ["Speed", "Genetic diversity", "Exact copies", "Simplicity"], "c": 1}, {"q": "Advantage of asexual reproduction:", "a": ["Diversity", "Speed and efficiency (no mate needed)", "Variation", "Recombination"], "c": 1}, {"q": "Polyploidy means having:", "a": ["Normal chromosome number", "More than 2 complete sets of chromosomes", "Missing chromosomes", "Only sex chromosomes"], "c": 1}, {"q": "Polyploidy is more common in:", "a": ["Animals", "Plants", "Both equally", "Neither"], "c": 1}, {"q": "Triploid organisms have ___ sets:", "a": ["2", "3", "4", "1"], "c": 1}, {"q": "Tetraploid organisms have ___ sets:", "a": ["2", "3", "4", "1"], "c": 2}, {"q": "Deletion is loss of a chromosome:", "a": ["Arm", "Segment", "Entire set", "Nothing"], "c": 1}, {"q": "Duplication is ___ of a chromosome segment:", "a": ["Loss", "Repetition (extra copy)", "Inversion", "Translocation"], "c": 1}, {"q": "Inversion is ___ of a chromosome segment:", "a": ["Deletion", "Reversal (flipped)", "Extra copy", "Movement to another chromosome"], "c": 1}, {"q": "Translocation is:", "a": ["Deletion", "Segment moves to a non-homologous chromosome", "Inversion", "Duplication"], "c": 1}, {"q": "Reciprocal translocation involves ___ chromosomes exchanging:", "a": ["Homologous", "Two non-homologous", "One", "No"], "c": 1}, {"q": "Philadelphia chromosome (chronic myelogenous leukemia) involves:", "a": ["Deletion", "Translocation between chromosomes 9 and 22", "Trisomy", "Monosomy"], "c": 1}, {"q": "Cri du chat syndrome results from:", "a": ["Trisomy", "Deletion on chromosome 5", "XXY", "XO"], "c": 1}, {"q": "MPF (maturation promoting factor) includes:", "a": ["Only cyclin", "Cyclin + CDK (drives M phase entry)", "Only CDK", "Only p53"], "c": 1}, {"q": "When cyclin levels are high, CDK is:", "a": ["Inactive", "Active (drives cell cycle forward)", "Destroyed", "Unchanged"], "c": 1}, {"q": "When cyclin is degraded, CDK becomes:", "a": ["More active", "Inactive (cell exits M phase)", "Destroyed", "Unchanged"], "c": 1}, {"q": "Carcinogens are agents that:", "a": ["Cure cancer", "Cause cancer (mutagens)", "Prevent cancer", "Have no effect"], "c": 1}, {"q": "Examples of carcinogens:", "a": ["Water", "UV radiation, tobacco smoke, certain chemicals", "Oxygen", "Vitamins"], "c": 1}, {"q": "Tumor angiogenesis is:", "a": ["Tumor shrinkage", "Growth of new blood vessels to supply tumor", "Tumor death", "Metastasis"], "c": 1}, {"q": "Chemotherapy targets:", "a": ["Only cancer cells", "Rapidly dividing cells (cancer AND some normal)", "Only normal cells", "Only nerve cells"], "c": 1}, {"q": "Side effects of chemo (hair loss, nausea) occur because:", "a": ["Only cancer cells die", "Normal rapidly dividing cells are also affected", "No cells die", "Only slow cells die"], "c": 1}, {"q": "Radiation therapy damages cancer cell:", "a": ["Membranes", "DNA (prevents division)", "Ribosomes", "Proteins only"], "c": 1}, {"q": "The cell cycle takes ~___ hours in typical human cells:", "a": ["1", "6", "24", "72"], "c": 2}, {"q": "S phase takes ~___ hours:", "a": ["1", "6-8", "12", "24"], "c": 1}, {"q": "M phase takes ~___ hour:", "a": ["1", "6", "12", "24"], "c": 0}, {"q": "G₁ is the most ___ phase in length:", "a": ["Constant", "Variable (can be very short or very long)", "Always short", "Always 12 hours"], "c": 1}, {"q": "Rapidly dividing cells (intestinal lining) have a ___ G₁:", "a": ["Long", "Short", "No", "Normal"], "c": 1}, {"q": "Slowly dividing cells (liver) have a ___ G₁:", "a": ["Very short", "Long", "No", "Non-existent"], "c": 1}, {"q": "Crossing over between nonsister chromatids creates:", "a": ["Identical chromatids", "Recombinant chromatids (new allele combinations)", "Deletions", "Nothing"], "c": 1}, {"q": "Meiosis in human males produces ___ gametes per meiosis:", "a": ["1", "2", "4 equal sperm", "4 unequal"], "c": 2}, {"q": "Meiosis in human females produces:", "a": ["4 equal eggs", "1 egg + 3 polar bodies (unequal)", "2 eggs", "4 sperm"], "c": 1}, {"q": "Anaphase I vs Anaphase II: I separates ___, II separates ___:", "a": ["Sisters/homologs", "Homologs/sister chromatids", "Same thing", "Nothing/everything"], "c": 1}, {"q": "After meiosis I but before meiosis II, each cell has:", "a": ["46 chromosomes", "23 chromosomes (each = 2 sister chromatids)", "23 single chromatids", "92 chromosomes"], "c": 1}, {"q": "The purpose of meiosis is to produce:", "a": ["Somatic cells", "Gametes with half the chromosome number", "Identical cells", "Cancer cells"], "c": 1}, {"q": "Without crossing over, gamete variation from independent assortment alone is:", "a": ["0", "23", "2²³ ≈ 8.4 million", "Infinite"], "c": 2}, {"q": "Crossing over further ___ genetic variation:", "a": ["Decreases", "Increases (beyond 8.4 million)", "Doesn't change", "Eliminates"], "c": 1}]}]}, "psychology": {"name": "PSY 309", "sub": "Abnormal Psychology", "icon": "💜", "lessons": [{"id": "psy-ch1", "title": "Chapter 1: Abnormal Psychology — Past & Present", "ln": "PSY 309 · Ch 1", "notes": [{"heading": "What Is Psychopathology?", "body": "<b>Psychopathology:</b> the scientific study of mental difficulties/disorders — including explanations, causes, progression, symptoms, assessment, diagnosis, and treatment (APA, 2022). The word also serves as a synonym for the broad range of mental disorders themselves. Workers: <b>clinical scientists</b> (research) and <b>clinical practitioners</b> (treatment)."}, {"heading": "The Four Ds", "body": "Common features across definitions of abnormality — the <b>Four Ds:</b> <b>1) Deviance</b> — different from society's norms. <b>2) Distress</b> — causes suffering to the individual. <b>3) Dysfunction</b> — interferes with daily functioning. <b>4) Danger</b> — poses risk to self or others. Influenced by societal norms, culture, and context."}, {"heading": "Roles of Society and Culture", "body": "Society selects general standards; clinicians apply them to individual cases. <b>Thomas Szasz</b> argued that deviations society calls 'psychopathology' are simply <b>'problems in living'</b> — society invents mental illness to control people who threaten social order. Norms can cause us to <b>overlook</b> real problems or <b>confuse eccentricities</b> with mental disturbance."}, {"heading": "The Elusive Nature of Abnormality", "body": "Few categories are clear-cut — most continue to be debated. <b>Weeks (2015)</b> studied eccentrics: ~1 in 5,000 are 'classic eccentrics' with 15 common characteristics. What's considered abnormal <b>changes over time</b> — tattoos were once 'outrageous,' now ~40% of US adults have one. Separating healthy oddness from pathology is genuinely difficult."}, {"heading": "What Is Treatment?", "body": "<b>Treatment/therapy:</b> procedure designed to change abnormal behavior into more normal behavior. <b>Three essential features</b> of all therapy: <b>1)</b> A sufferer seeking relief. <b>2)</b> A trained, socially accepted healer whose expertise is accepted. <b>3)</b> A series of therapeutic contacts through which the healer produces changes in the sufferer's emotional state, attitudes, and behavior."}, {"heading": "Ancient Views & Treatments", "body": "Every society has witnessed psychological abnormality. Ancient societies probably viewed it as the work of <b>evil spirits</b> — may have begun as far back as the <b>Stone Age</b>. Treatments: <b>trephination</b> (drilling holes in skull to release spirits) and <b>exorcism</b> (rituals to force demons out)."}, {"heading": "Greek & Roman Views (500 BC–500 AD)", "body": "Philosophers and physicians offered natural explanations. <b>Hippocrates</b> believed illnesses had <b>natural causes</b> — proposed the <b>four humors</b> theory (yellow bile, black bile, blood, phlegm). Imbalance → mental illness. Treatments: quiet life, vegetable diet, temperance, exercise, celibacy, bleeding."}, {"heading": "Middle Ages (500–1350 AD)", "body": "Church rejected scientific investigation, controlled education. Mental disorders attributed to <b>demonic causes</b> again. <b>Mass madness</b> — shared delusions and hallucinations. Treatment: exorcism, torture, gradually hospitalization. By the end of the Middle Ages, demonology began losing favor."}, {"heading": "Renaissance & Rise of Asylums (1400–1700)", "body": "Scientific knowledge increased → demonological views declined. <b>Johann Weyer:</b> first mental health physician — believed the mind was as susceptible to sickness as the body. Care at religious shrines (e.g., Gheel, Belgium) was precursor of <b>community health programs</b>. <b>Asylums</b> emerged by mid-1500s — but conditions were often terrible."}, {"heading": "19th Century: Reform & Moral Treatment", "body": "<b>Pinel</b> (France) and <b>Tuke</b> (England) advocated <b>moral treatment</b> — humane, respectful techniques. In the US: <b>Benjamin Rush</b> (father of American psychiatry) and <b>Dorothea Dix</b> (Boston teacher) promoted reform. Movement disintegrated by late 1800s due to: money/staff shortages, declining recovery rates, overcrowding, prejudice. Hospitals became warehouses."}, {"heading": "Early 20th Century: Somatogenic Perspective", "body": "<b>Somatogenic:</b> abnormal functioning has <b>physical causes</b>. Two factors revived this view: <b>1) Emil Kraepelin</b> argued physical factors cause mental dysfunction. <b>2)</b> Discovery that untreated <b>syphilis</b> → general paresis (a mental disorder). Results were disappointing until effective medications were developed."}, {"heading": "Early 20th Century: Psychogenic Perspective", "body": "<b>Psychogenic:</b> abnormal functioning has <b>psychological causes</b>. Rose in popularity through work with <b>hypnotism</b>. <b>Mesmer:</b> hysterical disorders. <b>Sigmund Freud:</b> developed <b>psychoanalysis</b> — outpatient talk therapy exploring the unconscious mind. Psychoanalytic theory became widely accepted."}, {"heading": "Public Attitudes Today", "body": "Negative attitudes persist: <b>43%</b> believe people bring mental disorders on themselves. <b>35%</b> believe disorders are caused by sinful behavior. <b>31%</b> consider them a sign of personal weakness. <b>33%</b> are afraid of people with disorders. But major changes have occurred in understanding and treatment over the last 70 years."}, {"heading": "Psychotropic Medications (1950s)", "body": "New medications discovered in the 1950s changed everything: <b>Antipsychotic drugs</b> (for schizophrenia, etc.), <b>Antidepressant drugs</b> (for depression), <b>Antianxiety drugs</b> (for anxiety disorders). <b>Psychotropic:</b> drugs that mainly affect the brain and reduce symptoms of mental dysfunction."}, {"heading": "Deinstitutionalization", "body": "Psychotropic medications led to <b>deinstitutionalization</b> — moving patients out of mental hospitals into community settings. Patients hospitalized in US public mental hospitals dropped from hundreds of thousands (1955) to ~42,000 today. Led to rise in <b>outpatient care</b> as the primary treatment mode."}, {"heading": "Modern Treatment Landscape", "body": "Before 1950: almost all care was private psychotherapy. Today: <b>outpatient care</b> is primary. More insurance coverage. <b>Prevention programs</b> increasing. <b>Positive psychology</b> growing — teaching coping skills. Programs for specific conditions. Correcting social conditions that contribute to mental illness."}, {"heading": "Multicultural Psychology", "body": "Emerged in response to growing US diversity — racial/ethnic minorities now ~40% of population and increasing. <b>Multicultural psychologists</b> study how culture, race, ethnicity, gender, and similar factors affect behavior and thought, and how people of different backgrounds may differ psychologically."}, {"heading": "Insurance & Managed Care", "body": "<b>Managed care programs</b> dominate — insurance company determines key care decisions. 65%+ of privately insured Americans are in managed care. Mental health reimbursements tend to be <b>lower than medical</b>. <b>2008 Federal Parity Law</b> and <b>2014 Affordable Care Act</b> improved coverage."}, {"heading": "Leading Theoretical Perspectives", "body": "No single perspective dominates. Major approaches: <b>1) Psychoanalytic</b> (unconscious conflicts). <b>2) Biological</b> (brain, genetics, neurotransmitters). <b>3) Cognitive-behavioral</b> (thought patterns + learned behaviors). <b>4) Humanistic-existential</b> (self-actualization, meaning). <b>5) Sociocultural</b> (social/cultural factors). <b>6) Developmental psychopathology</b>."}, {"heading": "Mental Health Professions", "body": "<b>Psychiatrists:</b> MD/DO, ~49,000, avg $194K, can prescribe medications. <b>Psychologists:</b> PhD/PsyD/EdD, ~188,000, avg $73K. <b>Social workers:</b> MSW/DSW, ~649,000, avg $46K, largest group. <b>Counselors:</b> various degrees, ~570,000, avg $45K. Field is majority female (67-84% depending on profession)."}, {"heading": "Technology & Mental Health — Negatives", "body": "Digital world provides new triggers: <b>video games</b> → antisocial behavior concerns. Constant texting/social media → potential <b>addictive behavior</b> and shorter attention spans. Tools for stalking, bullying, exhibitionism. Enormous volume of <b>web-based misinformation</b>. Social media may increase peer pressure and <b>FOMO</b> (fear of missing out)."}, {"heading": "Technology & Mental Health — Positives", "body": "Social media users tend to maintain close relationships, receive social support, be trusting, and lead active lives. <b>Computerized intervention programs</b> expanding. Online <b>support groups</b> accessible 24/7. <b>Wearable technologies</b> monitoring mental health. <b>Tele-mental health</b> services rapidly increasing — especially post-COVID. Mental health apps growing sharply."}, {"heading": "Historical Timeline Summary", "body": "<b>Ancient:</b> evil spirits → trephination/exorcism. <b>Greek/Roman:</b> natural causes, four humors. <b>Middle Ages:</b> demons return. <b>Renaissance:</b> asylums, Weyer. <b>1800s:</b> moral treatment (Pinel, Tuke, Rush, Dix) → collapsed. <b>Early 1900s:</b> somatogenic (Kraepelin) + psychogenic (Freud). <b>1950s:</b> psychotropic meds → deinstitutionalization. <b>Today:</b> outpatient care, multiple perspectives, multicultural, tech-assisted."}, {"heading": "Pinel's Classification System", "body": "Philippe Pinel didn't just advocate humane treatment — he also developed one of the first <b>classification systems</b> for mental disorders. He categorized patients by symptoms and course of illness rather than assuming demonic possession. This laid groundwork for modern diagnostic systems like the <b>DSM</b>."}, {"heading": "Key Concepts Summary", "body": "<b>Psychopathology:</b> study of mental disorders. <b>Four Ds:</b> deviance, distress, dysfunction, danger. <b>Szasz:</b> 'problems in living.' <b>Hippocrates:</b> natural causes, four humors. <b>Moral treatment:</b> Pinel/Tuke/Rush/Dix. <b>Somatogenic:</b> physical causes (Kraepelin). <b>Psychogenic:</b> psychological causes (Freud). <b>1950s psychotropic meds</b> → deinstitutionalization → outpatient care. <b>6 major perspectives</b> today."}], "quiz": [{"q": "Psychopathology is the scientific study of:", "a": ["Normal behavior", "Mental disorders", "Physical illness", "Philosophy"], "c": 1}, {"q": "The Four Ds are:", "a": ["Deviance, Distress, Dysfunction, Danger", "Diagnosis, Drugs, Disorder, Disease", "Depression, Dementia, Delirium, Dissociation", "None of these"], "c": 0}, {"q": "Thomas Szasz called mental illness:", "a": ["A brain disease", "Problems in living", "Spiritual weakness", "Genetic defects"], "c": 1}, {"q": "Szasz argued society invents mental illness to:", "a": ["Help people", "Control people who threaten social order", "Make money", "Advance science"], "c": 1}, {"q": "About 1 in ___ people are 'classic eccentrics':", "a": ["100", "500", "1,000", "5,000"], "c": 3}, {"q": "Three essential features of therapy include all EXCEPT:", "a": ["A sufferer seeking help", "A trained healer", "Series of therapeutic contacts", "Medication prescription"], "c": 3}, {"q": "Ancient societies attributed abnormality to:", "a": ["Brain disease", "Evil spirits", "Chemical imbalance", "Genetics"], "c": 1}, {"q": "Trephination involved:", "a": ["Herbs", "Drilling holes in the skull", "Prayer", "Bleeding"], "c": 1}, {"q": "Hippocrates proposed the:", "a": ["Germ theory", "Four humors", "Psychoanalysis", "DSM"], "c": 1}, {"q": "The four humors were:", "a": ["Earth, air, fire, water", "Yellow bile, black bile, blood, phlegm", "Id, ego, superego, libido", "None"], "c": 1}, {"q": "During the Middle Ages, mental illness was blamed on:", "a": ["Humors", "Natural causes", "Demons", "Brain lesions"], "c": 2}, {"q": "Johann Weyer was the first:", "a": ["Psychiatrist", "Mental health physician", "Psychologist", "Social worker"], "c": 1}, {"q": "Asylums emerged in the:", "a": ["1200s", "Mid-1500s", "1800s", "1950s"], "c": 1}, {"q": "Moral treatment was advocated by:", "a": ["Freud", "Kraepelin", "Pinel and Tuke", "Szasz"], "c": 2}, {"q": "Benjamin Rush is called the father of:", "a": ["Psychology", "American psychiatry", "Social work", "Neuroscience"], "c": 1}, {"q": "Dorothea Dix was a:", "a": ["Physician", "Nurse", "Boston schoolteacher who promoted reform", "Psychiatrist"], "c": 2}, {"q": "Moral treatment collapsed due to:", "a": ["Success", "Money shortages, overcrowding, prejudice", "New medications", "War"], "c": 1}, {"q": "Somatogenic perspective: abnormality has ___ causes:", "a": ["Psychological", "Spiritual", "Physical", "Social"], "c": 2}, {"q": "Kraepelin argued ___ factors cause dysfunction:", "a": ["Psychological", "Physical", "Spiritual", "Social"], "c": 1}, {"q": "Untreated syphilis was linked to:", "a": ["Depression", "General paresis", "Anxiety", "ADHD"], "c": 1}, {"q": "Psychogenic perspective: abnormality has ___ causes:", "a": ["Physical", "Genetic", "Psychological", "Dietary"], "c": 2}, {"q": "Freud developed:", "a": ["Moral treatment", "Psychoanalysis", "Medication", "Trephination"], "c": 1}, {"q": "Mesmer worked with:", "a": ["Medications", "Hypnotism", "Surgery", "Exorcism"], "c": 1}, {"q": "Psychotropic medications were discovered in the:", "a": ["1800s", "1920s", "1950s", "1990s"], "c": 2}, {"q": "Antipsychotic drugs treat:", "a": ["Anxiety only", "Schizophrenia and psychosis", "Depression only", "Pain"], "c": 1}, {"q": "Deinstitutionalization means:", "a": ["Building more hospitals", "Moving patients out of hospitals to community", "Closing all clinics", "Increasing medications"], "c": 1}, {"q": "Current US public mental hospital patients ≈:", "a": ["500,000", "200,000", "42,000", "1,000"], "c": 2}, {"q": "Today, primary treatment mode is:", "a": ["Long-term hospitalization", "Exorcism", "Outpatient care", "No treatment"], "c": 2}, {"q": "___% believe people bring mental disorders on themselves:", "a": ["10", "25", "43", "75"], "c": 2}, {"q": "___% believe disorders caused by sinful behavior:", "a": ["5", "15", "35", "60"], "c": 2}, {"q": "Managed care means:", "a": ["Patient decides everything", "Insurance company determines key care decisions", "Government-run only", "Free care"], "c": 1}, {"q": "Federal parity law went into effect in:", "a": ["1990", "2000", "2008", "2020"], "c": 2}, {"q": "How many major theoretical perspectives today?", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "Which is NOT a current perspective?", "a": ["Biological", "Cognitive-behavioral", "Demonological", "Sociocultural"], "c": 2}, {"q": "Largest mental health profession by number:", "a": ["Psychiatrists", "Psychologists", "Social workers", "Counselors"], "c": 2}, {"q": "Only ___ can prescribe medications:", "a": ["Psychologists", "Social workers", "Psychiatrists (MD/DO)", "Counselors"], "c": 2}, {"q": "Multicultural psychology studies how ___ affects behavior:", "a": ["Only genetics", "Culture, race, ethnicity, gender", "Only medication", "Only childhood"], "c": 1}, {"q": "US racial/ethnic minorities make up ≈ ___% of population:", "a": ["10", "20", "40", "60"], "c": 2}, {"q": "FOMO stands for:", "a": ["Fear of mental origins", "Fear of missing out", "Feeling of mood oscillation", "None"], "c": 1}, {"q": "Tele-mental health services are:", "a": ["Decreasing", "Staying the same", "Rapidly increasing", "Not available"], "c": 2}, {"q": "Positive psychology focuses on:", "a": ["Diagnosing disorders", "Teaching coping skills and strengths", "Medication", "Hospitalization"], "c": 1}, {"q": "Hippocrates' approach was:", "a": ["Supernatural", "Natural/scientific", "Religious", "Random"], "c": 1}, {"q": "Psychoanalysis is a type of:", "a": ["Medication", "Outpatient talk therapy", "Surgery", "Exorcism"], "c": 1}, {"q": "Clinical scientists primarily do:", "a": ["Treatment", "Research", "Medication", "Surgery"], "c": 1}, {"q": "Clinical practitioners primarily do:", "a": ["Research", "Treatment", "Teaching", "Nothing"], "c": 1}, {"q": "The Affordable Care Act went into effect in:", "a": ["2008", "2010", "2014", "2020"], "c": 2}, {"q": "Average psychiatrist salary ≈:", "a": ["$46,000", "$73,000", "$120,000", "$194,000"], "c": 3}, {"q": "Eccentricity differs from abnormality in that eccentrics:", "a": ["Are dangerous", "Don't usually have dysfunction/distress", "Always need treatment", "Are always deviant"], "c": 1}, {"q": "Before 1950, almost all outpatient care was:", "a": ["Free clinics", "Private psychotherapy", "Tele-health", "Group therapy"], "c": 1}, {"q": "Web-based misinformation about mental health is:", "a": ["Nonexistent", "Decreasing", "Enormous and increasing", "Regulated"], "c": 2}]}, {"id": "psy-ch2", "title": "Chapter 2: Research in Psychopathology", "ln": "PSY 309 · Ch 2", "notes": [{"heading": "Why Research Matters", "body": "Research is the <b>systematic search for facts</b> through careful observations and investigations. Inaccuracy in psychopathology can cause <b>great suffering</b> (e.g., conversion therapy was based on flawed research — Robert Spitzer publicly apologized in 2012). Clinical researchers discover universal laws, search for <b>nomothetic understanding</b>, and rely on the <b>scientific method</b>."}, {"heading": "Three Methods of Investigation", "body": "Clinical researchers depend on three methods: <b>1) Case study</b> — detailed individual descriptions. <b>2) Correlational method</b> — examines relationships between variables. <b>3) Experimental method</b> — manipulates variables to determine cause and effect. Each has strengths and weaknesses."}, {"heading": "The Case Study", "body": "A <b>detailed, interpretive description</b> of a person's life and psychological problems. Helpful for: generating <b>new ideas</b>, tentative support for theories, challenging assumptions, introducing new therapeutic techniques, studying <b>unusual problems</b>. Provides rich individual detail that other methods cannot."}, {"heading": "Case Study — Limitations", "body": "<b>Biased observers</b> — clinician may see what they expect. <b>Subjective evidence</b> → low <b>internal validity</b> (can't determine cause). <b>Little basis for generalization</b> → low <b>external validity</b> (can't apply to broader population). Results from one person may not apply to anyone else."}, {"heading": "The Correlational Method", "body": "Examines the <b>degree to which events or characteristics vary together</b>. Addresses limitations of case studies. Involves observing <b>many individuals</b>, applying procedures <b>uniformly</b>, using <b>statistical tests</b>. Studies can be <b>replicated</b>. Participants (sample) must be <b>representative</b> of the larger population."}, {"heading": "Positive Correlation", "body": "Variables change in the <b>same direction</b>. When one increases, the other increases too. Graph: slope goes <b>upward and to the right</b>. Example: more stress → more depression. The correlation coefficient (r) is <b>positive</b> (e.g., r = +0.65)."}, {"heading": "Negative Correlation", "body": "Variables change in <b>opposite directions</b>. When one increases, the other decreases. Graph: slope goes <b>downward</b>. Example: more activities → less depression. The correlation coefficient is <b>negative</b> (e.g., r = −0.70)."}, {"heading": "No Correlation", "body": "<b>No consistent relationship</b> between the variables. Data scattered with no clear pattern. Graph: <b>no slope</b>. Example: intelligence and depression may show near-zero correlation (r ≈ 0.00). Variables are unrelated."}, {"heading": "Correlation Coefficient (r)", "body": "Numerical measure of direction and strength. Symbolized by <b>'r'</b>. Ranges from <b>+1.00</b> (perfect positive) to <b>−1.00</b> (perfect negative). <b>Sign (+/−)</b> = direction. <b>Number (magnitude)</b> = strength. <b>0.00</b> = no relationship. Most psychological correlations fall far short of perfect."}, {"heading": "Correlation Strength (Magnitude)", "body": "<b>Strong/high:</b> data points fall close to the line of best fit (r near ±1.0). <b>Weak/low:</b> data loosely scattered around the line (r near 0). The closer |r| is to 1.0, the stronger the relationship. Both strong positive and strong negative correlations are 'strong.'"}, {"heading": "Statistical Significance", "body": "A finding is <b>statistically significant</b> if unlikely to have occurred by chance. Convention: if probability of chance < 5% (<b>p < .05</b>), results are significant and thought to reflect the larger population. Confidence increases with <b>larger sample size</b> and <b>stronger correlation magnitude</b>."}, {"heading": "Correlational Method — Strengths & Weaknesses", "body": "<b>Strengths:</b> high <b>external validity</b> (can generalize), replicable, uses statistical analysis. <b>Weaknesses:</b> lack <b>internal validity</b> — can describe relationships but <b>CANNOT explain causation</b>. Correlation ≠ causation! A third variable might explain both."}, {"heading": "Longitudinal Studies", "body": "A special form of correlational research. <b>Same individuals observed over a long period</b> on many occasions. Also called high-risk or developmental studies. Limitation: independent variable is NOT manipulated, no random assignment → <b>causes cannot be pinpointed</b>."}, {"heading": "Epidemiological Studies", "body": "Reveal the <b>incidence and prevalence</b> of disorders in a population. <b>Incidence:</b> number of <b>NEW cases</b> that emerge in a given period. <b>Prevalence:</b> <b>TOTAL number of cases</b> in a given period. Key studies: Epidemiologic Catchment Area Study, National Comorbidity Survey (and Replication)."}, {"heading": "The Experimental Method", "body": "A variable is <b>manipulated</b> and its effect on another variable is <b>observed</b>. <b>Independent variable (IV):</b> the variable being manipulated. <b>Dependent variable (DV):</b> the variable being measured/observed. <b>Confound:</b> other variables that may also affect the DV. The ONLY method that can establish <b>cause and effect</b>."}, {"heading": "Guarding Against Confounds", "body": "Three features protect against confounds: <b>1) Control group</b> — not exposed to IV, but otherwise similar to experimental group. <b>2) Random assignment</b> — every participant equally likely to be in any group. <b>3) Masked (blind) design</b> — participants don't know which group they're in."}, {"heading": "Masked (Blind) Designs", "body": "<b>Single-masked:</b> participants don't know their group assignment. Uses <b>placebo therapy</b> (inactive treatment that looks real). <b>Double-masked:</b> NEITHER participants NOR experimenters know group assignments. Prevents experimenter bias from influencing results. The gold standard for experiments."}, {"heading": "Clinical vs Statistical Significance", "body": "<b>Statistical significance:</b> results unlikely due to chance (p < .05). <b>Clinical significance:</b> results are meaningful and improve real-world functioning. A statistically significant finding may not be clinically significant (tiny effect with huge sample). Clinicians evaluate both."}, {"heading": "Quasi-Experimental: Matched Designs", "body": "Participants are <b>NOT randomly assigned</b> but placed in <b>existing groups</b>. <b>Matched control groups</b> address confounds by matching on demographics and other variables. Less ideal than true experiments but sometimes the only ethical option."}, {"heading": "Natural Experiments", "body": "<b>Nature manipulates</b> the independent variable (e.g., a natural disaster) and the researcher observes effects. Events <b>cannot be replicated</b> at will. Cannot draw broad generalizations from a single study. Useful for studying events that can't be ethically created in a lab."}, {"heading": "Analogue Experiments", "body": "Researchers <b>freely manipulate IVs</b> in a lab while avoiding ethical limitations. Subjects induced to behave in ways that <b>resemble real life</b>. Limitation: can't be certain lab phenomena are the same as real psychological disorders. Animals are often used as participants."}, {"heading": "Single-Subject Experiments", "body": "<b>One participant</b> observed before and after IV manipulation. Uses <b>baseline data</b> as comparison standard. Higher <b>internal validity</b> than case studies because IV is manipulated. Common design: <b>ABAB (reversal)</b> — baseline (A), treatment (B), baseline (A), treatment (B)."}, {"heading": "Mixed-Methods & CBPR", "body": "<b>Mixed-methods:</b> combines qualitative (generate hypotheses) AND quantitative (test hypotheses) approaches in one project. <b>Community-Based Participatory Research (CBPR):</b> affected community members collaborate with researchers at ALL stages. Built on shared goals and trust → meaningful, lasting community change."}, {"heading": "Research Methods Comparison Table", "body": "<b>Case study:</b> individual info ✓, general info ✗, causal info ✗, stats ✗, replicable ✗. <b>Correlational:</b> individual ✗, general ✓, causal ✗, stats ✓, replicable ✓. <b>Experimental:</b> individual ✗, general ✓, causal ✓, stats ✓, replicable ✓. Only experiments establish causation!"}, {"heading": "Ethics: Protecting Human Participants", "body": "Researchers' primary obligation: <b>avoid physical or psychological harm</b>. <b>IRB (Institutional Review Board):</b> ethics committee that protects participants' rights and safety. IRBs ensure: voluntary participation, <b>informed consent</b>, right to withdraw anytime, benefits outweigh risks, protection from harm, access to study info, <b>confidentiality/anonymity</b>."}, {"heading": "Animal Research Ethics", "body": "Between 11-25 million animals used in US studies each year. Methods include shocking, starving, surgical alteration. <b>Outcomes:</b> helped increase human life expectancy by 24 years, contributed to medication development. Ethical debate: are these actions acceptable? Organizations like <b>PETA</b> advocate against animal testing."}, {"heading": "Social Media in Research", "body": "Increased use of social networks for research. <b>Benefits:</b> access to large databases. <b>Concerns:</b> data examined <b>without subscriber consent</b>, direct manipulation without informed consent, potential for affecting clinical depression in participants, psychological targeting. Raises new ethical questions."}, {"heading": "Key Concepts Summary", "body": "<b>3 methods:</b> case study, correlational, experimental. <b>Correlation:</b> direction (+ or −) + magnitude (0 to 1). <b>r</b> = correlation coefficient. <b>p < .05</b> = statistically significant. <b>Correlation ≠ causation.</b> <b>Experiment:</b> IV manipulated → DV measured. Guards: control group, random assignment, masking. <b>Incidence:</b> new cases. <b>Prevalence:</b> total cases. <b>IRB</b> protects participants."}], "quiz": [{"q": "Clinical researchers search for ___ understanding:", "a": ["Idiographic", "Nomothetic", "Spiritual", "Personal"], "c": 1}, {"q": "Three methods of investigation:", "a": ["Case study, correlational, experimental", "Survey, interview, observation", "Therapy, medication, surgery", "None"], "c": 0}, {"q": "Case studies provide:", "a": ["Broad generalizations", "Detailed individual descriptions", "Causal evidence", "Statistical analysis"], "c": 1}, {"q": "Case studies have LOW:", "a": ["Detail", "Internal and external validity", "Interest", "Cost"], "c": 1}, {"q": "Internal validity means:", "a": ["Can generalize", "Can determine cause", "Has rich detail", "Is replicable"], "c": 1}, {"q": "External validity means:", "a": ["Can determine cause", "Can generalize to population", "Has subjective evidence", "Is detailed"], "c": 1}, {"q": "A positive correlation means variables change:", "a": ["In opposite directions", "In the same direction", "Randomly", "Not at all"], "c": 1}, {"q": "A negative correlation means variables change:", "a": ["In the same direction", "In opposite directions", "Randomly", "Not at all"], "c": 1}
