: "sp hybridization has ___ hybrid orbitals:", "a": ["2", "3", "4", "5"], "c": 0}, {"q": "sp³ → ___ geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 2}, {"q": "sp² → ___ geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 1}, {"q": "sp → ___ geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 0}, {"q": "A sigma (σ) bond is formed by ___ overlap:", "a": ["Side-to-side", "Head-on (end-to-end)", "No overlap", "Random"], "c": 1}, {"q": "A pi (π) bond is formed by ___ overlap:", "a": ["Head-on", "Side-to-side (parallel p orbitals)", "No overlap", "s orbitals"], "c": 1}, {"q": "A single bond = ___ σ bond(s):", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "A double bond = 1σ + ___ π:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "A triple bond = 1σ + ___ π:", "a": ["0", "1", "2", "3"], "c": 2}, {"q": "Sigma bonds allow free:", "a": ["Rotation", "No rotation", "Only vibration", "Nothing"], "c": 0}, {"q": "Pi bonds prevent free:", "a": ["Vibration", "Rotation (rigid)", "Stretching", "Nothing"], "c": 1}, {"q": "Metallic bonding: metal cations in a 'sea' of:", "a": ["Protons", "Delocalized electrons", "Anions", "Water"], "c": 1}, {"q": "Metallic bonding explains:", "a": ["Brittleness", "Conductivity, malleability, luster", "Insulation", "Transparency"], "c": 1}, {"q": "Intermolecular forces are between:", "a": ["Atoms in a molecule", "Molecules (between separate molecules)", "Protons", "Neutrons"], "c": 1}, {"q": "London dispersion forces are in:", "a": ["Only polar molecules", "All molecules (including nonpolar)", "Only ionic", "Only metals"], "c": 1}, {"q": "Dipole-dipole forces are between:", "a": ["Nonpolar molecules", "Polar molecules", "Ions", "Noble gases only"], "c": 1}, {"q": "Hydrogen bonding occurs when H is bonded to:", "a": ["Any atom", "F, O, or N (highly electronegative)", "Only carbon", "Only metals"], "c": 1}, {"q": "Strongest intermolecular force:", "a": ["London dispersion", "Dipole-dipole", "Hydrogen bonding", "Ion-dipole"], "c": 3}, {"q": "Ion-dipole forces are between:", "a": ["Two ions", "An ion and a polar molecule", "Two nonpolar molecules", "Two atoms"], "c": 1}, {"q": "Stronger IMFs → ___ boiling point:", "a": ["Lower", "Higher", "Same", "No effect"], "c": 1}, {"q": "Stronger IMFs → ___ surface tension:", "a": ["Lower", "Higher", "Same", "No effect"], "c": 1}, {"q": "Stronger IMFs → ___ viscosity:", "a": ["Lower", "Higher", "Same", "No effect"], "c": 1}, {"q": "London dispersion forces increase with:", "a": ["Fewer electrons", "More electrons / larger molar mass", "Less mass", "Smaller molecules"], "c": 1}, {"q": "VB (Valence Bond) theory: bonds form from overlap of:", "a": ["Nuclei", "Atomic or hybrid orbitals", "Empty space", "Neutrons"], "c": 1}, {"q": "MO (Molecular Orbital) theory: atomic orbitals combine to form:", "a": ["Nothing", "Bonding and antibonding molecular orbitals", "Only bonding", "Only antibonding"], "c": 1}, {"q": "Bond order = (bonding e⁻ − antibonding e⁻) ÷:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Bond order of 0 means:", "a": ["Strong bond", "Molecule doesn't exist (no net bonding)", "Triple bond", "Double bond"], "c": 1}, {"q": "O₂ is paramagnetic, which MO theory correctly predicts because:", "a": ["All electrons paired", "It has unpaired electrons in π* antibonding", "It's ionic", "It's nonpolar"], "c": 1}, {"q": "Lewis structures cannot explain O₂'s:", "a": ["Bond order", "Paramagnetism (unpaired electrons)", "Shape", "Formula"], "c": 1}, {"q": "Expanded octet: possible for elements in period ___ and beyond:", "a": ["1", "2", "3 (have d orbitals available)", "Only period 7"], "c": 2}, {"q": "PCl₅ has ___ bonds (expanded octet):", "a": ["3", "4", "5", "6"], "c": 2}, {"q": "SF₆ has ___ bonds:", "a": ["4", "5", "6", "8"], "c": 2}, {"q": "XeF₂ has ___ lone pairs on Xe:", "a": ["0", "1", "2", "3"], "c": 3}, {"q": "VSEPR: electron geometry includes lone pairs; molecular geometry:", "a": ["Also includes lone pairs", "Only counts bonding pairs (visible shape)", "Ignores everything", "Only counts ions"], "c": 1}, {"q": "Bent shape can come from ___ or ___ electron groups:", "a": ["2/3", "3/4 (either trigonal planar or tetrahedral base)", "5/6", "1/2"], "c": 1}, {"q": "T-shaped comes from ___ electron groups with 2 lone pairs:", "a": ["4", "5", "6", "3"], "c": 1}, {"q": "See-saw comes from ___ electron groups with 1 lone pair:", "a": ["4", "5", "6", "3"], "c": 1}, {"q": "Square planar comes from ___ electron groups with 2 lone pairs:", "a": ["4", "5", "6", "3"], "c": 2}, {"q": "Square pyramidal comes from ___ electron groups with 1 lone pair:", "a": ["4", "5", "6", "3"], "c": 2}, {"q": "Lone pairs occupy more space than bonding pairs because:", "a": ["They're heavier", "They're closer to nucleus, spread more", "They're smaller", "No reason"], "c": 1}, {"q": "sp3d hybridization gives ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 1}, {"q": "sp3d2 hybridization gives ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 2}, {"q": "Delocalized electrons are shared over ___ atoms:", "a": ["2", "More than 2 (spread across molecule)", "1", "0"], "c": 1}, {"q": "Benzene (C₆H₆) has ___ resonance structures with delocalized π electrons:", "a": ["1", "2", "3", "6"], "c": 1}, {"q": "A coordinate (dative) covalent bond: both electrons come from:", "a": ["Both atoms equally", "One atom (the donor)", "Neither", "The bond"], "c": 1}, {"q": "NH₃ donating its lone pair to H⁺ → NH₄⁺ is a ___ bond:", "a": ["Ionic", "Coordinate covalent", "Nonpolar", "Double"], "c": 1}, {"q": "Lewis acids:", "a": ["Donate electrons", "Accept electron pairs", "Donate protons", "Accept protons"], "c": 1}, {"q": "Lewis bases:", "a": ["Accept electrons", "Donate electron pairs", "Donate protons", "Accept protons"], "c": 1}, {"q": "In BF₃ + NH₃ → F₃B−NH₃: BF₃ is the Lewis:", "a": ["Base", "Acid (accepts lone pair from N)", "Neither", "Both"], "c": 1}, {"q": "Chem review Q1: The mole is central to:", "a": ["Only physics", "All stoichiometry calculations", "Only biology", "Only geology"], "c": 1}, {"q": "Chem review Q2: Balanced equations conserve:", "a": ["Only mass", "Mass and charge", "Only energy", "Only volume"], "c": 1}, {"q": "Chem review Q3: Molar mass has units:", "a": ["g", "g/mol", "mol/g", "kg"], "c": 1}, {"q": "Chem review Q4: Avogadro's number:", "a": ["6.02×10²³", "3.14×10⁸", "1.66×10⁻²⁴", "9.81"], "c": 0}, {"q": "Chem review Q5: SI unit of energy:", "a": ["Calorie", "Joule", "Watt", "Newton"], "c": 1}, {"q": "Chem review Q6: Exothermic ΔH is:", "a": ["Positive", "Negative", "Zero", "Undefined"], "c": 1}, {"q": "Chem review Q7: Hess's law uses enthalpy as a:", "a": ["Path function", "State function", "Constant", "Variable"], "c": 1}, {"q": "Chem review Q8: Valence electrons determine:", "a": ["Mass", "Chemical reactivity", "Color", "Density"], "c": 1}, {"q": "Chem review Q9: Covalent bonds involve:", "a": ["Transfer", "Sharing of electrons", "No electrons", "Only metals"], "c": 1}, {"q": "Chem review Q10: VSEPR predicts:", "a": ["Mass", "Molecular shape", "Energy", "Color"], "c": 1}]}]}, "biology": {"name": "BIO", "sub": "Biology", "icon": "🧬", "lessons": [{"id": "bio-l1", "title": "Lesson 1: Scientific Method & Measurement", "ln": "BIO · L1", "notes": [{"heading": "What Is Science?", "body": "Science is a systematic way of learning about the natural world through <b>observation, experimentation, and evidence-based reasoning</b>. It seeks natural explanations for natural phenomena. Science is <b>self-correcting</b> — conclusions change when new evidence emerges. It relies on <b>empirical evidence</b> (information gathered through the senses or instruments) rather than opinion, authority, or tradition."}, {"heading": "Science vs Pseudoscience", "body": "<b>Science:</b> testable hypotheses, controlled experiments, peer review, reproducible results, willingness to revise. <b>Pseudoscience:</b> untestable claims, anecdotal evidence, no peer review, resistance to revision. Examples of pseudoscience: astrology, homeopathy, crystal healing. A key hallmark of science is <b>falsifiability</b> — a scientific claim must be capable of being proven wrong."}, {"heading": "The Scientific Method — Overview", "body": "A structured approach to inquiry: <b>1)</b> Make observations. <b>2)</b> Ask a question. <b>3)</b> Form a hypothesis. <b>4)</b> Design and conduct an experiment. <b>5)</b> Collect and analyze data. <b>6)</b> Draw conclusions. <b>7)</b> Communicate results. The method is <b>iterative</b> — results often lead to new questions and refined hypotheses. Not always followed in strict linear order."}, {"heading": "Observation", "body": "The first step: noticing something in the natural world. <b>Qualitative observations:</b> descriptions of qualities (color, shape, texture — 'the leaf is green'). <b>Quantitative observations:</b> numerical measurements (mass, length, temperature — 'the leaf is 5.2 cm long'). Both types are valuable. Good scientists are careful, detailed observers who record everything systematically."}, {"heading": "Asking Questions & Forming Hypotheses", "body": "A <b>question</b> arises from observations ('Why do plants grow taller in sunlight?'). A <b>hypothesis</b> is a testable, proposed explanation ('Plants grow taller in sunlight because light provides energy for photosynthesis'). Must be <b>falsifiable</b> — there must be a way to prove it wrong. Written as an <b>if/then statement:</b> 'If plants receive more light, then they will grow taller.' A hypothesis is NOT just a guess — it is an <b>educated prediction</b> based on prior knowledge."}, {"heading": "Null vs Alternative Hypothesis", "body": "<b>Null hypothesis (H₀):</b> there is NO difference/effect — the default assumption ('Light has no effect on plant growth'). <b>Alternative hypothesis (H₁ or Hₐ):</b> there IS a difference/effect ('Light does affect plant growth'). Experiments attempt to <b>reject the null hypothesis</b>. If data show a significant difference, we reject H₀ and accept Hₐ. If not, we <b>fail to reject H₀</b> (we never 'prove' the null)."}, {"heading": "Experimental Design — Variables", "body": "<b>Independent variable (IV):</b> what the experimenter <b>changes/manipulates</b> (e.g., amount of light). <b>Dependent variable (DV):</b> what is <b>measured</b> as a result (e.g., plant height). <b>Controlled/constant variables:</b> everything kept the <b>same</b> to ensure a fair test (soil type, water amount, temperature, pot size). Memory trick: IV = 'I change it'; DV = 'Data I collect.'"}, {"heading": "Control Group vs Experimental Group", "body": "<b>Control group:</b> receives NO treatment or a <b>standard/baseline</b> condition — serves as comparison. <b>Experimental group:</b> receives the <b>treatment/variable being tested</b>. Without a control group, you cannot determine if changes are due to the IV or other factors. Example: control plants get no fertilizer; experimental plants get fertilizer. Both get same light, water, soil."}, {"heading": "Positive & Negative Controls", "body": "<b>Positive control:</b> a group expected to produce a <b>known positive result</b> — confirms the experiment is working. <b>Negative control:</b> a group expected to produce <b>no change/negative result</b> — confirms the baseline. Example in drug testing: positive control = known effective drug; negative control = placebo (sugar pill). If positive control doesn't work → something wrong with experiment."}, {"heading": "Replication & Sample Size", "body": "<b>Replication:</b> repeating the experiment multiple times to verify results. Results must be <b>reproducible</b> — other scientists should get similar findings. <b>Sample size:</b> number of subjects/trials in each group. <b>Larger sample sizes</b> produce more reliable results and reduce the effect of random variation. Small samples can give misleading results by chance."}, {"heading": "Bias & Placebo Effect", "body": "<b>Bias:</b> any factor that skews results away from truth. <b>Experimenter bias:</b> researcher unconsciously influences outcome. <b>Confirmation bias:</b> tendency to look for evidence supporting what you already believe. <b>Placebo effect:</b> subjects improve because they believe they're receiving treatment. <b>Single-blind:</b> subjects don't know their group. <b>Double-blind:</b> neither subjects NOR researchers know group assignment — gold standard for reducing bias."}, {"heading": "Types of Data", "body": "<b>Qualitative data:</b> descriptive, non-numerical (color, smell, behavior). <b>Quantitative data:</b> numerical, measurable (height in cm, temperature in °C, mass in grams). Quantitative data can be <b>discrete</b> (whole numbers — number of leaves: 5, 6, 7) or <b>continuous</b> (any value within a range — height: 5.237 cm). Scientists prefer quantitative data because it is more objective and can be statistically analyzed."}, {"heading": "Drawing Conclusions", "body": "After analyzing data: <b>Does the evidence support or refute the hypothesis?</b> If data support it → hypothesis is supported (not 'proven'). If data don't support it → hypothesis is rejected or revised. <b>Science never 'proves' anything absolutely</b> — it builds increasingly strong support. Results are shared through <b>peer-reviewed publications</b>. Other scientists review the methods and data before acceptance."}, {"heading": "Scientific Theory vs Law", "body": "<b>Theory:</b> a broad, well-tested explanation of natural phenomena supported by a <b>large body of evidence</b>. Examples: Theory of Evolution, Cell Theory, Germ Theory. A theory can be modified but is NOT 'just a guess.' <b>Law:</b> a statement describing an observed pattern in nature, often expressed mathematically. Example: Law of Gravity, Law of Conservation of Energy. <b>Key difference:</b> a law describes WHAT happens; a theory explains WHY."}, {"heading": "The Metric System (SI Units)", "body": "Science uses the <b>International System of Units (SI)</b>. Base units: <b>meter (m)</b> — length; <b>kilogram (kg)</b> — mass; <b>second (s)</b> — time; <b>kelvin (K)</b> — temperature; <b>mole (mol)</b> — amount of substance; <b>ampere (A)</b> — electric current; <b>liter (L)</b> — volume (derived). The metric system is <b>base-10</b>, making conversions easy by moving the decimal point."}, {"heading": "Metric Prefixes", "body": "<b>Kilo- (k):</b> 1,000 (1 km = 1,000 m). <b>Hecto- (h):</b> 100. <b>Deka- (da):</b> 10. <b>Base unit:</b> 1. <b>Deci- (d):</b> 0.1. <b>Centi- (c):</b> 0.01 (1 cm = 0.01 m). <b>Milli- (m):</b> 0.001 (1 mm = 0.001 m). <b>Micro- (μ):</b> 0.000001 (10⁻⁶). <b>Nano- (n):</b> 10⁻⁹. <b>Pico- (p):</b> 10⁻¹². Mnemonic: <b>King Henry Died By Drinking Chocolate Milk</b>."}, {"heading": "Length, Mass & Volume", "body": "<b>Length:</b> measured in meters (m). 1 km = 1,000 m. 1 m = 100 cm = 1,000 mm. <b>Mass:</b> amount of matter; measured in grams (g) or kilograms (kg). 1 kg = 1,000 g. Mass ≠ weight (weight depends on gravity). <b>Volume:</b> amount of space occupied; measured in liters (L) or milliliters (mL). 1 L = 1,000 mL. For solids, use cm³ (1 cm³ = 1 mL). Liquid volume measured with a <b>graduated cylinder</b>."}, {"heading": "Temperature Scales", "body": "<b>Celsius (°C):</b> water freezes at <b>0°C</b>, boils at <b>100°C</b>. Used in most science. <b>Kelvin (K):</b> SI unit. K = °C + 273. <b>Absolute zero = 0 K = −273°C</b> (no molecular motion). <b>Fahrenheit (°F):</b> water freezes at 32°F, boils at 212°F. Used mainly in US daily life, NOT in science. Conversions: °F = (°C × 9/5) + 32; °C = (°F − 32) × 5/9."}, {"heading": "Measuring with Accuracy & Precision", "body": "<b>Accuracy:</b> how close a measurement is to the <b>true/accepted value</b>. <b>Precision:</b> how close <b>repeated measurements</b> are to each other (reproducibility). You can be precise but NOT accurate (consistently wrong). Ideal: both accurate AND precise. Dart analogy: accurate = hitting bullseye; precise = hitting same spot repeatedly; both = clustered on bullseye."}, {"heading": "Significant Figures", "body": "<b>Significant figures (sig figs)</b> indicate the <b>precision</b> of a measurement. Rules: all non-zero digits are significant; zeros between non-zeros are significant; leading zeros are NOT significant; trailing zeros after a decimal ARE significant. Example: 0.00340 has <b>3 sig figs</b> (3, 4, 0). 1,200 has <b>2 sig figs</b>. 1,200. has <b>4 sig figs</b>. When multiplying/dividing, answer has fewest sig figs of inputs."}, {"heading": "Scientific Notation", "body": "A way to write very large or very small numbers. Format: <b>M × 10ⁿ</b> where 1 ≤ M < 10. Examples: 6,020,000 = <b>6.02 × 10⁶</b>. 0.00045 = <b>4.5 × 10⁻⁴</b>. Positive exponent = large number (decimal moves right). Negative exponent = small number (decimal moves left). Essential in biology for expressing cell sizes (10⁻⁶ m), molecular counts (6.02 × 10²³), and bacterial populations."}, {"heading": "The Meniscus & Reading Graduated Cylinders", "body": "When liquid is in a graduated cylinder, it curves at the edges forming a <b>meniscus</b>. For water (and most liquids), the meniscus is <b>concave</b> (curves down in center). <b>Always read at the bottom of the meniscus</b> at eye level. For mercury, the meniscus is <b>convex</b> (curves up). Reading at the wrong point or at an angle causes <b>parallax error</b>."}, {"heading": "Graphing in Science", "body": "<b>Independent variable</b> → X-axis (horizontal). <b>Dependent variable</b> → Y-axis (vertical). Graphs must have: <b>title</b> (describing relationship), <b>labeled axes with units</b>, <b>appropriate scale</b>, <b>data points plotted correctly</b>. Types: <b>line graph</b> (continuous data), <b>bar graph</b> (categorical data), <b>pie chart</b> (parts of a whole). Line of best fit shows the overall trend."}, {"heading": "Correlation vs Causation", "body": "<b>Correlation:</b> two variables change together (positive: both increase; negative: one increases, other decreases). <b>Causation:</b> one variable directly CAUSES the change in another. <b>Correlation does NOT equal causation.</b> Example: ice cream sales and drowning deaths both rise in summer — correlated but ice cream doesn't cause drowning. Only <b>controlled experiments</b> can establish causation."}, {"heading": "Inductive vs Deductive Reasoning", "body": "<b>Inductive reasoning:</b> specific observations → general conclusion. 'Every swan I've seen is white → all swans are white.' Can be wrong (black swans exist). <b>Deductive reasoning:</b> general principle → specific prediction. 'All mammals have hair. Dogs are mammals. → Dogs have hair.' If premises are true, conclusion must be true. Science uses BOTH — inductive to form hypotheses, deductive to test them."}, {"heading": "Descriptive vs Experimental Studies", "body": "<b>Descriptive (observational) studies:</b> observe and describe patterns without manipulating variables. Examples: field observations, surveys, case studies. Cannot prove causation. <b>Experimental studies:</b> manipulate an IV, measure a DV, control other variables. CAN establish causation. Sometimes experiments aren't possible (ethical/practical reasons) so observational studies are used."}, {"heading": "Peer Review & Publication", "body": "After experiments, scientists write <b>research papers</b> detailing methods, results, and conclusions. Papers undergo <b>peer review</b> — other experts in the field evaluate the work for accuracy, validity, and methodology before publication. This process helps catch errors, prevent fraud, and maintain scientific quality. Published in <b>scientific journals</b>. Results must be <b>reproducible</b> by other labs."}, {"heading": "Dimensional Analysis", "body": "A method for <b>converting between units</b> using conversion factors. Multiply by a fraction where the unit you want to cancel is in the denominator. Example: Convert 5 km to m: 5 km × (1,000 m / 1 km) = 5,000 m. Can chain conversions: 72 hours × (1 day / 24 hours) = 3 days. Always check that units cancel properly — this prevents errors."}, {"heading": "Percent Error", "body": "Measures how far off an experimental value is from the accepted value. Formula: <b>% Error = |experimental − accepted| / accepted × 100</b>. Always use absolute value (no negative). Example: measured boiling point 99.2°C, accepted is 100°C → |99.2-100|/100 × 100 = <b>0.8% error</b>. Low % error = high accuracy."}, {"heading": "Mean, Median, Mode & Range", "body": "<b>Mean:</b> average (sum of values ÷ number of values). <b>Median:</b> middle value when data are ordered. <b>Mode:</b> most frequent value. <b>Range:</b> highest minus lowest value (shows spread). For data set {3, 5, 5, 7, 10}: mean = 6, median = 5, mode = 5, range = 7. Scientists usually report the mean along with a measure of variation (like standard deviation)."}, {"heading": "Standard Deviation", "body": "Measures how <b>spread out</b> data are from the mean. <b>Low SD:</b> data points are close to the mean (precise). <b>High SD:</b> data points are spread far from the mean (imprecise). Calculated by finding the average distance of each data point from the mean. In biology, SD is used to create <b>error bars</b> on graphs to show variability. Overlapping error bars suggest no significant difference."}, {"heading": "Ethics in Science", "body": "Scientists must follow <b>ethical guidelines:</b> no fabrication (making up data), no falsification (altering data), no plagiarism. <b>Animal research</b> must follow IACUC guidelines (minimize suffering). <b>Human research</b> requires IRB approval and <b>informed consent</b>. Results must be reported honestly, even if they don't support the hypothesis. Conflicts of interest must be disclosed."}, {"heading": "Characteristics of Life", "body": "All living things share 8 characteristics: <b>1)</b> Cells (basic unit of life). <b>2)</b> Organization (hierarchical structure). <b>3)</b> Energy use (metabolism). <b>4)</b> Homeostasis (maintaining internal balance). <b>5)</b> Growth & development. <b>6)</b> Reproduction. <b>7)</b> Response to stimuli. <b>8)</b> Evolution/adaptation. If something lacks even one, it's NOT considered alive. Viruses are debated because they lack cells and independent metabolism."}, {"heading": "Levels of Biological Organization", "body": "From smallest to largest: <b>atom → molecule → organelle → cell → tissue → organ → organ system → organism → population → community → ecosystem → biosphere</b>. Each level has <b>emergent properties</b> not present at lower levels. A cell can do things atoms alone cannot. An organism has properties no single cell has."}, {"heading": "Domains & Kingdoms of Life", "body": "Three domains: <b>Bacteria</b> (prokaryotic, no nucleus), <b>Archaea</b> (prokaryotic, extremophiles), <b>Eukarya</b> (eukaryotic, has nucleus). Eukarya includes 4 kingdoms: <b>Protista</b> (mostly unicellular), <b>Fungi</b> (decomposers), <b>Plantae</b> (photosynthetic), <b>Animalia</b> (multicellular, heterotrophic). <b>Prokaryotes</b> lack a membrane-bound nucleus; <b>eukaryotes</b> have one."}, {"heading": "Key Concepts Summary", "body": "<b>Scientific method:</b> observe → question → hypothesize → experiment → analyze → conclude. <b>Variables:</b> IV (changed), DV (measured), controlled (constant). <b>Null hypothesis:</b> no effect. <b>SI units:</b> meter, kilogram, second, kelvin. <b>Prefixes:</b> kilo, centi, milli, micro, nano. <b>Accuracy</b> = closeness to true value; <b>precision</b> = reproducibility. <b>Theory</b> explains why; <b>law</b> describes what. <b>Correlation ≠ causation.</b> <b>Peer review</b> ensures quality."}], "quiz": [{"q": "Science relies on ___ evidence:", "a": ["Anecdotal", "Empirical", "Emotional", "Traditional"], "c": 1}, {"q": "A hypothesis must be:", "a": ["Proven true", "Falsifiable (testable)", "Based on opinion", "Unchangeable"], "c":  is:", "a": ["Pound", "Gram", "Kilogram", "Ounce"], "c": 2}, {"q": "1 kilometer = ___ meters:", "a": ["10", "100", "1,000", "10,000"], "c": 2}, {"q": "1 meter = ___ centimeters:", "a": ["10", "100", "1,000", "0.01"], "c": 1}, {"q": "1 liter = ___ milliliters:", "a": ["10", "100", "1,000", "10,000"], "c": 2}, {"q": "Milli- means:", "a": ["1,000", "0.01", "0.001", "0.000001"], "c": 2}, {"q": "Micro- (μ) means:", "a": ["0.001", "0.000001 (10⁻⁶)", "0.01", "1,000"], "c": 1}, {"q": "Nano- means:", "a": ["10⁻³", "10⁻⁶", "10⁻⁹", "10⁻¹²"], "c": 2}, {"q": "Water freezes at ___ °C:", "a": ["32", "100", "0", "-273"], "c": 2}, {"q": "Water boils at ___ °C:", "a": ["0", "100", "212", "373"], "c": 1}, {"q": "Absolute zero is:", "a": ["0°C", "0 K (−273°C)", "−100°C", "100 K"], "c": 1}, {"q": "To convert °C to Kelvin:", "a": ["Subtract 273", "Add 273", "Multiply by 9/5", "Divide by 2"], "c": 1}, {"q": "Accuracy measures closeness to:", "a": ["Other measurements", "The true/accepted value", "The mean", "Zero"], "c": 1}, {"q": "Precision measures:", "a": ["Closeness to true value", "Reproducibility of repeated measurements", "Speed of measurement", "Instrument cost"], "c": 1}, {"q": "0.00340 has ___ significant figures:", "a": ["2", "3", "4", "5"], "c": 1}, {"q": "6,020,000 in scientific notation:", "a": ["6.02 × 10⁵", "6.02 × 10⁶", "60.2 × 10⁵", "0.602 × 10⁷"], "c": 1}, {"q": "A negative exponent in scientific notation means:", "a": ["Large number", "Small number", "Negative number", "Zero"], "c": 1}, {"q": "Read a graduated cylinder at the:", "a": ["Top of meniscus", "Bottom of meniscus", "Middle", "Side"], "c": 1}, {"q": "Independent variable goes on the:", "a": ["Y-axis", "X-axis", "Title", "Legend"], "c": 1}, {"q": "Dependent variable goes on the:", "a": ["X-axis", "Y-axis", "Title", "Legend"], "c": 1}, {"q": "Correlation equals causation:", "a": ["Always", "Never — correlation ≠ causation", "Sometimes", "Only in biology"], "c": 1}, {"q": "Inductive reasoning goes from:", "a": ["General to specific", "Specific observations to general conclusion", "Conclusion to hypothesis", "Law to theory"], "c": 1}, {"q": "Deductive reasoning goes from:", "a": ["Specific to general", "General principle to specific prediction", "Data to hypothesis", "Observation only"], "c": 1}, {"q": "Peer review ensures:", "a": ["Profit", "Scientific quality and accuracy", "Popularity", "Speed"], "c": 1}, {"q": "Informed consent is required for:", "a": ["Animal research", "Human research", "All chemistry", "Plant studies"], "c": 1}, {"q": "% Error formula:", "a": ["|exp−accepted|/accepted × 100", "(exp+accepted)/2", "exp × accepted", "exp − accepted"], "c": 0}, {"q": "Mean is the:", "a": ["Middle value", "Average", "Most frequent", "Range"], "c": 1}, {"q": "Median is the:", "a": ["Average", "Middle value when ordered", "Most frequent", "Spread"], "c": 1}, {"q": "Mode is the:", "a": ["Average", "Middle value", "Most frequent value", "Range"], "c": 2}, {"q": "Standard deviation measures:", "a": ["The average", "How spread out data are", "The median", "The mode"], "c": 1}, {"q": "Low standard deviation means data are:", "a": ["Spread out", "Close to the mean (precise)", "Inaccurate", "Random"], "c": 1}, {"q": "Characteristics of life include all EXCEPT:", "a": ["Cells", "Reproduction", "Crystalline structure", "Homeostasis"], "c": 2}, {"q": "Viruses are debated as living because they lack:", "a": ["DNA", "Cells and independent metabolism", "Protein", "Size"], "c": 1}, {"q": "Correct order from smallest to largest:", "a": ["Cell → atom → tissue → organ", "Atom → molecule → cell → tissue → organ", "Organ → tissue → cell → atom", "Tissue → cell → molecule → atom"], "c": 1}, {"q": "Emergent properties appear at:", "a": ["Only the atomic level", "Higher levels of organization", "Only in dead things", "Nowhere"], "c": 1}, {"q": "Three domains of life:", "a": ["Plants, Animals, Fungi", "Bacteria, Archaea, Eukarya", "Protista, Plantae, Animalia", "Virus, Bacteria, Eukarya"], "c": 1} called:", "a": ["Quantitative", "Qualitative", "Numerical", "Statistical"], "c": 1}, {"q": "The gold standard for reducing bias is:", "a": ["No controls", "Single-blind", "Double-blind", "Triple-blind"], "c": 2}, {"q": "Pico- (p) equals:", "a": ["10⁻⁶", "10⁻⁹", "10⁻¹²", "10⁻³"], "c": 2}, {"q": "Mass is measured with a:", "a": ["Graduated cylinder", "Balance/scale", "Ruler", "Thermometer"], "c": 1}, {"q": "Temperature in science is usually measured in:", "a": ["Fahrenheit", "Celsius or Kelvin", "Only Kelvin", "Only Fahrenheit"], "c": 1}, {"q": "Which variable is on the Y-axis of a graph?", "a": ["Independent", "Dependent", "Controlled", "Constant"], "c": 1}, {"q": "Hecto- (h) means:", "a": ["10", "100", "1,000", "0.1"], "c": 1}, {"q": "Deka- (da) means:", "a": ["10", "100", "0.1", "0.01"], "c": 0}, {"q": "Deci- (d) means:", "a": ["10", "1", "0.1", "0.01"], "c": 2}, {"q": "Response to stimuli is a characteristic of:", "a": ["Only animals", "All living things", "Only plants", "Non-living things"], "c": 1}, {"q": "An organ system is made of multiple:", "a": ["Atoms", "Cells only", "Organs working together", "Molecules"], "c": 2}, {"q": "A tissue is a group of similar:", "a": ["Organs", "Cells", "Organisms", "Organ systems"], "c": 1}, {"q": "An organ is made of multiple:", "a": ["Organ systems", "Organisms", "Tissues", "Populations"], "c": 2}, {"q": "A community consists of:", "a": ["One species", "Multiple populations of different species", "One organism", "Only plants"], "c": 1}, {"q": "An ecosystem includes:", "a": ["Only living things", "Only non-living things", "Living and non-living components", "Only water"], "c": 2}, {"q": "Fahrenheit is NOT used in science because:", "a": ["It's too accurate", "The metric system uses Celsius/Kelvin", "It's too cold", "It doesn't exist"], "c": 1}, {"q": "32°F equals ___ °C:", "a": ["100", "0", "32", "-40"], "c": 1}, {"q": "212°F equals ___ °C:", "a": ["0", "100", "212", "373"], "c": 1}, {"q": "A pie chart shows:", "a": ["Continuous data", "Categorical trends", "Parts of a whole", "Only time data"], "c": 2}, {"q": "The line of best fit shows:", "a": ["Every data point exactly", "The overall trend", "Only errors", "Nothing"], "c": 1}, {"q": "Fabrication, falsification, and plagiarism are:", "a": ["Good practices", "Scientific misconduct", "Required in science", "Optional"], "c": 1}, {"q": "An experiment tests ___ variable(s) at a time:", "a": ["All", "Two", "One", "Zero"], "c": 2}, {"q": "Without a control group, you can't determine if changes are due to:", "a": ["Luck", "The IV or other factors", "Nothing", "The DV"], "c": 1}, {"q": "Kelvin scale starts at:", "a": ["0°C", "Absolute zero (0 K)", "100°C", "−100°C"], "c": 1}, {"q": "1 kg = ___ g:", "a": ["10", "100", "1,000", "10,000"], "c": 2}, {"q": "1 mg = ___ g:", "a": ["0.1", "0.01", "0.001", "0.0001"], "c": 2}, {"q": "Conversion factor for mL to L: divide by:", "a": ["10", "100", "1,000", "10,000"], "c": 2}, {"q": "A graph title should describe:", "a": ["The experimenter", "The relationship between variables", "Only the date", "Nothing"], "c": 1}, {"q": "Graph axes must include:", "a": ["Only numbers", "Labels with units", "Only colors", "Nothing"], "c": 1}, {"q": "Science seeks ___ explanations for natural phenomena:", "a": ["Supernatural", "Natural", "Magical", "Random"], "c": 1}, {"q": "Theories can be:", "a": ["Never changed", "Modified with new evidence", "Only created once", "Replaced by guesses"], "c": 1}, {"q": "A hypothesis is NOT:", "a": ["Testable", "Falsifiable", "A proven fact", "An educated prediction"], "c": 2}, {"q": "Empirical evidence is gathered through:", "a": ["Dreams", "Senses or instruments", "Authority", "Tradition"], "c": 1}, {"q": "When data don't support a hypothesis, it is:", "a": ["Ignored", "Rejected or revised", "Proven wrong forever", "Hidden"], "c": 1}, {"q": "The iterative nature of science means:", "a": ["It happens once", "Results lead to new questions and refinement", "Nothing changes", "It stops after one experiment"], "c": 1}]}, {"id": "bio-l2", "title": "Lesson 2: Water & Carbon", "ln": "BIO · L2", "notes": [{"heading": "Why Water Matters", "body": "Water is essential for all known life. Covers ~71% of Earth's surface. Makes up <b>60-70% of human body mass</b>. Acts as the universal solvent — dissolves more substances than any other liquid. All biochemical reactions occur in aqueous (water-based) solutions. Life originated in water and depends on its unique properties."}, {"heading": "Water's Molecular Structure", "body": "Chemical formula: <b>H₂O</b> — two hydrogen atoms covalently bonded to one oxygen atom. Bent/V-shaped geometry with a <b>104.5° bond angle</b>. Oxygen is more <b>electronegative</b> than hydrogen → electrons are pulled toward oxygen → creates a <b>polar molecule</b> (partial negative charge on O, partial positive on each H). This polarity is the key to all of water's special properties."}, {"heading": "Polar Molecules & Electronegativity", "body": "<b>Electronegativity:</b> an atom's ability to attract shared electrons. Oxygen (3.44) >> Hydrogen (2.20). The uneven sharing creates <b>polar covalent bonds</b>. A <b>polar molecule</b> has an uneven distribution of charge (one side δ⁻, other side δ⁺). <b>Nonpolar molecules</b> have even charge distribution (e.g., O₂, CH₄). Like dissolves like: polar solvents dissolve polar solutes."}, {"heading": "Hydrogen Bonds", "body": "The positive H of one water molecule attracts the negative O of another, forming a <b>hydrogen bond</b>. Individually <b>weak</b> (~5% strength of a covalent bond), but collectively <b>very strong</b> because there are so many. Each water molecule can form up to <b>4 hydrogen bonds</b>. H-bonds are responsible for water's high boiling point, high specific heat, cohesion, adhesion, and surface tension."}, {"heading": "Cohesion & Adhesion", "body": "<b>Cohesion:</b> water molecules sticking to <b>each other</b> via hydrogen bonds. Enables water to be pulled up through plant stems (transpiration pull). <b>Adhesion:</b> water molecules sticking to <b>other surfaces</b>. Causes water to climb up the sides of a thin glass tube (<b>capillary action</b>). Together, cohesion and adhesion allow water to travel from roots to leaves against gravity."}, {"heading": "Surface Tension", "body": "<b>Surface tension:</b> the tendency of water's surface to resist being broken. Caused by <b>cohesion</b> — molecules at the surface are pulled inward by H-bonds with molecules below them, creating a 'skin.' Water has the <b>highest surface tension</b> of any common liquid except mercury. Examples: insects walking on water, water droplets forming spheres, a needle floating on water."}, {"heading": "High Specific Heat", "body": "<b>Specific heat:</b> the amount of energy needed to raise 1 g of a substance by 1°C. Water's specific heat is <b>4.18 J/g·°C</b> — very high. Means water resists temperature changes. H-bonds must be broken before temperature rises, absorbing lots of energy. <b>Biological importance:</b> stabilizes body temperature, moderates Earth's climate, aquatic organisms experience stable temperatures."}, {"heading": "High Heat of Vaporization", "body": "<b>Heat of vaporization:</b> energy required to convert liquid to gas. Water requires <b>2,260 J/g</b> — very high. Because many H-bonds must be broken to evaporate. <b>Evaporative cooling:</b> when water evaporates from a surface, it removes heat (sweat cooling your body). This is critical for thermoregulation in humans and other organisms."}, {"heading": "Ice Floats — Density Anomaly", "body": "Most substances are denser as solids. Water is the <b>exception</b>: ice is <b>less dense</b> than liquid water. In ice, H-bonds form a rigid, open crystalline lattice with spaces → <b>density of ice = 0.92 g/mL</b> (liquid water = 1.00 g/mL). <b>Biological importance:</b> ice floats, insulating lakes/oceans below → aquatic life survives winter. If ice sank, bodies of water would freeze solid from the bottom up."}, {"heading": "Water as a Solvent", "body": "Water is the <b>'universal solvent'</b> — dissolves more substances than any other liquid. Dissolves <b>polar and ionic</b> substances by surrounding them with water molecules (hydration shells). <b>Hydrophilic:</b> 'water-loving,' dissolves in water (sugars, salts, amino acids). <b>Hydrophobic:</b> 'water-fearing,' does NOT dissolve in water (oils, fats, waxes — nonpolar). <b>Amphipathic:</b> has both hydrophilic and hydrophobic regions (e.g., phospholipids)."}, {"heading": "Acids, Bases & pH", "body": "Water dissociates slightly: H₂O ⇌ <b>H⁺ + OH⁻</b>. <b>Acid:</b> releases H⁺ ions (pH < 7). Examples: HCl, stomach acid (pH ~2), lemon juice (pH ~2). <b>Base:</b> releases OH⁻ ions or accepts H⁺ (pH > 7). Examples: NaOH, bleach (pH ~13), baking soda. <b>Neutral:</b> pH = 7 (pure water). Each pH unit = <b>10× difference</b> in H⁺ concentration (pH 3 is 10× more acidic than pH 4)."}, {"heading": "The pH Scale", "body": "Ranges from <b>0 to 14</b>. <b>0-6:</b> acidic (more H⁺). <b>7:</b> neutral. <b>8-14:</b> basic/alkaline (more OH⁻). <b>Logarithmic scale:</b> pH 4 is 10× more acidic than pH 5, and 100× more acidic than pH 6. Human blood pH: <b>7.35-7.45</b> (slightly basic). Stomach: pH ~2. Small intestine: pH ~8. Even small pH changes can denature proteins and disrupt cellular function."}, {"heading": "Buffers", "body": "<b>Buffers:</b> substances that resist changes in pH by absorbing excess H⁺ or OH⁻. Work by donating or accepting H⁺ ions as needed. Essential for maintaining homeostasis. Example: <b>bicarbonate buffer system</b> in blood (H₂CO₃ ⇌ HCO₃⁻ + H⁺) maintains blood pH at 7.35-7.45. Without buffers, metabolic acids would kill cells. Buffers have a limited capacity — can be overwhelmed."}, {"heading": "Why Carbon Is Special", "body": "Carbon is the <b>backbone of all organic molecules</b>. Has <b>4 valence electrons</b> → can form <b>4 covalent bonds</b> → enormous variety of molecules. Can bond to C, H, O, N, S, P. Forms <b>single, double, and triple bonds</b>. Can create <b>chains, branches, and rings</b>. No other element can form as many diverse, stable compounds. This versatility makes carbon the basis of life's chemistry."}, {"heading": "Organic vs Inorganic", "body": "<b>Organic molecules:</b> contain carbon bonded to hydrogen (and usually O, N, S, P). Made by living things or synthetically. Examples: sugars, proteins, DNA, fats. <b>Inorganic molecules:</b> generally lack C-H bonds. Examples: water (H₂O), NaCl, CO₂ (exception — has carbon but is inorganic), minerals. <b>Exception:</b> CO₂, carbonates, and cyanides contain carbon but are classified as inorganic."}, {"heading": "Carbon Skeletons", "body": "The chain of carbon atoms in an organic molecule = <b>carbon skeleton</b>. Can be: <b>straight chains</b> (butane), <b>branched chains</b> (isobutane), <b>rings</b> (cyclohexane, glucose), or <b>combinations</b>. Length and shape determine molecule properties. Varying the carbon skeleton creates the vast diversity of organic molecules. Even small changes in skeleton → very different properties and functions."}, {"heading": "Hydrocarbons", "body": "Molecules containing <b>only carbon and hydrogen</b>. Examples: methane (CH₄), ethane (C₂H₆), propane (C₃H₈). <b>Nonpolar</b> and <b>hydrophobic</b>. Important as energy sources (fossil fuels). In biology, hydrocarbon regions of molecules (like the tails of fatty acids) are responsible for hydrophobic behavior. The more hydrocarbon character → the less soluble in water."}, {"heading": "Isomers", "body": "Molecules with the <b>same molecular formula</b> but <b>different structures</b>. Three types: <b>Structural isomers:</b> differ in arrangement of carbon skeleton (butane vs isobutane). <b>Cis-trans (geometric) isomers:</b> differ in arrangement around a double bond (cis = same side; trans = opposite sides). <b>Enantiomers:</b> mirror images that cannot be superimposed (like left and right hands). Different isomers can have very different biological activities."}, {"heading": "Functional Groups — Overview", "body": "<b>Functional groups:</b> specific groups of atoms attached to carbon skeletons that determine the molecule's <b>chemical properties and reactivity</b>. Like 'ID tags' that give molecules their characteristics. The 7 most important in biology: hydroxyl, carbonyl, carboxyl, amino, sulfhydryl, phosphate, and methyl. Each has predictable behavior regardless of what carbon skeleton it's attached to."}, {"heading": "Hydroxyl Group (—OH)", "body": "Structure: <b>—OH</b> (oxygen bonded to hydrogen). Found in <b>alcohols</b>. Makes molecules <b>polar and hydrophilic</b> (can form H-bonds with water). Examples: ethanol (C₂H₅OH), sugars (glucose has 5 —OH groups). Name ending: <b>-ol</b>. The more —OH groups a molecule has, the more water-soluble it is."}, {"heading": "Carbonyl Group (C=O)", "body": "Structure: carbon <b>double-bonded to oxygen</b>. Two types: <b>Aldehyde:</b> C=O at the END of the carbon chain (e.g., glucose). <b>Ketone:</b> C=O in the MIDDLE of the chain (e.g., fructose, acetone). Both are polar and reactive. Found in many sugars and metabolic intermediates."}, {"heading": "Carboxyl Group (—COOH)", "body": "Structure: <b>—COOH</b> (carbon double-bonded to O and single-bonded to —OH). Acts as an <b>acid</b> — donates H⁺ in solution, becoming —COO⁻. Found in <b>amino acids, fatty acids, organic acids</b>. Name ending: <b>-ic acid</b> or <b>-oic acid</b>. Example: acetic acid (vinegar). Makes molecules acidic and water-soluble when ionized."}, {"heading": "Amino Group (—NH₂)", "body": "Structure: <b>—NH₂</b> (nitrogen bonded to two hydrogens). Acts as a <b>base</b> — accepts H⁺, becoming —NH₃⁺. Found in <b>amino acids</b> (which have both —NH₂ and —COOH). Name ending: <b>amine</b>. The amino group gives amino acids their basic character. At physiological pH, the amino group is usually protonated (—NH₃⁺)."}, {"heading": "Sulfhydryl Group (—SH)", "body": "Structure: <b>—SH</b> (sulfur bonded to hydrogen). Found in amino acid <b>cysteine</b>. Two —SH groups can form a <b>disulfide bond (S—S)</b> through oxidation — crucial for <b>protein folding and structure</b> (tertiary/quaternary structure). Name ending: <b>thiol</b>. Disulfide bonds stabilize the 3D shape of proteins like antibodies and keratin (hair)."}, {"heading": "Phosphate Group (—PO₄)", "body": "Structure: phosphorus bonded to 4 oxygens (<b>—OPO₃²⁻</b>). <b>Negatively charged</b> at physiological pH → very hydrophilic. Found in <b>ATP</b> (energy currency), <b>DNA and RNA</b> (sugar-phosphate backbone), <b>phospholipids</b> (cell membranes). Transfer of phosphate groups (<b>phosphorylation</b>) activates/deactivates enzymes and is central to energy metabolism."}, {"heading": "Methyl Group (—CH₃)", "body": "Structure: <b>—CH₃</b> (carbon bonded to 3 hydrogens). <b>Nonpolar and hydrophobic</b>. Does NOT participate in chemical reactions directly. Important for <b>gene regulation:</b> adding methyl groups to DNA (<b>DNA methylation</b>) typically <b>silences genes</b>. Also affects protein function. Example: methylation of histones affects gene expression (epigenetics)."}, {"heading": "Dehydration Synthesis (Condensation)", "body": "<b>Dehydration synthesis:</b> joining two monomers by <b>removing a water molecule</b> (H from one + OH from another → H₂O). Builds <b>polymers</b> from monomers. Also called <b>condensation reaction</b>. Requires <b>energy input</b> (endergonic). Examples: linking amino acids → peptide bonds (proteins); linking monosaccharides → glycosidic bonds (polysaccharides); linking nucleotides → phosphodiester bonds (DNA/RNA)."}, {"heading": "Hydrolysis", "body": "<b>Hydrolysis:</b> breaking polymers into monomers by <b>adding a water molecule</b> (H₂O splits, H goes to one fragment, OH to the other). The <b>reverse of dehydration synthesis</b>. Releases <b>energy</b> (exergonic). Examples: digestion of food (breaking starch into glucose), breaking proteins into amino acids. Enzymes catalyze hydrolysis reactions in the body."}, {"heading": "Monomers & Polymers", "body": "<b>Monomer:</b> a single small molecule (building block). <b>Polymer:</b> a large molecule made of many monomers linked together. The 4 major types of biological macromolecules: <b>Carbohydrates</b> (monomer: monosaccharide), <b>Proteins</b> (monomer: amino acid), <b>Nucleic acids</b> (monomer: nucleotide), <b>Lipids</b> (NOT true polymers — made of glycerol + fatty acids). All built/broken by dehydration synthesis/hydrolysis."}, {"heading": "Covalent vs Ionic vs Hydrogen Bonds", "body": "<b>Covalent:</b> atoms <b>share</b> electrons. Strongest bond. Polar (unequal sharing) or nonpolar (equal sharing). <b>Ionic:</b> electrons <b>transferred</b> from one atom to another → opposite charges attract (Na⁺Cl⁻). Strong in crystals, weak in water. <b>Hydrogen:</b> weak attraction between δ⁺ H and δ⁻ electronegative atom (O, N, F). Weakest individually but critical in large numbers (water, DNA, proteins)."}, {"heading": "Van der Waals Forces", "body": "Very weak, temporary attractions between molecules caused by <b>momentary uneven electron distributions</b>. Even nonpolar molecules experience them. Individually very weak, but collectively significant when many atoms interact (e.g., gecko feet sticking to walls). Important in <b>protein folding</b> and <b>molecular recognition</b>."}, {"heading": "Key Concepts Summary", "body": "<b>Water:</b> polar, H-bonds (up to 4), high specific heat (4.18 J/g·°C), high heat of vaporization, ice floats (0.92 g/mL), universal solvent, cohesion/adhesion/surface tension. <b>pH:</b> 0-14, log scale, buffers resist change. <b>Carbon:</b> 4 bonds, chains/branches/rings, isomers. <b>Functional groups:</b> —OH, C=O, —COOH (acid), —NH₂ (base), —SH (disulfide bonds), —PO₄ (ATP/DNA), —CH₃ (gene regulation). <b>Dehydration synthesis</b> builds polymers (−H₂O); <b>hydrolysis</b> breaks them (+H₂O)."}], "quiz": [{"q": "Water ma  "None"], "c": 1}, {"q": "Methane (CH₄) is a:", "a": ["Polar molecule", "Hydrocarbon", "Amino acid", "Nucleotide"], "c": 1}, {"q": "Fossil fuels are largely:", "a": ["Proteins", "Hydrocarbons", "Nucleic acids", "Carbohydrates"], "c": 1}, {"q": "Cyclohexane is an example of a ___ carbon skeleton:", "a": ["Straight chain", "Branched", "Ring", "None"], "c": 2}, {"q": "Different isomers can have ___ biological activities:", "a": ["Identical", "Very different", "No", "Only similar"], "c": 1}, {"q": "The name ending '-ol' indicates:", "a": ["An amino group", "A hydroxyl group (alcohol)", "A carboxyl group", "A phosphate"], "c": 1}, {"q": "The name ending '-ic acid' indicates:", "a": ["Hydroxyl", "Carboxyl group", "Amino group", "Methyl"], "c": 1}, {"q": "Acetic acid (vinegar) contains a ___ group:", "a": ["Amino", "Carboxyl (—COOH)", "Phosphate", "Sulfhydryl"], "c": 1}, {"q": "Acetone contains a ___ group:", "a": ["Aldehyde", "Ketone (C=O in middle)", "Carboxyl", "Amino"], "c": 1}, {"q": "ATP contains ___ phosphate groups:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "The sugar-phosphate backbone of DNA uses ___ bonds:", "a": ["Peptide", "Glycosidic", "Phosphodiester", "Hydrogen"], "c": 2}, {"q": "Gene silencing by methylation is an example of:", "a": ["Mutation", "Epigenetics", "Translation", "Transcription"], "c": 1}, {"q": "Starch broken into glucose uses:", "a": ["Dehydration synthesis", "Hydrolysis", "Phosphorylation", "Methylation"], "c": 1}, {"q": "Linking nucleotides into DNA uses:", "a": ["Hydrolysis", "Dehydration synthesis", "Only H-bonds", "Ionic bonds"], "c": 1}, {"q": "Van der Waals forces are important in:", "a": ["Nothing biological", "Protein folding and molecular recognition", "Only gases", "Only metals"], "c": 1}, {"q": "Water's formula H₂O means:", "a": ["2 oxygen, 1 hydrogen", "2 hydrogen, 1 oxygen", "1 of each", "3 oxygen"], "c": 1}, {"q": "Carbon can bond to C, H, O, N, S, and:", "a": ["Only metals", "P (phosphorus)", "Noble gases", "Nothing else"], "c": 1}, {"q": "The 7 functional groups important in biology include all EXCEPT:", "a": ["Hydroxyl", "Carboxyl", "Amino", "Neon"], "c": 3}, {"q": "Fatty acid tails are ___ due to hydrocarbon character:", "a": ["Hydrophilic", "Hydrophobic", "Charged", "Polar"], "c": 1}, {"q": "A molecule with more —OH groups is more:", "a": ["Hydrophobic", "Water-soluble (hydrophilic)", "Nonpolar", "Gaseous"], "c": 1}, {"q": "Water's polarity allows it to form ___ around dissolved ions:", "a": ["Covalent bonds", "Hydration shells", "Vacuums", "Crystals"], "c": 1}, {"q": "Thermoregulation in humans relies on water's:", "a": ["Low specific heat", "High heat of vaporization (sweating)", "Low boiling point", "Density"], "c": 1}, {"q": "The carbonyl group structure is:", "a": ["—OH", "C=O", "—NH₂", "—SH"], "c": 1}, {"q": "Fructose contains a ___ group:", "a": ["Aldehyde", "Ketone", "Amino", "Phosphate"], "c": 1}, {"q": "Glucose contains an ___ group:", "a": ["Ketone", "Aldehyde", "Sulfhydryl", "Methyl"], "c": 1}, {"q": "At physiological pH, the amino group is usually:", "a": ["—NH₂", "—NH₃⁺ (protonated)", "—NH⁻", "Unchanged"], "c": 1}, {"q": "Thiol is another name for the:", "a": ["Hydroxyl group", "Sulfhydryl group", "Carboxyl group", "Amino group"], "c": 1}, {"q": "Oxidation of two —SH groups creates a:", "a": ["Peptide bond", "Disulfide bond (S—S)", "Glycosidic bond", "Hydrogen bond"], "c": 1}, {"q": "H-bonds in water are responsible for ALL of these EXCEPT:", "a": ["High specific heat", "Surface tension", "Covalent bond strength", "Ice floating"], "c": 2}, {"q": "Antibodies are stabilized by:", "a": ["Only peptide bonds", "Disulfide bonds", "Only ionic bonds", "No bonds"], "c": 1}, {"q": "The bent shape of water (104.5°) is due to lone pairs on:", "a": ["Hydrogen", "Oxygen", "Carbon", "Nitrogen"], "c": 1}]}, {"id": "bio-l3", "title": "Lesson 3: Biological Molecules", "ln": "BIO · L3", "notes": [{"heading": "The Four Macromolecules", "body": "All living things are built from <b>4 classes of biological macromolecules:</b> <b>1) Carbohydrates</b> (sugars, starches, fiber). <b>2) Lipids</b> (fats, oils, waxes, steroids, phospholipids). <b>3) Proteins</b> (enzymes, structural, transport). <b>4) Nucleic acids</b> (DNA, RNA). All except lipids are true polymers. All are built from C, H, O (plus N, S, P for some). They are assembled by <b>dehydration synthesis</b> and broken by <b>hydrolysis</b>."}, {"heading": "Carbohydrates — Overview", "body": "General formula: <b>(CH₂O)ₙ</b> — ratio of C:H:O = 1:2:1. Functions: <b>quick energy</b> (glucose), <b>energy storage</b> (starch, glycogen), <b>structural support</b> (cellulose, chitin). Classified by size: <b>monosaccharides</b> (1 sugar), <b>disaccharides</b> (2 sugars), <b>polysaccharides</b> (many sugars). Most abundant organic molecules on Earth."}, {"heading": "Monosaccharides", "body": "<b>Simple sugars</b> — the monomers of carbohydrates. 3-7 carbons. Named by carbon count: <b>triose</b> (3C — glyceraldehyde), <b>pentose</b> (5C — ribose, deoxyribose), <b>hexose</b> (6C — glucose, fructose, galactose). <b>Glucose (C₆H₁₂O₆):</b> most important fuel molecule, central to cellular respiration. Fructose: fruit sugar. Galactose: milk sugar component. In solution, hexoses form <b>ring structures</b>."}, {"heading": "Disaccharides", "body": "<b>Two monosaccharides</b> joined by a <b>glycosidic bond</b> via dehydration synthesis. <b>Sucrose</b> = glucose + fructose (table sugar). <b>Lactose</b> = glucose + galactose (milk sugar). <b>Maltose</b> = glucose + glucose (malt sugar, from starch digestion). Broken by hydrolysis during digestion. <b>Lactose intolerance:</b> lacking the enzyme <b>lactase</b> → can't digest lactose → gas, bloating, diarrhea."}, {"heading": "Polysaccharides — Storage", "body": "Long chains of monosaccharides. <b>Storage polysaccharides:</b> <b>Starch</b> — plant energy storage (amylose = unbranched, amylopectin = branched). Found in potatoes, rice, wheat. <b>Glycogen</b> — animal energy storage, stored in <b>liver and muscle</b> cells. Highly branched (more branched than amylopectin). Both are polymers of <b>α-glucose</b> linked by <b>α-glycosidic bonds</b>."}, {"heading": "Polysaccharides — Structural", "body": "<b>Cellulose:</b> structural polysaccharide in <b>plant cell walls</b>. Made of <b>β-glucose</b> linked by <b>β-glycosidic bonds</b> → straight, rigid chains that form strong fibers. Most abundant organic molecule on Earth. Humans <b>cannot digest</b> cellulose (lack cellulase enzyme) → it's dietary <b>fiber</b>. <b>Chitin:</b> structural polysaccharide in arthropod exoskeletons and fungal cell walls. Contains nitrogen."}, {"heading": "α vs β Glucose", "body": "<b>α-glucose:</b> —OH on carbon 1 points <b>DOWN</b> (below the ring). Forms starch and glycogen. Digestible by humans. <b>β-glucose:</b> —OH on carbon 1 points <b>UP</b> (above the ring). Forms cellulose. NOT digestible by humans. This tiny difference in orientation completely changes the 3D structure and function of the resulting polysaccharide."}, {"heading": "Lipids — Overview", "body": "Diverse group: fats, oils, waxes, phospholipids, steroids. <b>NOT true polymers</b> (not long chains of identical monomers). Largely <b>hydrophobic</b> (nonpolar). Functions: <b>long-term energy storage</b> (9 kcal/g vs 4 for carbs), <b>insulation</b>, <b>cushioning organs</b>, <b>cell membranes</b> (phospholipids), <b>hormones</b> (steroids), <b>waterproofing</b> (waxes). Do NOT dissolve in water."}, {"heading": "Triglycerides (Fats & Oils)", "body": "Most common lipid. Structure: <b>1 glycerol + 3 fatty acids</b> linked by <b>ester bonds</b> (via dehydration synthesis). <b>Glycerol:</b> 3-carbon alcohol. <b>Fatty acid:</b> long hydrocarbon chain with a carboxyl group (—COOH) at one end. Fats store <b>2× more energy</b> per gram than carbohydrates because of more C-H bonds."}, {"heading": "Saturated vs Unsaturated Fats", "body": "<b>Saturated:</b> NO double bonds between carbons. Chains are <b>straight</b> → pack tightly → <b>solid at room temp</b> (butter, lard, animal fat). Associated with heart disease. <b>Unsaturated:</b> one or more <b>C=C double bonds</b> → causes <b>kinks/bends</b> → can't pack tightly → <b>liquid at room temp</b> (oils — olive, fish). <b>Monounsaturated:</b> 1 double bond. <b>Polyunsaturated:</b> 2+ double bonds."}, {"heading": "Trans Fats & Hydrogenation", "body": "<b>Hydrogenation:</b> adding H atoms to unsaturated fats → makes them more saturated → solidifies them (margarine). Creates <b>trans fats</b> — where Hs are on opposite sides of double bond (vs cis = same side). Trans fats are <b>strongly linked to heart disease</b> — raise LDL ('bad' cholesterol) and lower HDL ('good'). Banned/restricted in many countries."}, {"heading": "Phospholipids", "body": "Structure: <b>glycerol + 2 fatty acids + 1 phosphate group</b>. <b>Amphipathic:</b> hydrophilic phosphate head + hydrophobic fatty acid tails. In water, spontaneously form a <b>bilayer</b> — heads face water, tails face inward. This is the basis of all <b>cell membranes</b> (<b>phospholipid bilayer</b>). Critical for compartmentalization of cells."}, {"heading": "Steroids", "body": "Structure: <b>4 fused carbon rings</b> (not a chain). <b>Cholesterol:</b> found in animal cell membranes, precursor to steroid hormones, vitamin D, and bile salts. <b>Steroid hormones:</b> estrogen, testosterone, cortisol — all derived from cholesterol. Small chemical differences → very different biological effects. Cholesterol also helps maintain <b>membrane fluidity</b>."}, {"heading": "Waxes", "body": "Long-chain fatty acids bonded to long-chain alcohols. <b>Extremely hydrophobic</b> — excellent waterproofing. Found on: leaf surfaces (cuticle — prevents water loss), insect exoskeletons, bird feathers, ear canals (cerumen). <b>Very firm</b> at room temperature."}, {"heading": "Proteins — Overview", "body": "Most diverse macromolecules. Made of <b>amino acids</b> (20 types). Functions: <b>enzymes</b> (catalyze reactions), <b>structural</b> (collagen, keratin), <b>transport</b> (hemoglobin), <b>movement</b> (actin, myosin), <b>defense</b> (antibodies), <b>signaling</b> (hormones like insulin), <b>storage</b> (ferritin). Protein function depends entirely on its <b>3D shape</b>."}, {"heading": "Amino Acid Structure", "body": "All 20 amino acids share: <b>central carbon (α-carbon)</b> bonded to: <b>amino group (—NH₂)</b>, <b>carboxyl group (—COOH)</b>, <b>hydrogen atom</b>, and a unique <b>R-group (side chain)</b>. The R-group determines the amino acid's identity and properties. R-groups can be <b>nonpolar</b> (hydrophobic), <b>polar</b> (hydrophilic), <b>positively charged</b>, or <b>negatively charged</b>."}, {"heading": "Peptide Bonds & Polypeptides", "body": "Amino acids linked by <b>peptide bonds</b> (formed by dehydration synthesis between —COOH of one and —NH₂ of another). <b>Dipeptide:</b> 2 amino acids. <b>Polypeptide:</b> chain of many amino acids. A polypeptide has <b>directionality:</b> N-terminus (free —NH₂) and C-terminus (free —COOH). Proteins = one or more polypeptide chains folded into a specific 3D shape."}, {"heading": "Protein Structure — 4 Levels", "body": "<b>Primary (1°):</b> linear sequence of amino acids (determined by DNA). <b>Secondary (2°):</b> local folding into <b>α-helices</b> and <b>β-pleated sheets</b> (stabilized by H-bonds along backbone). <b>Tertiary (3°):</b> overall 3D shape of ONE polypeptide (stabilized by R-group interactions: H-bonds, ionic bonds, disulfide bridges, hydrophobic interactions, van der Waals). <b>Quaternary (4°):</b> multiple polypeptide subunits assembled together (e.g., hemoglobin has 4 subunits)."}, {"heading": "Denaturation", "body": "<b>Denaturation:</b> loss of a protein's 3D shape → <b>loss of function</b>. Caused by: <b>heat</b> (cooking an egg), <b>pH changes</b> (stomach acid), <b>salt concentration</b>, <b>heavy metals</b>, <b>chemicals</b>. Breaks the weak bonds (H-bonds, ionic, hydrophobic interactions) holding the shape. Primary structure (amino acid sequence) is NOT destroyed. Sometimes proteins can <b>refold</b>, but often denaturation is permanent."}, {"heading": "Enzymes (Protein Function)", "body": "<b>Biological catalysts</b> — speed up reactions without being consumed. Lower the <b>activation energy</b>. Highly <b>specific</b>: each enzyme catalyzes one reaction or type of reaction. <b>Active site:</b> region where substrate binds. <b>Lock-and-key model:</b> active site shape matches substrate. <b>Induced fit model:</b> active site adjusts slightly to fit substrate (more accurate). Enzyme names often end in <b>-ase</b>."}, {"heading": "Nucleic Acids — Overview", "body": "Two types: <b>DNA</b> (deoxyribonucleic acid) and <b>RNA</b> (ribonucleic acid). Function: <b>store and transmit genetic information</b>. Monomers: <b>nucleotides</b>. DNA stores hereditary info; RNA helps translate DNA into proteins. Found in all living cells."}, {"heading": "Nucleotide Structure", "body": "Each nucleotide has 3 parts: <b>1) 5-carbon sugar</b> (ribose in RNA, deoxyribose in DNA). <b>2) Phosphate group</b>. <b>3) Nitrogenous base</b>. Bases: <b>Purines</b> (2 rings) = Adenine (A), Guanine (G). <b>Pyrimidines</b> (1 ring) = Cytosine (C), Thymine (T) — DNA only, Uracil (U) — RNA only. Nucleotides linked by <b>phosphodiester bonds</b> (sugar-phosphate backbone)."}, {"heading": "DNA vs RNA", "body": "<b>DNA:</b> double-stranded helix, sugar = deoxyribose, bases = A, T, G, C, found in nucleus, very stable, stores genetic info. <b>RNA:</b> single-stranded, sugar = ribose, bases = A, U, G, C, found in nucleus and cytoplasm, less stable, multiple functions (mRNA, tRNA, rRNA). Base pairing: <b>A-T</b> (2 H-bonds) in DNA; <b>A-U</b> in RNA; <b>G-C</b> (3 H-bonds) in both."}, {"heading": "ATP — Energy Currency", "body": "<b>Adenosine triphosphate:</b> modified nucleotide = adenine + ribose + <b>3 phosphate groups</b>. Energy stored in <b>phosphate bonds</b> (especially the last one). When the terminal phosphate is removed (hydrolysis): ATP → <b>ADP + Pᵢ + energy</b>. This released energy powers cellular work (muscle contraction, active transport, biosynthesis). ATP is constantly recycled (~1,000-1,500 times/day per molecule)."}, {"heading": "Macromolecule Comparison Table", "body": "<b>Carbs:</b> monomer = monosaccharide, bond = glycosidic, elements = C,H,O, function = energy/structure. <b>Lipids:</b> glycerol + fatty acids, ester bond, C,H,O, function = energy storage/membranes. <b>Proteins:</b> monomer = amino acid, bond = peptide, C,H,O,N,S, function = enzymes/structure/transport. <b>Nucleic acids:</b> monomer = nucleotide, bond = phosphodiester, C,H,O,N,P, function = genetic info/energy (ATP)."}, {"heading": "Key Concepts Summary", "body": "<b>Carbs:</b> (CH₂O)ₙ, mono/di/polysaccharides, glucose is key fuel, starch (plant storage), glycogen (animal storage), cellulose (plant structure, β-glucose, indigestible fiber). <b>Lipids:</b> triglycerides (glycerol+3 fatty acids), saturated (solid) vs unsaturated (liquid/kinks), phospholipids (bilayer membranes), steroids (4 rings, cholesterol). <b>Proteins:</b> 20 amino acids, peptide bonds, 4 levels of structure, denaturation = shape loss. <b>Nucleic acids:</b> DNA (A-T, G-C) vs RNA (A-U, G-C), nucleotides, ATP = energy."}], "quiz": [{"q": "The 4 macromolecules are:", "a": ["Water, salt, acid, base", "Carbs, lipids, proteins, nucleic acids", "Only DNA and protein", "Only lipids and carbs"], "c": 1}, {"q": "General formula for carbohydrates:", "a": ["(CH₂O)ₙ", "(CHO)ₙ", "(CO₂)ₙ", "(H₂O)ₙ"], "c": 0}, {"q": "Monosaccharides are:", "a": ["Many sugars linked", "Two sugars linked", "Single simple sugars", "Polysaccharides"], "c": 2}, {"q": "Glucose molecular formula:", "a": ["C₅H₁₀O₅", "C₆H₁₂O₆", "C₁₂H₂₂O₁₁", "CH₂O"], "c": 1}, {"q": "A hexose has ___ carbons:", "a": ["3", "5", "6", "7"], "c": 2}, {"q": "A pentose has ___ carbons:", "a": ["3", "5", "6", "7"], "c": 1}, {"q": "Ribose is a ___ sugar found in:", "a": ["Hexose / DNA", "Pentose / RNA", "Triose / lipids", "Hexose / starch"], "c": 1}, {"q": "Sucrose = glucose +:", "a": ["Galactose", "Fructose", "Glucose", "Ribose"], "c": 1}, {"q": "Lactose = glucose +:", "a": ["Fructose", "Galactose", "Glucose", "Maltose"], "c": 1}, {"q": "Maltose = glucose +:", "a": ["Fructose", "Galactose", "Glucose", "Sucrose"], "c": 2}, {"q": "Disaccharides are joined by ___ bonds:", "a": ["Peptide", "Glycosidic", "Phosphodiester", "Hydrogen"], "c": 1}, {"q": "Lactose intolerance is from lacking:", "a": ["Amylase", "Lactase", "Lipase", "Protease"], "c": 1}, {"q": "Starch is storage in:", "a": ["Animals", "Plants", "Fungi", "Bacteria"], "c": 1}, {"q": "Glycogen is storage in:", "a": ["Plants", "Animals (liver and muscle)", "Fungi", "Bacteria"], "c": 1}, {"q": "Glycogen is ___ branched than amylopectin:", "a": ["Less", "Equally", "More highly", "Not"], "c": 2}, {"q": "Cellulose provides ___ in plant cell walls:", "a": ["Energy", "Structural support", "Color", "Flavor"], "c": 1}, {"q": "Cellulose is made of ___ glucose:", "a": ["α", "β", "γ", "δ"], "c": 1}, {"q": "Humans cannot digest cellulose because they lack:", "a": ["Amylase", "Cellulase", "Lactase", "Lipase"], "c": 1}, {"q": "Cellulose in our diet is called:", "a": ["Starch", "Fiber", "Glycogen", "Sugar"], "c": 1}, {"q": "α-glucose has —OH on C1 pointing:", "a": ["Up", "Down", "Sideways", "Inward"], "c": 1}, {"q": "β-glucose has —OH on C1 pointing:", "a": ["Down", "Up", "Sideways", "Inward"], "c": 1}, {"q": "Chitin is found in:", "a": ["Plant cell walls", "Arthropod exoskeletons and fungal walls", "Human bones", "Fish scales"], "c": 1}, {"q": "Lipids store ___ kcal/g vs 4 for carbs:", "a": ["2", "5", "9", "12"], "c": 2}, {"q": "Triglyceride = glycerol +:", "a": ["2 fatty acids", "3 fatty acids", "1 fatty acid", "4 fatty acids"], "c": 1}, {"q": "Fatty acids have a ___ group at one end:", "a": ["Amino", "Carboxyl (—COOH)", "Phosphate", "Methyl"], "c": 1}, {"q": "Saturated fats have ___ double bonds:", "a": ["Many", "Some", "No", "Only triple"], "c": 2}, {"q": "Saturated fats are ___ at room temperature:", "a": ["Liquid", "Solid", "Gas", "Plasma"], "c": 1}, {"q": "Unsaturated fats are ___ at room temperature:", "a": ["Solid", "Liquid", "Gas", "Frozen"], "c": 1}, {"q": "Double bonds in unsaturated fats create:", "a": ["Straight chains", "Kinks/bends", "Branches", "Rings"], "c": 1}, {"q": "Monounsaturated has ___ double bond(s):", "a": ["0", "1", "2+", "Many"], "c": 1}, {"q": "Polyunsaturated has ___ double bonds:", "a": ["0", "1", "2 or more", "None"], "c": 2}, {"q": "Trans fats are linked to:", "a": ["Better health", "Heart disease", "Weight loss", "Improved cholesterol"], "c": 1}, {"q": "Hydrogenation adds ___ to unsaturated fats:", "a": ["Oxygen", "Hydrogen", "Nitrogen", "Carbon"], "c": 1}, {"q": "Trans fats raise ___ and lower ___:", "a": ["HDL/LDL", "LDL (bad)/HDL (good)", "Nothing", "Only HDL"], "c": 1}, {"q": "Phospholipids have ___ fatty acid tails:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Phospholipid head is:", "a": ["Hydrophobic", "Hydrophilic", "Nonpolar", "Neutral"], "c": 1}, {"q": "Phospholipid tails are:", "a": ["Hydrophilic", "Hydrophobic", "Charged", "Polar"], "c": 1}, {"q": "In a bilayer, heads face:", "a": ["Inward", "Water (outward)", "Each other", "The tails"], "c": 1}, {"q": "Steroids have ___ fused carbon rings:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "Cholesterol is a precursor to:", "a": ["Cellulose", "Steroid hormones, vitamin D, bile salts", "Starch", "DNA"], "c": 1}, {"q": "Estrogen and testosterone are:", "a": ["Carbohydrates", "Steroid hormones (derived from cholesterol)", "Proteins", "Nucleic acids"], "c": 1}, {"q": "Waxes function in:", "a": ["Energy storage only", "Waterproofing", "Genetic info", "Catalysis"], "c": 1}, {"q": "How many amino acid types exist?", "a": ["4", "10", "20", "100"], "c": 2}, {"q": "The R-group determines an amino acid's:", "a": ["Size only", "Identity and properties", "Color", "Nothing"], "c": 1}, {"q": "Amino acids are linked by ___ bonds:", "a": ["Glycosidic", "Peptide", "Phosphodiester", "Ester"], "c": 1}, {"q": "Primary protein structure is the:", "a": ["3D shape", "Amino acid sequence", "Helix", "Subunit assembly"], "c": 1}, {"q": "α-helices and β-sheets are ___ structure:", "a": ["Primary", "Secondary", "Tertiary", "Quaternary"], "c": 1}, {"q": "Secondary structure is stabilized by:", "a": ["R-group interactions", "H-bonds along the backbone", "Disulfide bonds only", "Ionic bonds only"], "c": 1}, {"q": "Tertiary structure is the overall 3D shape of:", "a": ["Multiple polypeptides", "ONE polypeptide", "DNA", "RNA"], "c": 1}, {"q": "Quaternary structure involves:", "a": ["One polypeptide", "Multiple polypeptide subunits", "Only DNA", "Only carbs"], "c": 1}, {"q": "Hemoglobin has ___ subunits (quaternary):", "a": ["1", "2", "4", "8"], "c": 2}, {"q": "Denaturation means:", "a": ["Gaining shape", "Losing 3D shape → losing function", "Gaining function", "Becoming stronger"], "c": 1}, {"q": "Denaturation is caused by all EXCEPT:", "a": ["Heat", "pH changes", "Normal body temperature", "Heavy metals"], "c": 2}, {"q": "Denaturation breaks ___ bonds:", "a": ["Only covalent", "Weak bonds (H-bonds, ionic, hydrophobic)", "Peptide bonds", "All bonds"], "c": 1}, {"q": "Primary structure (amino acid sequence) is ___ by denaturation:", "a": ["Destroyed", "NOT destroyed", "Always broken", "Changed"], "c": 1}, {"q": "Enzymes are:", "a": ["Lipids", "Biological catalysts (proteins)", "Nucleic acids", "Carbohydrates"], "c": 1}, {"q": "Enzymes ___ activation energy:", "a": ["Raise", "Lower", "Don't affect", "Eliminate"], "c": 1}, {"q": "The active site is where:", "a": ["Energy is stored", "Substrate binds", "DNA is made", "Fat is stored"], "c": 1}, {"q": "Induced fit model says the active site:", "a": ["Is rigid", "Adjusts slightly to fit substrate", "Doesn't change", "Is random"], "c": 1}, {"q": "Enzyme names often end in:", "a": ["-ose", "-ase", "
