<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anhelina's Study Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0A1A;--card:#1A1230;--card2:#241A42;--accent:#9B59FF;--glow:#B07AFF;--dim:#6B3FA0;--hi:#E0C6FF;--tx:#E8DFF5;--txd:#9B8FBB;--ok:#7CFF8E;--err:#FF6B8A;--bdr:#2E2250;--gs:#1A0A3E}
body{min-height:100vh;background:linear-gradient(170deg,var(--gs) 0%,var(--bg) 40%,#0A0718 100%);color:var(--tx);font-family:'Segoe UI','Helvetica Neue',sans-serif;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes sparkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:.7;transform:scale(1.2)}}
@keyframes floatAcross{0%{transform:translateX(-100%)}100%{transform:translateX(calc(100vw + 100%))}}
.sparkle{position:fixed;width:4px;height:4px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--glow);opacity:.4;animation:sparkle 3s ease-in-out infinite;pointer-events:none}
.wrap{max-width:820px;margin:0 auto;padding:0 20px}
.badge{display:inline-block;padding:6px 20px;border-radius:99px;background:rgba(155,89,255,.09);border:1px solid rgba(155,89,255,.2);font-size:13px;color:var(--glow);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent),var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15}
.sub{color:var(--txd);font-size:16px}

/* Breadcrumb */
.bread{padding:12px 0 4px;font-size:13px;color:var(--txd)}
.bread span{cursor:pointer;transition:color .2s}.bread span:hover{color:var(--glow)}
.bread .sep{margin:0 8px;opacity:.4}

/* Tabs */
.tabs{display:flex;gap:10px;padding:14px 0;flex-wrap:wrap;justify-content:center}
.pill{padding:12px 28px;border-radius:99px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .25s}
.pill:hover{transform:translateY(-2px)}
.pill-a{background:linear-gradient(135deg,var(--accent),var(--dim));color:#fff;box-shadow:0 4px 20px rgba(155,89,255,.27)}
.pill-i{background:rgba(26,18,48,.8);color:var(--txd);border:1px solid var(--bdr)}

/* Class cards */
.class-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;padding:16px 0 40px}
.cc{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:32px 24px;cursor:pointer;transition:all .35s;text-align:center}
.cc:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(155,89,255,.2);border-color:rgba(155,89,255,.4)}
.cc .icon{font-size:48px;margin-bottom:10px}
.cc h3{font-size:20px;font-weight:800;color:var(--hi)}
.cc p{font-size:13px;color:var(--txd);margin-top:4px}
.cc .cnt{margin-top:14px;font-size:12px;padding:4px 14px;border-radius:99px;background:rgba(155,89,255,.1);color:var(--glow);display:inline-block;font-weight:600}

/* Lesson cards */
.lc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:18px 22px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.lc:hover{transform:translateX(4px);border-color:rgba(155,89,255,.4);background:var(--card2)}
.ln{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(155,89,255,.12);color:var(--glow);font-weight:700;white-space:nowrap}
.lc h4{font-size:15px;font-weight:700}
.lc .meta{font-size:12px;color:var(--txd);margin-top:2px}
.lc .arr{color:var(--accent);font-size:18px;margin-left:auto;flex-shrink:0}

/* Back button */
.bbtn{background:transparent;border:1px solid var(--bdr);border-radius:10px;padding:8px 18px;color:var(--txd);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:8px}
.bbtn:hover{border-color:var(--accent);color:var(--hi)}

/* Note cards */
.nc{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:20px 24px;margin-bottom:12px;transition:border-color .3s}
.nc:hover{border-color:rgba(155,89,255,.3)}
.nc h3{font-size:16px;font-weight:700;color:var(--glow);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.nc h3 .num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:rgba(155,89,255,.12);color:var(--accent);font-size:12px;font-weight:700;flex-shrink:0}
.nc .body{color:var(--txd);font-size:14.5px;line-height:1.7}
.nc .body b{color:var(--hi);font-weight:600}

/* Quiz */
.pbar{height:4px;border-radius:2px;background:var(--bdr);margin-bottom:20px}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--glow));transition:width .4s}
.qcard{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:28px;animation:fadeUp .4s ease}
.qcard h3{font-size:18px;font-weight:700;margin-bottom:20px;line-height:1.45}
.opt{width:100%;background:transparent;border:1.5px solid var(--bdr);border-radius:12px;padding:14px 18px;text-align:left;cursor:pointer;color:var(--tx);font-size:15px;font-family:inherit;display:flex;align-items:center;gap:12px;transition:all .25s;margin-bottom:8px}
.opt:hover:not(.done){border-color:var(--accent);background:rgba(155,89,255,.08)}
.opt.ok{background:rgba(124,255,142,.08);border-color:var(--ok)}.opt.no{background:rgba(255,107,138,.08);border-color:var(--err)}
.circ{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:rgba(155,89,255,.13);color:var(--accent)}
.opt.ok .circ{background:var(--ok);color:#000}.opt.no .circ{background:var(--err);color:#000}
.abtn{background:linear-gradient(135deg,var(--accent),var(--dim));border:none;border-radius:12px;padding:12px 32px;color:#fff;font-weight:700;cursor:pointer;font-size:15px;font-family:inherit}
.abtn:hover{transform:translateY(-1px)}.abtn:disabled{background:var(--bdr);cursor:not-allowed;transform:none}

/* Test */
.tinfo{background:rgba(155,89,255,.07);border:1px solid rgba(155,89,255,.2);border-radius:14px;padding:16px 20px;margin-bottom:20px;font-size:14px;color:var(--glow);text-align:center}
.tq{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px 22px;margin-bottom:12px}
.tq.ans{border-color:rgba(155,89,255,.25)}
.topt{width:100%;background:transparent;border:1.5px solid var(--bdr);border-radius:10px;padding:11px 16px;text-align:left;cursor:pointer;color:var(--tx);font-size:14px;font-family:inherit;display:flex;align-items:center;gap:10px;transition:all .2s;margin-bottom:6px}
.topt:hover{border-color:var(--accent);background:rgba(155,89,255,.06)}
.topt.sel{border-color:var(--accent);background:rgba(155,89,255,.1)}
.topt .tl{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:rgba(155,89,255,.08);color:var(--accent)}
.topt.sel .tl{background:var(--accent);color:#fff}

/* Results */
.res{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:40px 28px;text-align:center;animation:fadeUp .5s ease;margin-bottom:24px}
.rw{background:rgba(255,107,138,.03);border:1px solid rgba(255,107,138,.2);border-radius:14px;padding:16px 20px;margin-bottom:10px}

/* Quotes */
.qs{padding:60px 24px 80px;text-align:center;position:relative;overflow:hidden;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.qs::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.bq{font-size:clamp(22px,4.5vw,38px);font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent),var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3;max-width:580px;margin:0 auto 18px;transition:all .4s ease}
.fq{position:absolute;color:var(--accent);opacity:.05;font-weight:800;white-space:nowrap;font-size:18px;animation:floatAcross linear infinite}
.footer{text-align:center;padding:20px 24px 32px;font-size:13px;color:var(--txd);border-top:1px solid var(--bdr)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(155,89,255,.27);border-radius:3px}
@media(max-width:500px){.class-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="sparkles"></div>
<div style="text-align:center;padding:48px 24px 12px;animation:fadeUp .8s ease">
<div class="badge">From Landon to Anhelina 💜</div>
<h1 id="mt">Anhelina's Study Hub</h1>
<p class="sub" id="ms">Pick a class to start studying</p>
</div>
<div class="wrap">
<div id="bread" class="bread"></div>
<div id="nav"></div>
<div id="app"></div>
</div>
<div class="qs">
<div style="position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;overflow:hidden" id="fqs"></div>
<div class="bq" id="bq"></div>
<div style="font-size:14px;color:var(--glow);letter-spacing:1px;font-weight:600;opacity:.6">&mdash; Landon</div>
</div>
<div class="footer">Made with 💜 from Landon to Anhelina &mdash; mykrasivaya.com</div>
<script>
// Sparkles
(function(){var c=document.getElementById("sparkles");for(var i=0;i<12;i++){var s=document.createElement("div");s.className="sparkle";s.style.top=(8+i*7.5)+"%";s.style.left=(5+(i*8)%90)+"%";s.style.animationDelay=(i*.4)+"s";c.appendChild(s)}})();
// Quotes
var quotes=["You are perfect just the way you are","Did you do your homework?","I love you","\u043C\u043E\u044F \u043A\u0440\u0430\u0441\u0438\u0432\u0430\u044F \u0434\u0435\u0432\u043E\u0447\u043A\u0430","Your feelings are never too much","Text me, I miss you"];
function setupQ(){document.getElementById("bq").textContent=quotes[Math.floor(Math.random()*quotes.length)];var f=document.getElementById("fqs");f.innerHTML="";for(var i=0;i<8;i++){var d=document.createElement("div");d.className="fq";d.textContent=quotes[i%quotes.length];d.style.top=(8+i*12)+"%";d.style.fontSize=(14+Math.random()*10)+"px";d.style.animationDuration=(25+Math.random()*20)+"s";d.style.animationDelay=(-Math.random()*30)+"s";d.style.opacity=.04+Math.random()*.04;f.appendChild(d)}}
setInterval(function(){var e=document.getElementById("bq");e.style.opacity="0";e.style.transform="translateY(10px)";setTimeout(function(){e.textContent=quotes[Math.floor(Math.random()*quotes.length)];e.style.opacity="1";e.style.transform="translateY(0)"},400)},6000);setupQ();

// DATA
var D={"chemistry": {"name": "CHEM 260", "sub": "General Chemistry", "icon": "🧪", "lessons": [{"id": "chem-ch1", "title": "Chapter 1: Matter, Properties & Measurements", "ln": "CHEM 260 · Ch 1", "notes": [{"heading": "1.2 — Liquid Matter", "body": "In liquid matter, atoms or molecules pack about as closely as they do in solid matter, but they are <b>free to move</b> relative to each other. Liquids have a <b>fixed volume but NOT a fixed shape</b>. Their ability to flow makes them assume the shape of their container. Examples at room temperature: water, alcohol, gasoline."}, {"heading": "1.2 — Gaseous Matter", "body": "In gaseous matter, atoms or molecules have <b>a lot of space between them</b>. They are free to move relative to one another. These qualities make gases <b>compressible</b> — they have no fixed volume and no fixed shape."}, {"heading": "1.2 — Comparing States", "body": "<b>Solid:</b> atoms close-packed, NOT free to move (fixed shape + volume).<br><b>Liquid:</b> atoms close-packed, free to move (fixed volume, no fixed shape).<br><b>Gas:</b> atoms NOT close-packed, free to move (no fixed volume or shape, compressible).<br>Freedom of movement increases: solid → liquid → gas."}, {"heading": "1.2 — Pure Substances vs Mixtures", "body": "The first division: <b>pure substance</b> (one component, invariant composition) vs <b>mixture</b> (two or more components in proportions that can vary sample to sample)."}, {"heading": "1.2 — Elements", "body": "A substance that <b>cannot be chemically broken down</b> into simpler substances. Basic building blocks of matter. Composed of a single type of atom (e.g., helium, gold, oxygen, carbon)."}, {"heading": "1.2 — Compounds", "body": "A substance composed of <b>two or more elements in fixed definite proportions</b>. CAN be broken down into simpler substances. Most elements are chemically reactive and combine to form compounds (water, sugar, salt, CO₂)."}, {"heading": "1.2 — Heterogeneous Mixtures", "body": "Composition <b>varies from one region to another</b>. Made of multiple substances whose presence <b>can be seen</b>. Portions of the sample have different composition and properties. Examples: salt+sand, trail mix, oil+water, Froot Loops in a bowl."}, {"heading": "1.2 — Homogeneous Mixtures", "body": "Made of multiple substances but <b>appears to be one substance</b>. All portions have the <b>same composition and properties</b>. Also called <b>solutions</b>. The atoms/molecules mix uniformly. Examples: sweetened tea, saltwater, air, brass."}, {"heading": "1.2 — Separating by Decanting", "body": "Mixtures are separable because components have different physical or chemical properties. <b>Decanting:</b> carefully pouring off a liquid from a settled solid. Simple and quick — works when the solid has settled to the bottom."}, {"heading": "1.2 — Separating by Distillation", "body": "A homogeneous mixture of liquids can be separated by <b>distillation</b>: the mixture is heated to boil off the more <b>volatile</b> (easily vaporizable) liquid. The vapor is then re-condensed in a condenser and collected in a separate flask. Separates by differences in boiling points."}, {"heading": "1.2 — Separating by Filtration", "body": "A mixture of an <b>insoluble solid and a liquid</b> can be separated by <b>filtration</b> — pouring the mixture through filter paper in a funnel. The solid stays on the filter; the liquid passes through."}, {"heading": "1.3 — Physical Changes", "body": "The atoms or molecules that compose a substance <b>do NOT change their identity</b>. Only the state or appearance changes, not the composition. Example: when water boils, it changes from liquid to gas — but the gas is still composed of water molecules (H₂O). This is a physical change."}, {"heading": "1.3 — Chemical Changes", "body": "Changes that <b>alter the composition</b> of matter. During a chemical change, atoms <b>rearrange</b>, transforming original substances into <b>different substances</b>. Example: rusting of iron — iron atoms combine with oxygen to form iron oxide, a completely different substance."}, {"heading": "1.3 — Physical Properties", "body": "A property a substance displays <b>without changing its composition</b>. Examples: odor, taste, color, appearance, melting point, boiling point, density. The smell of gasoline is a physical property."}, {"heading": "1.3 — Chemical Properties", "body": "A property a substance displays <b>only by changing its composition</b> via a chemical change. Examples: flammability, corrosiveness, acidity, toxicity, reactivity. The flammability of gasoline is a chemical property."}, {"heading": "1.3 — Intensive vs Extensive", "body": "<b>Intensive property:</b> does NOT depend on the amount of matter (temperature, density, boiling point, color).<br><b>Extensive property:</b> DOES depend on the amount of matter (mass, volume, total energy). Intensive properties are the same whether you have a drop or an ocean."}, {"heading": "1.4 — Units of Measurement", "body": "Scientists use the <b>International System of Units (SI)</b>, based on the metric system. SI base units: meter (length), kilogram (mass), second (time), Kelvin (temperature), mole (amount). The US is one of very few countries not using metric officially."}, {"heading": "1.4 — Length, Mass, Time", "body": "<b>Meter (m):</b> slightly longer than a yard (39.37 inches vs 36). <b>Kilogram (kg):</b> measure of quantity of matter. 1 kg ≈ 2 lb 3 oz. Gram (g) = 1/1000 kg. Weight ≠ mass (weight depends on gravity). <b>Second (s):</b> duration of an event. 1 hr = 3600 s."}, {"heading": "1.4 — Temperature & Kelvin", "body": "Temperature measures the <b>average kinetic energy</b> of atoms/molecules. Hotter = more energetic particles. Also determines direction of heat transfer. <b>Kelvin scale:</b> 0 K = absolute zero (−273°C, −459°F) — molecular motion virtually stops. The Celsius and Kelvin degree are the same size. <b>K = °C + 273</b> (approximation). Fahrenheit degree is 5/9 the size of a Celsius degree."}, {"heading": "1.4 — Prefix Multipliers", "body": "SI prefixes change units by powers of 10. Key ones: <b>kilo (k) = 10³, centi (c) = 10⁻², milli (m) = 10⁻³, micro (μ) = 10⁻⁶, nano (n) = 10⁻⁹</b>. Also: mega (M) = 10⁶, giga (G) = 10⁹. Example: 1 kilometer = 1000 meters. 1 milligram = 0.001 grams."}, {"heading": "1.5 — Significant Figures: Rules", "body": "Sig figs reflect the <b>precision</b> of a measurement. Rules:<br>1) All nonzero digits are significant (28.03 = 4 sig figs)<br>2) Interior zeros (between nonzero) are significant (408 = 3)<br>3) Leading zeros are NOT significant (0.0540 = 3)<br>4a) Trailing zeros AFTER decimal point ARE significant (45.000 = 5)<br>4b) Trailing zeros BEFORE decimal (after nonzero) ARE significant (140.00 = 5)<br>4c) Trailing zeros with no decimal are ambiguous (1200 = ambiguous; use scientific notation: 1.20×10³ = 3 sig figs)"}, {"heading": "1.5 — Exact Numbers", "body": "Exact numbers have <b>unlimited significant figures</b>. Three types: <b>1)</b> Exact counting of discrete objects (21 people = 21.0000...). <b>2)</b> Integral numbers in equations (diameter = 2 × radius, the 2 is exact). <b>3)</b> Defined quantities (100 cm = 1 m exactly). Some conversion factors are defined (exact); others are measured (not exact)."}, {"heading": "1.5 — Sig Figs in Multiplication/Division", "body": "The result carries the <b>same number of significant figures as the factor with the FEWEST</b> sig figs. Example: 6.221 cm × 5.2 cm = 32.3492 → round to <b>32 cm²</b> (2 sig figs, limited by 5.2)."}, {"heading": "1.5 — Sig Figs in Addition/Subtraction", "body": "The result carries the <b>same number of DECIMAL PLACES as the quantity with the FEWEST</b> decimal places. Draw a line after the last significant decimal place of the least precise number — that determines where to round. Example: 12.11 + 18.0 + 1.013 = 31.123 → round to <b>31.1</b> (1 decimal place, limited by 18.0)."}, {"heading": "1.5 — Rounding Rules", "body": "If dropped digit < 5: round down (5.34 → 5.3). If > 5: round up (5.37 → 5.4). If exactly 5 with nothing or only zeros after: round to <b>even</b> (15.5 → 16, 12.5 → 12). If 5 followed by nonzero: round up (15.500001 → 16). In multistep calculations: <b>only round the final answer</b>, not intermediate steps!"}, {"heading": "1.5 — Accuracy vs Precision", "body": "<b>Accuracy:</b> how close a measured value is to the <b>actual/true</b> value. <b>Precision:</b> how close a series of measurements are <b>to each other</b> (reproducibility). You can be precise but not accurate (consistently wrong), accurate but not precise (lucky average), or both (ideal). Think dartboard: accuracy = hitting bullseye; precision = tight grouping."}, {"heading": "1.6 — Dimensional Analysis", "body": "Most chemistry problems are <b>unit conversion problems</b>. Using units as a guide to solving problems is called <b>dimensional analysis</b>. Units are multiplied, divided, and canceled like algebraic quantities. Form: Given unit × (conversion factor) = desired unit. The conversion factor is a fraction that equals 1 (e.g., 1000 m / 1 km)."}, {"heading": "1.6 — Units Raised to Powers", "body": "When converting units raised to a power, raise BOTH the number and the unit. Example: converting in² to cm² — use (2.54 cm / 1 in)² = 6.4516 cm²/in². Don't forget to square (or cube) the entire conversion factor, not just the unit!"}, {"heading": "Classification Flowchart", "body": "Is it uniform throughout? <b>No →</b> heterogeneous mixture. <b>Yes →</b> Can it be separated by physical means? <b>Yes →</b> homogeneous mixture (solution). <b>No →</b> pure substance. Can the pure substance be decomposed chemically? <b>Yes →</b> compound. <b>No →</b> element."}, {"heading": "Key Equations Summary", "body": "<b>K = °C + 273.15</b> (or ≈ °C + 273)<br><b>°F = (9/5)°C + 32</b><br><b>°C = (5/9)(°F − 32)</b><br><b>Density = mass / volume</b><br><b>Dimensional analysis:</b> given × (conversion factor) = answer<br>Sig figs: multiply/divide → fewest sig figs; add/subtract → fewest decimal places."}], "quiz": [{"q": "Which state has fixed volume but NOT fixed shape?", "a": ["Solid", "Liquid", "Gas", "Plasma"], "c": 1}, {"q": "Gases are compressible because particles are:", "a": ["Close-packed", "Vibrating in place", "Far apart", "Not moving"], "c": 2}, {"q": "Freedom of movement increases in order:", "a": ["Gas→Liquid→Solid", "Solid→Gas→Liquid", "Solid→Liquid→Gas", "Liquid→Solid→Gas"], "c": 2}, {"q": "A pure substance with invariant composition that CANNOT be broken down is:", "a": ["Compound", "Mixture", "Element", "Solution"], "c": 2}, {"q": "A compound is:", "a": ["A single type of atom", "Two+ elements in fixed proportions", "A heterogeneous mixture", "An element"], "c": 1}, {"q": "Sweetened tea is a:", "a": ["Heterogeneous mixture", "Compound", "Homogeneous mixture", "Element"], "c": 2}, {"q": "Sand + salt is a:", "a": ["Solution", "Compound", "Heterogeneous mixture", "Element"], "c": 2}, {"q": "Distillation separates liquids by differences in:", "a": ["Density", "Boiling point", "Color", "Particle size"], "c": 1}, {"q": "Filtration separates:", "a": ["Two liquids", "Insoluble solid from liquid", "Gases", "Elements from compounds"], "c": 1}, {"q": "Decanting involves:", "a": ["Boiling", "Pouring off liquid from settled solid", "Using filter paper", "Evaporating"], "c": 1}, {"q": "Boiling water is a:", "a": ["Chemical change", "Physical change", "Nuclear change", "Decomposition"], "c": 1}, {"q": "Rusting iron is a:", "a": ["Physical change", "Chemical change", "Phase change", "No change"], "c": 1}, {"q": "The smell of gasoline is a ___ property:", "a": ["Chemical", "Physical", "Extensive", "Nuclear"], "c": 1}, {"q": "Flammability is a ___ property:", "a": ["Physical", "Intensive", "Chemical", "Extensive"], "c": 2}, {"q": "Temperature is a(n) ___ property:", "a": ["Extensive", "Intensive", "Chemical", "Both A and C"], "c": 1}, {"q": "Mass is a(n) ___ property:", "a": ["Intensive", "Extensive", "Chemical", "Neither"], "c": 1}, {"q": "The SI unit of mass is:", "a": ["Gram", "Pound", "Kilogram", "Ounce"], "c": 2}, {"q": "1 meter is approximately ___ inches:", "a": ["12", "36", "39.37", "100"], "c": 2}, {"q": "Absolute zero is:", "a": ["0°C", "0°F", "0 K (−273°C)", "100 K"], "c": 2}, {"q": "K = °C + ___:", "a": ["100", "212", "273", "373"], "c": 2}, {"q": "The Celsius and ___ degree are the same size:", "a": ["Fahrenheit", "Kelvin", "Rankine", "Imperial"], "c": 1}, {"q": "Temperature measures average ___ of particles:", "a": ["Mass", "Size", "Kinetic energy", "Potential energy"], "c": 2}, {"q": "Kilo means:", "a": ["10", "100", "1000", "1,000,000"], "c": 2}, {"q": "Milli means:", "a": ["10⁻¹", "10⁻²", "10⁻³", "10⁻⁶"], "c": 2}, {"q": "Nano means:", "a": ["10⁻³", "10⁻⁶", "10⁻⁹", "10⁻¹²"], "c": 2}, {"q": "How many sig figs in 0.0540?", "a": ["2", "3", "4", "5"], "c": 1}, {"q": "How many sig figs in 408?", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "How many sig figs in 45.000?", "a": ["2", "3", "4", "5"], "c": 3}, {"q": "How many sig figs in 1200 (no decimal)?", "a": ["2", "3", "4", "Ambiguous"], "c": 3}, {"q": "Leading zeros are:", "a": ["Always significant", "Never significant", "Sometimes significant", "Exact"], "c": 1}, {"q": "Trailing zeros after a decimal ARE:", "a": ["Not significant", "Significant", "Ambiguous", "Exact"], "c": 1}, {"q": "In multiplication, result has sig figs of:", "a": ["Most precise factor", "Least precise factor", "Sum of all", "Average"], "c": 1}, {"q": "In addition, result has decimal places of:", "a": ["Most decimal places", "Fewest decimal places", "Sum of all", "Doesn't matter"], "c": 1}, {"q": "5.37 rounded to 2 sig figs:", "a": ["5.3", "5.4", "5.0", "6.0"], "c": 1}, {"q": "15.5 rounded to nearest integer (round-to-even):", "a": ["15", "16", "15.5", "20"], "c": 1}, {"q": "12.5 rounded to nearest integer (round-to-even):", "a": ["12", "13", "12.5", "10"], "c": 0}, {"q": "In multistep calculations, round:", "a": ["Every step", "Only intermediate steps", "Only the final answer", "Never"], "c": 2}, {"q": "Exact numbers have ___ sig figs:", "a": ["1", "3", "5", "Unlimited"], "c": 3}, {"q": "100 cm = 1 m is a(n) ___ quantity:", "a": ["Measured", "Estimated", "Defined (exact)", "Approximate"], "c": 2}, {"q": "Accuracy means:", "a": ["Measurements agree with each other", "Close to true value", "High precision", "Many sig figs"], "c": 1}, {"q": "Precision means:", "a": ["Close to true value", "Measurements agree with each other", "Accurate", "Exact"], "c": 1}, {"q": "Precise but NOT accurate is like:", "a": ["Hitting bullseye every time", "Tight grouping far from bullseye", "Random scatter", "Missing the board"], "c": 1}, {"q": "Dimensional analysis uses ___ as a guide:", "a": ["Numbers only", "Units", "Colors", "Intuition"], "c": 1}, {"q": "A conversion factor equals:", "a": ["0", "1", "2", "Varies"], "c": 1}, {"q": "Converting in² to cm², you must ___ the conversion factor:", "a": ["Add", "Multiply", "Square", "Cube"], "c": 2}, {"q": "Oil + water is:", "a": ["Homogeneous", "Heterogeneous", "A compound", "An element"], "c": 1}, {"q": "Air is a:", "a": ["Element", "Compound", "Heterogeneous mixture", "Homogeneous mixture"], "c": 3}, {"q": "A volatile liquid:", "a": ["Is dense", "Vaporizes easily", "Is nonflammable", "Is solid"], "c": 1}, {"q": "Weight depends on ___ but mass does not:", "a": ["Temperature", "Volume", "Gravity", "Density"], "c": 2}, {"q": "1 kg ≈:", "a": ["1 lb", "2 lb 3 oz", "5 lb", "10 lb"], "c": 1}]}, {"id": "chem-ch2", "title": "Chapter 2: Atoms, Molecules & Ions", "ln": "CHEM 260 · Ch 2", "notes": [{"heading": "1.6 — Dimensional Analysis", "body": "Most chemistry problems are <b>unit conversion problems</b>. Using units as a guide is called <b>dimensional analysis</b>. Units are multiplied, divided, and canceled like algebraic quantities. Form: <b>Given unit × (conversion factor) = desired unit</b>. The conversion factor is a fraction equal to 1."}, {"heading": "1.6 — Units Raised to Powers", "body": "When converting units raised to a power, raise <b>BOTH the number and the unit</b> to the power. Example: converting in² to cm² → use (2.54 cm / 1 in)² = 6.4516 cm²/in². Don't just square the unit — square the entire conversion factor!"}, {"heading": "1.6 — Practice: 2.54 cm = 1 in", "body": "2 in = 2 × 2.54 = <b>5.08 cm</b> (3 sig figs). 100 cm = 100 ÷ 2.54 = <b>39.4 in</b> (3 sig figs). Always include units in every step and cancel them systematically."}, {"heading": "2.0 — Learning Objectives", "body": "By the end of Chapter 2 you should be able to: explain early and modern atomic theory, identify subatomic particles and atomic symbols, write and interpret chemical formulas, use the periodic table to predict properties, and apply naming rules for compounds."}, {"heading": "2.1 — Early Atomic Theory", "body": "<b>Democritus (5th c. BC):</b> all matter composed of small indivisible particles called <i>atomos</i>. <b>Aristotle (4th c. BC):</b> matter is combinations of fire, earth, air, water (wrong but dominated for centuries)."}, {"heading": "2.1 — Dalton's Atomic Theory (1808)", "body": "Five key postulates: <b>1)</b> Matter is composed of exceedingly small particles called atoms. <b>2)</b> An element consists of only one type of atom. <b>3)</b> Atoms of different elements have different properties. <b>4)</b> Compounds = atoms of 2+ elements in small whole-number ratios. <b>5)</b> Atoms are neither created nor destroyed in chemical changes — only rearranged."}, {"heading": "2.1 — Law of Conservation of Matter", "body": "From Dalton's theory: atoms aren't created or destroyed → <b>total mass remains constant</b> during chemical changes. Total mass of reactants = total mass of products. This is the foundation for balancing chemical equations."}, {"heading": "2.1 — Law of Definite Proportions", "body": "Also called <b>law of constant composition</b>: all samples of a pure compound contain the <b>same elements in the same proportion by mass</b>. Example: isooctane (C₈H₁₈) always has a carbon-to-hydrogen mass ratio of 5.33:1.00, no matter the sample size."}, {"heading": "2.2 — Thomson's Discovery", "body": "Late 1800s: <b>cathode ray tube experiments</b> discovered negatively charged particles — what we now call <b>electrons</b>. Showed atoms are NOT indivisible — they contain smaller subatomic particles. Led to the 'plum pudding' model."}, {"heading": "2.2 — Millikan's Oil Drop Experiment (1909)", "body": "Determined the <b>charge of a single electron: 1.602 × 10⁻¹⁹ C</b>. Oil drops carried charges that were always multiples of this value. Combined with Thomson's charge-to-mass ratio (1.759 × 10¹¹ C/kg), we can calculate electron mass: <b>mass = charge ÷ ratio = 9.109 × 10⁻³¹ kg</b>."}, {"heading": "2.2 — Rutherford's Gold Foil Experiment", "body": "1930s: fired α particles at gold foil. Most passed through (atom is mostly <b>empty space</b>). A few deflected sharply → small, heavy, <b>positively charged nucleus</b> at center. This replaced the plum pudding model with the <b>nuclear model</b> of the atom."}, {"heading": "2.3 — Modern Atomic Model", "body": "Atom = small, positively charged <b>nucleus</b> (contains most mass) + surrounding negatively charged <b>electrons</b>. Atoms are electrically neutral (protons = electrons). Nucleus contains <b>protons</b> (positive) and <b>neutrons</b> (neutral, ≈ same mass as proton)."}, {"heading": "2.3 — Subatomic Particle Summary", "body": "<b>Proton:</b> +1 charge, mass ≈ 1 amu, in nucleus. <b>Neutron:</b> 0 charge, mass ≈ 1 amu, in nucleus. <b>Electron:</b> −1 charge, mass ≈ 0.00055 amu (negligible), surrounds nucleus. Almost all of atom's volume is electrons; almost all mass is in nucleus."}, {"heading": "2.3 — Atomic Number (Z)", "body": "Z = <b>number of protons</b>. This is the <b>identity/defining trait</b> of an element. Carbon: Z=6. Nitrogen: Z=7. Change the proton count → change the element. In a <b>neutral atom</b>, # protons = # electrons."}, {"heading": "2.3 — Ions", "body": "When # protons ≠ # electrons, the atom is an <b>ion</b>. <b>Cation (+):</b> atom that LOST electrons (fewer electrons than protons). Example: Na loses 1e⁻ → Na⁺ (11p, 10e⁻). <b>Anion (−):</b> atom that GAINED electrons. Example: O gains 2e⁻ → O²⁻ (8p, 10e⁻). Electrons are added/removed — never protons (that would change the element!)."}, {"heading": "2.3 — Isotopes", "body": "Atoms of the <b>same element</b> (same Z) with <b>different numbers of neutrons</b> → different mass numbers. Example: hydrogen has 3 isotopes: ¹H (0 neutrons), ²H deuterium (1 neutron), ³H tritium (2 neutrons). Written with mass number as superscript, atomic number as subscript: ²⁴Mg, ²⁵Mg, ²⁶Mg — all have 12 protons but different neutrons."}, {"heading": "2.3 — Mass Number (A)", "body": "A = <b>protons + neutrons</b>. Not on the periodic table (that shows atomic mass, which is a weighted average). For a specific isotope: neutrons = A − Z. Example: ¹²⁷I⁻ (Z=53): protons=53, neutrons=127−53=74, electrons=53+1=54 (anion gained 1e⁻)."}, {"heading": "2.3 — Isotope Symbol with Charges", "body": "Full notation: mass number (superscript), atomic number (subscript), element symbol, charge (superscript right). Example: ¹²⁷₅₃I⁻ tells you everything: element=iodine, 53 protons, 74 neutrons, 54 electrons, 1− charge."}, {"heading": "2.3 — Atomic Mass Unit (amu)", "body": "<b>1 amu = 1/12 the mass of one carbon-12 atom = 1.6605 × 10⁻²⁴ g</b>. Mass of ¹²C = exactly 12 amu (by definition). All other atomic masses are relative to this standard."}, {"heading": "2.3 — Calculating Atomic Mass", "body": "Atomic mass = <b>weighted average</b> of all naturally occurring isotopes. Formula: Σ(fractional abundance × isotopic mass). Example: Cl = 0.7577(34.97) + 0.2423(36.97) = <b>35.45 amu</b>. This is what appears on the periodic table."}, {"heading": "2.3 — Boron Atomic Mass Example", "body": "Boron: 19.9% ¹⁰B (10.0129 amu) + 80.1% ¹¹B (11.0093 amu). Atomic mass = 0.199(10.0129) + 0.801(11.0093) = 1.99 + 8.82 = <b>10.81 amu</b>. Always convert percent to decimal first!"}, {"heading": "2.4 — Chemical Formulas", "body": "A representation using <b>chemical symbols</b> (atom types) and <b>subscripts</b> (number of each atom). Three types: <b>Empirical</b> (simplest ratio), <b>Molecular</b> (actual count), <b>Structural</b> (shows bonds). Examples: H₂O, CO₂, NaCl."}, {"heading": "2.4 — Empirical vs Molecular Formulas", "body": "<b>Empirical:</b> simplest whole-number ratio. <b>Molecular:</b> actual number of atoms per molecule. Benzene: molecular C₆H₆, empirical CH. Acetic acid: molecular C₂H₄O₂, empirical CH₂O. Methane: molecular = empirical = CH₄. Molecular formula is always a whole-number multiple of empirical."}, {"heading": "2.4 — Structural Formulas", "body": "Use <b>lines to represent covalent bonds</b> and show how atoms are connected. More informative than molecular formulas. Example: H₂O₂ → H−O−O−H (shows the two oxygens bonded to each other, not just the atom count)."}, {"heading": "2.4 — Isomers", "body": "Compounds with the <b>same molecular formula but different structures</b> → different properties. <b>Structural isomers:</b> different atom connectivity (acetic acid vs methyl formate — both C₂H₄O₂ but one is vinegar, the other a solvent). <b>Stereoisomers:</b> same connectivity, different 3D arrangement (S-carvone smells like caraway, R-carvone smells like spearmint)."}, {"heading": "2.3 — Chemical Symbols", "body": "Abbreviations for elements. First letter always capitalized, second (if any) lowercase. <b>Try to remember the first 20 elements</b>: H, He, Li, Be, B, C, N, O, F, Ne, Na, Mg, Al, Si, P, S, Cl, Ar, K, Ca. Some symbols come from Latin names (Na = natrium, K = kalium, Fe = ferrum)."}, {"heading": "Electron Mass Calculation", "body": "From Thomson: charge-to-mass ratio = 1.759 × 10¹¹ C/kg. From Millikan: charge = 1.602 × 10⁻¹⁹ C. <b>Mass = charge ÷ ratio = 1.602×10⁻¹⁹ ÷ 1.759×10¹¹ = 9.109 × 10⁻³¹ kg</b>. This is about 1/1836 the mass of a proton. Pay attention to sig figs!"}, {"heading": "Key Equations & Constants", "body": "<b>1 amu = 1.6605 × 10⁻²⁴ g</b><br><b>Electron charge = 1.602 × 10⁻¹⁹ C</b><br><b>Mass number A = protons + neutrons</b><br><b>Atomic mass = Σ(fraction × isotope mass)</b><br><b>Neutrons = A − Z</b><br>Dimensional analysis: given × (conversion factor) = answer"}], "quiz": [{"q": "Dimensional analysis uses ___ as a guide:", "a": ["Numbers only", "Units", "Colors", "Intuition"], "c": 1}, {"q": "Converting in² to cm², you must ___ the conversion factor:", "a": ["Add", "Multiply", "Square", "Cube"], "c": 2}, {"q": "Dalton proposed that atoms are:", "a": ["Divisible", "Neither created nor destroyed", "Made of fire and water", "Waves"], "c": 1}, {"q": "Law of Definite Proportions means a compound always has:", "a": ["Variable composition", "Same elements in same mass proportions", "Different masses", "Random ratios"], "c": 1}, {"q": "Thomson discovered:", "a": ["Protons", "Neutrons", "Electrons", "The nucleus"], "c": 2}, {"q": "Millikan determined the:", "a": ["Mass of proton", "Charge of electron", "Size of nucleus", "Speed of light"], "c": 1}, {"q": "Electron charge is:", "a": ["1.602 × 10⁻¹⁹ C", "9.109 × 10⁻³¹ kg", "1.759 × 10¹¹ C/kg", "6.022 × 10²³"], "c": 0}, {"q": "Rutherford's experiment showed atoms are mostly:", "a": ["Solid", "Empty space", "Negative", "Liquid"], "c": 1}, {"q": "The nucleus contains:", "a": ["Protons only", "Electrons only", "Protons and neutrons", "Protons and electrons"], "c": 2}, {"q": "Atomic number Z equals:", "a": ["Protons + neutrons", "Number of protons", "Number of electrons", "Mass number"], "c": 1}, {"q": "In a neutral atom, # protons equals:", "a": ["# neutrons", "# electrons", "Mass number", "Atomic mass"], "c": 1}, {"q": "A cation is an atom that:", "a": ["Gained electrons", "Lost electrons", "Gained protons", "Lost neutrons"], "c": 1}, {"q": "An anion has:", "a": ["Positive charge", "Negative charge", "No charge", "Variable charge"], "c": 1}, {"q": "Na⁺ has 11 protons and ___ electrons:", "a": ["10", "11", "12", "13"], "c": 0}, {"q": "O²⁻ has 8 protons and ___ electrons:", "a": ["6", "8", "10", "12"], "c": 2}, {"q": "Isotopes have same ___ but different ___:", "a": ["Mass/charge", "Protons/neutrons", "Electrons/protons", "Neutrons/electrons"], "c": 1}, {"q": "Mass number A =:", "a": ["Protons only", "Protons + electrons", "Protons + neutrons", "Neutrons only"], "c": 2}, {"q": "¹²⁷I⁻ (Z=53) has how many neutrons?", "a": ["53", "74", "127", "54"], "c": 1}, {"q": "¹²⁷I⁻ (Z=53) has how many electrons?", "a": ["52", "53", "54", "127"], "c": 2}, {"q": "1 amu is defined as 1/12 the mass of:", "a": ["Hydrogen-1", "Carbon-12", "Oxygen-16", "Nitrogen-14"], "c": 1}, {"q": "Atomic mass on periodic table is:", "a": ["Mass of one atom", "Mass number", "Weighted average of isotopes", "Number of protons"], "c": 2}, {"q": "Chlorine: 75.77% Cl-35 + 24.23% Cl-37. Atomic mass ≈:", "a": ["35.00", "35.45", "36.00", "36.97"], "c": 1}, {"q": "To calculate atomic mass, convert percent to:", "a": ["Fraction (decimal)", "Whole numbers", "Amu", "Grams"], "c": 0}, {"q": "Empirical formula gives:", "a": ["Actual atom count", "Simplest whole-number ratio", "Bond structure", "Mass"], "c": 1}, {"q": "Molecular formula of benzene:", "a": ["CH", "C₆H₆", "C₃H₃", "C₂H₂"], "c": 1}, {"q": "Empirical formula of C₂H₄O₂:", "a": ["C₂H₄O₂", "CH₂O", "CHO", "CO₂"], "c": 1}, {"q": "Structural formulas show:", "a": ["Only atom types", "Only mass", "How atoms are bonded/connected", "Atomic number"], "c": 2}, {"q": "Isomers have the same ___ but different ___:", "a": ["Mass/color", "Molecular formula/structure", "Charge/size", "Name/symbol"], "c": 1}, {"q": "Acetic acid and methyl formate are:", "a": ["The same compound", "Isotopes", "Structural isomers", "Elements"], "c": 2}, {"q": "S-carvone and R-carvone are:", "a": ["Structural isomers", "Stereoisomers", "Elements", "Not isomers"], "c": 1}, {"q": "Chemical symbol's first letter is always:", "a": ["Lowercase", "Capitalized", "A number", "Greek"], "c": 1}, {"q": "Na comes from the Latin:", "a": ["Natrium", "Sodium", "Natal", "Nano"], "c": 0}, {"q": "Changing proton count changes the:", "a": ["Isotope", "Ion charge", "Element", "Nothing"], "c": 2}, {"q": "Electrons have mass approximately ___ of a proton:", "a": ["Equal", "1/2", "1/1836", "Double"], "c": 2}, {"q": "Almost all of an atom's mass is in the:", "a": ["Electrons", "Electron cloud", "Nucleus", "Empty space"], "c": 2}, {"q": "Almost all of an atom's volume is:", "a": ["Nucleus", "Protons", "Electron cloud", "Neutrons"], "c": 2}, {"q": "Dalton's theory provides a ___ explanation of ___ properties:", "a": ["Microscopic/macroscopic", "Large/small", "Simple/complex", "None"], "c": 0}, {"q": "2 in = ___ cm (2.54 cm/in):", "a": ["1.27", "5.08", "25.4", "50.8"], "c": 1}, {"q": "100 cm = ___ in:", "a": ["25.4", "39.4", "50.0", "254"], "c": 1}, {"q": "Conversion factor is a fraction equal to:", "a": ["0", "1", "2", "Varies"], "c": 1}, {"q": "Which is NOT a Dalton postulate?", "a": ["Atoms are indivisible", "Atoms are created in reactions", "Elements have one atom type", "Compounds are whole-number ratios"], "c": 1}, {"q": "Thomson used a:", "a": ["Gold foil", "Oil drop apparatus", "Cathode ray tube", "Microscope"], "c": 2}, {"q": "Rutherford used:", "a": ["Cathode rays", "Oil drops", "Alpha particles on gold foil", "Electrons on silver"], "c": 2}, {"q": "The plum pudding model was replaced by:", "a": ["Dalton's model", "Nuclear model", "Wave model", "String theory"], "c": 1}, {"q": "Proton mass ≈:", "a": ["1 amu", "0.00055 amu", "12 amu", "0 amu"], "c": 0}, {"q": "Neutron charge is:", "a": ["+1", "−1", "0", "+2"], "c": 2}, {"q": "Hydrogen-2 (deuterium) has ___ neutron(s):", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "²⁴Mg, ²⁵Mg, ²⁶Mg all have ___ protons:", "a": ["10", "12", "24", "25"], "c": 1}, {"q": "If you remove a proton from carbon, you get:", "a": ["A carbon ion", "Boron (different element)", "A carbon isotope", "Nothing changes"], "c": 1}, {"q": "Isooctane C₈H₁₈ always has C:H mass ratio of:", "a": ["1:1", "5.33:1", "8:18", "1:5.33"], "c": 1}]}, {"id": "chem-ch3", "title": "Chapter 2 (cont): Periodic Table & Nomenclature", "ln": "CHEM 260 · Ch 2 cont.", "notes": [{"heading": "The Periodic Table — History", "body": "Two pioneers independently proposed organizing elements by properties: <b>Dimitri Mendeleev (1869)</b> and <b>Lothar Meyer (1870)</b>. Mendeleev's table even predicted undiscovered elements. 20th century update: periodic relationship based on <b>atomic numbers</b> rather than atomic masses — this is today's <b>periodic law</b>."}, {"heading": "Groups and Periods", "body": "<b>Groups:</b> 18 vertical columns. Elements in the same group share similar chemical properties (same number of valence electrons). <b>Periods:</b> 7 horizontal rows. Properties change systematically across a period as atomic number increases."}, {"heading": "Metals", "body": "Found on the <b>left and center</b> of the periodic table. Properties: <b>shiny (lustrous), malleable</b> (can be hammered into sheets), <b>ductile</b> (drawn into wire), <b>good conductors</b> of heat and electricity. Most elements are metals. They readily <b>lose electrons → form cations</b>."}, {"heading": "Nonmetals", "body": "Found on the <b>upper right</b> of the table (plus hydrogen). Properties: appear <b>dull</b>, <b>brittle</b> (if solid), <b>poor conductors</b> of heat and electricity. They readily <b>gain electrons → form anions</b>. Include gases (O₂, N₂), liquids (Br₂), and solids (S, C)."}, {"heading": "Metalloids", "body": "Found along the <b>staircase line</b> separating metals and nonmetals. Properties of <b>BOTH</b>: conduct heat and electricity <b>moderately</b> (semiconductors). Examples: silicon (Si), germanium (Ge), arsenic (As), boron (B). Essential for electronics."}, {"heading": "Further Classification", "body": "Groups with special names: <b>Group 1:</b> Alkali metals (very reactive, +1 ions). <b>Group 2:</b> Alkaline earth metals (+2 ions). <b>Group 17:</b> Halogens (very reactive nonmetals, −1 ions). <b>Group 18:</b> Noble gases (very stable, full outer shells, rarely react)."}, {"heading": "Ion Formation — Review", "body": "In chemical reactions, nuclei stay unchanged but <b>electrons</b> can be lost, gained, or shared. Losing electrons → <b>cation</b> (positive, # protons > # electrons). Gaining electrons → <b>anion</b> (negative, # protons < # electrons)."}, {"heading": "Predicting Ion Charges from Periodic Table", "body": "<b>Main group metals</b> lose electrons to reach the electron count of the <b>preceding noble gas</b> → become cations. Example: Na (Group 1) → Na⁺. Ca (Group 2) → Ca²⁺. <b>Nonmetals</b> gain electrons to reach the <b>next noble gas</b> → become anions. Example: Cl (Group 17) → Cl⁻. O (Group 16) → O²⁻."}, {"heading": "Monatomic vs Polyatomic Ions", "body": "<b>Monatomic:</b> ions from a single atom (Na⁺, Cl⁻, Ca²⁺, O²⁻). <b>Polyatomic:</b> electrically charged group of bonded atoms acting as a unit (SO₄²⁻, NH₄⁺, NO₃⁻, OH⁻). Must memorize common polyatomic ions!"}, {"heading": "Naming Polyatomic Ions — Suffixes", "body": "For pairs of polyatomic ions: <b>‑ate</b> = more oxygen atoms. <b>‑ite</b> = fewer oxygen atoms. Example: sulfate SO₄²⁻ vs sulfite SO₃²⁻. Nitrate NO₃⁻ vs nitrite NO₂⁻."}, {"heading": "Naming Polyatomic Ions — Prefixes", "body": "When there are 4 levels: <b>per‑...‑ate</b> = most O. <b>...‑ate</b> = standard. <b>...‑ite</b> = fewer O. <b>hypo‑...‑ite</b> = fewest O. Classic example: <b>ClO₄⁻</b> perchlorate → <b>ClO₃⁻</b> chlorate → <b>ClO₂⁻</b> chlorite → <b>ClO⁻</b> hypochlorite."}, {"heading": "Chemical Bonds Overview", "body": "Two main types: <b>Ionic bonds:</b> electrons are <b>transferred</b> → ions form → electrostatic attraction holds them. <b>Covalent bonds:</b> electrons are <b>shared</b> → molecules form. Compounds classified as ionic or molecular (covalent) based on bond type."}, {"heading": "Ionic Compounds", "body": "Form when a <b>metal reacts with a nonmetal</b>. Metal loses electrons (→ cation), nonmetal gains them (→ anion). The compound is held together by ionic bonds. Must be <b>electrically neutral overall</b> — charges must balance."}, {"heading": "Ionic Compound Examples", "body": "<b>Na + Cl:</b> Na gives 1e⁻ → Na⁺; Cl accepts 1e⁻ → Cl⁻. Formula: NaCl. <b>Ca + Cl:</b> Ca gives 2e⁻ → Ca²⁺; each Cl accepts 1e⁻ → 2 Cl⁻ needed. Formula: CaCl₂. Always balance so total + charge = total − charge."}, {"heading": "Writing Ionic Formulas — LCM Method", "body": "Find the <b>least common multiple</b> of the ion charges to determine ratios. <b>Al³⁺ + O²⁻:</b> LCM of 3 and 2 = 6 → need 2 Al³⁺ (total +6) and 3 O²⁻ (total −6) → <b>Al₂O₃</b>. <b>Na⁺ + S²⁻:</b> LCM of 1 and 2 = 2 → need 2 Na⁺ → <b>Na₂S</b>. <b>Ca²⁺ + N³⁻:</b> LCM of 2 and 3 = 6 → 3 Ca²⁺ + 2 N³⁻ → <b>Ca₃N₂</b>."}, {"heading": "Molecular (Covalent) Compounds", "body": "Result when atoms <b>share</b> electrons. Exist as <b>discrete, neutral molecules</b>. Formed by combinations of <b>nonmetals</b>. Often exist as gases, low-boiling liquids, and low-melting solids. Examples: HCl, CO₂, H₂O, CH₄."}, {"heading": "Naming Ionic Compounds", "body": "Rules: <b>1)</b> Name the cation first, then the anion. <b>2)</b> Monatomic cation = element name (sodium, calcium). <b>3)</b> Monatomic anion = element root + <b>‑ide</b> (chloride, oxide, sulfide). <b>4)</b> Polyatomic ions keep their name (sulfate, nitrate). Example: Na₂SO₄ = sodium sulfate. CaCl₂ = calcium chloride."}, {"heading": "Transition Metal Naming — Roman Numerals", "body": "Most transition metals can form <b>2+ different charges</b>. Specify the charge with a <b>Roman numeral</b> in parentheses. Fe²⁺ = iron(II), Fe³⁺ = iron(III). FeCl₂ = iron(II) chloride. FeCl₃ = iron(III) chloride. Cu⁺ = copper(I), Cu²⁺ = copper(II)."}, {"heading": "Ionic Hydrates", "body": "Ionic compounds containing <b>water molecules</b> as integral parts of their crystal structure. Named with <b>Greek prefix + 'hydrate'</b> added to anhydrous (waterless) compound name. Example: MgSO₄·7H₂O = magnesium sulfate <b>heptahydrate</b>. Prefixes: mono(1), di(2), tri(3), tetra(4), penta(5), hexa(6), hepta(7)."}, {"heading": "Naming Molecular Compounds", "body": "Use <b>prefixes</b> for both elements: mono(1), di(2), tri(3), tetra(4), penta(5), hexa(6). Second element gets <b>‑ide</b> suffix. Drop 'mono' on first element. CO₂ = carbon dioxide. N₂O₅ = dinitrogen pentoxide. PCl₃ = phosphorus trichloride."}, {"heading": "Binary Acids", "body": "Contain hydrogen + one other nonmetal element, dissolved in water. Naming: change 'hydrogen' to prefix <b>hydro‑</b>, add suffix <b>‑ic</b> to nonmetal root, add 'acid.' HCl(aq) = <b>hydrochloric acid</b>. HF(aq) = hydrofluoric acid. H₂S(aq) = hydrosulfuric acid."}, {"heading": "Oxyacids", "body": "Contain H + O + at least 1 other element. Naming: omit 'hydrogen', start with root of the anion, replace <b>‑ate → ‑ic</b> or <b>‑ite → ‑ous</b>, add 'acid.' H₂SO₄ (from sulfate) = <b>sulfuric acid</b>. H₂SO₃ (from sulfite) = <b>sulfurous acid</b>. HNO₃ (from nitrate) = <b>nitric acid</b>."}, {"heading": "Naming Flowchart Summary", "body": "<b>Ionic compound?</b> → cation name + anion name (‑ide for monatomic). Transition metal? → add Roman numeral. Hydrate? → add prefix-hydrate. <b>Molecular?</b> → prefix + first element + prefix + second element‑ide. <b>Acid?</b> → binary: hydro‑..‑ic acid. Oxyacid: ‑ate→‑ic, ‑ite→‑ous."}, {"heading": "Common Polyatomic Ions to Memorize", "body": "<b>NH₄⁺</b> ammonium, <b>OH⁻</b> hydroxide, <b>NO₃⁻</b> nitrate, <b>NO₂⁻</b> nitrite, <b>SO₄²⁻</b> sulfate, <b>SO₃²⁻</b> sulfite, <b>CO₃²⁻</b> carbonate, <b>HCO₃⁻</b> bicarbonate, <b>PO₄³⁻</b> phosphate, <b>ClO₃⁻</b> chlorate, <b>C₂H₃O₂⁻</b> acetate, <b>MnO₄⁻</b> permanganate, <b>CrO₄²⁻</b> chromate, <b>Cr₂O₇²⁻</b> dichromate."}, {"heading": "Ionic vs Molecular Comparison", "body": "<b>Ionic:</b> metal + nonmetal, electron transfer, high melting/boiling points, conduct electricity when dissolved/melted, form crystal lattices. <b>Molecular:</b> nonmetal + nonmetal, electron sharing, lower melting/boiling points, don't conduct electricity, exist as discrete molecules."}, {"heading": "Key Equations & Rules", "body": "<b>Ionic formula:</b> balance charges so compound is neutral. Use LCM method. <b>Naming:</b> cation + anion(‑ide). Roman numerals for variable-charge metals. Prefixes for molecular compounds. <b>Acids:</b> binary = hydro‑..‑ic; oxyacid = based on polyatomic ion suffix."}], "quiz": [{"q": "Who proposed the first periodic table?", "a": ["Dalton", "Thomson", "Mendeleev", "Rutherford"], "c": 2}, {"q": "Modern periodic law organizes by:", "a": ["Atomic mass", "Atomic number", "Density", "Reactivity"], "c": 1}, {"q": "How many groups in the periodic table?", "a": ["7", "14", "18", "20"], "c": 2}, {"q": "How many periods?", "a": ["7", "14", "18", "20"], "c": 0}, {"q": "Metals are found on the ___ of the table:", "a": ["Upper right", "Left and center", "Bottom only", "Everywhere"], "c": 1}, {"q": "Metals are good ___ of electricity:", "a": ["Insulators", "Conductors", "Semiconductors", "None"], "c": 1}, {"q": "Nonmetals tend to ___ electrons:", "a": ["Lose", "Gain", "Share only", "Neither"], "c": 1}, {"q": "Metalloids are also called:", "a": ["Metals", "Nonmetals", "Semiconductors", "Noble gases"], "c": 2}, {"q": "Group 1 elements are called:", "a": ["Halogens", "Noble gases", "Alkali metals", "Alkaline earth metals"], "c": 2}, {"q": "Group 17 elements are called:", "a": ["Alkali metals", "Halogens", "Noble gases", "Metalloids"], "c": 1}, {"q": "Noble gases are in Group:", "a": ["1", "2", "17", "18"], "c": 3}, {"q": "Na (Group 1) forms what ion?", "a": ["Na⁻", "Na²⁺", "Na⁺", "Na³⁺"], "c": 2}, {"q": "Cl (Group 17) forms what ion?", "a": ["Cl⁺", "Cl²⁻", "Cl⁻", "Cl²⁺"], "c": 2}, {"q": "Ca (Group 2) forms what ion?", "a": ["Ca⁺", "Ca²⁺", "Ca⁻", "Ca²⁻"], "c": 1}, {"q": "Main group metals form cations by matching the:", "a": ["Next noble gas", "Preceding noble gas", "Nearest halogen", "Nearest alkali"], "c": 1}, {"q": "Monatomic ions come from:", "a": ["Multiple atoms", "A single atom", "Only metals", "Only nonmetals"], "c": 1}, {"q": "SO₄²⁻ is a ___ ion:", "a": ["Monatomic", "Polyatomic", "Neutral", "Cation"], "c": 1}, {"q": "The suffix ‑ate indicates:", "a": ["Fewer oxygen", "More oxygen", "No oxygen", "A metal"], "c": 1}, {"q": "The suffix ‑ite indicates:", "a": ["More oxygen", "Fewer oxygen", "A cation", "An acid"], "c": 1}, {"q": "ClO₄⁻ is named:", "a": ["Chlorite", "Chlorate", "Perchlorate", "Hypochlorite"], "c": 2}, {"q": "ClO⁻ is named:", "a": ["Chlorite", "Chlorate", "Perchlorate", "Hypochlorite"], "c": 3}, {"q": "Ionic bonds form between:", "a": ["Two nonmetals", "Two metals", "Metal + nonmetal", "Noble gases"], "c": 2}, {"q": "Covalent bonds involve:", "a": ["Transferring electrons", "Sharing electrons", "Losing protons", "Gaining neutrons"], "c": 1}, {"q": "Ionic compounds must be:", "a": ["Positively charged", "Negatively charged", "Electrically neutral", "Variable charge"], "c": 2}, {"q": "Formula for Al³⁺ + O²⁻:", "a": ["AlO", "Al₂O₃", "Al₃O₂", "AlO₂"], "c": 1}, {"q": "Formula for Na⁺ + S²⁻:", "a": ["NaS", "Na₂S", "NaS₂", "Na₂S₂"], "c": 1}, {"q": "Formula for Ca²⁺ + N³⁻:", "a": ["CaN", "Ca₂N₃", "Ca₃N₂", "CaN₂"], "c": 2}, {"q": "NaCl is named:", "a": ["Sodium chlorite", "Sodium chloride", "Sodium chlorate", "Chlorine sodium"], "c": 1}, {"q": "CaCl₂ is named:", "a": ["Calcium chlorine", "Calcium dichloride", "Calcium chloride", "Dicalcium chloride"], "c": 2}, {"q": "The ‑ide suffix is used for:", "a": ["Polyatomic anions", "Monatomic anions", "Cations", "Acids"], "c": 1}, {"q": "Fe²⁺ is named:", "a": ["Iron", "Iron(I)", "Iron(II)", "Iron(III)"], "c": 2}, {"q": "FeCl₃ contains:", "a": ["Fe²⁺", "Fe³⁺", "Fe⁺", "Fe⁴⁺"], "c": 1}, {"q": "MgSO₄·7H₂O is named magnesium sulfate:", "a": ["Monohydrate", "Trihydrate", "Pentahydrate", "Heptahydrate"], "c": 3}, {"q": "The prefix 'hepta' means:", "a": ["5", "6", "7", "8"], "c": 2}, {"q": "CO₂ is named:", "a": ["Carbon oxide", "Carbon monoxide", "Carbon dioxide", "Monocarbon dioxide"], "c": 2}, {"q": "N₂O₅ is named:", "a": ["Nitrogen pentoxide", "Dinitrogen pentoxide", "Nitrogen oxide", "Binitrogen pentaoxide"], "c": 1}, {"q": "Molecular compounds use ___ in naming:", "a": ["Roman numerals", "Prefixes", "‑ide only", "‑ate only"], "c": 1}, {"q": "HCl(aq) is named:", "a": ["Hydrogen chloride", "Chloric acid", "Hydrochloric acid", "Hydrochlorous acid"], "c": 2}, {"q": "Binary acid naming: hydro‑ + root + ___:", "a": ["‑ous", "‑ic", "‑ate", "‑ite"], "c": 1}, {"q": "H₂SO₄ (from sulfate) is named:", "a": ["Sulfurous acid", "Sulfuric acid", "Hydrosulfuric acid", "Sulfite acid"], "c": 1}, {"q": "H₂SO₃ (from sulfite) is named:", "a": ["Sulfuric acid", "Sulfurous acid", "Hydrosulfuric acid", "Sulfate acid"], "c": 1}, {"q": "‑ate → ___ in oxyacid naming:", "a": ["‑ous", "‑ic", "‑ide", "‑ine"], "c": 1}, {"q": "‑ite → ___ in oxyacid naming:", "a": ["‑ic", "‑ous", "‑ide", "‑ine"], "c": 1}, {"q": "Molecular compounds are formed by:", "a": ["Metal + metal", "Metal + nonmetal", "Nonmetal + nonmetal", "Noble gas + metal"], "c": 2}, {"q": "Ionic compounds have ___ melting points:", "a": ["Low", "High", "Variable", "Zero"], "c": 1}, {"q": "NH₄⁺ is called:", "a": ["Ammonia", "Ammonium", "Nitrate", "Nitrite"], "c": 1}, {"q": "OH⁻ is called:", "a": ["Water", "Oxide", "Hydroxide", "Hydrogen"], "c": 2}, {"q": "PO₄³⁻ is called:", "a": ["Phosphite", "Phosphorus", "Phosphate", "Perphosphate"], "c": 2}, {"q": "Drop 'mono' prefix on the ___ element in molecular naming:", "a": ["Second", "First", "Both", "Neither"], "c": 1}, {"q": "Which conducts electricity when dissolved?", "a": ["Molecular compounds", "Ionic compounds", "Both equally", "Neither"], "c": 1}]}, {"id": "chem-ch3", "title": "Chapter 3: Composition of Substances & Solutions", "ln": "CHEM 260 · Ch 3", "notes": [{"heading": "Learning Objectives", "body": "By the end of Ch 3 you should be able to: <b>1)</b> Calculate formula mass and moles from chemical formulas. <b>2)</b> Determine empirical and molecular formulas from composition data. <b>3)</b> Compute solution molarity and relate it to solute amount. <b>4)</b> Convert between concentration units (% by mass, ppm)."}, {"heading": "Formula Mass", "body": "The <b>sum of the average atomic masses</b> of ALL atoms in a substance's formula. Also called molecular mass or molecular weight. Whole = sum of the parts. Example: H₂O = 2(1.01 amu) + 16.00 amu = <b>18.02 amu</b>."}, {"heading": "Formula Mass for Ionic Compounds", "body": "Ionic compounds = discrete cations and anions. They do <b>NOT exist as molecules</b>, so we use '<b>formula mass</b>' not 'molecular mass.' Still calculated the same way — sum of all atomic masses in the formula unit. Example: NaCl = 22.99 + 35.45 = 58.44 amu."}, {"heading": "The Mole — What It Is", "body": "An <b>amount unit</b> like pair (2), dozen (12), or gross (144). Defined as the amount of substance containing the same number of entities as atoms in exactly 12 g of ¹²C. Provides the crucial link between <b>mass of a sample</b> and <b>number of particles</b> in that sample."}, {"heading": "Avogadro's Number", "body": "<b>1 mole = 6.02214 × 10²³ particles</b>. This number is called Avogadro's number (Nₐ). It's the chemist's 'dozen.' One mole of ANY substance contains exactly 6.022 × 10²³ formula units, molecules, or atoms."}, {"heading": "Molar Mass", "body": "The <b>mass in grams of 1 mole</b> of a substance. Units: <b>g/mol</b>. Numerically equal to the atomic or formula mass in amu. A single ¹²C atom = 12 amu; one mole of ¹²C = 12 g. One mole of different substances have different masses but the SAME number of particles."}, {"heading": "Grams ↔ Moles Conversions", "body": "<b>Grams → Moles:</b> divide by molar mass. <b>Moles → Grams:</b> multiply by molar mass. The conversion factor is: 1 mol = (molar mass) g. Think of it like converting dozens of eggs ↔ number of eggs, but using Nₐ instead of 12."}, {"heading": "Moles ↔ Particles Conversions", "body": "<b>Moles → Particles:</b> multiply by Nₐ (6.022 × 10²³). <b>Particles → Moles:</b> divide by Nₐ. The full chain: <b>grams ↔ moles ↔ particles</b>. Master this chain — it's the foundation of all stoichiometry."}, {"heading": "Worked Example: Mg Atoms", "body": "How many Mg atoms in 150.0 g Mg? <b>Step 1:</b> 150.0 g ÷ 24.305 g/mol = 6.171 mol. <b>Step 2:</b> 6.171 mol × 6.022×10²³ = <b>3.716 × 10²⁴ atoms</b> (4 sig figs). Big number — as expected for atoms!"}, {"heading": "Worked Example: Table Sugar", "body": "C₁₂H₂₂O₁₁ molar mass: 12(12.011) + 22(1.008) + 11(15.999) = 144.132 + 22.176 + 175.989 = <b>342.297 g/mol</b>. Mass of 15.6 mol: 15.6 × 342.297 = 5339.8 g = <b>5.34 kg</b>."}, {"heading": "Practice Problems — Answers", "body": "<b>1.3 mol H₂O</b> = 7.83 × 10²³ molecules. <b>1.6 mol NaCl</b> = 92.8 g. <b>Al₂(SO₄)₃</b> molar mass = 342 g/mol. <b>1 mol Ca</b> = 40 g. <b>23 g NaOH</b> = 0.58 mol = 3.46 × 10²³ molecules. <b>4.2 × 10²⁵ H₂O</b> = 70 moles."}, {"heading": "Percent Composition", "body": "The <b>percentage by mass</b> of each element in a compound. Formula: <b>% element = (mass of element in formula ÷ formula mass) × 100</b>. Example: 10.0 g compound contains 2.5 g H and 7.5 g C → %H = 25%, %C = 75%."}, {"heading": "% Composition from Formula Mass", "body": "For known formulas, calculate from atomic masses. Example: NH₃ (formula mass = 17.03 amu). <b>%N</b> = (14.01 / 17.03) × 100 = <b>82.27%</b>. <b>%H</b> = (3 × 1.008 / 17.03) × 100 = <b>17.76%</b>. Check: 82.27 + 17.76 ≈ 100% ✓"}, {"heading": "Empirical Formula from Mass Data — Steps", "body": "<b>Step 1:</b> Convert each element mass to moles (divide by atomic mass). <b>Step 2:</b> Divide each mole value by the <b>smallest</b> mole value. <b>Step 3:</b> If results aren't whole numbers, multiply ALL by the smallest integer that gives whole numbers. These become the subscripts."}, {"heading": "Empirical Formula Example: C and H", "body": "Compound: 1.71 g C and 0.287 g H. <b>Step 1:</b> C: 1.71/12.01 = 0.1424 mol. H: 0.287/1.008 = 0.2847 mol. <b>Step 2:</b> Divide by 0.1424 → C: 1.00, H: 2.00. <b>Result: CH₂</b> (empirical formula)."}, {"heading": "Empirical Formula from Percent Composition", "body": "<b>Key trick:</b> assume a <b>100 g sample</b> → percentages become grams directly! Then follow the same 3-step process. Example: 64.82% C, 21.59% O, 13.59% H → use 64.82 g C, 21.59 g O, 13.59 g H."}, {"heading": "Worked Example: C₄H₁₀O", "body": "64.82 g C ÷ 12.01 = 5.397 mol. 13.59 g H ÷ 1.008 = 13.48 mol. 21.59 g O ÷ 16.00 = 1.349 mol. Divide all by smallest (1.349): C = 4.001 ≈ 4, H = 9.99 ≈ 10, O = 1.000 = 1. <b>Empirical formula: C₄H₁₀O</b>."}, {"heading": "Important Note: Monatomic in Compounds", "body": "When an element is part of a compound, it is treated as <b>monatomic</b> (individual atoms), NOT as its diatomic form. So oxygen in a compound uses O (16.00 g/mol), not O₂. Same for hydrogen — use H (1.008), not H₂."}, {"heading": "Molecular Formula from Empirical", "body": "The molecular formula is a <b>whole-number multiple</b> of the empirical formula. Find <b>n = molecular mass ÷ empirical formula mass</b>. Then multiply ALL subscripts by n. If n = 1, molecular = empirical."}, {"heading": "Molecular Formula Example: CH₂O → Glucose", "body": "Empirical: CH₂O (mass = 30 amu). Molecular mass = 180 amu. <b>n = 180/30 = 6</b>. Molecular formula = C₆H₁₂O₆ (glucose!). The empirical formula only gives the ratio; the molecular formula gives the actual atom count."}, {"heading": "Molecular Formula Example: C₄H₁₀O", "body": "Empirical C₄H₁₀O has mass = 4(12.01) + 10(1.008) + 16.00 = 74.12 g/mol. Measured molecular mass = 222.1 g/mol. <b>n = 222.1/74.12 = 2.997 ≈ 3</b>. Molecular formula: <b>C₁₂H₃₀O₃</b>."}, {"heading": "The Complete Flowchart", "body": "<b>% composition → assume 100 g → grams of each element → divide by atomic mass → moles → divide by smallest → whole-number ratio → empirical formula</b>. Then: <b>n = molecular mass ÷ empirical mass → multiply subscripts by n → molecular formula</b>."}, {"heading": "Formula Mass Calculation Tips", "body": "For complex formulas, work systematically. Al₂(SO₄)₃: 2(26.98) + 3[32.07 + 4(16.00)] = 53.96 + 3(96.07) = 53.96 + 288.21 = <b>342.17 g/mol</b>. Don't forget to distribute the subscript outside parentheses!"}, {"heading": "Conversion Chain Summary", "body": "<b>grams → (÷ molar mass) → moles → (× Nₐ) → particles</b>. Reverse: <b>particles → (÷ Nₐ) → moles → (× molar mass) → grams</b>. This chain is THE most important skill in general chemistry. Practice until automatic."}, {"heading": "Key Equations", "body": "<b>Formula mass = Σ(atomic masses)</b><br><b>Molar mass (g/mol) = formula mass (amu)</b><br><b>% element = (element mass in formula / formula mass) × 100</b><br><b>n = molecular mass / empirical mass</b><br><b>1 mol = 6.022 × 10²³ particles</b><br><b>Nₐ = 6.02214 × 10²³</b>"}, {"heading": "Common Mistakes to Avoid", "body": "<b>1)</b> Forgetting to distribute subscripts outside parentheses (e.g., in Ca(OH)₂, there are 2 O and 2 H). <b>2)</b> Using O₂ mass (32) instead of O (16) when finding formula mass. <b>3)</b> Rounding too early in empirical formula — divide first, THEN round. <b>4)</b> Forgetting sig figs in final answers."}], "quiz": [{"q": "Formula mass is the sum of:", "a": ["Atomic numbers", "Average atomic masses of all atoms", "Protons only", "Electrons"], "c": 1}, {"q": "H₂O formula mass:", "a": ["16.00", "18.02", "20.02", "2.02"], "c": 1}, {"q": "Ionic compounds use the term:", "a": ["Molecular mass", "Formula mass", "Atomic mass", "Mole mass"], "c": 1}, {"q": "1 mole = ___ particles:", "a": ["6.022 × 10²³", "3.14 × 10²³", "6.022 × 10²⁶", "1.602 × 10⁻¹⁹"], "c": 0}, {"q": "Avogadro's number is:", "a": ["A mass", "A count of particles per mole", "A volume", "A temperature"], "c": 1}, {"q": "Molar mass units:", "a": ["amu", "g/mol", "kg", "mol/L"], "c": 1}, {"q": "Molar mass numerically equals:", "a": ["Atomic number", "Formula mass in amu", "Density", "Volume"], "c": 1}, {"q": "1 mole of ¹²C weighs:", "a": ["1 g", "6 g", "12 g", "24 g"], "c": 2}, {"q": "Grams to moles: you ___:", "a": ["Multiply by molar mass", "Divide by molar mass", "Multiply by Nₐ", "Divide by Nₐ"], "c": 1}, {"q": "Moles to particles: you ___:", "a": ["Divide by molar mass", "Multiply by molar mass", "Multiply by Nₐ", "Divide by Nₐ"], "c": 2}, {"q": "150.0 g Mg (MM=24.305) = ___ mol:", "a": ["3.65", "6.17", "24.3", "150"], "c": 1}, {"q": "C₁₂H₂₂O₁₁ molar mass ≈:", "a": ["180", "270", "342", "510"], "c": 2}, {"q": "1.3 mol H₂O = ___ molecules:", "a": ["7.83 × 10²³", "6.02 × 10²³", "1.3 × 10²³", "4.63 × 10²³"], "c": 0}, {"q": "1.6 mol NaCl weighs:", "a": ["35 g", "58 g", "93 g", "117 g"], "c": 2}, {"q": "Al₂(SO₄)₃ molar mass:", "a": ["150", "270", "342", "450"], "c": 2}, {"q": "1 mol Ca weighs:", "a": ["20 g", "40 g", "60 g", "80 g"], "c": 1}, {"q": "23 g NaOH = ___ mol:", "a": ["0.23", "0.58", "1.0", "2.3"], "c": 1}, {"q": "4.2 × 10²⁵ H₂O molecules = ___ mol:", "a": ["7", "42", "70", "420"], "c": 2}, {"q": "Percent composition = element mass ÷:", "a": ["Atomic number", "Formula mass × 100", "Nₐ", "Volume"], "c": 1}, {"q": "%N in NH₃ (FM=17.03):", "a": ["14.01%", "58.5%", "82.27%", "100%"], "c": 2}, {"q": "To find empirical formula from %, first:", "a": ["Balance equation", "Assume 100 g sample", "Find density", "Measure volume"], "c": 1}, {"q": "After converting to moles, divide by:", "a": ["Largest mole value", "Smallest mole value", "Average", "Sum"], "c": 1}, {"q": "If mole ratios aren't whole numbers:", "a": ["Round down", "Multiply all by smallest integer to get whole numbers", "Ignore decimals", "Start over"], "c": 1}, {"q": "Empirical formula of C₆H₁₂O₆:", "a": ["C₆H₁₂O₆", "CH₂O", "C₃H₆O₃", "CHO"], "c": 1}, {"q": "n (for molecular formula) =:", "a": ["Moles × Nₐ", "Molecular mass ÷ empirical mass", "Atomic number", "Formula mass"], "c": 1}, {"q": "CH₂O with molecular mass 180: molecular formula =:", "a": ["CH₂O", "C₂H₄O₂", "C₃H₆O₃", "C₆H₁₂O₆"], "c": 3}, {"q": "C₄H₁₀O empirical mass = 74.12, molecular mass = 222.1, n =:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Molecular formula when n=3 and empirical is C₄H₁₀O:", "a": ["C₄H₁₀O", "C₈H₂₀O₂", "C₁₂H₃₀O₃", "C₁₆H₄₀O₄"], "c": 2}, {"q": "Oxygen in compounds is treated as:", "a": ["O₂ (diatomic)", "O (monatomic)", "O₃ (triatomic)", "Depends"], "c": 1}, {"q": "NaCl formula mass (Na=22.99, Cl=35.45):", "a": ["35.45", "57.44", "58.44", "93.89"], "c": 2}, {"q": "Conversion chain: grams → ___ → particles:", "a": ["Volume", "Moles", "Density", "Temperature"], "c": 1}, {"q": "1 mol of any substance has ___ particles:", "a": ["Different numbers", "The same number (Nₐ)", "Unknown", "Zero"], "c": 1}, {"q": "Which has more molecules: 1 mol H₂O or 1 mol CO₂?", "a": ["H₂O", "CO₂", "Same", "Cannot tell"], "c": 2}, {"q": "Sig figs: 150.0 g has ___ sig figs:", "a": ["2", "3", "4", "5"], "c": 2}, {"q": "Ca(OH)₂ has how many H atoms?", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Ca(OH)₂ molar mass (Ca=40, O=16, H=1):", "a": ["57", "74", "82", "96"], "c": 1}, {"q": "The mole links:", "a": ["Mass and volume", "Mass and particle count", "Temperature and pressure", "Charge and mass"], "c": 1}, {"q": "Formula mass of CO₂:", "a": ["28", "32", "44", "60"], "c": 2}, {"q": "23 g NaOH = ___ molecules:", "a": ["6.02 × 10²³", "3.46 × 10²³", "0.58 × 10²³", "23 × 10²³"], "c": 1}, {"q": "Percent H in H₂O:", "a": ["11.2%", "88.8%", "50%", "16%"], "c": 0}, {"q": "If empirical = molecular formula, n =:", "a": ["0", "1", "2", "∞"], "c": 1}, {"q": "5.397 mol C ÷ 1.349 (smallest) =:", "a": ["1", "2", "4", "5.4"], "c": 2}, {"q": "A compound is 64.82% C. In 100 g, there are ___ g C:", "a": ["6.482", "32.41", "64.82", "100"], "c": 2}, {"q": "Empirical formula gives:", "a": ["Actual atom count", "Simplest ratio", "Bond structure", "Mass"], "c": 1}, {"q": "Molecular formula gives:", "a": ["Simplest ratio", "Actual number of atoms", "Only masses", "Only ratios"], "c": 1}, {"q": "Common mistake: using O₂ (32) instead of O (16) when:", "a": ["Balancing equations", "Calculating formula mass of compounds", "Finding gas volume", "Naming compounds"], "c": 1}, {"q": "Rounding in empirical formula: when do you round?", "a": ["Before dividing", "After dividing by smallest", "Never", "Every step"], "c": 1}, {"q": "Molar mass of O₂:", "a": ["16.00", "32.00", "48.00", "8.00"], "c": 1}, {"q": "Molar mass of H₂:", "a": ["1.008", "2.016", "4.032", "0.504"], "c": 1}, {"q": "The complete chain from % to molecular formula goes through:", "a": ["Grams → moles → ratio → empirical → ×n → molecular", "Direct calculation", "Only one step", "Density first"], "c": 0}]}, {"id": "chem-ch3b", "title": "Chapter 3 (cont): Solutions & Concentration", "ln": "CHEM 260 · Ch 3 cont.", "notes": [{"heading": "Review — The Mole", "body": "1 mole = <b>6.02214 × 10²³ particles</b> (Avogadro's number, Nₐ). Molar mass (g/mol) = formula mass (amu). A single ¹²C = 12 amu; a mole of ¹²C = 12 g. Different substances have different molar masses but the SAME number of particles per mole."}, {"heading": "Review — Mole Conversions", "body": "<b>grams → moles:</b> divide by molar mass. <b>moles → particles:</b> multiply by Nₐ. Example: 150.0 g Mg ÷ 24.305 = 6.171 mol × 6.022×10²³ = 3.716×10²⁴ atoms."}, {"heading": "Review — Practice Answers", "body": "1.3 mol H₂O = <b>7.83×10²³</b> molecules. 1.6 mol NaCl = <b>92.8 g</b>. Al₂(SO₄)₃ = <b>342 g/mol</b>. 1 mol Ca = <b>40 g</b>. 23 g NaOH = <b>0.58 mol</b> = <b>3.46×10²³</b> molecules. 4.2×10²⁵ H₂O = <b>70 mol</b>."}, {"heading": "Review — Percent Composition", "body": "% by mass = (element mass in formula ÷ formula mass) × 100. Example: 10.0 g compound with 2.5 g H and 7.5 g C → %H = 25%, %C = 75%. From formula: NH₃ → %N = 14.01/17.03 × 100 = 82.27%."}, {"heading": "Review — Empirical Formula Steps", "body": "<b>1)</b> Convert masses (or % as grams from 100 g) to moles. <b>2)</b> Divide each by the smallest mole value. <b>3)</b> Multiply by integer if needed for whole numbers. <b>4)</b> These become subscripts. Remember: O and H in compounds are always monatomic."}, {"heading": "Review — Empirical Worked Example", "body": "64.82% C, 21.59% O, 13.59% H → Assume 100 g. C: 64.82/12.01 = 5.397 mol. H: 13.59/1.008 = 13.48 mol. O: 21.59/16.00 = 1.349 mol. Divide by 1.349 → C≈4, H≈10, O=1 → <b>C₄H₁₀O</b>."}, {"heading": "Review — Molecular Formula", "body": "n = molecular mass ÷ empirical mass. Multiply all subscripts by n. CH₂O (30 amu) with molecular mass 180 → n=6 → <b>C₆H₁₂O₆</b>. C₄H₁₀O (74.12) with molecular mass 222.1 → n=3 → <b>C₁₂H₃₀O₃</b>."}, {"heading": "Solutions — Definitions", "body": "<b>Solution:</b> a homogeneous mixture, uniform over its entire volume. <b>Concentration:</b> relative amount of a given component (concentrated vs dilute). <b>Solvent:</b> the majority component. <b>Solute:</b> the minority component. Most common type: <b>aqueous solution</b> (water as solvent)."}, {"heading": "Molarity — Definition", "body": "<b>Molarity (M)</b> = number of moles of solute in exactly 1 liter of solution. Formula: <b>M = moles of solute ÷ liters of solution</b>. Units: mol/L (also written as M). This is the most common concentration unit in chemistry."}, {"heading": "Molarity — Calculation Example (Q5)", "body": "355 mL soft drink contains 0.133 mol sucrose. <b>M = 0.133 mol ÷ 0.355 L = 0.375 M</b>. Always convert mL to L first (divide by 1000). Include proper sig figs."}, {"heading": "Finding Moles from Molarity (Q6)", "body": "How much sugar in a 10 mL sip of 0.375 M solution? Rearrange: <b>moles = M × V</b>. moles = 0.375 mol/L × 0.010 L = <b>0.00375 mol</b> = 3.75 × 10⁻³ mol sucrose."}, {"heading": "Molarity from Mass", "body": "When given grams instead of moles, first convert grams → moles, then use molarity formula. Example: 0.175 g ammonium acetate (MW = 77.08 g/mol) in 45 mL. <b>Step 1:</b> 0.175 ÷ 77.08 = 0.00227 mol. <b>Step 2:</b> M = 0.00227 ÷ 0.045 = <b>0.0504 M</b>."}, {"heading": "Molarity Practice (Q7)", "body": "0.500 L vinegar contains 25.2 g acetic acid (CH₃CO₂H, MW = 60.052). <b>Step 1:</b> 25.2 g ÷ 60.052 g/mol = 0.4197 mol. <b>Step 2:</b> M = 0.4197 ÷ 0.500 = <b>0.839 M</b>."}, {"heading": "Key Molarity Relationships", "body": "Three forms of the same equation: <b>M = n/V</b>, <b>n = M × V</b>, <b>V = n/M</b>. Where n = moles, V = volume in liters, M = molarity. If given grams, convert to moles first using molar mass."}, {"heading": "Dilution — Concept", "body": "Adding solvent to a solution <b>decreases concentration</b> but <b>does NOT change the amount of solute</b>. The moles of solute before dilution = moles after dilution. Think of it as spreading the same amount of sugar through more water."}, {"heading": "Dilution Equation", "body": "Since n₁ = n₂ (moles don't change), and n = M × V: <b>M₁V₁ = M₂V₂</b>. This is the dilution equation. Works with any consistent units. Use to find new concentration after adding solvent, or volume needed to reach target concentration."}, {"heading": "Dilution Practice (Q8)", "body": "0.850 L of 5.00 M Cu(NO₃)₂ diluted to 1.80 L. M₁V₁ = M₂V₂ → 5.00 × 0.850 = M₂ × 1.80 → M₂ = 4.25 ÷ 1.80 = <b>2.36 M</b>. Concentration decreased because volume increased."}, {"heading": "Mass Percentage", "body": "<b>Mass % = (mass of component ÷ mass of solution) × 100</b>. Example: 5 g NaCl dissolved in 95 g water → total solution = 100 g → mass % = 5/100 × 100 = <b>5.00%</b>. Note: mass of solution = mass solute + mass solvent."}, {"heading": "Volume Percentage", "body": "Used when a <b>liquid solute</b> is dissolved in a <b>liquid solvent</b>. <b>Volume % = (volume of solute ÷ volume of solution) × 100</b>. Example: rubbing alcohol is often labeled as 70% isopropanol by volume."}, {"heading": "Mass-Volume Percentage", "body": "Ratio of solute's mass to solution's volume, expressed as %. <b>m/v % = (mass of solute in g ÷ volume of solution in mL) × 100</b>. Common in medicine/pharmacy. Example: 0.9% saline = 0.9 g NaCl per 100 mL solution."}, {"heading": "Parts Per Million (ppm)", "body": "For <b>very low (trace) concentrations</b>. <b>1 ppm = 1 mg solute per 1 kg solution</b> (or 1 mg/L for dilute aqueous solutions since water density ≈ 1 g/mL). Used for pollutants, water quality, etc."}, {"heading": "Parts Per Billion (ppb)", "body": "Even smaller concentrations. <b>1 ppm = 1000 ppb</b> (or 10³ ppb). So 1 ppb = 1 μg/kg. Used for trace contaminants like lead in water. EPA lead limit: 15 ppb."}, {"heading": "Concentration Unit Comparison", "body": "<b>Molarity:</b> mol/L — most common in chemistry. <b>Mass %:</b> g solute/g solution × 100. <b>Volume %:</b> mL solute/mL solution × 100. <b>ppm:</b> mg/kg — for traces. <b>ppb:</b> μg/kg — for ultra-traces. Choose the unit that fits the context."}, {"heading": "Converting Between Units", "body": "Often need to convert between concentration units. Key: know the <b>mass of solute, mass/volume of solution, and molar mass</b>. From mass % to molarity: need solution density. From molarity to mass %: multiply M by MW, divide by density × 10."}, {"heading": "Key Equations Summary", "body": "<b>M = mol/V(L)</b><br><b>n = M × V</b><br><b>M₁V₁ = M₂V₂</b> (dilution)<br><b>Mass % = (mass solute / mass solution) × 100</b><br><b>ppm = mg solute / kg solution</b><br><b>1 ppm = 10³ ppb</b><br><b>grams → (÷ MM) → moles → (÷ V) → Molarity</b>"}], "quiz": [{"q": "Molarity is defined as:", "a": ["g/L", "mol/L", "mol/mL", "g/mol"], "c": 1}, {"q": "M = moles ÷:", "a": ["Grams", "Kilograms", "Liters of solution", "mL of solvent"], "c": 2}, {"q": "0.133 mol in 355 mL = ___ M:", "a": ["0.133", "0.355", "0.375", "1.33"], "c": 2}, {"q": "To find moles from molarity: n =:", "a": ["M ÷ V", "M × V", "M + V", "M − V"], "c": 1}, {"q": "10 mL of 0.375 M solution contains ___ mol:", "a": ["3.75", "0.375", "0.00375", "37.5"], "c": 2}, {"q": "To get molarity from grams, first:", "a": ["Find volume", "Convert grams to moles", "Add water", "Measure temperature"], "c": 1}, {"q": "25.2 g acetic acid (MW=60.05) in 0.500 L = ___ M:", "a": ["0.420", "0.839", "1.26", "25.2"], "c": 1}, {"q": "Dilution does NOT change:", "a": ["Volume", "Concentration", "Moles of solute", "Temperature"], "c": 2}, {"q": "The dilution equation is:", "a": ["M = n/V", "M₁V₁ = M₂V₂", "PV = nRT", "q = mcΔT"], "c": 1}, {"q": "5.00 M × 0.850 L diluted to 1.80 L = ___ M:", "a": ["1.00", "2.36", "5.00", "9.44"], "c": 1}, {"q": "Adding solvent to solution ___ concentration:", "a": ["Increases", "Decreases", "Doesn't change", "Doubles"], "c": 1}, {"q": "Solvent is the ___ component:", "a": ["Minority", "Majority", "Solid", "Gas"], "c": 1}, {"q": "Solute is the ___ component:", "a": ["Majority", "Minority", "Liquid always", "Gas always"], "c": 1}, {"q": "Aqueous means dissolved in:", "a": ["Alcohol", "Oil", "Water", "Acid"], "c": 2}, {"q": "Mass % = mass solute ÷:", "a": ["Mass solvent × 100", "Mass solution × 100", "Volume × 100", "Moles × 100"], "c": 1}, {"q": "5 g NaCl in 95 g water = ___ mass %:", "a": ["5.0%", "5.26%", "9.5%", "95%"], "c": 0}, {"q": "Volume % is used for:", "a": ["Solid in solid", "Liquid in liquid", "Gas in solid", "Ion in crystal"], "c": 1}, {"q": "0.9% saline is a ___ percentage:", "a": ["Mass", "Volume", "Mass-volume", "Molarity"], "c": 2}, {"q": "1 ppm =:", "a": ["1 g/kg", "1 mg/kg", "1 kg/g", "1 mol/L"], "c": 1}, {"q": "1 ppm = ___ ppb:", "a": ["10", "100", "1000", "1,000,000"], "c": 2}, {"q": "ppm is used for:", "a": ["Concentrated solutions", "Trace amounts", "Pure substances", "Gases only"], "c": 1}, {"q": "ppb stands for parts per:", "a": ["Billion", "Base", "Batch", "Block"], "c": 0}, {"q": "EPA lead limit in water is about:", "a": ["15 ppm", "15 ppb", "15 g/L", "15 M"], "c": 1}, {"q": "For dilute aqueous solutions, 1 ppm ≈:", "a": ["1 g/L", "1 mg/L", "1 kg/L", "1 mol/L"], "c": 1}, {"q": "Solution = ___ mixture:", "a": ["Heterogeneous", "Homogeneous", "Suspension", "Colloid"], "c": 1}, {"q": "Convert 500 mL to L:", "a": ["5.00", "0.500", "50.0", "0.050"], "c": 1}, {"q": "0.175 g (MW=77.08) = ___ mol:", "a": ["0.00227", "0.175", "77.08", "13.5"], "c": 0}, {"q": "0.00227 mol in 0.045 L = ___ M:", "a": ["0.0504", "0.102", "0.227", "0.450"], "c": 0}, {"q": "Concentrated means:", "a": ["Low solute amount", "High solute amount", "Pure solvent", "No solute"], "c": 1}, {"q": "Dilute means:", "a": ["High solute amount", "Low solute amount", "Pure solute", "Saturated"], "c": 1}, {"q": "In M₁V₁ = M₂V₂, if V increases then M:", "a": ["Increases", "Decreases", "Stays same", "Doubles"], "c": 1}, {"q": "Which is NOT a concentration unit?", "a": ["Molarity", "Mass %", "ppm", "Molar mass"], "c": 3}, {"q": "Moles of solute = M ×:", "a": ["Mass", "Volume in L", "Nₐ", "Temperature"], "c": 1}, {"q": "V in molarity must be in:", "a": ["mL", "cm³", "Liters", "μL"], "c": 2}, {"q": "150.0 g Mg ÷ 24.305 g/mol =:", "a": ["3.65 mol", "6.17 mol", "24.3 mol", "150 mol"], "c": 1}, {"q": "C₁₂H₂₂O₁₁ molar mass ≈:", "a": ["180", "270", "342", "510"], "c": 2}, {"q": "Empirical formula of C₆H₁₂O₆:", "a": ["C₆H₁₂O₆", "CH₂O", "C₃H₆O₃", "CHO"], "c": 1}, {"q": "CH₂O (30 amu), molecular mass 180, n =:", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "C₄H₁₀O (74.12), molecular mass 222.1, n =:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Molecular formula = empirical ×:", "a": ["Nₐ", "n", "Molar mass", "Density"], "c": 1}, {"q": "% composition of all elements should sum to:", "a": ["0", "50", "100", "Varies"], "c": 2}, {"q": "23 g NaOH (MM=40) = ___ mol:", "a": ["0.40", "0.58", "1.00", "23"], "c": 1}, {"q": "Al₂(SO₄)₃ molar mass:", "a": ["150", "270", "342", "450"], "c": 2}, {"q": "1 mol Ca weighs:", "a": ["20 g", "40 g", "60 g", "80 g"], "c": 1}, {"q": "Molar mass units:", "a": ["amu", "g/mol", "kg", "mol/L"], "c": 1}, {"q": "Avogadro's number:", "a": ["6.022 × 10²³", "3.14 × 10²³", "1.602 × 10⁻¹⁹", "9.109 × 10⁻³¹"],
