n 3 stages, processed IN ORDER: <b>Photosystem II first → cytochrome → Photosystem I → NADPH</b>. (Numbered by discovery order, not functional order!) Electrons flow: PS II → PS I."}, {"heading": "Photosystem II — Water Splitting", "body": "PS II uses light energy to <b>split water</b> into <b>oxygen + H⁺</b>. This is where plants make <b>O₂</b> — the 'waste product' essential for animal life! <b>2H₂O → O₂ + 4H⁺ + 4e⁻</b>. Some energy also moves H⁺ across the membrane (builds the gradient)."}, {"heading": "Photosystem I — NADPH Production", "body": "PS I uses a photon of light to make <b>NADPH</b> — a critical molecule for storing CO₂ as sugar. PS I <b>requires PS II to be active</b> — it can't function alone (needs the electrons from PS II). The electron flow: H₂O → PS II → cytochrome → PS I → NADPH."}, {"heading": "ATP Synthesis in Light Reactions", "body": "<b>F-type ATPases</b> make ATP using H⁺ ions flowing back across the thylakoid membrane — <b>same chemiosmosis as mitochondria</b>. ATP and NADPH are the two products that feed into the dark reactions. ADP is recycled back (oxidized cofactor recycling)."}, {"heading": "Light Reactions Summary", "body": "<b>Inputs:</b> H₂O + light. <b>Outputs:</b> O₂ + ATP + NADPH. Water is split → O₂ released. Light energy captured → stored as ATP and NADPH. These energy carriers power the Calvin cycle. Occurs ONLY in light."}, {"heading": "Dark Reactions — Overview", "body": "Take ATP + NADPH (from light reactions) + CO₂ → <b>build sugars</b>. Called 'dark' reactions because light is <b>NOT directly required</b> — they can occur in light or dark, as long as ATP and NADPH are available. Also called the <b>Calvin cycle</b>. This is Part B of photosynthesis."}, {"heading": "The Calvin Cycle — Carbon Fixation", "body": "Converts <b>3 CO₂ molecules</b> into <b>1 three-carbon sugar</b> (glyceraldehyde 3-phosphate, G3P/PGAL). The key enzyme: <b>Rubisco</b> — adds CO₂ to a 5-carbon sugar (ribulose 1,5-bisphosphate). This is <b>carbon fixation</b> — taking CO₂ from the air and incorporating it into organic molecules."}, {"heading": "Calvin Cycle — Counting Carbons", "body": "3 molecules of ribulose 1,5-bisphosphate = 3 × 5 = <b>15 carbons</b>. Add 3 CO₂ (3 carbons) = <b>18 carbons</b> total → 6 three-carbon molecules. Rubisco is the essential enzyme for ALL CO₂ addition. Tracking carbons helps keep the cycle straight."}, {"heading": "Calvin Cycle — Energy Input", "body": "Energy added to the 3-carbon sugars: <b>1 ATP per sugar</b>, then <b>1 NADPH per sugar</b>. Products = glyceraldehyde 3-phosphate (G3P) — the <b>same molecule found in glycolysis</b>! Total energy cost to make 1 glucose (6C): <b>18 ATP + 6 NADPH + 3 CO₂</b>."}, {"heading": "Calvin Cycle — Sugar Output", "body": "<b>1 molecule of G3P (3-carbon)</b> is removed from the cycle to make sugars. The remaining <b>5 three-carbon sugars</b> are rearranged into <b>3 five-carbon sugars</b> (regenerating the starting material). Last <b>3 ATP</b> used to regenerate ribulose 1,5-bisphosphate. Cycle repeats."}, {"heading": "What Happens to G3P?", "body": "G3P has multiple fates: <b>1)</b> In chloroplast: converted to fructose → eventually <b>starch</b> (food storage). <b>2)</b> Leaves chloroplast → makes <b>sucrose</b> in cytoplasm (transport sugar). <b>3)</b> Can enter <b>glycolysis</b> in the cytoplasm for energy. G3P is the versatile building block of plant metabolism."}, {"heading": "Rubisco — The Most Important Enzyme", "body": "<b>Rubisco</b> (ribulose-1,5-bisphosphate carboxylase/oxygenase) is the enzyme that takes CO₂ from the atmosphere and adds it to sugars. It is the <b>most abundant protein on Earth</b> — nearly <b>1000 kg made every second</b>! Without Rubisco, no carbon fixation → no food chain → no life as we know it."}, {"heading": "Photosynthesis — The Big Picture", "body": "<b>ALL energy our bodies use comes from the sun</b> (eventually). Chlorophyll captures sunlight → Rubisco fixes CO₂ into sugar. We couldn't live without plants. <b>Water plants and algae</b> are just as important as land plants — they produce ~50% of Earth's O₂."}, {"heading": "Light vs Dark Reactions Comparison", "body": "<b>Light reactions:</b> thylakoid membranes, need light, split H₂O, produce O₂ + ATP + NADPH. <b>Dark reactions:</b> stroma, don't need light directly, fix CO₂, produce G3P (sugar), consume ATP + NADPH. Both are essential — light reactions power the dark reactions."}, {"heading": "Photosynthesis vs Cellular Respiration", "body": "<b>Photosynthesis:</b> CO₂ + H₂O + light → glucose + O₂ (stores energy). <b>Respiration:</b> glucose + O₂ → CO₂ + H₂O + ATP (releases energy). They are essentially <b>reverse</b> processes. Plants do BOTH (photosynthesis in light, respiration always). Animals only do respiration."}, {"heading": "Electron Flow Summary", "body": "<b>H₂O → PS II → cytochrome b₆f → PS I → NADPH</b>. Water provides electrons (and releases O₂). PS II boosts electrons with light energy. Cytochrome complex pumps H⁺. PS I boosts electrons again with light. Final electron acceptor: NADP⁺ → NADPH. This is called <b>non-cyclic electron flow</b>."}, {"heading": "Comparing Chloroplasts & Mitochondria", "body": "Both use <b>chemiosmosis</b> (H⁺ gradient → ATP synthase → ATP). Both have <b>electron transport chains</b>. Both have <b>own DNA and ribosomes</b> (endosymbiont theory). Difference: chloroplasts pump H⁺ IN, mitochondria pump H⁺ OUT. Chloroplasts use light; mitochondria use food."}, {"heading": "Why Leaves Change Color in Fall", "body": "During growing season, <b>chlorophyll (green)</b> dominates and masks other pigments. In fall, chlorophyll breaks down → <b>carotenoids</b> (orange/yellow) and <b>anthocyanins</b> (red/purple) become visible. These accessory pigments were always there — helping capture different wavelengths of light."}, {"heading": "Key Concepts Summary", "body": "<b>Light reactions:</b> thylakoids, H₂O → O₂ + ATP + NADPH. <b>PS II:</b> splits water, makes O₂. <b>PS I:</b> makes NADPH. <b>Dark reactions/Calvin:</b> stroma, 3CO₂ → G3P using 18 ATP + 6 NADPH. <b>Rubisco:</b> fixes CO₂, most abundant protein on Earth. <b>Chlorophyll:</b> Mg-based, like heme. <b>G3P</b> → starch/sucrose/glycolysis."}], "quiz": [{"q": "Photosynthesis converts ___ energy to ___ energy:", "a": ["Chemical/light", "Light/chemical", "Heat/light", "Chemical/heat"], "c": 1}, {"q": "Light reactions occur in:", "a": ["Stroma", "Thylakoid membranes", "Cytoplasm", "Nucleus"], "c": 1}, {"q": "Dark reactions occur in:", "a": ["Thylakoid membranes", "Stroma", "Cytoplasm", "Mitochondria"], "c": 1}, {"q": "Overall equation: 6CO₂ + 6H₂O + light →:", "a": ["C₆H₁₂O₆ + 6O₂", "6CO₂ + ATP", "Only O₂", "Only glucose"], "c": 0}, {"q": "Grana are stacks of:", "a": ["Cristae", "Thylakoids", "Ribosomes", "Nuclei"], "c": 1}, {"q": "In light reactions, H⁺ is pumped:", "a": ["Out of thylakoids", "Into thylakoids", "Into stroma", "Out of chloroplast"], "c": 1}, {"q": "In mitochondria, H⁺ is pumped:", "a": ["Into matrix", "Into thylakoids", "Out of matrix", "Into nucleus"], "c": 2}, {"q": "Light reactions produce:", "a": ["Only ATP", "Only O₂", "O₂ + ATP + NADPH", "Glucose"], "c": 2}, {"q": "Chlorophyll uses ___ instead of iron:", "a": ["Calcium", "Sodium", "Magnesium", "Potassium"], "c": 2}, {"q": "Chlorophyll structure is similar to:", "a": ["DNA", "Heme (hemoglobin)", "Cellulose", "Glucose"], "c": 1}, {"q": "Which photosystem runs FIRST?", "a": ["PS I", "PS II", "Both simultaneously", "Neither"], "c": 1}, {"q": "PS II splits ___ to produce O₂:", "a": ["CO₂", "Glucose", "Water", "ATP"], "c": 2}, {"q": "O₂ from photosynthesis comes from:", "a": ["CO₂", "Glucose", "Water splitting", "ATP"], "c": 2}, {"q": "PS I makes:", "a": ["O₂", "ATP only", "NADPH", "Glucose"], "c": 2}, {"q": "PS I requires ___ to be active:", "a": ["Only light", "PS II", "Rubisco", "Dark reactions"], "c": 1}, {"q": "ATP in light reactions is made by:", "a": ["Rubisco", "Substrate phosphorylation", "F-type ATPase (chemiosmosis)", "Direct light"], "c": 2}, {"q": "Dark reactions are called 'dark' because:", "a": ["They only occur at night", "Light is not directly required", "They produce darkness", "They destroy light"], "c": 1}, {"q": "The Calvin cycle fixes:", "a": ["O₂", "N₂", "CO₂", "H₂O"], "c": 2}, {"q": "Rubisco adds ___ to sugar:", "a": ["O₂", "H₂O", "CO₂", "ATP"], "c": 2}, {"q": "Calvin cycle converts 3 CO₂ into:", "a": ["1 six-carbon sugar directly", "1 three-carbon sugar (G3P)", "3 one-carbon molecules", "6 CO₂"], "c": 1}, {"q": "Energy cost for 1 glucose (Calvin): ___ ATP + ___ NADPH:", "a": ["6 + 3", "12 + 6", "18 + 6", "3 + 18"], "c": 2}, {"q": "Rubisco is the ___ protein on Earth:", "a": ["Rarest", "Most abundant", "Smallest", "Newest"], "c": 1}, {"q": "~___ kg of Rubisco made per second:", "a": ["1", "10", "100", "1000"], "c": 3}, {"q": "G3P can become:", "a": ["Only starch", "Starch, sucrose, or enter glycolysis", "Only CO₂", "Only ATP"], "c": 1}, {"q": "G3P is the same molecule found in:", "a": ["TCA cycle", "Glycolysis", "ETC", "DNA replication"], "c": 1}, {"q": "Starch is stored in the:", "a": ["Cytoplasm", "Chloroplast", "Mitochondria", "Nucleus"], "c": 1}, {"q": "Sucrose is made in the:", "a": ["Chloroplast", "Cytoplasm", "Mitochondria", "Vacuole"], "c": 1}, {"q": "Electron flow: H₂O → PS II → cytochrome →:", "a": ["ATP only", "PS I → NADPH", "Glucose", "CO₂"], "c": 1}, {"q": "Final electron acceptor in light reactions:", "a": ["O₂", "CO₂", "NADP⁺ (→ NADPH)", "H₂O"], "c": 2}, {"q": "Plants do photosynthesis AND:", "a": ["Only photosynthesis", "Cellular respiration too", "Neither", "Only fermentation"], "c": 1}, {"q": "Animals do:", "a": ["Photosynthesis only", "Respiration only", "Both", "Neither"], "c": 1}, {"q": "Photosynthesis is essentially the ___ of respiration:", "a": ["Same as", "Reverse", "Unrelated to", "Faster version"], "c": 1}, {"q": "Leaves change color because:", "a": ["New pigments form", "Chlorophyll breaks down, revealing other pigments", "Leaves die", "Temperature changes pigments"], "c": 1}, {"q": "Carotenoids are ___ colored:", "a": ["Green", "Orange/yellow", "Blue", "Clear"], "c": 1}, {"q": "Water plants and algae produce ~___% of Earth's O₂:", "a": ["5", "10", "25", "50"], "c": 3}, {"q": "Both chloroplasts and mitochondria use:", "a": ["Only glycolysis", "Chemiosmosis", "Only fermentation", "Only light"], "c": 1}, {"q": "Reaction center is an 'energy ___':", "a": ["Destroyer", "Funnel", "Block", "Wall"], "c": 1}, {"q": "Ribulose 1,5-bisphosphate has ___ carbons:", "a": ["3", "4", "5", "6"], "c": 2}, {"q": "3 RuBP (5C each) + 3 CO₂ = ___ total carbons:", "a": ["15", "16", "18", "21"], "c": 2}, {"q": "Calvin cycle: 5 G3P are used to regenerate:", "a": ["ATP", "NADPH", "3 RuBP (starting material)", "O₂"], "c": 2}, {"q": "Last 3 ATP in Calvin cycle are used for:", "a": ["Making sugar", "Regenerating RuBP", "Splitting water", "Nothing"], "c": 1}, {"q": "Non-cyclic electron flow ends with:", "a": ["Water", "O₂", "NADPH", "CO₂"], "c": 2}, {"q": "Chlorophyll is hydrophobic because of its:", "a": ["Magnesium", "Ring structure", "Long lipid chain", "Color"], "c": 2}, {"q": "Chlorophyll a vs b: b has a:", "a": ["Extra ring", "Carbonyl group", "Iron atom", "Extra lipid"], "c": 1}, {"q": "All energy our bodies use comes from:", "a": ["The moon", "The sun (eventually)", "Earth's core", "Water"], "c": 1}, {"q": "Carbon fixation means:", "a": ["Releasing CO₂", "Incorporating CO₂ into organic molecules", "Breaking down sugar", "Producing O₂"], "c": 1}, {"q": "Without Rubisco:", "a": ["No carbon fixation → no life", "More CO₂", "Faster photosynthesis", "No change"], "c": 0}, {"q": "Dark reactions consume:", "a": ["O₂ and glucose", "ATP and NADPH", "Light directly", "Only water"], "c": 1}, {"q": "Accessory pigments help by:", "a": ["Blocking light", "Capturing different wavelengths", "Producing O₂ directly", "Making ATP"], "c": 1}, {"q": "NADPH is similar to:", "a": ["ATP", "NADH", "DNA", "Glucose"], "c": 1}]}, {"id": "bio-l9", "title": "Lesson 9: Mendelian Inheritance", "ln": "BIO · L9", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Use and apply Mendel's Law of Segregation. <b>2)</b> Use and apply Mendel's Law of Independent Assortment. <b>3)</b> Understand complex inheritance patterns (incomplete dominance, codominance, epistasis). <b>4)</b> Use pedigrees to analyze family genetic histories."}, {"heading": "Gregor Mendel — Background", "body": "Monk at St Thomas Abbey in Brno, Czech Republic. Studied <b>garden peas</b> from 1856-63, published 1866. Mostly ignored until 1900, when 3 scientists independently reached similar conclusions. His work was special because it was: <b>1)</b> Quantitative, <b>2)</b> Carefully documented, <b>3)</b> Elegantly designed."}, {"heading": "Why Peas Were Perfect", "body": "Two key advantages: <b>1)</b> Could pollinate from specific parents (controlled crosses). <b>2)</b> Chose <b>unambiguous phenotypes</b> easy to identify (round vs wrinkled, yellow vs green, etc.). Breeding for traits was already established — Mendel added the rigor of counting and ratios."}, {"heading": "Key Terminology — Basics", "body": "<b>Cross (mating):</b> sexual reproduction between 2 organisms. <b>Hybrid:</b> cross between parents differing in a trait. <b>Phenotype:</b> observable characteristics. <b>True-breeding:</b> only produces its own phenotype when self-crossed. <b>P₀/F₀:</b> parental generation. <b>F1:</b> first offspring. <b>F2:</b> offspring of F1 × F1."}, {"heading": "Dominant vs Recessive", "body": "<b>Dominant:</b> phenotype visible in the F1 generation (all F1 look like this parent). <b>Recessive:</b> trait that disappears in F1 but <b>reappears in F2</b> after self-cross. In Mendel's peas: round > wrinkled, yellow > green, violet > white, etc."}, {"heading": "The 3:1 Ratio", "body": "F1 × F1 → F2 always gave approximately <b>3:1</b> ratio (dominant:recessive). Example: 593 green : 193 yellow ≈ 3.07:1. This ratio is the hallmark of Mendelian single-gene inheritance with complete dominance."}, {"heading": "The F3 Reveals 1:2:1", "body": "Mendel went further — crossed F2 plants. Of 593 green F2: <b>201</b> produced only green (true-breeding), <b>392</b> produced green + yellow (3:1 again). All 193 yellow → only yellow. Overall F2 genotypes: <b>1/4 homozygous dominant : 2/4 heterozygous : 1/4 homozygous recessive = 1:2:1</b>."}, {"heading": "Principle of Segregation", "body": "From his ratios, Mendel determined: each plant has <b>2 genetic determinants</b> (alleles). In gamete formation, paired alleles <b>separate</b> so each gamete gets only ONE. <b>Mendel's Law of Segregation:</b> paired hereditary determinants separate equally so each gamete is equally likely to contain either one."}, {"heading": "Gametes vs Adults", "body": "<b>Gametes</b> (sperm/egg) have <b>1 allele</b> (haploid). <b>Zygotes and adults</b> have <b>2 alleles</b> (diploid). Convention: <b>CAPITAL</b> = dominant, <b>lowercase</b> = recessive. Most mutations are recessive."}, {"heading": "Punnett Square", "body": "A grid used to determine all possible ways traits can segregate. Cross parental gametes along the edges. Each box = one possible offspring genotype. Example P₀ cross: GG × gg → all F1 = Gg. F1 cross: Gg × Gg → 1 GG : 2 Gg : 1 gg (phenotype 3:1)."}, {"heading": "Test Cross and Backcross", "body": "<b>Test cross:</b> mating to a <b>homozygous recessive</b> individual — reveals the unknown genotype. If all offspring dominant → parent was homozygous dominant. If 1:1 dominant:recessive → parent was heterozygous. <b>Backcross:</b> mating F1 back to the parental (usually recessive) strain."}, {"heading": "More Terminology", "body": "<b>Gene:</b> hereditary element that gets segregated. <b>Allele:</b> particular form of a gene (yes, one gene can have multiple alleles). <b>Homozygous:</b> two copies of SAME allele (GG or gg). <b>Heterozygous:</b> two DIFFERENT alleles (Gg). <b>Genotype:</b> genetic makeup. <b>Phenotype:</b> observable properties."}, {"heading": "Dihybrid Cross", "body": "Parents differ in <b>TWO traits</b>. Example: violet/axial (VVAA) × white/terminal (vvaa). F1 all VvAa (violet/axial = both dominant). F2 Punnett square (4×4 = 16 boxes) gives the famous <b>9:3:3:1 ratio</b>."}, {"heading": "Principle of Independent Assortment", "body": "<b>Mendel's 2nd Law:</b> segregation of any pair of alleles is <b>independent of other pairs</b> in gamete formation. The V gene segregates without regard to the A gene. This produces the 9:3:3:1 ratio. (Later discovered this only applies to genes on DIFFERENT chromosomes.)"}, {"heading": "9:3:3:1 Ratio Details", "body": "F2 dihybrid: <b>9</b> violet/axial : <b>3</b> violet/terminal : <b>3</b> white/axial : <b>1</b> white/terminal. True-breeding fractions: violet/axial 1/9, violet/terminal 1/3, white/axial 1/3, white/terminal ALL. Of 16 boxes, 4 genotypes are true-breeding for both traits."}, {"heading": "Dihybrid Test Cross", "body": "VvAa × vvaa → <b>1:1:1:1 ratio</b> (violet/axial : violet/terminal : white/axial : white/terminal). Each phenotype = 1/4. A test cross reveals the <b>ratio of gametes</b> produced by the F1 parent. Equal ratios confirm independent assortment."}, {"heading": "Incomplete Dominance", "body": "Not all genes show simple dominant/recessive. <b>Incomplete dominance:</b> alleles combine to produce a <b>third, intermediate phenotype</b>. Example: red snapdragon × ivory → <b>ALL pink F1</b>. F2: 1/4 red : 2/4 pink : 1/4 white. Mendel was lucky — all his traits showed full dominance!"}, {"heading": "Codominance — Blood Types", "body": "<b>Codominance:</b> both alleles expressed <b>simultaneously</b> (not blended). ABO blood group: I^A makes A polysaccharide, I^B makes B, i (I⁰) makes none. I^A and I^B are <b>codominant</b> to each other (AB blood type). Both are <b>dominant</b> over i (type O)."}, {"heading": "Blood Type Inheritance", "body": "<b>Type A:</b> I^A I^A or I^A i. <b>Type B:</b> I^B I^B or I^B i. <b>Type AB:</b> I^A I^B (codominant). <b>Type O:</b> ii (both parents must carry i). Antibodies against wrong polysaccharides cause <b>aggregation/strokes/shock</b> — why blood type matching is critical for transfusions."}, {"heading": "Environmental/Conditional Mutations", "body": "A <b>conditional mutation</b> only shows up under the right circumstances — environmental conditions, combined with other genes, etc. <b>Temperature-sensitive mutations</b> are most common. Example: <b>Siamese cats</b> — pigment enzyme only active in cooler body parts (ears, paws, tail, nose) → dark extremities."}, {"heading": "Epistasis", "body": "<b>Epistasis:</b> phenotype of one gene is influenced by the genotype of <b>another gene</b>. Example: Drosophila eye color — brown × scarlet (both homozygous recessive for different genes). F1 = wildtype. F2 = 9 wildtype : 3 brown : 3 scarlet : 1 <b>white</b> (new! double homozygous recessive)."}, {"heading": "Pedigree Analysis — Basics", "body": "For humans, controlled matings aren't feasible. Instead, analyze <b>several generations</b> of related individuals. <b>Pedigree:</b> diagram showing phenotypes across generations. <b>Squares = males, circles = females, solid = affected, lines = relationships</b>."}, {"heading": "Pedigree — Key Terms", "body": "<b>Siblings (sibs):</b> offspring of two parents. <b>Carrier:</b> individual who doesn't show phenotype but passes mutation to offspring — always <b>heterozygous</b>, always for a <b>recessive gene</b>. For dominant genes, there are <b>NO carriers</b> — only affected or unaffected."}, {"heading": "Modern Genetics — DNA Analysis", "body": "Today we combine inheritance analysis with <b>direct DNA testing</b>. For recessive alleles, the DNA is still there (just not expressed) — can be detected directly. <b>DNA arrays</b>: known disease alleles on glass slides, compared to normal DNA to find differences. Enables <b>genetic testing before symptoms appear</b>."}, {"heading": "Key Concepts Summary", "body": "<b>Segregation:</b> alleles separate in gametes (1 per gamete). <b>Independent assortment:</b> genes on different chromosomes sort independently. <b>3:1</b> monohybrid F2. <b>9:3:3:1</b> dihybrid F2. <b>1:1</b> test cross. <b>Incomplete dominance:</b> blended phenotype. <b>Codominance:</b> both expressed. <b>Epistasis:</b> one gene affects another. <b>Pedigrees:</b> squares=males, circles=females, solid=affected."}], "quiz": [{"q": "Mendel studied:", "a": ["Fruit flies", "Garden peas", "Mice", "Corn"], "c": 1}, {"q": "Mendel's work was published in:", "a": ["1856", "1866", "1900", "1953"], "c": 1}, {"q": "His work was special because it was:", "a": ["Qualitative only", "Quantitative, documented, elegantly designed", "Quick and easy", "Done with humans"], "c": 1}, {"q": "F1 generation is offspring of:", "a": ["F2 × F2", "P₀ (parental) cross", "F3 cross", "Random mating"], "c": 1}, {"q": "Dominant trait appears in:", "a": ["Only F2", "Only P₀", "F1 generation", "Only F3"], "c": 2}, {"q": "Recessive trait reappears in:", "a": ["F1", "F2", "P₀", "Never"], "c": 1}, {"q": "F2 monohybrid ratio:", "a": ["1:1", "1:2:1", "3:1", "9:3:3:1"], "c": 2}, {"q": "F2 genotype ratio:", "a": ["3:1", "1:2:1", "9:3:3:1", "1:1"], "c": 1}, {"q": "Law of Segregation: alleles ___ in gamete formation:", "a": ["Double", "Separate equally", "Combine", "Disappear"], "c": 1}, {"q": "Gametes have ___ allele(s) per gene:", "a": ["0", "1", "2", "4"], "c": 1}, {"q": "Adults have ___ allele(s) per gene:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Homozygous means:", "a": ["Two different alleles", "Two same alleles", "No alleles", "Three alleles"], "c": 1}, {"q": "Heterozygous means:", "a": ["Two same alleles", "Two different alleles", "No alleles", "One allele"], "c": 1}, {"q": "Genotype is:", "a": ["Observable traits", "Genetic makeup", "Only dominant", "Only recessive"], "c": 1}, {"q": "Phenotype is:", "a": ["Genetic makeup", "Observable properties", "DNA sequence", "Only recessive"], "c": 1}, {"q": "Capital letter represents:", "a": ["Recessive", "Dominant", "Unknown", "Both"], "c": 1}, {"q": "Lowercase letter represents:", "a": ["Dominant", "Recessive", "Unknown", "Both"], "c": 1}, {"q": "Most mutations are:", "a": ["Dominant", "Recessive", "Codominant", "Lethal"], "c": 1}, {"q": "Punnett square predicts:", "a": ["Exact offspring", "Probability of genotypes/phenotypes", "Mutations", "Evolution"], "c": 1}, {"q": "Test cross uses a:", "a": ["Dominant homozygous", "Heterozygous", "Homozygous recessive", "F1 hybrid"], "c": 2}, {"q": "Test cross of Gg × gg gives:", "a": ["3:1", "1:1", "9:3:3:1", "All dominant"], "c": 1}, {"q": "Dihybrid F2 ratio:", "a": ["3:1", "1:2:1", "9:3:3:1", "1:1:1:1"], "c": 2}, {"q": "Independent assortment applies to genes on:", "a": ["Same chromosome", "Different chromosomes", "Only X chromosome", "Mitochondrial DNA"], "c": 1}, {"q": "Dihybrid test cross ratio:", "a": ["9:3:3:1", "3:1", "1:1:1:1", "1:2:1"], "c": 2}, {"q": "In 9:3:3:1, the '1' represents:", "a": ["Double dominant", "Single recessive", "Double homozygous recessive", "Heterozygous"], "c": 2}, {"q": "True-breeding means:", "a": ["Always heterozygous", "Produces only its own phenotype when selfed", "Random phenotype", "No offspring"], "c": 1}, {"q": "Incomplete dominance produces:", "a": ["Only dominant phenotype", "Intermediate (blended) phenotype", "Only recessive", "Both separately"], "c": 1}, {"q": "Red × ivory snapdragons → F1:", "a": ["All red", "All ivory", "All pink", "Mixed"], "c": 2}, {"q": "Incomplete dominance F2 ratio:", "a": ["3:1", "1:2:1", "9:3:3:1", "1:1"], "c": 1}, {"q": "Codominance: both alleles:", "a": ["Blend", "Are expressed simultaneously", "Cancel out", "One dominates"], "c": 1}, {"q": "Blood type AB is an example of:", "a": ["Dominance", "Incomplete dominance", "Codominance", "Epistasis"], "c": 2}, {"q": "Type O blood genotype:", "a": ["I^A I^A", "I^B I^B", "I^A I^B", "ii"], "c": 3}, {"q": "Type AB genotype:", "a": ["I^A i", "I^B i", "I^A I^B", "ii"], "c": 2}, {"q": "Both parents must carry i for type ___ offspring:", "a": ["A", "B", "AB", "O"], "c": 3}, {"q": "Siamese cat coloring is due to:", "a": ["Codominance", "Temperature-sensitive mutation", "Epistasis", "Incomplete dominance"], "c": 1}, {"q": "Epistasis: one gene influences:", "a": ["Its own expression", "Another gene's phenotype", "Nothing", "Only dominance"], "c": 1}, {"q": "Drosophila epistasis: brown × scarlet F2 includes:", "a": ["Only wildtype", "9:3:3:1 including white", "All brown", "All scarlet"], "c": 1}, {"q": "The white fly phenotype is:", "a": ["Single recessive", "Double homozygous recessive", "Dominant", "Codominant"], "c": 1}, {"q": "In pedigrees, squares represent:", "a": ["Females", "Males", "Unknown", "Affected"], "c": 1}, {"q": "In pedigrees, circles represent:", "a": ["Males", "Females", "Unknown", "Carriers"], "c": 1}, {"q": "Solid symbols in pedigrees mean:", "a": ["Unaffected", "Carrier", "Affected (showing phenotype)", "Dead"], "c": 2}, {"q": "A carrier is always:", "a": ["Homozygous dominant", "Heterozygous", "Homozygous recessive", "Affected"], "c": 1}, {"q": "Carriers exist only for ___ traits:", "a": ["Dominant", "Recessive", "Codominant", "All"], "c": 1}, {"q": "For dominant genes, there are ___ carriers:", "a": ["Many", "Some", "No", "Always"], "c": 2}, {"q": "DNA arrays can detect:", "a": ["Only dominant alleles", "Known disease alleles", "Only proteins", "Only RNA"], "c": 1}, {"q": "BRCA1 and BRCA2 are ___ genes:", "a": ["Blood type", "Eye color", "Breast cancer", "Height"], "c": 2}, {"q": "A backcross mates F1 to:", "a": ["F2", "The recessive parent", "Another F1", "A different species"], "c": 1}, {"q": "Gene = hereditary element; allele =:", "a": ["Same thing", "Particular form of a gene", "A chromosome", "A protein"], "c": 1}, {"q": "Can one gene have multiple alleles?", "a": ["No, only 2", "Yes", "Only in plants", "Only in animals"], "c": 1}, {"q": "Conditional mutations show up only under:", "a": ["All conditions", "Specific conditions", "No conditions", "In males only"], "c": 1}]}, {"id": "bio-l11", "title": "Lesson 10: Mitosis & Meiosis", "ln": "BIO · L10", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Name and describe key stages of the cell cycle. <b>2)</b> Describe general regulators of cell division. <b>3)</b> Name and characterize the 4 stages of mitosis. <b>4)</b> Name and characterize the 5 additional stages of meiosis (Prophase I substages)."}, {"heading": "Cell Cycle — 4 Stages", "body": "<b>G1:</b> cell 'resting,' no DNA synthesis (Gap 1). <b>S:</b> DNA synthesis and chromosome duplication. <b>G2:</b> Gap 2, cell now has double normal DNA. <b>M:</b> Mitosis — chromosomes visible, cell actively dividing (0.5–2 hrs). <b>Interphase = G1 + S + G2</b> (the non-dividing portion). Timing varies by cell type; cultured cells double every 18–24 hrs."}, {"heading": "G0 and Cell Cycle Control", "body": "<b>Interphase</b> is where cells spend most of their time. Most cells are in <b>G0</b> — a non-dividing stage (always stops in G1 before S). This limits excessive divisions that cause diseases like <b>cancer</b>. Embryonic cells divide quickly to build a whole organism fast. <b>E. coli</b> replicates every ~20 minutes."}, {"heading": "Mitosis — Overview", "body": "<b>Mitosis:</b> cell division that <b>maintains</b> the chromosome number (diploid → diploid). The type of division carried out by most cells. Produces two <b>genetically identical</b> daughter cells. Four stages: <b>PMAT</b> — Prophase, Metaphase, Anaphase, Telophase."}, {"heading": "Prophase", "body": "<b>First stage</b> of mitosis. Chromosomes <b>condense</b> (become shorter and thicker, visible under microscope). Paired <b>chromatids</b> (sister chromatids) held together at the <b>centromere</b>. End of prophase marked by <b>loss of the nuclear membrane</b> (nuclear envelope breaks down)."}, {"heading": "Metaphase", "body": "Begins with formation of the <b>mitotic spindle</b> — bundles of microtubules extending from 2 <b>centrosomes</b> to the centromere of chromosomes. <b>Kinetochore:</b> structure at centromere that binds the spindle. Chromosomes line up along the <b>metaphase plate</b> (equidistant from both centrosomes). <b>Spindle checkpoint:</b> monitors kinetochore attachment."}, {"heading": "Anaphase", "body": "<b>Chromatids separate</b> — pulled by kinetochore toward <b>opposite centrosomes</b>. Sister chromatids are now individual chromosomes. The cell elongates. This is the shortest phase of mitosis."}, {"heading": "Telophase & Cytokinesis", "body": "<b>Telophase:</b> nuclear envelope <b>reforms</b> around each set of chromosomes. Mitotic spindle disappears. Chromosomes <b>decondense</b>. <b>Cytokinesis:</b> a <b>cleavage furrow</b> (made of actin microfilaments) separates the cytoplasm in half → two daughter cells. In plants: cell plate forms instead of cleavage furrow."}, {"heading": "PMAT Memory Aid", "body": "<b>P</b>rophase: chromosomes condense, nuclear membrane breaks. <b>M</b>etaphase: chromosomes line up in <b>M</b>iddle. <b>A</b>naphase: chromatids pulled <b>A</b>part. <b>T</b>elophase: <b>T</b>wo new nuclei form. Remember: <b>PMAT</b>."}, {"heading": "Cyclins — Cell Cycle Regulators", "body": "<b>Cyclins</b> are proteins that control the cell cycle. Made progressively as the cycle proceeds. <b>Checkpoints:</b> places that verify key events have occurred before proceeding. <b>Cyclin D:</b> starts the process (G1). <b>Cyclin B:</b> drives entry into mitosis. Mutations in cyclins → uncontrolled division → <b>cancer</b>."}, {"heading": "Rb Protein and Phosphorylation", "body": "For cells to leave G1 and enter S phase, the protein <b>Rb (retinoblastoma)</b> must be <b>phosphorylated</b>. <b>Phosphorylation:</b> transfer of phosphate from ATP to another molecule using an enzyme (kinase). Rb acts as a brake — when phosphorylated, the brake releases and the cell proceeds to S phase."}, {"heading": "Growth Factors", "body": "<b>Growth factors</b> are protein hormones that bind to <b>receptors</b> on the cell surface and signal the cell to start dividing. Different factors cause different cell types to divide. Cells can ONLY respond if they make the <b>right receptors</b> — cells without the proper receptor can't start the signaling pathway."}, {"heading": "Contact Inhibition & Tumors", "body": "<b>Density-dependent (contact) inhibition:</b> cells stop dividing when crowded. <b>Anchorage-dependent inhibition:</b> most cells must be attached to ECM/other cells to divide. <b>Benign tumors:</b> lost contact inhibition but eventually stop. <b>Malignant tumors:</b> lost contact inhibition AND cell cycle control. <b>Metastatic tumors:</b> also lost anchorage dependence — can spread."}, {"heading": "Tumor Types Summary", "body": "<b>Benign:</b> extra divisions, localized, eventually stops. <b>Malignant:</b> uncontrolled growth, invades surrounding tissue. <b>Metastatic:</b> cells break away, travel through blood/lymph, grow at distant sites. Metastasis is what makes cancer deadly — single cells or groups spread to new locations."}, {"heading": "Binary Fission (Bacteria)", "body": "Bacteria don't do mitosis — they use <b>binary fission</b>. Origins of replication (like centrosomes) direct DNA copying. As DNA replicates, it moves to cell ends. Cell elongates, then membrane <b>pinches in</b> to separate the cells. Much simpler than mitosis."}, {"heading": "Meiosis — Why It Exists", "body": "Mendel showed gametes get only 1 'determinant' per gene. If determinant = chromosome → gametes need <b>half</b> the chromosomes. <b>Meiosis:</b> reduces chromosome number by half. Only occurs during <b>gamete formation</b>. Produces <b>haploid</b> cells (23 chromosomes in humans) from diploid cells (46)."}, {"heading": "Meiosis — Two Divisions", "body": "Meiosis = <b>2 consecutive divisions</b> after only 1 round of DNA replication (no second S phase). <b>Meiosis I:</b> separates homologous pairs (46→23). <b>Meiosis II:</b> separates sister chromatids (like mitosis). Result: <b>4 haploid cells</b> from 1 diploid cell. This is where segregation and independent assortment happen."}, {"heading": "Chromosome Numbers (Human)", "body": "<b>G1:</b> 46 chromosomes. <b>After S (G2):</b> 92 chromatids (46 chromosomes, each duplicated). <b>After Meiosis I:</b> 23 chromosomes per cell (each still doubled). <b>After Meiosis II:</b> 23 single chromosomes per cell (haploid)."}, {"heading": "Recombination (Crossing Over)", "body": "<b>Recombination</b> allows individual gametes to combine traits from BOTH parents. Only takes place when all <b>4 chromatids</b> are lined up (tetrad in Prophase I). Results in <b>new combinations</b> of alleles not found in either parent. Random — different children get different combinations."}, {"heading": "Prophase I Substages — Leptotene & Zygotene", "body": "<b>1) Leptotene:</b> initial condensation. Chromosomes appear as thin threads with irregular dense granules (<b>chromomeres</b>). <b>2) Zygotene:</b> lateral pairing of homologous chromosomes (<b>synapsis</b>). A paired homologous pair = <b>bivalent</b>."}, {"heading": "Prophase I — Pachytene & Diplotene", "body": "<b>3) Pachytene:</b> further condensation. Four chromatids visible = <b>tetrad</b>. <b>Crossing over begins</b> here — genetic exchange between homologous chromosomes. Most important substage! <b>4) Diplotene:</b> chromosomes begin to separate. Crossing over visible as <b>chiasmata</b> (cross-connections between chromatids)."}, {"heading": "Prophase I — Diakinesis", "body": "<b>5) Diakinesis:</b> homologous chromosomes not connected by chiasmata <b>repel</b> each other. Chromosomes <b>maximally condensed</b>. Chiasmata persist until first anaphase (chromatids still attached!). Last substage — <b>nuclear membrane breaks down</b>. Then → Metaphase I."}, {"heading": "Results of Meiosis", "body": "Child is a <b>mixture of both parents and grandparents</b>. Recombination is random — different children have different parts of each chromosome, mixing and matching traits. This is why siblings are different from each other despite having the same parents."}, {"heading": "Where Meiosis Occurs", "body": "<b>Meiocytes:</b> cells that undergo meiosis (primary spermatocytes and oocytes). In <b>women:</b> only 1 of 4 haploid daughters survives as the oocyte (other 3 become polar bodies, absorbed). In <b>men:</b> all 4 haploid daughters survive as sperm. All mature organisms have the same species-specific chromosome number."}, {"heading": "Plant Alternation of Generations", "body": "Some plants: haploid daughters form <b>spores</b> → replicate by mitosis → haploid <b>gametophyte</b>. Gametophytes produce gametes by mitosis. Fusion of haploid gametes → diploid zygote → <b>sporophyte</b>. This alternation between haploid and diploid generations is unique to plants."}, {"heading": "Key Concepts Summary", "body": "<b>Cell cycle:</b> G1→S→G2→M. <b>Cyclins/checkpoints</b> regulate progression. <b>Rb</b> phosphorylation = G1→S. <b>Mitosis (PMAT):</b> maintains chromosome #. <b>Cancer:</b> lost contact/anchorage inhibition. <b>Meiosis:</b> 2 divisions, 1 S phase → 4 haploid cells. <b>Prophase I substages:</b> Leptotene→Zygotene→Pachytene(crossing over!)→Diplotene→Diakinesis. <b>Crossing over in pachytene</b> creates genetic diversity."}], "quiz": [{"q": "Cell cycle stages in order:", "a": ["M, G1, G2, S", "G1, S, G2, M", "S, G1, M, G2", "G2, G1, S, M"], "c": 1}, {"q": "DNA synthesis occurs in:", "a": ["G1", "S phase", "G2", "M phase"], "c": 1}, {"q": "Interphase includes:", "a": ["Only G1", "G1, S, G2", "Only M", "Only S"], "c": 1}, {"q": "Most cells spend most time in:", "a": ["M phase", "S phase", "G0 (non-dividing)", "G2"], "c": 2}, {"q": "G0 is a ___ stage:", "a": ["Dividing", "Non-dividing", "Synthetic", "Mitotic"], "c": 1}, {"q": "Mitosis maintains:", "a": ["Half the chromosomes", "The same chromosome number", "Double chromosomes", "Random number"], "c": 1}, {"q": "PMAT stands for:", "a": ["Prophase, Metaphase, Anaphase, Telophase", "Pachytene, Metaphase, Anaphase, Telophase", "Pre, Mid, After, Terminal", "None"], "c": 0}, {"q": "In prophase, chromosomes:", "a": ["Disappear", "Condense (shorten/thicken)", "Line up", "Separate"], "c": 1}, {"q": "Nuclear membrane breaks down at end of:", "a": ["Metaphase", "Anaphase", "Prophase", "Telophase"], "c": 2}, {"q": "Chromosomes line up at the metaphase:", "a": ["Pole", "Plate (middle)", "Membrane", "Nucleus"], "c": 1}, {"q": "Kinetochore is found at the:", "a": ["Telomere", "Centromere", "Cell membrane", "Nucleus"], "c": 1}, {"q": "In anaphase, chromatids:", "a": ["Condense", "Line up", "Separate and move apart", "Reform nucleus"], "c": 2}, {"q": "In telophase:", "a": ["Chromosomes condense", "Nuclear envelope reforms", "Chromosomes separate", "Spindle forms"], "c": 1}, {"q": "Cytokinesis splits the:", "a": ["Nucleus", "Chromosomes", "Cytoplasm", "DNA"], "c": 2}, {"q": "Cleavage furrow is made of:", "a": ["Tubulin", "Actin (microfilaments)", "Keratin", "Collagen"], "c": 1}, {"q": "Cyclins are proteins that control:", "a": ["DNA repair", "The cell cycle", "Protein folding", "Metabolism"], "c": 1}, {"q": "Cyclin D mutations can cause:", "a": ["Cell death", "Cancer (uncontrolled division)", "Normal growth", "Slower division"], "c": 1}, {"q": "Rb must be ___ for cells to enter S phase:", "a": ["Destroyed", "Phosphorylated", "Duplicated", "Methylated"], "c": 1}, {"q": "Growth factors bind to cell surface:", "a": ["DNA", "Lipids", "Receptors", "Chromosomes"], "c": 2}, {"q": "Contact inhibition stops division when cells are:", "a": ["Isolated", "Crowded", "Starving", "Cold"], "c": 1}, {"q": "Benign tumors:", "a": ["Spread everywhere", "Are localized, eventually stop", "Are always fatal", "Are not tumors"], "c": 1}, {"q": "Malignant tumors have lost:", "a": ["Only contact inhibition", "Contact inhibition + cell cycle control", "Nothing", "Only anchorage"], "c": 1}, {"q": "Metastatic tumors can:", "a": ["Only grow locally", "Spread to distant sites", "Only grow in bone", "Self-destruct"], "c": 1}, {"q": "Bacteria divide by:", "a": ["Mitosis", "Meiosis", "Binary fission", "Budding"], "c": 2}, {"q": "Meiosis produces:", "a": ["2 diploid cells", "2 haploid cells", "4 diploid cells", "4 haploid cells"], "c": 3}, {"q": "Meiosis occurs only during:", "a": ["Growth", "Repair", "Gamete formation", "Embryo development"], "c": 2}, {"q": "Haploid means:", "a": ["Full chromosome set", "Half the chromosome set", "Double set", "No chromosomes"], "c": 1}, {"q": "Human haploid number:", "a": ["12", "23", "46", "92"], "c": 1}, {"q": "Human diploid number:", "a": ["12", "23", "46", "92"], "c": 2}, {"q": "Meiosis has ___ division(s) after 1 DNA replication:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Meiosis I separates:", "a": ["Sister chromatids", "Homologous pairs", "Individual genes", "Proteins"], "c": 1}, {"q": "Meiosis II separates:", "a": ["Homologous pairs", "Sister chromatids", "Whole cells", "Nothing"], "c": 1}, {"q": "Crossing over occurs in:", "a": ["Metaphase I", "Prophase I (pachytene)", "Anaphase I", "Telophase I"], "c": 1}, {"q": "A tetrad consists of:", "a": ["2 chromatids", "4 chromatids", "6 chromatids", "8 chromatids"], "c": 1}, {"q": "Synapsis occurs during:", "a": ["Leptotene", "Zygotene", "Pachytene", "Diakinesis"], "c": 1}, {"q": "Bivalent = synapsed:", "a": ["Sister chromatids", "Homologous chromosomes", "Non-homologous", "Random pairs"], "c": 1}, {"q": "Crossing over begins in:", "a": ["Leptotene", "Zygotene", "Pachytene", "Diplotene"], "c": 2}, {"q": "Chiasmata become visible in:", "a": ["Pachytene", "Diplotene", "Diakinesis", "Metaphase"], "c": 1}, {"q": "Diakinesis: chromosomes are:", "a": ["Least condensed", "Maximally condensed", "Invisible", "Duplicating"], "c": 1}, {"q": "In women, meiosis produces ___ surviving egg(s):", "a": ["1", "2", "3", "4"], "c": 0}, {"q": "In men, meiosis produces ___ surviving sperm:", "a": ["1", "2", "3", "4"], "c": 3}, {"q": "Polar bodies are:", "a": ["Extra sperm", "Extra eggs that are absorbed", "Centrosomes", "Kinetochores"], "c": 1}, {"q": "Recombination creates:", "a": ["Identical cells", "New allele combinations", "More chromosomes", "Fewer genes"], "c": 1}, {"q": "Why are siblings different from each other?", "a": ["Different parents", "Random recombination + independent assortment", "Mutations only", "They aren't different"], "c": 1}, {"q": "Spindle checkpoint monitors:", "a": ["DNA replication", "Kinetochore attachment to spindle", "pH", "Temperature"], "c": 1}, {"q": "Prophase I has ___ substages:", "a": ["2", "3", "5", "7"], "c": 2}, {"q": "Substages order: Leptotene → Zygotene →:", "a": ["Diplotene → Pachytene → Diakinesis", "Pachytene → Diplotene → Diakinesis", "Diakinesis → Diplotene → Pachytene", "Pachytene → Diakinesis → Diplotene"], "c": 1}, {"q": "Anchorage-dependent inhibition requires cells to be:", "a": ["Free-floating", "Attached to ECM/other cells", "In G0", "In mitosis"], "c": 1}, {"q": "E. coli divides approximately every:", "a": ["20 minutes", "24 hours", "1 week", "1 second"], "c": 0}, {"q": "Gametophyte is a ___ organism:", "a": ["Diploid", "Haploid", "Triploid", "Tetraploid"], "c": 1}]}]}, "psychology": {"name": "PSY 309", "sub": "Abnormal Psychology", "icon": "💜", "lessons": [{"id": "psy-ch1", "title": "Chapter 1: Abnormal Psychology — Past & Present", "ln": "PSY 309 · Ch 1", "notes": [{"heading": "What Is Psychopathology?", "body": "<b>Psychopathology:</b> the scientific study of mental difficulties/disorders — including explanations, causes, progression, symptoms, assessment, diagnosis, and treatment (APA, 2022). The word also serves as a synonym for the broad range of mental disorders themselves. Workers: <b>clinical scientists</b> (research) and <b>clinical practitioners</b> (treatment)."}, {"heading": "The Four Ds", "body": "Common features across definitions of abnormality — the <b>Four Ds:</b> <b>1) Deviance</b> — different from society's norms. <b>2) Distress</b> — causes suffering to the individual. <b>3) Dysfunction</b> — interferes with daily functioning. <b>4) Danger</b> — poses risk to self or others. Influenced by societal norms, culture, and context."}, {"heading": "Roles of Society and Culture", "body": "Society selects general standards; clinicians apply them to individual cases. <b>Thomas Szasz</b> argued that deviations society calls 'psychopathology' are simply <b>'problems in living'</b> — society invents mental illness to control people who threaten social order. Norms can cause us to <b>overlook</b> real problems or <b>confuse eccentricities</b> with mental disturbance."}, {"heading": "The Elusive Nature of Abnormality", "body": "Few categories are clear-cut — most continue to be debated. <b>Weeks (2015)</b> studied eccentrics: ~1 in 5,000 are 'classic eccentrics' with 15 common characteristics. What's considered abnormal <b>changes over time</b> — tattoos were once 'outrageous,' now ~40% of US adults have one. Separating healthy oddness from pathology is genuinely difficult."}, {"heading": "What Is Treatment?", "body": "<b>Treatment/therapy:</b> procedure designed to change abnormal behavior into more normal behavior. <b>Three essential features</b> of all therapy: <b>1)</b> A sufferer seeking relief. <b>2)</b> A trained, socially accepted healer whose expertise is accepted. <b>3)</b> A series of therapeutic contacts through which the healer produces changes in the sufferer's emotional state, attitudes, and behavior."}, {"heading": "Ancient Views & Treatments", "body": "Every society has witnessed psychological abnormality. Ancient societies probably viewed it as the work of <b>evil spirits</b> — may have begun as far back as the <b>Stone Age</b>. Treatments: <b>trephination</b> (drilling holes in skull to release spirits) and <b>exorcism</b> (rituals to force demons out)."}, {"heading": "Greek & Roman Views (500 BC–500 AD)", "body": "Philosophers and physicians offered natural explanations. <b>Hippocrates</b> believed illnesses had <b>natural causes</b> — proposed the <b>four humors</b> theory (yellow bile, black bile, blood, phlegm). Imbalance → mental illness. Treatments: quiet life, vegetable diet, temperance, exercise, celibacy, bleeding."}, {"heading": "Middle Ages (500–1350 AD)", "body": "Church rejected scientific investigation, controlled education. Mental disorders attributed to <b>demonic causes</b> again. <b>Mass madness</b> — shared delusions and hallucinations. Treatment: exorcism, torture, gradually hospitalization. By the end of the Middle Ages, demonology began losing favor."}, {"heading": "Renaissance & Rise of Asylums (1400–1700)", "body": "Scientific knowledge increased → demonological views declined. <b>Johann Weyer:</b> first mental health physician — believed the mind was as susceptible to sickness as the body. Care at religious shrines (e.g., Gheel, Belgium) was precursor of <b>community health programs</b>. <b>Asylums</b> emerged by mid-1500s — but conditions were often terrible."}, {"heading": "19th Century: Reform & Moral Treatment", "body": "<b>Pinel</b> (France) and <b>Tuke</b> (England) advocated <b>moral treatment</b> — humane, respectful techniques. In the US: <b>Benjamin Rush</b> (father of American psychiatry) and <b>Dorothea Dix</b> (Boston teacher) promoted reform. Movement disintegrated by late 1800s due to: money/staff shortages, declining recovery rates, overcrowding, prejudice. Hospitals became warehouses."}, {"heading": "Early 20th Century: Somatogenic Perspective", "body": "<b>Somatogenic:</b> abnormal functioning has <b>physical causes</b>. Two factors revived this view: <b>1) Emil Kraepelin</b> argued physical factors cause mental dysfunction. <b>2)</b> Discovery that untreated <b>syphilis</b> → general paresis (a mental disorder). Results were disappointing until effective medications were developed."}, {"heading": "Early 20th Century: Psychogenic Perspective", "body": "<b>Psychogenic:</b> abnormal functioning has <b>psychological causes</b>. Rose in popularity through work with <b>hypnotism</b>. <b>Mesmer:</b> hysterical disorders. <b>Sigmund Freud:</b> developed <b>psychoanalysis</b> — outpatient talk therapy exploring the unconscious mind. Psychoanalytic theory became widely accepted."}, {"heading": "Public Attitudes Today", "body": "Negative attitudes persist: <b>43%</b> believe people bring mental disorders on themselves. <b>35%</b> believe disorders are caused by sinful behavior. <b>31%</b> consider them a sign of personal weakness. <b>33%</b> are afraid of people with disorders. But major changes have occurred in understanding and treatment over the last 70 years."}, {"heading": "Psychotropic Medications (1950s)", "body": "New medications discovered in the 1950s changed everything: <b>Antipsychotic drugs</b> (for schizophrenia, etc.), <b>Antidepressant drugs</b> (for depression), <b>Antianxiety drugs</b> (for anxiety disorders). <b>Psychotropic:</b> drugs that mainly affect the brain and reduce symptoms of mental dysfunction."}, {"heading": "Deinstitutionalization", "body": "Psychotropic medications led to <b>deinstitutionalization</b> — moving patients out of mental hospitals into community settings. Patients hospitalized in US public mental hospitals dropped from hundreds of thousands (1955) to ~42,000 today. Led to rise in <b>outpatient care</b> as the primary treatment mode."}, {"heading": "Modern Treatment Landscape", "body": "Before 1950: almost all care was private psychotherapy. Today: <b>outpatient care</b> is primary. More insurance coverage. <b>Prevention programs</b> increasing. <b>Positive psychology</b> growing — teaching coping skills. Programs for specific conditions. Correcting social conditions that contribute to mental illness."}, {"heading": "Multicultural Psychology", "body": "Emerged in response to growing US diversity — racial/ethnic minorities now ~40% of population and increasing. <b>Multicultural psychologists</b> study how culture, race, ethnicity, gender, and similar factors affect behavior and thought, and how people of different backgrounds may differ psychologically."}, {"heading": "Insurance & Managed Care", "body": "<b>Managed care programs</b> dominate — insurance company determines key care decisions. 65%+ of privately insured Americans are in managed care. Mental health reimbursements tend to be <b>lower than medical</b>. <b>2008 Federal Parity Law</b> and <b>2014 Affordable Care Act</b> improved coverage."}, {"heading": "Leading Theoretical Perspectives", "body": "No single perspective dominates. Major approaches: <b>1) Psychoanalytic</b> (unconscious conflicts). <b>2) Biological</b> (brain, genetics, neurotransmitters). <b>3) Cognitive-behavioral</b> (thought patterns + learned behaviors). <b>4) Humanistic-existential</b> (self-actualization, meaning). <b>5) Sociocultural</b> (social/cultural factors). <b>6) Developmental psychopathology</b>."}, {"heading": "Mental Health Professions", "body": "<b>Psychiatrists:</b> MD/DO, ~49,000, avg $194K, can prescribe medications. <b>Psychologists:</b> PhD/PsyD/EdD, ~188,000, avg $73K. <b>Social workers:</b> MSW/DSW, ~649,000, avg $46K, largest group. <b>Counselors:</b> various degrees, ~570,000, avg $45K. Field is majority female (67-84% depending on profession)."}, {"heading": "Technology & Mental Health — Negatives", "body": "Digital world provides new triggers: <b>video games</b> → antisocial behavior concerns. Constant texting/social media → potential <b>addictive behavior</b> and shorter attention spans. Tools for stalking, bullying, exhibitionism. Enormous volume of <b>web-based misinformation</b>. Social media may increase peer pressure and <b>FOMO</b> (fear of missing out)."}, {"heading": "Technology & Mental Health — Positives", "body": "Social media users tend to maintain close relationships, receive social support, be trusting, and lead active lives. <b>Computerized intervention programs</b> expanding. Online <b>support groups</b> accessible 24/7. <b>Wearable technologies</b> monitoring mental health. <b>Tele-mental health</b> services rapidly increasing — especially post-COVID. Mental health apps growing sharply."}, {"heading": "Historical Timeline Summary", "body": "<b>Ancient:</b> evil spirits → trephination/exorcism. <b>Greek/Roman:</b> natural causes, four humors. <b>Middle Ages:</b> demons return. <b>Renaissance:</b> asylums, Weyer. <b>1800s:</b> moral treatment (Pinel, Tuke, Rush, Dix) → collapsed. <b>Early 1900s:</b> somatogenic (Kraepelin) + psychogenic (Freud). <b>1950s:</b> psychotropic meds → deinstitutionalization. <b>Today:</b> outpatient care, multiple perspectives, multicultural, tech-assisted."}, {"heading": "Pinel's Classification System", "body": "Philippe Pinel didn't just advocate humane treatment — he also developed one of the first <b>classification systems</b> for mental disorders. He categorized patients by symptoms and course of illness rather than assuming demonic possession. This laid groundwork for modern diagnostic systems like the <b>DSM</b>."}, {"heading": "Key Concepts Summary", "body": "<b>Psychopathology:</b> study of mental disorders. <b>Four Ds:</b> deviance, distress, dysfunction, danger. <b>Szasz:</b> 'problems in living.' <b>Hippocrates:</b> natural causes, four humors. <b>Moral treatment:</b> Pinel/Tuke/Rush/Dix. <b>Somatogenic:</b> physical causes (Kraepelin). <b>Psychogenic:</b> psychological causes (Freud). <b>1950s psychotropic meds</b> → deinstitutionalization → outpatient care. <b>6 major perspectives</b> today."}], "quiz": [{"q": "Psychopathology is the scientific study of:", "a": ["Normal behavior", "Mental disorders", "Physical illness", "Philosophy"], "c": 1}, {"q": "The Four Ds are:", "a": ["Deviance, Distress, Dysfunction, Danger", "Diagnosis, Drugs, Disorder, Disease", "Depression, Dementia, Delirium, Dissociation", "None of these"], "c": 0}, {"q": "Thomas Szasz called mental illness:", "a": ["A brain disease", "Problems in living", "Spiritual weakness", "Genetic defects"], "c": 1}, {"q": "Szasz argued society invents mental illness to:", "a": ["Help people", "Control people who threaten social order", "Make money", "Advance science"], "c": 1}, {"q": "About 1 in ___ people are 'classic eccentrics':", "a": ["100", "500", "1,000", "5,000"], "c": 3}, {"q": "Three essential features of therapy include all EXCEPT:", "a": ["A sufferer seeking help", "A trained healer", "Series of therapeutic contacts", "Medication prescription"], "c": 3}, {"q": "Ancient societies attributed abnormality to:", "a": ["Brain disease", "Evil spirits", "Chemical imbalance", "Genetics"], "c": 1}, {"q": "Trephination involved:", "a": ["Herbs", "Drilling holes in the skull", "Prayer", "Bleeding"], "c": 1}, {"q": "Hippocrates proposed the:", "a": ["Germ theory", "Four humors", "Psychoanalysis", "DSM"], "c": 1}, {"q": "The four humors were:", "a": ["Earth, air, fire, water", "Yellow bile, black bile, blood, phlegm", "Id, ego, superego, libido", "None"], "c": 1}, {"q": "During the Middle Ages, mental illness was blamed on:", "a": ["Humors", "Natural causes", "Demons", "Brain lesions"], "c": 2}, {"q": "Johann Weyer was the first:", "a": ["Psychiatrist", "Mental health physician", "Psychologist", "Social worker"], "c": 1}, {"q": "Asylums emerged in the:", "a": ["1200s", "Mid-1500s", "1800s", "1950s"], "c": 1}, {"q": "Moral treatment was advocated by:", "a": ["Freud", "Kraepelin", "Pinel and Tuke", "Szasz"], "c": 2}, {"q": "Benjamin Rush is called the father of:", "a": ["Psychology", "American psychiatry", "Social work", "Neuroscience"], "c": 1}, {"q": "Dorothea Dix was a:", "a": ["Physician", "Nurse", "Boston schoolteacher who promoted reform", "Psychiatrist"], "c": 2}, {"q": "Moral treatment collapsed due to:", "a": ["Success", "Money shortages, overcrowding, prejudice", "New medications", "War"], "c": 1}, {"q": "Somatogenic perspective: abnormality has ___ causes:", "a": ["Psychological", "Spiritual", "Physical", "Social"], "c": 2}, {"q": "Kraepelin argued ___ factors cause dysfunction:", "a": ["Psychological", "Physical", "Spiritual", "Social"], "c": 1}, {"q": "Untreated syphilis was linked to:", "a": ["Depression", "General paresis", "Anxiety", "ADHD"], "c": 1}, {"q": "Psychogenic perspective: abnormality has ___ causes:", "a": ["Physical", "Genetic", "Psychological", "Dietary"], "c": 2}, {"q": "Freud developed:", "a": ["Moral treatment", "Psychoanalysis", "Medication", "Trephination"], "c": 1}, {"q": "Mesmer worked with:", "a": ["Medications", "Hypnotism", "Surgery", "Exorcism"], "c": 1}, {"q": "Psychotropic medications were discovered in the:", "a": ["1800s", "1920s", "1950s", "1990s"], "c": 2}, {"q": "Antipsychotic drugs treat:", "a": ["Anxiety only", "Schizophrenia and psychosis", "Depression only", "Pain"], "c": 1}, {"q": "Deinstitutionalization means:", "a": ["Building more hospitals", "Moving patients out of hospitals to community", "Closing all clinics", "Increasing medications"], "c": 1}, {"q": "Current US public mental hospital patients ≈:", "a": ["500,000", "200,000", "42,000", "1,000"], "c": 2}, {"q": "Today, primary treatment mode is:", "a": ["Long-term hospitalization", "Exorcism", "Outpatient care", "No treatment"], "c": 2}, {"q": "___% believe people bring mental disorders on themselves:", "a": ["10", "25", "43", "75"], "c": 2}, {"q": "___% believe disorders caused by sinful behavior:", "a": ["5", "15", "35", "60"], "c": 2}, {"q": "Managed care means:", "a": ["Patient decides everything", "Insurance company determines key care decisions", "Government-run only", "Free care"], "c": 1}, {"q": "Federal parity law went into effect in:", "a": ["1990", "2000", "2008", "2020"], "c": 2}, {"q": "How many major theoretical perspectives today?", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "Which is NOT a current perspective?", "a": ["Biological", "Cognitive-behavioral", "Demonological", "Sociocultural"], "c": 2}, {"q": "Largest mental health profession by number:", "a": ["Psychiatrists", "Psychologists", "Social workers", "Counselors"], "c": 2}, {"q": "Only ___ can prescribe medications:", "a": ["Psychologists", "Social workers", "Psychiatrists (MD/DO)", "Counselors"], "c": 2}, {"q": "Multicultural psychology studies how ___ affects behavior:", "a": ["Only genetics", "Culture, race, ethnicity, gender", "Only medication", "Only childhood"], "c": 1}, {"q": "US racial/ethnic minorities make up ≈ ___% of population:", "a": ["10", "20", "40", "60"], "c": 2}, {"q": "FOMO stands for:", "a": ["Fear of mental origins", "Fear of missing out", "Feeling of mood oscillation", "None"], "c": 1}, {"q": "Tele-mental health services are:", "a": ["Decreasing", "Staying the same", "Rapidly increasing", "Not available"], "c": 2}, {"q": "Positive psychology focuses on:", "a": ["Diagnosing disorders", "Teaching coping skills and strengths", "Medication", "Hospitalization"], "c": 1}, {"q": "Hippocrates' approach was:", "a": ["Supernatural", "Natural/scientific", "Religious", "Random"], "c": 1}, {"q": "Psychoanalysis is a type of:", "a": ["Medication", "Outpatient talk therapy", "Surgery", "Exorcism"], "c": 1}, {"q": "Clinical scientists primarily do:", "a": ["Treatment", "Research", "Medication", "Surgery"], "c": 1}, {"q": "Clinical practitioners primarily do:", "a": ["Research", "Treatment", "Teaching", "Nothing"], "c": 1}, {"q": "The Affordable Care Act went into effect in:", "a": ["2008", "2010", "2014", "2020"], "c": 2}, {"q": "Average psychiatrist salary ≈:", "a": ["$46,000", "$73,000", "$120,000", "$194,000"], "c": 3}, {"q": "Eccentricity differs from abnormality in that eccentrics:", "a": ["Are dangerous", "Don't usually have dysfunction/distress", "Always need treatment", "Are always deviant"], "c": 1}, {"q": "Before 1950, almost all outpatient care was:", "a": ["Free clinics", "Private psychotherapy", "Tele-health", "Group therapy"], "c": 1}, {"q": "Web-based misinformation about mental health is:", "a": ["Nonexistent", "Decreasing", "Enormous and increasing", "Regulated"], "c": 2}]}, {"id": "psy-ch2", "title": "Chapter 2: Research in Psychopathology", "ln": "PSY 309 · Ch 2", "notes": [{"heading": "Why Research Matters", "body": "Research is the <b>systematic search for facts</b> through careful observations and investigations. Inaccuracy in psychopathology can cause <b>great suffering</b> (e.g., conversion therapy was based on flawed research — Robert Spitzer publicly apologized in 2012). Clinical researchers discover universal laws, search for <b>nomothetic understanding</b>, and rely on the <b>scientific method</b>."}, {"heading": "Three Methods of Investigation", "body": "Clinical researchers depend on three methods: <b>1) Case study</b> — detailed individual descriptions. <b>2) Correlational method</b> — examines relationships between variables. <b>3) Experimental method</b> — manipulates variables to determine cause and effect. Each has strengths and weaknesses."}, {"heading": "The Case Study", "body": "A <b>detailed, interpretive description</b> of a person's life and psychological problems. Helpful for: generating <b>new ideas</b>, tentative support for theories, challenging assumptions, introducing new therapeutic techniques, studying <b>unusual problems</b>. Provides rich individual detail that other methods cannot."}, {"heading": "Case Study — Limitations", "body": "<b>Biased observers</b> — clinician may see what they expect. <b>Subjective evidence</b> → low <b>internal validity</b> (can't determine cause). <b>Little basis for generalization</b> → low <b>external validity</b> (can't apply to broader population). Results from one person may not apply to anyone else."}, {"heading": "The Correlational Method", "body": "Examines the <b>degree to which events or characteristics vary together</b>. Addresses limitations of case studies. Involves observing <b>many individuals</b>, applying procedures <b>uniformly</b>, using <b>statistical tests</b>. Studies can be <b>replicated</b>. Participants (sample) must be <b>representative</b> of the larger population."}, {"heading": "Positive Correlation", "body": "Variables change in the <b>same direction</b>. When one increases, the other increases too. Graph: slope goes <b>upward and to the right</b>. Example: more stress → more depression. The correlation coefficient (r) is <b>positive</b> (e.g., r = +0.65)."}, {"heading": "Negative Correlation", "body": "Variables change in <b>opposite directions</b>. When one increases, the other decreases. Graph: slope goes <b>downward</b>. Example: more activities → less depression. The correlation coefficient is <b>negative</b> (e.g., r = −0.70)."}, {"heading": "No Correlation", "body": "<b>No consistent relationship</b> between the variables. Data scattered with no clear pattern. Graph: <b>no slope</b>. Example: intelligence and depression may show near-zero correlation (r ≈ 0.00). Variables are unrelated."}, {"heading": "Correlation Coefficient (r)", "body": "Numerical measure of direction and strength. Symbolized by <b>'r'</b>. Ranges from <b>+1.00</b> (perfect positive) to <b>−1.00</b> (perfect negative). <b>Sign (+/−)</b> = direction. <b>Number (magnitude)</b> = strength. <b>0.00</b> = no relationship. Most psychological correlations fall far short of perfect."}, {"heading": "Correlation Strength (Magnitude)", "body": "<b>Strong/high:</b> data points fall close to the line of best fit (r near ±1.0). <b>Weak/low:</b> data loosely scattered around the line (r near 0). The closer |r| is to 1.0, the stronger the relationship. Both strong positive and strong negative correlations are 'strong.'"}, {"heading": "Statistical Significance", "body": "A finding is <b>statistically significant</b> if unlikely to have occurred by chance. Convention: if probability of chance < 5% (<b>p < .05</b>), results are significant and thought to reflect the larger population. Confidence increases with <b>larger sample size</b> and <b>stronger correlation magnitude</b>."}, {"heading": "Correlational Method — Strengths & Weaknesses", "body": "<b>Strengths:</b> high <b>external validity</b> (can generalize), replicable, uses statistical analysis. <b>Weaknesses:</b> lack <b>internal validity</b> — can describe relationships but <b>CANNOT explain causation</b>. Correlation ≠ causation! A third variable might explain both."}, {"heading": "Longitudinal Studies", "body": "A special form of correlational research. <b>Same individuals observed over a long period</b> on many occasions. Also called high-risk or developmental studies. Limitation: independent variable is NOT manipulated, no random assignment → <b>causes cannot be pinpointed</b>."}, {"heading": "Epidemiological Studies", "body": "Reveal the <b>incidence and prevalence</b> of disorders in a population. <b>Incidence:</b> number of <b>NEW cases</b> that emerge in a given period. <b>Prevalence:</b> <b>TOTAL number of cases</b> in a given period. Key studies: Epidemiologic Catchment Area Study, National Comorbidity Survey (and Replication)."}, {"heading": "The Experimental Method", "body": "A variable is <b>manipulated</b> and its effect on another variable is <b>observed</b>. <b>Independent variable (IV):</b> the variable being manipulated. <b>Dependent variable (DV):</b> the variable being measured/observed. <b>Confound:</b> other variables that may also affect the DV. The ONLY method that can establish <b>cause and effect</b>."}, {"heading": "Guarding Against Confounds", "body": "Three features protect against confounds: <b>1) Control group</b> — not exposed to IV, but otherwise similar to experimental group. <b>2) Random assignment</b> — every participant equally likely to be in any group. <b>3) Masked (blind) design</b> — participants don't know which group they're in."}, {"heading": "Masked (Blind) Designs", "body": "<b>Single-masked:</b> participants don't know their group assignment. Uses <b>placebo therapy</b> (inactive treatment that looks real). <b>Double-masked:</b> NEITHER participants NOR experimenters know group assignments. Prevents experimenter bias from influencing results. The gold standard for experiments."}, {"heading": "Clinical vs Statistical Significance", "body": "<b>Statistical significance:</b> results unlikely due to chance (p < .05). <b>Clinical significance:</b> results are meaningful and improve real-world functioning. A statistically significant finding may not be clinically significant (tiny effect with huge sample). Clinicians evaluate both."}, {"heading": "Quasi-Experimental: Matched Designs", "body": "Participants are <b>NOT randomly assigned</b> but placed in <b>existing groups</b>. <b>Matched control groups</b> address confounds by matching on demographics and other variables. Less ideal than true experiments but sometimes the only ethical option."}, {"heading": "Natural Experiments", "body": "<b>Nature manipulates</b> the independent variable (e.g., a natural disaster) and the researcher observes effects. Events <b>cannot be replicated</b> at will. Cannot draw broad generalizations from a single study. Useful for studying events that can't be ethically created in a lab."}, {"heading": "Analogue Experiments", "body": "Researchers <b>freely manipulate IVs</b> in a lab while avoiding ethical limitations. Subjects induced to behave in ways that <b>resemble real life</b>. Limitation: can't be certain lab phenomena are the same as real psychological disorders. Animals are often used as participants."}, {"heading": "Single-Subject Experiments", "body": "<b>One participant</b> observed before and after IV manipulation. Uses <b>baseline data</b> as comparison standard. Higher <b>internal validity</b> than case studies because IV is manipulated. Common design: <b>ABAB (reversal)</b> — baseline (A), treatment (B), baseline (A), treatment (B)."}, {"heading": "Mixed-Methods & CBPR", "body": "<b>Mixed-methods:</b> combines qualitative (generate hypotheses) AND quantitative (test hypotheses) approaches in one project. <b>Community-Based Participatory Research (CBPR):</b> affected community members collaborate with researchers at ALL stages. Built on shared goals and trust → meaningful, lasting community change."}, {"heading": "Research Methods Comparison Table", "body": "<b>Case study:</b> individual info ✓, general info ✗, causal info ✗, stats ✗, replicable ✗. <b>Correlational:</b> individual ✗, general ✓, causal ✗, stats ✓, replicable ✓. <b>Experimental:</b> individual ✗, general ✓, causal ✓, stats ✓, replicable ✓. Only experiments establish causation!"}, {"heading": "Ethics: Protecting Human Participants", "body": "Researchers' primary obligation: <b>avoid physical or psychological harm</b>. <b>IRB (Institutional Review Board):</b> ethics committee that protects participants' rights and safety. IRBs ensure: voluntary participation, <b>informed consent</b>, right to withdraw anytime, benefits outweigh risks, protection from harm, access to study info, <b>confidentiality/anonymity</b>."}, {"heading": "Animal Research Ethics", "body": "Between 11-25 million animals used in US studies each year. Methods include shocking, starving, surgical alteration. <b>Outcomes:</b> helped increase human life expectancy by 24 years, contributed to medication development. Ethical debate: are these actions acceptable? Organizations like <b>PETA</b> advocate against animal testing."}, {"heading": "Social Media in Research", "body": "Increased use of social networks for research. <b>Benefits:</b> access to large databases. <b>Concerns:</b> data examined <b>without subscriber consent</b>, direct manipulation without informed consent, potential for affecting clinical depression in participants, psychological targeting. Raises new ethical questions."}, {"heading": "Key Concepts Summary", "body": "<b>3 methods:</b> case study, correlational, experimental. <b>Correlation:</b> direction (+ or −) + magnitude (0 to 1). <b>r</b> = correlation coefficient. <b>p < .05</b> = statistically significant. <b>Correlation ≠ causation.</b> <b>Experiment:</b> IV manipulated → DV measured. Guards: control group, random assignment, masking. <b>Incidence:</b> new cases. <b>Prevalence:</b> total cases. <b>IRB</b> protects participants."}], "quiz": [{"q": "Clinical researchers search for ___ understanding:", "a": ["Idiographic", "Nomothetic", "Spiritual", "Personal"], "c": 1}, {"q": "Three methods of investigation:", "a": ["Case study, correlational, experimental", "Survey, interview, observation", "Therapy, medication, surgery", "None"], "c": 0}, {"q": "Case studies provide:", "a": ["Broad generalizations", "Detailed individual descriptions", "Causal evidence", "Statistical analysis"], "c": 1}, {"q": "Case studies have LOW:", "a": ["Detail", "Internal and external validity", "Interest", "Cost"], "c": 1}, {"q": "Internal validity means:", "a": ["Can generalize", "Can determine cause", "Has rich detail", "Is replicable"], "c": 1}, {"q": "External validity means:", "a": ["Can determine cause", "Can generalize to population", "Has subjective evidence", "Is detailed"], "c": 1}, {"q": "A positive correlation means variables change:", "a": ["In opposite directions", "In the same direction", "Randomly", "Not at all"], "c": 1}, {"q": "A negative correlation means variables change:", "a": ["In the same direction", "In opposite directions", "Randomly", "Not at all"], "c": 1}, {"q": "Correlation coefficient (r) ranges from:", "a": ["0 to 1", "0 to 100", "+1.00 to −1.00", "−10 to +10"], "c": 2}, {"q": "r = +1.00 means:", "a": ["Perfect negative", "No correlation", "Perfect positive", "Weak positive"], "c": 2}, {"q": "r = −1.00 means:", "a": ["Perfect positive", "No correlation", "Perfect negative", "Weak negative"], "c": 2}, {"q": "r = 0.00 means:", "a": ["Strong correlation", "Perfect correlation", "No consistent relationship", "Causation"], "c": 2}, {"q": "The sign of r indicates:", "a": ["Magnitude", "Direction", "Significance", "Sample size"], "c": 1}, {"q": "The number of r indicates:", "a": ["Direction", "Magnitude (strength)", "Causation", "Sample"], "c": 1}, {"q": "Statistical significance convention:", "a": ["p < .50", "p < .10", "p < .05", "p < .001 only"], "c": 2}, {"q": "p < .05 means results are:", "a": ["Due to chance", "Statistically significant", "Clinically meaningless", "Invalid"], "c": 1}, {"q": "Confidence increases with:", "a": ["Smaller samples", "Larger sample + stronger correlation", "Fewer variables", "Less data"], "c": 1}, {"q": "Correlation can establish:", "a": ["Causation", "Only relationships, NOT causation", "Nothing useful", "Cure rates"], "c": 1}, {"q": "The correlational method has HIGH:", "a": ["Internal validity", "External validity", "Both", "Neither"], "c": 1}, {"q": "Incidence refers to:", "a": ["Total cases", "New cases in a period", "Cured cases", "Deaths"], "c": 1}, {"q": "Prevalence refers to:", "a": ["New cases", "Total cases in a period", "Only severe cases", "Future cases"], "c": 1}, {"q": "In experiments, the manipulated variable is:", "a": ["Dependent variable", "Independent variable", "Confound", "Control"], "c": 1}, {"q": "The variable being measured/observed is:", "a": ["Independent variable", "Dependent variable", "Confound", "Placebo"], "c": 1}, {"q": "A confound is:", "a": ["The DV", "An unwanted variable affecting the DV", "The IV", "The control group"], "c": 1}, {"q": "Three guards against confounds:", "a": ["Case study, correlation, experiment", "Control group, random assignment, masking", "Survey, interview, observation", "None"], "c": 1}, {"q": "Control group participants are:", "a": ["Exposed to IV", "NOT exposed to IV", "Always given placebo", "Eliminated"], "c": 1}, {"q": "Random assignment ensures:", "a": ["Everyone gets treatment", "Equal chance of being in any group", "Only healthy participants", "Larger samples"], "c": 1}, {"q": "In a masked (blind) design:", "a": ["Researchers can't see", "Participants don't know their group", "No one participates", "Everyone gets IV"], "c": 1}, {"q": "Double-masked means:", "a": ["Two groups", "Neither participants nor experimenters know assignments", "Two IVs", "Two DVs"], "c": 1}, {"q": "Placebo therapy is:", "a": ["Real treatment", "Inactive treatment that looks real", "No treatment", "Medication only"], "c": 1}, {"q": "Only ___ can establish cause and effect:", "a": ["Case studies", "Correlational studies", "Experiments", "Surveys"], "c": 2}, {"q": "Longitudinal studies observe same individuals:", "a": ["Once", "Over a long period", "In a lab only", "After treatment only"], "c": 1}, {"q": "Natural experiments: ___ manipulates the IV:", "a": ["Researcher", "Nature", "Participant", "No one"], "c": 1}, {"q": "Analogue experiments are conducted in:", "a": ["Natural settings", "Laboratories", "Hospitals only", "Schools only"], "c": 1}, {"q": "ABAB design is used in:", "a": ["Correlational studies", "Single-subject experiments", "Case studies", "Surveys"], "c": 1}, {"q": "ABAB stands for:", "a": ["After-Before-After-Before", "Baseline-Treatment-Baseline-Treatment", "Always-Be-Always-Better", "None"], "c": 1}, {"q": "Single-subject experiments use ___ for comparison:", "a": ["Control groups", "Baseline data", "Other patients", "Population norms"], "c": 1}, {"q": "Matched designs use ___ instead of random assignment:", "a": ["Self-selection", "Existing groups matched on variables", "No groups", "Only volunteers"], "c": 1}, {"q": "CBPR involves:", "a": ["Only researchers", "Community members collaborating with researchers", "Only participants", "Government agencies only"], "c": 1}, {"q": "Mixed-methods combines:", "a": ["Two experiments", "Qualitative and quantitative approaches", "Case studies only", "Correlations only"], "c": 1}, {"q": "IRB stands for:", "a": ["Internal Research Board", "Institutional Review Board", "International Research Bureau", "Individual Rights Board"], "c": 1}, {"q": "IRB's primary concern:", "a": ["Funding", "Protecting participants' rights and safety", "Publishing results", "Getting large samples"], "c": 1}, {"q": "Informed consent means participants:", "a": ["Are paid", "Know what the study entails before enlisting", "Must complete the study", "Can't withdraw"], "c": 1}, {"q": "Participants can ___ at any time:", "a": ["Be forced to stay", "End their participation", "Be penalized", "Lose data"], "c": 1}, {"q": "Robert Spitzer apologized for his study on:", "a": ["Depression treatment", "Conversion therapy", "Animal research", "Drug trials"], "c": 1}, {"q": "Animals used in US research annually:", "a": ["Hundreds", "Thousands", "11-25 million", "Billions"], "c": 2}, {"q": "Animal research helped increase life expectancy by:", "a": ["5 years", "12 years", "24 years", "50 years"], "c": 2}, {"q": "Social media research concern:", "a": ["Too few users", "Data examined without consent", "Too expensive", "Not enough data"], "c": 1}, {"q": "Clinical significance means results:", "a": ["Are statistically rare", "Meaningfully improve real-world functioning", "Have large samples", "Use p < .05"], "c": 1}, {"q": "Which method provides individual info but not general?", "a": ["Correlational", "Experimental", "Case study", "All three"], "c": 2}]}, {"id": "psy-ch3", "title": "Chapter 3: Models of Abnormality", "ln": "PSY 309 · Ch 3", "notes": [{"heading": "What Are Models?", "body": "Models (paradigms) are used by scientists and clinicians to <b>explain events</b>, guide <b>treatment techniques</b>, and shape what they observe, ask, and interpret. Sometimes models conflict. Each focuses on <b>one aspect</b> of human functioning — <b>no single model explains everything</b>. Multiple models are needed."}, {"heading": "The Biological Model — Overview", "body": "Has a <b>medical perspective</b> — illness is caused by <b>malfunctioning parts of the organism</b>. Points to problems in <b>brain anatomy</b> and <b>brain chemistry</b>. Full understanding of thoughts, emotions, and behavior must include understanding their biological basis."}, {"heading": "Biological: Brain Anatomy", "body": "Key structures: <b>Cerebrum</b> (cortex, corpus callosum, basal ganglia, hippocampus, amygdala). Connections found between psychological disorders and <b>specific brain structures</b>. Neurons and <b>glia cells</b> are the building blocks."}, {"heading": "Biological: Brain Chemistry", "body": "Messages travel as electrical impulses down <b>axons</b> to nerve endings → <b>neurotransmitters (NTs)</b> released into <b>synapse</b> → bind to <b>receptors</b> on <b>dendrites</b> of receiving neuron. Dozens of NTs identified. Some <b>excitatory</b>, some <b>inhibitory</b>. Abnormal NT activity → specific mental disorders."}, {"heading": "Biological: Hormones & Brain Circuits", "body": "Abnormal <b>endocrine system</b> (hormones) also linked to disorders. Abnormal <b>cortisol</b> secretion linked to anxiety and mood disorders. Research increasingly focuses on <b>brain circuits</b> — networks of interconnected structures — rather than single brain areas or chemicals as keys to disorders."}, {"heading": "Biological: Genetics", "body": "Abnormalities in brain anatomy/chemistry sometimes result from <b>genetic inheritance</b>. Studies suggest inheritance plays a part in mood disorders, schizophrenia, etc. Usually <b>several genes combine</b> to produce effects. Genes may be <b>mutations</b> or results of <b>evolutionary principles</b> — once adaptive traits may become maladaptive under modern pressures."}, {"heading": "Biological Treatments", "body": "Three leading treatments: <b>1) Drug therapy</b> — 4 major groups: antianxiety (Valium, 1963), antidepressants (Elavil, 1961), antibipolar/mood stabilizers (Lithium, 1970), antipsychotics (Thorazine, 1954). <b>2) Brain stimulation</b> — ECT, TMS, VNS, deep brain stimulation. <b>3) Psychosurgery</b> — brain surgery (lobotomy, Moniz, 1930s)."}, {"heading": "Assessing the Biological Model", "body": "<b>Strengths:</b> considerable respect, constantly produces new info, treatments bring great relief. <b>Weaknesses:</b> limits understanding by <b>excluding nonbiological factors</b>, may produce significant undesirable side effects (e.g., <b>tardive dyskinesia</b> from antipsychotics)."}, {"heading": "The Psychodynamic Model — Freud", "body": "<b>Sigmund Freud (1856-1939)</b> developed psychoanalysis. Proposed behavior is determined by <b>unconscious, dynamic psychological forces</b>. Abnormal symptoms result from <b>conflict among these forces</b>. The oldest and most famous psychological model."}, {"heading": "Id, Ego, Superego", "body": "Three unconscious forces shape personality: <b>Id:</b> operates on the <b>pleasure principle</b> — instinctual needs, wants immediate gratification. <b>Ego:</b> operates on the <b>reality principle</b> — rational thinking, mediates between id and reality. <b>Superego:</b> operates on the <b>morality principle</b> — conscience, moral standards. Healthy personality = balance. Excessive conflict = dysfunction."}, {"heading": "Defense Mechanisms", "body": "Unconscious strategies the ego uses to manage anxiety: <b>Repression</b> (blocking painful thoughts), <b>Denial</b> (refusing to acknowledge reality), <b>Projection</b> (attributing own impulses to others), <b>Rationalization</b> (creating acceptable reasons), <b>Displacement</b> (redirecting to safer target), <b>Intellectualization</b> (logical detachment), <b>Regression</b> (retreating to earlier stage)."}, {"heading": "Freud's Developmental Stages", "body": "Five stages: <b>Oral → Anal → Phallic → Latency → Genital</b>. Each stage requires adjustment of id/ego/superego. Successful navigation → personal growth. Unsuccessful → <b>fixation</b> at that stage → psychological abnormality. Parents are key figures — often seen as cause of improper development."}, {"heading": "Other Psychodynamic Theorists", "body": "<b>Carl Jung:</b> collective unconscious, archetypes, synchronicity. <b>Alfred Adler:</b> individual psychology, inferiority/superiority complex, style of life. <b>Self theorists:</b> emphasize unified personality. <b>Object-relations theorists:</b> emphasize human nee
