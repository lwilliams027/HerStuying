n 3 stages, processed IN ORDER: <b>Photosystem II first → cytochrome → Photosystem I → NADPH</b>. (Numbered by discovery order, not functional order!) Electrons flow: PS II → PS I."}, {"heading": "Photosystem II — Water Splitting", "body": "PS II uses light energy to <b>split water</b> into <b>oxygen + H⁺</b>. This is where plants make <b>O₂</b> — the 'waste product' essential for animal life! <b>2H₂O → O₂ + 4H⁺ + 4e⁻</b>. Some energy also moves H⁺ across the membrane (builds the gradient)."}, {"heading": "Photosystem I — NADPH Production", "body": "PS I uses a photon of light to make <b>NADPH</b> — a critical molecule for storing CO₂ as sugar. PS I <b>requires PS II to be active</b> — it can't function alone (needs the electrons from PS II). The electron flow: H₂O → PS II → cytochrome → PS I → NADPH."}, {"heading": "ATP Synthesis in Light Reactions", "body": "<b>F-type ATPases</b> make ATP using H⁺ ions flowing back across the thylakoid membrane — <b>same chemiosmosis as mitochondria</b>. ATP and NADPH are the two products that feed into the dark reactions. ADP is recycled back (oxidized cofactor recycling)."}, {"heading": "Light Reactions Summary", "body": "<b>Inputs:</b> H₂O + light. <b>Outputs:</b> O₂ + ATP + NADPH. Water is split → O₂ released. Light energy captured → stored as ATP and NADPH. These energy carriers power the Calvin cycle. Occurs ONLY in light."}, {"heading": "Dark Reactions — Overview", "body": "Take ATP + NADPH (from light reactions) + CO₂ → <b>build sugars</b>. Called 'dark' reactions because light is <b>NOT directly required</b> — they can occur in light or dark, as long as ATP and NADPH are available. Also called the <b>Calvin cycle</b>. This is Part B of photosynthesis."}, {"heading": "The Calvin Cycle — Carbon Fixation", "body": "Converts <b>3 CO₂ molecules</b> into <b>1 three-carbon sugar</b> (glyceraldehyde 3-phosphate, G3P/PGAL). The key enzyme: <b>Rubisco</b> — adds CO₂ to a 5-carbon sugar (ribulose 1,5-bisphosphate). This is <b>carbon fixation</b> — taking CO₂ from the air and incorporating it into organic molecules."}, {"heading": "Calvin Cycle — Counting Carbons", "body": "3 molecules of ribulose 1,5-bisphosphate = 3 × 5 = <b>15 carbons</b>. Add 3 CO₂ (3 carbons) = <b>18 carbons</b> total → 6 three-carbon molecules. Rubisco is the essential enzyme for ALL CO₂ addition. Tracking carbons helps keep the cycle straight."}, {"heading": "Calvin Cycle — Energy Input", "body": "Energy added to the 3-carbon sugars: <b>1 ATP per sugar</b>, then <b>1 NADPH per sugar</b>. Products = glyceraldehyde 3-phosphate (G3P) — the <b>same molecule found in glycolysis</b>! Total energy cost to make 1 glucose (6C): <b>18 ATP + 6 NADPH + 3 CO₂</b>."}, {"heading": "Calvin Cycle — Sugar Output", "body": "<b>1 molecule of G3P (3-carbon)</b> is removed from the cycle to make sugars. The remaining <b>5 three-carbon sugars</b> are rearranged into <b>3 five-carbon sugars</b> (regenerating the starting material). Last <b>3 ATP</b> used to regenerate ribulose 1,5-bisphosphate. Cycle repeats."}, {"heading": "What Happens to G3P?", "body": "G3P has multiple fates: <b>1)</b> In chloroplast: converted to fructose → eventually <b>starch</b> (food storage). <b>2)</b> Leaves chloroplast → makes <b>sucrose</b> in cytoplasm (transport sugar). <b>3)</b> Can enter <b>glycolysis</b> in the cytoplasm for energy. G3P is the versatile building block of plant metabolism."}, {"heading": "Rubisco — The Most Important Enzyme", "body": "<b>Rubisco</b> (ribulose-1,5-bisphosphate carboxylase/oxygenase) is the enzyme that takes CO₂ from the atmosphere and adds it to sugars. It is the <b>most abundant protein on Earth</b> — nearly <b>1000 kg made every second</b>! Without Rubisco, no carbon fixation → no food chain → no life as we know it."}, {"heading": "Photosynthesis — The Big Picture", "body": "<b>ALL energy our bodies use comes from the sun</b> (eventually). Chlorophyll captures sunlight → Rubisco fixes CO₂ into sugar. We couldn't live without plants. <b>Water plants and algae</b> are just as important as land plants — they produce ~50% of Earth's O₂."}, {"heading": "Light vs Dark Reactions Comparison", "body": "<b>Light reactions:</b> thylakoid membranes, need light, split H₂O, produce O₂ + ATP + NADPH. <b>Dark reactions:</b> stroma, don't need light directly, fix CO₂, produce G3P (sugar), consume ATP + NADPH. Both are essential — light reactions power the dark reactions."}, {"heading": "Photosynthesis vs Cellular Respiration", "body": "<b>Photosynthesis:</b> CO₂ + H₂O + light → glucose + O₂ (stores energy). <b>Respiration:</b> glucose + O₂ → CO₂ + H₂O + ATP (releases energy). They are essentially <b>reverse</b> processes. Plants do BOTH (photosynthesis in light, respiration always). Animals only do respiration."}, {"heading": "Electron Flow Summary", "body": "<b>H₂O → PS II → cytochrome b₆f → PS I → NADPH</b>. Water provides electrons (and releases O₂). PS II boosts electrons with light energy. Cytochrome complex pumps H⁺. PS I boosts electrons again with light. Final electron acceptor: NADP⁺ → NADPH. This is called <b>non-cyclic electron flow</b>."}, {"heading": "Comparing Chloroplasts & Mitochondria", "body": "Both use <b>chemiosmosis</b> (H⁺ gradient → ATP synthase → ATP). Both have <b>electron transport chains</b>. Both have <b>own DNA and ribosomes</b> (endosymbiont theory). Difference: chloroplasts pump H⁺ IN, mitochondria pump H⁺ OUT. Chloroplasts use light; mitochondria use food."}, {"heading": "Why Leaves Change Color in Fall", "body": "During growing season, <b>chlorophyll (green)</b> dominates and masks other pigments. In fall, chlorophyll breaks down → <b>carotenoids</b> (orange/yellow) and <b>anthocyanins</b> (red/purple) become visible. These accessory pigments were always there — helping capture different wavelengths of light."}, {"heading": "Key Concepts Summary", "body": "<b>Light reactions:</b> thylakoids, H₂O → O₂ + ATP + NADPH. <b>PS II:</b> splits water, makes O₂. <b>PS I:</b> makes NADPH. <b>Dark reactions/Calvin:</b> stroma, 3CO₂ → G3P using 18 ATP + 6 NADPH. <b>Rubisco:</b> fixes CO₂, most abundant protein on Earth. <b>Chlorophyll:</b> Mg-based, like heme. <b>G3P</b> → starch/sucrose/glycolysis."}], "quiz": [{"q": "Photosynthesis converts ___ energy to ___ energy:", "a": ["Chemical/light", "Light/chemical", "Heat/light", "Chemical/heat"], "c": 1}, {"q": "Light reactions occur in:", "a": ["Stroma", "Thylakoid membranes", "Cytoplasm", "Nucleus"], "c": 1}, {"q": "Dark reactions occur in:", "a": ["Thylakoid membranes", "Stroma", "Cytoplasm", "Mitochondria"], "c": 1}, {"q": "Overall equation: 6CO₂ + 6H₂O + light →:", "a": ["C₆H₁₂O₆ + 6O₂", "6CO₂ + ATP", "Only O₂", "Only glucose"], "c": 0}, {"q": "Grana are stacks of:", "a": ["Cristae", "Thylakoids", "Ribosomes", "Nuclei"], "c": 1}, {"q": "In light reactions, H⁺ is pumped:", "a": ["Out of thylakoids", "Into thylakoids", "Into stroma", "Out of chloroplast"], "c": 1}, {"q": "In mitochondria, H⁺ is pumped:", "a": ["Into matrix", "Into thylakoids", "Out of matrix", "Into nucleus"], "c": 2}, {"q": "Light reactions produce:", "a": ["Only ATP", "Only O₂", "O₂ + ATP + NADPH", "Glucose"], "c": 2}, {"q": "Chlorophyll uses ___ instead of iron:", "a": ["Calcium", "Sodium", "Magnesium", "Potassium"], "c": 2}, {"q": "Chlorophyll structure is similar to:", "a": ["DNA", "Heme (hemoglobin)", "Cellulose", "Glucose"], "c": 1}, {"q": "Which photosystem runs FIRST?", "a": ["PS I", "PS II", "Both simultaneously", "Neither"], "c": 1}, {"q": "PS II splits ___ to produce O₂:", "a": ["CO₂", "Glucose", "Water", "ATP"], "c": 2}, {"q": "O₂ from photosynthesis comes from:", "a": ["CO₂", "Glucose", "Water splitting", "ATP"], "c": 2}, {"q": "PS I makes:", "a": ["O₂", "ATP only", "NADPH", "Glucose"], "c": 2}, {"q": "PS I requires ___ to be active:", "a": ["Only light", "PS II", "Rubisco", "Dark reactions"], "c": 1}, {"q": "ATP in light reactions is made by:", "a": ["Rubisco", "Substrate phosphorylation", "F-type ATPase (chemiosmosis)", "Direct light"], "c": 2}, {"q": "Dark reactions are called 'dark' because:", "a": ["They only occur at night", "Light is not directly required", "They produce darkness", "They destroy light"], "c": 1}, {"q": "The Calvin cycle fixes:", "a": ["O₂", "N₂", "CO₂", "H₂O"], "c": 2}, {"q": "Rubisco adds ___ to sugar:", "a": ["O₂", "H₂O", "CO₂", "ATP"], "c": 2}, {"q": "Calvin cycle converts 3 CO₂ into:", "a": ["1 six-carbon sugar directly", "1 three-carbon sugar (G3P)", "3 one-carbon molecules", "6 CO₂"], "c": 1}, {"q": "Energy cost for 1 glucose (Calvin): ___ ATP + ___ NADPH:", "a": ["6 + 3", "12 + 6", "18 + 6", "3 + 18"], "c": 2}, {"q": "Rubisco is the ___ protein on Earth:", "a": ["Rarest", "Most abundant", "Smallest", "Newest"], "c": 1}, {"q": "~___ kg of Rubisco made per second:", "a": ["1", "10", "100", "1000"], "c": 3}, {"q": "G3P can become:", "a": ["Only starch", "Starch, sucrose, or enter glycolysis", "Only CO₂", "Only ATP"], "c": 1}, {"q": "G3P is the same molecule found in:", "a": ["TCA cycle", "Glycolysis", "ETC", "DNA replication"], "c": 1}, {"q": "Starch is stored in the:", "a": ["Cytoplasm", "Chloroplast", "Mitochondria", "Nucleus"], "c": 1}, {"q": "Sucrose is made in the:", "a": ["Chloroplast", "Cytoplasm", "Mitochondria", "Vacuole"], "c": 1}, {"q": "Electron flow: H₂O → PS II → cytochrome →:", "a": ["ATP only", "PS I → NADPH", "Glucose", "CO₂"], "c": 1}, {"q": "Final electron acceptor in light reactions:", "a": ["O₂", "CO₂", "NADP⁺ (→ NADPH)", "H₂O"], "c": 2}, {"q": "Plants do photosynthesis AND:", "a": ["Only photosynthesis", "Cellular respiration too", "Neither", "Only fermentation"], "c": 1}, {"q": "Animals do:", "a": ["Photosynthesis only", "Respiration only", "Both", "Neither"], "c": 1}, {"q": "Photosynthesis is essentially the ___ of respiration:", "a": ["Same as", "Reverse", "Unrelated to", "Faster version"], "c": 1}, {"q": "Leaves change color because:", "a": ["New pigments form", "Chlorophyll breaks down, revealing other pigments", "Leaves die", "Temperature changes pigments"], "c": 1}, {"q": "Carotenoids are ___ colored:", "a": ["Green", "Orange/yellow", "Blue", "Clear"], "c": 1}, {"q": "Water plants and algae produce ~___% of Earth's O₂:", "a": ["5", "10", "25", "50"], "c": 3}, {"q": "Both chloroplasts and mitochondria use:", "a": ["Only glycolysis", "Chemiosmosis", "Only fermentation", "Only light"], "c": 1}, {"q": "Reaction center is an 'energy ___':", "a": ["Destroyer", "Funnel", "Block", "Wall"], "c": 1}, {"q": "Ribulose 1,5-bisphosphate has ___ carbons:", "a": ["3", "4", "5", "6"], "c": 2}, {"q": "3 RuBP (5C each) + 3 CO₂ = ___ total carbons:", "a": ["15", "16", "18", "21"], "c": 2}, {"q": "Calvin cycle: 5 G3P are used to regenerate:", "a": ["ATP", "NADPH", "3 RuBP (starting material)", "O₂"], "c": 2}, {"q": "Last 3 ATP in Calvin cycle are used for:", "a": ["Making sugar", "Regenerating RuBP", "Splitting water", "Nothing"], "c": 1}, {"q": "Non-cyclic electron flow ends with:", "a": ["Water", "O₂", "NADPH", "CO₂"], "c": 2}, {"q": "Chlorophyll is hydrophobic because of its:", "a": ["Magnesium", "Ring structure", "Long lipid chain", "Color"], "c": 2}, {"q": "Chlorophyll a vs b: b has a:", "a": ["Extra ring", "Carbonyl group", "Iron atom", "Extra lipid"], "c": 1}, {"q": "All energy our bodies use comes from:", "a": ["The moon", "The sun (eventually)", "Earth's core", "Water"], "c": 1}, {"q": "Carbon fixation means:", "a": ["Releasing CO₂", "Incorporating CO₂ into organic molecules", "Breaking down sugar", "Producing O₂"], "c": 1}, {"q": "Without Rubisco:", "a": ["No carbon fixation → no life", "More CO₂", "Faster photosynthesis", "No change"], "c": 0}, {"q": "Dark reactions consume:", "a": ["O₂ and glucose", "ATP and NADPH", "Light directly", "Only water"], "c": 1}, {"q": "Accessory pigments help by:", "a": ["Blocking light", "Capturing different wavelengths", "Producing O₂ directly", "Making ATP"], "c": 1}, {"q": "NADPH is similar to:", "a": ["ATP", "NADH", "DNA", "Glucose"], "c": 1}]}, {"id": "bio-l9", "title": "Lesson 9: Mendelian Inheritance", "ln": "BIO · L9", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Use and apply Mendel's Law of Segregation. <b>2)</b> Use and apply Mendel's Law of Independent Assortment. <b>3)</b> Understand complex inheritance patterns (incomplete dominance, codominance, epistasis). <b>4)</b> Use pedigrees to analyze family genetic histories."}, {"heading": "Gregor Mendel — Background", "body": "Monk at St Thomas Abbey in Brno, Czech Republic. Studied <b>garden peas</b> from 1856-63, published 1866. Mostly ignored until 1900, when 3 scientists independently reached similar conclusions. His work was special because it was: <b>1)</b> Quantitative, <b>2)</b> Carefully documented, <b>3)</b> Elegantly designed."}, {"heading": "Why Peas Were Perfect", "body": "Two key advantages: <b>1)</b> Could pollinate from specific parents (controlled crosses). <b>2)</b> Chose <b>unambiguous phenotypes</b> easy to identify (round vs wrinkled, yellow vs green, etc.). Breeding for traits was already established — Mendel added the rigor of counting and ratios."}, {"heading": "Key Terminology — Basics", "body": "<b>Cross (mating):</b> sexual reproduction between 2 organisms. <b>Hybrid:</b> cross between parents differing in a trait. <b>Phenotype:</b> observable characteristics. <b>True-breeding:</b> only produces its own phenotype when self-crossed. <b>P₀/F₀:</b> parental generation. <b>F1:</b> first offspring. <b>F2:</b> offspring of F1 × F1."}, {"heading": "Dominant vs Recessive", "body": "<b>Dominant:</b> phenotype visible in the F1 generation (all F1 look like this parent). <b>Recessive:</b> trait that disappears in F1 but <b>reappears in F2</b> after self-cross. In Mendel's peas: round > wrinkled, yellow > green, violet > white, etc."}, {"heading": "The 3:1 Ratio", "body": "F1 × F1 → F2 always gave approximately <b>3:1</b> ratio (dominant:recessive). Example: 593 green : 193 yellow ≈ 3.07:1. This ratio is the hallmark of Mendelian single-gene inheritance with complete dominance."}, {"heading": "The F3 Reveals 1:2:1", "body": "Mendel went further — crossed F2 plants. Of 593 green F2: <b>201</b> produced only green (true-breeding), <b>392</b> produced green + yellow (3:1 again). All 193 yellow → only yellow. Overall F2 genotypes: <b>1/4 homozygous dominant : 2/4 heterozygous : 1/4 homozygous recessive = 1:2:1</b>."}, {"heading": "Principle of Segregation", "body": "From his ratios, Mendel determined: each plant has <b>2 genetic determinants</b> (alleles). In gamete formation, paired alleles <b>separate</b> so each gamete gets only ONE. <b>Mendel's Law of Segregation:</b> paired hereditary determinants separate equally so each gamete is equally likely to contain either one."}, {"heading": "Gametes vs Adults", "body": "<b>Gametes</b> (sperm/egg) have <b>1 allele</b> (haploid). <b>Zygotes and adults</b> have <b>2 alleles</b> (diploid). Convention: <b>CAPITAL</b> = dominant, <b>lowercase</b> = recessive. Most mutations are recessive."}, {"heading": "Punnett Square", "body": "A grid used to determine all possible ways traits can segregate. Cross parental gametes along the edges. Each box = one possible offspring genotype. Example P₀ cross: GG × gg → all F1 = Gg. F1 cross: Gg × Gg → 1 GG : 2 Gg : 1 gg (phenotype 3:1)."}, {"heading": "Test Cross and Backcross", "body": "<b>Test cross:</b> mating to a <b>homozygous recessive</b> individual — reveals the unknown genotype. If all offspring dominant → parent was homozygous dominant. If 1:1 dominant:recessive → parent was heterozygous. <b>Backcross:</b> mating F1 back to the parental (usually recessive) strain."}, {"heading": "More Terminology", "body": "<b>Gene:</b> hereditary element that gets segregated. <b>Allele:</b> particular form of a gene (yes, one gene can have multiple alleles). <b>Homozygous:</b> two copies of SAME allele (GG or gg). <b>Heterozygous:</b> two DIFFERENT alleles (Gg). <b>Genotype:</b> genetic makeup. <b>Phenotype:</b> observable properties."}, {"heading": "Dihybrid Cross", "body": "Parents differ in <b>TWO traits</b>. Example: violet/axial (VVAA) × white/terminal (vvaa). F1 all VvAa (violet/axial = both dominant). F2 Punnett square (4×4 = 16 boxes) gives the famous <b>9:3:3:1 ratio</b>."}, {"heading": "Principle of Independent Assortment", "body": "<b>Mendel's 2nd Law:</b> segregation of any pair of alleles is <b>independent of other pairs</b> in gamete formation. The V gene segregates without regard to the A gene. This produces the 9:3:3:1 ratio. (Later discovered this only applies to genes on DIFFERENT chromosomes.)"}, {"heading": "9:3:3:1 Ratio Details", "body": "F2 dihybrid: <b>9</b> violet/axial : <b>3</b> violet/terminal : <b>3</b> white/axial : <b>1</b> white/terminal. True-breeding fractions: violet/axial 1/9, violet/terminal 1/3, white/axial 1/3, white/terminal ALL. Of 16 boxes, 4 genotypes are true-breeding for both traits."}, {"heading": "Dihybrid Test Cross", "body": "VvAa × vvaa → <b>1:1:1:1 ratio</b> (violet/axial : violet/terminal : white/axial : white/terminal). Each phenotype = 1/4. A test cross reveals the <b>ratio of gametes</b> produced by the F1 parent. Equal ratios confirm independent assortment."}, {"heading": "Incomplete Dominance", "body": "Not all genes show simple dominant/recessive. <b>Incomplete dominance:</b> alleles combine to produce a <b>third, intermediate phenotype</b>. Example: red snapdragon × ivory → <b>ALL pink F1</b>. F2: 1/4 red : 2/4 pink : 1/4 white. Mendel was lucky — all his traits showed full dominance!"}, {"heading": "Codominance — Blood Types", "body": "<b>Codominance:</b> both alleles expressed <b>simultaneously</b> (not blended). ABO blood group: I^A makes A polysaccharide, I^B makes B, i (I⁰) makes none. I^A and I^B are <b>codominant</b> to each other (AB blood type). Both are <b>dominant</b> over i (type O)."}, {"heading": "Blood Type Inheritance", "body": "<b>Type A:</b> I^A I^A or I^A i. <b>Type B:</b> I^B I^B or I^B i. <b>Type AB:</b> I^A I^B (codominant). <b>Type O:</b> ii (both parents must carry i). Antibodies against wrong polysaccharides cause <b>aggregation/strokes/shock</b> — why blood type matching is critical for transfusions."}, {"heading": "Environmental/Conditional Mutations", "body": "A <b>conditional mutation</b> only shows up under the right circumstances — environmental conditions, combined with other genes, etc. <b>Temperature-sensitive mutations</b> are most common. Example: <b>Siamese cats</b> — pigment enzyme only active in cooler body parts (ears, paws, tail, nose) → dark extremities."}, {"heading": "Epistasis", "body": "<b>Epistasis:</b> phenotype of one gene is influenced by the genotype of <b>another gene</b>. Example: Drosophila eye color — brown × scarlet (both homozygous recessive for different genes). F1 = wildtype. F2 = 9 wildtype : 3 brown : 3 scarlet : 1 <b>white</b> (new! double homozygous recessive)."}, {"heading": "Pedigree Analysis — Basics", "body": "For humans, controlled matings aren't feasible. Instead, analyze <b>several generations</b> of related individuals. <b>Pedigree:</b> diagram showing phenotypes across generations. <b>Squares = males, circles = females, solid = affected, lines = relationships</b>."}, {"heading": "Pedigree — Key Terms", "body": "<b>Siblings (sibs):</b> offspring of two parents. <b>Carrier:</b> individual who doesn't show phenotype but passes mutation to offspring — always <b>heterozygous</b>, always for a <b>recessive gene</b>. For dominant genes, there are <b>NO carriers</b> — only affected or unaffected."}, {"heading": "Modern Genetics — DNA Analysis", "body": "Today we combine inheritance analysis with <b>direct DNA testing</b>. For recessive alleles, the DNA is still there (just not expressed) — can be detected directly. <b>DNA arrays</b>: known disease alleles on glass slides, compared to normal DNA to find differences. Enables <b>genetic testing before symptoms appear</b>."}, {"heading": "Key Concepts Summary", "body": "<b>Segregation:</b> alleles separate in gametes (1 per gamete). <b>Independent assortment:</b> genes on different chromosomes sort independently. <b>3:1</b> monohybrid F2. <b>9:3:3:1</b> dihybrid F2. <b>1:1</b> test cross. <b>Incomplete dominance:</b> blended phenotype. <b>Codominance:</b> both expressed. <b>Epistasis:</b> one gene affects another. <b>Pedigrees:</b> squares=males, circles=females, solid=affected."}], "quiz": [{"q": "Mendel studied:", "a": ["Fruit flies", "Garden peas", "Mice", "Corn"], "c": 1}, {"q": "Mendel's work was published in:", "a": ["1856", "1866", "1900", "1953"], "c": 1}, {"q": "His work was special because it was:", "a": ["Qualitative only", "Quantitative, documented, elegantly designed", "Quick and easy", "Done with humans"], "c": 1}, {"q": "F1 generation is offspring of:", "a": ["F2 × F2", "P₀ (parental) cross", "F3 cross", "Random mating"], "c": 1}, {"q": "Dominant trait appears in:", "a": ["Only F2", "Only P₀", "F1 generation", "Only F3"], "c": 2}, {"q": "Recessive trait reappears in:", "a": ["F1", "F2", "P₀", "Never"], "c": 1}, {"q": "F2 monohybrid ratio:", "a": ["1:1", "1:2:1", "3:1", "9:3:3:1"], "c": 2}, {"q": "F2 genotype ratio:", "a": ["3:1", "1:2:1", "9:3:3:1", "1:1"], "c": 1}, {"q": "Law of Segregation: alleles ___ in gamete formation:", "a": ["Double", "Separate equally", "Combine", "Disappear"], "c": 1}, {"q": "Gametes have ___ allele(s) per gene:", "a": ["0", "1", "2", "4"], "c": 1}, {"q": "Adults have ___ allele(s) per gene:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Homozygous means:", "a": ["Two different alleles", "Two same alleles", "No alleles", "Three alleles"], "c": 1}, {"q": "Heterozygous means:", "a": ["Two same alleles", "Two different alleles", "No alleles", "One allele"], "c": 1}, {"q": "Genotype is:", "a": ["Observable traits", "Genetic makeup", "Only dominant", "Only recessive"], "c": 1}, {"q": "Phenotype is:", "a": ["Genetic makeup", "Observable properties", "DNA sequence", "Only recessive"], "c": 1}, {"q": "Capital letter represents:", "a": ["Recessive", "Dominant", "Unknown", "Both"], "c": 1}, {"q": "Lowercase letter represents:", "a": ["Dominant", "Recessive", "Unknown", "Both"], "c": 1}, {"q": "Most mutations are:", "a": ["Dominant", "Recessive", "Codominant", "Lethal"], "c": 1}, {"q": "Punnett square predicts:", "a": ["Exact offspring", "Probability of genotypes/phenotypes", "Mutations", "Evolution"], "c": 1}, {"q": "Test cross uses a:", "a": ["Dominant homozygous", "Heterozygous", "Homozygous recessive", "F1 hybrid"], "c": 2}, {"q": "Test cross of Gg × gg gives:", "a": ["3:1", "1:1", "9:3:3:1", "All dominant"], "c": 1}, {"q": "Dihybrid F2 ratio:", "a": ["3:1", "1:2:1", "9:3:3:1", "1:1:1:1"], "c": 2}, {"q": "Independent assortment applies to genes on:", "a": ["Same chromosome", "Different chromosomes", "Only X chromosome", "Mitochondrial DNA"], "c": 1}, {"q": "Dihybrid test cross ratio:", "a": ["9:3:3:1", "3:1", "1:1:1:1", "1:2:1"], "c": 2}, {"q": "In 9:3:3:1, the '1' represents:", "a": ["Double dominant", "Single recessive", "Double homozygous recessive", "Heterozygous"], "c": 2}, {"q": "True-breeding means:", "a": ["Always heterozygous", "Produces only its own phenotype when selfed", "Random phenotype", "No offspring"], "c": 1}, {"q": "Incomplete dominance produces:", "a": ["Only dominant phenotype", "Intermediate (blended) phenotype", "Only recessive", "Both separately"], "c": 1}, {"q": "Red × ivory snapdragons → F1:", "a": ["All red", "All ivory", "All pink", "Mixed"], "c": 2}, {"q": "Incomplete dominance F2 ratio:", "a": ["3:1", "1:2:1", "9:3:3:1", "1:1"], "c": 1}, {"q": "Codominance: both alleles:", "a": ["Blend", "Are expressed simultaneously", "Cancel out", "One dominates"], "c": 1}, {"q": "Blood type AB is an example of:", "a": ["Dominance", "Incomplete dominance", "Codominance", "Epistasis"], "c": 2}, {"q": "Type O blood genotype:", "a": ["I^A I^A", "I^B I^B", "I^A I^B", "ii"], "c": 3}, {"q": "Type AB genotype:", "a": ["I^A i", "I^B i", "I^A I^B", "ii"], "c": 2}, {"q": "Both parents must carry i for type ___ offspring:", "a": ["A", "B", "AB", "O"], "c": 3}, {"q": "Siamese cat coloring is due to:", "a": ["Codominance", "Temperature-sensitive mutation", "Epistasis", "Incomplete dominance"], "c": 1}, {"q": "Epistasis: one gene influences:", "a": ["Its own expression", "Another gene's phenotype", "Nothing", "Only dominance"], "c": 1}, {"q": "Drosophila epistasis: brown × scarlet F2 includes:", "a": ["Only wildtype", "9:3:3:1 including white", "All brown", "All scarlet"], "c": 1}, {"q": "The white fly phenotype is:", "a": ["Single recessive", "Double homozygous recessive", "Dominant", "Codominant"], "c": 1}, {"q": "In pedigrees, squares represent:", "a": ["Females", "Males", "Unknown", "Affected"], "c": 1}, {"q": "In pedigrees, circles represent:", "a": ["Males", "Females", "Unknown", "Carriers"], "c": 1}, {"q": "Solid symbols in pedigrees mean:", "a": ["Unaffected", "Carrier", "Affected (showing phenotype)", "Dead"], "c": 2}, {"q": "A carrier is always:", "a": ["Homozygous dominant", "Heterozygous", "Homozygous recessive", "Affected"], "c": 1}, {"q": "Carriers exist only for ___ traits:", "a": ["Dominant", "Recessive", "Codominant", "All"], "c": 1}, {"q": "For dominant genes, there are ___ carriers:", "a": ["Many", "Some", "No", "Always"], "c": 2}, {"q": "DNA arrays can detect:", "a": ["Only dominant alleles", "Known disease alleles", "Only proteins", "Only RNA"], "c": 1}, {"q": "BRCA1 and BRCA2 are ___ genes:", "a": ["Blood type", "Eye color", "Breast cancer", "Height"], "c": 2}, {"q": "A backcross mates F1 to:", "a": ["F2", "The recessive parent", "Another F1", "A different species"], "c": 1}, {"q": "Gene = hereditary element; allele =:", "a": ["Same thing", "Particular form of a gene", "A chromosome", "A protein"], "c": 1}, {"q": "Can one gene have multiple alleles?", "a": ["No, only 2", "Yes", "Only in plants", "Only in animals"], "c": 1}, {"q": "Conditional mutations show up only under:", "a": ["All conditions", "Specific conditions", "No conditions", "In males only"], "c": 1}]}, {"id": "bio-l11", "title": "Lesson 10: Mitosis & Meiosis", "ln": "BIO · L10", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Name and describe key stages of the cell cycle. <b>2)</b> Describe general regulators of cell division. <b>3)</b> Name and characterize the 4 stages of mitosis. <b>4)</b> Name and characterize the 5 additional stages of meiosis (Prophase I substages)."}, {"heading": "Cell Cycle — 4 Stages", "body": "<b>G1:</b> cell 'resting,' no DNA synthesis (Gap 1). <b>S:</b> DNA synthesis and chromosome duplication. <b>G2:</b> Gap 2, cell now has double normal DNA. <b>M:</b> Mitosis — chromosomes visible, cell actively dividing (0.5–2 hrs). <b>Interphase = G1 + S + G2</b> (the non-dividing portion). Timing varies by cell type; cultured cells double every 18–24 hrs."}, {"heading": "G0 and Cell Cycle Control", "body": "<b>Interphase</b> is where cells spend most of their time. Most cells are in <b>G0</b> — a non-dividing stage (always stops in G1 before S). This limits excessive divisions that cause diseases like <b>cancer</b>. Embryonic cells divide quickly to build a whole organism fast. <b>E. coli</b> replicates every ~20 minutes."}, {"heading": "Mitosis — Overview", "body": "<b>Mitosis:</b> cell division that <b>maintains</b> the chromosome number (diploid → diploid). The type of division carried out by most cells. Produces two <b>genetically identical</b> daughter cells. Four stages: <b>PMAT</b> — Prophase, Metaphase, Anaphase, Telophase."}, {"heading": "Prophase", "body": "<b>First stage</b> of mitosis. Chromosomes <b>condense</b> (become shorter and thicker, visible under microscope). Paired <b>chromatids</b> (sister chromatids) held together at the <b>centromere</b>. End of prophase marked by <b>loss of the nuclear membrane</b> (nuclear envelope breaks down)."}, {"heading": "Metaphase", "body": "Begins with formation of the <b>mitotic spindle</b> — bundles of microtubules extending from 2 <b>centrosomes</b> to the centromere of chromosomes. <b>Kinetochore:</b> structure at centromere that binds the spindle. Chromosomes line up along the <b>metaphase plate</b> (equidistant from both centrosomes). <b>Spindle checkpoint:</b> monitors kinetochore attachment."}, {"heading": "Anaphase", "body": "<b>Chromatids separate</b> — pulled by kinetochore toward <b>opposite centrosomes</b>. Sister chromatids are now individual chromosomes. The cell elongates. This is the shortest phase of mitosis."}, {"heading": "Telophase & Cytokinesis", "body": "<b>Telophase:</b> nuclear envelope <b>reforms</b> around each set of chromosomes. Mitotic spindle disappears. Chromosomes <b>decondense</b>. <b>Cytokinesis:</b> a <b>cleavage furrow</b> (made of actin microfilaments) separates the cytoplasm in half → two daughter cells. In plants: cell plate forms instead of cleavage furrow."}, {"heading": "PMAT Memory Aid", "body": "<b>P</b>rophase: chromosomes condense, nuclear membrane breaks. <b>M</b>etaphase: chromosomes line up in <b>M</b>iddle. <b>A</b>naphase: chromatids pulled <b>A</b>part. <b>T</b>elophase: <b>T</b>wo new nuclei form. Remember: <b>PMAT</b>."}, {"heading": "Cyclins — Cell Cycle Regulators", "body": "<b>Cyclins</b> are proteins that control the cell cycle. Made progressively as the cycle proceeds. <b>Checkpoints:</b> places that verify key events have occurred before proceeding. <b>Cyclin D:</b> starts the process (G1). <b>Cyclin B:</b> drives entry into mitosis. Mutations in cyclins → uncontrolled division → <b>cancer</b>."}, {"heading": "Rb Protein and Phosphorylation", "body": "For cells to leave G1 and enter S phase, the protein <b>Rb (retinoblastoma)</b> must be <b>phosphorylated</b>. <b>Phosphorylation:</b> transfer of phosphate from ATP to another molecule using an enzyme (kinase). Rb acts as a brake — when phosphorylated, the brake releases and the cell proceeds to S phase."}, {"heading": "Growth Factors", "body": "<b>Growth factors</b> are protein hormones that bind to <b>receptors</b> on the cell surface and signal the cell to start dividing. Different factors cause different cell types to divide. Cells can ONLY respond if they make the <b>right receptors</b> — cells without the proper receptor can't start the signaling pathway."}, {"heading": "Contact Inhibition & Tumors", "body": "<b>Density-dependent (contact) inhibition:</b> cells stop dividing when crowded. <b>Anchorage-dependent inhibition:</b> most cells must be attached to ECM/other cells to divide. <b>Benign tumors:</b> lost contact inhibition but eventually stop. <b>Malignant tumors:</b> lost contact inhibition AND cell cycle control. <b>Metastatic tumors:</b> also lost anchorage dependence — can spread."}, {"heading": "Tumor Types Summary", "body": "<b>Benign:</b> extra divisions, localized, eventually stops. <b>Malignant:</b> uncontrolled growth, invades surrounding tissue. <b>Metastatic:</b> cells break away, travel through blood/lymph, grow at distant sites. Metastasis is what makes cancer deadly — single cells or groups spread to new locations."}, {"heading": "Binary Fission (Bacteria)", "body": "Bacteria don't do mitosis — they use <b>binary fission</b>. Origins of replication (like centrosomes) direct DNA copying. As DNA replicates, it moves to cell ends. Cell elongates, then membrane <b>pinches in</b> to separate the cells. Much simpler than mitosis."}, {"heading": "Meiosis — Why It Exists", "body": "Mendel showed gametes get only 1 'determinant' per gene. If determinant = chromosome → gametes need <b>half</b> the chromosomes. <b>Meiosis:</b> reduces chromosome number by half. Only occurs during <b>gamete formation</b>. Produces <b>haploid</b> cells (23 chromosomes in humans) from diploid cells (46)."}, {"heading": "Meiosis — Two Divisions", "body": "Meiosis = <b>2 consecutive divisions</b> after only 1 round of DNA replication (no second S phase). <b>Meiosis I:</b> separates homologous pairs (46→23). <b>Meiosis II:</b> separates sister chromatids (like mitosis). Result: <b>4 haploid cells</b> from 1 diploid cell. This is where segregation and independent assortment happen."}, {"heading": "Chromosome Numbers (Human)", "body": "<b>G1:</b> 46 chromosomes. <b>After S (G2):</b> 92 chromatids (46 chromosomes, each duplicated). <b>After Meiosis I:</b> 23 chromosomes per cell (each still doubled). <b>After Meiosis II:</b> 23 single chromosomes per cell (haploid)."}, {"heading": "Recombination (Crossing Over)", "body": "<b>Recombination</b> allows individual gametes to combine traits from BOTH parents. Only takes place when all <b>4 chromatids</b> are lined up (tetrad in Prophase I). Results in <b>new combinations</b> of alleles not found in either parent. Random — different children get different combinations."}, {"heading": "Prophase I Substages — Leptotene & Zygotene", "body": "<b>1) Leptotene:</b> initial condensation. Chromosomes appear as thin threads with irregular dense granules (<b>chromomeres</b>). <b>2) Zygotene:</b> lateral pairing of homologous chromosomes (<b>synapsis</b>). A paired homologous pair = <b>bivalent</b>."}, {"heading": "Prophase I — Pachytene & Diplotene", "body": "<b>3) Pachytene:</b> further condensation. Four chromatids visible = <b>tetrad</b>. <b>Crossing over begins</b> here — genetic exchange between homologous chromosomes. Most important substage! <b>4) Diplotene:</b> chromosomes begin to separate. Crossing over visible as <b>chiasmata</b> (cross-connections between chromatids)."}, {"heading": "Prophase I — Diakinesis", "body": "<b>5) Diakinesis:</b> homologous chromosomes not connected by chiasmata <b>repel</b> each other. Chromosomes <b>maximally condensed</b>. Chiasmata persist until first anaphase (chromatids still attached!). Last substage — <b>nuclear membrane breaks down</b>. Then → Metaphase I."}, {"heading": "Results of Meiosis", "body": "Child is a <b>mixture of both parents and grandparents</b>. Recombination is random — different children have different parts of each chromosome, mixing and matching traits. This is why siblings are different from each other despite having the same parents."}, {"heading": "Where Meiosis Occurs", "body": "<b>Meiocytes:</b> cells that undergo meiosis (primary spermatocytes and oocytes). In <b>women:</b> only 1 of 4 haploid daughters survives as the oocyte (other 3 become polar bodies, absorbed). In <b>men:</b> all 4 haploid daughters survive as sperm. All mature organisms have the same species-specific chromosome number."}, {"heading": "Plant Alternation of Generations", "body": "Some plants: haploid daughters form <b>spores</b> → replicate by mitosis → haploid <b>gametophyte</b>. Gametophytes produce gametes by mitosis. Fusion of haploid gametes → diploid zygote → <b>sporophyte</b>. This alternation between haploid and diploid generations is unique to plants."}, {"heading": "Key Concepts Summary", "body": "<b>Cell cycle:</b> G1→S→G2→M. <b>Cyclins/checkpoints</b> regulate progression. <b>Rb</b> phosphorylation = G1→S. <b>Mitosis (PMAT):</b> maintains chromosome #. <b>Cancer:</b> lost contact/anchorage inhibition. <b>Meiosis:</b> 2 divisions, 1 S phase → 4 haploid cells. <b>Prophase I substages:</b> Leptotene→Zygotene→Pachytene(crossing over!)→Diplotene→Diakinesis. <b>Crossing over in pachytene</b> creates genetic diversity."}], "quiz": [{"q": "Cell cycle stages in order:", "a": ["M, G1, G2, S", "G1, S, G2, M", "S, G1, M, G2", "G2, G1, S, M"], "c": 1}, {"q": "DNA synthesis occurs in:", "a": ["G1", "S phase", "G2", "M phase"], "c": 1}, {"q": "Interphase includes:", "a": ["Only G1", "G1, S, G2", "Only M", "Only S"], "c": 1}, {"q": "Most cells spend most time in:", "a": ["M phase", "S phase", "G0 (non-dividing)", "G2"], "c": 2}, {"q": "G0 is a ___ stage:", "a": ["Dividing", "Non-dividing", "Synthetic", "Mitotic"], "c": 1}, {"q": "Mitosis maintains:", "a": ["Half the chromosomes", "The same chromosome number", "Double chromosomes", "Random number"], "c": 1}, {"q": "PMAT stands for:", "a": ["Prophase, Metaphase, Anaphase, Telophase", "Pachytene, Metaphase, Anaphase, Telophase", "Pre, Mid, After, Terminal", "None"], "c": 0}, {"q": "In prophase, chromosomes:", "a": ["Disappear", "Condense (shorten/thicken)", "Line up", "Separate"], "c": 1}, {"q": "Nuclear membrane breaks down at end of:", "a": ["Metaphase", "Anaphase", "Prophase", "Telophase"], "c": 2}, {"q": "Chromosomes line up at the metaphase:", "a": ["Pole", "Plate (middle)", "Membrane", "Nucleus"], "c": 1}, {"q": "Kinetochore is found at the:", "a": ["Telomere", "Centromere", "Cell membrane", "Nucleus"], "c": 1}, {"q": "In anaphase, chromatids:", "a": ["Condense", "Line up", "Separate and move apart", "Reform nucleus"], "c": 2}, {"q": "In telophase:", "a": ["Chromosomes condense", "Nuclear envelope reforms", "Chromosomes separate", "Spindle forms"], "c": 1}, {"q": "Cytokinesis splits the:", "a": ["Nucleus", "Chromosomes", "Cytoplasm", "DNA"], "c": 2}, {"q": "Cleavage furrow is made of:", "a": ["Tubulin", "Actin (microfilaments)", "Keratin", "Collagen"], "c": 1}, {"q": "Cyclins are proteins that control:", "a": ["DNA repair", "The cell cycle", "Protein folding", "Metabolism"], "c": 1}, {"q": "Cyclin D mutations can cause:", "a": ["Cell death", "Cancer (uncontrolled division)", "Normal growth", "Slower division"], "c": 1}, {"q": "Rb must be ___ for cells to enter S phase:", "a": ["Destroyed", "Phosphorylated", "Duplicated", "Methylated"], "c": 1}, {"q": "Growth factors bind to cell surface:", "a": ["DNA", "Lipids", "Receptors", "Chromosomes"], "c": 2}, {"q": "Contact inhibition stops division when cells are:", "a": ["Isolated", "Crowded", "Starving", "Cold"], "c": 1}, {"q": "Benign tumors:", "a": ["Spread everywhere", "Are localized, eventually stop", "Are always fatal", "Are not tumors"], "c": 1}, {"q": "Malignant tumors have lost:", "a": ["Only contact inhibition", "Contact inhibition + cell cycle control", "Nothing", "Only anchorage"], "c": 1}, {"q": "Metastatic tumors can:", "a": ["Only grow locally", "Spread to distant sites", "Only grow in bone", "Self-destruct"], "c": 1}, {"q": "Bacteria divide by:", "a": ["Mitosis", "Meiosis", "Binary fission", "Budding"], "c": 2}, {"q": "Meiosis produces:", "a": ["2 diploid cells", "2 haploid cells", "4 diploid cells", "4 haploid cells"], "c": 3}, {"q": "Meiosis occurs only during:", "a": ["Growth", "Repair", "Gamete formation", "Embryo development"], "c": 2}, {"q": "Haploid means:", "a": ["Full chromosome set", "Half the chromosome set", "Double set", "No chromosomes"], "c": 1}, {"q": "Human haploid number:", "a": ["12", "23", "46", "92"], "c": 1}, {"q": "Human diploid number:", "a": ["12", "23", "46", "92"], "c": 2}, {"q": "Meiosis has ___ division(s) after 1 DNA replication:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Meiosis I separates:", "a": ["Sister chromatids", "Homologous pairs", "Individual genes", "Proteins"], "c": 1}, {"q": "Meiosis II separates:", "a": ["Homologous pairs", "Sister chromatids", "Whole cells", "Nothing"], "c": 1}, {"q": "Crossing over occurs in:", "a": ["Metaphase I", "Prophase I (pachytene)", "Anaphase I", "Telophase I"], "c": 1}, {"q": "A tetrad consists of:", "a": ["2 chromatids", "4 chromatids", "6 chromatids", "8 chromatids"], "c": 1}, {"q": "Synapsis occurs during:", "a": ["Leptotene", "Zygotene", "Pachytene", "Diakinesis"], "c": 1}, {"q": "Bivalent = synapsed:", "a": ["Sister chromatids", "Homologous chromosomes", "Non-homologous", "Random pairs"], "c": 1}, {"q": "Crossing over begins in:", "a": ["Leptotene", "Zygotene", "Pachytene", "Diplotene"], "c": 2}, {"q": "Chiasmata become visible in:", "a": ["Pachytene", "Diplotene", "Diakinesis", "Metaphase"], "c": 1}, {"q": "Diakinesis: chromosomes are:", "a": ["Least condensed", "Maximally condensed", "Invisible", "Duplicating"], "c": 1}, {"q": "In women, meiosis produces ___ surviving egg(s):", "a": ["1", "2", "3", "4"], "c": 0}, {"q": "In men, meiosis produces ___ surviving sperm:", "a": ["1", "2", "3", "4"], "c": 3}, {"q": "Polar bodies are:", "a": ["Extra sperm", "Extra eggs that are absorbed", "Centrosomes", "Kinetochores"], "c": 1}, {"q": "Recombination creates:", "a": ["Identical cells", "New allele combinations", "More chromosomes", "Fewer genes"], "c": 1}, {"q": "Why are siblings different from each other?", "a": ["Different parents", "Random recombination + independent assortment", "Mutations only", "They aren't different"], "c": 1}, {"q": "Spindle checkpoint monitors:", "a": ["DNA replication", "Kinetochore attachment to spindle", "pH", "Temperature"], "c": 1}, {"q": "Prophase I has ___ substages:", "a": ["2", "3", "5", "7"], "c": 2}, {"q": "Substages order: Leptotene → Zygotene →:", "a": ["Diplotene → Pachytene → Diakinesis", "Pachytene → Diplotene → Diakinesis", "Diakinesis → Diplotene → Pachytene", "Pachytene → Diakinesis → Diplotene"], "c": 1}, {"q": "Anchorage-dependent inhibition requires cells to be:", "a": ["Free-floating", "Attached to ECM/other cells", "In G0", "In mitosis"], "c": 1}, {"q": "E. coli divides approximately every:", "a": ["20 minutes", "24 hours", "1 week", "1 second"], "c": 0}, {"q": "Gametophyte is a ___ organism:", "a": ["Diploid", "Haploid", "Triploid", "Tetraploid"], "c": 1}]}]}, "psychology": {"name": "PSY 309", "sub": "Abnormal Psychology", "icon": "🧠", "lessons": []}};

// Slug helper
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')}
function classSlug(k){return slug(D[k].name)}
function lessonSlug(les){return slug(les.title)}

// Build lookup maps
var classKeys={};var lessonMap={};
for(var k in D){classKeys[classSlug(k)]=k;
  for(var i=0;i<D[k].lessons.length;i++){
    lessonMap[classSlug(k)+'/'+lessonSlug(D[k].lessons[i])]={cls:k,idx:i}}}

// STATE
var view="home",curC=null,curL=null,tab="notes";
var shuf=[],pS={i:0,sel:null,sh:false,sc:0,an:0},tS={a:{},done:false,sc:0};
function sf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function rq(){if(curL)shuf=sf(curL.quiz);pS={i:0,sel:null,sh:false,sc:0,an:0};tS={a:{},done:false,sc:0}}

// URL helpers
function buildPath(){
  if(view==="home")return"/";
  if(view==="class")return"/"+classSlug(curC);
  if(view==="lesson")return"/"+classSlug(curC)+"/"+lessonSlug(curL);
  return"/";
}
function pushURL(){var p=buildPath();if(location.pathname!==p)history.pushState({v:view,c:curC,l:curL?curL.title:null,t:tab},document.title,p)}

function parseURL(){
  var p=location.pathname.replace(/\/$/,'');
  if(!p||p==="/"){view="home";curC=null;curL=null;tab="notes";return}
  var segs=p.split('/').filter(Boolean);
  if(segs.length===1){
    var ck=classKeys[segs[0]];
    if(ck){view="class";curC=ck;curL=null;tab="notes";return}
  }
  if(segs.length===2){
    var key=segs[0]+'/'+segs[1];
    var m=lessonMap[key];
    if(m){view="lesson";curC=m.cls;curL=D[m.cls].lessons[m.idx];tab="notes";rq();return}
  }
  view="home";curC=null;curL=null;tab="notes";
}

window.onpopstate=function(){parseURL();render()};

function render(){
var app=document.getElementById("app"),nav=document.getElementById("nav"),bread=document.getElementById("bread");
var mt=document.getElementById("mt"),ms=document.getElementById("ms");

if(view==="home"){
  mt.innerHTML="Anhelina's Study Hub";ms.textContent="Pick a class to start studying";bread.innerHTML="";nav.innerHTML="";
  var h="<div class='class-grid'>";
  for(var k in D){var c=D[k];h+="<div class='cc' onclick=\"go('class','"+k+"')\"><div class='icon'>"+c.icon+"</div><h3>"+c.name+"</h3><p>"+c.sub+"</p><div class='cnt'>"+c.lessons.length+" Lesson"+(c.lessons.length!==1?"s":"")+"</div></div>"}
  h+="</div>";app.innerHTML=h;return;
}

if(view==="class"){
  var c=D[curC];mt.innerHTML=c.name;ms.textContent=c.sub;
  bread.innerHTML="<button class='bbtn' onclick=\"go('home')\">\u2190 Home</button>";nav.innerHTML="";
  if(!c.lessons.length){app.innerHTML="<p style='color:var(--txd);padding:40px 0;text-align:center'>No lessons yet \u2014 Landon is building them for you! \uD83D\uDC9C</p>";return}
  var h="";for(var i=0;i<c.lessons.length;i++){var l=c.lessons[i];
    h+="<div class='lc' style='animation:slideIn .3s ease "+(i*.04)+"s both' onclick=\"go('lesson','"+curC+"',"+i+")\"><div><span class='ln'>"+l.ln+"</span></div><div style='flex:1'><h4>"+l.title+"</h4><div class='meta'>"+l.notes.length+" sections \u00B7 "+l.quiz.length+" questions</div></div><span class='arr'>\u2192</span></div>"}
  app.innerHTML=h;return;
}

// LESSON
var c=D[curC],l=curL;mt.innerHTML=l.title;ms.textContent=l.ln;
bread.innerHTML="<button class='bbtn' onclick=\"go('class','"+curC+"')\">\u2190 "+c.name+"</button>";
nav.innerHTML="<div class='tabs'><button class='pill "+(tab==="notes"?"pill-a":"pill-i")+"' onclick=\"tab='notes';render()\">\uD83D\uDCD6 Notes</button><button class='pill "+(tab==="quiz"?"pill-a":"pill-i")+"' onclick=\"tab='quiz';rq();render()\">\u270F\uFE0F Practice</button><button class='pill "+(tab==="test"?"pill-a":"pill-i")+"' onclick=\"tab='test';rq();render()\">\uD83D\uDCDD Test</button></div>";

if(tab==="notes"){
  var h="";for(var i=0;i<l.notes.length;i++){var n=l.notes[i];
    h+="<div class='nc' style='animation:slideIn .3s ease "+(i*.03)+"s both'><h3><span class='num'>"+(i+1)+"</span>"+n.heading+"</h3><div class='body'>"+n.body+"</div></div>"}
  app.innerHTML=h;return;
}

if(tab==="quiz"){
  if(pS.i>=shuf.length){var p=shuf.length?Math.round(pS.sc/shuf.length*100):0;
    app.innerHTML="<div class='res'><div style='font-size:48px;margin-bottom:12px'>"+(p>=80?"\uD83C\uDFC6":p>=60?"\uD83D\uDC4D":"\uD83D\uDCDA")+"</div><div style='font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent'>"+pS.sc+"/"+shuf.length+"</div><p style='color:var(--txd);margin:8px 0 24px'>"+(p>=90?"Amazing, Anhelina! \uD83C\uDF1F":p>=70?"Great job!":"Keep reviewing!")+"</p><button class='abtn' onclick='rq();render()'>Try Again</button></div>";return;}
  var q=shuf[pS.i];
  var h="<div style='font-size:13px;color:var(--txd);font-weight:600;margin-bottom:8px'>Question "+(pS.i+1)+" / "+shuf.length+"</div><div class='pbar'><div class='pfill' style='width:"+(pS.i/shuf.length*100)+"%'></div></div>";
  h+="<div class='qcard'><h3>"+q.q+"</h3>";
  for(var j=0;j<q.a.length;j++){var cl="opt",lt=String.fromCharCode(65+j);if(pS.sh){cl+=" done";if(j===q.c){cl+=" ok";lt="\u2713"}else if(j===pS.sel){cl+=" no";lt="\u2717"}}
    h+="<button class='"+cl+"' onclick='qA("+j+")'><span class='circ'>"+lt+"</span>"+q.a[j]+"</button>"}
  if(pS.sh){h+="<div style='margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px'><span style='font-size:14px;font-weight:600;color:"+(pS.sel===q.c?"var(--ok)":"var(--err)")+"'>"+(pS.sel===q.c?"Correct! \uD83C\uDF89":"Not quite.")+"</span><button class='abtn' style='padding:10px 22px;font-size:14px' onclick='qN()'>"+(pS.i+1<shuf.length?"Next \u2192":"Results")+"</button></div>"}
  h+="</div><div style='margin-top:14px;display:flex;justify-content:center;gap:20px;font-size:14px;color:var(--txd)'><span>\u2705 "+pS.sc+"</span><span>\u274C "+(pS.an-pS.sc)+"</span></div>";
  app.innerHTML=h;return;
}

// TEST
if(tS.done){var p=shuf.length?Math.round(tS.sc/shuf.length*100):0;
  var h="<div class='res'><div style='font-size:52px;margin-bottom:8px'>"+(p>=90?"\uD83C\uDFC6":p>=70?"\uD83C\uDF1F":"\uD83D\uDCDA")+"</div><div style='font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent'>"+p+"%</div><p style='font-size:18px;color:var(--txd);margin:4px 0'>"+tS.sc+"/"+shuf.length+"</p><p style='color:var(--txd);font-size:14px;margin:8px 0 20px'>"+(p>=90?"You crushed it Anhelina! \uD83D\uDC9C":p>=70?"Solid work!":"Review below!")+"</p><button class='abtn' onclick='rq();render()'>Retake</button></div>";
  for(var i=0;i<shuf.length;i++){if(tS.a[i]!==shuf[i].c){h+="<div class='rw'><div style='font-size:14px;font-weight:600;margin-bottom:8px'>"+shuf[i].q+"</div><div style='font-size:13px;color:var(--err)'>Yours: "+(tS.a[i]!=null?shuf[i].a[tS.a[i]]:"None")+"</div><div style='font-size:13px;color:var(--ok);margin-top:2px'>Correct: "+shuf[i].a[shuf[i].c]+"</div></div>"}}
  app.innerHTML=h;return;}
var ac=Object.keys(tS.a).length;
var h="<div class='tinfo'>Answer all "+shuf.length+" questions, then submit.<br><small style='opacity:.6'>Answered: "+ac+" / "+shuf.length+"</small></div>";
for(var i=0;i<shuf.length;i++){var q=shuf[i];
  h+="<div class='tq "+(tS.a[i]!=null?"ans":"")+"'><div style='font-size:12px;font-weight:700;color:var(--txd);margin-bottom:8px'>#"+(i+1)+"</div><div style='font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.45'>"+q.q+"</div>";
  for(var j=0;j<q.a.length;j++){h+="<button class='topt "+(tS.a[i]===j?"sel":"")+"' onclick='tA("+i+","+j+")'><span class='tl'>"+String.fromCharCode(65+j)+"</span>"+q.a[j]+"</button>"}h+="</div>"}
h+="<div style='text-align:center;padding:20px 0'><button class='abtn' style='padding:14px 48px;font-size:16px;border-radius:14px' "+(ac<shuf.length?"disabled":"")+" onclick='subT()'>Submit Test</button></div>";
app.innerHTML=h;
}

function go(v,cls,idx){
  view=v;tab="notes";
  if(cls)curC=cls;
  if(idx!=null)curL=D[curC].lessons[idx];
  if(v==="lesson")rq();
  pushURL();render();scrollTo({top:0,behavior:"smooth"});
}
function qA(j){if(pS.sh)return;pS.sel=j;pS.sh=true;pS.an++;if(j===shuf[pS.i].c)pS.sc++;render()}
function qN(){pS.i++;pS.sel=null;pS.sh=false;render()}
function tA(i,j){if(tS.done)return;tS.a[i]=j;render()}
function subT(){var s=0;for(var i=0;i<shuf.length;i++){if(tS.a[i]===shuf[i].c)s++}tS.sc=s;tS.done=true;render();scrollTo({top:0,behavior:"smooth"})}

// SPA redirect from 404.html
var redir=sessionStorage.getItem('spa-redirect');
if(redir){sessionStorage.removeItem('spa-redirect');history.replaceState(null,null,redir)}
// Init from URL
parseURL();render();
</script>
</body>
</html>
