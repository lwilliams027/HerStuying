, {"q": "Stronger IMFs → ___ surface tension:", "a": ["Lower", "Higher", "Same", "No effect"], "c": 1}, {"q": "Stronger IMFs → ___ viscosity:", "a": ["Lower", "Higher", "Same", "No effect"], "c": 1}, {"q": "London dispersion forces increase with:", "a": ["Fewer electrons", "More electrons / larger molar mass", "Less mass", "Smaller molecules"], "c": 1}, {"q": "VB (Valence Bond) theory: bonds form from overlap of:", "a": ["Nuclei", "Atomic or hybrid orbitals", "Empty space", "Neutrons"], "c": 1}, {"q": "MO (Molecular Orbital) theory: atomic orbitals combine to form:", "a": ["Nothing", "Bonding and antibonding molecular orbitals", "Only bonding", "Only antibonding"], "c": 1}, {"q": "Bond order = (bonding e⁻ − antibonding e⁻) ÷:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Bond order of 0 means:", "a": ["Strong bond", "Molecule doesn't exist (no net bonding)", "Triple bond", "Double bond"], "c": 1}, {"q": "O₂ is paramagnetic, which MO theory correctly predicts because:", "a": ["All electrons paired", "It has unpaired electrons in π* antibonding", "It's ionic", "It's nonpolar"], "c": 1}, {"q": "Lewis structures cannot explain O₂'s:", "a": ["Bond order", "Paramagnetism (unpaired electrons)", "Shape", "Formula"], "c": 1}, {"q": "Expanded octet: possible for elements in period ___ and beyond:", "a": ["1", "2", "3 (have d orbitals available)", "Only period 7"], "c": 2}, {"q": "PCl₅ has ___ bonds (expanded octet):", "a": ["3", "4", "5", "6"], "c": 2}, {"q": "SF₆ has ___ bonds:", "a": ["4", "5", "6", "8"], "c": 2}, {"q": "XeF₂ has ___ lone pairs on Xe:", "a": ["0", "1", "2", "3"], "c": 3}, {"q": "VSEPR: electron geometry includes lone pairs; molecular geometry:", "a": ["Also includes lone pairs", "Only counts bonding pairs (visible shape)", "Ignores everything", "Only counts ions"], "c": 1}, {"q": "Bent shape can come from ___ or ___ electron groups:", "a": ["2/3", "3/4 (either trigonal planar or tetrahedral base)", "5/6", "1/2"], "c": 1}, {"q": "T-shaped comes from ___ electron groups with 2 lone pairs:", "a": ["4", "5", "6", "3"], "c": 1}, {"q": "See-saw comes from ___ electron groups with 1 lone pair:", "a": ["4", "5", "6", "3"], "c": 1}, {"q": "Square planar comes from ___ electron groups with 2 lone pairs:", "a": ["4", "5", "6", "3"], "c": 2}, {"q": "Square pyramidal comes from ___ electron groups with 1 lone pair:", "a": ["4", "5", "6", "3"], "c": 2}, {"q": "Lone pairs occupy more space than bonding pairs because:", "a": ["They're heavier", "They're closer to nucleus, spread more", "They're smaller", "No reason"], "c": 1}, {"q": "sp3d hybridization gives ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 1}, {"q": "sp3d2 hybridization gives ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 2}, {"q": "Delocalized electrons are shared over ___ atoms:", "a": ["2", "More than 2 (spread across molecule)", "1", "0"], "c": 1}, {"q": "Benzene (C₆H₆) has ___ resonance structures with delocalized π electrons:", "a": ["1", "2", "3", "6"], "c": 1}, {"q": "A coordinate (dative) covalent bond: both electrons come from:", "a": ["Both atoms equally", "One atom (the donor)", "Neither", "The bond"], "c": 1}, {"q": "NH₃ donating its lone pair to H⁺ → NH₄⁺ is a ___ bond:", "a": ["Ionic", "Coordinate covalent", "Nonpolar", "Double"], "c": 1}, {"q": "Lewis acids:", "a": ["Donate electrons", "Accept electron pairs", "Donate protons", "Accept protons"], "c": 1}, {"q": "Lewis bases:", "a": ["Accept electrons", "Donate electron pairs", "Donate protons", "Accept protons"], "c": 1}, {"q": "In BF₃ + NH₃ → F₃B−NH₃: BF₃ is the Lewis:", "a": ["Base", "Acid (accepts lone pair from N)", "Neither", "Both"], "c": 1}, {"q": "Chem review Q1: The mole is central to:", "a": ["Only physics", "All stoichiometry calculations", "Only biology", "Only geology"], "c": 1}, {"q": "Chem review Q2: Balanced equations conserve:", "a": ["Only mass", "Mass and charge", "Only energy", "Only volume"], "c": 1}, {"q": "Chem review Q3: Molar mass has units:", "a": ["g", "g/mol", "mol/g", "kg"], "c": 1}, {"q": "Chem review Q4: Avogadro's number:", "a": ["6.02×10²³", "3.14×10⁸", "1.66×10⁻²⁴", "9.81"], "c": 0}, {"q": "Chem review Q5: SI unit of energy:", "a": ["Calorie", "Joule", "Watt", "Newton"], "c": 1}, {"q": "Chem review Q6: Exothermic ΔH is:", "a": ["Positive", "Negative", "Zero", "Undefined"], "c": 1}, {"q": "Chem review Q7: Hess's law uses enthalpy as a:", "a": ["Path function", "State function", "Constant", "Variable"], "c": 1}, {"q": "Chem review Q8: Valence electrons determine:", "a": ["Mass", "Chemical reactivity", "Color", "Density"], "c": 1}, {"q": "Chem review Q9: Covalent bonds involve:", "a": ["Transfer", "Sharing of electrons", "No electrons", "Only metals"], "c": 1}, {"q": "Chem review Q10: VSEPR predicts:", "a": ["Mass", "Molecular shape", "Energy", "Color"], "c": 1}]}, {"id": "chem-ch7", "title": "Chapter 7: Chemical Bonding & Molecular Geometry (I)", "ln": "CHEM 260 · Ch 7", "notes": [{"heading": "Why Bonding Theories Matter", "body": "Bonding theories explain: <b>how and why</b> atoms attach together to form molecules, and why some combinations are stable while others are not. Example: why is water H₂O, not HO or H₃O? Bonding theories also <b>predict</b> molecular shapes and chemical/physical properties — critical for designing drugs, materials, etc."}, {"heading": "Ionic Bonding", "body": "<b>Ionic compounds:</b> composed of ions held together by <b>ionic bonds</b> — electrostatic forces of attraction between oppositely charged cations (+) and anions (−). Formation: a <b>metal</b> (forms cation) + <b>nonmetal</b> (forms anion). Example: 2Na + Cl₂ → 2NaCl. Ionic bonds are normally <b>strong</b>."}, {"heading": "Covalent Bonding", "body": "<b>Covalent bonds:</b> result from mutual attraction of atoms for a <b>shared pair of electrons</b>. Formed normally between <b>nonmetals</b>. Example: H₂ formation — two H atoms share electrons. Bond length is determined at the point of <b>lowest potential energy</b>. Breaking covalent bonds <b>requires energy</b>."}, {"heading": "Pure (Nonpolar) Covalent Bonds", "body": "Atoms forming the bond are <b>identical</b> → electrons shared <b>equally</b>. No partial charges. ΔEN = 0. Examples: H₂, Cl₂, N₂, O₂. The electron cloud is symmetric between the two identical atoms."}, {"heading": "Polar Covalent Bonds", "body": "Atoms are <b>different</b> → bonding electrons shared <b>unequally</b>. More electronegative atom pulls electrons closer → develops <b>partial negative charge (δ−)</b>; other atom gets <b>partial positive charge (δ+)</b>. Examples: HCl, HF, CO. Most bonds in organic/biological molecules are polar covalent."}, {"heading": "Electronegativity", "body": "<b>Electronegativity:</b> measure of an atom's tendency to attract electrons (electron density) toward itself. Determines how shared electrons are distributed. Electrons shift toward the <b>MORE electronegative</b> atom. <b>Trend:</b> increases going <b>UP and RIGHT</b> on the periodic table. F is most electronegative. Don't confuse with electron affinity (energy when gaining e⁻)."}, {"heading": "ΔEN and Bond Type", "body": "The <b>absolute difference in electronegativity (ΔEN)</b> predicts bond type: <b>ΔEN ≈ 0:</b> nonpolar covalent (equal sharing). <b>0.4 < ΔEN < 1.8:</b> polar covalent (unequal sharing). <b>ΔEN > 1.8:</b> ionic (electron transfer). These are rough guidelines — it's a continuous spectrum, not rigid boundaries."}, {"heading": "Practice Q2: Ranking Bond Polarity", "body": "Amino acid bonds ranked by increasing polarity: <b>C–H < S–H < C–N < N–H < C–O < O–H</b>. Larger ΔEN = more polar. In each bond, the more electronegative atom is δ− and the less electronegative is δ+. Example: O–H → O is δ−, H is δ+."}, {"heading": "Lewis Symbols", "body": "<b>Lewis symbol:</b> element symbol surrounded by <b>one dot for each valence electron</b>. Shows bonding capacity at a glance. Example: Na has 1 dot (1 valence e⁻), Ca has 2 dots, C has 4 dots, Cl has 7 dots. Can represent atoms OR ions."}, {"heading": "Practice Q3: Lewis Symbols", "body": "Write electron configs and Lewis symbols for: <b>Na</b> (1 dot), <b>Mg</b> (2), <b>Al</b> (3), <b>Si</b> (4), <b>P</b> (5), <b>S</b> (6), <b>Cl</b> (7), <b>Ar</b> (8). The number of dots = number of valence electrons = group number (for main group elements)."}, {"heading": "Lewis Structures", "body": "<b>Lewis structures:</b> diagrams showing <b>bonding pairs</b> (represented by dashes —) and <b>lone pairs</b> (dots) in molecules or polyatomic ions. They show which atoms are connected and how electrons are distributed. The most important tool in this chapter!"}, {"heading": "Bonding Pairs vs Lone Pairs", "body": "<b>Bonding pair:</b> a pair of electrons shared between two atoms (shown as a dash). <b>Lone pair:</b> a pair of electrons NOT shared — belongs to one atom only (shown as two dots). Both types count toward satisfying the octet rule."}, {"heading": "The Octet Rule", "body": "Main group atoms tend to form enough bonds to obtain <b>eight valence electrons</b> (noble gas configuration). Hydrogen is satisfied with just <b>2 electrons</b> (duet rule — mimics He). The octet rule is a powerful tool for predicting bonding, but there ARE exceptions."}, {"heading": "Drawing Lewis Structures — Simple Molecules", "body": "For simple molecules (diatomics): just <b>pair up the unpaired electrons</b>. Examples: <b>HBr:</b> H–Br with 3 lone pairs on Br. <b>H₂S:</b> H–S–H with 2 lone pairs on S. <b>N₂:</b> N≡N (triple bond, 1 lone pair on each N to satisfy octet)."}, {"heading": "Drawing Lewis Structures — Steps", "body": "For complicated molecules/ions: <b>Step 1:</b> Count total valence electrons (add for anions, subtract for cations). <b>Step 2:</b> Draw skeleton — least electronegative atom as central atom. <b>Step 3:</b> Distribute remaining e⁻ as lone pairs to complete octets on outer atoms. <b>Step 4:</b> Place remaining e⁻ on central atom. <b>Step 5:</b> If central atom lacks octet, form multiple bonds by converting lone pairs from outer atoms."}, {"heading": "Central Atom Selection", "body": "The <b>least electronegative</b> atom is generally the central atom. <b>H is NEVER central</b> (it can only form one bond). C is very commonly central. If there's only one of an atom, it's usually central. Symmetric molecules often have the unique atom in the center."}, {"heading": "Practice: SiH₄", "body": "<b>Step 1:</b> Valence e⁻: Si(4) + 4×H(1) = 8 total. <b>Step 2:</b> Si is central (less EN than H? Actually Si is central because H can't be). <b>Step 3:</b> 4 Si–H bonds use all 8 electrons. <b>Step 4:</b> No lone pairs needed — Si has 8 e⁻ (4 bonds × 2), each H has 2 e⁻. Done!"}, {"heading": "Practice: NH₃", "body": "Valence e⁻: N(5) + 3×H(1) = 8. N is central. 3 N–H bonds use 6 e⁻. Remaining 2 e⁻ = 1 lone pair on N. Final: H–N–H with one lone pair on N. N has octet (3 bonds + 1 lone pair = 8 e⁻). Each H has duet ✓."}, {"heading": "Practice: HCN", "body": "Valence e⁻: H(1) + C(4) + N(5) = 10. C is central (least EN of C,N). H–C–N skeleton. H–C uses 2 e⁻, C–N uses 2 e⁻. 6 remaining → 3 lone pairs on N → N has octet but C has only 4 e⁻. Convert 2 lone pairs to bonds: H–C≡N. C has 8 e⁻ (1 single + 1 triple), N has 8 e⁻ (1 triple + 1 lone pair) ✓."}, {"heading": "Exception 1: Odd-Electron Molecules (Free Radicals)", "body": "Molecules with an <b>odd number of total electrons</b> → impossible for all atoms to have octets. Called <b>free radicals</b>. Example: <b>NO</b> (5+6 = 11 e⁻). One atom will have an unpaired electron. The lone electron is placed on the <b>less electronegative atom</b> (N in NO) because it has lower EN → more willing to be e⁻ deficient."}, {"heading": "Exception 2: Electron-Deficient Molecules", "body": "Central atoms from <b>Groups 2 and 13</b> may have <b>fewer than 8 electrons</b>. Examples: <b>BeH₂</b> (Be has only 4 e⁻), <b>BF₃</b> (B has only 6 e⁻). These molecules are <b>very reactive</b> — they want to gain electrons (Lewis acids). They do NOT satisfy the octet rule and that's OK for these specific elements."}, {"heading": "Exception 3: Hypervalent Molecules (Expanded Octets)", "body": "Elements in <b>period 3 and higher</b> can accommodate <b>more than 8 valence electrons</b>. Why? Because they have available d orbitals (n≥3 → d orbitals exist). Examples: <b>PCl₅</b> (P has 10 e⁻ around it, 5 bonds), <b>SF₆</b> (S has 12 e⁻, 6 bonds). Period 2 elements (C, N, O, F) can NEVER expand their octet."}, {"heading": "Summary of Octet Exceptions", "body": "<b>1) Odd-electron:</b> free radicals like NO — one atom has 7 e⁻. <b>2) Electron-deficient:</b> Be (4 e⁻), B (6 e⁻) — Groups 2 and 13. <b>3) Expanded octet:</b> Period 3+ elements can have >8 e⁻ using d orbitals (PCl₅, SF₆, XeF₂). Period 2 elements CANNOT expand."}, {"heading": "Multiple Bonds Review", "body": "<b>Single bond:</b> 1 shared pair (1 dash) — longest, weakest. <b>Double bond:</b> 2 shared pairs (2 dashes) — shorter, stronger. <b>Triple bond:</b> 3 shared pairs (3 dashes) — shortest, strongest. Multiple bonds form when single bonds alone can't satisfy octets."}, {"heading": "Key Equations & Concepts", "body": "<b>ΔEN ≈ 0 → nonpolar covalent; 0.4–1.8 → polar; >1.8 → ionic</b><br><b>EN increases up and right</b><br><b>Lewis structure steps: count e⁻ → skeleton → distribute → complete octets → multiple bonds if needed</b><br><b>Octet = 8 e⁻; duet = 2 e⁻ (H only)</b><br><b>Exceptions: odd-e⁻, e⁻-deficient (Be,B), expanded octet (period 3+)</b>"}], "quiz": [{"q": "Ionic bonds form between:", "a": ["Two nonmetals", "Two metals", "Metal + nonmetal", "Noble gases"], "c": 2}, {"q": "Covalent bonds involve:", "a": ["Electron transfer", "Shared electron pairs", "Nuclear fusion", "Proton sharing"], "c": 1}, {"q": "Pure covalent bonds have ΔEN =:", "a": ["0", "0.5", "1.0", "2.0"], "c": 0}, {"q": "Polar covalent bonds have ΔEN roughly:", "a": ["0", "0.4–1.8", ">1.8", "<0"], "c": 1}, {"q": "ΔEN > 1.8 suggests:", "a": ["Nonpolar covalent", "Polar covalent", "Ionic", "Metallic"], "c": 2}, {"q": "Electronegativity increases going:", "a": ["Down and left", "Up and right", "Down and right", "Up and left"], "c": 1}, {"q": "Most electronegative element:", "a": ["O", "N", "F", "Cl"], "c": 2}, {"q": "In HCl, which atom is δ−?", "a": ["H", "Cl", "Both", "Neither"], "c": 1}, {"q": "In O–H bond, δ− is on:", "a": ["H", "O", "Both", "Neither"], "c": 1}, {"q": "Lewis symbol shows:", "a": ["All electrons", "Only core electrons", "Valence electrons as dots", "Nuclear charge"], "c": 2}, {"q": "Na Lewis symbol has ___ dot(s):", "a": ["1", "2", "7", "11"], "c": 0}, {"q": "Cl Lewis symbol has ___ dots:", "a": ["1", "3", "5", "7"], "c": 3}, {"q": "Lewis structures show ___ and ___:", "a": ["Protons/neutrons", "Bonding pairs/lone pairs", "Mass/charge", "Core/valence"], "c": 1}, {"q": "Bonding pair shown as:", "a": ["Two dots", "A dash (line)", "An arrow", "A circle"], "c": 1}, {"q": "Lone pair is:", "a": ["Shared between atoms", "On one atom only", "In the nucleus", "Between molecules"], "c": 1}, {"q": "Octet rule: main group atoms want ___ valence e⁻:", "a": ["2", "4", "6", "8"], "c": 3}, {"q": "H is satisfied with ___ electrons:", "a": ["2", "4", "6", "8"], "c": 0}, {"q": "Central atom is usually the:", "a": ["Most electronegative", "Least electronegative", "Smallest", "Lightest"], "c": 1}, {"q": "H can ___ be the central atom:", "a": ["Always", "Sometimes", "Never", "Only in water"], "c": 2}, {"q": "Step 1 of Lewis structures:", "a": ["Draw skeleton", "Count total valence e⁻", "Add lone pairs", "Make multiple bonds"], "c": 1}, {"q": "SiH₄ total valence electrons:", "a": ["4", "6", "8", "10"], "c": 2}, {"q": "NH₃ total valence electrons:", "a": ["6", "8", "10", "12"], "c": 1}, {"q": "NH₃ has ___ lone pair(s) on N:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "HCN total valence electrons:", "a": ["8", "10", "12", "14"], "c": 1}, {"q": "HCN has a ___ bond between C and N:", "a": ["Single", "Double", "Triple", "No bond"], "c": 2}, {"q": "Free radicals have ___ total electrons:", "a": ["Even number", "Odd number", "Zero", "Always 8"], "c": 1}, {"q": "In NO, the unpaired electron is on:", "a": ["O", "N", "Both", "Neither"], "c": 1}, {"q": "BF₃: B has ___ electrons around it:", "a": ["4", "6", "8", "10"], "c": 1}, {"q": "BF₃ is an example of:", "a": ["Expanded octet", "Electron-deficient", "Free radical", "Normal octet"], "c": 1}, {"q": "PCl₅: P has ___ electrons around it:", "a": ["6", "8", "10", "12"], "c": 2}, {"q": "SF₆: S has ___ electrons around it:", "a": ["8", "10", "12", "14"], "c": 2}, {"q": "Expanded octets are possible for period ___ and higher:", "a": ["1", "2", "3", "Any"], "c": 2}, {"q": "Period 2 elements ___ expand their octet:", "a": ["Can", "Cannot", "Sometimes can", "Always"], "c": 1}, {"q": "Why can period 3+ expand octet?", "a": ["More protons", "Available d orbitals", "Fewer electrons", "Smaller size"], "c": 1}, {"q": "Triple bond is ___ and ___ than single:", "a": ["Longer/weaker", "Shorter/stronger", "Same", "Longer/stronger"], "c": 1}, {"q": "Bond strength order: single < double <:", "a": ["Triple", "Ionic", "Hydrogen", "None"], "c": 0}, {"q": "Multiple bonds form when:", "a": ["Single bonds satisfy octets", "Single bonds can't satisfy octets", "Atoms are identical", "Ions form"], "c": 1}, {"q": "N₂ has a ___ bond:", "a": ["Single", "Double", "Triple", "Quadruple"], "c": 2}, {"q": "How many lone pairs on each N in N₂?", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "Electrons shift toward ___ EN atom:", "a": ["Lower", "Higher", "Equal", "Neither"], "c": 1}, {"q": "Which bond is most polar? C–H, C–O, C–N:", "a": ["C–H", "C–N", "C–O", "All equal"], "c": 2}, {"q": "Ionic bonds are normally:", "a": ["Weak", "Strong", "Moderate", "Nonexistent"], "c": 1}, {"q": "Breaking covalent bonds ___ energy:", "a": ["Releases", "Requires", "Creates", "Destroys"], "c": 1}, {"q": "Bond length is at ___ potential energy:", "a": ["Maximum", "Lo electron groups with 2 lone pairs:", "a": ["4", "5", "6", "3"], "c": 2}, {"q": "Square pyramidal comes from ___ electron groups with 1 lone pair:", "a": ["4", "5", "6", "3"], "c": 2}, {"q": "Lone pairs occupy more space than bonding pairs because:", "a": ["They're heavier", "They're closer to nucleus, spread more", "They're smaller", "No reason"], "c": 1}, {"q": "sp3d hybridization gives ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 1}, {"q": "sp3d2 hybridization gives ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 2}, {"q": "Delocalized electrons are shared over ___ atoms:", "a": ["2", "More than 2 (spread across molecule)", "1", "0"], "c": 1}, {"q": "Benzene (C₆H₆) has ___ resonance structures with delocalized π electrons:", "a": ["1", "2", "3", "6"], "c": 1}, {"q": "A coordinate (dative) covalent bond: both electrons come from:", "a": ["Both atoms equally", "One atom (the donor)", "Neither", "The bond"], "c": 1}, {"q": "NH₃ donating its lone pair to H⁺ → NH₄⁺ is a ___ bond:", "a": ["Ionic", "Coordinate covalent", "Nonpolar", "Double"], "c": 1}, {"q": "Lewis acids:", "a": ["Donate electrons", "Accept electron pairs", "Donate protons", "Accept protons"], "c": 1}, {"q": "Lewis bases:", "a": ["Accept electrons", "Donate electron pairs", "Donate protons", "Accept protons"], "c": 1}, {"q": "In BF₃ + NH₃ → F₃B−NH₃: BF₃ is the Lewis:", "a": ["Base", "Acid (accepts lone pair from N)", "Neither", "Both"], "c": 1}, {"q": "Chem review Q1: The mole is central to:", "a": ["Only physics", "All stoichiometry calculations", "Only biology", "Only geology"], "c": 1}, {"q": "Chem review Q2: Balanced equations conserve:", "a": ["Only mass", "Mass and charge", "Only energy", "Only volume"], "c": 1}, {"q": "Chem review Q3: Molar mass has units:", "a": ["g", "g/mol", "mol/g", "kg"], "c": 1}, {"q": "Chem review Q4: Avogadro's number:", "a": ["6.02×10²³", "3.14×10⁸", "1.66×10⁻²⁴", "9.81"], "c": 0}, {"q": "Chem review Q5: SI unit of energy:", "a": ["Calorie", "Joule", "Watt", "Newton"], "c": 1}, {"q": "Chem review Q6: Exothermic ΔH is:", "a": ["Positive", "Negative", "Zero", "Undefined"], "c": 1}, {"q": "Chem review Q7: Hess's law uses enthalpy as a:", "a": ["Path function", "State function", "Constant", "Variable"], "c": 1}, {"q": "Chem review Q8: Valence electrons determine:", "a": ["Mass", "Chemical reactivity", "Color", "Density"], "c": 1}, {"q": "Chem review Q9: Covalent bonds involve:", "a": ["Transfer", "Sharing of electrons", "No electrons", "Only metals"], "c": 1}, {"q": "Chem review Q10: VSEPR predicts:", "a": ["Mass", "Molecular shape", "Energy", "Color"], "c": 1}]}, {"id": "chem-ch7b", "title": "Chapter 7 (cont): Formal Charge, Resonance & VSEPR", "ln": "CHEM 260 · Ch 7 cont.", "notes": [{"heading": "Formal Charge — Definition", "body": "<b>Formal charge (FC):</b> the hypothetical charge an atom would have if bonding electrons were shared <b>equally</b> between atoms. NOT the real charge — just a bookkeeping tool. Formula: <b>FC = valence e⁻ − (lone pair e⁻ + ½ bonding e⁻)</b>. Sum of all FCs must equal 0 for a molecule or the ion's charge for an ion."}, {"heading": "Formal Charge — How to Calculate", "body": "For each atom: <b>FC = V − (L + ½B)</b> where V = valence electrons of the free atom, L = lone pair electrons on the atom, B = bonding electrons around the atom. Example: in CO, C has FC = 4 − (2 + ½×6) = 4 − 5 = −1. O has FC = 6 − (2 + ½×6) = 6 − 5 = +1. Sum = 0 ✓."}, {"heading": "Practice Q1-Q3: Formal Charges", "body": "<b>ICl₄⁻:</b> I is central with 4 bonds + 2 lone pairs. FC(I) = 7−(4+½×8) = 7−8 = −1. Each Cl: FC = 7−(6+½×2) = 0. Sum = −1 ✓. <b>CO:</b> C≡O with lone pairs on each. <b>BrCl₃:</b> Br central with 3 bonds + 2 lone pairs. Practice calculating each atom's FC."}, {"heading": "Using FC to Predict Best Structure", "body": "When multiple Lewis structures are possible, prefer the one where: <b>1)</b> All formal charges are zero (best). <b>2)</b> If nonzero FCs unavoidable: smallest possible values. <b>3)</b> Adjacent atoms have zero or opposite-sign FCs. <b>4)</b> Negative FCs on the more electronegative atoms."}, {"heading": "Practice Q4: NO₂⁻ Best Structure", "body": "Three possible arrangements. The best one: <b>O=N−O⁻</b> (and its resonance partner). N is central because it's less electronegative. This gives smallest formal charges with negative charge on the more electronegative O atom. Answer: ONO⁻."}, {"heading": "Resonance — What It Is", "body": "When <b>two or more valid Lewis structures</b> can be drawn with the same atom arrangement. The <b>real structure is the average</b> of all resonance forms — no single structure is 'correct' alone. Indicated by double-headed arrows (↔) between structures."}, {"heading": "Resonance — NO₂⁻ Example", "body": "NO₂⁻ can be drawn as O=N−O⁻ OR ⁻O−N=O. Based on a single structure, one N−O should be shorter (double) and one longer (single). But experiments show <b>both bonds are the same length and strength</b>. This proves the real structure is a resonance hybrid — the average of both forms."}, {"heading": "Resonance Practice Q5: CO₃²⁻", "body": "Carbonate has <b>3 resonance structures</b>. Each has C double-bonded to one O and single-bonded to the other two. The double bond 'moves' around all three positions. In reality, all three C−O bonds are identical (intermediate between single and double). Each bond order = 4/3."}, {"heading": "Resonance — Key Points", "body": "<b>1)</b> Atoms don't move — only electron arrangement changes. <b>2)</b> The true structure is a hybrid (average) of all resonance forms. <b>3)</b> Resonance stabilizes molecules (delocalized electrons = lower energy). <b>4)</b> Equivalent resonance structures contribute equally. <b>5)</b> All resonance structures must have the same atom connectivity."}, {"heading": "Bond (Dissociation) Energy", "body": "Energy required to break a specific covalent bond in <b>1 mole of gaseous molecules</b>. Always positive (breaking bonds costs energy). <b>Multiple bonds are stronger:</b> triple > double > single. Average bond energies: C−H ≈ 415 kJ/mol. Values provided on exams."}, {"heading": "Calculating ΔH from Bond Energies", "body": "<b>ΔH ≈ Σ D(bonds broken) − Σ D(bonds formed)</b>. Breaking bonds = energy IN (positive). Forming bonds = energy OUT (negative). If result is negative → exothermic. If positive → endothermic. This is an approximation using average bond energies."}, {"heading": "Bond Energy Example", "body": "For any reaction: <b>1)</b> Draw Lewis structures of all reactants and products. <b>2)</b> Identify all bonds broken (reactants) and formed (products). <b>3)</b> Look up bond energies. <b>4)</b> Sum broken, sum formed, subtract. Remember: this uses AVERAGE values so answers are approximate."}, {"heading": "Lattice Energy", "body": "<b>Lattice energy (ΔH_lattice):</b> energy released when gaseous ions come together to form an ionic solid. Measures the strength of ionic bonding. <b>Larger charges + smaller ions = greater lattice energy</b> (stronger attraction). Cannot be measured directly — calculated using Born-Haber cycle."}, {"heading": "Born-Haber Cycle", "body": "An application of <b>Hess's Law</b> that breaks ionic compound formation into individual steps: atomization, ionization, electron affinity, and lattice formation. Allows <b>indirect calculation of lattice energy</b> from measurable quantities. Less important for exams — focus on the concept, not detailed calculations."}, {"heading": "Bond Angle and Bond Distance", "body": "<b>Bond angle:</b> angle between any two bonds sharing a common atom. <b>Bond distance (length):</b> distance between nuclei of two bonded atoms. Measured in Ångströms (1 Å = 10⁻¹⁰ m) or picometers (1 pm = 10⁻¹² m). Both are predicted by molecular geometry."}, {"heading": "VSEPR Theory — Overview", "body": "<b>Valence Shell Electron-Pair Repulsion</b> theory. Predicts geometry by assuming electron pairs around a central atom <b>maximize their distance from each other</b> (minimize repulsion). Count ALL electron regions: bonds (single, double, or triple each count as ONE region) AND lone pairs."}, {"heading": "Basic Electron-Pair Geometries", "body": "Based on number of electron regions: <b>2 regions → Linear (180°). 3 → Trigonal planar (120°). 4 → Tetrahedral (109.5°). 5 → Trigonal bipyramidal (90°/120°). 6 → Octahedral (90°).</b> These are the IDEAL geometries when all regions are equivalent."}, {"heading": "Electron-Pair vs Molecular Structure", "body": "<b>Electron-pair geometry:</b> arrangement of ALL electron regions (bonds + lone pairs). <b>Molecular structure:</b> arrangement of ATOMS only (what you'd 'see'). They're the <b>same only when there are no lone pairs</b>. With lone pairs, molecular structure differs from e-pair geometry."}, {"heading": "CH₄ vs NH₃ Comparison", "body": "Both have 4 electron regions → <b>tetrahedral e-pair geometry</b>. <b>CH₄:</b> 4 bonding pairs, 0 lone pairs → molecular structure = tetrahedral (109.5°). <b>NH₃:</b> 3 bonding pairs, 1 lone pair → molecular structure = <b>trigonal pyramidal</b> (≈107°). Lone pair compresses angles."}, {"heading": "Lone Pair Effects on Geometry", "body": "Lone pairs take up <b>more space</b> than bonding pairs → they compress bond angles below ideal values. Repulsion order: <b>LP-LP > LP-BP > BP-BP</b>. Size order of regions: <b>lone pair > triple bond > double bond > single bond</b>. This is why NH₃ is 107° not 109.5°, and H₂O is 104.5° not 109.5°."}, {"heading": "Common Molecular Shapes — 4 Regions", "body": "4 e⁻ regions (tetrahedral e-pair geometry): <b>0 LP → Tetrahedral</b> (CH₄, 109.5°). <b>1 LP → Trigonal pyramidal</b> (NH₃, ~107°). <b>2 LP → Bent</b> (H₂O, ~104.5°). More lone pairs = more compression of bond angles."}, {"heading": "Common Molecular Shapes — 2 and 3 Regions", "body": "<b>2 regions → Linear</b> (CO₂, BeCl₂, 180°). <b>3 regions, 0 LP → Trigonal planar</b> (BF₃, 120°). <b>3 regions, 1 LP → Bent</b> (SO₂, <120°). Count double/triple bonds as ONE region each."}, {"heading": "Predicting Geometry — Step by Step", "body": "<b>1)</b> Draw the Lewis structure. <b>2)</b> Count electron regions around central atom (bonds + lone pairs; multiple bonds = 1 region). <b>3)</b> Determine e-pair geometry from count. <b>4)</b> Determine molecular structure by considering only atom positions. <b>5)</b> Estimate bond angles (adjust for LP effects)."}, {"heading": "Molecular Polarity", "body": "A molecule is <b>polar</b> if it has a net dipole moment (bond dipoles don't cancel). <b>Nonpolar:</b> symmetric geometry → dipoles cancel (CO₂, CH₄, BF₃). <b>Polar:</b> asymmetric → dipoles don't cancel (H₂O, NH₃, HCl). Depends on BOTH bond polarity AND molecular geometry."}, {"heading": "Key Equations & Rules", "body": "<b>FC = V − (L + ½B)</b><br><b>ΔH ≈ ΣD(broken) − ΣD(formed)</b><br><b>VSEPR regions:</b> 2=linear, 3=trig planar, 4=tetrahedral, 5=trig bipyramidal, 6=octahedral<br><b>LP-LP > LP-BP > BP-BP</b> (repulsion order)<br><b>Resonance:</b> real structure = average of all valid Lewis structures<br><b>Polar molecule:</b> net dipole ≠ 0"}], "quiz": [{"q": "Formal charge formula: FC = V −:", "a": ["(L + B)", "(L + ½B)", "(½L + B)", "(L − B)"], "c": 1}, {"q": "Sum of all formal charges in a molecule:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Sum of formal charges in an ion:", "a": ["0", "The ion's charge", "+1 always", "−1 always"], "c": 1}, {"q": "Best Lewis structure has formal charges:", "a": ["All as large as possible", "All zero (ideally)", "All positive", "All negative"], "c": 1}, {"q": "Negative FC should be on:", "a": ["Less EN atom", "More EN atom", "Central atom", "Any atom"], "c": 1}, {"q": "Resonance means:", "a": ["Atoms vibrate", "Multiple valid Lewis structures exist", "Bonds break", "Electrons are lost"], "c": 1}, {"q": "The real structure is:", "a": ["One resonance form", "Average of all forms", "The simplest form", "None of them"], "c": 1}, {"q": "In resonance structures, ___ don't move:", "a": ["Electrons", "Atoms", "Bonds", "Lone pairs"], "c": 1}, {"q": "CO₃²⁻ has ___ resonance structures:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "All C−O bonds in CO₃²⁻ are:", "a": ["Different lengths", "Identical (average)", "Single bonds", "Triple bonds"], "c": 1}, {"q": "Resonance ___ molecules:", "a": ["Destabilizes", "Stabilizes", "Doesn't affect", "Destroys"], "c": 1}, {"q": "Bond dissociation energy is always:", "a": ["Negative", "Zero", "Positive", "Variable sign"], "c": 2}, {"q": "Stronger bond: single, double, or triple?", "a": ["Single", "Double", "Triple", "All equal"], "c": 2}, {"q": "ΔH from bond energies = Σ broken −:", "a": ["Σ broken again", "Σ formed", "Σ atoms", "Σ charges"], "c": 1}, {"q": "Breaking bonds requires:", "a": ["Energy input", "Energy release", "No energy", "Only heat"], "c": 0}, {"q": "Forming bonds:", "a": ["Requires energy", "Releases energy", "No change", "Requires light"], "c": 1}, {"q": "Lattice energy: larger charges =:", "a": ["Weaker", "Stronger", "No effect", "Same"], "c": 1}, {"q": "Lattice energy: smaller ions =:", "a": ["Weaker", "Stronger", "No effect", "Same"], "c": 1}, {"q": "Born-Haber cycle is an application of:", "a": ["Bohr model", "Hess's Law", "VSEPR", "Aufbau"], "c": 1}, {"q": "VSEPR stands for:", "a": ["Valence Shell Electron-Pair Repulsion", "Very Simple Electron Prediction Rule", "Valence Structure Electron Placement", "None"], "c": 0}, {"q": "VSEPR: electron pairs try to:", "a": ["Get closer", "Maximize distance", "Stay still", "Pair up"], "c": 1}, {"q": "2 electron regions → geometry:", "a": ["Bent", "Trigonal planar", "Linear", "Tetrahedral"], "c": 2}, {"q": "3 electron regions, 0 LP → geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Bent"], "c": 1}, {"q": "4 electron regions, 0 LP → geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 2}, {"q": "Linear bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c" Bent", "Linear"], "c": 1}, {"q": "3 regions with 1 LP → shape:", "a": ["Trigonal planar", "Linear", "Bent", "T-shaped"], "c": 2}, {"q": "5 electron regions → e-pair geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 1}, {"q": "6 electron regions → e-pair geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 2}, {"q": "Bond distance measured in:", "a": ["Moles", "Ångströms or pm", "Liters", "Joules"], "c": 1}, {"q": "Average C−H bond energy ≈:", "a": ["150 kJ/mol", "250 kJ/mol", "415 kJ/mol", "800 kJ/mol"], "c": 2}, {"q": "A covalent bond forms by ___ electrons:", "a": ["Transferring", "Sharing", "Destroying", "Creating"], "c": 1}, {"q": "An ionic bond forms by ___ electrons:", "a": ["Sharing", "Transferring", "Destroying", "Neither"], "c": 1}, {"q": "Lewis dot structures show:", "a": ["Nucleus", "Valence electrons as dots", "All electrons", "Neutrons"], "c": 1}, {"q": "The octet rule: atoms want ___ valence electrons:", "a": ["2", "4", "6", "8"], "c": 3}, {"q": "Single bond = ___ shared electrons:", "a": ["1", "2", "4", "6"], "c": 1}, {"q": "Double bond = ___ shared electrons:", "a": ["2", "4", "6", "8"], "c": 1}, {"q": "Triple bond = ___ shared electrons:", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "Bond length: triple < double < single because more sharing =:", "a": ["Longer", "Shorter (stronger pull)", "Same", "Variable"], "c": 1}, {"q": "Bond energy: triple > double > single because:", "a": ["Fewer electrons", "More electrons shared = stronger", "Less overlap", "Random"], "c": 1}, {"q": "Electronegativity difference determines bond:", "a": ["Length", "Type (ionic vs polar vs nonpolar covalent)", "Color", "State"], "c": 1}, {"q": "ΔEN = 0: bond is:", "a": ["Ionic", "Polar covalent", "Nonpolar covalent (pure)", "Metallic"], "c": 2}, {"q": "ΔEN < 0.5: bond is:", "a": ["Ionic", "Polar covalent", "Nonpolar covalent", "Metallic"], "c": 2}, {"q": "ΔEN 0.5-1.7: bond is:", "a": ["Ionic", "Polar covalent", "Nonpolar", "Metallic"], "c": 1}, {"q": "ΔEN > 1.7: bond is:", "a": ["Nonpolar", "Polar covalent", "Ionic", "Metallic"], "c": 2}, {"q": "In a polar bond, electrons are closer to the ___ atom:", "a": ["Less electronegative", "More electronegative", "Bigger", "Smaller"], "c": 1}, {"q": "A dipole moment exists when charge is:", "a": ["Symmetric", "Asymmetric (uneven distribution)", "Zero", "Equal"], "c": 1}, {"q": "Polar molecules have a net:", "a": ["Zero dipole", "Dipole moment", "No charge", "Equal charge"], "c": 1}, {"q": "CO₂ is nonpolar despite polar bonds because:", "a": ["Bonds cancel (linear, symmetric)", "It has no bonds", "It's ionic", "Bonds don't cancel"], "c": 0}, {"q": "H₂O is polar because:", "a": ["Linear shape", "Bent shape → dipoles don't cancel", "No lone pairs", "It's ionic"], "c": 1}, {"q": "VSEPR theory predicts molecular:", "a": ["Color", "Shape/geometry", "Mass", "Energy"], "c": 1}, {"q": "VSEPR stands for:", "a": ["Very Simple Electron Pair Repulsion", "Valence Shell Electron Pair Repulsion", "Volume Shape Energy Pair Repulsion", "None"], "c": 1}, {"q": "Electron pairs around central atom repel to get:", "a": ["Closer", "As far apart as possible", "Random positions", "In a line"], "c": 1}, {"q": "2 electron groups → ___ geometry:", "a": ["Bent", "Linear (180°)", "Trigonal planar", "Tetrahedral"], "c": 1}, {"q": "3 electron groups → ___ geometry:", "a": ["Linear", "Trigonal planar (120°)", "Tetrahedral", "Octahedral"], "c": 1}, {"q": "4 electron groups → ___ geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral (109.5°)", "Octahedral"], "c": 2}, {"q": "5 electron groups → ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 1}, {"q": "6 electron groups → ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral (90°)", "Linear"], "c": 2}, {"q": "Lone pairs ___ bond angles:", "a": ["Increase", "Decrease (lone pairs repel more)", "Don't affect", "Eliminate"], "c": 1}, {"q": "CH₄ molecular shape:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Bent"], "c": 2}, {"q": "NH₃ has 4 electron groups but shape is:", "a": ["Tetrahedral", "Trigonal pyramidal (1 lone pair)", "Bent", "Linear"], "c": 1}, {"q": "H₂O has 4 electron groups but shape is:", "a": ["Tetrahedral", "Trigonal pyramidal", "Bent (2 lone pairs)", "Linear"], "c": 2}, {"q": "BF₃ molecular shape:", "a": ["Bent", "Trigonal planar", "Tetrahedral", "Linear"], "c": 1}, {"q": "CO₂ molecular shape:", "a": ["Bent", "Trigonal planar", "Tetrahedral", "Linear"], "c": 3}, {"q": "Formal charge = valence e⁻ − (lone pair e⁻ + ½ bonding e⁻):", "a": ["True", "False", "Sometimes", "Only for ions"], "c": 0}, {"q": "The best Lewis structure has formal charges closest to:", "a": ["+2", "0", "−2", "+1"], "c": 1}, {"q": "Resonance structures show:", "a": ["Different molecules", "Different electron arrangements for the same molecule", "Isomers", "Isotopes"], "c": 1}, {"q": "The actual structure is a ___ of all resonance structures:", "a": ["Copy", "Hybrid (average)", "Sum", "Product"], "c": 1}, {"q": "O₃ has ___ resonance structures:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Resonance structures are connected by:", "a": ["Arrows", "Double-headed arrows (↔)", "Equals signs", "Plus signs"], "c": 1}, {"q": "sp³ hybridization has ___ hybrid orbitals:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "sp² hybridization has ___ hybrid orbitals:", "a": ["2", "3", "4", "5"], "c": 1}, {"q": "sp hybridization has ___ hybrid orbitals:", "a": ["2", "3", "4", "5"], "c": 0}, {"q": "sp³ → ___ geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 2}, {"q": "sp² → ___ geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 1}, {"q": "sp → ___ geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 0}, {"q": "A sigma (σ) bond is formed by ___ overlap:", "a": ["Side-to-side", "Head-on (end-to-end)", "No overlap", "Random"], "c": 1}, {"q": "A pi (π) bond is formed by ___ overlap:", "a": ["Head-on", "Side-to-side (parallel p orbitals)", "No overlap", "s orbitals"], "c": 1}, {"q": "A single bond = ___ σ bond(s):", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "A double bond = 1σ + ___ π:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "A triple bond = 1σ + ___ π:", "a": ["0", "1", "2", "3"], "c": 2}, {"q": "Sigma bonds allow free:", "a": ["Rotation", "No rotation", "Only vibration", "Nothing"], "c": 0}, {"q": "Pi bonds prevent free:", "a": ["Vibration", "Rotation (rigid)", "Stretching", "Nothing"], "c": 1}, {"q": "Metallic bonding: metal cations in a 'sea' of:", "a": ["Protons", "Delocalized electrons", "Anions", "Water"], "c": 1}, {"q": "Metallic bonding explains:", "a": ["Brittleness", "Conductivity, malleability, luster", "Insulation", "Transparency"], "c": 1}, {"q": "Intermolecular forces are between:", "a": ["Atoms in a molecule", "Molecules (between separate molecules)", "Protons", "Neutrons"], "c": 1}, {"q": "London dispersion forces are in:", "a": ["Only polar molecules", "All molecules (including nonpolar)", "Only ionic", "Only metals"], "c": 1}, {"q": "Dipole-dipole forces are between:", "a": ["Nonpolar molecules", "Polar molecules", "Ions", "Noble gases only"], "c": 1}, {"q": "Hydrogen bonding occurs when H is bonded to:", "a": ["Any atom", "F, O, or N (highly electronegative)", "Only carbon", "Only metals"], "c": 1}, {"q": "Strongest intermolecular force:", "a": ["London dispersion", "Dipole-dipole", "Hydrogen bonding", "Ion-dipole"], "c": 3}, {"q": "Ion-dipole forces are between:", "a": ["Two ions", "An ion and a polar molecule", "Two nonpolar molecules", "Two atoms"], "c": 1}, {"q": "Stronger IMFs → ___ boiling point:", "a": ["Lower", "Higher", "Same", "No effect"], "c": 1}, {"q": "Stronger IMFs → ___ surface tension:", "a": ["Lower", "Higher", "Same", "No effect"], "c": 1}, {"q": "Stronger IMFs → ___ viscosity:", "a": ["Lower", "Higher", "Same", "No effect"], "c": 1}, {"q": "London dispersion forces increase with:", "a": ["Fewer electrons", "More electrons / larger molar mass", "Less mass", "Smaller molecules"], "c": 1}, {"q": "VB (Valence Bond) theory: bonds form from overlap of:", "a": ["Nuclei", "Atomic or hybrid orbitals", "Empty space", "Neutrons"], "c": 1}, {"q": "MO (Molecular Orbital) theory: atomic orbitals combine to form:", "a": ["Nothing", "Bonding and antibonding molecular orbitals", "Only bonding", "Only antibonding"], "c": 1}, {"q": "Bond order = (bonding e⁻ − antibonding e⁻) ÷:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Bond order of 0 means:", "a": ["Strong bond", "Molecule doesn't exist (no net bonding)", "Triple bond", "Double bond"], "c": 1}, {"q": "O₂ is paramagnetic, which MO theory correctly predicts because:", "a": ["All electrons paired", "It has unpaired electrons in π* antibonding", "It's ionic", "It's nonpolar"], "c": 1}, {"q": "Lewis structures cannot explain O₂'s:", "a": ["Bond order", "Paramagnetism (unpaired electrons)", "Shape", "Formula"], "c": 1}, {"q": "Expanded octet: possible for elements in period ___ and beyond:", "a": ["1", "2", "3 (have d orbitals available)", "Only period 7"], "c": 2}, {"q": "PCl₅ has ___ bonds (expanded octet):", "a": ["3", "4", "5", "6"], "c": 2}, {"q": "SF₆ has ___ bonds:", "a": ["4", "5", "6", "8"], "c": 2}, {"q": "XeF₂ has ___ lone pairs on Xe:", "a": ["0", "1", "2", "3"], "c": 3}, {"q": "VSEPR: electron geometry includes lone pairs; molecular geometry:", "a": ["Also includes lone pairs", "Only counts bonding pairs (visible shape)", "Ignores everything", "Only counts ions"], "c": 1}, {"q": "Bent shape can come from ___ or ___ electron groups:", "a": ["2/3", "3/4 (either trigonal planar or tetrahedral base)", "5/6", "1/2"], "c": 1}, {"q": "T-shaped comes from ___ electron groups with 2 lone pairs:", "a": ["4", "5", "6", "3"], "c": 1}, {"q": "See-saw comes from ___ electron groups with 1 lone pair:", "a": ["4", "5", "6", "3"], "c": 1}, {"q": "Square planar comes from ___ electron groups with 2 lone pairs:", "a": ["4", "5", "6", "3"], "c": 2}, {"q": "Square pyramidal comes from ___ electron groups with 1 lone pair:", "a": ["4", "5", "6", "3"], "c": 2}, {"q": "Lone pairs occupy more space than bonding pairs because:", "a": ["They're heavier", "They're closer to nucleus, spread more", "They're smaller", "No reason"], "c": 1}, {"q": "sp3d hybridization gives ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 1}, {"q": "sp3d2 hybridization gives ___ geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 2}, {"q": "Delocalized electrons are shared over ___ atoms:", "a": ["2", "More than 2 (spread across molecule)", "1", "0"], "c": 1}, {"q": "Benzene (C₆H₆) has ___ resonance structures with delocalized π electrons:", "a": ["1", "2", "3", "6"], "c": 1}, {"q": "A coordinate (dative) covalent bond: both electrons come from:", "a": ["Both atoms equally", "One atom (the donor)", "Neither", "The bond"], "c": 1}, {"q": "NH₃ donating its lone pair to H⁺ → NH₄⁺ is a ___ bond:", "a": ["Ionic", "Coordinate covalent", "Nonpolar", "Double"], "c": 1}, {"q": "Lewis acids:", "a": ["Donate electrons", "Accept electron pairs", "Donate protons", "Accept protons"], "c": 1}, {"q": "Lewis bases:", "a": ["Accept electrons", "Donate electron pairs", "Donate protons", "Accept protons"], "c": 1}, {"q": "In BF₃ + NH₃ → F₃B−NH₃: BF₃ is the Lewis:", "a": ["Base", "Acid (accepts lone pair from N)", "Neither", "Both"], "c": 1}, {"q": "Chem review Q1: The mole is central to:", "a": ["Only physics", "All stoichiometry calculations", "Only biology", "Only geology"], "c": 1}, {"q": "Chem review Q2: Balanced equations conserve:", "a": ["Only mass", "Mass and charge", "Only energy", "Only volume"], "c": 1}, {"q": "Chem review Q3: Molar mass has units:", "a": ["g", "g/mol", "mol/g", "kg"], "c": 1}, {"q": "Chem review Q4: Avogadro's number:", "a": ["6.02×10²³", "3.14×10⁸", "1.66×10⁻²⁴", "9.81"], "c": 0}, {"q": "Chem review Q5: SI unit of energy:", "a": ["Calorie", "Joule", "Watt", "Newton"], "c": 1}, {"q": "Chem review Q6: Exothermic ΔH is:", "a": ["Positive", "Negative", "Zero", "Undefined"], "c": 1}, {"q": "Chem review Q7: Hess's law uses enthalpy as a:", "a": ["Path function", "State function", "Constant", "Variable"], "c": 1}, {"q": "Chem review Q8: Valence electrons determine:", "a": ["Mass", "Chemical reactivity", "Color", "Density"], "c": 1}, {"q": "Chem review Q9: Covalent bonds involve:", "a": ["Transfer", "Sharing of electrons", "No electrons", "Only metals"], "c": 1}, {"q": "Chem review Q10: VSEPR predicts:", "a": ["Mass", "Molecular shape", "Energy", "Color"], "c": 1}]}, {"id": "chem-ch8", "title": "Chapter 8: Advanced Bonding — VB Theory & Hybridization", "ln": "CHEM 260 · Ch 8", "notes": [{"heading": "Learning Objectives", "body": "<b>1)</b> Explain how valence bond theory explains covalent bonding. <b>2)</b> Describe the role of hybrid orbitals in molecular shapes. <b>3)</b> Differentiate between multiple bonds using bonding theories. <b>4)</b> Interpret molecular orbital diagrams to predict molecule properties."}, {"heading": "Why We Need More Than Lewis/VSEPR", "body": "Lewis structures and VSEPR fall short of accurately describing the <b>electronic distribution</b> in molecules. They predict shapes but don't explain HOW or WHY electrons are shared the way they are. We need <b>valence bond theory</b> and <b>hybridization</b> for a deeper understanding."}, {"heading": "Valence Bond (VB) Theory", "body": "A quantum mechanical model of covalent bonding. Key ideas: <b>1)</b> An orbital on one atom <b>overlaps</b> with an orbital on a second atom. <b>2)</b> Single electrons in each orbital combine to form an <b>electron pair</b>. <b>3)</b> Each atom keeps its own atomic orbitals. <b>4)</b> The electron pair is shared in the overlap region. <b>5)</b> Greater overlap = stronger bond."}, {"heading": "Sigma (σ) Bonds", "body": "Formed by <b>end-to-end (head-on) overlap</b>. Three types: <b>s + s</b> (e.g., H₂), <b>s + p</b> (e.g., HCl), <b>p + p end-to-end</b> (e.g., Cl₂). ALL single bonds are σ bonds. The first bond formed between any two atoms is always a σ bond. Allow free rotation around the bond axis."}, {"heading": "Pi (π) Bonds", "body": "Formed by <b>side-by-side overlap</b> of two p orbitals. Found in <b>multiple bonds alongside σ bonds</b>. Generally weaker than σ bonds (less overlap). Restrict rotation around the bond (important for cis/trans isomerism). π bonds use unhybridized p orbitals."}, {"heading": "Counting σ and π Bonds — Rules", "body": "<b>Rule 1:</b> The first bond between two atoms is ALWAYS a σ bond. <b>Rule 2:</b> All remaining bonds in a multiple bond are π bonds. So: <b>Single bond = 1σ</b>. <b>Double bond = 1σ + 1π</b>. <b>Triple bond = 1σ + 2π</b>. Count every bond in the molecule."}, {"heading": "Practice: Counting Bonds", "body": "For any molecule: count every connection. Each single line = 1σ. Each double = 1σ + 1π. Each triple = 1σ + 2π. Example: C₂H₄ (H₂C=CH₂): 4 C−H single bonds (4σ) + 1 C=C double (1σ + 1π) = <b>5σ + 1π</b> total."}, {"heading": "Practice Q2: Overlap Types", "body": "Side-by-side overlap of 4p and 2p = <b>π bond</b>. End-to-end overlap of 4p and 4p = <b>σ bond</b>. End-to-end overlap of 4p and 2p = <b>σ bond</b>. Total: <b>2σ + 1π bonds</b>. Answer: (B). Remember: end-to-end = σ, side-by-side = π."}, {"heading": "Hybridization — Why We Need It", "body": "VB theory alone only works for diatomic molecules. To explain molecules with 3+ atoms, we need <b>hybrid atomic orbitals</b>. Hybridization = mixing (combining) atomic orbital wave functions to form new hybrid orbitals suited for bonding. The number of hybrid orbitals = number of atomic orbitals combined."}, {"heading": "Key Hybridization Concepts", "body": "<b>1)</b> Only in covalently bonded atoms — isolated atoms don't hybridize. <b>2)</b> # hybrid orbitals = # atomic orbitals combined. <b>3)</b> Hybrid orbitals form σ bonds. <b>4)</b> Unhybridized p orbitals form π bonds. <b>5)</b> Hybridization is determined by the number of electron regions around the central atom."}, {"heading": "sp Hybridization", "body": "Mix <b>1 s + 1 p</b> → 2 equivalent <b>sp hybrid orbitals</b>. Geometry: <b>linear (180°)</b>. 2 electron regions. 2 unhybridized p orbitals remain (available for π bonds). Examples: BeCl₂, HgCl₂, CO₂ (C is sp), C₂H₂ (each C is sp)."}, {"heading": "sp² Hybridization", "body": "Mix <b>1 s + 2 p</b> → 3 equivalent <b>sp² hybrid orbitals</b>. Geometry: <b>trigonal planar (120°)</b>. 3 electron regions. 1 unhybridized p orbital remains (for π bonding). Examples: BF₃, BH₃, C₂H₄ (each C is sp²), carbonate ion."}, {"heading": "sp³ Hybridization", "body": "Mix <b>1 s + 3 p</b> → 4 equivalent <b>sp³ hybrid orbitals</b>. Geometry: <b>tetrahedral (109.5°)</b>. 4 electron regions. 0 unhybridized p orbitals. Examples: CH₄, CCl₄, both C atoms in C₂H₆. Most common hybridization."}, {"heading": "sp³ with Lone Pairs", "body": "sp³ hybridization also applies when lone pairs are present! <b>NH₃:</b> N is sp³ — 3 bonding pairs + 1 lone pair → trigonal pyramidal (107.3°). <b>H₂O:</b> O is sp³ — 2 bonding pairs + 2 lone pairs → bent (104.5°). The hybrid orbitals hold lone pairs too!"}, {"heading": "sp³d Hybridization", "body": "Mix <b>1 s + 3 p + 1 d</b> → 5 sp³d hybrid orbitals. Geometry: <b>trigonal bipyramidal</b>. 5 electron regions. Requires d orbitals → only possible for <b>period 3+ elements</b>. Example: PCl₅ (P is sp³d)."}, {"heading": "sp³d² Hybridization", "body": "Mix <b>1 s + 3 p + 2 d</b> → 6 sp³d² hybrid orbitals. Geometry: <b>octahedral (90°)</b>. 6 electron regions. Examples: SF₆ (S is sp³d²), PCl₆⁻, IF₆⁺. If these seem complicated, remember the examples and their structures."}, {"heading": "Quick Reference: Regions → Hybridization", "body": "<b>2 regions → sp</b> (linear, 180°). <b>3 regions → sp²</b> (trigonal planar, 120°). <b>4 regions → sp³</b> (tetrahedral, 109.5°). <b>5 regions → sp³d</b> (trigonal bipyramidal). <b>6 regions → sp³d²</b> (octahedral, 90°). Count ALL electron regions (bonds + lone pairs)."}, {"heading": "Determining Hybridization — 3 Steps", "body": "<b>Step 1:</b> Draw the Lewis structure (you REALLY need to know how!). <b>Step 2:</b> Use VSEPR to predict electron-group geometry (count regions). <b>Step 3:</b> Match the geometry to the hybridization using the table. The number of electron regions = number of hybrid orbitals needed."}, {"heading": "Practice Q3: SeF₄", "body": "Se is central. Lewis structure: 4 bonds + 1 lone pair = <b>5 electron regions</b>. 5 regions → sp³d hybridization → trigonal bipyramidal e-pair geometry → <b>seesaw molecular shape</b>. Answer: <b>(D) sp³d</b>."}, {"heading": "Multiple Bonds: C₂H₄ (Ethylene)", "body": "Each C has 3 regions (2 C−H + 1 C=C) → <b>sp² hybridized</b>. 3 sp² orbitals form: 2 C−H σ bonds + 1 C−C σ bond. 1 remaining unhybridized p orbital on each C → <b>side-by-side overlap → π bond</b>. Total C=C: 1σ + 1π. The π bond is above and below the molecular plane."}, {"heading": "Multiple Bonds: C₂H₂ (Acetylene)", "body": "Each C has 2 regions (1 C−H + 1 C≡C) → <b>sp hybridized</b>. 2 sp orbitals form: 1 C−H σ bond + 1 C−C σ bond. 2 remaining unhybridized p orbitals on each C → <b>2 π bonds</b>. Total C≡C: 1σ + 2π. Linear molecule (180°)."}, {"heading": "σ vs π Bond Summary", "body": "<b>σ bonds:</b> formed by hybrid orbitals, end-to-end overlap, stronger, allow rotation. <b>π bonds:</b> formed by unhybridized p orbitals, side-by-side overlap, weaker, restrict rotation. Every bond between atoms starts with σ; additional bonds are π."}, {"heading": "Unhybridized Orbitals Count", "body": "<b>sp:</b> 2 unhybridized p orbitals (can form 2 π bonds). <b>sp²:</b> 1 unhybridized p orbital (can form 1 π bond). <b>sp³:</b> 0 unhybridized p orbitals (no π bonds). <b>sp³d:</b> 0. <b>sp³d²:</b> 0. This is why sp carbons can have triple bonds but sp³ cannot."}, {"heading": "Review: VSEPR Geometries", "body": "This lecture also reviewed: <b>E-pair geometry ≠ molecular structure</b> when lone pairs are present. CH₄ = tetrahedral (0 LP). NH₃ = trigonal pyramidal (1 LP). H₂O = bent (2 LP). Repulsion order: LP-LP > LP-BP > BP-BP. Region size: LP > triple > double > single."}, {"heading": "Key Equations & Rules", "body": "<b>Single = 1σ. Double = 1σ+1π. Triple = 1σ+2π.</b><br><b>Regions→Hybrid:</b> 2→sp, 3→sp², 4→sp³, 5→sp³d, 6→sp³d²<br><b>Hybrid orbitals → σ bonds. Unhybridized p → π bonds.</b><br><b>Steps:</b> Lewis → VSEPR (count regions) → hybridization table<br><b>sp: 2 unhybridized p. sp²: 1. sp³: 0.</b>"}], "quiz": [{"q": "VB theory: covalent bonds form by orbital:", "a": ["Transfer", "Overlap", "Destruction", "Creation"], "c": 1}, {"q": "Greater orbital overlap =:", "a": ["Weaker bond", "Stronger bond", "No bond", "Ionic bond"], "c": 1}, {"q": "σ bonds form by ___ overlap:", "a": ["Side-by-side", "End-to-end", "No overlap", "Random"], "c": 1}, {"q": "π bonds form by ___ overlap:", "a": ["End-to-end", "Side-by-side", "Head-on", "s+s"], "c": 1}, {"q": "ALL single bonds are:", "a": ["π bonds", "σ bonds", "Ionic", "Hydrogen bonds"], "c": 1}, {"q": "The first bond between two atoms is always:", "a": ["π", "σ", "Ionic", "Hydrogen"], "c": 1}, {"q": "Double bond =:", "a": ["2σ", "2π", "1σ + 1π", "1π + 1σ + 1π"], "c": 2}, {"q": "Triple bond =:", "a": ["3σ", "3π", "1σ + 2π", "2σ + 1π"], "c": 2}, {"q": "C₂H₄ total σ bonds:", "a": ["3", "4", "5", "6"], "c": 2}, {"q": "C₂H₄ total π bonds:", "a": ["0", "1", "2", "3"], "c": 1}, {"q": "Side-by-side p+p overlap makes:", "a": ["σ bond", "π bond", "Ionic bond", "No bond"], "c": 1}, {"q": "End-to-end p+p overlap makes:", "a": ["σ bond", "π bond", "Ionic bond", "Hybrid"], "c": 0}, {"q": "Hybridization only occurs in:", "a": ["Isolated atoms", "Covalently bonded atoms", "Ions only", "Noble gases"], "c": 1}, {"q": "# hybrid orbitals = # ___ combined:", "a": ["Electrons", "Protons", "Atomic orbitals", "Bonds"], "c": 2}, {"q": "Hybrid orbitals form ___ bonds:", "a": ["π", "σ", "Ionic", "Hydrogen"], "c": 1}, {"q": "Unhybridized p orbitals form ___ bonds:", "a": ["σ", "π", "Ionic", "No"], "c": 1}, {"q": "sp hybridization: mix ___ orbitals:", "a": ["1s + 1p", "1s + 2p", "1s + 3p", "1s + 3p + 1d"], "c": 0}, {"q": "sp gives ___ hybrid orbitals:", "a": ["2", "3", "4", "5"], "c": 0}, {"q": "sp geometry:", "a": ["Bent", "Trigonal planar", "Linear", "Tetrahedral"], "c": 2}, {"q": "sp bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 3}, {"q": "sp² gives ___ hybrid orbitals:", "a": ["2", "3", "4", "5"], "c": 1}, {"q": "sp² geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 1}, {"q": "sp² bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 2}, {"q": "sp³ gives ___ hybrid orbitals:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "sp³ geometry:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 2}, {"q": "sp³ bond angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 1}, {"q": "CH₄ carbon hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 2}, {"q": "CO₂ carbon hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 0}, {"q": "BF₃ boron hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 1}, {"q": "NH₃ nitrogen hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 2}, {"q": "H₂O oxygen hybridization:", "a": ["sp", "sp²", "sp³", "sp³d"], "c": 2}, {"q": "PCl₅ phosphorus hybridization:", "a": ["sp²", "sp³", "sp³d", "sp³d²"], "c": 2}, {"q": "SF₆ sulfur hybridization:", "a": ["sp³", "sp³d", "sp³d²", "sp⁴"], "c": 2}, {"q": "sp³d geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 1}, {"q": "sp³d² geometry:", "a": ["Tetrahedral", "Trigonal bipyramidal", "Octahedral", "Linear"], "c": 2}, {"q": "SeF₄ (5 regions) hybridization:", "a": ["sp²", "sp³", "sp³d", "sp³d²"], "c": 2}, {"q": "sp has ___ unhybridized p orbitals:", "a": ["0", "1", "2", "3"], "c": 2}, {"q": "sp² has ___ unhybridized p orbital(s):", "a": ["0", "1", "2", "3" uble > single because:", "a": ["Fewer electrons", "More electrons shared = stronger", "Less overlap", "Random"], "c": 1}, {"q": "Electronegativity difference determines bond:", "a": ["Length", "Type (ionic vs polar vs nonpolar covalent)", "Color", "State"], "c": 1}, {"q": "ΔEN = 0: bond is:", "a": ["Ionic", "Polar covalent", "Nonpolar covalent (pure)", "Metallic"], "c": 2}, {"q": "ΔEN < 0.5: bond is:", "a": ["Ionic", "Polar covalent", "Nonpolar covalent", "Metallic"], "c": 2}, {"q": "ΔEN 0.5-1.7: bond is:", "a": ["Ionic", "Polar covalent", "Nonpolar", "Metallic"], "c": 1}, {"q": "ΔEN > 1.7: bond is:", "a": ["Nonpolar", "Polar covalent", "Ionic", "Metallic"], "c": 2}, {"q": "In a polar bond, electrons are closer to the ___ atom:", "a": ["Less electronegative", "More electronegative", "Bigger", "Smaller"], "c": 1}, {"q": "A dipole moment exists when charge is:", "a": ["Symmetric", "Asymmetric (uneven distribution)", "Zero", "Equal"], "c": 1}, {"q": "Polar molecules have a net:", "a": ["Zero dipole", "Dipole moment", "No charge", "Equal charge"], "c": 1}, {"q": "CO₂ is nonpolar despite polar bonds because:", "a": ["Bonds cancel (linear, symmetric)", "It has no bonds", "It's ionic", "Bonds don't cancel"], "c": 0}, {"q": "H₂O is polar because:", "a": ["Linear shape", "Bent shape → dipoles don't cancel", "No lone pairs", "It's ionic"], "c": 1}, {"q": "VSEPR theory predicts molecular:", "a": ["Color", "Shape/geometry", "Mass", "Energy"], "c": 1}, {"q": "VSEPR stands for:", "a": ["Very Simple Electron Pair Repulsion", "Valence Shell Electron Pair Repulsion", "Volume Shape Energy Pair Repulsion", "None"], "c": 1}, {"q": "Electron pairs around central atom repel to get:", "a": ["Closer", "As far apart as possible", "Random positions", "In a line"], "c": 1}, {"q": "2 electron groups → ___ geometry:", "a": ["Bent", "Linear (180°)", "Trigonal planar", "Tetrahedral"], "c": 1}, {"q": "3 electron groups → ___ geometry:", "a": ["Linear", "Trigonal planar (120°)", "Tetrahedral", "Oct
