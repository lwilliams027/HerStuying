t. 1 in 100 lifetime; 21 million worldwide. Equal men/women but earlier onset in men (23) vs women (28). 25% attempt suicide; 5% die. More common in lower SES (downward drift theory). Significant financial and emotional costs."}, {"h": "Positive Symptoms", "x": "Bizarre additions: Delusions (persecution, reference, grandeur, control). Disorganized speech: loose associations/derailment, neologisms (made-up words), perseveration (repetition), clanging (rhyming). Hallucinations (auditory most common, also tactile, visual, gustatory). Inappropriate affect."}, {"h": "Negative & Psychomotor", "x": "Negative symptoms: deficits — flat affect, poverty of speech, social withdrawal, lack of motivation. Psychomotor: slow/awkward movements, odd gestures, catatonia. DSM-5 criteria: 2+ symptoms for 1 month (at least 1 must be delusions, hallucinations, or disorganized speech), impairment for 6+ months total."}], "q": [{"q": "Schizophrenia onset is earlier in:", "a": ["Women", "Men", "Equal", "Children"], "c": 1}, {"q": "Delusions of persecution involve:", "a": ["Believing you're famous", "Believing others plot against you", "Believing you control weather", "Believing you're God"], "c": 1}, {"q": "Neologisms are:", "a": ["Repeated words", "Made-up words", "Rhyming words", "Silent words"], "c": 1}, {"q": "Negative symptoms include:", "a": ["Hallucinations", "Delusions", "Flat affect and withdrawal", "Disorganized speech"], "c": 2}, {"q": "DSM-5 requires symptoms for ___ month(s):", "a": ["1", "3", "6", "12"], "c": 0}, {"q": "The downward drift theory suggests:", "a": ["Poverty causes schizophrenia", "Schizophrenia causes people to fall to lower SES", "Treatment moves people up", "Genetics drift over generations"], "c": 1}, {"q": "Most common type of hallucination:", "a": ["Visual", "Tactile", "Auditory", "Gustatory"], "c": 2}]}, {"t": "Lesson 15: Treating Schizophrenia", "ln": "PSY 309 · Ch 15", "s": [{"h": "Historical Treatment", "x": "1793: moral treatment with sympathy/kindness. By 1955: overcrowding → back wards, restraints, isolation. Social breakdown syndrome: extreme withdrawal, aggression, loss of function. Lobotomy (1935): destroyed brain tissue → seizures, paralysis, cognitive impairment. Ended with antipsychotic drug discovery."}, {"h": "Modern Approaches", "x": "Milieu therapy (Maxwell Jones): therapeutic community of respect, support, openness. Patients leave at higher rates than custodial care. Token economy: operant conditioning — tokens for acceptable behavior, exchangeable for rewards. Helps reduce psychotic behaviors, improves self-care. Limitations: uncontrolled studies, ethical concerns, real-world transfer issues."}, {"h": "Antipsychotic Drugs", "x": "Discovered 1950s from antihistamine research (phenothiazines). Only 40% receive adequate care. Today many reside in nursing homes/prisons with minimal mental health care. Combined with community programs for best outcomes."}], "q": [{"q": "Milieu therapy emphasizes:", "a": ["Medication only", "Therapeutic community and respect", "Isolation", "Punishment"], "c": 1}, {"q": "Token economies use:", "a": ["Psychodynamic theory", "Operant conditioning", "Dream analysis", "Humanistic therapy"], "c": 1}, {"q": "Lobotomy was replaced by:", "a": ["Patient protests", "Antipsychotic drugs", "Legal changes", "New surgical techniques"], "c": 1}, {"q": "Social breakdown syndrome includes:", "a": ["Improved functioning", "Extreme withdrawal and aggression", "Only depression", "Only anxiety"], "c": 1}, {"q": "Only ___% of schizophrenia patients get adequate care:", "a": ["10", "25", "40", "75"], "c": 2}, {"q": "Antipsychotics were discovered from:", "a": ["Antidepressant research", "Antihistamine research", "Pain medication", "Antibiotic research"], "c": 1}]}, {"t": "Lesson 16: Personality Disorders", "ln": "PSY 309 · Ch 16", "s": [{"h": "Overview", "x": "Enduring, rigid pattern of inner experience and behavior causing dysfunction in 2+ of: cognition, emotion, social interactions, impulsivity. Significantly different from cultural norms. ~15% US population. Comorbidity common. Among most difficult to treat. 10 PDs in 3 clusters."}, {"h": "Cluster A — Odd/Eccentric", "x": "Paranoid PD: deep distrust/suspicion, cold/distant, critical of others (~4.4%, more in men). Schizoid PD: social detachment, limited emotional expression. Schizotypal PD: peculiar thinking, odd behavior/speech. All related to schizophrenia spectrum. Few seek treatment."}, {"h": "Cluster B — Dramatic/Erratic", "x": "Antisocial PD: disregard for others' rights, deceit, impulsivity. Borderline PD: instability in relationships, self-image, emotions; intense fear of abandonment. Narcissistic PD: grandiosity, need for admiration, lack of empathy. Histrionic PD: excessive emotionality, attention-seeking."}, {"h": "Cluster C — Anxious/Fearful", "x": "Avoidant PD: social inhibition, feelings of inadequacy, hypersensitivity to criticism. Dependent PD: excessive need to be taken care of, submissive, fears separation. Obsessive-Compulsive PD: preoccupation with orderliness, perfectionism, control (different from OCD the anxiety disorder)."}], "q": [{"q": "Personality disorders have ___ clusters:", "a": ["2", "3", "4", "5"], "c": 1}, {"q": "Paranoid PD is in Cluster:", "a": ["A — Odd", "B — Dramatic", "C — Anxious", "None"], "c": 0}, {"q": "Borderline PD features:", "a": ["Deep suspicion", "Instability in relationships and emotions", "Excessive orderliness", "Social detachment"], "c": 1}, {"q": "PDs affect ~___% of US:", "a": ["5", "10", "15", "25"], "c": 2}, {"q": "Antisocial PD is in Cluster:", "a": ["A", "B", "C", "None"], "c": 1}, {"q": "OC Personality Disorder differs from OCD because it's a:", "a": ["Anxiety disorder", "Personality disorder", "Mood disorder", "Psychotic disorder"], "c": 1}, {"q": "Cluster C disorders are characterized by:", "a": ["Odd behavior", "Dramatic behavior", "Anxious/fearful behavior", "Psychotic behavior"], "c": 2}, {"q": "How many personality disorders does DSM-5 identify?", "a": ["5", "8", "10", "15"], "c": 2}]}, {"t": "Lesson 17: Childhood Disorders", "ln": "PSY 309 · Ch 17", "s": [{"h": "Overview", "x": "Children commonly experience worry, bed-wetting, nightmares, tantrums. Adolescence: physical/sexual changes, social/academic pressure cause anxiety/confusion/depression. 14-25% of children have anxiety disorders. Typically dominated by behavioral/somatic symptoms rather than cognitive."}, {"h": "Bullying", "x": "20% frequently bullied, 50%+ at least once. Effects: depression, suicidal thinking, anxiety, low self-esteem, substance use, school problems. Bullies tend to: antisocial behavior, poor school performance, drop out, bring weapons, use substances. Cyberbullying: 40-50% online at least once, 21% frequently; girls 50%+ more likely."}, {"h": "Specific Disorders", "x": "Separation anxiety: 4-10% of children, extreme anxiety/panic when separated from parent. Two-thirds go untreated. Selective mutism: fails to speak in certain situations but speaks fine in others, ~4%, often preschool onset, lasts 1+ months. Autism spectrum disorder and intellectual disability persist into adulthood."}], "q": [{"q": "Child anxiety disorder rate:", "a": ["5-10%", "14-25%", "30-40%", "50%+"], "c": 1}, {"q": "Cyberbullying more often targets:", "a": ["Boys", "Girls", "Equal", "Only teens"], "c": 1}, {"q": "Selective mutism means:", "a": ["Never speaking", "Speaking in some situations only", "Only whispering", "Speaking only at home"], "c": 1}, {"q": "Separation anxiety affects ___% of children:", "a": ["1-2", "4-10", "15-20", "25-30"], "c": 1}, {"q": "___% of bullying victims report being bullied frequently:", "a": ["5", "10", "20", "50"], "c": 2}, {"q": "Childhood anxiety is dominated by ___ symptoms:", "a": ["Cognitive", "Behavioral and somatic", "Only emotional", "No symptoms"], "c": 1}, {"q": "Two-thirds of anxious children:", "a": ["Get treatment", "Go untreated", "Are hospitalized", "Recover spontaneously"], "c": 1}]}, {"t": "Lesson 18: Aging & Cognition", "ln": "PSY 309 · Ch 18", "s": [{"h": "Old Age & Mental Health", "x": "65+ = old age. ~46 million in US (14.5%). Older women outnumber men 3:2. Up to 50% would benefit from mental health services; fewer than 20% receive them. Geropsychology: field dedicated to elderly mental health."}, {"h": "Common Disorders", "x": "Depression: 20% in old age, highest in women, raises medical risk. Antidepressants riskier (metabolism changes, cognitive impairment risk). Anxiety: ~11% at any time, GAD most common (~7%), increases with age. Substance misuse: declines after 60 but Rx drug misuse is leading concern; 17% of new nursing home patients get antipsychotics within 100 days."}, {"h": "Psychotic & Cognitive Disorders", "x": "Psychotic symptoms more common but usually from medical conditions. Schizophrenia less common, often lessens in later life. Delusional disorder: false but non-bizarre beliefs, increases in elderly (possibly from hearing loss, isolation, stress). Cognitive disorders: delirium (acute, usually temporary), major neurocognitive disorder/dementia (progressive, significant decline)."}], "q": [{"q": "Geropsychology focuses on:", "a": ["Children", "Adolescents", "Elderly mental health", "Forensics"], "c": 2}, {"q": "___% of elderly benefit from mental health services:", "a": ["10", "25", "50", "75"], "c": 2}, {"q": "Most common anxiety disorder in elderly:", "a": ["Panic disorder", "PTSD", "GAD", "Social anxiety"], "c": 2}, {"q": "Delirium is typically:", "a": ["Progressive and permanent", "Acute and usually temporary", "Only in children", "Untreatable"], "c": 1}, {"q": "Fewer than ___% of elderly receive mental health services:", "a": ["10", "20", "40", "60"], "c": 1}, {"q": "Substance misuse in elderly often involves:", "a": ["Illegal drugs", "Prescription drug misuse", "Alcohol only", "No substance issues"], "c": 1}, {"q": "Delusional disorder in elderly may relate to:", "a": ["Improved hearing", "Hearing loss and isolation", "Better social life", "Youth"], "c": 1}]}]}};

      h+="<span style='color:var(--accent);font-size:18px'>\u2192</span></div>";
    }
    el.innerHTML=h;return;
  }

  // Study screen
  mt.innerHTML=selT.t;ms.textContent="";
  var nh="<div style='display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap'>";
  nh+="<button class='bbtn' onclick=\"scr='topics';render()\">\u2190 "+D[selC].name+"</button>";
  nh+="<button class='pill "+(tab==="study"?"pill-a":"pill-i")+"' onclick=\"tab='study';render()\">\uD83D\uDCD6 Study</button>";
  nh+="<button class='pill "+(tab==="practice"?"pill-a":"pill-i")+"' onclick=\"tab='practice';rq();render()\">\u270F\uFE0F Practice</button>";
  nh+="<button class='pill "+(tab==="test"?"pill-a":"pill-i")+"' onclick=\"tab='test';rq();render()\">\uD83D\uDCDD Test</button>";
  nh+="</div><div style='margin-top:8px'><span class='ln' style='font-size:12px'>"+selT.ln+"</span></div>";
  nav.innerHTML=nh;

  if(tab==="study"){
    var h="";
    for(var i=0;i<selT.s.length;i++){
      var sec=selT.s[i],e=(expS===i);
      h+="<div class='card "+(e?"exp":"")+"' onclick='expS=(expS==="+i+"?null:"+i+");render()' style='animation:slideIn .35s ease "+(i*.06)+"s both'>";
      h+="<div style='display:flex;align-items:center;justify-content:space-between'>";
      h+="<span style='font-size:16px;font-weight:700;"+(e?"color:var(--hi)":"")+"'>"+sec.h+"</span>";
      h+="<span class='arrow'>\u25BC</span></div>";
      if(e){h+="<div style='margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr)'><div class='st'>"+sec.x+"</div></div>";}
      h+="</div>";
    }
    el.innerHTML=h;return;
  }

  if(tab==="practice"){
    if(pS.cq>=shuf.length){
      var p=shuf.length?Math.round(pS.sc/shuf.length*100):0;
      var em=p>=80?"\uD83C\uDFC6":p>=60?"\uD83D\uDC4D":"\uD83D\uDCDA";
      var msg=p>=90?"Amazing, Anhelina! \uD83C\uDF1F":p>=70?"Great job!":"Keep reviewing!";
      el.innerHTML="<div style='background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:40px 28px;text-align:center;animation:fadeUp .5s ease'><div style='font-size:48px;margin-bottom:12px'>"+em+"</div><div style='font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent'>"+pS.sc+"/"+shuf.length+"</div><p style='color:var(--txd);font-size:16px;margin:8px 0 24px'>"+msg+"</p><button class='abtn' onclick='rq();render()'>Try Again</button></div>";
      return;
    }
    var qq=shuf[pS.cq];
    var h="<div style='background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:32px 28px;animation:fadeUp .4s ease'>";
    h+="<div style='display:flex;justify-content:space-between;margin-bottom:20px'><span style='font-size:13px;color:var(--txd);font-weight:600'>Question "+(pS.cq+1)+"/"+shuf.length+"</span></div>";
    h+="<div class='pbar'><div class='pfill' style='width:"+(pS.cq/shuf.length*100)+"%'></div></div>";
    h+="<div style='font-size:18px;font-weight:700;margin-bottom:22px;line-height:1.45'>"+qq.q+"</div>";
    for(var i=0;i<qq.a.length;i++){
      var cl="opt",ci=String.fromCharCode(65+i);
      if(pS.sh){cl+=" done";if(i===qq.c){cl+=" ok";ci="\u2713";}else if(i===pS.sel){cl+=" no";ci="\u2717";}}
      h+="<button class='"+cl+"' onclick='pAns("+i+")'><span class='circ'>"+ci+"</span>"+qq.a[i]+"</button>";
    }
    if(pS.sh){
      var col=pS.sel===qq.c?"var(--ok)":"var(--err)";
      var txt=pS.sel===qq.c?"Correct! \uD83C\uDF89":"Not quite.";
      var nxt=pS.cq+1<shuf.length?"Next \u2192":"Results";
      h+="<div style='margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px'>";
      h+="<span style='font-size:14px;font-weight:600;color:"+col+"'>"+txt+"</span>";
      h+="<button class='abtn' style='padding:10px 22px;font-size:14px' onclick='pS.cq++;pS.sel=null;pS.sh=false;render()'>"+nxt+"</button></div>";
    }
    h+="</div>";
    h+="<div style='margin-top:16px;display:flex;justify-content:center;gap:24px;font-size:14px;color:var(--txd)'><span>\u2705 "+pS.sc+"</span><span>\u274C "+(pS.an-pS.sc)+"</span></div>";
    el.innerHTML=h;return;
  }

  // Test tab
  if(tS.sub){
    var p=shuf.length?Math.round(tS.sc/shuf.length*100):0;
    var em=p>=90?"\uD83C\uDFC6":p>=70?"\uD83C\uDF1F":"\uD83D\uDCDA";
    var msg=p>=90?"You crushed it Anhelina! \uD83D\uDC9C":p>=70?"Solid work!":"Review below!";
    var w="";
    for(var i=0;i<shuf.length;i++){
      if(tS.a[i]!==shuf[i].c){
        w+="<div class='rw'><div style='font-size:14px;font-weight:600;margin-bottom:10px'>"+shuf[i].q+"</div>";
        w+="<div style='font-size:13px;color:var(--err);margin-bottom:4px'>Yours: "+(tS.a[i]!=null?shuf[i].a[tS.a[i]]:"None")+"</div>";
        w+="<div style='font-size:13px;color:var(--ok)'>Correct: "+shuf[i].a[shuf[i].c]+"</div></div>";
      }
    }
    el.innerHTML="<div style='background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:40px 28px;text-align:center;animation:fadeUp .5s ease;margin-bottom:28px'><div style='font-size:52px;margin-bottom:8px'>"+em+"</div><div style='font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent'>"+p+"%</div><p style='font-size:18px;color:var(--txd);margin:4px 0'>"+tS.sc+"/"+shuf.length+"</p><p style='color:var(--txd);font-size:14px;margin:8px 0 20px'>"+msg+"</p><button class='abtn' onclick='rq();render()'>Retake</button></div>"+w;
    return;
  }
  var ac=Object.keys(tS.a).length;
  var h="<div style='background:rgba(155,89,255,.07);border:1px solid rgba(155,89,255,.2);border-radius:14px;padding:16px 20px;margin-bottom:24px;font-size:14px;color:var(--glow);text-align:center'>Answer all "+shuf.length+" questions then submit.<br><small style='color:var(--txd)'>Answered: "+ac+"/"+shuf.length+"</small></div>";
  for(var qi=0;qi<shuf.length;qi++){
    var qq=shuf[qi];
    h+="<div style='background:var(--card);border:1px solid "+(tS.a[qi]!=null?"rgba(155,89,255,.27)":"var(--bdr)")+";border-radius:16px;padding:22px 24px;margin-bottom:14px'>";
    h+="<div style='font-size:13px;font-weight:700;color:var(--txd);margin-bottom:12px'>#"+(qi+1)+"</div>";
    h+="<div style='font-size:15px;font-weight:600;margin-bottom:14px;line-height:1.45'>"+qq.q+"</div>";
    for(var oi=0;oi<qq.a.length;oi++){
      var sel=tS.a[qi]===oi;
      h+="<button class='opt "+(sel?"ok":"")+"' style='font-size:14px;padding:11px 16px;border-radius:10px' onclick='tAns("+qi+","+oi+")'>";
      h+="<span class='circ' style='width:24px;height:24px;font-size:12px;"+(sel?"background:var(--accent);color:#fff":"")+"'>"+String.fromCharCode(65+oi)+"</span>";
      h+=qq.a[oi]+"</button>";
    }
    h+="</div>";
  }
  h+="<div style='text-align:center;padding:20px 0'><button class='abtn' style='padding:14px 48px;font-size:16px;border-radius:14px' "+(ac<shuf.length?"disabled":"")+" onclick='subT()'>Submit Test</button></div>";
  el.innerHTML=h;
}

function pAns(i){if(pS.sh)return;pS.sel=i;pS.sh=true;pS.an++;if(i===shuf[pS.cq].c)pS.sc++;render();}
function tAns(qi,oi){if(tS.sub)return;tS.a[qi]=oi;render();}
function subT(){var s=0;for(var i=0;i<shuf.length;i++){if(tS.a[i]===shuf[i].c)s++;}tS.sc=s;tS.sub=true;render();scrollTo({top:0,behavior:"smooth"});}

render();
</script>
</body>
</html>
