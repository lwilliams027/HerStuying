3+ times per week</b> in <b>2+ settings</b> for at least <b>1 year</b>. Irritable/angry mood between outbursts. Initial diagnosis between <b>ages 6-18</b>. Addresses concern that too many explosive children were getting bipolar diagnosis and adult medications."}, {"heading": "Oppositional Defiant Disorder (ODD)", "body": "Children are repeatedly <b>argumentative, defiant, angry, irritable</b>, and sometimes vindictive. Argue with adults, lose temper, ignore rules, try to annoy others, blame others for mistakes. Less severe than conduct disorder but can be a precursor."}, {"heading": "Conduct Disorder", "body": "More severe: children repeatedly <b>violate others' basic rights</b>. Often aggressive, physically cruel to people/animals. Many steal, threaten, harm victims. Begins between <b>ages 7-15</b>. Up to <b>10%</b> of children; <b>3/4 are boys</b>. Four patterns: overt-destructive, overt-nondestructive, covert-destructive, covert-nondestructive. <b>Relational aggression</b> (slander, rumors, friendship manipulation) more common in girls."}, {"heading": "Conduct Disorder — Causes & Treatment", "body": "Linked to: genetics, drug abuse, poverty, trauma, violent peers/community, troubled parent-child relationships, family conflict. Treatments most effective <b>before age 13</b>. <b>Sociocultural:</b> parent-child interaction therapy, parent management training, residential/community programs. <b>Child-focused:</b> CBT, problem-solving skills training, Coping Power Program. <b>Prevention:</b> early childhood programs involving family."}, {"heading": "Elimination Disorders", "body": "<b>Enuresis:</b> repeated involuntary bed-wetting/clothes-wetting. Must be 5+ years old. Typically occurs at night. May be triggered by stress. Most cases self-correct. <b>Encopresis:</b> soiling/defecation into clothing. Less common, less researched. Usually involuntary, seldom during sleep. After age 4. More common in boys."}, {"heading": "ADHD — Overview", "body": "<b>Attention-Deficit/Hyperactivity Disorder:</b> great difficulty attending to tasks, overactive/impulsive behavior, or both. Affects ~<b>5%</b> of children; more males. About half also have: learning/communication problems, poor school performance, difficulty with peers, misbehavior, mood/anxiety problems. <b>80%</b> receive treatment."}, {"heading": "ADHD — Causes & Treatment", "body": "Causes: <b>abnormal dopamine activity</b>, abnormalities in <b>frontal-striatal brain regions</b>, high stress, family dysfunction. Treatment debate is heated. Most common: <b>methylphenidate (Ritalin)</b> — a stimulant drug. ~2.2 million US children take Ritalin or similar stimulants. <b>Behavioral therapy:</b> operant conditioning by parents/teachers. <b>Combination</b> (drugs + behavioral) is most effective."}, {"heading": "ADHD — Racial Disparities", "body": "African American and Hispanic American children with ADHD symptoms are <b>less likely</b> than white children to be assessed, diagnosed, or treated. Those who are diagnosed are less likely to receive the most helpful interventions (e.g., long-acting stimulants). Racial differences partly tied to <b>economic factors</b>."}, {"heading": "Autism Spectrum Disorder — Overview", "body": "First identified in <b>1943</b>. Extremely unresponsive to others, uncommunicative, repetitive, rigid. Symptoms appear <b>before age 3</b>. ~<b>80% are boys</b>. Prevalence has risen dramatically: now ~1 in 50 children. ~<b>90%</b> remain significantly disabled into adulthood. Even highest-functioning adults have social/communication problems and restricted interests."}, {"heading": "Autism — Symptoms", "body": "<b>Lack of social responsiveness and reciprocity.</b> Language/communication problems: <b>echolalia</b> (exact echoing of phrases), <b>pronominal reversal</b> (pronoun confusion). Fail to develop <b>theory of mind</b> — awareness that others have their own beliefs and intentions. Deficiencies in <b>joint attention</b>. Repetitive behaviors, insistence on sameness."}, {"heading": "Autism — Causes", "body": "<b>Sociocultural:</b> family dysfunction theory NOT supported by research. <b>Psychological:</b> central perceptual/cognitive disturbance (failure to develop theory of mind). <b>Biological:</b> genetic factors (higher in siblings, highest in MZ twins), abnormalities in <b>cerebellum</b>. <b>MMR vaccine theory has been thoroughly debunked</b> — original study was retracted as flawed."}, {"heading": "Autism — Treatment", "body": "No treatment totally reverses the pattern, but can help adaptation. <b>CBT:</b> modeling + operant conditioning to teach speech, social skills, self-help. Best when <b>started early</b>. <b>Communication training:</b> sign language, augmentative systems (picture boards, computers). <b>Parent training:</b> parents apply behavioral techniques at home. <b>Community integration:</b> group homes, sheltered workshops, self-management skills."}, {"heading": "Intellectual Disability — Overview", "body": "<b>IQ 70 or below</b> + difficulty in communication, home living, self-direction, work, safety. Symptoms must appear <b>before age 18</b>. Affects <b>1-3%</b> of population; more males. Learn very slowly; difficulties with attention, short-term memory, planning, language. Four levels: <b>Mild</b> (50-70, 80-85%), <b>Moderate</b> (35-49, 10%), <b>Severe</b> (20-34, 3-4%), <b>Profound</b> (<20, 1-2%)."}, {"heading": "Intellectual Disability — Causes", "body": "<b>Mild:</b> mostly sociocultural/psychological (poor environment, inadequate parenting, insufficient learning). <b>Moderate-Profound:</b> primarily biological. <b>Chromosomal:</b> Down syndrome (trisomy 21, risk increases with maternal age >35), Fragile X syndrome. <b>Metabolic:</b> PKU, Tay-Sachs. <b>Prenatal:</b> fetal alcohol syndrome, maternal infections (rubella). <b>Birth:</b> anoxia. <b>Childhood:</b> lead poisoning, head injury, meningitis."}, {"heading": "Intellectual Disability — Interventions", "body": "Quality of life depends on sociocultural factors. <b>Deinstitutionalization</b> led to community residences, small institutions. Most now live at home or in community. <b>Education:</b> special education vs <b>mainstreaming (inclusion)</b> — neither consistently superior. Operant conditioning, token economies used. <b>30%+</b> have a comorbid psychological disorder. Need opportunities for socializing, employment (sheltered workshops), family planning."}, {"heading": "Comparison Table", "body": "<b>Separation anxiety:</b> before 12, 4-10%, F>M, usually recovers. <b>Conduct disorder:</b> 7-15, 1-10%, M>F, often recovers. <b>ADHD:</b> before 12, 5%, M>F, often recovers. <b>Enuresis:</b> 5-8, 5%, M>F, usually recovers. <b>Autism:</b> 0-3, 1.6%, M>F, sometimes recovers. <b>Intellectual disability:</b> before 10, 1-3%, M>F, sometimes recovers."}, {"heading": "Key Concepts Summary", "body": "<b>Bullying:</b> 20% frequent, cyberbullying 40-50%. <b>Anxiety:</b> 14-25%, 2/3 untreated, play therapy. <b>Depression:</b> 2% children, 9% teens. <b>DMDD:</b> new DSM-5 for explosive children. <b>Conduct disorder:</b> 10%, 3/4 boys, before age 13 treatment best. <b>ADHD:</b> 5%, dopamine, Ritalin + behavioral combo. <b>Autism:</b> 1 in 50, before 3, 80% boys, no theory of mind, early CBT. <b>Intellectual disability:</b> IQ≤70, 4 levels, Down syndrome, mainstreaming vs special ed."}], "quiz": [{"q": "___% of students report being bullied frequently:", "a": ["5", "10", "20", "40"], "c": 2}, {"q": "Cyberbullying: ___% bullied online at least once:", "a": ["10", "20", "40-50", "80"], "c": 2}, {"q": "Girls are ___% more likely to be cyberbullied regularly:", "a": ["10", "25", "50+", "80"], "c": 2}, {"q": "___% of children/adolescents have an anxiety disorder:", "a": ["5-10", "14-25", "30-40", "50+"], "c": 1}, {"q": "Childhood anxiety is dominated by ___ symptoms:", "a": ["Cognitive", "Behavioral and somatic", "Only emotional", "Only physical"], "c": 1}, {"q": "___/3 of anxious children go untreated:", "a": ["1", "2", "All", "None"], "c": 1}, {"q": "Separation anxiety affects ___% of children:", "a": ["1-2", "4-10", "15-20", "25-30"], "c": 1}, {"q": "Selective mutism: children fail to speak in:", "a": ["All situations", "Certain social situations", "Only at home", "Only at school"], "c": 1}, {"q": "Selective mutism affects at least ___% of children:", "a": ["1", "2", "4", "10"], "c": 2}, {"q": "Play therapy uses:", "a": ["Medication", "Toys, drawing, stories", "Brain scans", "Only conversation"], "c": 1}, {"q": "___% of adolescents currently have major depression:", "a": ["2", "5", "9", "20"], "c": 2}, {"q": "___% of children currently have major depression:", "a": ["2", "5", "9", "15"], "c": 0}, {"q": "Childhood depression symptoms include:", "a": ["Only sadness", "Headaches, stomach pain, irritability", "Only crying", "Only withdrawal"], "c": 1}, {"q": "DMDD was created because ___ was overapplied to children:", "a": ["ADHD", "Conduct disorder", "Bipolar diagnosis", "Depression"], "c": 2}, {"q": "DMDD outbursts must occur at least ___ times per week:", "a": ["1", "2", "3", "5"], "c": 2}, {"q": "DMDD initial diagnosis between ages:", "a": ["2-5", "6-18", "18-25", "Any age"], "c": 1}, {"q": "ODD children are repeatedly:", "a": ["Quiet", "Argumentative, defiant, angry", "Happy", "Withdrawn"], "c": 1}, {"q": "Conduct disorder: children violate others':", "a": ["Privacy only", "Basic rights", "Property only", "Nothing"], "c": 1}, {"q": "Conduct disorder affects up to ___% of children:", "a": ["1", "5", "10", "20"], "c": 2}, {"q": "___/4 of conduct disorder cases are boys:", "a": ["1", "2", "3", "All"], "c": 2}, {"q": "Relational aggression is more common in:", "a": ["Boys", "Girls", "Equal", "Neither"], "c": 1}, {"q": "Conduct disorder treatment most effective before age:", "a": ["5", "10", "13", "18"], "c": 2}, {"q": "Enuresis is:", "a": ["Soiling", "Bed-wetting", "Anxiety", "Depression"], "c": 1}, {"q": "Enuresis diagnosis requires age at least:", "a": ["2", "3", "5", "7"], "c": 2}, {"q": "Encopresis is:", "a": ["Bed-wetting", "Soiling/defecation into clothing", "Anxiety", "Selective mutism"], "c": 1}, {"q": "ADHD affects ~___% of children:", "a": ["1", "3", "5", "10"], "c": 2}, {"q": "ADHD involves abnormal ___ activity:", "a": ["Serotonin", "Dopamine", "GABA", "Norepinephrine only"], "c": 1}, {"q": "ADHD brain abnormalities are in ___ regions:", "a": ["Occipital", "Frontal-striatal", "Temporal only", "Cerebellum only"], "c": 1}, {"q": "Ritalin (methylphenidate) is a:", "a": ["Sedative", "Stimulant", "Antipsychotic", "Antidepressant"], "c": 1}, {"q": "~___ million US children take stimulants for ADHD:", "a": ["0.5", "1.0", "2.2", "5.0"], "c": 2}, {"q": "Most effective ADHD treatment:", "a": ["Drugs alone", "Behavioral alone", "Combination of drugs + behavioral", "No treatment"], "c": 2}, {"q": "Minority children with ADHD are ___ likely to be diagnosed:", "a": ["More", "Less", "Equally", "Always"], "c": 1}, {"q": "Autism spectrum disorder symptoms appear before age:", "a": ["1", "3", "5", "10"], "c": 1}, {"q": "Autism: ~___% are boys:", "a": ["50", "60", "70", "80"], "c": 3}, {"q": "Current autism prevalence is ~1 in:", "a": ["200", "100", "50", "20"], "c": 2}, {"q": "___% of autistic children remain disabled into adulthood:", "a": ["50", "70", "80", "90"], "c": 3}, {"q": "Echolalia means:", "a": ["Making up words", "Exact echoing of others' phrases", "Refusing to speak", "Speaking too fast"], "c": 1}, {"q": "Theory of mind is awareness that others have their own:", "a": ["Bodies", "Beliefs and intentions", "Money", "Nothing"], "c": 1}, {"q": "The MMR vaccine-autism theory was:", "a": ["Confirmed", "Debunked (retracted as flawed)", "Partially true", "Never studied"], "c": 1}, {"q": "Autism treatment is best when started:", "a": ["In adulthood", "In adolescence", "Early in childhood", "After age 18"], "c": 2}, {"q": "Intellectual disability requires IQ of ___ or below:", "a": ["50", "60", "70", "80"], "c": 2}, {"q": "ID symptoms must appear before age:", "a": ["10", "14", "18", "21"], "c": 2}, {"q": "Mild ID (IQ 50-70) accounts for ___% of all ID:", "a": ["50", "65", "80-85", "95"], "c": 2}, {"q": "Most common chromosomal cause of ID:", "a": ["Fragile X", "Down syndrome (trisomy 21)", "Turner syndrome", "Klinefelter"], "c": 1}, {"q": "Down syndrome risk increases with maternal age over:", "a": ["25", "30", "35", "40"], "c": 2}, {"q": "Fetal alcohol syndrome is caused by:", "a": ["Maternal smoking", "Maternal alcohol use during pregnancy", "Paternal alcohol", "Nothing"], "c": 1}, {"q": "PKU is a ___ cause of ID:", "a": ["Chromosomal", "Metabolic", "Prenatal infection", "Birth trauma"], "c": 1}, {"q": "Mainstreaming/inclusion means placing children in:", "a": ["Institutions", "Special schools only", "Regular classes", "Hospitals"], "c": 2}, {"q": "___% of people with ID have a comorbid psychological disorder:", "a": ["5", "10", "30+", "50"], "c": 2}, {"q": "The Coping Power Program targets:", "a": ["Depression", "Anger management in conduct disorder", "ADHD", "Autism"], "c": 1}]}, {"id": "psy-ch18", "title": "Chapter 18: Disorders of Aging & Cognition", "ln": "PSY 309 · Ch 18", "notes": [{"heading": "Old Age & Stress — Overview", "body": "Old age = past age <b>65</b>. ~46 million Americans (14.5% and growing). Older women outnumber men <b>3:2</b>. Old age brings special pressures, unique upsets, profound biological changes. Up to <b>50%</b> of elderly would benefit from mental health services, but <b>fewer than 20%</b> receive them. <b>Geropsychology:</b> field dedicated to elderly mental health."}, {"heading": "Two Groups of Elderly Disorders", "body": "<b>1) Disorders common at all ages</b> but connected to aging: depressive, anxiety, and substance use disorders. <b>2) Disorders of cognition</b> from brain abnormalities: delirium, mild neurocognitive disorder, and major neurocognitive disorder (formerly dementia). The second group is especially feared and publicized."}, {"heading": "Depression in Later Life", "body": "One of the <b>most common</b> mental health problems of older adults. Up to <b>20%</b> experience it during old age. Highest rate in older women. Depression raises chances of developing <b>significant medical problems</b>. Elderly more likely to <b>commit suicide</b> (often related to depression). Treatments: CBT, IPT, antidepressants, combinations. >50% improve. Caution: antidepressants can cause <b>cognitive impairment</b> in elderly due to altered metabolism."}, {"heading": "Anxiety in Later Life", "body": "~<b>11%</b> of elderly experience an anxiety disorder. <b>GAD</b> is most common (~7% of elderly). Prevalence <b>increases throughout old age</b>. Declining health heightens anxiety. Treatment: CBT (most common), antianxiety medications (must be used <b>cautiously</b> in elderly — altered drug metabolism, fall risk)."}, {"heading": "Substance Misuse in Later Life", "body": "Prevalence of abuse appears to <b>decline after age 60</b>, but data are hard to obtain — many don't admit the problem. <b>3-7%</b> of older people (particularly men) have alcohol-related disorders. Two types: <b>long-term problem drinkers</b> vs those who <b>start in their 50s-60s</b> (reaction to aging pressures). <b>Prescription drug misuse</b> is a leading problem — often unintentional. 17% of new nursing home patients get antipsychotic drugs within 100 days."}, {"heading": "Psychotic Disorders in Later Life", "body": "Elderly have <b>higher rate of psychotic symptoms</b>, usually due to delirium or dementia. Schizophrenia is <b>less common</b> in elderly — symptoms often lessen with age, new cases rarely emerge. <b>Delusional disorder</b> (false but non-bizarre beliefs) is rare overall but <b>increases in elderly</b> — possibly linked to hearing deficiencies, social isolation, greater stress, poverty."}, {"heading": "Delirium", "body": "A <b>clouding of consciousness</b> — difficulty concentrating, focusing attention, thinking sequentially. Leads to misinterpretations, illusions, sometimes hallucinations. Develops over <b>short period (hours/days)</b>. Most common in elderly: <0.5% non-elderly, 1% over 55, <b>14% over 85</b>. Causes: fever, infections, poor nutrition, head injuries, strokes, stress (surgery), intoxication. Usually <b>reversible</b>."}, {"heading": "Neurocognitive Disorders — Overview", "body": "Significant decline in 1+ cognitive areas: memory, attention, visual perception, planning, language, social awareness. May include personality/behavior changes. <b>Major neurocognitive disorder:</b> substantial decline, interferes with <b>independence</b>. <b>Mild neurocognitive disorder:</b> modest decline, independence <b>preserved</b>. Prevalence: 1-2% at age 65; up to <b>50% over age 85</b>."}, {"heading": "Alzheimer's Disease — Overview", "body": "Most common form of neurocognitive disorder — accounts for <b>2/3 of all cases</b>. Identified in <b>1907</b>. ~<b>5 million</b> Americans affected. Usually appears after 65 (late onset); sometimes in middle age (early onset). Gradually progressive. Time from onset to death: <b>8-10 years</b> (some survive 20). Prevalence increases markedly in late 70s-80s."}, {"heading": "Alzheimer's — Progression", "body": "<b>Early:</b> mild memory problems, lapses of attention, language difficulties. <b>Middle:</b> trouble completing complicated tasks, forgetting appointments. <b>Late:</b> difficulty with simple tasks, distant memories lost, personality changes, loss of awareness of limitations. <b>Final:</b> fully dependent, lose almost all past knowledge, fail to recognize close relatives. General health usually remains good until later stages."}, {"heading": "Alzheimer's — Brain Changes", "body": "Diagnosed with certainty <b>only after death</b> (brain examination). Two hallmark changes: <b>Senile plaques:</b> sphere-shaped deposits of <b>beta-amyloid protein</b> in hippocampus, cerebral cortex, and blood vessels. <b>Neurofibrillary tangles:</b> twisted <b>tau protein</b> fibers within cells of the hippocampus. Both disrupt normal brain cell communication and function."}, {"heading": "Alzheimer's — Genetic Causes", "body": "<b>Early-onset (familial):</b> mutations in specific genes increase plaque/tangle formations. Some families transmit these mutations. <b>Late-onset (sporadic):</b> results from combination of <b>genetic + environmental + lifestyle</b> factors. Different genes involved than in early-onset. Multiple genetic causes may trigger tangles — some genes promote beta-amyloid/plaques, others promote tau/tangles."}, {"heading": "Alzheimer's — Brain Structure & Memory", "body": "Two memory systems: <b>Short-term (working) memory</b> gathers new info → must be <b>consolidated</b> into <b>long-term memory</b>. <b>Retrieval</b> = accessing long-term memory. Key brain structures: <b>prefrontal lobes</b> (hold info temporarily), <b>temporal lobes and diencephalon</b> (transform short-term → long-term). Damage to these areas → neurocognitive disorder."}, {"heading": "Alzheimer's — Other Theories", "body": "<b>Biochemical:</b> disrupted chemical activity → improper protein production → memory formation interrupted. <b>Toxins:</b> zinc, lead may produce brain toxicity. <b>Autoimmune:</b> aging brain cell changes may trigger autoimmune response. <b>Viral:</b> resemblance to Creutzfeldt-Jakob disease suggests possible viral cause — but no virus detected yet. <b>Biomarkers:</b> biochemical/molecular/genetic/structural characteristics being developed for early detection."}, {"heading": "Other Neurocognitive Disorders", "body": "<b>Vascular neurocognitive disorder:</b> follows stroke — sudden onset, progressive, cognition may be normal in unaffected brain areas. <b>Pick's disease (frontotemporal):</b> rare, affects frontal/temporal lobes. <b>Creutzfeldt-Jakob:</b> caused by prion (slow-acting virus), body spasms. <b>Huntington's:</b> inherited, progressive memory + personality + movement. <b>Parkinson's:</b> tremors, rigidity, can cause dementia. Also: HIV/AIDS, meningitis, syphilis, seizures, drug abuse."}, {"heading": "Treatments for Alzheimer's", "body": "At best <b>modestly helpful</b>. <b>Drugs:</b> affect <b>acetylcholine and glutamate</b> (NTs important for memory). Benefits limited, side effect risks. FDA-approved but not curative. Vitamin E may slow decline modestly. NSAIDs (Naprosyn, ibuprofen) may reduce risk — mixed results. <b>CBT:</b> behavior-focused interventions more useful than cognitive ones. <b>Physical exercise</b> often included."}, {"heading": "Caregiving & Sociocultural Approaches", "body": "~<b>90%</b> of dementia patients cared for by relatives. Caregiving takes a heavy toll — overwhelmed caregivers is the most frequent reason for institutionalization. <b>Day-care and assisted-living facilities</b> help slow cognitive decline and enhance enjoyment. These sociocultural approaches are playing an increasingly important role."}, {"heading": "Issues: Minority Elderly & Long-Term Care", "body": "Being old + minority = <b>'double jeopardy.'</b> Older minority women = <b>'triple jeopardy.'</b> Language barriers and cultural issues → rely on family for health care. <b>Long-term care:</b> ranges from supervised apartments to nursing homes. Quality varies widely. Worry about being 'put away' and costs → depression, anxiety, family conflict. <b>Wellness approach:</b> good physical/psychological health throughout life → better adaptation to aging."}, {"heading": "Key Concepts Summary", "body": "<b>Geropsychology:</b> elderly mental health. <b>Depression:</b> 20% of elderly, suicide risk, antidepressant caution. <b>Anxiety:</b> 11%, GAD most common. <b>Substance:</b> 3-7% alcohol, prescription misuse. <b>Delirium:</b> clouding of consciousness, hours/days, 14% over 85, reversible. <b>Neurocognitive:</b> major (impairs independence) vs mild. <b>Alzheimer's:</b> 2/3 of cases, plaques (beta-amyloid) + tangles (tau), 8-10 years, acetylcholine/glutamate drugs. <b>Other:</b> vascular, Pick's, CJD, Huntington's, Parkinson's."}], "quiz": [{"q": "Old age is typically defined as past age:", "a": ["55", "60", "65", "70"], "c": 2}, {"q": "~___% of elderly would benefit from mental health services:", "a": ["10", "25", "50", "75"], "c": 2}, {"q": "Fewer than ___% actually receive mental health services:", "a": ["5", "10", "20", "40"], "c": 2}, {"q": "Geropsychology is dedicated to mental health of:", "a": ["Children", "Adolescents", "Elderly people", "All ages"], "c": 2}, {"q": "Older women outnumber older men:", "a": ["1:1", "2:1", "3:2", "5:1"], "c": 2}, {"q": "Up to ___% of people experience depression during old age:", "a": ["5", "10", "20", "40"], "c": 2}, {"q": "Depression in elderly raises risk of:", "a": ["Better health", "Significant medical problems", "Weight loss only", "Nothing"], "c": 1}, {"q": "Antidepressants in elderly can cause:", "a": ["Better cognition", "Cognitive impairment", "No side effects", "Improved memory"], "c": 1}, {"q": "~___% of elderly have an anxiety disorder:", "a": ["5", "11", "20", "30"], "c": 1}, {"q": "Most common anxiety disorder in elderly:", "a": ["Panic disorder", "Social anxiety", "GAD", "OCD"], "c": 2}, {"q": "GAD affects up to ___% of elderly:", "a": ["2", "5", "7", "15"], "c": 2}, {"q": "Substance abuse prevalence ___ after age 60:", "a": ["Increases sharply", "Stays the same", "Appears to decline", "Doubles"], "c": 2}, {"q": "___% of older people have alcohol-related disorders:", "a": ["1-2", "3-7", "10-15", "20-25"], "c": 1}, {"q": "Leading substance abuse problem in elderly:", "a": ["Alcohol only", "Prescription drug misuse", "Illegal drugs", "Cannabis"], "c": 1}, {"q": "___% of new nursing home patients get antipsychotics within 100 days:", "a": ["5", "10", "17", "30"], "c": 2}, {"q": "Delusional disorder in elderly may be linked to:", "a": ["Better hearing", "Hearing deficiencies, isolation, stress", "More socializing", "Better nutrition"], "c": 1}, {"q": "Delirium develops over:", "a": ["Months", "Years", "Hours to days", "Decades"], "c": 2}, {"q": "Delirium is a clouding of:", "a": ["Vision", "Consciousness", "Hearing", "Smell"], "c": 1}, {"q": "Delirium affects ___% of people over 85:", "a": ["1", "5", "14", "50"], "c": 2}, {"q": "Delirium is usually:", "a": ["Permanent", "Reversible", "Fatal", "Progressive"], "c": 1}, {"q": "Major neurocognitive disorder interferes with:", "a": ["Nothing", "Sleep only", "Independence", "Appetite only"], "c": 2}, {"q": "Mild neurocognitive disorder: independence is:", "a": ["Lost", "Preserved", "Impossible", "Partially lost always"], "c": 1}, {"q": "Neurocognitive disorder prevalence at age 65:", "a": ["1-2%", "10%", "25%", "50%"], "c": 0}, {"q": "Neurocognitive disorder prevalence over age 85:", "a": ["5%", "10%", "25%", "Up to 50%"], "c": 3}, {"q": "Alzheimer's accounts for ___ of all neurocognitive disorder cases:", "a": ["1/4", "1/3", "2/3", "All"], "c": 2}, {"q": "Alzheimer's was identified in:", "a": ["1850", "1907", "1950", "2000"], "c": 1}, {"q": "~___ million Americans have Alzheimer's:", "a": ["1", "3", "5", "10"], "c": 2}, {"q": "Alzheimer's onset to death typically:", "a": ["1-2 years", "4-5 years", "8-10 years", "20+ years always"], "c": 2}, {"q": "Senile plaques are deposits of:", "a": ["Tau protein", "Beta-amyloid protein", "Serotonin", "Dopamine"], "c": 1}, {"q": "Neurofibrillary tangles are made of:", "a": ["Beta-amyloid", "Tau protein fibers", "Dopamine", "Serotonin"], "c": 1}, {"q": "Plaques form in the ___ and cerebral cortex:", "a": ["Cerebellum", "Hippocampus", "Spinal cord", "Brainstem"], "c": 1}, {"q": "Alzheimer's diagnosed with certainty only:", "a": ["By brain scan", "After death (brain examination)", "By blood test", "By symptoms alone"], "c": 1}, {"q": "Early-onset Alzheimer's is also called:", "a": ["Sporadic", "Familial", "Random", "Environmental"], "c": 1}, {"q": "Late-onset Alzheimer's results from:", "a": ["One gene", "Genetic + environmental + lifestyle factors", "Only stress", "Only diet"], "c": 1}, {"q": "Short-term memory must be ___ into long-term memory:", "a": ["Deleted", "Consolidated", "Forgotten", "Compressed"], "c": 1}, {"q": "Prefrontal lobes hold information:", "a": ["Permanently", "Temporarily", "Not at all", "Only during sleep"], "c": 1}, {"q": "Temporal lobes help transform ___ to ___ memory:", "a": ["Long/short", "Short/long", "Working/sensory", "None"], "c": 1}, {"q": "Alzheimer's drugs affect ___ and ___:", "a": ["Serotonin/dopamine", "Acetylcholine/glutamate", "GABA/norepinephrine", "Only serotonin"], "c": 1}, {"q": "Alzheimer's drug benefits are:", "a": ["Dramatic", "Curative", "Limited (modestly helpful)", "Nonexistent"], "c": 2}, {"q": "~___% of dementia patients are cared for by relatives:", "a": ["50", "70", "80", "90"], "c": 3}, {"q": "Most frequent reason for institutionalization:", "a": ["Patient preference", "Overwhelmed caregivers", "Doctor orders", "Insurance requirements"], "c": 1}, {"q": "Vascular neurocognitive disorder follows a:", "a": ["Gradual onset", "Stroke (sudden onset)", "Viral infection", "Head injury only"], "c": 1}, {"q": "Creutzfeldt-Jakob disease is caused by a:", "a": ["Bacteria", "Prion (slow-acting virus)", "Fungus", "Parasite"], "c": 1}, {"q": "Huntington's disease is:", "a": ["Viral", "Inherited/progressive", "Bacterial", "Curable"], "c": 1}, {"q": "Parkinson's disease features:", "a": ["Only memory loss", "Tremors, rigidity, unsteadiness", "Only depression", "Only anxiety"], "c": 1}, {"q": "Being old + minority is called:", "a": ["Single jeopardy", "Double jeopardy", "Triple jeopardy", "No jeopardy"], "c": 1}, {"q": "Older minority women face:", "a": ["Single jeopardy", "Double jeopardy", "Triple jeopardy", "No problems"], "c": 2}, {"q": "Day-care facilities may help ___ cognitive decline:", "a": ["Speed up", "Slow", "Have no effect on", "Reverse completely"], "c": 1}, {"q": "Wellness approach emphasizes good health:", "a": ["Only in old age", "Throughout life", "Only in childhood", "Only during illness"], "c": 1}, {"q": "Pick's disease affects the ___ lobes:", "a": ["Occipital", "Parietal", "Frontal and temporal", "Only cerebellum"], "c": 2}]}]}};

// Slug helper
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')}
function classSlug(k){return slug(D[k].name)}
function lessonSlug(les){return slug(les.title)}

// Build lookup maps
var classKeys={};var lessonMap={};
for(var k in D){classKeys[classSlug(k)]=k;
  for(var i=0;i<D[k].lessons.length;i++){
    lessonMap[classSlug(k)+'/'+lessonSlug(D[k].lessons[i])]={cls:k,idx:i}}}

// STATE
var view="home",curC=null,curL=null,tab="notes";
var shuf=[],pS={i:0,sel:null,sh:false,sc:0,an:0},tS={a:{},done:false,sc:0};
function sf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function rq(){if(curL)shuf=sf(curL.quiz);pS={i:0,sel:null,sh:false,sc:0,an:0};tS={a:{},done:false,sc:0}}

// URL helpers
function buildPath(){
  if(view==="home")return"/";
  if(view==="class")return"/"+classSlug(curC);
  if(view==="lesson")return"/"+classSlug(curC)+"/"+lessonSlug(curL);
  return"/";
}
function pushURL(){var p=buildPath();if(location.pathname!==p)history.pushState({v:view,c:curC,l:curL?curL.title:null,t:tab},document.title,p)}

function parseURL(){
  var p=location.pathname.replace(/\/$/,'');
  if(!p||p==="/"){view="home";curC=null;curL=null;tab="notes";return}
  var segs=p.split('/').filter(Boolean);
  if(segs.length===1){
    var ck=classKeys[segs[0]];
    if(ck){view="class";curC=ck;curL=null;tab="notes";return}
  }
  if(segs.length===2){
    var key=segs[0]+'/'+segs[1];
    var m=lessonMap[key];
    if(m){view="lesson";curC=m.cls;curL=D[m.cls].lessons[m.idx];tab="notes";rq();return}
  }
  view="home";curC=null;curL=null;tab="notes";
}

window.onpopstate=function(){parseURL();render()};

function render(){
var app=document.getElementById("app"),nav=document.getElementById("nav"),bread=document.getElementById("bread");
var mt=document.getElementById("mt"),ms=document.getElementById("ms");
var mpEl=document.querySelector(".mp"),wrap=document.querySelector(".wrap");

if(view==="home"){
  mt.innerHTML="Anhelina's Study Hub";ms.textContent="Pick a class to start studying";bread.innerHTML="";nav.innerHTML="";
  var h="<div class='class-grid'>";
  for(var k in D){var c=D[k];h+="<div class='cc' onclick=\"go('class','"+k+"')\"><div class='icon'>"+c.icon+"</div><h3>"+c.name+"</h3><p>"+c.sub+"</p><div class='cnt'>"+c.lessons.length+" Lesson"+(c.lessons.length!==1?"s":"")+"</div></div>"}
  h+="</div>";app.innerHTML=h;if(mpEl)wrap.appendChild(mpEl);return;
}

if(view==="class"){
  if(mpEl)nav.parentNode.insertBefore(mpEl,nav);
  var c=D[curC];mt.innerHTML=c.name;ms.textContent=c.sub;
  bread.innerHTML="<button class='bbtn' onclick=\"go('home')\">\u2190 Home</button>";nav.innerHTML="";
  if(!c.lessons.length){app.innerHTML="<p style='color:var(--txd);padding:40px 0;text-align:center'>No lessons yet \u2014 Landon is building them for you! \uD83D\uDC9C</p>";return}
  var h="";for(var i=0;i<c.lessons.length;i++){var l=c.lessons[i];
    h+="<div class='lc' style='animation:slideIn .3s ease "+(i*.04)+"s both' onclick=\"go('lesson','"+curC+"',"+i+")\"><div><span class='ln'>"+l.ln+"</span></div><div style='flex:1'><h4>"+l.title+"</h4><div class='meta'>"+l.notes.length+" sections \u00B7 "+l.quiz.length+" questions</div></div><span class='arr'>\u2192</span></div>"}
  app.innerHTML=h;return;
}

// LESSON
if(mpEl)nav.parentNode.insertBefore(mpEl,nav);
var c=D[curC],l=curL;mt.innerHTML=l.title;ms.textContent=l.ln;
bread.innerHTML="<button class='bbtn' onclick=\"go('class','"+curC+"')\">\u2190 "+c.name+"</button>";
nav.innerHTML="<div class='tabs'><button class='pill "+(tab==="notes"?"pill-a":"pill-i")+"' onclick=\"tab='notes';render()\">\uD83D\uDCD6 Notes</button><button class='pill "+(tab==="quiz"?"pill-a":"pill-i")+"' onclick=\"tab='quiz';rq();render()\">\u270F\uFE0F Practice</button><button class='pill "+(tab==="test"?"pill-a":"pill-i")+"' onclick=\"tab='test';rq();render()\">\uD83D\uDCDD Test</button></div>";

if(tab==="notes"){
  var h="";for(var i=0;i<l.notes.length;i++){var n=l.notes[i];
    h+="<div class='nc' style='animation:slideIn .3s ease "+(i*.03)+"s both'><h3><span class='num'>"+(i+1)+"</span>"+n.heading+"</h3><div class='body'>"+n.body+"</div></div>"}
  app.innerHTML=h;return;
}

if(tab==="quiz"){
  if(pS.i>=shuf.length){var p=shuf.length?Math.round(pS.sc/shuf.length*100):0;
    app.innerHTML="<div class='res'><div style='font-size:48px;margin-bottom:12px'>"+(p>=80?"\uD83C\uDFC6":p>=60?"\uD83D\uDC4D":"\uD83D\uDCDA")+"</div><div style='font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent'>"+pS.sc+"/"+shuf.length+"</div><p style='color:var(--txd);margin:8px 0 24px'>"+(p>=90?"Amazing, Anhelina! \uD83C\uDF1F":p>=70?"Great job!":"Keep reviewing!")+"</p><button class='abtn' onclick='rq();render()'>Try Again</button></div>";return;}
  var q=shuf[pS.i];
  var h="<div style='font-size:13px;color:var(--txd);font-weight:600;margin-bottom:8px'>Question "+(pS.i+1)+" / "+shuf.length+"</div><div class='pbar'><div class='pfill' style='width:"+(pS.i/shuf.length*100)+"%'></div></div>";
  h+="<div class='qcard'><h3>"+q.q+"</h3>";
  for(var j=0;j<q.a.length;j++){var cl="opt",lt=String.fromCharCode(65+j);if(pS.sh){cl+=" done";if(j===q.c){cl+=" ok";lt="\u2713"}else if(j===pS.sel){cl+=" no";lt="\u2717"}}
    h+="<button class='"+cl+"' onclick='qA("+j+")'><span class='circ'>"+lt+"</span>"+q.a[j]+"</button>"}
  if(pS.sh){h+="<div style='margin-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px'><span style='font-size:14px;font-weight:600;color:"+(pS.sel===q.c?"var(--ok)":"var(--err)")+"'>"+(pS.sel===q.c?"Correct! \uD83C\uDF89":"Not quite.")+"</span><button class='abtn' style='padding:10px 22px;font-size:14px' onclick='qN()'>"+(pS.i+1<shuf.length?"Next \u2192":"Results")+"</button></div>"}
  h+="</div><div style='margin-top:14px;display:flex;justify-content:center;gap:20px;font-size:14px;color:var(--txd)'><span>\u2705 "+pS.sc+"</span><span>\u274C "+(pS.an-pS.sc)+"</span></div>";
  app.innerHTML=h;return;
}

// TEST
if(tS.done){var p=shuf.length?Math.round(tS.sc/shuf.length*100):0;
  var h="<div class='res'><div style='font-size:52px;margin-bottom:8px'>"+(p>=90?"\uD83C\uDFC6":p>=70?"\uD83C\uDF1F":"\uD83D\uDCDA")+"</div><div style='font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent'>"+p+"%</div><p style='font-size:18px;color:var(--txd);margin:4px 0'>"+tS.sc+"/"+shuf.length+"</p><p style='color:var(--txd);font-size:14px;margin:8px 0 20px'>"+(p>=90?"You crushed it Anhelina! \uD83D\uDC9C":p>=70?"Solid work!":"Review below!")+"</p><button class='abtn' onclick='rq();render()'>Retake</button></div>";
  for(var i=0;i<shuf.length;i++){if(tS.a[i]!==shuf[i].c){h+="<div class='rw'><div style='font-size:14px;font-weight:600;margin-bottom:8px'>"+shuf[i].q+"</div><div style='font-size:13px;color:var(--err)'>Yours: "+(tS.a[i]!=null?shuf[i].a[tS.a[i]]:"None")+"</div><div style='font-size:13px;color:var(--ok);margin-top:2px'>Correct: "+shuf[i].a[shuf[i].c]+"</div></div>"}}
  app.innerHTML=h;return;}
var ac=Object.keys(tS.a).length;
var h="<div class='tinfo'>Answer all "+shuf.length+" questions, then submit.<br><small style='opacity:.6'>Answered: "+ac+" / "+shuf.length+"</small></div>";
for(var i=0;i<shuf.length;i++){var q=shuf[i];
  h+="<div class='tq "+(tS.a[i]!=null?"ans":"")+"'><div style='font-size:12px;font-weight:700;color:var(--txd);margin-bottom:8px'>#"+(i+1)+"</div><div style='font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.45'>"+q.q+"</div>";
  for(var j=0;j<q.a.length;j++){h+="<button class='topt "+(tS.a[i]===j?"sel":"")+"' onclick='tA("+i+","+j+")'><span class='tl'>"+String.fromCharCode(65+j)+"</span>"+q.a[j]+"</button>"}h+="</div>"}
h+="<div style='text-align:center;padding:20px 0'><button class='abtn' style='padding:14px 48px;font-size:16px;border-radius:14px' "+(ac<shuf.length?"disabled":"")+" onclick='subT()'>Submit Test</button></div>";
app.innerHTML=h;
}

function go(v,cls,idx){
  view=v;tab="notes";
  if(cls)curC=cls;
  if(idx!=null)curL=D[curC].lessons[idx];
  if(v==="lesson")rq();
  pushURL();render();scrollTo({top:0,behavior:"smooth"});
}
function qA(j){if(pS.sh)return;pS.sel=j;pS.sh=true;pS.an++;if(j===shuf[pS.i].c)pS.sc++;render()}
function qN(){pS.i++;pS.sel=null;pS.sh=false;render()}
function tA(i,j){if(tS.done)return;tS.a[i]=j;render()}
function subT(){var s=0;for(var i=0;i<shuf.length;i++){if(tS.a[i]===shuf[i].c)s++}tS.sc=s;tS.done=true;render();scrollTo({top:0,behavior:"smooth"})}

// Init from URL
parseURL();render();
</script>
</body>
</html>
