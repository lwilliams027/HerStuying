{"q": "Schwann concluded that ___ are made of cells:", "a": ["Plants", "Animals", "Only fungi", "Only bacteria"], "c": 1}, {"q": "Biogenesis means:", "a": ["Spontaneous generation", "Life arises from pre-existing life", "Life from non-life", "Creation"], "c": 1}, {"q": "The cell membrane is found in:", "a": ["Only eukaryotes", "Only prokaryotes", "Both prokaryotes and eukaryotes", "Neither"], "c": 2}, {"q": "Cytoplasm is found in:", "a": ["Only eukaryotes", "Both prokaryotes and eukaryotes", "Only the nucleus", "Only mitochondria"], "c": 1}, {"q": "Which is NOT part of the endomembrane system?", "a": ["Rough ER", "Golgi", "Mitochondria", "Lysosomes"], "c": 2}, {"q": "Chloroplasts are found in:", "a": ["All eukaryotes", "Plant cells and algae only", "Animal cells", "Fungi"], "c": 1}, {"q": "The most abundant protein in animals is:", "a": ["Keratin", "Collagen", "Actin", "Tubulin"], "c": 1}, {"q": "Peroxisomes are part of the endomembrane system:", "a": ["Yes", "No (they grow by splitting)", "Sometimes", "Only in plants"], "c": 1}, {"q": "β-oxidation of fatty acids occurs in:", "a": ["Lysosomes", "Peroxisomes", "Golgi", "ER"], "c": 1}, {"q": "The nucleoid is found in:", "a": ["Eukaryotes", "Prokaryotes", "Both", "Neither"], "c": 1}, {"q": "Gram staining differentiates bacteria by:", "a": ["Size", "Cell wall composition", "DNA content", "Shape only"], "c": 1}, {"q": "Crystal violet stains:", "a": ["All cells purple", "Gram-positive purple", "Only animal cells", "Only plant cells"], "c": 1}, {"q": "Methylene blue is a ___ stain:", "a": ["Differential", "Simple", "Fluorescent", "Negative"], "c": 1}, {"q": "Chromosomes are ___ chromatin:", "a": ["Unwound", "Condensed/coiled", "Destroyed", "Dissolved"], "c": 1}, {"q": "During cell division, chromatin condenses into:", "a": ["More chromatin", "Chromosomes", "Nucleolus", "Ribosomes"], "c": 1}, {"q": "The nuclear envelope breaks down during:", "a": ["Interphase", "Mitosis (prophase)", "G1 phase", "S phase"], "c": 1}, {"q": "Rough ER is continuous with the:", "a": ["Cell membrane", "Nuclear envelope", "Golgi", "Mitochondria"], "c": 1}, {"q": "Glycoproteins have ___ attached to proteins:", "a": ["Lipids", "Carbohydrates", "DNA", "Nothing"], "c": 1}, {"q": "Proteoglycans have ___ attached to protein cores:", "a": ["Lipids", "Large polysaccharides", "DNA", "Iron"], "c": 1}, {"q": "Motor proteins (kinesin, dynein) travel along:", "a": ["Actin", "Microtubules", "Intermediate filaments", "DNA"], "c": 1}, {"q": "Kinesin moves cargo ___ from the cell center:", "a": ["Toward", "Away from", "Not at all", "In circles"], "c": 1}, {"q": "Dynein moves cargo ___ the cell center:", "a": ["Away from", "Toward", "Not at all", "Randomly"], "c": 1}, {"q": "Keratin is found in:", "a": ["Microtubules", "Intermediate filaments (hair, nails, skin)", "Microfilaments", "Ribosomes"], "c": 1}, {"q": "The cytoskeleton is found in:", "a": ["Only prokaryotes", "Only eukaryotes (complex version)", "Neither", "Only plants"], "c": 1}, {"q": "Phagocytosis creates:", "a": ["Lysosomes", "Food vacuoles", "Ribosomes", "Nuclei"], "c": 1}, {"q": "Food vacuoles fuse with ___ for digestion:", "a": ["Mitochondria", "Lysosomes", "Golgi", "Nucleus"], "c": 1}, {"q": "Central vacuole can occupy up to ___% of plant cell volume:", "a": ["10", "50", "70", "90"], "c": 3}, {"q": "Wilting occurs when plant cells lose:", "a": ["ATP", "Turgor pressure (water leaves vacuole)", "DNA", "Chloroplasts"], "c": 1}, {"q": "The inner mitochondrial membrane has higher surface area due to:", "a": ["Being smooth", "Cristae (folds)", "Being flat", "Having no proteins"], "c": 1}, {"q": "Both mitochondria and chloroplasts:", "a": ["Are found in animals", "Have own DNA, double membrane, 70S ribosomes", "Have no membranes", "Are in prokaryotes"], "c": 1}, {"q": "More mitochondria are found in ___ cells:", "a": ["Red blood", "Muscle and liver (high energy)", "Skin", "Fat"], "c": 1}, {"q": "Red blood cells have:", "a": ["Many mitochondria", "No nucleus or mitochondria", "A large nucleus", "Many chloroplasts"], "c": 1}, {"q": "Tight junctions are found in:", "a": ["Only plants", "Bladder and intestinal lining", "Only bones", "Only blood"], "c": 1}, {"q": "Desmosomes are found in:", "a": ["Only plants", "Skin and heart muscle", "Only liver", "Only blood"], "c": 1}, {"q": "Gap junctions are important in:", "a": ["Plants", "Heart muscle coordination", "Only liver", "Only skin"], "c": 1}, {"q": "Plasmodesmata are like ___ in animal cells:", "a": ["Tight junctions", "Gap junctions", "Desmosomes", "Nothing similar"], "c": 1}, {"q": "The cell wall is ___ the cell membrane:", "a": ["Inside", "Outside", "Part of", "Instead of"], "c": 1}, {"q": "Smooth ER synthesizes:", "a": ["Proteins", "Lipids (phospholipids, steroids)", "DNA", "RNA"], "c": 1}, {"q": "Liver cells have abundant smooth ER for:", "a": ["Protein synthesis", "Detoxification of drugs and alcohol", "Photosynthesis", "DNA repair"], "c": 1}, {"q": "Cisternae are:", "a": ["Ribosomes", "Flattened membrane sacs of the Golgi", "Microtubules", "Vesicles"], "c": 1}, {"q": "The cis face of the Golgi faces:", "a": ["Cell membrane", "ER (receiving side)", "Outside the cell", "The nucleus only"], "c": 1}, {"q": "The trans face of the Golgi faces:", "a": ["The ER", "Cell membrane (shipping side)", "The nucleus", "Mitochondria"], "c": 1}, {"q": "Vesicles are:", "a": ["Large organelles", "Small membrane-bound transport sacs", "Proteins", "DNA containers"], "c": 1}, {"q": "Secretory proteins travel: ER → ___ → cell membrane:", "a": ["Nucleus", "Golgi (via vesicles)", "Mitochondria", "Lysosome"], "c": 1}, {"q": "What limits cell size?", "a": ["DNA amount", "Surface area-to-volume ratio", "Color", "Shape"], "c": 1}, {"q": "A cell with a 2× larger radius has ___× more volume:", "a": ["2", "4", "8", "16"], "c": 2}, {"q": "Electron microscopes use ___ instead of light:", "a": ["Sound waves", "Electron beams", "X-rays", "Radio waves"], "c": 1}, {"q": "Can you view living specimens with TEM?", "a": ["Yes", "No (specimens must be dead/fixed)", "Sometimes", "Always"], "c": 1}]}, {"id": "bio-l6", "title": "Lesson 6: Membranes & Membrane Proteins", "ln": "BIO · L6", "notes": [{"heading": "Cell Membrane — Overview", "body": "The <b>plasma membrane</b> (cell membrane) is a <b>selectively permeable</b> barrier surrounding every cell. Controls what enters and exits. Made primarily of a <b>phospholipid bilayer</b> with embedded proteins, cholesterol, and carbohydrates. The <b>fluid mosaic model</b> (Singer & Nicolson, 1972) describes it as a fluid sea of lipids with a mosaic of proteins floating in it."}, {"heading": "Phospholipid Bilayer", "body": "Two layers of phospholipids arranged <b>tail-to-tail</b>. <b>Hydrophilic phosphate heads</b> face outward (toward water). <b>Hydrophobic fatty acid tails</b> face inward (away from water). This arrangement is <b>spontaneous</b> in aqueous environments due to the hydrophobic effect. Creates a <b>semipermeable barrier</b> — small nonpolar molecules pass freely; charged ions and large polar molecules cannot."}, {"heading": "Membrane Fluidity", "body": "The membrane is NOT rigid — it's a <b>fluid</b> where lipids and proteins move laterally. Fluidity depends on: <b>1) Temperature</b> (higher = more fluid). <b>2) Fatty acid saturation</b> (unsaturated = more fluid due to kinks). <b>3) Cholesterol</b> — acts as a <b>fluidity buffer</b>: at HIGH temp, reduces fluidity (restrains movement); at LOW temp, prevents solidifying (prevents tight packing). Fluidity is essential for membrane function, cell growth, and division."}, {"heading": "Cholesterol in Membranes", "body": "<b>Cholesterol</b> molecules are wedged between phospholipids in <b>animal cell membranes</b> (up to 25% of membrane lipids). Steroid structure fits between fatty acid tails. <b>Dual role:</b> stabilizes membrane fluidity across temperature ranges. Also reduces <b>permeability</b> to small water-soluble molecules. Plant cells use <b>sterols</b> instead. Bacteria generally lack cholesterol."}, {"heading": "Membrane Proteins — Types", "body": "Two main categories: <b>Integral (intrinsic) proteins:</b> embedded IN the bilayer. <b>Transmembrane proteins</b> span the entire membrane (have hydrophobic regions in the lipid core). <b>Peripheral (extrinsic) proteins:</b> loosely attached to the membrane surface (inside or outside) via weak bonds. Easily removed. Both types are essential for membrane function."}, {"heading": "Membrane Protein Functions — 6 Types", "body": "<b>1) Transport:</b> channels and carriers move substances (aquaporins, ion channels, glucose transporters). <b>2) Enzymatic:</b> catalyze reactions at membrane surface. <b>3) Signal transduction/receptors:</b> bind signaling molecules (hormones, neurotransmitters) → trigger cellular response. <b>4) Cell recognition/identity:</b> glycoproteins identify cell type (immune system, blood types). <b>5) Intercellular joining:</b> link cells (tight junctions, desmosomes). <b>6) Attachment:</b> anchor cytoskeleton to ECM."}, {"heading": "Glycocalyx — The Sugar Coat", "body": "<b>Glycocalyx:</b> carbohydrate layer on the <b>outer</b> surface of the cell membrane. Made of <b>glycoproteins</b> (carbs + proteins) and <b>glycolipids</b> (carbs + lipids). Functions: <b>cell recognition</b> (immune system identifies 'self' vs 'non-self'), <b>protection</b>, <b>cell adhesion</b>, <b>blood type determination</b> (A, B, AB, O antigens are glycoproteins). Every cell type has a unique glycocalyx — like a molecular fingerprint."}, {"heading": "Selective Permeability", "body": "Membranes are <b>selectively permeable</b> — allow some substances to pass but not others. <b>Freely cross:</b> small nonpolar molecules (O₂, CO₂, N₂), small uncharged polar (H₂O — slowly, or via aquaporins). <b>Cannot freely cross:</b> large molecules (glucose, amino acids), ions (Na⁺, K⁺, Cl⁻, Ca²⁺), charged molecules. These need <b>transport proteins</b> (channels or carriers) to cross."}, {"heading": "Passive Transport — Overview", "body": "Movement of substances <b>DOWN their concentration gradient</b> (high → low). Requires <b>NO energy (ATP)</b>. Driven by the <b>2nd Law of Thermodynamics</b> (entropy increases). Three types: <b>simple diffusion, facilitated diffusion, osmosis</b>. All passive transport moves toward <b>equilibrium</b> (equal concentration on both sides). Does NOT require membrane proteins (for simple diffusion of nonpolar molecules)."}, {"heading": "Simple Diffusion", "body": "Movement of small, nonpolar molecules <b>directly through the phospholipid bilayer</b> — no proteins needed. Examples: <b>O₂, CO₂, N₂, ethanol</b> cross freely. Driven by the <b>concentration gradient</b>. Rate depends on: gradient steepness, temperature, molecule size, and lipid solubility. Continues until equilibrium. At equilibrium, molecules still move but net movement = 0 (<b>dynamic equilibrium</b>)."}, {"heading": "Facilitated Diffusion", "body": "Passive transport (no ATP) using <b>membrane proteins</b> to help polar/charged molecules cross. Two types: <b>Channel proteins:</b> form hydrophilic tunnels (e.g., ion channels, aquaporins). Can be <b>gated</b> (open/close in response to signals). <b>Carrier proteins:</b> bind specific solute → change shape → release on other side (e.g., glucose transporter GLUT). Still moves DOWN the gradient. Specific and saturable (limited number of proteins)."}, {"heading": "Osmosis", "body": "<b>Diffusion of water</b> across a selectively permeable membrane from <b>high water concentration (low solute)</b> to <b>low water concentration (high solute)</b>. Water moves toward the MORE concentrated solution. <b>Osmotic pressure:</b> pressure needed to stop osmosis. Critical for cell survival — cells must balance water intake/loss. Aquaporins greatly increase the rate of osmosis."}, {"heading": "Tonicity — Isotonic, Hypertonic, Hypotonic", "body": "<b>Tonicity:</b> ability of a surrounding solution to cause water movement. <b>Isotonic:</b> equal solute concentration inside and outside → no net water movement → cell normal. <b>Hypertonic:</b> MORE solute outside → water leaves cell → cell <b>shrivels</b> (animal: crenation; plant: plasmolysis). <b>Hypotonic:</b> LESS solute outside → water enters cell → cell <b>swells</b> (animal: may lyse/burst; plant: becomes turgid — cell wall prevents bursting)."}, {"heading": "Osmosis in Animal vs Plant Cells", "body": "<b>Animal cells</b> lack cell walls → in hypotonic solution, they swell and may <b>lyse</b> (burst). Best in <b>isotonic</b> solution (e.g., normal saline 0.9% NaCl). <b>Plant cells</b> have rigid cell walls → in hypotonic solution, they become <b>turgid</b> (firm, ideal state — turgor pressure pushes against wall). In hypertonic → <b>plasmolysis</b> (membrane pulls away from wall → wilting)."}, {"heading": "Active Transport", "body": "Movement of substances <b>AGAINST their concentration gradient</b> (low → high). Requires <b>ATP energy</b>. Uses <b>carrier proteins (pumps)</b>. Example: <b>Na⁺/K⁺ ATPase (sodium-potassium pump):</b> pumps 3 Na⁺ OUT and 2 K⁺ IN per ATP hydrolyzed. Maintains the electrochemical gradient essential for nerve impulses, muscle contraction, and secondary active transport. <b>Electrogenic pump:</b> creates voltage across membrane."}, {"heading": "Bulk Transport — Endocytosis", "body": "Movement of <b>large particles or large amounts</b> of material INTO the cell via membrane vesicles. Requires ATP. Three types: <b>Phagocytosis ('cell eating'):</b> cell engulfs large particles/cells (e.g., white blood cells eating bacteria). <b>Pinocytosis ('cell drinking'):</b> cell takes in small droplets of extracellular fluid. <b>Receptor-mediated endocytosis:</b> specific molecules bind to receptors → coated pit → vesicle forms (e.g., cholesterol uptake via LDL receptors)."}, {"heading": "Bulk Transport — Exocytosis", "body": "<b>Exocytosis:</b> vesicles inside the cell <b>fuse with the cell membrane</b> and release contents OUTSIDE. Requires ATP. Examples: secretion of hormones (insulin), neurotransmitters, digestive enzymes, mucus, antibodies. Also used to add new phospholipids and proteins to the cell membrane. The reverse of endocytosis."}, {"heading": "Electrochemical Gradient", "body": "Combination of <b>concentration gradient</b> (chemical) and <b>electrical gradient</b> (charge difference across membrane). Together = <b>electrochemical gradient</b>. Inside of most cells is <b>negative</b> relative to outside (resting membrane potential ~<b>-70 mV</b> in neurons). Created and maintained by the Na⁺/K⁺ pump and ion channels. Drives nerve impulses, muscle contraction, and secondary active transport."}, {"heading": "Secondary Active Transport (Cotransport)", "body": "Uses the <b>energy stored in an ion gradient</b> (created by primary active transport) to move another molecule. No direct ATP use. <b>Symport:</b> both substances move same direction (e.g., Na⁺-glucose cotransporter in intestine — glucose 'hitches a ride' with Na⁺). <b>Antiport:</b> substances move opposite directions (e.g., Na⁺-H⁺ exchanger). Indirectly powered by ATP (which maintains the ion gradient)."}, {"heading": "Transport Summary Table", "body": "<b>Simple diffusion:</b> nonpolar, no protein, no ATP, down gradient. <b>Facilitated diffusion:</b> polar/charged, channel/carrier protein, no ATP, down gradient. <b>Osmosis:</b> water, aquaporins (optional), no ATP, down water gradient. <b>Active transport:</b> against gradient, carrier pump, ATP required. <b>Endocytosis:</b> large particles in, vesicle, ATP. <b>Exocytosis:</b> large particles out, vesicle, ATP."}, {"heading": "Key Concepts Summary", "body": "<b>Fluid mosaic model:</b> phospholipid bilayer + proteins + cholesterol + carbs. <b>Fluidity:</b> unsaturated fatty acids + cholesterol as buffer. <b>Proteins:</b> integral (transmembrane) vs peripheral; 6 functions (transport, enzyme, receptor, recognition, joining, attachment). <b>Glycocalyx:</b> sugar coat for recognition. <b>Passive:</b> down gradient, no ATP (diffusion, facilitated, osmosis). <b>Tonicity:</b> isotonic (normal), hypertonic (shrink), hypotonic (swell). <b>Active:</b> against gradient, ATP (Na⁺/K⁺ pump). <b>Bulk:</b> endo/exocytosis."}], "quiz": [{"q": "The fluid mosaic model was proposed by:", "a": ["Watson & Crick", "Singer & Nicolson", "Hooke & Leeuwenhoek", "Schleiden & Schwann"], "c": 1}, {"q": "Cell membranes are primarily made of:", "a": ["Protein only", "Phospholipid bilayer", "DNA", "Carbohydrates only"], "c": 1}, {"q": "Phospholipid heads are:", "a": ["Hydrophobic", "Hydrophilic", "Nonpolar", "Neutral"], "c": 1}, {"q": "Phospholipid tails are:", "a": ["Hydrophilic", "Hydrophobic", "Charged", "Polar"], "c": 1}, {"q": "In a bilayer, tails face:", "a": ["Outward (toward water)", "Inward (away from water)", "Both ways", "Down"], "c": 1}, {"q": "Bilayer formation is:", "a": ["Requires energy", "Spontaneous in water", "Impossible", "Only in labs"], "c": 1}, {"q": "Membrane fluidity increases with:", "a": ["More saturated fatty acids", "More unsaturated fatty acids", "Less cholesterol", "Lower temperature"], "c": 1}, {"q": "Cholesterol acts as a fluidity:", "a": ["Destroyer", "Buffer (stabilizer)", "Increaser only", "Decreaser only"], "c": 1}, {"q": "At high temperatures, cholesterol ___ fluidity:", "a": ["Increases", "Reduces (restrains movement)", "Eliminates", "Doesn't affect"], "c": 1}, {"q": "At low temperatures, cholesterol ___ solidifying:", "a": ["Promotes", "Prevents (maintains fluidity)", "Causes", "Doesn't affect"], "c": 1}, {"q": "Integral proteins are:", "a": ["Loosely attached", "Embedded IN the bilayer", "Only on the surface", "Free-floating"], "c": 1}, {"q": "Peripheral proteins are:", "a": ["Embedded in the bilayer", "Loosely attached to the surface", "Transmembrane", "Inside the nucleus"], "c": 1}, {"q": "Transmembrane proteins span the:", "a": ["Nucleus", "Entire membrane", "Only one layer", "Cell wall"], "c": 1}, {"q": "Channel proteins form:", "a": ["Barriers", "Hydrophilic tunnels", "Lipid layers", "Nothing"], "c": 1}, {"q": "Aquaporins are channels for:", "a": ["Ions", "Water", "Glucose", "Amino acids"], "c": 1}, {"q": "Carrier proteins ___ shape when transporting:", "a": ["Don't change", "Change", "Break", "Dissolve"], "c": 1}, {"q": "GLUT is a transporter for:", "a": ["Ions", "Glucose", "Oxygen", "Water"], "c": 1}, {"q": "Receptor proteins bind:", "a": ["DNA", "Signaling molecules (hormones, etc.)", "Lipids", "Water"], "c": 1}, {"q": "The glycocalyx is on the ___ surface:", "a": ["Inner", "Outer (extracellular)", "Both", "Neither"], "c": 1}, {"q": "Blood types (A, B, AB, O) are determined by:", "a": ["DNA only", "Glycocalyx glycoproteins", "Cholesterol", "Phospholipids"], "c": 1}, {"q": "Glycoproteins are:", "a": ["Lipids + carbs", "Proteins + carbohydrates", "DNA + protein", "RNA + lipid"], "c": 1}, {"q": "Small nonpolar molecules like O₂ cross membranes by:", "a": ["Active transport", "Simple diffusion (freely)", "Endocytosis", "They can't cross"], "c": 1}, {"q": "Ions (Na⁺, K⁺) ___ freely cross the membrane:", "a": ["Can", "Cannot (need transport proteins)", "Always", "Only in plants"], "c": 1}, {"q": "Passive transport requires:", "a": ["ATP", "No energy (ATP)", "Enzymes", "Light"], "c": 1}, {"q": "Passive transport moves substances ___ their gradient:", "a": ["Against", "Down (high → low)", "Randomly", "Up"], "c": 1}, {"q": "At dynamic equilibrium:", "a": ["All movement stops", "Molecules still move but net movement = 0", "Concentration is unequal", "Cells die"], "c": 1}, {"q": "Facilitated diffusion uses ___ but no ATP:", "a": ["Nothing", "Membrane proteins", "Only heat", "Only light"], "c": 1}, {"q": "Gated channels open/close in response to:", "a": ["Nothing", "Signals (voltage, chemicals, mechanical)", "Random chance", "Temperature only"], "c": 1}, {"q": "Osmosis is diffusion of:", "a": ["Solute", "Water", "Ions", "Glucose"], "c": 1}, {"q": "Water moves toward the ___ concentrated solution:", "a": ["Less", "More (higher solute)", "Equal", "None"], "c": 1}, {"q": "Isotonic means:", "a": ["More solute outside", "Equal solute inside and outside", "Less solute outside", "No solute"], "c": 1}, {"q": "In an isotonic solution, a cell:", "a": ["Swells", "Shrinks", "Stays normal (no net water movement)", "Dies"], "c": 2}, {"q": "Hypertonic means ___ solute outside:", "a": ["Less", "Equal", "More", "No"], "c": 2}, {"q": "In hypertonic solution, animal cells:", "a": ["Swell", "Shrivel (crenation)", "Stay same", "Divide"], "c": 1}, {"q": "In hypertonic solution, plant cells undergo:", "a": ["Turgor", "Plasmolysis (membrane pulls from wall)", "Lysis", "Nothing"], "c": 1}, {"q": "Hypotonic means ___ solute outside:", "a": ["More", "Equal", "Less", "Saturated"], "c": 2}, {"q": "In hypotonic solution, animal cells may:", "a": ["Shrink", "Lyse (burst)", "Stay same", "Divide"], "c": 1}, {"q": "In hypotonic solution, plant cells become:", "a": ["Plasmolyzed", "Turgid (firm — ideal state)", "Dead", "Crenated"], "c": 1}, {"q": "Plant cells don't burst in hypotonic solution because of:", "a": ["No membrane", "Cell wall (prevents over-expansion)", "Cholesterol", "ATP"], "c": 1}, {"q": "Active transport moves substances ___ their gradient:", "a": ["Down", "Against (low → high)", "Randomly", "Not at all"], "c": 1}, {"q": "Active transport requires:", "a": ["No energy", "ATP", "Only heat", "Only light"], "c": 1}, {"q": "Na⁺/K⁺ pump moves ___ Na⁺ out and ___ K⁺ in:", "a": ["2/3", "3/2", "1/1", "4/4"], "c": 1}, {"q": "The Na⁺/K⁺ pump uses ___ per cycle:", "a": ["No energy", "1 ATP", "2 ATP", "10 ATP"], "c": 1}, {"q": "The Na⁺/K⁺ pump is essential for:", "a": ["Only digestion", "Nerve impulses and muscle contraction", "Only growth", "Only reproduction"], "c": 1}, {"q": "Phagocytosis means:", "a": ["Cell drinking", "Cell eating (engulfs large particles)", "Cell dividing", "Cell dying"], "c": 1}, {"q": "Pinocytosis means:", "a": ["Cell eating", "Cell drinking (takes in fluid droplets)", "Cell dividing", "Cell dying"], "c": 1}, {"q": "Receptor-mediated endocytosis is:", "a": ["Nonspecific", "Specific (molecules bind to receptors)", "Random", "Passive"], "c": 1}, {"q": "LDL cholesterol enters cells via:", "a": ["Simple diffusion", "Receptor-mediated endocytosis", "Osmosis", "Exocytosis"], "c": 1}, {"q": "Exocytosis releases contents:", "a": ["Into the cell", "Outside the cell", "Into the nucleus", "Into mitochondria"], "c": 1}, {"q": "Insulin is secreted by:", "a": ["Endocytosis", "Exocytosis", "Diffusion", "Osmosis"], "c": 1}, {"q": "Resting membrane potential is ~:", "a": ["+70 mV", "-70 mV", "0 mV", "-170 mV"], "c": 1}, {"q": "Inside of most cells is ___ relative to outside:", "a": ["Positive", "Negative", "Neutral", "Equal"], "c": 1}, {"q": "Electrochemical gradient combines:", "a": ["Only chemical", "Chemical + electrical gradients", "Only electrical", "Only thermal"], "c": 1}, {"q": "Symport moves substances in ___ direction:", "a": ["Opposite", "Same", "Random", "No"], "c": 1}, {"q": "Antiport moves substances in ___ directions:", "a": ["Same", "Opposite", "Random", "No"], "c": 1}, {"q": "Na⁺-glucose cotransporter is an example of:", "a": ["Antiport", "Symport (secondary active transport)", "Simple diffusion", "Osmosis"], "c": 1}, {"q": "Secondary active transport uses energy from:", "a": ["ATP directly", "An ion gradient (created by primary active transport)", "Light", "Heat"], "c": 1}, {"q": "Selectively permeable means:", "a": ["Nothing passes", "Everything passes", "Some substances pass, others don't", "Only water passes"], "c": 2}, {"q": "CO₂ crosses membranes by:", "a": ["Active transport", "Simple diffusion", "Endocytosis", "It can't cross"], "c": 1}, {"q": "Glucose crosses membranes by:", "a": ["Simple diffusion", "Facilitated diffusion (GLUT transporter)", "Osmosis", "It can't cross"], "c": 1}, {"q": "Neurotransmitters are released by:", "a": ["Endocytosis", "Exocytosis", "Diffusion", "Osmosis"], "c": 1}, {"q": "White blood cells use ___ to engulf bacteria:", "a": ["Pinocytosis", "Phagocytosis", "Exocytosis", "Osmosis"], "c": 1}, {"q": "Normal saline (0.9% NaCl) is ___ to blood cells:", "a": ["Hypertonic", "Hypotonic", "Isotonic", "Toxic"], "c": 2}, {"q": "Wilting in plants is caused by:", "a": ["Too much water", "Plasmolysis (water loss in hypertonic environment)", "Turgor", "Cell division"], "c": 1}, {"q": "Facilitated diffusion is saturable because:", "a": ["It uses ATP", "There are limited transport proteins", "It's always fast", "It never stops"], "c": 1}, {"q": "Osmotic pressure is the pressure needed to:", "a": ["Increase osmosis", "Stop osmosis", "Start osmosis", "Speed osmosis"], "c": 1}, {"q": "An electrogenic pump creates:", "a": ["Heat", "Voltage across the membrane", "Light", "Sound"], "c": 1}, {"q": "Plant cell walls are made of ___ not membrane:", "a": ["Phospholipids", "Cellulose", "Cholesterol", "Protein"], "c": 1}, {"q": "Sterols in plant membranes function like ___ in animals:", "a": ["Proteins", "Cholesterol", "DNA", "Carbohydrates"], "c": 1}, {"q": "Membrane proteins move ___ in the fluid mosaic:", "a": ["Not at all", "Laterally (sideways)", "Only up and down", "In circles"], "c": 1}, {"q": "The 6 functions of membrane proteins include all EXCEPT:", "a": ["Transport", "Signal transduction", "DNA replication", "Cell recognition"], "c": 2}, {"q": "Coated pits are involved in:", "a": ["Simple diffusion", "Receptor-mediated endocytosis", "Osmosis", "Exocytosis"], "c": 1}, {"q": "Adding membrane material uses:", "a": ["Endocytosis", "Exocytosis (adds phospholipids/proteins)", "Osmosis", "Diffusion"], "c": 1}, {"q": "Mucus is secreted by:", "a": ["Endocytosis", "Exocytosis", "Diffusion", "Active transport"], "c": 1}, {"q": "Antibodies are secreted by:", "a": ["Diffusion", "Exocytosis", "Osmosis", "Endocytosis"], "c": 1}, {"q": "Solute concentration is higher inside in ___ solution:", "a": ["Hypertonic", "Isotonic", "Hypotonic", "Saturated"], "c": 2}, {"q": "Crenation occurs in animal cells placed in ___ solution:", "a": ["Hypotonic", "Isotonic", "Hypertonic", "Pure water"], "c": 2}, {"q": "Lysis occurs in animal cells placed in ___ solution:", "a": ["Hypertonic", "Isotonic", "Hypotonic (too much water enters)", "Saturated"], "c": 2}, {"q": "Turgid plant cells are in ___ solution:", "a": ["Hypertonic", "Isotonic", "Hypotonic (ideal for plants)", "Dry"], "c": 2}, {"q": "The rate of diffusion increases with:", "a": ["Lower temperature", "Higher temperature", "Less gradient", "More barriers"], "c": 1}, {"q": "Larger molecules diffuse ___ than smaller ones:", "a": ["Faster", "Slower", "Same rate", "Not at all"], "c": 1}, {"q": "Lipid-soluble molecules diffuse ___ through membranes:", "a": ["Poorly", "Easily (through the bilayer)", "Not at all", "Only with help"], "c": 1}, {"q": "Ion channels are examples of:", "a": ["Carrier proteins", "Channel proteins", "Peripheral proteins", "Enzymes only"], "c": 1}, {"q": "Voltage-gated channels open in response to:", "a": ["Chemical signals", "Changes in membrane potential", "Mechanical stretch", "Light"], "c": 1}, {"q": "Ligand-gated channels open in response to:", "a": ["Voltage", "Chemical signals (binding a ligand)", "Mechanical force", "Temperature"], "c": 1}, {"q": "The Na⁺/K⁺ pump is an example of:", "a": ["Passive transport", "Primary active transport", "Secondary active transport", "Diffusion"], "c": 1}, {"q": "Na⁺-glucose cotransport is:", "a": ["Primary active", "Secondary active transport (symport)", "Simple diffusion", "Osmosis"], "c": 1}, {"q": "Endocytosis moves material:", "a": ["Out of the cell", "Into the cell (via vesicles)", "Nowhere", "Between organelles only"], "c": 1}, {"q": "All endocytosis and exocytosis require:", "a": ["No energy", "ATP", "Only heat", "Only in plants"], "c": 1}, {"q": "Diffusion rate is fastest when the gradient is:", "a": ["Small", "Steep (large difference)", "Zero", "Negative"], "c": 1}, {"q": "At equilibrium, the concentration gradient is:", "a": ["Maximum", "Zero (equal on both sides)", "Increasing", "Negative"], "c": 1}, {"q": "The glycocalyx helps the immune system by:", "a": ["Destroying cells", "Identifying self vs non-self", "Producing ATP", "Creating DNA"], "c": 1}, {"q": "Up to ___% of animal membrane lipids can be cholesterol:", "a": ["5", "10", "25", "50"], "c": 2}, {"q": "Integral proteins have ___ regions in the lipid core:", "a": ["Hydrophilic", "Hydrophobic", "Charged", "Sugar"], "c": 1}, {"q": "Passive transport is driven by:", "a": ["ATP", "Concentration gradient (2nd Law)", "Enzymes", "Light"], "c": 1}, {"q": "Active transport examples include all EXCEPT:", "a": ["Na⁺/K⁺ pump", "Proton pump", "Osmosis", "Ca²⁺ pump"], "c": 2}, {"q": "Proton pumps move ___ across membranes:", "a": ["Na⁺", "H⁺ (protons)", "K⁺", "Cl⁻"], "c": 1}, {"q": "The fluid in 'fluid mosaic model' refers to:", "a": ["Water", "Lateral movement of lipids and proteins", "Blood", "Cytoplasm"], "c": 1}, {"q": "The mosaic in 'fluid mosaic model' refers to:", "a": ["Only lipids", "Diverse proteins scattered in the membrane", "Only carbs", "Only cholesterol"], "c": 1}, {"q": "Phospholipids can ___ (flip between layers) but this is rare:", "a": ["Diffuse laterally", "Flip-flop", "Spin", "Stretch"], "c": 1}, {"q": "Flippases are enzymes that help phospholipids:", "a": ["Move laterally", "Flip between layers", "Dissolve", "Break down"], "c": 1}, {"q": "Membrane asymmetry means the two layers have:", "a": ["Identical composition", "Different lipid and protein composition", "No proteins", "No lipids"], "c": 1}, {"q": "The extracellular face has more:", "a": ["Cholesterol", "Glycolipids and glycoproteins", "DNA", "RNA"], "c": 1}, {"q": "Signal transduction begins when a ligand binds a:", "a": ["Lipid", "Receptor protein", "DNA", "Ribosome"], "c": 1}, {"q": "After a ligand binds, the cell produces:", "a": ["Nothing", "A cellular response (second messenger cascade)", "More receptors", "DNA"], "c": 1}, {"q": "Second messengers include:", "a": ["DNA", "cAMP, Ca²⁺, IP₃", "Glucose", "Cholesterol"], "c": 1}, {"q": "Tight junctions prevent:", "a": ["Cell communication", "Leaking between cells", "Cell growth", "Cell division"], "c": 1}, {"q": "Gap junctions allow direct passage of:", "a": ["Large proteins", "Small molecules and ions", "DNA", "Organelles"], "c": 1}, {"q": "Desmosomes use ___ filaments for anchoring:", "a": ["Actin", "Intermediate (keratin)", "Microtubules", "Collagen"], "c": 1}, {"q": "Concentration gradient means there is a ___ in concentration:", "a": ["No change", "Difference across a space", "Equal distribution", "Vacuum"], "c": 1}, {"q": "Diffusion is faster in ___ mediums:", "a": ["Solid", "Liquid", "Gas (least resistance)", "Vacuum"], "c": 2}, {"q": "Facilitated diffusion is similar to simple diffusion because both:", "a": ["Use ATP", "Move DOWN the gradient (passive)", "Use vesicles", "Move against gradient"], "c": 1}, {"q": "The sodium-potassium pump is also called:", "a": ["Na⁺/K⁺ ATPase", "GLUT", "Aquaporin", "Catalase"], "c": 0}, {"q": "Each cycle of Na⁺/K⁺ pump creates a net ___ charge movement:", "a": ["Neutral", "Positive charge moved OUT (electrogenic)", "Negative charge moved out", "No charge change"], "c": 1}, {"q": "Vesicles are small membrane-bound:", "a": ["Organelles", "Transport sacs", "Cells", "Organisms"], "c": 1}, {"q": "Endocytosis creates vesicles by ___ the membrane:", "a": ["Breaking", "Pinching inward", "Pushing outward", "Dissolving"], "c": 1}, {"q": "Exocytosis creates openings by ___ vesicles with the membrane:", "a": ["Breaking", "Fusing", "Destroying", "Dissolving"], "c": 1}, {"q": "Contractile vacuoles in freshwater protists are like:", "a": ["Pumps removing excess water", "Storage units", "Energy producers", "DNA containers"], "c": 0}, {"q": "Freshwater organisms face ___ environments:", "a": ["Hypertonic", "Hypotonic (water constantly entering)", "Isotonic", "Dry"], "c": 1}, {"q": "Marine organisms face ___ environments:", "a": ["Hypotonic", "Hypertonic (water constantly leaving)", "Isotonic", "Dry"], "c": 1}, {"q": "Dialysis (medical) works by:", "a": ["Active transport", "Diffusion across a selectively permeable membrane", "Endocytosis", "Exocytosis"], "c": 1}, {"q": "IV fluids must be ___ to prevent cell damage:", "a": ["Hypertonic", "Hypotonic", "Isotonic", "Distilled water"], "c": 2}, {"q": "Putting salt on a slug causes water to leave by:", "a": ["Active transport", "Osmosis (hypertonic environment)", "Diffusion of salt", "Endocytosis"], "c": 1}, {"q": "Salting food preserves it by creating a ___ environment:", "a": ["Hypotonic", "Hypertonic (dehydrates bacteria)", "Isotonic", "Acidic"], "c": 1}, {"q": "Cell recognition by immune cells uses:", "a": ["DNA", "Glycoproteins on the glycocalyx", "ATP", "Ribosomes"], "c": 1}, {"q": "Organ transplant rejection involves:", "a": ["Mismatched glycocalyx markers", "Too much ATP", "DNA errors", "Nothing"], "c": 0}, {"q": "The membrane is described as selectively permeable, NOT:", "a": ["Semipermeable only", "Freely permeable (everything passes)", "A barrier", "Choosy"], "c": 1}, {"q": "Steroid hormones can cross the membrane because they are:", "a": ["Charged", "Small and nonpolar (lipid-soluble)", "Large", "Ionic"], "c": 1}, {"q": "Water crosses membranes slowly by ___ or fast via ___:", "a": ["Active transport / osmosis", "Simple diffusion / aquaporins", "Endocytosis / exocytosis", "Never / always"], "c": 1}, {"q": "Facilitated diffusion reaches a maximum rate because:", "a": ["ATP runs out", "All carrier/channel proteins are occupied (saturated)", "Gradient disappears", "Temperature drops"], "c": 1}, {"q": "Primary active transport uses ___ directly:", "a": ["Ion gradient", "ATP", "Light", "Heat"], "c": 1}, {"q": "Secondary active transport uses ___ indirectly:", "a": ["ATP (via ion gradient it created)", "Light", "Heat", "DNA"], "c": 0}, {"q": "Ca²⁺ pumps in the ER are examples of:", "a": ["Passive transport", "Active transport", "Osmosis", "Diffusion"], "c": 1}, {"q": "Proton pumps are important in:", "a": ["Only stomach", "Mitochondria (ATP synthesis) and stomach acid", "Only skin", "Only brain"], "c": 1}, {"q": "Ethanol (alcohol) crosses membranes by:", "a": ["Active transport", "Simple diffusion (small, nonpolar)", "Endocytosis", "Cannot cross"], "c": 1}, {"q": "Amino acids enter cells by:", "a": ["Simple diffusion", "Facilitated diffusion or active transport", "Osmosis", "They can't"], "c": 1}, {"q": "The membrane is about ___ nm thick:", "a": ["1", "7-8", "50", "100"], "c": 1}, {"q": "Phospholipid movement within one layer is:", "a": ["Impossible", "Very fast (lateral diffusion)", "Very slow", "Only in one direction"], "c": 1}, {"q": "Unsaturated fatty acid tails have ___ that prevent packing:", "a": ["Extra bonds", "Kinks from double bonds", "No hydrogen", "No carbon"], "c": 1}, {"q": "Membrane proteins can be identified by:", "a": ["Color", "Freeze-fracture electron microscopy", "Taste", "Sound"], "c": 1}, {"q": "Freeze-fracture splits the membrane between:", "a": ["The two phospholipid layers", "Inside and outside", "Nothing", "Only proteins"], "c": 0}, {"q": "Transport proteins are specific — each carries:", "a": ["Everything", "Specific molecules only", "Only water", "Only ions"], "c": 1}, {"q": "Enzymatic proteins in the membrane catalyze reactions at:", "a": ["The nucleus", "The membrane surface", "Inside DNA", "Outside the body"], "c": 1}, {"q": "Cell adhesion molecules (CAMs) help cells:", "a": ["Divide", "Stick to each other", "Produce ATP", "Make DNA"], "c": 1}, {"q": "Glycolipids are:", "a": ["Proteins + carbs", "Lipids + carbohydrates", "DNA + lipids", "RNA + sugars"], "c": 1}, {"q": "The inner leaflet of the bilayer faces the:", "a": ["Extracellular space", "Cytoplasm", "Outside", "Neither"], "c": 1}, {"q": "The outer leaflet faces the:", "a": ["Cytoplasm", "Extracellular space", "Nucleus", "Mitochondria"], "c": 1}, {"q": "Bulk transport is needed for molecules too ___ for transport proteins:", "a": ["Small", "Large", "Fast", "Polar"], "c": 1}, {"q": "Nerve impulses depend on ___ created by the Na⁺/K⁺ pump:", "a": ["Nothing", "Electrochemical gradient", "Only heat", "Only light"], "c": 1}, {"q": "Muscle contraction requires ___ released from the sarcoplasmic reticulum:", "a": ["Na⁺", "Ca²⁺", "K⁺", "Cl⁻"], "c": 1}]}, {"id": "bio-l7", "title": "Lesson 7: Sugar Metabolism", "ln": "BIO · L7", "notes": [{"heading": "Cellular Respiration — Overview", "body": "The process of converting <b>glucose (C₆H₁₂O₆) into ATP</b>. Overall equation: <b>C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ~30-32 ATP</b>. Occurs in the <b>cytoplasm</b> (glycolysis) and <b>mitochondria</b> (pyruvate oxidation, Krebs, ETC). <b>Exergonic</b> process (ΔG = −686 kcal/mol). Energy is released in small steps, not all at once, and captured in ATP and electron carriers (NADH, FADH₂)."}, {"heading": "Four Stages of Cellular Respiration", "body": "<b>1) Glycolysis</b> (cytoplasm). <b>2) Pyruvate oxidation</b> (mitochondrial matrix). <b>3) Krebs cycle / Citric acid cycle</b> (mitochondrial matrix). <b>4) Electron transport chain & oxidative phosphorylation</b> (inner mitochondrial membrane). Glycolysis is <b>anaerobic</b> (no O₂ needed). Steps 2-4 are <b>aerobic</b> (require O₂)."}, {"heading": "Glycolysis — Overview", "body": "<b>Glycolysis</b> = 'sugar splitting.' Occurs in the <b>cytoplasm</b>. Converts <b>1 glucose (6C) → 2 pyruvate (3C)</b>. <b>10 enzyme-catalyzed steps</b> in two phases. Does NOT require oxygen (anaerobic). Found in virtually all living organisms — considered one of the oldest metabolic pathways. Net yield per glucose: <b>2 ATP, 2 NADH, 2 pyruvate</b>."}, {"heading": "Glycolysis — Energy Investment Phase", "body": "<b>Steps 1-5:</b> the cell <b>SPENDS 2 ATP</b> to phosphorylate glucose. Glucose → glucose-6-phosphate → fructose-6-phosphate → <b>fructose-1,6-bisphosphate</b>. Then split into <b>2 three-carbon molecules</b> (G3P — glyceraldehyde-3-phosphate). Key enzyme: <b>phosphofructokinase (PFK)</b> — the major regulatory/rate-limiting enzyme of glycolysis. Inhibited by ATP (feedback inhibition), activated by AMP."}, {"heading": "Glycolysis — Energy Payoff Phase", "body": "<b>Steps 6-10:</b> each G3P is oxidized → <b>pyruvate</b>. Per G3P: 1 NADH + 2 ATP (by substrate-level phosphorylation). Since there are <b>2 G3P</b> per glucose: total payoff = <b>4 ATP + 2 NADH</b>. <b>Net gain = 4 − 2 invested = 2 ATP + 2 NADH + 2 pyruvate</b>. <b>Substrate-level phosphorylation:</b> direct transfer of phosphate from substrate to ADP → ATP (no ETC needed)."}, {"heading": "Pyruvate Oxidation (The Link Reaction)", "body": "Pyruvate (3C) enters the <b>mitochondrial matrix</b>. Enzyme: <b>pyruvate dehydrogenase complex</b>. Pyruvate is: <b>1)</b> Decarboxylated (loses 1 CO₂). <b>2)</b> Oxidized (NAD⁺ → NADH). <b>3)</b> Linked to <b>Coenzyme A</b> → forming <b>acetyl-CoA (2C)</b>. Per glucose (2 pyruvates): <b>2 CO₂ + 2 NADH + 2 acetyl-CoA</b>. Acetyl-CoA enters the Krebs cycle. This step is <b>irreversible</b>."}, {"heading": "Krebs Cycle (Citric Acid Cycle) — Overview", "body": "Occurs in <b>mitochondrial matrix</b>. <b>Acetyl-CoA (2C)</b> combines with <b>oxaloacetate (OAA, 4C)</b> → <b>citrate (6C)</b>. Through 8 enzyme-catalyzed steps, citrate is oxidized back to OAA, releasing energy. Per acetyl-CoA: <b>2 CO₂ + 3 NADH + 1 FADH₂ + 1 GTP (≈1 ATP)</b>. Per glucose (2 turns): <b>4 CO₂ + 6 NADH + 2 FADH₂ + 2 GTP</b>. The cycle <b>regenerates OAA</b> to continue."}, {"heading": "Krebs Cycle — Key Steps", "body": "<b>Step 1:</b> Acetyl-CoA + OAA → citrate (6C). Enzyme: <b>citrate synthase</b>. <b>Steps 3-4:</b> two decarboxylations release 2 CO₂ + produce 2 NADH (isocitrate dehydrogenase, α-ketoglutarate dehydrogenase). <b>Step 5:</b> substrate-level phosphorylation → 1 GTP. <b>Step 6:</b> FADH₂ produced (succinate dehydrogenase). <b>Steps 7-8:</b> 1 more NADH, OAA regenerated. <b>Isocitrate dehydrogenase</b> is the rate-limiting enzyme."}, {"heading": "Electron Transport Chain (ETC) — Overview", "body": "Located on the <b>inner mitochondrial membrane (cristae)</b>. Series of <b>protein complexes (I-IV)</b> and mobile carriers that transfer electrons from NADH and FADH₂ to <b>O₂</b> (the final electron acceptor). Energy released during electron transfer is used to <b>pump H⁺ (protons)</b> from matrix into intermembrane space, creating a <b>proton gradient (proton-motive force)</b>."}, {"heading": "ETC — The Four Complexes", "body": "<b>Complex I (NADH dehydrogenase):</b> accepts electrons from NADH, pumps 4 H⁺. <b>Complex II (succinate dehydrogenase):</b> accepts electrons from FADH₂, NO proton pumping (less ATP). <b>Complex III (cytochrome bc1):</b> transfers electrons via <b>ubiquinone (CoQ)</b>, pumps 4 H⁺. <b>Complex IV (cytochrome c oxidase):</b> transfers electrons via <b>cytochrome c</b> to O₂, pumps 2 H⁺. O₂ + 4e⁻ + 4H⁺ → <b>2H₂O</b>."}, {"heading": "Chemiosmosis & ATP Synthase", "body": "H⁺ ions pumped into the <b>intermembrane space</b> create a <b>concentration + charge gradient</b> (proton-motive force). H⁺ flows back through <b>ATP synthase</b> (Complex V) — a molecular turbine. This flow drives <b>oxidative phosphorylation:</b> ADP + Pᵢ → ATP. <b>~2.5 ATP per NADH, ~1.5 ATP per FADH₂</b>. Peter Mitchell proposed the <b>chemiosmotic hypothesis</b> (Nobel Prize 1978)."}, {"heading": "Oxygen's Role", "body": "<b>O₂ is the final electron acceptor</b> in the ETC. Without O₂, electrons can't flow → ETC stops → NADH/FADH₂ can't be recycled → Krebs stops → only glycolysis can continue (anaerobic). O₂ picks up electrons and H⁺ to form <b>H₂O</b> (water is a byproduct of respiration). This is why we <b>breathe</b> — to supply O₂ for the ETC and remove CO₂."}, {"heading": "Total ATP Yield per Glucose", "body": "<b>Glycolysis:</b> 2 ATP + 2 NADH (→ ~5 ATP). <b>Pyruvate oxidation:</b> 2 NADH (→ ~5 ATP). <b>Krebs cycle:</b> 2 GTP + 6 NADH (→ ~15 ATP) + 2 FADH₂ (→ ~3 ATP). <b>Total: ~30-32 ATP per glucose</b>. Older textbooks said 36-38; newer estimates are lower due to transport costs. <b>~34% energy efficiency</b> (rest lost as heat). Still much better than any human-made engine."}, {"heading": "Fermentation — Anaerobic Pathways", "body": "When O₂ is absent, cells use <b>fermentation</b> to regenerate NAD⁺ from NADH so glycolysis can continue. Does NOT produce additional ATP beyond glycolysis (net 2 ATP only). Two main types: <b>1) Lactic acid fermentation:</b> pyruvate → <b>lactate</b> (in muscles during intense exercise, some bacteria). <b>2) Alcohol (ethanol) fermentation:</b> pyruvate → <b>ethanol + CO₂</b> (in yeast, some bacteria — used for beer, wine, bread)."}, {"heading": "Lactic Acid Fermentation", "body": "<b>Pyruvate + NADH → lactate + NAD⁺</b>. Occurs in <b>muscle cells</b> during intense exercise when O₂ delivery can't keep up. Also used by some bacteria (yogurt, cheese, sauerkraut production). Lactate buildup causes <b>muscle fatigue and burning</b>. Lactate is later transported to the liver and converted back to pyruvate or glucose (<b>Cori cycle</b>). Only produces <b>2 ATP per glucose</b>."}, {"heading": "Alcohol Fermentation", "body": "<b>Pyruvate → acetaldehyde + CO₂ → ethanol + NAD⁺</b>. Two steps: first decarboxylation (CO₂ released), then reduction (NADH → NAD⁺). Performed by <b>yeast (Saccharomyces cerevisiae)</b> and some bacteria. <b>CO₂</b> makes bread rise and beer/champagne fizzy. <b>Ethanol</b> is the alcohol in beverages. Only <b>2 ATP per glucose</b>. Ethanol is toxic to yeast above ~12-14% concentration."}, {"heading": "Aerobic vs Anaerobic Comparison", "body": "<b>Aerobic respiration:</b> requires O₂, yields ~30-32 ATP, complete oxidation of glucose → CO₂ + H₂O. <b>Anaerobic fermentation:</b> no O₂, yields only 2 ATP, incomplete oxidation → lactate or ethanol + CO₂. Aerobic is <b>~15-16× more efficient</b>. Fermentation is an emergency/temporary pathway. Some organisms are <b>obligate anaerobes</b> (die in O₂), <b>facultative anaerobes</b> (switch between), or <b>obligate aerobes</b> (require O₂)."}, {"heading": "Regulation of Cellular Respiration", "body": "Key regulatory enzymes: <b>PFK (glycolysis)</b> — inhibited by ATP and citrate, activated by AMP and ADP. <b>Isocitrate dehydrogenase (Krebs)</b> — inhibited by ATP, activated by ADP. <b>Pyruvate dehydrogenase</b> — inhibited by acetyl-CoA, NADH, ATP. Overall: <b>high ATP = slow down; high ADP/AMP = speed up</b>. This is <b>feedback inhibition</b> — supply meets demand."}, {"heading": "Other Fuel Molecules", "body": "Not just glucose — cells can also burn <b>fats and proteins</b> for ATP. <b>Fats:</b> glycerol → G3P (enters glycolysis); fatty acids → acetyl-CoA via <b>β-oxidation</b> (enters Krebs). Fats yield MUCH more ATP per gram (~129 ATP per 16C fatty acid) because they have more C-H bonds. <b>Proteins:</b> amino acids → deaminated → various intermediates (pyruvate, acetyl-CoA, Krebs intermediates). Proteins are used as fuel mainly during starvation."}, {"heading": "Redox Reactions in Respiration", "body": "Cellular respiration is a series of <b>redox reactions</b>. Glucose is <b>oxidized</b> (loses electrons/hydrogen → CO₂). O₂ is <b>reduced</b> (gains electrons/hydrogen → H₂O). Electron carriers NAD⁺ and FAD shuttle electrons: <b>NAD⁺ → NADH</b> (gains 2e⁻ + H⁺); <b>FAD → FADH₂</b> (gains 2e⁻ + 2H⁺). These carry high-energy electrons to the ETC where the energy is used to make ATP."}, {"heading": "Substrate-Level vs Oxidative Phosphorylation", "body": "<b>Substrate-level phosphorylation:</b> direct transfer of phosphate from a substrate to ADP → ATP. Occurs in glycolysis (2 ATP) and Krebs cycle (2 GTP). No O₂ or ETC required. <b>Oxidative phosphorylation:</b> ATP produced by ATP synthase using the proton gradient generated by ETC. Requires O₂. Produces the vast majority of ATP (~26-28 of the ~30-32 total)."}, {"heading": "Key Concepts Summary", "body": "<b>Glycolysis:</b> cytoplasm, glucose→2 pyruvate, net 2 ATP + 2 NADH, anaerobic, PFK rate-limiting. <b>Pyruvate oxidation:</b> matrix, pyruvate→acetyl-CoA + CO₂ + NADH. <b>Krebs:</b> matrix, 2 turns per glucose, 4 CO₂ + 6 NADH + 2 FADH₂ + 2 GTP. <b>ETC:</b> inner membrane, complexes I-IV, O₂ final acceptor→H₂O. <b>Chemiosmosis:</b> H⁺ gradient drives ATP synthase. <b>Total: ~30-32 ATP.</b> <b>Fermentation:</b> no O₂, 2 ATP only, lactic acid (muscles) or ethanol (yeast)."}], "quiz": [{"q": "Overall equation: C₆H₁₂O₆ + 6O₂ →:", "a": ["6CO₂ + 6H₂O + ATP", "6O₂ + glucose", "Only CO₂", "Only water"], "c": 0}, {"q": "Glycolysis occurs in the:", "a": ["Mitochondria", "Cytoplasm", "Nucleus", "ER"], "c": 1}, {"q": "Krebs cycle occurs in the:", "a": ["Cytoplasm", "Mitochondrial matrix", "Inner membrane", "Nucleus"], "c": 1}, {"q": "ETC is on the:", "a": ["Outer membrane", "Inner mitochondrial membrane (cristae)", "Cell membrane", "ER"], "c": 1}, {"q": "Glycolysis is:", "a": ["Aerobic", "Anaerobic (no O₂ needed)", "Only in plants", "Only in animals"], "c": 1}, {"q": "Glycolysis converts 1 glucose into:", "a": ["1 pyruvate", "2 pyruvate", "3 pyruvate", "6 CO₂"], "c": 1}, {"q": "Net ATP from glycolysis per glucose:", "a": ["0", "2", "4", "10"], "c": 1}, {"q": "Glycolysis also produces ___ NADH per glucose:", "a": ["0", "1", "2", "6"], "c": 2}, {"q": "The energy investment phase uses ___ ATP:", "a": ["0", "1", "2", "4"], "c": 2}, {"q": "The payoff phase produces ___ ATP total:", "a": ["2", "4", "6", "10"], "c": 1}, {"q": "PFK is the rate-limiting enzyme of:", "a": ["Krebs cycle", "Glycolysis", "ETC", "Fermentation"], "c": 1}, {"q": "PFK is inhibited by:", "a": ["AMP", "ATP and citrate (feedback inhibition)", "ADP", "Glucose"], "c": 1}, {"q": "Substrate-level phosphorylation transfers phosphate from:", "a": ["ATP to substrate", "Substrate directly to ADP → ATP", "O₂ to ADP", "NADH to ADP"], "c": 1}, {"q": "Pyruvate oxidation produces ___ per pyruvate:", "a": ["ATP", "Acetyl-CoA + CO₂ + NADH", "Glucose", "Lactate"], "c": 1}, {"q": "Acetyl-CoA has ___ carbons:", "a": ["1", "2", "3", "6"], "c": 1}, { rt and cheese use ___ fermentation:", "a": ["Alcohol", "Lactic acid", "Neither", "Acetic acid"], "c": 1}, {"q": "Aerobic respiration is ___× more efficient than fermentation:", "a": ["2", "5", "15-16", "100"], "c": 2}, {"q": "Obligate anaerobes:", "a": ["Require O₂", "Die in O₂", "Switch between", "Need both"], "c": 1}, {"q": "Facultative anaerobes:", "a": ["Only use O₂", "Switch between aerobic and anaerobic", "Die without O₂", "Only ferment"], "c": 1}, {"q": "Obligate aerobes:", "a": ["Die in O₂", "Require O₂", "Only ferment", "Don't use ATP"], "c": 1}, {"q": "High ATP levels ___ cellular respiration:", "a": ["Speed up", "Slow down (feedback inhibition)", "Don't affect", "Stop permanently"], "c": 1}, {"q": "High ADP/AMP levels ___ cellular respiration:", "a": ["Slow down", "Speed up", "Don't affect", "Stop"], "c": 1}, {"q": "Fats enter respiration via:", "a": ["Only glycolysis", "β-oxidation → acetyl-CoA (Krebs)", "Only fermentation", "Only ETC"], "c": 1}, {"q": "Glycerol from fats enters:", "a": ["Krebs directly", "Glycolysis (as G3P)", "ETC", "Fermentation"], "c": 1}, {"q": "A 16C fatty acid yields ~___ ATP:", "a": ["32", "64", "129", "200"], "c": 2}, {"q": "Fats yield more ATP because they have more:", "a": ["Nitrogen", "C-H bonds", "Oxygen", "Water"], "c": 1}, {"q": "Proteins are used for fuel mainly during:", "a": ["Normal eating", "Starvation", "Sleep", "Exercise only"], "c": 1}, {"q": "Amino acids are ___ before entering respiration:", "a": ["Phosphorylated", "Deaminated (amino group removed)", "Oxidized by O₂", "Fermented"], "c": 1}, {"q": "Glucose is ___ during respiration:", "a": ["Reduced", "Oxidized (loses electrons)", "Neither", "Created"], "c": 1}, {"q": "O₂ is ___ during respiration:", "a": ["Oxidized", "Reduced (gains electrons)", "Neither", "Destroyed"], "c": 1}, {"q": "NAD⁺ is the ___ form (ready to accept electrons):", "a": ["Reduced", "Oxidized", "Neutral", "Inactive"], "c": 1}, {"q": "NADH is the ___ form (carrying electrons):", "a": ["Oxidized", "Reduced", "Neutral", "Empty"], "c": 1}, {"q": "Oxidative phosphorylation produces ~___% of total ATP:", "a": ["10", "50", "~85-90", "100"], "c": 2}, {"q": "We breathe to supply ___ for the ETC:", "a": ["CO₂", "N₂", "O₂", "Glucose"], "c": 2}, {"q": "We exhale ___ as a waste product:", "a": ["O₂", "CO₂", "N₂", "H₂O only"], "c": 1}, {"q": "Water is produced at Complex:", "a": ["I", "II", "III", "IV (cytochrome c oxidase)"], "c": 3}, {"q": "The Cori cycle converts ___ back to glucose in the liver:", "a": ["Ethanol", "Lactate", "Fat", "Protein"], "c": 1}, {"q": "Muscle fatigue is partly caused by:", "a": ["Too much ATP", "Lactate buildup", "Too much O₂", "Excess glucose"], "c": 1}, {"q": "G3P stands for:", "a": ["Glucose-3-phosphate", "Glyceraldehyde-3-phosphate", "Glycogen-3-phosphate", "Galactose-3-phosphate"], "c": 1}, {"q": "Fructose-1,6-bisphosphate has ___ phosphate groups:", "a": ["0", "1", "2", "3"], "c": 2}, {"q": "Citrate has ___ carbons:", "a": ["2", "4", "6", "8"], "c": 2}, {"q": "OAA has ___ carbons:", "a": ["2", "4", "6", "8"], "c": 1}, {"q": "Succinate dehydrogenase is in both the Krebs cycle and:", "a": ["Glycolysis", "Complex II of the ETC", "Fermentation", "Nucleus"], "c": 1}, {"q": "ATP synthase works like a molecular:", "a": ["Pump", "Turbine/motor", "Scissors", "Glue"], "c": 1}, {"q": "H⁺ flows through ATP synthase from ___ to ___:", "a": ["Matrix to intermembrane", "Intermembrane space to matrix", "Cytoplasm to nucleus", "ER to Golgi"], "c": 1}, {"q": "The inner membrane must be ___ for chemiosmosis to work:", "a": ["Permeable", "Impermeable to H⁺ (except through ATP synthase)", "Destroyed", "Open"], "c": 1}, {"q": "Cyanide blocks Complex IV, which stops:", "a": ["Glycolysis", "The entire ETC → no oxidative phosphorylation", "Only Krebs", "Only fermentation"], "c": 1}, {"q": "Rotenone (pesticide) blocks Complex:", "a": ["II", "III", "IV", "I"], "c": 3}, {"q": "DNP (uncoupler) dissipates the H⁺ gradient →:", "a": ["More ATP", "No ATP from chemiosmosis (energy lost as heat)", "More NADH", "More O₂"], "c": 1}, {"q": "Cristae increase surface area for:", "a": ["Glycolysis", "ETC and ATP synthase (more ATP production)", "Krebs", "Fermentation"], "c": 1}, {"q": "Acetyl-CoA is a 2-carbon unit attached to:", "a": ["NAD⁺", "Coenzyme A", "FAD", "ATP"], "c": 1}, {"q": "Per glucose, total NADH from all stages:", "a": ["2", "6", "10", "12"], "c": 2}, {"q": "Per glucose, total FADH₂:", "a": ["0", "1", "2", "4"], "c": 2}, {"q": "The 10 NADH per glucose produce ~___ ATP:", "a": ["10", "15", "25", "50"], "c": 2}, {"q": "The 2 FADH₂ per glucose produce ~___ ATP:", "a": ["2", "3", "5", "10"], "c": 1}, {"q": "Glycolysis is considered ancient because:", "a": ["It's slow", "It's found in virtually all organisms", "It requires mitochondria", "It needs O₂"], "c": 1}, {"q": "Pyruvate oxidation is ___ (cannot be reversed):", "a": ["Reversible", "Irreversible", "Optional", "Spontaneous only"], "c": 1}, {"q": "The Krebs cycle is also called the ___ acid cycle:", "a": ["Lactic", "Citric", "Acetic", "Amino"], "c": 1}, {"q": "Beer and champagne are fizzy because of:", "a": ["Added air", "CO₂ from alcohol fermentation", "O₂", "N₂"], "c": 1}, {"q": "ΔG of glucose oxidation:", "a": ["+686 kcal/mol", "−686 kcal/mol", "0 kcal/mol", "+100 kcal/mol"], "c": 1}, {"q": "Energy from glucose is released in ___ steps, not all at once:", "a": ["1", "2", "Small", "Large"], "c": 2}, {"q": "The energy investment phase is steps:", "a": ["1-5", "6-10", "1-10", "Only step 1"], "c": 0}, {"q": "The payoff phase is steps:", "a": ["1-5", "6-10", "1-3", "Only step 10"], "c": 1}, {"q": "Glucose-6-phosphate is formed in step ___ of glycolysis:", "a": ["1", "5", "6", "10"], "c": 0}, {"q": "Hexokinase catalyzes which step?", "a": ["Step 1 (glucose → glucose-6-phosphate)", "Step 10", "Krebs entry", "Pyruvate oxidation"], "c": 0}, {"q": "NADH carries ___ electrons:", "a": ["1", "2", "4", "6"], "c": 1}, {"q": "FAD accepts ___ electrons and ___ H⁺:", "a": ["1/1", "2/2 ading", "Cooling"], "c": 1}, {"q": "Sauerkraut is made by ___ fermentation:", "a": ["Alcohol", "Lactic acid", "Neither", "Acetic acid"], "c": 1}, {"q": "Kimchi uses ___ fermentation:", "a": ["Alcohol", "Lactic acid", "Neither", "Both"], "c": 1}, {"q": "Marathon runners 'hit the wall' when ___ is depleted:", "a": ["Water", "Glycogen (glucose reserves)", "DNA", "Protein"], "c": 1}, {"q": "After glycogen depletion, the body burns more:", "a": ["Glucose", "Fat (via β-oxidation)", "DNA", "Water"], "c": 1}, {"q": "β-oxidation occurs in the:", "a": ["Cytoplasm", "Mitochondrial matrix", "Nucleus", "ER"], "c": 1}, {"q": "Each cycle of β-oxidation removes a ___ carbon unit:", "a": ["1", "2 (as acetyl-CoA)", "3", "6"], "c": 1}, {"q": "Deamination of amino acids removes the:", "a": ["Carboxyl group", "Amino group (—NH₂) → becomes urea", "Hydroxyl group", "R-group"], "c": 1}, {"q": "Urea (from deamination) is excreted by the:", "a": ["Lungs", "Kidneys (in urine)", "Skin", "Liver only"], "c": 1}, {"q": "The Krebs cycle is 'amphibolic' meaning it's both:", "a": ["Fast and slow", "Catabolic AND anabolic", "Aerobic and anaerobic", "Simple and complex"], "c": 1}, {"q": "Krebs intermediates can be used to synthesize:", "a": ["Only CO₂", "Amino acids, fatty acids, glucose (biosynthesis)", "Only ATP", "Nothing"], "c": 1}, {"q": "Gluconeogenesis is the synthesis of glucose from:", "a": ["Fat only", "Non-carbohydrate precursors (pyruvate, amino acids)", "DNA", "Only glycogen"], "c": 1}, {"q": "Gluconeogenesis occurs mainly in the:", "a": ["Muscle", "Liver", "Brain", "Heart"], "c": 1}, {"q": "Pyruvate kinase catalyzes the last step of glycolysis producing:", "a": ["G3P", "Pyruvate + ATP", "Glucose", "Citrate"], "c": 1}, {"q": "NAD⁺ is regenerated in fermentation by:", "a": ["ETC", "Reducing pyruvate to lactate or ethanol", "Krebs cycle", "Complex I"], "c": 1}, {"q": "Fermentation is important because without NAD⁺:", "a": ["Krebs stops", "Glycolysis stops (no electron acceptor)", "ETC stops", "Nothing stops"], "c": 1}, {"q": "The 2 ATP from glycolysis are made by:", "a": ["Oxidative phosphorylation", "Substrate-level phosphorylation", "Chemiosmosis", "Fermentation"], "c": 1}, {"q": "The 2 GTP from Krebs are made by:", "a": ["Oxidative phosphorylation", "Substrate-level phosphorylation", "Chemiosmosis", "Fermentation"], "c": 1}, {"q": "~26-28 ATP are from:", "a": ["Substrate-level phosphorylation", "Oxidative phosphorylation (ETC/chemiosmosis)", "Glycolysis only", "Fermentation"], "c": 1}, {"q": "The inner mitochondrial membrane is impermeable to:", "a": ["O₂", "H⁺ ions (must use ATP synthase)", "CO₂", "Water"], "c": 1}, {"q": "Peter Mitchell won the Nobel Prize for:", "a": ["DNA structure", "Chemiosmotic hypothesis", "Cell theory", "Penicillin"], "c": 1}, {"q": "Older textbooks listed ___ ATP per glucose:", "a": ["2", "10", "36-38", "100"], "c": 2}, {"q": "Current estimates are lower (~30-32) due to:", "a": ["Counting errors", "Transport costs of NADH across membranes", "Better glucose", "Less O₂"], "c": 1}, {"q": "The respiratory quotient (RQ) for glucose is:", "a": ["0.7", "0.8", "1.0", "1.5"], "c": 2}, {"q": "RQ = CO₂ produced ÷:", "a": ["ATP made", "O₂ consumed", "NADH made", "Glucose used"], "c": 1}, {"q": "RQ of 0.7 indicates ___ is being burned:", "a": ["Glucose", "Fat", "Protein", "Alcohol"], "c": 1}, {"q": "Cellular respiration is the reverse of:", "a": ["Fermentation", "Photosynthesis (in terms of overall equation)", "Glycolysis", "Krebs cycle"], "c": 1}, {"q": "Both aerobic and anaerobic pathways begin with:", "a": ["Krebs cycle", "Glycolysis", "ETC", "Pyruvate oxidation"], "c": 1}, {"q": "The 'payoff' of respiration is:", "a": ["CO₂", "H₂O", "ATP (energy currency)", "NADH only"], "c": 2}]}, {"id": "bio-l8", "title": "Lesson 8: Photosynthesis", "ln": "BIO · L8", "notes": [{"heading": "Photosynthesis — Overview", "body": "Process that converts <b>light energy → chemical energy</b> (glucose). Overall: <b>6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂</b>. Occurs in <b>chloroplasts</b> of plants, algae, and some bacteria. Essentially the <b>reverse of cellular respiration</b>. <b>Autotrophs</b> (producers) use photosynthesis; <b>heterotrophs</b> (consumers) depend on them. Photosynthesis is the ultimate source of almost all food and O₂ on Earth."}, {"heading": "Chloroplast Structure", "body": "Double membrane organelle. Internal <b>thylakoid membrane</b> system: thylakoids stacked into <b>grana</b> (singular: granum). <b>Thylakoid lumen:</b> space inside thylakoids. <b>Stroma:</b> fluid outside thylakoids (inside chloroplast). <b>Light reactions</b> occur in/on <b>thylakoid membranes</b>. <b>Calvin cycle</b> occurs in the <b>stroma</b>. Contains own DNA and ribosomes (endosymbiotic origin from cyanobacteria)."}, {"heading": "Light & the Electromagnetic Spectrum", "body": "Light is <b>electromagnetic radiation</b> traveling in waves. <b>Wavelength</b> determines color/type. Visible light: ~380 nm (violet) to 750 nm (red). Shorter wavelength = higher energy (violet > red). <b>Photons:</b> packets of light energy. Plants absorb specific wavelengths and reflect others. Green light is <b>reflected</b> (not absorbed) — which is why plants appear green."}, {"heading": "Pigments", "body": "<b>Pigments</b> absorb specific wavelengths of light. <b>Chlorophyll a:</b> primary pigment, absorbs blue-violet and red, reflects green. Directly participates in light reactions. <b>Chlorophyll b:</b> accessory pigment, absorbs blue and orange, reflects yellow-green. Broadens absorption range. <b>Carotenoids:</b> accessory pigments (orange/yellow), absorb blue-green. Also photoprotective (absorb excess energy that could damage chlorophyll)."}, {"heading": "Absorption vs Action Spectrum", "body": "<b>Absorption spectrum:</b> graph showing which wavelengths a pigment <b>absorbs</b>. Chlorophyll a absorbs most at ~430 nm (blue) and ~662 nm (red). <b>Action spectrum:</b> graph showing the rate of photosynthesis at each wavelength. Closely matches the absorption spectrum. Having multiple pigments broadens the action spectrum — more wavelengths of light can drive photosynthesis."}, {"heading": "Two Stages of Photosynthesis", "body": "<b>1) Light-dependent reactions (light reactions):</b> occur in <b>thylakoid membranes</b>. Use light energy to split water, produce O₂, generate ATP and NADPH. <b>2) Light-independent reactions (Calvin cycle):</b> occur in <b>stroma</b>. Use ATP and NADPH from light reactions to fix CO₂ into sugar (G3P). Don't directly need light but depend on products of light reactions."}, {"heading": "Light Reactions — Photosystem II (PSII)", "body": "Light hits <b>Photosystem II</b> first (numbered by discovery order). <b>P680</b> reaction center chlorophyll absorbs light → electron excited to higher energy → passed to electron transport chain. <b>Water splitting (photolysis):</b> H₂O → 2H⁺ + ½O₂ + 2e⁻. Electrons from water <b>replace</b> those lost by P680. This is where <b>O₂ is produced</b> as a byproduct. H⁺ released into thylakoid lumen."}, {"heading": "Light Reactions — Electron Transport Chain", "body": "Excited electrons from PSII pass through an <b>ETC</b> embedded in the thylakoid membrane. Key carrier: <b>plastoquinone (PQ)</b>. Electrons move through <b>cytochrome b6f complex</b> → <b>plastocyanin (PC)</b>. Energy from electron flow is used to <b>pump H⁺ into the thylakoid lumen</b> → builds a proton gradient for ATP synthesis (just like mitochondrial ETC)."}, {"heading": "Light Reactions — Photosystem I (PSI)", "body": "Electrons arrive at <b>Photosystem I</b>. <b>P700</b> reaction center absorbs light → re-energizes electrons. Electrons pass through <b>ferredoxin</b> to <b>NADP⁺ reductase</b>. Final step: <b>NADP⁺ + 2e⁻ + H⁺ → NADPH</b>. NADPH is a key product — carries high-energy electrons to the Calvin cycle. PSI does NOT split water and does NOT produce O₂."}, {"heading": "Chemiosmosis in Chloroplasts", "body": "H⁺ accumulates in <b>thylakoid lumen</b> from: water splitting (PSII) and proton pumping (ETC). Creates a <b>proton gradient</b> (high H⁺ in lumen, low in stroma). H⁺ flows through <b>ATP synthase</b> in the thylakoid membrane → drives <b>photophosphorylation</b>: ADP + Pᵢ → <b>ATP</b>. Same principle as in mitochondria (chemiosmosis), but in chloroplasts."}, {"heading": "Light Reactions Summary", "body": "Inputs: <b>H₂O, light, NADP⁺, ADP + Pᵢ</b>. Outputs: <b>O₂, ATP, NADPH</b>. Noncyclic electron flow: PSII → ETC → PSI → NADPH. Water is split at PSII → O₂ released. ATP made by chemiosmosis. <b>Cyclic electron flow:</b> alternative pathway — electrons from PSI cycle back to the ETC → makes ATP but NO NADPH and NO O₂. Used when cell needs more ATP than NADPH."}, {"heading": "Calvin Cycle — Overview", "body": "Also called <b>light-independent reactions</b> or <b>C3 pathway</b> (first product is a 3-carbon molecule). Occurs in the <b>stroma</b>. Uses <b>ATP and NADPH</b> from light reactions to convert CO₂ → <b>G3P (glyceraldehyde-3-phosphate)</b>, which is used to build glucose and other organic molecules. Named after <b>Melvin Calvin</b> (Nobel Prize). Three stages: fixation, reduction, regeneration."}, {"heading": "Calvin Cycle — Three Stages", "body": "<b>1) Carbon fixation:</b> CO₂ + <b>RuBP (5C)</b> → 2 molecules of <b>3-PGA (3C)</b>. Enzyme: <b>RuBisCO</b> (most abundant protein on Earth). <b>2) Reduction:</b> 3-PGA → <b>G3P</b> using ATP and NADPH. <b>3) Regeneration of RuBP:</b> some G3P molecules are rearranged using ATP to regenerate RuBP so the cycle continues. <b>3 turns of the cycle fix 3 CO₂</b> → net gain of <b>1 G3P (3C)</b>. 6 turns → 2 G3P → 1 glucose (6C)."}, {"heading": "RuBisCO", "body": "<b>Ribulose-1,5-bisphosphate carboxylase/oxygenase</b>. The enzyme that fixes CO₂ in the Calvin cycle. <b>Most abundant protein on Earth</b> (~25% of leaf protein). Relatively <b>slow</b> (~3-10 CO₂/sec). Has a flaw: can also fix <b>O₂ instead of CO₂</b> → leads to <b>photorespiration</b> (wasteful — consumes O₂ and releases CO₂ without making sugar or ATP)."}, {"heading": "Photorespiration & C3 Plants", "body": "<b>Photorespiration:</b> RuBisCO fixes O₂ instead of CO₂ → produces toxic 2-phosphoglycolate → must be recycled, wasting energy. Increases in <b>hot, dry conditions</b> (stomata close → CO₂ drops, O₂ rises inside leaf). <b>C3 plants</b> (most plants — rice, wheat, soybeans) are most vulnerable. Can lose <b>25-50%</b> of fixed carbon to photorespiration on hot days."}, {"heading": "C4 Photosynthesis", "body": "<b>C4 plants</b> (corn, sugarcane, crabgrass) minimize photorespiration using <b>spatial separation</b>. CO₂ first fixed by <b>PEP carboxylase</b> (no oxygenase activity) in <b>mesophyll cells</b> → 4C compound (oxaloacetate → malate). Malate shuttled to <b>bundle sheath cells</b> → releases CO₂ at high concentration → RuBisCO fixes it normally. PEP carboxylase has <b>higher affinity for CO₂</b> and no O₂ binding. Efficient in hot, bright conditions."}, {"heading": "CAM Photosynthesis", "body": "<b>CAM (Crassulacean Acid Metabolism)</b> plants (cacti, succulents, pineapple) use <b>temporal separation</b>. <b>Night:</b> stomata OPEN → CO₂ fixed by PEP carboxylase → stored as malate in vacuoles. <b>Day:</b> stomata CLOSE (conserve water) → malate releases CO₂ → Calvin cycle runs using stored CO₂. Extremely water-efficient. Adapted to <b>arid/desert</b> environments."}, {"heading": "Stomata & Gas Exchange", "body": "<b>Stomata:</b> tiny pores on leaf surfaces (mostly underside). Surrounded by two <b>guard cells</b> that open/close the pore. <b>Open:</b> CO₂ enters, O₂ exits, H₂O exits (transpiration). <b>Closed:</b> conserves water but limits CO₂ intake. Guard cells swell (open) when they take up K⁺ and water. Stomata close in hot/dry conditions → triggers photorespiration in C3 plants."}, {"heading": "Factors Affecting Photosynthesis Rate", "body": "<b>Light intensity:</b> increases rate to a saturation point. <b>CO₂ concentration:</b> increases rate to a saturation point. <b>Temperature:</b> optimal range (~25-35°C for most plants); too hot → enzymes denature, stomata close. <b>Water availability:</b> needed for light reactions (photolysis) and to keep stomata open. <b>Wavelength:</b> red and blue light are most effective (green least absorbed)."}, {"heading": "Photosynthesis & Respiration Compared", "body": "<b>Photosynthesis:</b> CO₂ + H₂O + light → glucose + O₂. In chloroplasts. Stores energy. Anabolic. <b>Respiration:</b> glucose + O₂ → CO₂ + H₂O + ATP. In mitochondria. Releases energy. Catabolic. They are <b>complementary</b> — products of one are reactants of the other. Both use chemiosmosis and ETC, but in different organelles."}, {"heading": "Key Concepts Summary", "body": "<b>6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂.</b> <b>Light reactions:</b> thylakoid membrane, PSII (P680, water splitting → O₂) → ETC → PSI (P700, → NADPH). ATP via chemiosmosis. <b>Calvin cycle:</b> stroma, CO₂ fixation by RuBisCO → 3-PGA → G3P using ATP + NADPH. 6 turns = 1 glucose. <b>Photorespiration:</b> RuBisCO fixes O₂ (wasteful). <b>C4:</b> spatial separation (PEP carboxylase). <b>CAM:</b> temporal separation (night CO₂ fixation). <b>Stomata:</b> guard cells control gas exchange."}], "quiz": [{"q": "Overall photosynthesis equation:", "a": ["C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O", "6CO₂ + 6H₂O + light → C₆H₁₂O₆ + 6O₂", "6O₂ → 6CO₂", "H₂O → H₂ + O₂"], "c": 1}, {"q": "Photosynthesis occurs in:", "a": ["Mitochondria", "Chloroplasts", "Nucleus", "ER"], "c": 1}, {"q": "Autotrophs are:", "a": ["Consumers", "Producers (make own food)", "Decomposers", "Parasites"], "c": 1}, {"q": "Light reactions occur in/on:", "a": ["Stroma", "Thylakoid membranes", "Matrix", "Cytoplasm"], "c": 1}, {"q": "Calvin cycle occurs in:", "a": ["Thylakoids", "Stroma", "Cytoplasm", "Nucleus"], "c": 1}, {"q": "Thylakoids stacked together form:", "a": ["Stroma", "Grana", "Cristae", "Matrix"], "c": 1}, {"q": "Visible light ranges from ~___ to ~___ nm:", "a": ["100-300", "380-750", "800-1000", "1-100"], "c": 1}, {"q": "Shorter wavelengths have ___ energy:", "a": ["Less", "Higher", "Same", "No"], "c": 1}, {"q": "Plants appear green because they ___ green light:", "a": ["Absorb", "Reflect", "Destroy", "Create"], "c": 1}, {"q": "The primary photosynthetic pigment is:", "a": ["Chlorophyll b", "Carotenoids", "Chlorophyll a", "Xanthophyll"], "c": 2}, {"q": "Chlorophyll a absorbs mainly:", "a": ["Green and yellow", "Blue-violet and red", "Only infrared", "Only UV"], "c": 1}, {"q": "Carotenoids absorb:", "a": ["Red light", "Blue-green light", "Green light", "No light"], "c": 1}, {"q": "Carotenoids are ___ in color:", "a": ["Green", "Orange/yellow", "Blue", "Clear"], "c": 1}, {"q": "Accessory pigments broaden the:", "a": ["Leaf size", "Absorption/action spectrum", "Root depth", "Stem width"], "c": 1}, {"q": "The action spectrum shows rate of:", "a": ["Respiration", "Photosynthesis at each wavelength", "Growth", "Division"], "c": 1}, {"q": "PSII uses reaction center:", "a": ["P700", "P680", "P620", "P500"], "c": 1}, {"q": "PSI uses reaction center:", "a": ["P680", "P700", "P620", "P500"], "c": 1}, {"q": "Water is split at:", "a": ["PSI", "PSII", "Calvin cycle", "Stroma"], "c": 1}, {"q": "Water splitting produces:", "a": ["CO₂", "O₂ + H⁺ + electrons", "Glucose", "NADH"], "c": 1}, {"q": "O₂ from photosynthesis comes from:", "a": ["CO₂", "H₂O (water splitting)", "Glucose", "Air"], "c": 1}, {"q": "Electrons from water replace those lost by:", "a": ["PSI", "P680 in PSII", "Calvin cycle", "ATP synthase"], "c": 1}, {"q": "Plastoquinone (PQ) shuttles electrons in:", "a": ["Mitochondria", "Thylakoid ETC", "Cytoplasm", "Nucleus"], "c": 1}, {"q": "The cytochrome b6f complex pumps:", "a": ["Electrons", "H⁺ into thylakoid lumen", "O₂", "CO₂"], "c": 1}, {"q": "Plastocyanin (PC) carries electrons to:", "a": ["PSII", "PSI", "Calvin cycle", "ATP synthase"], "c": 1}, {"q": "The final electron acceptor in light reactions is:", "a": ["O₂", "NADP⁺ (becomes NADPH)", "CO₂", "H₂O"], "c":
