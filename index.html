, {"q": "Correlation coefficient (r) ranges from:", "a": ["0 to 1", "0 to 100", "+1.00 to −1.00", "−10 to +10"], "c": 2}, {"q": "r = +1.00 means:", "a": ["Perfect negative", "No correlation", "Perfect positive", "Weak positive"], "c": 2}, {"q": "r = −1.00 means:", "a": ["Perfect positive", "No correlation", "Perfect negative", "Weak negative"], "c": 2}, {"q": "r = 0.00 means:", "a": ["Strong correlation", "Perfect correlation", "No consistent relationship", "Causation"], "c": 2}, {"q": "The sign of r indicates:", "a": ["Magnitude", "Direction", "Significance", "Sample size"], "c": 1}, {"q": "The number of r indicates:", "a": ["Direction", "Magnitude (strength)", "Causation", "Sample"], "c": 1}, {"q": "Statistical significance convention:", "a": ["p < .50", "p < .10", "p < .05", "p < .001 only"], "c": 2}, {"q": "p < .05 means results are:", "a": ["Due to chance", "Statistically significant", "Clinically meaningless", "Invalid"], "c": 1}, {"q": "Confidence increases with:", "a": ["Smaller samples", "Larger sample + stronger correlation", "Fewer variables", "Less data"], "c": 1}, {"q": "Correlation can establish:", "a": ["Causation", "Only relationships, NOT causation", "Nothing useful", "Cure rates"], "c": 1}, {"q": "The correlational method has HIGH:", "a": ["Internal validity", "External validity", "Both", "Neither"], "c": 1}, {"q": "Incidence refers to:", "a": ["Total cases", "New cases in a period", "Cured cases", "Deaths"], "c": 1}, {"q": "Prevalence refers to:", "a": ["New cases", "Total cases in a period", "Only severe cases", "Future cases"], "c": 1}, {"q": "In experiments, the manipulated variable is:", "a": ["Dependent variable", "Independent variable", "Confound", "Control"], "c": 1}, {"q": "The variable being measured/observed is:", "a": ["Independent variable", "Dependent variable", "Confound", "Placebo"], "c": 1}, {"q": "A confound is:", "a": ["The DV", "An unwanted variable affecting the DV", "The IV", "The control group"], "c": 1}, {"q": "Three guards against confounds:", "a": ["Case study, correlation, experiment", "Control group, random assignment, masking", "Survey, interview, observation", "None"], "c": 1}, {"q": "Control group participants are:", "a": ["Exposed to IV", "NOT exposed to IV", "Always given placebo", "Eliminated"], "c": 1}, {"q": "Random assignment ensures:", "a": ["Everyone gets treatment", "Equal chance of being in any group", "Only healthy participants", "Larger samples"], "c": 1}, {"q": "In a masked (blind) design:", "a": ["Researchers can't see", "Participants don't know their group", "No one participates", "Everyone gets IV"], "c": 1}, {"q": "Double-masked means:", "a": ["Two groups", "Neither participants nor experimenters know assignments", "Two IVs", "Two DVs"], "c": 1}, {"q": "Placebo therapy is:", "a": ["Real treatment", "Inactive treatment that looks real", "No treatment", "Medication only"], "c": 1}, {"q": "Only ___ can establish cause and effect:", "a": ["Case studies", "Correlational studies", "Experiments", "Surveys"], "c": 2}, {"q": "Longitudinal studies observe same individuals:", "a": ["Once", "Over a long period", "In a lab only", "After treatment only"], "c": 1}, {"q": "Natural experiments: ___ manipulates the IV:", "a": ["Researcher", "Nature", "Participant", "No one"], "c": 1}, {"q": "Analogue experiments are conducted in:", "a": ["Natural settings", "Laboratories", "Hospitals only", "Schools only"], "c": 1}, {"q": "ABAB design is used in:", "a": ["Correlational studies", "Single-subject experiments", "Case studies", "Surveys"], "c": 1}, {"q": "ABAB stands for:", "a": ["After-Before-After-Before", "Baseline-Treatment-Baseline-Treatment", "Always-Be-Always-Better", "None"], "c": 1}, {"q": "Single-subject experiments use ___ for comparison:", "a": ["Control groups", "Baseline data", "Other patients", "Population norms"], "c": 1}, {"q": "Matched designs use ___ instead of random assignment:", "a": ["Self-selection", "Existing groups matched on variables", "No groups", "Only volunteers"], "c": 1}, {"q": "CBPR involves:", "a": ["Only researchers", "Community members collaborating with researchers", "Only participants", "Government agencies only"], "c": 1}, {"q": "Mixed-methods combines:", "a": ["Two experiments", "Qualitative and quantitative approaches", "Case studies only", "Correlations only"], "c": 1}, {"q": "IRB stands for:", "a": ["Internal Research Board", "Institutional Review Board", "International Research Bureau", "Individual Rights Board"], "c": 1}, {"q": "IRB's primary concern:", "a": ["Funding", "Protecting participants' rights and safety", "Publishing results", "Getting large samples"], "c": 1}, {"q": "Informed consent means participants:", "a": ["Are paid", "Know what the study entails before enlisting", "Must complete the study", "Can't withdraw"], "c": 1}, {"q": "Participants can ___ at any time:", "a": ["Be forced to stay", "End their participation", "Be penalized", "Lose data"], "c": 1}, {"q": "Robert Spitzer apologized for his study on:", "a": ["Depression treatment", "Conversion therapy", "Animal research", "Drug trials"], "c": 1}, {"q": "Animals used in US research annually:", "a": ["Hundreds", "Thousands", "11-25 million", "Billions"], "c": 2}, {"q": "Animal research helped increase life expectancy by:", "a": ["5 years", "12 years", "24 years", "50 years"], "c": 2}, {"q": "Social media research concern:", "a": ["Too few users", "Data examined without consent", "Too expensive", "Not enough data"], "c": 1}, {"q": "Clinical significance means results:", "a": ["Are statistically rare", "Meaningfully improve real-world functioning", "Have large samples", "Use p < .05"], "c": 1}, {"q": "Which method provides individual info but not general?", "a": ["Correlational", "Experimental", "Case study", "All three"], "c": 2}]}, {"id": "psy-ch3", "title": "Chapter 3: Models of Abnormality", "ln": "PSY 309 · Ch 3", "notes": [{"heading": "What Are Models?", "body": "Models (paradigms) are used by scientists and clinicians to <b>explain events</b>, guide <b>treatment techniques</b>, and shape what they observe, ask, and interpret. Sometimes models conflict. Each focuses on <b>one aspect</b> of human functioning — <b>no single model explains everything</b>. Multiple models are needed."}, {"heading": "The Biological Model — Overview", "body": "Has a <b>medical perspective</b> — illness is caused by <b>malfunctioning parts of the organism</b>. Points to problems in <b>brain anatomy</b> and <b>brain chemistry</b>. Full understanding of thoughts, emotions, and behavior must include understanding their biological basis."}, {"heading": "Biological: Brain Anatomy", "body": "Key structures: <b>Cerebrum</b> (cortex, corpus callosum, basal ganglia, hippocampus, amygdala). Connections found between psychological disorders and <b>specific brain structures</b>. Neurons and <b>glia cells</b> are the building blocks."}, {"heading": "Biological: Brain Chemistry", "body": "Messages travel as electrical impulses down <b>axons</b> to nerve endings → <b>neurotransmitters (NTs)</b> released into <b>synapse</b> → bind to <b>receptors</b> on <b>dendrites</b> of receiving neuron. Dozens of NTs identified. Some <b>excitatory</b>, some <b>inhibitory</b>. Abnormal NT activity → specific mental disorders."}, {"heading": "Biological: Hormones & Brain Circuits", "body": "Abnormal <b>endocrine system</b> (hormones) also linked to disorders. Abnormal <b>cortisol</b> secretion linked to anxiety and mood disorders. Research increasingly focuses on <b>brain circuits</b> — networks of interconnected structures — rather than single brain areas or chemicals as keys to disorders."}, {"heading": "Biological: Genetics", "body": "Abnormalities in brain anatomy/chemistry sometimes result from <b>genetic inheritance</b>. Studies suggest inheritance plays a part in mood disorders, schizophrenia, etc. Usually <b>several genes combine</b> to produce effects. Genes may be <b>mutations</b> or results of <b>evolutionary principles</b> — once adaptive traits may become maladaptive under modern pressures."}, {"heading": "Biological Treatments", "body": "Three leading treatments: <b>1) Drug therapy</b> — 4 major groups: antianxiety (Valium, 1963), antidepressants (Elavil, 1961), antibipolar/mood stabilizers (Lithium, 1970), antipsychotics (Thorazine, 1954). <b>2) Brain stimulation</b> — ECT, TMS, VNS, deep brain stimulation. <b>3) Psychosurgery</b> — brain surgery (lobotomy, Moniz, 1930s)."}, {"heading": "Assessing the Biological Model", "body": "<b>Strengths:</b> considerable respect, constantly produces new info, treatments bring great relief. <b>Weaknesses:</b> limits understanding by <b>excluding nonbiological factors</b>, may produce significant undesirable side effects (e.g., <b>tardive dyskinesia</b> from antipsychotics)."}, {"heading": "The Psychodynamic Model — Freud", "body": "<b>Sigmund Freud (1856-1939)</b> developed psychoanalysis. Proposed behavior is determined by <b>unconscious, dynamic psychological forces</b>. Abnormal symptoms result from <b>conflict among these forces</b>. The oldest and most famous psychological model."}, {"heading": "Id, Ego, Superego", "body": "Three unconscious forces shape personality: <b>Id:</b> operates on the <b>pleasure principle</b> — instinctual needs, wants immediate gratification. <b>Ego:</b> operates on the <b>reality principle</b> — rational thinking, mediates between id and reality. <b>Superego:</b> operates on the <b>morality principle</b> — conscience, moral standards. Healthy personality = balance. Excessive conflict = dysfunction."}, {"heading": "Defense Mechanisms", "body": "Unconscious strategies the ego uses to manage anxiety: <b>Repression</b> (blocking painful thoughts), <b>Denial</b> (refusing to acknowledge reality), <b>Projection</b> (attributing own impulses to others), <b>Rationalization</b> (creating acceptable reasons), <b>Displacement</b> (redirecting to safer target), <b>Intellectualization</b> (logical detachment), <b>Regression</b> (retreating to earlier stage)."}, {"heading": "Freud's Developmental Stages", "body": "Five stages: <b>Oral → Anal → Phallic → Latency → Genital</b>. Each stage requires adjustment of id/ego/superego. Successful navigation → personal growth. Unsuccessful → <b>fixation</b> at that stage → psychological abnormality. Parents are key figures — often seen as cause of improper development."}, {"heading": "Other Psychodynamic Theorists", "body": "<b>Carl Jung:</b> collective unconscious, archetypes, synchronicity. <b>Alfred Adler:</b> individual psychology, inferiority/superiority complex, style of life. <b>Self theorists:</b> emphasize unified personality. <b>Object-relations theorists:</b> emphasize human need for relationships, especially child-caregiver bonds. All share the idea that dynamic (interacting) forces shape functioning."}, {"heading": "Psychodynamic Therapies", "body": "Seek to uncover past trauma and inner conflicts. Techniques: <b>Free association</b> (say whatever comes to mind), <b>therapist interpretation</b>, <b>resistance</b> (blocking progress), <b>transference</b> (feelings toward therapist mirror past), <b>dream interpretation</b>, <b>catharsis</b> (emotional release), <b>working through</b>. Current trend: <b>short-term psychodynamic therapy</b> and relational psychoanalytic therapy."}, {"heading": "Assessing the Psychodynamic Model", "body": "<b>Strengths:</b> first to recognize importance of psychological theories and treatment, saw abnormal functioning as rooted in same processes as normal. <b>Weaknesses:</b> unsupported ideas, difficult to research, relies on <b>non-observable concepts</b> (unconscious), inaccessible to verification."}, {"heading": "The Cognitive-Behavioral Model", "body": "Focuses on <b>maladaptive behaviors AND cognitions</b>. Combines behavioral and cognitive perspectives. <b>Behavioral dimension:</b> classical conditioning, operant conditioning, modeling (Bandura's Bobo doll study). <b>Cognitive dimension:</b> maladaptive thinking, inaccurate assumptions, illogical patterns. Therapists help replace problematic behaviors and thoughts with healthier ones."}, {"heading": "CBT: Behavioral Dimension", "body": "Key principles: <b>Classical conditioning</b> (learned associations), <b>Operant conditioning</b> (reinforcement/punishment), <b>Modeling</b> (learning by observing others — Bandura). Therapists act as <b>teachers</b>. Focus on observable, reportable behavior. Therapies are <b>action-oriented, present-focused, directive, and structured</b>."}, {"heading": "CBT: Cognitive Dimension", "body": "Focuses on <b>maladaptive thinking processes</b> — inaccurate assumptions, disturbing attitudes, illogical thinking. Therapists help clients <b>recognize, challenge, and change</b> problematic thinking. Example: social anxiety → catastrophic thoughts → avoidance → <b>exposure therapy</b> to break the cycle."}, {"heading": "Assessing the Cognitive-Behavioral Model", "body": "<b>Strengths:</b> powerful force in the field, very broad appeal, clinically useful, theories lend themselves to research, effective for several disorders. <b>Weaknesses:</b> precise role of cognition not fully determined, doesn't help everyone. New wave: <b>Acceptance and Commitment Therapy (ACT)</b> and <b>mindfulness-based techniques</b>."}, {"heading": "Clinical Psychologist Orientations", "body": "Survey data: <b>46%</b> identify as cognitive/behavioral, <b>22%</b> eclectic, <b>18%</b> psychodynamic. CBT is by far the dominant orientation among today's clinical psychologists."}, {"heading": "The Humanistic-Existential Model", "body": "<b>Humanist view:</b> people are friendly, cooperative, constructive. Focus on drive to <b>self-actualize</b> through honest self-awareness. <b>Existentialist view:</b> emphasis on accurate self-awareness and <b>meaningful (authentic) life</b>. Total freedom from birth → can result in positive or negative outcomes. Dysfunction caused by <b>self-deception</b> and avoiding responsibility."}, {"heading": "Rogers' Client-Centered Therapy", "body": "<b>Carl Rogers:</b> basic human need for <b>unconditional positive regard</b>. If received → healthy self-regard. If not → <b>conditions of worth</b> (feeling valued only when meeting others' standards). Therapy creates supportive climate with: <b>unconditional positive regard</b>, <b>accurate empathy</b>, <b>genuineness</b>."}, {"heading": "Gestalt Therapy & Spirituality", "body": "<b>Gestalt therapy (Fritz Perls, 1950s):</b> guides clients toward self-recognition through challenge and frustration. Techniques: skillful frustration, role playing, 'here and now' focus, 'I' language. <b>Spiritual views:</b> research suggests spirituality can correlate with psychological health. Many clinicians now encourage spiritual resources for coping."}, {"heading": "Assessing the Humanistic-Existential Model", "body": "<b>Strengths:</b> taps domains other models miss, emphasizes the individual, optimistic, emphasizes health. <b>Weaknesses:</b> focuses on abstract issues, difficult to research, weakened by disapproval of scientific approach. Little controlled research support for existential therapies."}, {"heading": "The Sociocultural Model", "body": "Abnormal behavior influenced by <b>social and cultural forces</b>. Two major perspectives: <b>1) Family-social:</b> social labels/roles, social connections, family structure/communication, family systems theory (enmeshed vs disengaged). <b>2) Multicultural:</b> behavior best understood in context of culture, values, and external pressures."}, {"heading": "Sociocultural Treatments", "body": "<b>Family-social treatments:</b> group therapy, self-help groups, family therapy, couple therapy, community treatment. <b>Multicultural treatments:</b> culture-sensitive therapies, gender-sensitive therapies. Therapist effectiveness enhanced by greater sensitivity to cultural issues. Emerged because problems arise and are best treated in social/cultural settings."}, {"heading": "Comparing All Models — Table", "body": "<b>Biological:</b> cause=malfunction, strong research, doctor role, biological intervention. <b>Psychodynamic:</b> conflicts, modest research, interpreter role, free association. <b>CBT:</b> maladaptive thinking/learning, strong research, teacher role, reasoning+conditioning. <b>Humanistic:</b> self-deceit, weak research, observer role. <b>Existential:</b> avoidance of responsibility. <b>Sociocultural:</b> social/cultural stress, moderate research."}, {"heading": "Developmental Psychopathology Perspective", "body": "Integrative framework combining variables from <b>ALL models</b>. Two key principles: <b>Equifinality:</b> different developmental paths can lead to the <b>SAME disorder</b>. <b>Multifinality:</b> similar developmental paths can lead to <b>DIFFERENT outcomes</b>. Why? Additional variables (like parenting quality) make the difference."}, {"heading": "Key Concepts Summary", "body": "<b>6+ models:</b> biological, psychodynamic, CBT, humanistic-existential, sociocultural, developmental psychopathology. <b>Biological:</b> brain, NTs, genetics, drugs/ECT. <b>Psychodynamic:</b> id/ego/superego, defense mechanisms, stages. <b>CBT:</b> conditioning + cognition. <b>Humanistic:</b> self-actualization, unconditional positive regard. <b>Sociocultural:</b> family systems, culture. <b>Equifinality:</b> different paths → same outcome. <b>Multifinality:</b> same path → different outcomes."}], "quiz": [{"q": "Models of abnormality are also called:", "a": ["Theories only", "Paradigms", "Laws", "Facts"], "c": 1}, {"q": "No single model can explain:", "a": ["Anything", "All aspects of abnormality", "Only biology", "Only behavior"], "c": 1}, {"q": "The biological model focuses on:", "a": ["Unconscious conflicts", "Brain anatomy and chemistry", "Social roles", "Self-actualization"], "c": 1}, {"q": "Neurotransmitters are released into the:", "a": ["Nucleus", "Synapse", "Blood", "Stomach"], "c": 1}, {"q": "Dendrites ___ messages:", "a": ["Send", "Receive", "Block", "Create"], "c": 1}, {"q": "Abnormal cortisol is linked to:", "a": ["Schizophrenia only", "Anxiety and mood disorders", "ADHD", "No disorders"], "c": 1}, {"q": "Research increasingly focuses on ___ rather than single structures:", "a": ["Genes only", "Brain circuits", "Hormones only", "Neurons only"], "c": 1}, {"q": "Inheritance of mental disorders usually involves:", "a": ["One gene", "Several genes combining", "No genes", "Only mutations"], "c": 1}, {"q": "Thorazine (1954) is a(n):", "a": ["Antianxiety drug", "Antidepressant", "Antipsychotic", "Mood stabilizer"], "c": 2}, {"q": "Lithium is a(n):", "a": ["Antianxiety", "Antidepressant", "Antipsychotic", "Antibipolar/mood stabilizer"], "c": 3}, {"q": "ECT stands for:", "a": ["Ego Conflict Therapy", "Electroconvulsive therapy", "External Cognitive Treatment", "None"], "c": 1}, {"q": "Tardive dyskinesia is a side effect of:", "a": ["Therapy", "Antipsychotic medications", "Exercise", "Surgery"], "c": 1}, {"q": "Freud developed:", "a": ["CBT", "Psychoanalysis", "Gestalt therapy", "Client-centered therapy"], "c": 1}, {"q": "The Id operates on the:", "a": ["Reality principle", "Morality principle", "Pleasure principle", "Logic principle"], "c": 2}, {"q": "The Ego operates on the:", "a": ["Pleasure principle", "Reality principle", "Morality principle", "Instinct principle"], "c": 1}, {"q": "The Superego operates on the:", "a": ["Pleasure principle", "Reality principle", "Morality principle", "Survival principle"], "c": 2}, {"q": "A healthy personality requires:", "a": ["Strong id only", "Strong superego only", "Balance among id, ego, superego", "No ego"], "c": 2}, {"q": "Projection means attributing your impulses to:", "a": ["Yourself", "Others", "No one", "The environment"], "c": 1}, {"q": "Displacement redirects hostility to a:", "a": ["Dangerous target", "Safer substitute", "The self", "No one"], "c": 1}, {"q": "Repression blocks ___ from consciousness:", "a": ["Happy thoughts", "Painful/dangerous thoughts", "All thoughts", "Memories of food"], "c": 1}, {"q": "Freud's developmental stages in order:", "a": ["Anal, Oral, Phallic, Genital, Latency", "Oral, Anal, Phallic, Latency, Genital", "Genital, Latency, Oral, Anal, Phallic", "Phallic, Oral, Genital, Anal, Latency"], "c": 1}, {"q": "Fixation at a stage leads to:", "a": ["Growth", "Psychological abnormality", "Physical health", "Nothing"], "c": 1}, {"q": "Carl Jung proposed the:", "a": ["Pleasure principle", "Collective unconscious", "Operant conditioning", "Client-centered therapy"], "c": 1}, {"q": "Alfred Adler proposed:", "a": ["Dream analysis", "Inferiority/superiority complex", "Classical conditioning", "Free association"], "c": 1}, {"q": "Object-relations theorists emphasize:", "a": ["Brain chemistry", "Relationships (especially child-caregiver)", "Conditioning", "Self-actualization"], "c": 1}, {"q": "Free association is a ___ technique:", "a": ["Biological", "Cognitive", "Psychodynamic", "Humanistic"], "c": 2}, {"q": "Transference involves feelings toward the:", "a": ["Self", "Therapist (mirroring past)", "Medication", "Family"], "c": 1}, {"q": "CBT combines:", "a": ["Biology + psychodynamic", "Behavioral + cognitive", "Humanistic + existential", "Social + cultural"], "c": 1}, {"q": "Bandura's study demonstrated:", "a": ["Classical conditioning", "Modeling (learning by observation)", "Operant conditioning", "Transference"], "c": 1}, {"q": "Exposure therapy is used for:", "a": ["Schizophrenia", "Social anxiety (breaking avoidance)", "Brain surgery", "Dream analysis"], "c": 1}, {"q": "___% of clinical psychologists identify as cognitive/behavioral:", "a": ["18", "22", "46", "75"], "c": 2}, {"q": "Rogers emphasized:", "a": ["Conditioning", "Unconscious conflicts", "Unconditional positive regard", "Brain circuits"], "c": 2}, {"q": "Conditions of worth develop when positive regard is:", "a": ["Unconditional", "Conditional", "Absent", "Excessive"], "c": 1}, {"q": "Client-centered therapy uses all EXCEPT:", "a": ["Empathy", "Genuineness", "Unconditional positive regard", "Dream interpretation"], "c": 3}, {"q": "Gestalt therapy was developed by:", "a": ["Freud", "Rogers", "Fritz Perls", "Bandura"], "c": 2}, {"q": "Gestalt therapy focuses on:", "a": ["The past", "Here and now", "Future goals", "Unconscious"], "c": 1}, {"q": "Self-actualization is a concept from the ___ model:", "a": ["Biological", "Psychodynamic", "CBT", "Humanistic"], "c": 3}, {"q": "Existential therapy: dysfunction comes from avoiding:", "a": ["Medication", "Responsibility", "Social media", "Exercise"], "c": 1}, {"q": "Family systems theory includes ___ structures:", "a": ["Enmeshed and disengaged", "Strong and weak", "Big and small", "None"], "c": 0}, {"q": "Multicultural perspective: behavior understood in context of:", "a": ["Only biology", "Culture and external pressures", "Only childhood", "Only genetics"], "c": 1}, {"q": "Culture-sensitive therapies are part of the ___ model:", "a": ["Biological", "Psychodynamic", "CBT", "Sociocultural"], "c": 3}, {"q": "Equifinality means different paths lead to:", "a": ["Different outcomes", "The same outcome", "No outcome", "Better health"], "c": 1}, {"q": "Multifinality means similar paths lead to:", "a": ["The same outcome", "Different outcomes", "No outcome", "Always dysfunction"], "c": 1}, {"q": "The developmental psychopathology perspective is:", "a": ["Single-model", "Integrative (multiple models)", "Only biological", "Only cognitive"], "c": 1}, {"q": "Which model has the strongest research support?", "a": ["Humanistic", "Existential", "Biological and CBT", "Psychodynamic"], "c": 2}, {"q": "Which model has the weakest research support?", "a": ["Biological", "CBT", "Humanistic-existential", "Sociocultural"], "c": 2}, {"q": "Lobotomy was developed by:", "a": ["Freud", "Rogers", "Moniz", "Bandura"], "c": 2}, {"q": "ACT stands for:", "a": ["Active Cognitive Therapy", "Acceptance and Commitment Therapy", "Abnormal Clinical Treatment", "None"], "c": 1}, {"q": "The therapist role in CBT is:", "a": ["Doctor", "Interpreter", "Collaborator/teacher", "Observer"], "c": 2}, {"q": "The therapist role in psychodynamic therapy is:", "a": ["Doctor", "Interpreter", "Teacher", "Facilitator"], "c": 1}]}, {"id": "psy-ch4", "title": "Chapter 4: Clinical Assessment, Diagnosis & Treatment", "ln": "PSY 309 · Ch 4", "notes": [{"heading": "Clinical Assessment — Overview", "body": "<b>Assessment:</b> collecting relevant information to reach a conclusion (<b>idiographic</b> information — about this specific person). <b>Clinical assessment:</b> determines whether, how, and why a person is behaving abnormally and how they can be helped. Hundreds of tools exist in three categories: <b>clinical interviews, tests, and observations</b>."}, {"heading": "Standardization", "body": "For assessment tools to be useful, they must be <b>standardized</b> — common steps followed every time. Must standardize <b>administration</b> (how given), <b>scoring</b> (how evaluated), and <b>interpretation</b> (what results mean). Without standardization, results can't be compared across people or settings."}, {"heading": "Reliability", "body": "<b>Reliability:</b> the <b>consistency</b> of an assessment measure. A good tool yields the same results in the same situation. Two main types: <b>Test-retest reliability:</b> same results when given to same people again. <b>Interrater reliability:</b> different judges independently agree on scoring and interpretation."}, {"heading": "Validity", "body": "<b>Validity:</b> the <b>accuracy</b> of a tool's results — does it measure what it's supposed to measure? Three types: <b>Face validity:</b> appears to measure what it claims (surface level). <b>Predictive validity:</b> can predict future characteristics/behavior. <b>Concurrent validity:</b> results agree with other measures of the same thing."}, {"heading": "Clinical Interviews", "body": "<b>Face-to-face encounter</b> between clinician and client. Gathers basic background data with specific theoretical focus. Can be <b>unstructured</b> (open conversation) or <b>structured</b> (set questions). Includes <b>mental status exam</b>. Limitations: lack of validity/accuracy, interviewer bias, lack of reliability."}, {"heading": "Projective Tests", "body": "Require client to <b>interpret vague/ambiguous stimuli</b> or respond to open-ended instructions. Based on <b>psychodynamic orientation</b>. Examples: <b>Rorschach test</b> (inkblots), <b>TAT</b> (Thematic Apperception Test — tell stories about pictures), <b>sentence-completion tests</b>, drawings. Were the most common personality tests until the 1950s."}, {"heading": "Projective Tests — Strengths & Limitations", "body": "<b>Strengths:</b> can reveal unconscious processes, now used for supplementary information. <b>Limitations:</b> reliability and validity <b>NOT consistently shown</b>, may be biased against minority ethnic groups. Scoring can be highly subjective."}, {"heading": "Personality Inventories", "body": "Designed to measure <b>broad personality characteristics</b>. Focus on behaviors, beliefs, feelings. Usually <b>self-reported</b> responses. Most widely used: <b>MMPI</b> (Minnesota Multiphasic Personality Inventory). Adults: MMPI-2 (1989 revision). Adolescents: MMPI-A."}, {"heading": "MMPI — 10 Clinical Scales", "body": "<b>1) Hypochondriasis (Hs)</b> 2) <b>Depression (D)</b> 3) <b>Conversion Hysteria (Hy)</b> 4) <b>Psychopathic Deviate (Pd)</b> 5) <b>Masculinity-Femininity (Mf)</b> 6) <b>Paranoia (Pa)</b> 7) <b>Psychasthenia (Pt)</b> 8) <b>Schizophrenia (Sc)</b> 9) <b>Hypomania (Ma)</b> 10) <b>Social Introversion (Si)</b>. Scores plotted on a profile."}, {"heading": "Personality Inventories — Strengths & Limitations", "body": "<b>Strengths:</b> easier, cheaper, faster than projective tests. <b>Objectively scored</b> and standardized. Greater validity than projective tests. <b>Limitations:</b> cannot be considered highly valid overall. Measured traits often can't be directly examined. Tests may not allow for <b>cultural differences</b> in responses."}, {"heading": "Response Inventories", "body": "Focus on <b>one specific area</b> of functioning (unlike broad personality inventories). Usually self-reported. Three types: <b>Affective inventories</b> (e.g., <b>Beck Depression Inventory</b>), <b>social skills inventories</b>, <b>cognitive inventories</b>. More targeted than personality inventories."}, {"heading": "Psychophysiological Tests", "body": "Measure <b>physiological responses</b> as indicators of psychological problems. Include: heart rate, blood pressure, body temperature, <b>galvanic skin response</b>, muscle contraction. <b>Polygraph</b> (lie detector) is one example. Limitations: require expensive equipment, can be <b>inaccurate and unreliable</b>."}, {"heading": "Neurological & Neuropsychological Tests", "body": "<b>Neurological tests</b> directly assess brain structure/activity: <b>EEG, PET scans, CT scans, MRI, fMRI</b>. <b>Neuropsychological tests</b> indirectly assess brain function through cognitive, perceptual, and motor tasks. Example: <b>Bender Visual-Motor Gestalt Test</b>. Clinicians often use a <b>battery</b> (combination) of tests."}, {"heading": "Intelligence Tests", "body": "Indirectly measure intellectual ability through verbal and nonverbal skill tests. Score = <b>IQ (Intelligence Quotient)</b> = ratio of mental age to chronological age. Among the most carefully produced tests — highly standardized, high reliability and validity. <b>Weaknesses:</b> influenced by non-intelligence factors, may contain <b>cultural biases</b>, minority groups may have less experience with test formats."}, {"heading": "Clinical Observations", "body": "<b>Naturalistic observations:</b> occur in everyday environments (homes, schools, hospitals). Made by 'participant observers.' Reliability and validity are concerns. <b>Analog observations:</b> conducted in artificial settings when naturalistic is impractical. <b>Self-monitoring:</b> people observe and record their own behaviors/feelings. Useful but validity often a problem."}, {"heading": "Diagnosis — Overview", "body": "Using all assessment info, clinicians create a '<b>clinical picture</b>' and make a <b>diagnosis</b> — determining that problems constitute a particular disorder. Based on an existing <b>classification system</b>. Focuses on clusters of symptoms called <b>syndromes</b>. Influenced by the clinician's theoretical orientation."}, {"heading": "DSM-5", "body": "<b>DSM-5 (2013):</b> Diagnostic and Statistical Manual of Mental Disorders, 5th edition. Most used classification system in the US. Lists categories, disorders, symptom descriptions, and assignment guidelines. Requires BOTH: <b>Categorical information</b> (name of disorder) AND <b>Dimensional information</b> (severity rating, functioning across personality dimensions)."}, {"heading": "ICD-10", "body": "<b>ICD-10:</b> International Classification of Diseases. Used in most countries outside the US. Some differences from DSM-5 but also some matching. Both systems aim to provide standardized diagnostic criteria for mental and medical conditions."}, {"heading": "DSM-5 Example Categories", "body": "<b>Anxiety disorders:</b> generalized anxiety, social anxiety, panic disorder, separation anxiety. <b>Depressive disorders:</b> major depressive disorder, persistent depressive disorder, premenstrual dysphoric disorder. DSM-5 has greater validity than previous editions, but validity remains a concern."}, {"heading": "DSM-5 Controversies", "body": "Top concerns: <b>1)</b> People with serious medical disease may get psychiatric diagnosis for 'excessive' distress. <b>2)</b> Normal grief may be diagnosed as depression. <b>3)</b> Excessive behaviors (sex, internet, shopping) may become 'behavioral addictions.' <b>4)</b> Normal age-related forgetfulness may get 'mild neurocognitive disorder' diagnosis."}, {"heading": "Changed Disorder Names", "body": "Names have evolved: <b>Mental retardation → Intellectual disability</b>. <b>Manic-depressive → Bipolar disorder</b>. <b>Multiple personality disorder → Dissociative identity disorder</b>. <b>Dementia → Neurocognitive disorder</b>. <b>Hypochondriasis → Illness anxiety disorder</b>. Language matters — reducing stigma."}, {"heading": "Dangers of Diagnosis & Labeling", "body": "<b>Misdiagnosis</b> is a real concern — reliance on clinical judgment can lead to errors. Diagnostic labels may become a <b>stigma</b> — people are treated differently. Labels can create a <b>self-fulfilling prophecy</b> — person behaves according to the label. Classic study: Rosenhan's 'Being Sane in Insane Places.'"}, {"heading": "Treatment Decisions", "body": "Treatment begins with assessment and diagnostic information to create a <b>treatment plan</b>. Uses both <b>idiographic</b> (individual) and <b>nomothetic</b> (general) information. Other factors: therapist's <b>theoretical orientation</b>, current <b>research</b>, general state of clinical knowledge. Current focus: <b>empirically supported, evidence-based treatment</b>."}, {"heading": "Evidence-Based Treatment", "body": "<b>Evidence-based treatment:</b> interventions supported by scientific research showing they work. Clinicians increasingly expected to use treatments with demonstrated effectiveness. Combines best available research + clinical expertise + patient characteristics. The gold standard for modern treatment decisions."}, {"heading": "Key Concepts Summary", "body": "<b>Assessment tools:</b> must be standardized, reliable (test-retest, interrater), valid (face, predictive, concurrent). <b>Methods:</b> interviews (structured/unstructured), projective tests (Rorschach/TAT), personality inventories (MMPI), response inventories (BDI), psychophysiological, neurological (EEG/MRI/fMRI), neuropsychological, intelligence (IQ), observations. <b>DSM-5:</b> categorical + dimensional. <b>Dangers:</b> misdiagnosis, stigma, self-fulfilling prophecy."}], "quiz": [{"q": "Clinical assessment gathers ___ information:", "a": ["Nomothetic only", "Idiographic (individual)", "Only biological", "Only behavioral"], "c": 1}, {"q": "Three categories of assessment tools:", "a": ["Drugs, surgery, therapy", "Interviews, tests, observations", "Biology, psychology, sociology", "None"], "c": 1}, {"q": "Standardization involves setting up:", "a": ["Random procedures", "Common steps followed every time", "Different rules for each person", "No rules"], "c": 1}, {"q": "Test-retest reliability means:", "a": ["Different results each time", "Same results when given to same people again", "Agreement between judges", "High validity"], "c": 1}, {"q": "Interrater reliability means:", "a": ["Same results over time", "Different judges agree on scoring", "High validity", "Face validity"], "c": 1}, {"q": "Validity measures:", "a": ["Consistency", "Accuracy — does it measure what it should?", "Speed", "Cost"], "c": 1}, {"q": "Face validity means the test:", "a": ["Predicts future behavior", "Agrees with other measures", "Appears to measure what it claims", "Is always accurate"], "c": 2}, {"q": "Predictive validity means the test can:", "a": ["Look accurate", "Predict future characteristics/behavior", "Agree with current measures", "Be scored quickly"], "c": 1}, {"q": "Concurrent validity means results agree with:", "a": ["Future measures", "Other measures of the same thing", "Nothing", "Only past measures"], "c": 1}, {"q": "Structured interviews use:", "a": ["No questions", "Set questions", "Only open-ended conversation", "Only observation"], "c": 1}, {"q": "The mental status exam is part of:", "a": ["Projective testing", "Clinical interview", "Brain scanning", "Self-monitoring"], "c": 1}, {"q": "Projective tests require interpreting:", "a": ["Clear instructions", "Vague/ambiguous stimuli", "Mathematical problems", "Personality inventories"], "c": 1}, {"q": "The Rorschach test uses:", "a": ["True/false questions", "Inkblots", "Brain scans", "IQ tests"], "c": 1}, {"q": "TAT stands for:", "a": ["Total Assessment Tool", "Thematic Apperception Test", "Testing Abnormal Thinking", "Therapeutic Analysis Technique"], "c": 1}, {"q": "Projective tests are based on ___ orientation:", "a": ["Cognitive", "Biological", "Psychodynamic", "Humanistic"], "c": 2}, {"q": "MMPI stands for:", "a": ["Minnesota Multiphasic Personality Inventory", "Mental Measurement Psychiatric Index", "Multiple Mood Personality Indicator", "None"], "c": 0}, {"q": "MMPI has ___ clinical scales:", "a": ["5", "8", "10", "15"], "c": 2}, {"q": "MMPI-2 is for:", "a": ["Children", "Adolescents", "Adults", "Elderly only"], "c": 2}, {"q": "MMPI-A is for:", "a": ["Adults", "Adolescents", "Children", "Elderly"], "c": 1}, {"q": "Personality inventories are ___ than projective tests:", "a": ["Harder", "Easier, cheaper, faster", "Less valid", "More subjective"], "c": 1}, {"q": "Beck Depression Inventory is a:", "a": ["Projective test", "Personality inventory", "Response inventory (affective)", "Intelligence test"], "c": 2}, {"q": "Psychophysiological tests measure:", "a": ["IQ", "Physiological responses", "Personality traits", "Social skills"], "c": 1}, {"q": "The polygraph measures:", "a": ["Intelligence", "Physiological responses (lie detection)", "Personality", "Brain structure"], "c": 1}, {"q": "Polygraphs can be:", "a": ["Always accurate", "Inaccurate and unreliable", "Perfect", "Foolproof"], "c": 1}, {"q": "EEG, PET, CT, MRI are ___ tests:", "a": ["Projective", "Neurological", "Psychophysiological", "Intelligence"], "c": 1}, {"q": "Neuropsychological tests ___ assess brain function:", "a": ["Directly", "Indirectly", "Never", "Only with MRI"], "c": 1}, {"q": "IQ stands for:", "a": ["Internal Quality", "Intelligence Quotient", "Intellectual Query", "Inventory Question"], "c": 1}, {"q": "IQ = ratio of ___ age to ___ age:", "a": ["Physical/emotional", "Mental/chronological", "Bone/muscle", "None"], "c": 1}, {"q": "Intelligence tests may contain ___ biases:", "a": ["No", "Cultural", "Only gender", "Only age"], "c": 1}, {"q": "Naturalistic observations occur in:", "a": ["Laboratories", "Everyday environments", "Only hospitals", "Only schools"], "c": 1}, {"q": "Self-monitoring involves people observing:", "a": ["Others", "Themselves", "Only therapists", "Only children"], "c": 1}, {"q": "DSM-5 was published in:", "a": ["1994", "2000", "2013", "2020"], "c": 2}, {"q": "DSM stands for:", "a": ["Diagnostic Statistical Manual", "Diagnostic and Statistical Manual of Mental Disorders", "Disease Standard Measurement", "None"], "c": 1}, {"q": "DSM-5 requires both ___ and ___ information:", "a": ["Categorical and dimensional", "Only categorical", "Only dimensional", "Neither"], "c": 0}, {"q": "Categorical information is the:", "a": ["Severity rating", "Name of the disorder", "Treatment plan", "Prognosis"], "c": 1}, {"q": "Dimensional information is a:", "a": ["Category name", "Rating of severity and functioning", "Only yes/no", "Family history"], "c": 1}, {"q": "ICD-10 is used mostly:", "a": ["In the US", "Outside the US", "Nowhere", "Only in research"], "c": 1}, {"q": "Syndromes are:", "a": ["Single symptoms", "Clusters of symptoms", "Treatments", "Medications"], "c": 1}, {"q": "Normal grief diagnosed as depression is a DSM-5:", "a": ["Strength", "Controversy/concern", "Requirement", "Non-issue"], "c": 1}, {"q": "Diagnostic labels can create a:", "a": ["Cure", "Self-fulfilling prophecy", "New disorder", "Treatment plan"], "c": 1}, {"q": "Manic-depressive is now called:", "a": ["Major depression", "Bipolar disorder", "Schizophrenia", "GAD"], "c": 1}, {"q": "Multiple personality disorder is now called:", "a": ["Schizophrenia", "Bipolar", "Dissociative identity disorder", "PTSD"], "c": 2}, {"q": "Hypochondriasis is now called:", "a": ["Health anxiety", "Illness anxiety disorder", "Somatic disorder", "Panic disorder"], "c": 1}, {"q": "Evidence-based treatment means:", "a": ["Any treatment", "Interventions supported by scientific research", "Only medication", "Only psychodynamic therapy"], "c": 1}, {"q": "Treatment plans use both idiographic and:", "a": ["Random", "Nomothetic information", "Only clinical judgment", "No other info"], "c": 1}, {"q": "Misdiagnosis is a concern because of reliance on:", "a": ["Tests only", "Clinical judgment", "Brain scans only", "Self-report only"], "c": 1}, {"q": "Projective tests have ___ reliability/validity:", "a": ["Consistently high", "Not consistently shown", "Perfect", "No"], "c": 1}, {"q": "A battery of tests means using:", "a": ["One test", "A combination of tests", "Only projective", "Only neurological"], "c": 1}, {"q": "The Bender Visual-Motor Gestalt Test is:", "a": ["Projective", "Neuropsychological", "Intelligence", "Personality"], "c": 1}, {"q": "Predictive validity is most used:", "a": ["In research only", "Clinically", "Never", "Only for IQ tests"], "c": 1}]}, {"id": "psy-ch6", "title": "Chapter 6: Disorders of Trauma, Stress & Dissociation", "ln": "PSY 309 · Ch 6", "notes": [{"heading": "Stress Components", "body": "<b>Stressor:</b> an event that creates demands and causes fear when viewed as threatening. <b>Stress response:</b> a person's reactions to those demands. Extraordinary stress and trauma can play a central role in certain psychological disorders. Fear is a 'package' of <b>physical, emotional, and cognitive</b> responses. More stressful events → more vulnerability to anxiety and other disorders."}, {"heading": "Stress-Related Disorders in DSM-5", "body": "Two major categories: <b>1) Trauma and stressor-related disorders:</b> Acute stress disorder and <b>PTSD</b>. <b>2) Psychological factors affecting medical condition:</b> stress causing/worsening physical (psychophysiological) disorders."}, {"heading": "Fight-or-Flight Response", "body": "Features of arousal and fear are set in the <b>hypothalamus</b>. Two systems activated: <b>1) Autonomic Nervous System (ANS)</b> — connects brain/spinal cord to all organs. <b>2) Endocrine system</b> — glands releasing hormones. Together they produce the <b>fight-or-flight response</b>."}, {"heading": "ANS: Sympathetic vs Parasympathetic", "body": "<b>Sympathetic NS:</b> quickens heartbeat, produces <b>arousal</b> (fight-or-flight). Stimulates some organs, inhibits others. <b>Parasympathetic NS:</b> helps return body to <b>normal/calm</b> after danger passes. Each person has a particular pattern of autonomic functioning and therefore a unique way of experiencing fear."}, {"heading": "HPA Pathway", "body": "<b>Hypothalamic-Pituitary-Adrenal (HPA) pathway:</b> Hypothalamus signals pituitary gland → pituitary signals adrenal cortex → releases <b>corticosteroids (stress hormones)</b> into bloodstream. This is the second arousal pathway alongside the sympathetic NS pathway."}, {"heading": "Two Arousal Pathways Summary", "body": "<b>Pathway 1:</b> Hypothalamus → sympathetic NS → activates organs directly OR triggers adrenal medulla to release <b>epinephrine and norepinephrine</b>. <b>Pathway 2:</b> Hypothalamus → pituitary → adrenal cortex → <b>corticosteroids</b>. Both pathways together = the fight-or-flight response."}, {"heading": "Acute Stress Disorder vs PTSD", "body": "<b>Acute stress disorder:</b> symptoms begin within 4 weeks of event, last <b>less than 1 month</b>. <b>PTSD:</b> symptoms may begin shortly after OR months/years later, last <b>more than 1 month</b>. ~80% of acute stress disorder cases develop into PTSD. Symptoms are nearly identical between the two."}, {"heading": "PTSD Symptoms", "body": "<b>1) Reexperiencing:</b> intrusive memories, nightmares, flashbacks. <b>2) Avoidance:</b> avoiding trauma-linked stimuli. <b>3) Negative changes:</b> in cognitions and moods (can't remember key features, persistent negative emotions). <b>4) Arousal/reactivity changes:</b> hypervigilance, exaggerated startle, sleep problems. Must cause significant distress/impairment."}, {"heading": "PTSD Statistics", "body": "Affects at least <b>3.5% of Americans per year</b>; 7-9% lifetime. More common in <b>women (2:1)</b> and people with low incomes. After trauma: ~20% of women and ~8% of men develop disorders. Two-thirds seek treatment at some point. Can occur at <b>any age</b>."}, {"heading": "PTSD Triggers", "body": "<b>Combat</b> ('shell shock'/'combat fatigue') — 29% of Vietnam vets had PTSD. <b>Disasters/accidents</b> (earthquakes, fires, car crashes). <b>Victimization</b> — >1/3 of assault victims develop PTSD. <b>Sexual assault/rape.</b> <b>Terrorism</b> and <b>torture</b>. Civilian traumas are implicated 10× more often than combat."}, {"heading": "Risk Factors for PTSD", "body": "<b>Biological:</b> abnormal norepinephrine/cortisol, brain stress circuit dysfunction (hippocampus, amygdala), genetic predisposition. <b>Childhood:</b> neglect/abuse, poverty, parental divorce, early catastrophe. <b>Personal styles.</b> <b>Low social support.</b> <b>Severity of trauma:</b> more severe/prolonged, direct exposure, intentional, mutilation, sexual assault → higher risk."}, {"heading": "Developmental Psychopathology & PTSD", "body": "Timing of stressors over developmental course matters. Inherited or acquired biological predisposition for <b>overreactivity</b> in brain-body stress pathways. Principles of <b>multifinality</b> (same trauma → different outcomes) and <b>equifinality</b> (different paths → same disorder) apply."}, {"heading": "PTSD Treatment", "body": "~Half improve within 6 months; rest may persist for years. General goals: end lingering stress, gain perspective, return to constructive living. Treatments: <b>antidepressant drugs</b>, <b>CBT</b>, cognitive processing therapy, <b>mindfulness</b>, <b>prolonged exposure</b>, <b>EMDR</b> (eye movement desensitization and reprocessing), couple/family therapy, group therapy (rap groups)."}, {"heading": "Psychological Debriefing", "body": "<b>Critical incident stress debriefing:</b> crisis intervention where trauma victims talk extensively about feelings within days of the event. Intended to prevent PTSD. However, research has <b>NOT supported</b> its effectiveness — some evidence it may even be harmful. No longer recommended as standard practice."}, {"heading": "Dissociative Disorders — Overview", "body": "Group of disorders triggered by traumatic events. Memory is key to identity — disruptions in memory without physical cause = <b>dissociative disorders</b>. One part of memory is 'dissociated' (separated) from the rest. Dissociative symptoms often found in PTSD but don't always indicate a separate dissociative disorder."}, {"heading": "Types of Dissociative Disorders", "body": "<b>1) Dissociative amnesia</b> (including dissociative fugue). <b>2) Dissociative identity disorder</b> (DID, formerly multiple personality disorder). <b>3) Depersonalization-derealization disorder</b>. All involve disruptions in memory, identity, or perception of reality."}, {"heading": "Dissociative Amnesia", "body": "<b>Cannot recall important life information</b>, typically traumatic/stressful events. Much more extensive than normal forgetting, NOT caused by physical factors. Often triggered by a specific upsetting event. Memory for abstract/encyclopedic info usually stays intact. Types: <b>localized</b> (most common, limited period), <b>selective, generalized, continuous</b> (rare)."}, {"heading": "Dissociative Fugue", "body": "An <b>extreme version</b> of dissociative amnesia. People forget their identity AND <b>flee to a different location</b>. May be brief (hours/days) or severe (new name, new relationships, new job, new personality). When found, may need constant reminding of identity. Majority eventually <b>regain memories</b> and never recur."}, {"heading": "Dissociative Identity Disorder (DID)", "body": "Formerly 'multiple personality disorder.' <b>Two or more distinct personalities</b> (subpersonalities) develop, each with unique memories, behaviors, thoughts, emotions. Switching between them is usually <b>sudden, triggered by stress</b>. Primary/host personality appears most often. Women diagnosed <b>3× more often</b>. Typical onset <b>before age 5</b>, usually after childhood abuse."}, {"heading": "DID: Subpersonality Relationships", "body": "Three patterns: <b>1) Mutually amnesic:</b> no awareness of each other. <b>2) Mutually cognizant:</b> each aware of the rest. <b>3) One-way amnesic</b> (most common): some aware of others but not mutual — 'co-conscious' subpersonalities are quiet observers. Average: <b>15 subpersonalities (women), 8 (men)</b>; often appear in groups of 2-3."}, {"heading": "DID: Differences Between Subpersonalities", "body": "Can differ dramatically in: <b>Identifying features</b> (age, sex, race, family history). <b>Abilities/preferences</b> (languages, instruments, driving). <b>Physiological responses</b> (ANS activity, blood pressure, allergies). These measurable differences provide some of the strongest evidence that DID is genuine."}, {"heading": "DID: Controversies", "body": "Number of diagnoses has increased, but many clinicians <b>question its legitimacy</b>. Some argue cases are <b>iatrogenic</b> — unintentionally produced by practitioners (many cases emerge only during treatment). Counter: not true of all cases, and diagnostic procedures have improved. Debate continues."}, {"heading": "Repressed vs False Memories", "body": "Claims of recovered childhood abuse memories have declined. Debate: Are these <b>genuine repressed memories</b> or <b>false memory syndrome</b>? Some memories may be flawed illusions created by suggestion. Some people are more prone to false memories. False memories have been created in labs. Child sexual abuse IS often genuinely remembered, however."}, {"heading": "Theories of Dissociative Disorders", "body": "<b>Psychodynamic:</b> caused by <b>repression</b> — massive unconscious blocking of painful memories. DID = lifetime of excessive repression from traumatic childhood. <b>CBT:</b> dissociation learned through operant conditioning — forgetting reduces anxiety → reinforced. <b>State-dependent learning:</b> memories tied to specific arousal states. <b>Self-hypnosis:</b> parallels between hypnotic amnesia and dissociation."}, {"heading": "Treatment of Dissociative Disorders", "body": "<b>Amnesia/fugue:</b> often recover on their own. Treatments: psychodynamic therapy (search unconscious), <b>hypnotic therapy</b>, drug therapy (barbiturate 'truth serums'). <b>DID:</b> typically does NOT recover without treatment. Goals: recognize the disorder, recover memory gaps, <b>integrate subpersonalities into one (fusion)</b>. Uses psychodynamic therapy, hypnotherapy, group/family therapy."}, {"heading": "Depersonalization-Derealization Disorder", "body": "DSM-5 categorizes as dissociative but <b>NOT characterized by memory difficulties</b>. Central symptom: persistent episodes of <b>depersonalization</b> (feeling detached from own body/mind, observing self from outside) and/or <b>derealization</b> (feeling people/objects are unreal). Transient experiences are common; the disorder is persistent, distressing, and impairing."}, {"heading": "Key Concepts Summary", "body": "<b>Stress:</b> stressor + stress response. <b>ANS:</b> sympathetic (arousal) vs parasympathetic (calm). <b>HPA:</b> hypothalamus→pituitary→adrenal→cortisol. <b>Acute stress disorder:</b> <1 month. <b>PTSD:</b> >1 month. <b>PTSD symptoms:</b> reexperiencing, avoidance, negative cognitions, hyperarousal. <b>Dissociative disorders:</b> amnesia, fugue, DID, depersonalization-derealization. <b>DID:</b> 2+ subpersonalities, onset before 5, often after abuse."}], "quiz": [{"q": "A stressor is an event that creates:", "a": ["Happiness", "Demands and fear", "Sleep", "Hunger"], "c": 1}, {"q": "Stress response is a person's:", "a": ["Stressor", "Reactions to demands", "Dream", "Memory"], "c": 1}, {"q": "Fight-or-flight response is set in the:", "a": ["Cerebellum", "Hypothalamus", "Cortex", "Spinal cord"], "c": 1}, {"q": "The sympathetic NS produces:", "a": ["Calm", "Arousal", "Sleep", "Digestion"], "c": 1}, {"q": "The parasympathetic NS returns body to:", "a": ["Arousal", "Normal/calm", "Fight mode", "Stress"], "c": 1}, {"q": "HPA stands for:", "a": ["Hypothalamic-Pituitary-Adrenal", "High Performance Anxiety", "Human Psychological Assessment", "None"], "c": 0}, {"q": "The HPA pathway releases:", "a": ["Serotonin", "Corticosteroids (stress hormones)", "Insulin", "Melatonin"], "c": 1}, {"q": "Epinephrine and norepinephrine are released by the:", "a": ["Pituitary", "Adrenal medulla", "Thyroid", "Pancreas"], "c": 1}, {"q": "Acute stress disorder lasts less than:", "a": ["1 week", "1 month", "6 months", "1 year"], "c": 1}, {"q": "PTSD symptoms last more than:", "a": ["1 day", "1 week", "1 month", "1 year minimum"], "c": 2}, {"q": "___% of acute stress disorder cases become PTSD:", "a": ["20", "50", "80", "100"], "c": 2}, {"q": "PTSD is more common in:", "a": ["Men", "Women (2:1 ratio)", "Children only", "Elderly only"], "c": 1}, {"q": "PTSD affects ___% of Americans per year:", "a": ["0.5", "3.5", "10", "25"], "c": 1}, {"q": "After trauma, ~___% of women develop PTSD:", "a": ["5", "10", "20", "50"], "c": 2}, {"q": "PTSD reexperiencing symptoms include:", "a": ["Only avoidance", "Flashbacks, nightmares, intrusive memories", "Only sleep problems", "Only anger"], "c": 1}, {"q": "'Shell shock' is now called:", "a": ["Acute stress", "PTSD", "Depression", "Schizophrenia"], "c": 1}, {"q": "___% of Vietnam combat vets had PTSD:", "a": ["5", "10", "29", "50"], "c": 2}, {"q": "Civilian traumas cause PTSD ___ as often as combat:", "a": ["Less", "Equally", "10× more", "Never"], "c": 2}, {"q": "Cortisol abnormalities are linked to:", "a": ["Only cancer", "Anxiety and mood disorders", "Only diabetes", "Only allergies"], "c": 1}, {"q": "PTSD risk increases with:", "a": ["Less severe trauma", "More severe/prolonged trauma", "Better social support", "Older age at trauma"], "c": 1}, {"q": "EMDR stands for:", "a": ["Emotional Memory Disorder Relief", "Eye Movement Desensitization and Reprocessing", "Early Mental Disorder Recognition", "None"], "c": 1}, {"q": "Psychological debriefing is:", "a": ["Well supported by research", "NOT supported by research", "Required by law", "Always helpful"], "c": 1}, {"q": "About half of PTSD cases improve within:", "a": ["1 week", "6 months", "5 years", "Never"], "c": 1}, {"q": "Dissociative disorders involve disruptions in:", "a": ["Only behavior", "Memory and identity", "Only mood", "Only sleep"], "c": 1}, {"q": "Dissociative amnesia involves inability to recall:", "a": ["Encyclopedic facts", "Important life information (usually traumatic)", "Only names", "Only numbers"], "c": 1}, {"q": "Most common type of dissociative amnesia:", "a": ["Generalized", "Continuous", "Localized", "Selective"], "c": 2}, {"q": "Dissociative fugue involves forgetting identity AND:", "a": ["Staying home", "Fleeing to a different location", "Only sleeping", "Only crying"], "c": 1}, {"q": "DID was formerly called:", "a": ["Schizophrenia", "Multiple personality disorder", "Bipolar disorder", "PTSD"], "c": 1}, {"q": "DID involves ___ or more distinct personalities:", "a": ["1", "2", "5", "10 minimum"], "c": 1}, {"q": "Switching between subpersonalities is triggered by:", "a": ["Sleep", "Stress", "Medication", "Nothing"], "c": 1}, {"q": "DID is diagnosed ___× more in women:", "a": ["1", "2", "3", "5"], "c": 2}, {"q": "Typical DID onset is before age:", "a": ["2", "5", "10", "18"], "c": 1}, {"q": "Average subpersonalities in women with DID:", "a": ["3", "8", "15", "25"], "c": 2}, {"q": "Most common subpersonality relationship:", "a": ["Mutually amnesic", "Mutually cognizant", "One-way amnesic", "No relationship"], "c": 2}, {"q": "Subpersonalities can differ in:", "a": ["Only name", "Age, sex, abilities, physiological responses", "Nothing", "Only language"], "c": 1}, {"q": "Iatrogenic means:", "a": ["Self-caused", "Unintentionally produced by practitioners", "Genetic", "Environmental"], "c": 1}, {"q": "False memory syndrome suggests memories may be:", "a": ["Always accurate", "Flawed illusions from suggestion", "Never forgotten", "Physically stored"], "c": 1}, {"q": "Psychodynamic theory explains dissociation through:", "a": ["Conditioning", "Repression", "Brain damage", "Genetics only"], "c": 1}, {"q": "State-dependent learning means memories tied to:", "a": ["Location only", "Specific arousal states", "Only emotions", "Only time of day"], "c": 1}, {"q": "DID typically ___ recover without treatment:", "a": ["Does", "Does not", "Always", "Sometimes"], "c": 1}, {"q": "Fusion in DID treatment means:", "a": ["Separating personalities", "Integrating subpersonalities into one", "Adding new personalities", "Ignoring the disorder"], "c": 1}, {"q": "'Truth serums' are actually:", "a": ["Antipsychotics", "Barbiturates", "Vitamins", "Antibiotics"], "c": 1}, {"q": "Depersonalization feels like:", "a": ["Extreme happiness", "Detachment from own body/mind", "Physical pain", "Hunger"], "c": 1}, {"q": "Derealization feels like:", "a": ["Things are very real", "People/objects seem unreal", "Physical warmth", "Extreme clarity"], "c": 1}, {"q": "Transient depersonalization is:", "a": ["Very rare", "Relatively common", "Always a disorder", "Never normal"], "c": 1}, {"q": "Equifinality: different paths → ___ outcome:", "a": ["Different", "Same", "No", "Random"], "c": 1}, {"q": "Multifinality: similar paths → ___ outcomes:", "a": ["Same", "Different", "No", "Always bad"], "c": 1}, {"q": "Prolonged exposure is a treatment for:", "a": ["Schizophrenia", "PTSD", "Diabetes", "Heart disease"], "c": 1}, {"q": "Dissociative amnesia is NOT caused by:", "a": ["Trauma", "Stress", "Physical factors", "Upsetting events"], "c": 2}, {"q": "The host personality in DID:", "a": ["Never appears", "Appears most often", "Is always male", "Is created by therapy"], "c": 1}]}, {"id": "psy-ch10", "title": "Chapter 10: Disorders Featuring Somatic Symptoms", "ln": "PSY 309 · Ch 10", "notes": [{"heading": "Overview — Somatic Symptom Disorders", "body": "DSM-5 identifies disorders where <b>somatic (physical) symptoms</b> are primarily caused by psychological factors or trigger excessive anxiety/concern. Key disorders: <b>Factitious disorder, Conversion disorder, Somatic symptom disorder, Illness anxiety disorder</b>, and Psychological factors affecting other medical conditions."}, {"heading": "Factitious Disorder", "body": "<b>Imposed on self (Munchausen syndrome):</b> false creation of physical/psychological symptoms or deceptive production of injury — <b>without external rewards</b>. Person presents themselves as ill/damaged. <b>Imposed on another (Munchausen by proxy):</b> same behavior but inflicted on another person (victim). Links: poor social support, extensive childhood medical treatment, grudge against medical profession, often healthcare workers."}, {"heading": "Conversion Disorder", "body": "<b>Neurological-like symptoms</b> inconsistent with known neurological or medical disease. NOT consciously wanted or purposely produced. Usually begins in <b>late childhood/young adulthood</b>, often appears <b>suddenly during extreme stress</b>. Example: <b>glove anesthesia</b> — entire hand goes numb from fingertips to wrist (doesn't match nerve distribution)."}, {"heading": "Somatic Symptom Disorder", "body": "At least one <b>upsetting or repeatedly disruptive physical symptom</b>. Person has an <b>unreasonable number of thoughts, feelings, and behaviors</b> about the symptom: repeated excessive thoughts about seriousness, continual high anxiety, disproportionate time/energy spent on symptoms. Symptoms usually continue <b>>6 months</b>. Formerly part of 'somatization disorder.'"}, {"heading": "Somatic Symptom Disorder — Patterns", "body": "<b>Somatization pattern:</b> long-lasting physical ailments with no physical basis, dramatic and exaggerated, 'doctor shopping.' Prevalence ~4%. Links to abuse and genetics. <b>Predominant pain pattern:</b> pain with known or unknown source, may develop after genuine pain from accident/illness. Both patterns occur as escapes from stress."}, {"heading": "Causes — Psychodynamic View", "body": "<b>Freud's theory:</b> underlying emotional conflicts are <b>converted</b> into physical symptoms (hence 'conversion disorder'). Two defense mechanisms: <b>Primary gain:</b> internal — keeps conflict unconscious. <b>Secondary gain:</b> external — symptoms bring attention, escape from responsibilities. Contemporary psychodynamic theorists agree on unconscious childhood conflicts → anxiety → physical pain."}, {"heading": "Causes — Cognitive-Behavioral View", "body": "Physical symptoms are <b>rewarded and maintained through reinforcement</b>. Symptoms create distance from unpleasant relationships, bring attention, serve as communication. Influenced by <b>modeling</b> (observing others' medical problems). Secondary gains reinforce the behavior. This view has <b>NOT been widely tested</b> or strongly supported by research."}, {"heading": "Causes — Multicultural View", "body": "Some Western clinicians question excessive focus on somatic symptoms in DSM-5; others see this as bias. Formation of somatic complaints is the <b>norm in many non-Western cultures</b> — physical complaints may be the culturally acceptable way to express psychological distress. Bodily and psychological reactions are influenced by culture."}, {"heading": "Comparison Table: Somatic Disorders", "body": "<b>Malingering:</b> voluntary, maybe psychosocial, yes goal. <b>Factitious:</b> voluntary, yes psychosocial, no goal. <b>Conversion:</b> involuntary, yes psychosocial, maybe goal. <b>Somatic symptom:</b> involuntary, yes psychosocial, maybe goal. <b>Illness anxiety:</b> involuntary, yes psychosocial, no goal. <b>Psychophysiological:</b> involuntary, yes psychosocial, no goal. <b>Physical illness:</b> involuntary, maybe psychosocial, no goal."}, {"heading": "Treatment of Conversion & Somatic Symptom Disorders", "body": "<b>Focus on cause:</b> insight therapy (psychodynamic), exposure (think about triggering trauma), drug therapy (antidepressants). <b>Focus on symptoms:</b> education, reinforcement, cognitive restructuring. For preoccupation disorders (illness anxiety): <b>antidepressants, ERP (exposure and response prevention), CBT</b> — similar to OCD treatments."}, {"heading": "Illness Anxiety Disorder", "body": "Formerly <b>hypochondriasis</b>. Preoccupation with having or getting a <b>significant illness</b> despite absent or mild somatic symptoms. Unduly high health-related behaviors OR dysfunctional health-avoidance. Lasts <b>≥6 months</b>. Begins most often in <b>early adulthood</b>. Affects men and women equally. Prevalence: <b>1-5%</b>. Treated like anxiety disorders (OCD approach)."}, {"heading": "Psychophysiological Disorders — Overview", "body": "DSM-5: <b>Psychological factors affecting other medical conditions</b>. Different from factitious/conversion/illness anxiety — these involve <b>real, significant medical conditions</b> with actual physical damage. Psychological factors negatively affect, obstruct treatment of, or trigger/worsen the medical condition."}, {"heading": "Traditional Psychophysiological Disorders", "body": "Classic examples: <b>ulcers, asthma, insomnia, chronic headaches, migraine headaches, hypertension</b> (high blood pressure). All have genuine physical pathology that is caused or worsened by psychological stress. The interaction of psychosocial and physical factors is now considered the <b>rule, not the exception</b>."}, {"heading": "Causes — Biopsychosocial", "body": "<b>Biological:</b> defects in ANS, genetic predispositions, specific organ vulnerabilities. <b>Psychological:</b> needs, attitudes, emotions, personality, coping styles → overreact to stressors. <b>Sociocultural:</b> adverse social conditions (poverty, dangerous environments, discrimination) produce stress that interacts with biological and psychological factors."}, {"heading": "Social Adjustment Rating Scale", "body": "Developed in 1967. Examines relationship between <b>life stress and onset of illness</b>. Top stressors: death of spouse, divorce, marital separation, jail term, death of family member. Greater life stress → <b>greater likelihood of illness</b>. Researchers even found links between traumatic stress and death. Limitation: doesn't account for individual stress reactions."}, {"heading": "Psychoneuroimmunology", "body": "Studies how <b>stressful events result in viral/bacterial infection</b>. Stress can slow <b>lymphocyte activity</b> and interfere with immune function. <b>Lymphocytes</b> = white blood cells (helper T-cells, natural killer T-cells, B-cells) that attack invaders and cancer cells. <b>Antigens</b> = foreign invaders identified and destroyed by the immune system."}, {"heading": "Four Factors Affecting Immune Function", "body": "<b>1) Biochemical:</b> sympathetic NS releases norepinephrine; HPA releases corticosteroids; chronic inflammation, cytokines. <b>2) Behavioral changes:</b> poor sleep, poor diet, less exercise, more smoking/drinking. <b>3) Personality style:</b> hardy/resilient = better immune function; hopelessness = worse. <b>4) Social support:</b> loneliness = poorer immune function; affiliation/support = protection."}, {"heading": "Behavioral Medicine — Overview", "body": "<b>Behavioral medicine:</b> combines psychological and physical interventions to treat or prevent medical problems. Techniques: relaxation training, biofeedback, meditation, hypnosis, CBT interventions, support groups, combination approaches. All tend to be <b>equally effective</b> and work best <b>combined with medical treatment</b>."}, {"heading": "Relaxation Training & Biofeedback", "body": "<b>Relaxation training:</b> learning to relax muscles at will → reduces anxiety. Used for high blood pressure, headaches, insomnia, asthma, surgical pain, cancer treatment side effects. <b>Biofeedback (EMG):</b> connected to machinery giving continuous readings of involuntary body activities. Used for headaches, muscular disabilities, heartbeat irregularities, asthma, migraines, stuttering, pain."}, {"heading": "Meditation, Hypnosis & CBT", "body": "<b>Meditation:</b> turning concentration inward, achieving altered consciousness. Used for pain, blood pressure, heart problems, insomnia, asthma. <b>Hypnosis:</b> guided into suggestible state; can learn self-hypnosis. <b>CBT interventions:</b> teaching new attitudes and cognitive responses. <b>Support groups:</b> reducing depression/anxiety helps reduce physical ills. Used for HIV, asthma, cancer, headache, arthritis."}, {"heading": "Malingering vs Factitious", "body": "Key distinction: <b>Malingering:</b> intentionally faking symptoms for an <b>obvious external goal</b> (avoid work, get money, evade criminal charges). <b>Factitious disorder:</b> intentionally faking but <b>NO obvious external reward</b> — the goal is to assume the 'sick role.' Both are voluntary, but the motivation differs."}, {"heading": "Key Concepts Summary", "body": "<b>Factitious:</b> fake symptoms (Munchausen/by proxy). <b>Conversion:</b> neurological-like symptoms, involuntary, from stress. <b>Somatic symptom disorder:</b> excessive concern about real symptoms. <b>Illness anxiety:</b> preoccupation with having illness (formerly hypochondriasis). <b>Psychophysiological:</b> real medical conditions worsened by psychological factors. <b>Psychoneuroimmunology:</b> stress → immune dysfunction. <b>Behavioral medicine:</b> relaxation, biofeedback, meditation, hypnosis, CBT, support groups."}], "quiz": [{"q": "Factitious disorder involves ___ creation of symptoms:", "a": ["Accidental", "False/deceptive", "Unconscious", "Natural"], "c": 1}, {"q": "Munchausen syndrome is factitious disorder imposed on:", "a": ["Another person", "Self", "No one", "A group"], "c": 1}, {"q": "Munchausen by proxy is imposed on:", "a": ["Self", "Another person (victim)", "Animals", "Objects"], "c": 1}, {"q": "Factitious disorder has ___ external rewards:", "a": ["Many", "No", "Always financial", "Legal"], "c": 1}, {"q": "Conversion disorder symptoms are:", "a": ["Consciously produced", "Neurological-like but inconsistent with known disease", "Always permanent", "Only in elderly"], "c": 1}, {"q": "Glove anesthesia is an example of:", "a": ["Factitious disorder", "Conversion disorder", "Illness anxiety", "Malingering"], "c": 1}, {"q": "Conversion disorder often appears suddenly during:", "a": ["Sleep", "Extreme stress", "Exercise", "Eating"], "c": 1}, {"q": "Somatic symptom disorder symptoms last:", "a": ["1 day", "1 week", ">6 months", "Exactly 1 year"], "c": 2}, {"q": "In somatic symptom disorder, the person has ___ thoughts about symptoms:", "a": ["No", "Reasonable", "Unreasonably excessive", "Only positive"], "c": 2}, {"q": "Somatization pattern involves 'doctor:", "a": ["Avoidance", "Shopping (seeking many doctors)", "Trust", "Phobia"], "c": 1}, {"q": "Freud explained conversion through:", "a": ["Brain damage", "Emotional conflicts converted to physical symptoms", "Genetics only", "Medication effects"], "c": 1}, {"q": "Primary gain keeps conflict:", "a": ["Conscious", "Unconscious", "Public", "Shared"], "c": 1}, {"q": "Secondary gain brings:", "a": ["Internal peace", "External attention/escape from responsibilities", "Nothing", "Pain"], "c": 1}, {"q": "CBT view: symptoms are maintained through:", "a": ["Unconscious conflict", "Reinforcement (rewards)", "Brain damage", "Genetics"], "c": 1}, {"q": "Somatic complaints are the norm in many:", "a": ["Western cultures", "Non-Western cultures", "No cultures", "Only American culture"], "c": 1}, {"q": "Illness anxiety disorder was formerly called:", "a": ["Conversion disorder", "Hypochondriasis", "Munchausen", "Somatization"], "c": 1}, {"q": "Illness anxiety disorder: person has ___ somatic symptoms:", "a": ["Severe", "No or mild", "Extreme", "Life-threatening"], "c": 1}, {"q": "Illness anxiety prevalence:", "a": ["0.01%", "1-5%", "20%", "50%"], "c": 1}, {"q": "Illness anxiety is treated like:", "a": ["Schizophrenia", "OCD/anxiety disorders", "Bipolar", "PTSD"], "c": 1}, {"q": "Psychophysiological disorders involve:", "a": ["No physical damage", "Real medical conditions with physical damage", "Only psychological symptoms", "Faked symptoms"], "c": 1}, {"q": "Traditional psychophysiological disorders include:", "a": ["Only headaches", "Ulcers, asthma, insomnia, hypertension", "Only cancer", "Only diabetes"], "c": 1}, {"q": "Psychological factors affecting medical conditions is the ___ label:", "a": ["Old", "DSM-5", "Removed", "Unofficial"], "c": 1}, {"q": "Social Adjustment Rating Scale (1967) links:", "a": ["IQ and success", "Life stress and illness onset", "Age and memory", "Height and weight"], "c": 1}, {"q": "Top stressor on the scale:", "a": ["Divorce", "Jail term", "Death of spouse", "Job loss"], "c": 2}, {"q": "Greater life stress → greater likelihood of:", "a": ["Happiness", "Illness", "Wealth", "Intelligence"], "c": 1}, {"q": "Psychoneuroimmunology studies stress and:", "a": ["Brain size", "Immune function/infection", "Memory only", "Only hormones"], "c": 1}, {"q": "Lymphocytes are:", "a": ["Red blood cells", "White blood cells that fight invaders", "Platelets", "Hormones"], "c": 1}, {"q": "Types of lymphocytes include:", "a": ["Only B-cells", "Helper T-cells, killer T-cells, B-cells", "Only red cells", "Only platelets"], "c": 1}, {"q": "Stress hormones (corticosteroids) ___ immune function:", "a": ["Boost", "Reduce", "Don't affect", "Double"], "c": 1}, {"q": "Norepinephrine is released by the ___ NS during stress:", "a": ["Parasympathetic", "Sympathetic", "Central", "Peripheral only"], "c": 1}, {"q": "Behavioral changes from stress that hurt immunity include:", "a": ["Better sleep", "Poor sleep, diet, exercise; more smoking/drinking", "More exercise", "Better nutrition"], "c": 1}, {"q": "Hardy/resilient personality leads to ___ immune function:", "a": ["Worse", "Better", "No effect", "Same"], "c": 1}, {"q": "Loneliness leads to ___ immune function:", "a": ["Better", "Poorer", "No effect", "Same"], "c": 1}, {"q": "Social support ___ protect against illness:", "a": ["Does NOT", "Can", "Never", "Sometimes harms"], "c": 1}, {"q": "Behavioral medicine combines:", "a": ["Only drugs", "Psychological and physical interventions", "Only surgery", "Only meditation"], "c": 1}, {"q": "Relaxation training helps treat:", "a": ["Only anxiety", "Headaches, insomnia, asthma, hypertension", "Only cancer", "Nothing"], "c": 1}, {"q": "Biofeedback gives readings of:", "a": ["Thoughts", "Involuntary bodily activities", "Only blood type", "Only DNA"], "c": 1}, {"q": "EMG biofeedback measures:", "a": ["Heart rate", "Muscle tension", "Brain waves", "Blood sugar"], "c": 1}, {"q": "Meditation involves turning concentration:", "a": ["Outward", "Inward", "Off", "To others"], "c": 1}, {"q": "Psychological treatments for physical problems work best when:", "a": ["Used alone", "Combined with medical treatment", "Without medication", "Only in hospitals"], "c": 1}, {"q": "Malingering fakes symptoms for:", "a": ["No reason", "Obvious external goals (money, avoiding work)", "The sick role", "Attention only"], "c": 1}, {"q": "Factitious disorder fakes symptoms to assume the:", "a": ["Worker role", "Sick role", "Parent role", "Student role"], "c": 1}, {"q": "Conversion disorder symptoms are:", "a": ["Voluntary", "Involuntary (not consciously produced)", "Always permanent", "Imaginary"], "c": 1}, {"q": "Conversion and somatic disorders are both responses to:", "a": ["Exercise", "Severe stress", "Good news", "Sleep"], "c": 1}, {"q": "ERP treatment is borrowed from ___ disorder treatment:", "a": ["Schizophrenia", "OCD", "Bipolar", "ADHD"], "c": 1}, {"q": "Antidepressants are used to treat:", "a": ["Only depression", "Conversion, somatic, and illness anxiety disorders", "Only physical pain", "Only insomnia"], "c": 1}, {"q": "Cytokines are involved in:", "a": ["Digestion", "Inflammation and immune response", "Only bone growth", "Only reproduction"], "c": 1}, {"q": "Hypnosis can be done without a hypnotist through:", "a": ["Medication", "Self-hypnosis", "Surgery", "Nothing"], "c": 1}, {"q": "Cognitive restructuring teaches new:", "a": ["Physical exercises", "Attitudes and cognitive responses", "Surgical techniques", "Medication schedules"], "c": 1}, {"q": "The interaction of psychosocial and physical factors is now the:", "a": ["Exception", "Rule", "Myth", "Outdated idea"], "c": 1}]}, {"id": "psy-ch7", "title": "Chapter 7: Depressive & Bipolar Disorders", "ln": "PSY 309 · Ch 7", "notes": [{"heading": "Key Definitions", "body": "<b>Depression:</b> low, sad state with significant sadness, low energy, low self-worth, guilt. <b>Mania:</b> state of euphoria or frenzied activity with exaggerated beliefs. <b>Unipolar depression:</b> depression WITHOUT a history of mania. <b>Bipolar disorder:</b> alternating or intermixed periods of mania AND depression."}, {"heading": "Unipolar Depression — Prevalence", "body": "<b>8%</b> of US adults suffer severe unipolar depression per year; 5% mild forms. <b>20%</b> of all adults experience it at some point. Average onset age: <b>19 years</b>. Higher rates among chronically ill elderly. Women are <b>2× more likely</b> than men to be diagnosed."}, {"heading": "Depression Symptoms — 5 Domains", "body": "<b>Emotional:</b> feeling miserable, empty, humiliated; little pleasure. <b>Motivational:</b> lacking drive, initiative; 6-15% with severe depression die by suicide. <b>Behavioral:</b> less active, less productive. <b>Cognitive:</b> negative self-views, self-blame, pessimism. <b>Physical:</b> headaches, dizziness, general pain. Symptoms vary person to person."}, {"heading": "Types of Depressive Disorders (DSM-5)", "body": "<b>Major depressive disorder:</b> severe, disabling depression. <b>Persistent depressive disorder:</b> chronic unipolar depression (formerly dysthymic). <b>Premenstrual dysphoric disorder:</b> significant depression during week before menstruation. When persistent leads to major → called <b>'double depression.'</b>"}, {"heading": "Major Depressive Episode Criteria", "body": "For <b>2+ weeks:</b> depressed mood most of each day AND/OR decreased interest/enjoyment. Plus <b>3-4 additional symptoms:</b> weight/appetite change, insomnia/hypersomnia, agitation/motor decrease, fatigue, worthlessness/guilt, concentration problems, thoughts of death/suicide. Must cause significant distress/impairment."}, {"heading": "Persistent Depressive Disorder", "body": "Symptoms of major or mild depression for <b>at least 2 years</b>. During that period, symptoms not absent for >2 months at a time. No history of mania/hypomania. 'Mild but chronic.' Prevalence: <b>1.5-5%</b>. Longer lasting but often less disabling than major depression."}, {"heading": "Biological Causes — Genetics & NTs", "body": "<b>Genetic factors:</b> family pedigree studies, twin studies, and molecular biology all support hereditary component. <b>Biochemical:</b> low activity of <b>serotonin</b> and <b>norepinephrine</b>. 1950s: blood pressure meds that lowered these NTs caused depression. Antidepressants that raise them relieve depression. Interaction is complex — other NTs involved too."}, {"heading": "Biological Causes — Brain & Immune", "body": "<b>Brain circuits:</b> prefrontal cortex, hippocampus, amygdala, and <b>subgenual cingulate (Brodmann Area 25)</b> form the depression circuit. <b>Hormones:</b> HPA pathway, abnormal melatonin ('Dracula hormone') → seasonal affective disorder. <b>Immune system:</b> stress → immune dysregulation → slower lymphocytes, increased CRP/inflammation → depression."}, {"heading": "Psychodynamic View of Depression", "body": "<b>Freud & Abraham:</b> real or imagined (symbolic) loss → regression to oral stage → <b>introjection</b> (directing feelings for lost object onto oneself) → depression. Those with oral stage issues are at greater risk. <b>Object relations:</b> depression results when relationships leave people feeling unsafe/insecure, especially in early life. Strengths: loss does trigger depression. Weaknesses: hard to test, inconsistent findings."}, {"heading": "Cognitive-Behavioral View", "body": "<b>Behavioral:</b> reduction in positive life rewards → fewer positive behaviors → further reduced rewards → <b>downward spiral</b> into depression. Social rewards especially important. <b>Beck's cognitive triad:</b> negative views of <b>experiences, oneself, and the future</b> → depression. Maladaptive attitudes + errors in thinking + automatic negative thoughts."}, {"heading": "Learned Helplessness Theory", "body": "<b>Seligman:</b> depression occurs when people feel <b>loss of control</b> over life reinforcements. <b>Attribution-helplessness revision:</b> when bad events are attributed to <b>internal</b> ('it's my fault'), <b>global</b> ('it affects everything'), and <b>stable</b> ('it will never change') causes → depression. External, specific, unstable attributions → less depression."}, {"heading": "Sociocultural Views", "body": "<b>Family-social:</b> declining social rewards → depression. Depressed people show social deficits → others avoid them → fewer contacts → more depression (two-way street). Depression tied to <b>unavailable social support</b>, isolation, lack of intimacy. Divorced/separated: 3× depression rate of married people."}, {"heading": "Gender & Depression", "body": "Women are <b>2× more likely</b> diagnosed across cultures. Six explanations: <b>1) Artifact theory</b> (clinicians miss male depression). <b>2) Hormone explanation.</b> <b>3) Life stress theory</b> (women face more stress). <b>4) Body dissatisfaction.</b> <b>5) Lack-of-control theory</b> (learned helplessness). <b>6) Rumination theory</b> (women ruminate more when mood darkens)."}, {"heading": "Multicultural & Integrative Views", "body": "Depression found worldwide but varies by country. Non-Western: more <b>physical symptoms</b>. As countries Westernize → more cognitive symptoms. Few differences in overall rate among US racial groups, but <b>striking diffe
