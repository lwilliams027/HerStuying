 "c": 0}, {"q": "To convert mass % to molarity you need:", "a": ["Only mass", "Solution density and molar mass", "Only volume", "Temperature"], "c": 1}, {"q": "70% rubbing alcohol is expressed as:", "a": ["Mass %", "Volume %", "Molarity", "ppm"], "c": 1}, {"q": "Mass of solution =:", "a": ["Mass solute only", "Mass solvent only", "Mass solute + mass solvent", "Volume × density"], "c": 2}, {"q": "The conversion chain grams→moles→molarity requires knowing:", "a": ["Molar mass and volume", "Only mass", "Only density", "Only temperature"], "c": 0}]}, {"id": "chem-ch4", "title": "Chapter 4: Stoichiometry of Chemical Reactions", "ln": "CHEM 260 · Ch 4", "notes": [{"heading": "Learning Objectives", "body": "By the end of Ch 4: <b>1)</b> Write and balance chemical equations. <b>2)</b> Classify common types of chemical reactions. <b>3)</b> Perform stoichiometric calculations. <b>4)</b> Calculate theoretical and percent yields."}, {"heading": "Chemical Reactions", "body": "Reactions involve <b>chemical changes</b> resulting in new substances. Atoms <b>rearrange</b> to produce new molecules. Chemical equations are shorthand descriptions providing: formulas of reactants/products, states, relative numbers of molecules, and info to determine masses consumed/produced."}, {"heading": "Chemical Equation Format", "body": "<b>Reactants → Products</b>. Example: CH₄(g) + O₂(g) → CO₂(g) + 2H₂O(g). Equations show formulas, coefficients (how many), and state symbols: <b>(s)</b> solid, <b>(l)</b> liquid, <b>(g)</b> gas, <b>(aq)</b> aqueous (dissolved in water)."}, {"heading": "Balancing Equations — Why", "body": "'Balanced' means <b>equal numbers of atoms</b> for each element on both sides. Required by the <b>Law of Conservation of Mass</b> — atoms are neither created nor destroyed. We adjust <b>coefficients</b> (numbers in front), NEVER subscripts (changing subscripts changes the substance!)."}, {"heading": "Balancing — How", "body": "<b>Step 1:</b> Write unbalanced equation. <b>Step 2:</b> Count atoms of each element on both sides. <b>Step 3:</b> Add coefficients to balance one element at a time. <b>Step 4:</b> Check ALL elements. <b>Step 5:</b> Add state symbols. Tip: save O and H for last; start with unique elements."}, {"heading": "Balancing Example: Methane", "body": "CH₄ + O₂ → CO₂ + H₂O (unbalanced). C: 1=1 ✓. H: 4≠2 → put 2 in front of H₂O. O: 2≠(2+2)=4 → put 2 in front of O₂. Final: <b>CH₄(g) + 2O₂(g) → CO₂(g) + 2H₂O(g)</b>. Check: C:1=1, H:4=4, O:4=4 ✓."}, {"heading": "Practice: Ethane Combustion", "body": "C₂H₆ + O₂ → CO₂ + H₂O. C: need 2 CO₂. H: need 3 H₂O. O: products have 2(2)+3(1)=7 O atoms → need 7/2 O₂. Multiply all by 2: <b>2C₂H₆(g) + 7O₂(g) → 4CO₂(g) + 6H₂O(g)</b>. Always verify every element balances."}, {"heading": "Equations for Ionic Reactions", "body": "Many reactions occur in <b>aqueous media</b> involving ions. Three levels of detail: <b>Molecular equation:</b> shows complete formulas. <b>Complete ionic equation:</b> shows all dissolved substances as individual ions. <b>Net ionic equation:</b> shows only the species that actually change."}, {"heading": "Molecular Equation Example", "body": "CaCl₂(aq) + 2AgNO₃(aq) → Ca(NO₃)₂(aq) + 2AgCl(s). Written with regular complete formulas. Does NOT explicitly show the ions present in solution. AgCl is solid (precipitate) — it does NOT dissociate."}, {"heading": "Complete Ionic Equation", "body": "Break all aqueous compounds into ions: Ca²⁺(aq) + 2Cl⁻(aq) + 2Ag⁺(aq) + 2NO₃⁻(aq) → Ca²⁺(aq) + 2NO₃⁻(aq) + 2AgCl(s). Solids, liquids, and gases stay as complete formulas. Only (aq) compounds split into ions."}, {"heading": "Net Ionic Equation", "body": "Remove <b>spectator ions</b> (appear unchanged on both sides). Ca²⁺ and NO₃⁻ are spectators. What remains: <b>Cl⁻(aq) + Ag⁺(aq) → AgCl(s)</b>. Use smallest whole-number coefficients. This shows ONLY what actually reacts."}, {"heading": "Spectator Ions", "body": "Ions that are present to maintain charge neutrality but are <b>neither chemically nor physically changed</b>. They appear on BOTH sides of the complete ionic equation. Identified by canceling identical ions from each side."}, {"heading": "Three Reaction Types", "body": "The three main types to remember: <b>1) Precipitation</b> — solid forms from mixing solutions. <b>2) Acid-Base</b> — H⁺ transfer. <b>3) Oxidation-Reduction (redox)</b> — electron transfer. Many reactions fall into one of these categories."}, {"heading": "Precipitation Reactions", "body": "A <b>solid (precipitate)</b> forms when two aqueous solutions are mixed. The precipitate is an ionic compound that is <b>insoluble</b> in water. Use solubility rules (Table 4.1) to predict which products precipitate. Example: AgCl, BaSO₄, PbI₂ are common precipitates."}, {"heading": "Acid-Base Reactions", "body": "A <b>hydrogen ion (H⁺)</b> is transferred from one species to another. <b>Acid:</b> produces H₃O⁺ (hydronium) in water. <b>Base:</b> produces OH⁻ (hydroxide) in water. HCl(aq) + H₂O → Cl⁻(aq) + H₃O⁺(aq)."}, {"heading": "Strong vs Weak Acids", "body": "<b>Strong acids:</b> H⁺ <b>completely</b> transfers to water → 100% dissociation. Examples: <b>HCl, HBr, HI, HNO₃, H₂SO₄, HClO₄</b> — memorize these! <b>Weak acids:</b> H⁺ <b>partially</b> transfers → equilibrium. Example: CH₃COOH (acetic acid). Most acids are weak."}, {"heading": "Bases", "body": "Substance that produces <b>OH⁻</b> in water. <b>Strong bases:</b> completely dissociate — mostly Group I/II metal hydroxides. NaOH → Na⁺ + OH⁻. <b>Common strong bases:</b> NaOH, KOH, Ca(OH)₂, Ba(OH)₂. <b>Weak bases:</b> partially produce OH⁻ by reacting with water. Example: NH₃ + H₂O ⇌ NH₄⁺ + OH⁻."}, {"heading": "Neutralization Reactions", "body": "A specific acid-base reaction: <b>Acid + Base → Salt + Water</b>. The salt is an ionic compound formed from the cation of the base and anion of the acid. Example: Mg(OH)₂(s) + 2HCl(aq) → MgCl₂(aq) + 2H₂O(l). MgCl₂ is the salt."}, {"heading": "Oxidation-Reduction (Redox)", "body": "Reactions where <b>electrons are transferred</b> from one reactant to another. Many (not all) involve oxygen. Examples: 2Na(s) + Cl₂(g) → 2NaCl(s). 2H₂(g) + O₂(g) → 2H₂O(g). Combustion reactions are always redox."}, {"heading": "Half-Reactions", "body": "The overall redox reaction can be split into two <b>half-reactions</b>. Example for 2Na + Cl₂ → 2NaCl: <b>Oxidation half:</b> 2Na → 2Na⁺ + 2e⁻ (Na loses electrons). <b>Reduction half:</b> Cl₂ + 2e⁻ → 2Cl⁻ (Cl gains electrons). Electrons lost = electrons gained."}, {"heading": "Oxidation and Reduction Defined", "body": "<b>Oxidation = LOSS of electrons</b> (oxidation number increases). <b>Reduction = GAIN of electrons</b> (oxidation number decreases). Memory aid: <b>OIL RIG</b> — Oxidation Is Loss, Reduction Is Gain. Or <b>LEO the lion says GER</b> — Lose Electrons Oxidation, Gain Electrons Reduction."}, {"heading": "Oxidizing and Reducing Agents", "body": "<b>Reducing agent:</b> the species that IS oxidized (it reduces others by giving them electrons). <b>Oxidizing agent:</b> the species that IS reduced (it oxidizes others by taking their electrons). In 2Na + Cl₂ → 2NaCl: Na is the reducing agent (oxidized), Cl₂ is the oxidizing agent (reduced)."}, {"heading": "Oxidation Numbers (States)", "body": "The charge an atom WOULD have if the compound were ionic. Rules: element = 0. Monatomic ion = charge. H = +1 (with nonmetals), −1 (with metals). O = −2 (usually). F = always −1. Sum = 0 for molecule, charge for ion. Oxidation = increase in ox #. Reduction = decrease."}, {"heading": "Identifying Redox Reactions", "body": "If <b>any element changes oxidation number</b> from reactants to products, it's a redox reaction. Track oxidation numbers for each element. If none change → NOT redox (could be precipitation or acid-base instead)."}, {"heading": "Key Equations & Definitions", "body": "<b>Balanced equation:</b> equal atoms each side, use coefficients. <b>Net ionic:</b> remove spectators. <b>Neutralization:</b> acid + base → salt + water. <b>OIL RIG:</b> Oxidation Is Loss, Reduction Is Gain. <b>Strong acids (6):</b> HCl, HBr, HI, HNO₃, H₂SO₄, HClO₄. <b>Strong bases:</b> Group I/II hydroxides."}], "quiz": [{"q": "When balancing, adjust:", "a": ["Subscripts", "Coefficients", "Atomic numbers", "State symbols"], "c": 1}, {"q": "Why can't you change subscripts?", "a": ["It's illegal", "It changes the substance", "It's too hard", "No reason"], "c": 1}, {"q": "Balanced equation obeys:", "a": ["Law of Gravity", "Law of Conservation of Mass", "Hess's Law", "Avogadro's Law"], "c": 1}, {"q": "CH₄ + 2O₂ → CO₂ + 2H₂O has ___ O atoms each side:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "(aq) means:", "a": ["Solid", "Liquid", "Gas", "Dissolved in water"], "c": 3}, {"q": "(s) means:", "a": ["Solution", "Solid", "Sublimate", "Solvent"], "c": 1}, {"q": "Molecular equation shows:", "a": ["All ions", "Complete formulas", "Only net reaction", "Only precipitates"], "c": 1}, {"q": "Complete ionic equation shows:", "a": ["Complete formulas only", "All dissolved substances as ions", "Only net ions", "Only solids"], "c": 1}, {"q": "Net ionic equation removes:", "a": ["All ions", "Spectator ions", "Products", "Reactants"], "c": 1}, {"q": "Spectator ions are:", "a": ["Changed in reaction", "Unchanged on both sides", "Only in products", "Only in reactants"], "c": 1}, {"q": "AgCl is a common:", "a": ["Acid", "Base", "Precipitate", "Gas"], "c": 2}, {"q": "Precipitate is a(n) ___ product:", "a": ["Aqueous", "Gaseous", "Insoluble solid", "Liquid"], "c": 2}, {"q": "Three main reaction types:", "a": ["Synthesis/decomposition/combustion", "Precipitation/acid-base/redox", "Exo/endo/neutral", "Fast/slow/equilibrium"], "c": 1}, {"q": "Acids produce ___ in water:", "a": ["OH⁻", "H₃O⁺", "Na⁺", "Cl⁻"], "c": 1}, {"q": "Bases produce ___ in water:", "a": ["H₃O⁺", "OH⁻", "H₂", "O₂"], "c": 1}, {"q": "Strong acids dissociate:", "a": ["Partially", "Completely", "Never", "Only when heated"], "c": 1}, {"q": "Which is a strong acid?", "a": ["CH₃COOH", "HF", "HCl", "H₂CO₃"], "c": 2}, {"q": "Which is a strong acid?", "a": ["HNO₃", "CH₃COOH", "HCN", "H₃PO₄"], "c": 0}, {"q": "Most acids are:", "a": ["Strong", "Weak", "Neutral", "Basic"], "c": 1}, {"q": "NaOH is a:", "a": ["Weak acid", "Strong acid", "Weak base", "Strong base"], "c": 3}, {"q": "NH₃ is a:", "a": ["Strong acid", "Weak acid", "Strong base", "Weak base"], "c": 3}, {"q": "Neutralization: acid + base →:", "a": ["Only water", "Only salt", "Salt + water", "Gas"], "c": 2}, {"q": "Mg(OH)₂ + 2HCl → MgCl₂ + 2H₂O — MgCl₂ is the:", "a": ["Acid", "Base", "Salt", "Water"], "c": 2}, {"q": "Redox reactions involve transfer of:", "a": ["Protons", "Neutrons", "Electrons", "Atoms"], "c": 2}, {"q": "Oxidation means:", "a": ["Gain of electrons", "Loss of electrons", "Gain of protons", "No change"], "c": 1}, {"q": "Reduction means:", "a": ["Loss of electrons", "Gain of electrons", "Loss of protons", "No change"], "c": 1}, {"q": "OIL RIG stands for:", "a": ["Oxygen Is Light, Reduction Is Good", "Oxidation Is Loss, Reduction Is Gain", "Only Ionic Lattices", "None"], "c": 1}, {"q": "In 2Na + Cl₂ → 2NaCl, Na is:", "a": ["Oxidized", "Reduced", "Unchanged", "A spectator"], "c": 0}, {"q": "In 2Na + Cl₂ → 2NaCl, Cl₂ is:", "a": ["Oxidized", "Reduced", "Unchanged", "A spectator"], "c": 1}, {"q": "The reducing agent is the species that:", "a": ["Is reduced", "Is oxidized", "Gains electrons", "Stays neutral"], "c": 1}, {"q": "The oxidizing agent is the species that:", "a": ["Is oxidized", "Is reduced", "Loses electrons", "Stays neutral"], "c": 1}, {"q": "Na is the ___ agent:", "a": ["Oxidizing", "Reducing", "Neutral", "Spectator"], "c": 1}, {"q": "Cl₂ is the ___ agent:", "a": ["Reducing", "Oxidizing", "Neutral", "Spectator"], "c": 1}, {"q": "Oxidation number of an element in its standard state:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Oxidation number of O in most compounds:", "a": ["0", "−1", "−2", "+2"], "c": 2}, {"q": "Oxidation number of H with nonmetals:", "a": ["−1", "0", "+1", "+2"], "c": 2}, {"q": "F oxidation number is always:", "a": ["0", "−1", "+1", "−2"], "c": 1}, {"q": "Sum of ox #s in a neutral molecule:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Oxidation = ___ in oxidation number:", "a": ["Decrease", "Increase", "No change", "Doubling"], "c": 1}, {"q": "Reduction = ___ in oxidation number:", "a": ["Increase", "Decrease", "No change", "Halving"], "c": 1}, {"q": "Combustion is always a ___ reaction:", "a": ["Acid-base", "Precipitation", "Redox", "Decomposition"], "c": 2}, {"q": "Strong bases are mostly ___ hydroxides:", "a": ["Nonmetal", "Transition metal", "Group I/II", "Noble gas"], "c": 2}, {"q": "H₂SO₄ is a:", "a": ["Weak acid", "Strong acid", "Base", "Salt"], "c": 1}, {"q": "HClO₄ is a:", "a": ["Weak acid", "Strong acid", "Base", "Salt"], "c": 1}, {"q": "HF is a:", "a": ["Strong acid", "Weak acid", "Base", "Salt"], "c": 1}, {"q": "Ca(OH)₂ is a:", "a": ["Weak base", "Strong base", "Acid", "Salt"], "c": 1}, {"q": "In a net ionic equation, only ___ species appear:", "a": ["All", "Spectator", "Reacting", "Dissolved"], "c": 2}, {"q": "2C₂H₆ + 7O₂ → 4CO₂ + 6H₂O — coefficient of O₂:", "a": ["2", "4", "6", "7"], "c": 3}, {"q": "Solubility rules help predict:", "a": ["Acid strength", "Precipitate formation", "Oxidation numbers", "Bond type"], "c": 1}, {"q": "Half-reactions separate oxidation from:", "a": ["Acids", "Bases", "Reduction", "Precipitation"], "c": 2}]}, {"id": "chem-ch4b", "title": "Chapter 4 (cont): Redox, Limiting Reagents & Yield", "ln": "CHEM 260 · Ch 4 cont.", "notes": [{"heading": "Oxidation Number Rules (REMEMBER!)", "body": "<b>1)</b> Atom in elemental substance = <b>0</b>. <b>2)</b> Monatomic ion = ion's charge. <b>3)</b> H: <b>+1</b> with nonmetals (H₂O, NH₃), <b>−1</b> with metals (LiH). <b>4)</b> O: <b>−2</b> in most compounds; −1 in peroxides (O₂²⁻); very rarely −½ in superoxides. <b>5)</b> F: <b>always −1</b>. <b>6)</b> Other halogens: −1 except with O or other halogens. <b>7)</b> Sum of all ox #s = 0 (molecule) or = charge (ion)."}, {"heading": "Assigning Oxidation Numbers — Examples", "body": "<b>H₂S:</b> H = +1 each (with nonmetal), so S = −2 [2(+1) + S = 0]. <b>SO₃²⁻:</b> O = −2 each, so S + 3(−2) = −2 → S = <b>+4</b>. <b>Na₂SO₄:</b> Na = +1 each, O = −2 each, so 2(+1) + S + 4(−2) = 0 → S = <b>+6</b>. Practice: always solve for the unknown using the sum rule."}, {"heading": "Oxidation vs Reduction — Review", "body": "<b>Oxidation = increase</b> in oxidation number (loss of electrons). <b>Reduction = decrease</b> in oxidation number (gain of electrons). In NaCl: Na goes from 0 → +1 (oxidized). Cl goes from 0 → −1 (reduced). If ANY element changes ox #, it's a redox reaction."}, {"heading": "Types of Redox: Combustion", "body": "<b>Combustion:</b> fuel (reductant) + oxidant (often O₂) react vigorously → heat and light (flame). Examples: CH₄(g) + 2O₂(g) → CO₂ + 2H₂O. Rocket fuel: 10Al(s) + 6NH₄ClO₄(s) → 4Al₂O₃(s) + 2AlCl₃(s) + 12H₂O(g) + 3N₂(g). Always redox because carbon/metals change ox #."}, {"heading": "Types of Redox: Single Displacement", "body": "An ion in solution is <b>displaced (replaced)</b> by oxidation of a metallic element. More reactive metal pushes out less reactive one. Example: Cu(s) + 2AgNO₃(aq) → Cu(NO₃)₂(aq) + 2Ag(s). Cu is oxidized (0→+2); Ag is reduced (+1→0). Use the activity series to predict if a reaction occurs."}, {"heading": "Balancing Redox — Half-Reaction Method (Acidic)", "body": "<b>Step 1:</b> Write two half-reactions (oxidation and reduction). <b>Step 2:</b> Balance all elements EXCEPT O and H. <b>Step 3:</b> Balance O by adding H₂O. <b>Step 4:</b> Balance H by adding H⁺. <b>Step 5:</b> Balance charge by adding electrons (e⁻). This is the systematic approach that always works."}, {"heading": "Balancing Redox — Combining Half-Reactions", "body": "<b>Step 6:</b> Multiply each half-reaction by smallest integers to make electrons EQUAL in both. <b>Step 7:</b> Add the balanced half-reactions together. Simplify by canceling species on both sides (electrons must completely cancel!)."}, {"heading": "Balancing Redox — Basic Solution", "body": "<b>Step 8:</b> For basic media, add additional steps after balancing in acidic: add OH⁻ to both sides (equal to # of H⁺). Combine H⁺ + OH⁻ → H₂O. Simplify by canceling redundant H₂O molecules. <b>Step 9:</b> Final check — atoms AND charge must both balance."}, {"heading": "Redox Practice 1", "body": "<b>Cu + H⁺ + NO₃⁻ → Cu²⁺ + NO + H₂O</b> (acidic). Oxidation: Cu → Cu²⁺ + 2e⁻. Reduction: NO₃⁻ + 4H⁺ + 3e⁻ → NO + 2H₂O. Multiply: 3Cu and 2NO₃⁻. Final: <b>3Cu + 8H⁺ + 2NO₃⁻ → 3Cu²⁺ + 2NO + 4H₂O</b>. Check atoms and charge on both sides."}, {"heading": "Redox Practice 2", "body": "<b>Cl₂(aq) + OH⁻(aq) → Cl⁻(aq) + ClO₃⁻(aq) + H₂O(l)</b> (basic). This is a disproportionation reaction — Cl₂ is both oxidized AND reduced. Cl goes from 0 to −1 (reduction) and 0 to +5 (oxidation). Balance using the half-reaction method + basic media steps."}, {"heading": "Stoichiometry — The Baking Analogy", "body": "Just like baking: a recipe needs specific <b>ratios</b> of ingredients. If you only have 1 egg instead of 2, you must cut ALL other ingredients in half → can only make half a cake. In chemistry: reactants must be in the correct <b>mole ratios</b> from the balanced equation."}, {"heading": "Limiting Reagent — Definition", "body": "The <b>limiting reagent</b> (limiting reactant) is the reactant that <b>runs out first</b>. It determines the <b>maximum amount of product</b> that can form. The other reactant(s) are in <b>excess</b> — some will be left over when the reaction is complete."}, {"heading": "Identifying the Limiting Reagent", "body": "<b>Method:</b> For each reactant, calculate how much product it could make. The reactant that produces the <b>LEAST product</b> is the limiting reagent. Steps: <b>1)</b> Convert each reactant to moles. <b>2)</b> Use mole ratios to find moles of product from each. <b>3)</b> Smallest result → that reactant is limiting."}, {"heading": "Limiting Reagent Example: H₂ Combustion (moles)", "body": "2H₂ + O₂ → 2H₂O. Given: 2 mol H₂ and 2 mol O₂. From H₂: 2 mol H₂ × (2 mol H₂O / 2 mol H₂) = <b>2 mol H₂O</b>. From O₂: 2 mol O₂ × (2 mol H₂O / 1 mol O₂) = <b>4 mol H₂O</b>. H₂ produces less → <b>H₂ is limiting</b>. 1 mol O₂ left over (excess)."}, {"heading": "Limiting Reagent Example: H₂ Combustion (grams)", "body": "8 g H₂ + 8 g O₂ → H₂O? Convert to moles: H₂: 8/2.02 = 3.96 mol. O₂: 8/32.00 = 0.25 mol. Product from H₂: 3.96 × (2/2) = 3.96 mol H₂O. Product from O₂: 0.25 × (2/1) = 0.50 mol H₂O. O₂ gives less → <b>O₂ is limiting</b>. Max product = 0.50 mol H₂O."}, {"heading": "Limiting Reagent — Step-by-Step Method", "body": "<b>1)</b> Convert ALL reactant masses to moles (÷ molar mass). <b>2)</b> For each reactant, calculate moles of ONE product using mole ratios. <b>3)</b> Compare: whichever reactant gives the <b>smallest</b> amount of product is the limiting reagent. <b>4)</b> Use the limiting reagent amount for all further calculations."}, {"heading": "Theoretical Yield — Definition", "body": "The <b>maximum amount of product</b> that could be formed from the limiting reagent, assuming: <b>1)</b> No side reactions. <b>2)</b> Complete reaction (100% conversion). Calculated from the limiting reagent using mole ratios, then convert moles → grams if needed."}, {"heading": "Theoretical Yield Example", "body": "CH₄ + 2O₂ → CO₂ + 2H₂O. 10 g CH₄ + 10 g O₂. From CH₄: 10/16.04 = 0.624 mol → 0.624 × 2 = 1.247 mol H₂O → 22.5 g. From O₂: 10/32.00 = 0.3125 mol → 0.3125 × (2/2) = 0.3125 mol H₂O → <b>5.63 g</b>. O₂ is limiting. Theoretical yield = <b>5.63 g H₂O</b>."}, {"heading": "Actual Yield", "body": "The amount of product <b>actually obtained</b> from a real experiment. Always ≤ theoretical yield because of: incomplete reactions, side reactions, loss during transfer/purification, impure reactants. Measured experimentally."}, {"heading": "Percent Yield", "body": "Measures the <b>efficiency</b> of a reaction. Formula: <b>% yield = (actual yield ÷ theoretical yield) × 100</b>. 100% = perfect (rare). Example: theoretical = 5.59 g H₂O, actual = 5.00 g. % yield = (5.00/5.59) × 100 = <b>89.4%</b>."}, {"heading": "Percent Yield — What It Means", "body": "High % yield (>90%): very efficient reaction. Moderate (60-90%): typical for many lab reactions. Low (<60%): significant losses or side reactions. Industrial processes aim for highest possible yields. Knowing % yield helps evaluate and optimize reactions."}, {"heading": "Excess Reagent Calculation", "body": "Amount of excess reagent left over = initial amount − amount consumed. Amount consumed: use moles of limiting reagent × mole ratio to find moles of excess used. Convert back to grams if needed. Example: if 0.25 mol O₂ is limiting and requires 0.50 mol H₂, but you started with 3.96 mol H₂ → excess H₂ = 3.96 − 0.50 = 3.46 mol leftover."}, {"heading": "Complete Stoichiometry Problem Strategy", "body": "<b>1)</b> Write and balance the equation. <b>2)</b> Convert all given masses to moles. <b>3)</b> Identify limiting reagent (produces least product). <b>4)</b> Calculate theoretical yield from limiting reagent. <b>5)</b> If actual yield given, calculate percent yield. <b>6)</b> If asked, calculate excess reagent remaining."}, {"heading": "Mole Ratios from Balanced Equation", "body": "The coefficients in a balanced equation give <b>mole ratios</b>. CH₄ + 2O₂ → CO₂ + 2H₂O: 1 mol CH₄ : 2 mol O₂ : 1 mol CO₂ : 2 mol H₂O. These ratios are the conversion factors for stoichiometry. Always use the balanced equation — never skip this step."}, {"heading": "Key Equations & Definitions Summary", "body": "<b>Ox # rules:</b> element=0, ion=charge, H=+1/−1, O=−2, F=−1, sum=0 or charge.<br><b>Limiting reagent:</b> produces least product.<br><b>Theoretical yield:</b> max product from limiting reagent.<br><b>% yield = (actual/theoretical) × 100</b>.<br><b>Half-reaction method:</b> 7 steps (acidic) + 2 more for basic."}], "quiz": [{"q": "Ox # of an element in its standard state:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Ox # of H with nonmetals:", "a": ["−1", "0", "+1", "+2"], "c": 2}, {"q": "Ox # of H with metals:", "a": ["+1", "0", "−1", "+2"], "c": 2}, {"q": "Ox # of O in most compounds:", "a": ["0", "−1", "−2", "+2"], "c": 2}, {"q": "Ox # of O in peroxides:", "a": ["0", "−1", "−2", "+1"], "c": 1}, {"q": "Ox # of F is always:", "a": ["0", "−1", "+1", "−2"], "c": 1}, {"q": "Sum of ox #s in a neutral molecule:", "a": ["+1", "−1", "0", "Varies"], "c": 2}, {"q": "Sum of ox #s in a polyatomic ion equals:", "a": ["0", "The ion's charge", "+1", "−1"], "c": 1}, {"q": "In H₂S, S has ox # of:", "a": ["+2", "−2", "+4", "−4"], "c": 1}, {"q": "In SO₃²⁻, S has ox # of:", "a": ["+2", "+4", "+6", "−2"], "c": 1}, {"q": "In Na₂SO₄, S has ox # of:", "a": ["+2", "+4", "+6", "−2"], "c": 2}, {"q": "Oxidation = ___ in oxidation number:", "a": ["Decrease", "Increase", "No change", "Doubling"], "c": 1}, {"q": "Reduction = ___ in oxidation number:", "a": ["Increase", "Decrease", "No change", "Halving"], "c": 1}, {"q": "Combustion is a type of ___ reaction:", "a": ["Acid-base", "Precipitation", "Redox", "Decomposition only"], "c": 2}, {"q": "Single displacement involves:", "a": ["Two compounds switching", "A metal replacing an ion", "Only gases", "Only acids"], "c": 1}, {"q": "Cu + 2AgNO₃ → Cu(NO₃)₂ + 2Ag — Cu is:", "a": ["Reduced", "Oxidized", "Unchanged", "A spectator"], "c": 1}, {"q": "In the same reaction, Ag⁺ is:", "a": ["Oxidized", "Reduced", "Unchanged", "Dissolved"], "c": 1}, {"q": "Balancing redox step 1:", "a": ["Add H₂O", "Write two half-reactions", "Add electrons", "Add OH⁻"], "c": 1}, {"q": "Balance O atoms by adding:", "a": ["O₂", "H⁺", "H₂O", "OH⁻"], "c": 2}, {"q": "Balance H atoms (acidic) by adding:", "a": ["H₂O", "H⁺", "OH⁻", "H₂"], "c": 1}, {"q": "Balance charge by adding:", "a": ["Protons", "Neutrons", "Electrons", "Ions"], "c": 2}, {"q": "For basic solution, add ___ equal to # of H⁺:", "a": ["H₂O", "H₂", "OH⁻", "O₂"], "c": 2}, {"q": "The limiting reagent is the one that:", "a": ["Is in excess", "Runs out first", "Is most expensive", "Weighs the most"], "c": 1}, {"q": "The limiting reagent determines:", "a": ["Reaction speed", "Maximum product", "Color", "Temperature"], "c": 1}, {"q": "To find limiting reagent, compare:", "a": ["Masses directly", "Moles of product each could make", "Colors", "Volumes"], "c": 1}, {"q": "2H₂ + O₂ → 2H₂O: 2 mol H₂ + 2 mol O₂. Limiting:", "a": ["O₂", "H₂", "Neither", "Both equally"], "c": 1}, {"q": "8g H₂ + 8g O₂ → H₂O. Limiting:", "a": ["H₂", "O₂", "Neither", "Cannot tell"], "c": 1}, {"q": "8g H₂ = ___ mol H₂ (MM=2.02):", "a": ["2.02", "3.96", "8.00", "16.0"], "c": 1}, {"q": "8g O₂ = ___ mol O₂ (MM=32.00):", "a": ["0.25", "0.50", "4.00", "8.00"], "c": 0}, {"q": "Theoretical yield assumes:", "a": ["Incomplete reaction", "Complete reaction, no side products", "50% conversion", "Excess reagent runs out"], "c": 1}, {"q": "Actual yield is always:", "a": ["Greater than theoretical", "Equal to theoretical", "≤ theoretical", "Double theoretical"], "c": 2}, {"q": "% yield = (actual ÷ theoretical) ×:", "a": ["10", "50", "100", "1000"], "c": 2}, {"q": "Theoretical=5.59g, actual=5.00g. % yield:", "a": ["55.9%", "89.4%", "100%", "111.8%"], "c": 1}, {"q": "High % yield (>90%) means:", "a": ["Inefficient", "Very efficient", "No reaction", "Side reactions"], "c": 1}, {"q": "The baking analogy: limiting reagent is like:", "a": ["The oven temperature", "The ingredient you run out of first", "The recipe book", "The mixing bowl"], "c": 1}, {"q": "Excess reagent is:", "a": ["Completely consumed", "Left over after reaction", "The product", "The catalyst"], "c": 1}, {"q": "Mole ratios come from:", "a": ["Subscripts", "Atomic numbers", "Coefficients in balanced equation", "Molar masses"], "c": 2}, {"q": "CH₄ + 2O₂ → CO₂ + 2H₂O: mole ratio CH₄:O₂:", "a": ["1:1", "1:2", "2:1", "1:3"], "c": 1}, {"q": "In stoichiometry, you must FIRST:", "a": ["Find density", "Balance the equation", "Measure temperature", "Add catalyst"], "c": 1}, {"q": "Grams → ___ → mole ratio → ___ → grams:", "a": ["Liters/atoms", "Moles/moles", "Volume/density", "Pressure/temp"], "c": 1}, {"q": "If % yield = 100%, actual equals:", "a": ["Zero", "Half of theoretical", "Theoretical exactly", "Double theoretical"], "c": 2}, {"q": "Disproportionation: one element is both:", "a": ["Acid and base", "Oxidized and reduced", "Solid and gas", "Created and destroyed"], "c": 1}, {"q": "Activity series predicts:", "a": ["Boiling points", "Whether displacement occurs", "Acid strength", "Solubility"], "c": 1}, {"q": "After finding limiting reagent, all calculations use:", "a": ["Excess reagent amount", "Limiting reagent amount", "Total of both", "Average"], "c": 1}, {"q": "Excess remaining = initial −:", "a": ["Products", "Amount consumed", "Theoretical yield", "Percent yield"], "c": 1}, {"q": "10g CH₄ + 10g O₂ → H₂O. Limiting is:", "a": ["CH₄", "O₂", "Neither", "Both"], "c": 1}, {"q": "Theoretical yield of H₂O in above ≈:", "a": ["5.6 g", "10 g", "22.5 g", "32 g"], "c": 0}, {"q": "Half-reactions have how many steps in acidic?", "a": ["3", "5", "7", "9"], "c": 2}, {"q": "Basic solution adds ___ extra steps:", "a": ["0", "1", "2", "5"], "c": 2}, {"q": "Final check in redox balancing: both ___ and ___ balance:", "a": ["Mass/volume", "Atoms/charge", "Color/state", "Temperature/pressure"], "c": 1}]}]}, "biology": {"name": "BIO", "sub": "Biology", "icon": "🧬", "lessons": []}, "psychology": {"name": "PSY 309", "sub": "Abnormal Psychology", "icon": "🧠", "lessons": []}};

  app.innerHTML=h;return;}
var ac=Object.keys(tS.a).length;
var h="<div class='tinfo'>Answer all "+shuf.length+" questions, then submit.<br><small style='opacity:.6'>Answered: "+ac+" / "+shuf.length+"</small></div>";
for(var i=0;i<shuf.length;i++){var q=shuf[i];
  h+="<div class='tq "+(tS.a[i]!=null?"ans":"")+"'><div style='font-size:12px;font-weight:700;color:var(--txd);margin-bottom:8px'>#"+(i+1)+"</div><div style='font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.45'>"+q.q+"</div>";
  for(var j=0;j<q.a.length;j++){h+="<button class='topt "+(tS.a[i]===j?"sel":"")+"' onclick='tA("+i+","+j+")'><span class='tl'>"+String.fromCharCode(65+j)+"</span>"+q.a[j]+"</button>"}h+="</div>"}
h+="<div style='text-align:center;padding:20px 0'><button class='abtn' style='padding:14px 48px;font-size:16px;border-radius:14px' "+(ac<shuf.length?"disabled":"")+" onclick='subT()'>Submit Test</button></div>";
app.innerHTML=h;
}

function go(v,cls,idx){view=v;tab="notes";if(cls)curC=cls;if(idx!=null)curL=D[curC].lessons[idx];if(v==="lesson")rq();render();scrollTo({top:0,behavior:"smooth"})}
function qA(j){if(pS.sh)return;pS.sel=j;pS.sh=true;pS.an++;if(j===shuf[pS.i].c)pS.sc++;render()}
function qN(){pS.i++;pS.sel=null;pS.sh=false;render()}
function tA(i,j){if(tS.done)return;tS.a[i]=j;render()}
function subT(){var s=0;for(var i=0;i<shuf.length;i++){if(tS.a[i]===shuf[i].c)s++}tS.sc=s;tS.done=true;render();scrollTo({top:0,behavior:"smooth"})}
render();
</script>
</body>
</html>
