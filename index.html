<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anhelina's Study Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0A1A;--card:#1A1230;--card2:#241A42;--accent:#9B59FF;--glow:#B07AFF;--dim:#6B3FA0;--hi:#E0C6FF;--tx:#E8DFF5;--txd:#9B8FBB;--ok:#7CFF8E;--err:#FF6B8A;--bdr:#2E2250;--gs:#1A0A3E}
body{min-height:100vh;background:linear-gradient(170deg,var(--gs) 0%,var(--bg) 40%,#0A0718 100%);color:var(--tx);font-family:'Segoe UI','Helvetica Neue',sans-serif;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes sparkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:.7;transform:scale(1.2)}}
@keyframes floatAcross{0%{transform:translateX(-100%)}100%{transform:translateX(calc(100vw + 100%))}}
.sparkle{position:fixed;width:4px;height:4px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--glow);opacity:.4;animation:sparkle 3s ease-in-out infinite;pointer-events:none}
.wrap{max-width:820px;margin:0 auto;padding:0 20px 60px}
.badge{display:inline-block;padding:6px 20px;border-radius:99px;background:rgba(155,89,255,.09);border:1px solid rgba(155,89,255,.2);font-size:13px;color:var(--glow);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
h1{font-size:clamp(28px,5vw,44px);font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent),var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.15}
.sub{color:var(--txd);font-size:16px}
.pill{padding:12px 28px;border-radius:99px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .25s ease}
.pill:hover{transform:translateY(-2px)}
.pill-a{background:linear-gradient(135deg,var(--accent),var(--dim));color:#fff;box-shadow:0 4px 20px rgba(155,89,255,.27)}
.pill-i{background:rgba(26,18,48,.8);color:var(--txd);border:1px solid var(--bdr)}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:20px 24px;margin-bottom:14px;cursor:pointer;transition:all .35s ease}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(155,89,255,.13)}
.card.exp{background:linear-gradient(135deg,var(--card),var(--card2));border-color:rgba(155,89,255,.33)}
.arrow{font-size:20px;color:var(--accent);transition:transform .3s ease;display:inline-block}
.card.exp .arrow{transform:rotate(180deg)}
.st{color:var(--txd);font-size:14.5px;line-height:1.65}
.opt{background:transparent;border:1.5px solid var(--bdr);border-radius:12px;padding:14px 18px;text-align:left;cursor:pointer;color:var(--tx);font-size:15px;font-family:inherit;display:flex;align-items:center;gap:12px;transition:all .25s ease;width:100%;margin-bottom:10px}
.opt:hover:not(.done){border-color:var(--accent);background:rgba(155,89,255,.08)}
.opt.ok{background:rgba(124,255,142,.08);border-color:var(--ok)}
.opt.no{background:rgba(255,107,138,.08);border-color:var(--err)}
.circ{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:rgba(155,89,255,.13);color:var(--accent)}
.opt.ok .circ{background:var(--ok);color:#000}
.opt.no .circ{background:var(--err);color:#000}
.abtn{background:linear-gradient(135deg,var(--accent),var(--dim));border:none;border-radius:12px;padding:12px 32px;color:#fff;font-weight:700;cursor:pointer;font-size:15px;font-family:inherit}
.abtn:hover{transform:translateY(-1px)}
.abtn:disabled{background:var(--bdr);cursor:not-allowed;transform:none}
.bbtn{background:transparent;border:1px solid var(--bdr);border-radius:10px;padding:8px 18px;color:var(--txd);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.bbtn:hover{border-color:var(--accent);color:var(--hi)}
.cc{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:32px 24px;cursor:pointer;transition:all .35s ease;text-align:center;display:inline-block;width:calc(33.33% - 14px);min-width:220px;vertical-align:top;margin:7px}
.cc:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(155,89,255,.2);border-color:rgba(155,89,255,.4)}
.tc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:18px 22px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.tc:hover{transform:translateX(4px);border-color:rgba(155,89,255,.4);background:var(--card2)}
.rw{background:rgba(255,107,138,.03);border:1px solid rgba(255,107,138,.2);border-radius:14px;padding:18px 22px;margin-bottom:12px}
.ln{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(155,89,255,.12);color:var(--glow);font-weight:700;white-space:nowrap}
.pbar{height:4px;border-radius:2px;background:var(--bdr);margin-bottom:24px}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--glow));transition:width .5s ease}
.qs{padding:60px 24px 80px;text-align:center;position:relative;overflow:hidden;min-height:320px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.qs::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.bq{font-size:clamp(24px,4.5vw,40px);font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent),var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3;max-width:600px;margin:0 auto 20px;transition:all .4s ease}
.fq{position:absolute;color:var(--accent);opacity:.06;font-weight:800;white-space:nowrap;font-size:18px;animation:floatAcross linear infinite}
.footer{text-align:center;padding:20px 24px 32px;font-size:13px;color:var(--txd);border-top:1px solid var(--bdr)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(155,89,255,.27);border-radius:3px}
@media(max-width:740px){.cc{width:calc(50% - 14px)}}
@media(max-width:500px){.cc{width:100%;margin:7px 0}}
</style>
</head>

// Data
var D={"chemistry": {"name": "CHEM 260", "sub": "General Chemistry", "icon": "🧪", "topics": [{"t": "Lesson 1: Matter & Properties", "ln": "CHEM 260 · Ch 1", "s": [{"h": "Solid State", "x": "Atoms close-packed, NOT free to move. Fixed volume AND shape. Strong intermolecular forces hold particles in rigid structure."}, {"h": "Liquid State", "x": "Atoms close-packed but free to move relative to each other. Fixed volume, NOT fixed shape — flows to fill container."}, {"h": "Gaseous State", "x": "Atoms far apart and free to move. NO fixed volume or shape. Compressible. Expand to fill entire container."}, {"h": "State Comparison", "x": "Freedom increases: solid→liquid→gas. Close-packed: solids/liquids yes, gases no. Fixed shape: solids only. Fixed volume: solids and liquids."}, {"h": "Pure Substances", "x": "One component, invariant composition. Two types: elements (cannot break down) and compounds (can decompose into simpler substances)."}, {"h": "Elements", "x": "Cannot be chemically broken down. Single atom type. ~118 on periodic table. Examples: gold, oxygen, carbon, helium."}, {"h": "Compounds", "x": "2+ elements in fixed proportions. CAN be decomposed. Properties differ from constituent elements. Examples: H₂O, NaCl, CO₂."}, {"h": "Heterogeneous Mixtures", "x": "Composition varies region to region. Visible different parts. Examples: sand+salt, trail mix, oil+water, soil."}, {"h": "Homogeneous Mixtures", "x": "Uniform throughout — also called solutions. All portions identical. Examples: saltwater, air, sweetened tea, alloys."}, {"h": "Decanting", "x": "Pour off liquid from settled solid. Simple and quick. Works when solid settles to bottom of container."}, {"h": "Distillation", "x": "Heat to boil more volatile liquid, recondense in separate flask. Separates liquids by different boiling points."}, {"h": "Filtration", "x": "Pour through filter paper in funnel. Solid trapped on filter, liquid passes through. For insoluble solids in liquid."}, {"h": "Physical Changes", "x": "No change in chemical identity — only state or appearance. Usually reversible. Melting, boiling, dissolving, grinding, bending."}, {"h": "Chemical Changes", "x": "New substances form with different composition. Atoms rearrange into new molecules. Often irreversible. Burning, rusting, cooking."}, {"h": "Physical Properties", "x": "Observed without changing substance: color, density, melting point, boiling point, hardness, solubility, conductivity."}, {"h": "Chemical Properties", "x": "Describe reactivity: flammability, reactivity with acids, oxidation tendency, toxicity, ability to decompose."}, {"h": "Intensive vs Extensive", "x": "Intensive: independent of amount (density, boiling point, color, temperature). Extensive: depends on amount (mass, volume, total energy)."}, {"h": "Conservation of Mass", "x": "Lavoisier's law: mass neither created nor destroyed in reactions. Total reactant mass = total product mass. Basis for balancing equations."}, {"h": "Atoms and Molecules", "x": "Atom: smallest unit retaining element properties. Molecule: 2+ atoms bonded together. Formula unit used for ionic compounds."}, {"h": "SI Units", "x": "Mass: g, kg. Length: m. Volume: L, mL. Temp: °C, K (=°C+273.15). Energy: J, cal. 1mL = 1cm³. 1 cal = 4.184 J."}, {"h": "Density", "x": "Mass/volume (g/mL or g/cm³). Water = 1.00 g/mL at 4°C. Less dense floats. Intensive property — same regardless of sample size."}, {"h": "Significant Figures", "x": "Reflect precision. Nonzero always significant. Zeros between nonzero significant. Leading zeros NOT. Trailing after decimal ARE."}, {"h": "Energy in Changes", "x": "Endothermic: absorbs energy (melting, evaporating). Exothermic: releases energy (freezing, condensing). All changes involve energy."}, {"h": "Classification Flowchart", "x": "Uniform? No→heterogeneous. Yes→physically separable? Yes→homogeneous mixture. No→pure substance. Decomposable? Yes→compound. No→element."}, {"h": "Matter Summary", "x": "All matter: pure substances or mixtures. Pure = elements or compounds. Mixtures = homo or hetero. Physical means separate mixtures; chemical means decompose compounds."}], "q": [{"q": "Fixed volume but NOT fixed shape?", "a": ["Solid", "Liquid", "Gas", "Plasma"], "c": 1}, {"q": "Gases are ___ compared to liquids:", "a": ["Close-packed", "Compressible", "Fixed volume", "Denser"], "c": 1}, {"q": "Cannot be broken down chemically:", "a": ["Compound", "Mixture", "Element", "Solution"], "c": 2}, {"q": "Sweetened tea is:", "a": ["Heterogeneous", "Compound", "Homogeneous mixture", "Element"], "c": 2}, {"q": "Sand+salt is:", "a": ["Homogeneous", "Heterogeneous", "Compound", "Element"], "c": 1}, {"q": "Distillation uses different:", "a": ["Densities", "Boiling points", "Colors", "Sizes"], "c": 1}, {"q": "Filtration separates:", "a": ["Liquid from gas", "Insoluble solid from liquid", "Gas from solid", "Element from compound"], "c": 1}, {"q": "Burning wood is:", "a": ["Physical change", "Chemical change", "Phase change", "No change"], "c": 1}, {"q": "Melting ice is:", "a": ["Chemical", "Physical", "Nuclear", "Decomposition"], "c": 1}, {"q": "Flammability is a ___ property:", "a": ["Physical", "Chemical", "Extensive", "Intensive"], "c": 1}, {"q": "Density is:", "a": ["Extensive", "Intensive", "Chemical", "Nuclear"], "c": 1}, {"q": "Mass is:", "a": ["Intensive", "Extensive", "Chemical", "Neither"], "c": 1}, {"q": "Conservation of mass: reactant mass ___:", "a": ["Increases", "Is destroyed", "Equals product mass", "Doubles"], "c": 2}, {"q": "A molecule is:", "a": ["Single atom", "2+ atoms bonded", "A mixture", "An ion"], "c": 1}, {"q": "Water density at 4°C:", "a": ["0.5 g/mL", "1.00 g/mL", "2.0 g/mL", "10 g/mL"], "c": 1}, {"q": "1 mL equals:", "a": ["1 L", "1 cm³", "1 m³", "1 kg"], "c": 1}, {"q": "Kelvin = Celsius +:", "a": ["100", "212", "273.15", "373"], "c": 2}, {"q": "Freezing is:", "a": ["Endothermic", "Exothermic", "Neither", "Both"], "c": 1}, {"q": "Compounds can be:", "a": ["Never broken down", "Decomposed", "Only gases", "Single atoms"], "c": 1}, {"q": "Decanting involves:", "a": ["Boiling", "Pouring off liquid", "Filtering", "Evaporating"], "c": 1}, {"q": "Oil+water is:", "a": ["Homogeneous", "Compound", "Heterogeneous", "Element"], "c": 2}, {"q": "Solutions are:", "a": ["Heterogeneous", "Compounds", "Homogeneous mixtures", "Elements"], "c": 2}, {"q": "Lavoisier established:", "a": ["Thermodynamics", "Conservation of mass", "Gravity", "Relativity"], "c": 1}, {"q": "Objects less dense than water:", "a": ["Sink", "Float", "Dissolve", "Evaporate"], "c": 1}, {"q": "Rusting is:", "a": ["Physical", "Chemical", "Phase", "No change"], "c": 1}, {"q": "NOT a physical change:", "a": ["Dissolving sugar", "Boiling water", "Melting ice", "Cooking egg"], "c": 3}, {"q": "Air is:", "a": ["Pure substance", "Heterogeneous", "Homogeneous mixture", "Compound"], "c": 2}, {"q": "Endothermic reactions:", "a": ["Release energy", "Absorb energy", "Create matter", "Destroy matter"], "c": 1}, {"q": "Brass is:", "a": ["Element", "Compound", "Homogeneous mixture", "Heterogeneous"], "c": 2}, {"q": "Formula units are for:", "a": ["Molecules", "Ionic compounds", "Gases", "Elements only"], "c": 1}, {"q": "Separated by physical means:", "a": ["Elements", "Compounds", "Mixtures", "Atoms"], "c": 2}, {"q": "Temperature is:", "a": ["Extensive", "Intensive", "Chemical", "Nuclear"], "c": 1}, {"q": "Water boils at:", "a": ["0°C", "37°C", "100°C", "212°C"], "c": 2}, {"q": "Volume measured in:", "a": ["Grams", "Meters", "Liters", "Kelvins"], "c": 2}, {"q": "Dissolving sugar is:", "a": ["Chemical", "Physical", "Nuclear", "No change"], "c": 1}, {"q": "Tightest packed particles:", "a": ["Gas", "Liquid", "Solid", "Plasma"], "c": 2}, {"q": "Trail mix is:", "a": ["Compound", "Element", "Homogeneous", "Heterogeneous"], "c": 3}, {"q": "Types of pure substances:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Volatile means:", "a": ["Explosive", "Easily vaporized", "Dense", "Insoluble"], "c": 1}, {"q": "Ice floats because it is:", "a": ["A gas", "Less dense than water", "A compound", "Hot"], "c": 1}, {"q": "Digestion is:", "a": ["Physical", "Chemical", "Phase", "No change"], "c": 1}, {"q": "Gold is:", "a": ["Compound", "Mixture", "Element", "Solution"], "c": 2}, {"q": "Leading zeros are:", "a": ["Significant", "Not significant", "Always counted", "Estimated"], "c": 1}, {"q": "Water freezes at:", "a": ["0°C", "4°C", "32°C", "100°C"], "c": 0}, {"q": "NaCl is a:", "a": ["Element", "Mixture", "Compound", "Solution"], "c": 2}, {"q": "Evaporation is:", "a": ["Exothermic", "Endothermic", "Chemical", "Nuclear"], "c": 1}, {"q": "Homogeneous means:", "a": ["Visibly different", "Uniform throughout", "Can't separate", "Single element"], "c": 1}, {"q": "Which is an element?", "a": ["H₂O", "NaCl", "O₂", "CO₂"], "c": 2}, {"q": "Boiling point is ___ property:", "a": ["Extensive", "Intensive", "Chemical", "Nuclear"], "c": 1}, {"q": "An alloy is a ___ of metals:", "a": ["Compound", "Element", "Mixture", "Reaction"], "c": 2}]}, {"t": "Lesson 2: Formulas & Periodic Table", "ln": "CHEM 260 · Ch 2", "s": [{"h": "Chemical Formulas Overview", "x": "Representation of a compound using chemical symbols and subscripts. Shows types of atoms and how many of each. Three types: empirical, molecular, structural."}, {"h": "Empirical Formula", "x": "Gives simplest whole-number ratio of atoms. Benzene: C₆H₆ → CH. Acetic acid: C₂H₄O₂ → CH₂O. Sometimes same as molecular (CH₄)."}, {"h": "Molecular Formula", "x": "Gives ACTUAL number of atoms in one molecule. May be same as or a multiple of empirical. C₆H₆ is molecular; CH is empirical."}, {"h": "Structural Formula", "x": "Uses lines for covalent bonds, shows how atoms connect. Reveals arrangement, not just count. Helps distinguish isomers."}, {"h": "Isomers", "x": "Same molecular formula, DIFFERENT structure and properties. Structural isomers: different connectivity. Stereoisomers: same connectivity, different 3D arrangement."}, {"h": "Stereoisomers Example", "x": "S-carvone smells like caraway; R-carvone smells like spearmint — same formula, mirror-image structures, totally different properties."}, {"h": "Periodic Table History", "x": "Mendeleev (1869) and Meyer (1870) independently proposed organizing elements. Modern law: arranged by atomic number, not mass."}, {"h": "Groups and Periods", "x": "Groups: 18 vertical columns (elements in same group share properties). Periods: 7 horizontal rows (properties change across a period)."}, {"h": "Metals", "x": "Left side of table. Shiny (lustrous), malleable, ductile. Good heat and electricity conductors. Tend to lose electrons → form cations."}, {"h": "Nonmetals", "x": "Right side (except H). Appear dull, brittle. Poor heat/electricity conductors. Tend to gain electrons → form anions."}, {"h": "Metalloids", "x": "Along staircase line. Properties of BOTH metals and nonmetals. Moderate conductors (semiconductors). Examples: Si, Ge, As."}, {"h": "Alkali Metals & Alkaline Earth", "x": "Group 1 (alkali): very reactive, +1 ions. Group 2 (alkaline earth): reactive, +2 ions. Both lose electrons easily."}, {"h": "Halogens & Noble Gases", "x": "Group 17 (halogens): very reactive nonmetals, -1 ions. Group 18 (noble gases): very stable, rarely react, full outer shells."}, {"h": "Ion Formation", "x": "Ions: atoms with different numbers of protons and electrons. Lose e⁻ → cation (+). Gain e⁻ → anion (−). Number of protons NEVER changes."}, {"h": "Cations", "x": "Positively charged ions. Formed when atoms LOSE electrons. Metals tend to form cations. Named same as element (Na⁺ = sodium ion)."}, {"h": "Anions", "x": "Negatively charged ions. Formed when atoms GAIN electrons. Nonmetals form anions. Named with -ide suffix (Cl⁻ = chloride ion)."}, {"h": "Predicting Ion Charges", "x": "Main group metals: lose e⁻ to match preceding noble gas. Nonmetals: gain e⁻ to match next noble gas. Transition metals: variable charges."}, {"h": "Monatomic vs Polyatomic Ions", "x": "Monatomic: single atom ion (Na⁺, Cl⁻). Polyatomic: group of bonded atoms with overall charge (SO₄²⁻, NH₄⁺)."}, {"h": "Polyatomic Ion Naming", "x": "‑ate = more oxygen. ‑ite = fewer oxygen. per‑ = most oxygen. hypo‑ = least. Example: ClO₄⁻ perchlorate → ClO₃⁻ chlorate → ClO₂⁻ chlorite → ClO⁻ hypochlorite."}, {"h": "Ionic Compounds", "x": "Formed between cations and anions. Held by electrostatic attraction (ionic bonds). Formula shows simplest ratio. Electrically neutral overall."}, {"h": "Naming Ionic Compounds", "x": "Cation name + anion name (‑ide). NaCl = sodium chloride. For polyatomic: use polyatomic name. Na₂SO₄ = sodium sulfate."}, {"h": "Binary Acids", "x": "Contain hydrogen + one other element. Naming: hydro‑ + nonmetal root + ‑ic + acid. HCl = hydrochloric acid. HF = hydrofluoric acid."}, {"h": "Oxyacids", "x": "Contain H + O + another element. Omit 'hydrogen.' Root of anion + ‑ic (from ‑ate) or ‑ous (from ‑ite) + acid. H₂SO₄ = sulfuric acid."}, {"h": "Molecular Compounds Naming", "x": "Prefixes for number: mono, di, tri, tetra, penta, hexa. CO₂ = carbon dioxide. N₂O₅ = dinitrogen pentoxide."}, {"h": "Review: Formula Types", "x": "Empirical: simplest ratio. Molecular: actual count. Structural: shows bonds. All describe the same compound differently."}], "q": [{"q": "Empirical formula gives:", "a": ["Actual count", "Simplest ratio", "Bond structure", "Weight"], "c": 1}, {"q": "Groups in periodic table:", "a": ["7", "14", "18", "20"], "c": 2}, {"q": "A cation is an atom that:", "a": ["Gained electrons", "Lost electrons", "Is neutral", "Has no protons"], "c": 1}, {"q": "Isomers have same ___ different ___:", "a": ["Mass/color", "Formula/structure", "Charge/size", "Electrons/protons"], "c": 1}, {"q": "‑ate suffix means:", "a": ["Fewer O", "More O", "No O", "A metal"], "c": 1}, {"q": "Metals tend to form:", "a": ["Anions", "Cations", "Neither", "Both"], "c": 1}, {"q": "Metalloids have properties of:", "a": ["Only metals", "Only nonmetals", "Both metals and nonmetals", "Neither"], "c": 2}, {"q": "ClO₂⁻ is:", "a": ["Perchlorate", "Chlorate", "Chlorite", "Hypochlorite"], "c": 2}, {"q": "HCl is a ___ acid:", "a": ["Oxyacid", "Binary", "Polyatomic", "Organic"], "c": 1}, {"q": "Periods in periodic table:", "a": ["7", "14", "18", "20"], "c": 0}, {"q": "Nonmetals tend to form:", "a": ["Cations", "Anions", "Neutral atoms", "Metals"], "c": 1}, {"q": "NaCl is named:", "a": ["Sodium chlorite", "Sodium chloride", "Sodium chlorate", "Chlorine sodium"], "c": 1}, {"q": "Molecular formula of benzene:", "a": ["CH", "C₆H₆", "C₃H₃", "CH₂"], "c": 1}, {"q": "Noble gases are in Group:", "a": ["1", "2", "17", "18"], "c": 3}, {"q": "Na⁺ is a:", "a": ["Anion", "Cation", "Neutral", "Molecule"], "c": 1}, {"q": "Polyatomic ions are:", "a": ["Single atom ions", "Groups of bonded atoms with charge", "Neutral molecules", "Elements"], "c": 1}, {"q": "CO₂ is named:", "a": ["Carbon oxide", "Carbon monoxide", "Carbon dioxide", "Dicarbon oxide"], "c": 2}, {"q": "Alkali metals are Group:", "a": ["1", "2", "17", "18"], "c": 0}, {"q": "Stereoisomers differ in:", "a": ["Formula", "Number of atoms", "3D arrangement", "Element type"], "c": 2}, {"q": "Halogens are Group:", "a": ["1", "2", "17", "18"], "c": 2}, {"q": "Hydrofluoric acid formula:", "a": ["HF", "H₂F", "HF₂", "F₂H"], "c": 0}, {"q": "Ionic compounds are:", "a": ["Electrically neutral", "Always positive", "Always negative", "Always liquid"], "c": 0}, {"q": "H₂SO₄ is:", "a": ["Binary acid", "Oxyacid", "Base", "Salt"], "c": 1}, {"q": "Anions have ___ suffix:", "a": ["‑ate", "‑ide", "‑ite", "‑ous"], "c": 1}, {"q": "Mendeleev organized by:", "a": ["Atomic number", "Atomic mass", "Color", "Density"], "c": 1}, {"q": "Modern periodic law uses:", "a": ["Mass", "Atomic number", "Volume", "Density"], "c": 1}, {"q": "Prefix 'tri' means:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Si is a:", "a": ["Metal", "Nonmetal", "Metalloid", "Noble gas"], "c": 2}, {"q": "NH₄⁺ is a ___ ion:", "a": ["Monatomic cation", "Polyatomic cation", "Monatomic anion", "Polyatomic anion"], "c": 1}, {"q": "Sulfuric acid comes from:", "a": ["Sulfite", "Sulfate", "Sulfide", "Sulfur"], "c": 1}, {"q": "Carvone stereoisomers smell:", "a": ["The same", "Different", "Like nothing", "Toxic"], "c": 1}, {"q": "Group 2 elements form ___ ions:", "a": ["1+", "2+", "1-", "2-"], "c": 1}, {"q": "Which is a polyatomic ion?", "a": ["Na⁺", "Cl⁻", "SO₄²⁻", "Mg²⁺"], "c": 2}, {"q": "Structural formula shows:", "a": ["Mass", "Bonds between atoms", "Atomic number", "Electron count"], "c": 1}, {"q": "Empirical formula of C₂H₄O₂:", "a": ["C₂H₄O₂", "CH₂O", "CHO", "CO₂"], "c": 1}, {"q": "Acetic acid molecular formula:", "a": ["CH₂O", "C₂H₄O₂", "C₃H₆O₃", "CHO"], "c": 1}, {"q": "perchlo‑ prefix means:", "a": ["Least oxygen", "Most oxygen", "No oxygen", "Some oxygen"], "c": 1}, {"q": "Number of protons determines:", "a": ["Isotope", "Ion charge", "Element identity", "Mass number"], "c": 2}, {"q": "Molecular compounds use ___ for naming:", "a": ["Roman numerals", "Prefixes", "‑ide only", "‑ate only"], "c": 1}, {"q": "N₂O₅ is:", "a": ["Nitrogen oxide", "Nitrogen pentoxide", "Dinitrogen pentoxide", "Pentanitrogen dioxide"], "c": 2}, {"q": "Ions form when atoms:", "a": ["Gain or lose electrons", "Gain or lose protons", "Split in half", "Combine nuclei"], "c": 0}, {"q": "Which is NOT a halogen?", "a": ["F", "Cl", "Br", "Ne"], "c": 3}, {"q": "Formula unit applies to:", "a": ["Covalent molecules", "Ionic compounds", "Gases only", "Single atoms"], "c": 1}, {"q": "Semiconductors are:", "a": ["Metals", "Nonmetals", "Metalloids", "Noble gases"], "c": 2}, {"q": "hypo‑ prefix means:", "a": ["Most oxygen", "Least oxygen", "No oxygen", "Same oxygen"], "c": 1}, {"q": "Chloride ion is:", "a": ["Cl⁺", "Cl⁻", "Cl²⁺", "Cl²⁻"], "c": 1}, {"q": "Group 1 metals form ___ ions:", "a": ["1+", "2+", "1-", "2-"], "c": 0}, {"q": "An ion with more electrons than protons is:", "a": ["Cation", "Anion", "Neutral", "Isotope"], "c": 1}, {"q": "H₂CO₃ is:", "a": ["Binary acid", "Oxyacid (carbonic acid)", "Organic acid", "Not an acid"], "c": 1}, {"q": "Periodic table has ___ groups and ___ periods:", "a": ["7/18", "18/7", "14/8", "20/6"], "c": 1}]}, {"t": "Lesson 3: Moles & Composition", "ln": "CHEM 260 · Ch 3", "s": [{"h": "Formula Mass", "x": "Sum of average atomic masses of ALL atoms in formula. H₂O = 2(1.01) + 16.00 = 18.02 amu. Also called molecular mass/weight."}, {"h": "Ionic vs Molecular Mass", "x": "Covalent substances: molecular mass. Ionic compounds: formula mass (they don't form discrete molecules, use formula unit)."}, {"h": "The Mole Concept", "x": "Amount unit like 'dozen.' 1 mole = 6.022 × 10²³ particles. Called Avogadro's number (Nₐ). Links mass to particle count."}, {"h": "Molar Mass", "x": "Mass in grams of 1 mole of substance. Units: g/mol. Numerically equal to formula mass in amu. ¹²C: 12 amu per atom, 12 g per mole."}, {"h": "Grams to Moles", "x": "Divide mass by molar mass. Example: 150.0 g Mg ÷ 24.305 g/mol = 6.171 mol Mg."}, {"h": "Moles to Particles", "x": "Multiply moles by Avogadro's number. 6.171 mol × 6.022×10²³ = 3.716×10²⁴ atoms."}, {"h": "Particles to Moles", "x": "Divide particle count by Nₐ. 4.2×10²⁵ molecules H₂O ÷ 6.022×10²³ = 69.7 mol."}, {"h": "Moles to Grams", "x": "Multiply moles by molar mass. 1.6 mol NaCl × 58.44 g/mol = 93.5 g."}, {"h": "Practice Problems", "x": "1.3 mol H₂O = 7.83×10²³ molecules. 23 g NaOH = 0.58 mol. Al₂(SO₄)₃ molar mass = 342 g/mol. 1 mol Ca = 40 g."}, {"h": "Percent Composition", "x": "% by mass of each element = (mass of element in formula ÷ formula mass) × 100. NH₃: %N = 14.01/17.03 × 100 = 82.27%."}, {"h": "Deriving Percent from Formula", "x": "Calculate formula mass. Find mass contribution of each element. Divide by total formula mass. Multiply by 100."}, {"h": "Empirical Formula from Mass Data", "x": "1) Convert element masses to moles. 2) Divide each by smallest mole value. 3) If needed, multiply by integer for whole numbers."}, {"h": "Empirical from Percent Composition", "x": "Assume 100 g sample → percentages become grams directly. Then follow same steps as mass data method."}, {"h": "Worked Example: Empirical", "x": "Compound: 64.82% C, 21.59% O, 13.59% H. Convert to moles: 5.397 C, 1.349 O, 13.48 H. Divide by 1.349: C₄H₁₀O."}, {"h": "Molecular vs Empirical", "x": "Molecular formula = empirical × n (where n = molecular mass ÷ empirical mass). If molecular mass given, calculate n."}, {"h": "Molarity Introduction", "x": "Solution concentration: moles of solute per liter of solution. M = mol/L. 1 M NaCl = 1 mole NaCl per liter."}, {"h": "Dilution", "x": "M₁V₁ = M₂V₂. When adding solvent, moles of solute don't change. Concentration decreases as volume increases."}, {"h": "Percent by Mass", "x": "Mass of solute ÷ mass of solution × 100. Example: 5 g salt in 100 g solution = 5% by mass."}, {"h": "Parts Per Million (ppm)", "x": "mg solute per kg solution (or mg/L for dilute aqueous). Used for trace amounts. 1 ppm = 1 mg/kg."}, {"h": "Conversion Chains", "x": "grams ↔ moles (÷ or × molar mass) ↔ particles (÷ or × Nₐ). Master this chain for all stoichiometry."}, {"h": "Molar Mass of Compounds", "x": "Add up atomic masses of ALL atoms. Ca(OH)₂: 40.08 + 2(16.00) + 2(1.01) = 74.10 g/mol."}, {"h": "Avogadro's Number Context", "x": "Named for Amedeo Avogadro. 6.022×10²³ is incomprehensibly large. If you had Nₐ pennies, they'd cover Earth in a layer miles thick."}, {"h": "Formula Mass Practice", "x": "CO₂ = 12.01 + 2(16.00) = 44.01. C₆H₁₂O₆ = 6(12.01)+12(1.01)+6(16.00) = 180.18 g/mol."}, {"h": "Key Relationships", "x": "1 mole of ANY substance = 6.022×10²³ formula units/molecules/atoms. Molar mass varies by substance but Nₐ is always the same."}, {"h": "Summary", "x": "Mole bridges mass (grams) and count (particles). Formula mass from periodic table. % composition from formula. Empirical formula from experimental data."}], "q": [{"q": "Avogadro's number:", "a": ["6.022×10²³", "3.14×10²³", "6.022×10²⁶", "1.602×10⁻¹⁹"], "c": 0}, {"q": "Grams to moles: divide by:", "a": ["Nₐ", "Molar mass", "Atomic number", "Volume"], "c": 1}, {"q": "1.3 mol H₂O = ___ molecules:", "a": ["7.83×10²³", "6.02×10²³", "1.3×10²³", "4.63×10²³"], "c": 0}, {"q": "Molar mass units:", "a": ["amu", "g/mol", "kg", "mol/L"], "c": 1}, {"q": "Formula mass of H₂O:", "a": ["16.00", "18.02", "20.00", "2.02"], "c": 1}, {"q": "23 g NaOH = ___ mol:", "a": ["0.23", "0.58", "1.0", "2.3"], "c": 1}, {"q": "To find empirical formula first:", "a": ["Balance equation", "Convert masses to moles", "Find density", "Measure volume"], "c": 1}, {"q": "% composition = element mass ÷:", "a": ["Atomic number", "Formula mass × 100", "Nₐ", "Volume"], "c": 1}, {"q": "1 mole ¹²C weighs:", "a": ["1 g", "6 g", "12 g", "24 g"], "c": 2}, {"q": "Moles to particles: multiply by:", "a": ["Molar mass", "Nₐ", "Density", "Volume"], "c": 1}, {"q": "NH₃ formula mass:", "a": ["14.01", "17.03", "28.02", "31.04"], "c": 1}, {"q": "Molarity =:", "a": ["g/L", "mol/L", "mol/g", "g/mol"], "c": 1}, {"q": "1.6 mol NaCl weighs ~:", "a": ["35 g", "58 g", "93 g", "117 g"], "c": 2}, {"q": "Ionic compounds use:", "a": ["Molecular mass", "Formula mass", "Atomic mass", "No mass"], "c": 1}, {"q": "CO₂ formula mass:", "a": ["28.01", "32.00", "44.01", "60.01"], "c": 2}, {"q": "Molecular formula = empirical ×:", "a": ["n", "Nₐ", "molar mass", "density"], "c": 0}, {"q": "Al₂(SO₄)₃ molar mass:", "a": ["150 g/mol", "270 g/mol", "342 g/mol", "450 g/mol"], "c": 2}, {"q": "ppm stands for:", "a": ["Parts per million", "Percent per mole", "Particles per mass", "None"], "c": 0}, {"q": "M₁V₁ = M₂V₂ is for:", "a": ["Dilution", "Stoichiometry", "Gas laws", "Nuclear"], "c": 0}, {"q": "% by mass formula:", "a": ["Solute/solution×100", "Solute/solvent×100", "Solution/solute×100", "Moles/volume"], "c": 0}, {"q": "1 mol Ca weighs:", "a": ["20 g", "40 g", "60 g", "80 g"], "c": 1}, {"q": "Empirical formula of C₆H₆:", "a": ["C₆H₆", "CH", "C₃H₃", "C₂H₂"], "c": 1}, {"q": "From % composition, assume ___ g sample:", "a": ["1", "10", "50", "100"], "c": 3}, {"q": "Nₐ was named for:", "a": ["Newton", "Avogadro", "Lavoisier", "Bohr"], "c": 1}, {"q": "Glucose C₆H₁₂O₆ molar mass:", "a": ["120", "150", "180", "210"], "c": 2}, {"q": "Ca(OH)₂ molar mass:", "a": ["57", "74", "82", "96"], "c": 1}, {"q": "Particles to moles: divide by:", "a": ["Molar mass", "Nₐ", "Density", "100"], "c": 1}, {"q": "1 mole of any gas at STP:", "a": ["6.022×10²³ particles", "22.4 L", "Both A and B", "Neither"], "c": 2}, {"q": "Empirical of C₂H₄O₂:", "a": ["C₂H₄O₂", "CH₂O", "CHO", "CO₂"], "c": 1}, {"q": "82.27% N in NH₃ means:", "a": ["82.27 g N per 100 g NH₃", "82.27 mol N", "82.27 atoms N", "82.27 mL N"], "c": 0}, {"q": "Molar mass is ___ per substance:", "a": ["Same", "Different", "Zero", "Infinite"], "c": 1}, {"q": "Nₐ is ___ for all substances:", "a": ["Different", "The same", "Zero", "Variable"], "c": 1}, {"q": "Conversion: g → mol → ___:", "a": ["Volume", "Particles", "Density", "Pressure"], "c": 1}, {"q": "Moles of solute in 2L of 0.5M:", "a": ["0.25", "0.5", "1.0", "2.0"], "c": 2}, {"q": "Divide mole values by smallest to get:", "a": ["Molar mass", "Subscript ratios", "Percent composition", "Molecular weight"], "c": 1}, {"q": "Formula unit is for:", "a": ["Covalent molecules", "Ionic compounds", "Gases", "Single atoms"], "c": 1}, {"q": "Mole is analogous to a:", "a": ["Gram", "Liter", "Dozen", "Meter"], "c": 2}, {"q": "Which has more molecules: 1 mol H₂O or 1 mol CO₂?", "a": ["H₂O", "CO₂", "Same (Nₐ)", "Cannot tell"], "c": 2}, {"q": "Molecular mass is in:", "a": ["g/mol", "amu", "Both", "Neither"], "c": 2}, {"q": "5 g salt in 100 g solution = ___% by mass:", "a": ["0.5", "5", "50", "500"], "c": 1}, {"q": "Diluting a solution ___ its concentration:", "a": ["Increases", "Decreases", "Doesn't change", "Doubles"], "c": 1}, {"q": "O₂ molar mass:", "a": ["16.00", "32.00", "48.00", "64.00"], "c": 1}, {"q": "What links grams to particles?", "a": ["The mole", "Temperature", "Pressure", "Volume"], "c": 0}, {"q": "C₁₂H₂₂O₁₁ molar mass:", "a": ["180", "270", "342", "510"], "c": 2}, {"q": "If empirical mass = 30 and molecular mass = 60, n =:", "a": ["0.5", "1", "2", "3"], "c": 2}, {"q": "Percent N in NO₂ (N=14, O=16):", "a": ["30.4%", "46.0%", "69.6%", "14.0%"], "c": 0}, {"q": "How many atoms in 2 mol He?", "a": ["6.02×10²³", "1.2×10²⁴", "2.0×10²³", "3.01×10²³"], "c": 1}, {"q": "Empirical formula has ___ ratio:", "a": ["Actual", "Simplest", "Largest", "Random"], "c": 1}, {"q": "NaCl molar mass (Na=23, Cl=35.5):", "a": ["35.5", "58.5", "23", "46"], "c": 1}, {"q": "Volume unit in molarity:", "a": ["mL", "cm³", "Liters", "m³"], "c": 2}]}, {"t": "Lesson 4: Stoichiometry", "ln": "CHEM 260 · Ch 4", "s": [{"h": "Chemical Equations", "x": "Shorthand for reactions. Show formulas, states (s/l/g/aq), and relative numbers of molecules. Reactants → Products."}, {"h": "Balancing Equations", "x": "Equal atoms each side. Adjust COEFFICIENTS only, never subscripts. Conservation of mass. Check each element."}, {"h": "Balancing Example", "x": "CH₄ + 2O₂ → CO₂ + 2H₂O. C:1=1 ✓ H:4=4 ✓ O:4=4 ✓. States: CH₄(g) + 2O₂(g) → CO₂(g) + 2H₂O(g)."}, {"h": "State Symbols", "x": "(s)=solid, (l)=liquid, (g)=gas, (aq)=aqueous (dissolved in water). Added after balancing."}, {"h": "Molecular Equations", "x": "Show complete formulas. CaCl₂(aq) + 2AgNO₃(aq) → Ca(NO₃)₂(aq) + 2AgCl(s)."}, {"h": "Complete Ionic Equations", "x": "Show all dissolved substances as ions. Ca²⁺ + 2Cl⁻ + 2Ag⁺ + 2NO₃⁻ → Ca²⁺ + 2NO₃⁻ + 2AgCl(s)."}, {"h": "Net Ionic Equations", "x": "Remove spectator ions (unchanged). 2Cl⁻(aq) + 2Ag⁺(aq) → 2AgCl(s). Simplify: Cl⁻ + Ag⁺ → AgCl(s)."}, {"h": "Spectator Ions", "x": "Present but unchanged in reaction. Maintain charge neutrality. Appear on both sides. Eliminated in net ionic."}, {"h": "Precipitation Reactions", "x": "Two solutions mix → insoluble solid (precipitate) forms. Use solubility rules to predict products."}, {"h": "Acid-Base Reactions", "x": "H⁺ transferred between species. Acid donates H⁺; base accepts. Neutralization: acid + base → salt + water."}, {"h": "Strong vs Weak Acids", "x": "Strong: completely dissociate (HCl, H₂SO₄, HNO₃). Weak: partially dissociate (CH₃COOH, HF). Strong = 100% ions in water."}, {"h": "Oxidation Numbers", "x": "Element=0. Monatomic ion=charge. H=+1(nonmetals), -1(metals). O=-2(usually), -1(peroxides). F always=-1. Sum=0 for molecule, charge for ion."}, {"h": "Oxidation vs Reduction", "x": "Oxidation: INCREASE in oxidation number, LOSS of electrons. Reduction: DECREASE, GAIN of electrons. OIL RIG: Oxidation Is Loss, Reduction Is Gain."}, {"h": "Redox Reactions", "x": "One or more elements change oxidation number. Always occur in pairs: if one is oxidized, another is reduced."}, {"h": "Combustion", "x": "Fuel + O₂ → CO₂ + H₂O + energy. Vigorous, produces heat/light. CH₄ + 2O₂ → CO₂ + 2H₂O. Always redox."}, {"h": "Single Displacement", "x": "More reactive element replaces less reactive one in solution. Cu + 2AgNO₃ → Cu(NO₃)₂ + 2Ag. Activity series predicts."}, {"h": "Balancing Redox", "x": "Half-reaction method: write oxidation and reduction half-reactions. Balance atoms, then charge with electrons. Combine. For basic: add OH⁻."}, {"h": "Stoichiometric Calculations", "x": "Use mole ratios from balanced equation. Convert grams→moles→use ratio→moles→grams of product."}, {"h": "Limiting Reagent", "x": "Runs out first → determines max product. Convert each reactant to product moles. Smaller amount = limiting."}, {"h": "Excess Reagent", "x": "The reagent that is NOT completely consumed. Leftover amount = initial − amount used."}, {"h": "Theoretical Yield", "x": "Maximum product possible from limiting reagent. Assumes complete reaction with no side products."}, {"h": "Actual Yield", "x": "Amount actually obtained from experiment. Always ≤ theoretical due to losses, side reactions, incomplete reaction."}, {"h": "Percent Yield", "x": "(Actual yield ÷ theoretical yield) × 100%. Measures efficiency. 100% = perfect. Usually less."}, {"h": "Limiting Reagent Example", "x": "10g CH₄ + 10g O₂: convert each to mol H₂O. O₂ gives less → O₂ is limiting. Theoretical yield based on O₂."}, {"h": "Summary", "x": "Balance equations (coefficients). Three reaction types (precip, acid-base, redox). Stoichiometry uses mole ratios. Limiting reagent controls yield."}], "q": [{"q": "When balancing, adjust:", "a": ["Subscripts", "Coefficients", "Atomic numbers", "Charges"], "c": 1}, {"q": "Oxidation means:", "a": ["Decrease in ox #", "Increase in ox #", "Gain of protons", "Loss of neutrons"], "c": 1}, {"q": "Limiting reagent determines:", "a": ["Speed", "Max product", "Color", "Temperature"], "c": 1}, {"q": "Spectator ions are:", "a": ["Form precipitates", "Unchanged in reaction", "Oxidized", "Reduced"], "c": 1}, {"q": "Combustion reacts fuel with:", "a": ["Water", "Nitrogen", "Oxygen", "Helium"], "c": 2}, {"q": "H in H₂O has ox #:", "a": ["−1", "0", "+1", "+2"], "c": 2}, {"q": "% yield =:", "a": ["Actual/theoretical×100", "Theoretical/actual×100", "Moles/grams", "Mass/volume"], "c": 0}, {"q": "Strong acids:", "a": ["Partially dissociate", "Fully dissociate", "Don't dissociate", "Only at high temp"], "c": 1}, {"q": "Reduction means:", "a": ["Loss of e⁻", "Gain of e⁻", "No e⁻ change", "Loss of protons"], "c": 1}, {"q": "OIL RIG stands for:", "a": ["Oxidation Is Loss, Reduction Is Gain", "Oxygen In Liquid", "Only Ionic Lattices", "None"], "c": 0}, {"q": "Net ionic removes:", "a": ["All ions", "Spectator ions", "Precipitates", "Products"], "c": 1}, {"q": "Acid + base →:", "a": ["Only water", "Salt + water", "Only salt", "Gas"], "c": 1}, {"q": "Theoretical yield assumes:", "a": ["Incomplete reaction", "Complete reaction", "No products", "Side reactions"], "c": 1}, {"q": "Actual yield is ___ theoretical:", "a": ["Always greater than", "Always equal to", "Always ≤", "Double"], "c": 2}, {"q": "Oxidation # of element:", "a": ["1", "−1", "0", "Varies"], "c": 2}, {"q": "Precipitate is:", "a": ["Dissolved product", "Insoluble solid", "Gas", "Liquid"], "c": 1}, {"q": "Stoichiometry uses ___ ratios:", "a": ["Mass", "Volume", "Mole", "Density"], "c": 2}, {"q": "(aq) means:", "a": ["Solid", "Liquid", "Gas", "Dissolved in water"], "c": 3}, {"q": "O oxidation # usually:", "a": ["0", "−1", "−2", "+2"], "c": 2}, {"q": "F oxidation # always:", "a": ["0", "−1", "+1", "−2"], "c": 1}, {"q": "Excess reagent is:", "a": ["Completely used", "Not fully consumed", "The product", "The catalyst"], "c": 1}, {"q": "Which is a strong acid?", "a": ["CH₃COOH", "HF", "HCl", "H₂CO₃"], "c": 2}, {"q": "Cu + 2AgNO₃ is:", "a": ["Combustion", "Precipitation", "Single displacement", "Acid-base"], "c": 2}, {"q": "Balanced equation: atoms on each side are:", "a": ["Different", "Equal", "Doubled", "Halved"], "c": 1}, {"q": "Half-reactions separate:", "a": ["Acids and bases", "Oxidation and reduction", "Solids and liquids", "Gases"], "c": 1}, {"q": "Grams → moles uses:", "a": ["Nₐ", "Molar mass", "Density", "Volume"], "c": 1}, {"q": "Complete ionic shows:", "a": ["Only formulas", "All dissolved ions", "Only net ions", "Only solids"], "c": 1}, {"q": "Which CANNOT be adjusted when balancing?", "a": ["Coefficients", "Subscripts", "States", "Both A and B"], "c": 1}, {"q": "Sum of ox #s for neutral molecule:", "a": ["1", "−1", "0", "Varies"], "c": 2}, {"q": "Weak acids ___ dissociate:", "a": ["Completely", "Partially", "Never", "Only in gas"], "c": 1}, {"q": "CH₄ + 2O₂ → CO₂ + 2H₂O has ___ O atoms each side:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "Activity series predicts:", "a": ["Boiling points", "Displacement reactions", "Colors", "Densities"], "c": 1}, {"q": "HNO₃ is:", "a": ["Weak acid", "Strong acid", "Base", "Salt"], "c": 1}, {"q": "In redox, oxidation and reduction:", "a": ["Occur separately", "Always occur together", "Are optional", "Never happen"], "c": 1}, {"q": "Moles of product depend on:", "a": ["Excess reagent", "Limiting reagent", "Total mass", "Temperature only"], "c": 1}, {"q": "State (s) means:", "a": ["Solution", "Solid", "Sublimate", "Solvent"], "c": 1}, {"q": "Peroxide has O at:", "a": ["0", "−1", "−2", "+1"], "c": 1}, {"q": "Neutralization produces:", "a": ["Only acid", "Only base", "Salt + water", "Gas only"], "c": 2}, {"q": "AgCl is a:", "a": ["Soluble salt", "Precipitate", "Gas", "Acid"], "c": 1}, {"q": "Mole ratio comes from:", "a": ["Subscripts", "Coefficients", "Atomic numbers", "Mass"], "c": 1}, {"q": "For basic solution redox, add:", "a": ["H⁺", "OH⁻", "H₂O only", "Nothing"], "c": 1}, {"q": "Combustion always produces:", "a": ["Only CO₂", "Only H₂O", "CO₂ + H₂O + energy", "O₂"], "c": 2}, {"q": "Formula mass needed for:", "a": ["Balancing only", "Stoichiometry conversions", "Naming only", "State symbols"], "c": 1}, {"q": "If % yield = 75%, actual is ___ of theoretical:", "a": ["25%", "50%", "75%", "100%"], "c": 2}, {"q": "Ion charge equals its:", "a": ["Atomic number", "Ox # for monatomic", "Mass number", "Electron count"], "c": 1}, {"q": "Conservation of mass applies to:", "a": ["Only physical changes", "Only chemical", "All changes", "Neither"], "c": 2}, {"q": "Dissociation means:", "a": ["Forming bonds", "Breaking into ions", "Precipitating", "Evaporating"], "c": 1}, {"q": "H₂SO₄ is a ___ acid:", "a": ["Weak", "Strong", "Organic", "Binary"], "c": 1}, {"q": "Excess reagent amount left =:", "a": ["Initial − used", "Initial + used", "Zero always", "Theoretical yield"], "c": 0}, {"q": "Which is a precipitation reaction?", "a": ["NaCl + AgNO₃", "HCl + NaOH", "CH₄ + O₂", "Na + H₂O"], "c": 0}]}, {"t": "Lesson 5: Thermochemistry", "ln": "CHEM 260 · Ch 5", "s": [{"h": "Energy Units", "x": "Calorie (cal) and joule (J). 1 cal = 4.184 J. SI unit is joule. Food Calories (big C) = kilocalories."}, {"h": "Heat Capacity", "x": "Quantity of heat to raise entire body by 1°C. Extensive property — depends on amount. Units: J/°C."}, {"h": "Specific Heat Capacity", "x": "Heat to raise 1 GRAM by 1°C. Intensive property. Units: J/(g·°C). Water = 4.184 J/(g·°C)."}, {"h": "Heat Equation", "x": "q = mcΔT. q = heat. m = mass. c = specific heat. ΔT = temperature change (final − initial)."}, {"h": "Calorimetry", "x": "Technique to measure heat in reactions. Calorimeter = device used. System = substances changing. Surroundings = everything else."}, {"h": "Coffee Cup Calorimeter", "x": "Simple, constant pressure. Styrofoam cup. q_system = −q_surroundings in insulated system."}, {"h": "Calorimetry Example", "x": "360g steel (c=0.449) dropped into 425mL water at 24°C. Final T=42.7°C. Find initial T of steel using q_water = −q_steel."}, {"h": "Internal Energy", "x": "U = total possible energy in substance. State function — depends only on state, not path. Like altitude on a mountain."}, {"h": "First Law of Thermodynamics", "x": "ΔU = q + w. Energy conserved: internal energy change = heat + work. Cannot create or destroy energy."}, {"h": "Enthalpy", "x": "H = U + PV. At constant pressure: ΔH = q_p. State function. Most useful energy measure for chemical reactions."}, {"h": "Endothermic Reactions", "x": "ΔH > 0. System ABSORBS heat from surroundings. Feels cold. Examples: melting ice, dissolving NH₄NO₃."}, {"h": "Exothermic Reactions", "x": "ΔH < 0. System RELEASES heat to surroundings. Feels hot. Examples: combustion, neutralization, freezing."}, {"h": "Thermochemical Equations", "x": "Show matter AND energy changes. Include ΔH value. 2H₂(g) + O₂(g) → 2H₂O(l) ΔH = −572 kJ."}, {"h": "Coefficient Rules", "x": "Multiply coefficients by factor → multiply ΔH by same factor. Half the reaction → half the ΔH."}, {"h": "Reversing Reactions", "x": "Reverse reaction → flip sign of ΔH. If forward is −286 kJ, reverse is +286 kJ."}, {"h": "Standard State", "x": "IUPAC: 1 bar pressure, 1 M solutions, 25°C (298.15 K) unless specified. Denoted with ° superscript."}, {"h": "Standard Enthalpy of Combustion", "x": "ΔH when 1 mol substance burns under standard conditions. Also called heat of combustion."}, {"h": "Standard Enthalpy of Formation", "x": "ΔH°f: enthalpy to form 1 mol from elements in standard states. Elements in standard state: ΔH°f = 0."}, {"h": "Formation Example", "x": "C(s) + O₂(g) → CO₂(g), ΔH°f = −393.5 kJ. This IS the formation of CO₂."}, {"h": "Hess's Law", "x": "ΔH of total process = sum of ΔH of individual steps. Path independent — only initial and final states matter."}, {"h": "Using Hess's Law", "x": "Break complex reaction into known steps. Add their ΔH values. May need to reverse reactions (flip sign) or multiply."}, {"h": "ΔH from Formation Data", "x": "ΔH°rxn = Σ ΔH°f(products) − Σ ΔH°f(reactants). Quick way to calculate reaction enthalpy from tables."}, {"h": "Bond Energy Method", "x": "ΔH ≈ Σ(bonds broken) − Σ(bonds formed). Breaking bonds costs energy (+). Forming bonds releases (−)."}, {"h": "State Functions", "x": "Path-independent quantities: H, U, P, T, V. NOT path-dependent: q and w individually (but ΔU = q+w is)."}, {"h": "Summary", "x": "q=mcΔT for heat. ΔH: + endothermic, − exothermic. Hess's Law: sum steps. ΔH°f of elements = 0. Conservation of energy."}], "q": [{"q": "Exothermic ΔH is:", "a": ["Positive", "Zero", "Negative", "Undefined"], "c": 2}, {"q": "1 cal =:", "a": ["1.000 J", "4.184 J", "2.718 J", "0.239 J"], "c": 1}, {"q": "Hess's Law: ΔH =:", "a": ["Path energy", "Sum of steps", "Always negative", "Cannot calculate"], "c": 1}, {"q": "Specific heat is:", "a": ["Extensive", "Intensive", "Chemical", "Nuclear"], "c": 1}, {"q": "q = mcΔT calculates:", "a": ["Pressure", "Work", "Heat", "Formation"], "c": 2}, {"q": "ΔH°f of O₂(g) is:", "a": ["−273 kJ", "Unknown", "0", "Variable"], "c": 2}, {"q": "q_system = ___ q_surroundings:", "a": ["Equal to", "Negative of", "Double", "Half"], "c": 1}, {"q": "Reversing reaction ___ ΔH:", "a": ["Doubles", "Halves", "Flips sign", "No change"], "c": 2}, {"q": "Endothermic absorbs:", "a": ["Light", "Heat", "Electrons", "Protons"], "c": 1}, {"q": "Water specific heat:", "a": ["1.00", "2.09", "4.184", "0.449"], "c": 2}, {"q": "State function depends on:", "a": ["Path taken", "Initial and final state only", "Speed", "Catalyst"], "c": 1}, {"q": "First Law: ΔU =:", "a": ["q only", "w only", "q + w", "q − w"], "c": 2}, {"q": "H = U +:", "a": ["ST", "PV", "mc", "nR"], "c": 1}, {"q": "Enthalpy is a:", "a": ["Path function", "State function", "Variable", "Constant"], "c": 1}, {"q": "Combustion is always:", "a": ["Endothermic", "Exothermic", "Neutral", "Variable"], "c": 1}, {"q": "Multiply coefficients by 2, ΔH:", "a": ["Same", "Halved", "Doubled", "Flipped"], "c": 2}, {"q": "Standard temperature:", "a": ["0°C", "25°C", "100°C", "273°C"], "c": 1}, {"q": "Standard pressure:", "a": ["0.5 bar", "1 bar", "2 bar", "10 bar"], "c": 1}, {"q": "ΔH°rxn = Σf(products) −:", "a": ["Σf(reactants)", "Σf(elements)", "0", "ΔU"], "c": 0}, {"q": "Breaking bonds is:", "a": ["Exothermic", "Endothermic", "Neutral", "Impossible"], "c": 1}, {"q": "Forming bonds is:", "a": ["Exothermic", "Endothermic", "Neutral", "Impossible"], "c": 0}, {"q": "Calorimeter measures:", "a": ["Mass", "Volume", "Heat", "Pressure"], "c": 2}, {"q": "Styrofoam cup is a:", "a": ["Bomb calorimeter", "Coffee cup calorimeter", "Thermometer", "Barometer"], "c": 1}, {"q": "Food Calories are:", "a": ["Calories", "Kilocalories", "Joules", "Kilojoules"], "c": 1}, {"q": "ΔT = T_final −:", "a": ["T_initial", "T_average", "T_maximum", "0"], "c": 0}, {"q": "Heat capacity is ___ property:", "a": ["Intensive", "Extensive", "Chemical", "Nuclear"], "c": 1}, {"q": "At constant pressure, ΔH =:", "a": ["q_p", "w", "ΔU", "PV"], "c": 0}, {"q": "Melting ice is:", "a": ["Exothermic", "Endothermic", "Neither", "Both"], "c": 1}, {"q": "Freezing water is:", "a": ["Exothermic", "Endothermic", "Neither", "Both"], "c": 0}, {"q": "Elements in standard state: ΔH°f =:", "a": ["1", "−1", "0", "Varies"], "c": 2}, {"q": "Hess's Law works because enthalpy is:", "a": ["Path dependent", "A state function", "Always zero", "Unmeasurable"], "c": 1}, {"q": "ΔH < 0 means:", "a": ["Endothermic", "Exothermic", "No reaction", "Equilibrium"], "c": 1}, {"q": "Thermochemical equations include:", "a": ["ΔH value", "Only formulas", "Only states", "Mass only"], "c": 0}, {"q": "1 kJ =:", "a": ["100 J", "1000 J", "10 J", "0.001 J"], "c": 1}, {"q": "Neutralization is typically:", "a": ["Endothermic", "Exothermic", "Neither", "Variable"], "c": 1}, {"q": "Bomb calorimeter measures at constant:", "a": ["Pressure", "Volume", "Temperature", "Mass"], "c": 1}, {"q": "q is positive when system:", "a": ["Loses heat", "Gains heat", "No change", "Only for gas"], "c": 1}, {"q": "w is positive when work done ON system:", "a": ["True", "False", "Sometimes", "Never"], "c": 0}, {"q": "Bond energy is energy to:", "a": ["Form a bond", "Break a bond", "Transfer electrons", "Create atoms"], "c": 1}, {"q": "CO₂ ΔH°f = −393.5 kJ means:", "a": ["It takes 393.5 kJ to form", "393.5 kJ released forming 1 mol", "CO₂ is unstable", "CO₂ is an element"], "c": 1}, {"q": "ΔH for 1 mol vs 2 mol reaction:", "a": ["Same", "Half vs double", "Double vs half", "Unrelated"], "c": 1}, {"q": "Dissolving NH₄NO₃ feels:", "a": ["Hot", "Cold", "Neutral", "Burning"], "c": 1}, {"q": "Energy cannot be created or destroyed:", "a": ["First Law", "Second Law", "Third Law", "Zeroth Law"], "c": 0}, {"q": "Standard state solutions are:", "a": ["0.1 M", "0.5 M", "1 M", "2 M"], "c": 2}, {"q": "Specific heat of steel (~0.449) means steel heats ___ than water:", "a": ["Slower", "Faster", "Same", "Cannot compare"], "c": 1}, {"q": "Enthalpy change for decomposition is ___ of formation:", "a": ["Same sign", "Opposite sign", "Zero", "Double"], "c": 1}, {"q": "Heat flows from ___ to ___:", "a": ["Cold to hot", "Hot to cold", "Equal temp", "Random"], "c": 1}, {"q": "Lavoisier is associated with:", "a": ["Thermodynamics", "Conservation of mass", "Enthalpy", "Hess's Law"], "c": 1}, {"q": "ΔH from bond energies: broken − formed. If result positive:", "a": ["Exothermic", "Endothermic", "No reaction", "Spontaneous"], "c": 1}, {"q": "Enthalpy of vaporization is:", "a": ["Negative", "Positive", "Zero", "Variable by element"], "c": 1}]}, {"t": "Lesson 6: Electronic Structure", "ln": "CHEM 260 · Ch 6", "s": [{"h": "Electromagnetic Radiation", "x": "Waves: wavelength λ, frequency ν, amplitude. Self-propagating. Examples: radio, microwave, IR, visible, UV, X-ray, gamma."}, {"h": "Wave Equation", "x": "c = λν. Speed of light c = 3.00×10⁸ m/s. Shorter wavelength = higher frequency = higher energy."}, {"h": "EM Spectrum", "x": "Radio(longest λ) → microwave → IR → visible(ROYGBIV) → UV → X-ray → gamma(shortest λ, highest energy)."}, {"h": "Photoelectric Effect", "x": "Light ejects electrons from metal surface. Must exceed threshold energy. E = hν = hc/λ. Planck's constant h = 6.626×10⁻³⁴ J·s."}, {"h": "Photon Energy", "x": "E = hν or E = hc/λ. Higher frequency = higher energy. Shorter wavelength = higher energy. Quantized — comes in packets."}, {"h": "Bohr Model", "x": "Electrons in specific quantized energy levels. E = −k/n² (k=2.179×10⁻¹⁸ J for H). Only certain energies allowed."}, {"h": "Energy Transitions", "x": "ΔE = E_final − E_initial. Emission: electron drops to lower level, releases photon. Absorption: electron jumps up, absorbs photon."}, {"h": "De Broglie Wavelength", "x": "Particles have wave nature. λ = h/(mv). Electrons have measurable wavelengths; macroscopic objects don't (too small)."}, {"h": "Schrödinger Equation", "x": "Calculates probability of finding electron at location. Solutions → quantum numbers. Wave function ψ describes electron."}, {"h": "Principal Quantum Number n", "x": "Energy level and size. Integer ≥ 1. Larger n = higher energy, larger orbital. n=1 closest to nucleus."}, {"h": "Angular Momentum l", "x": "Shape of orbital. Values: 0 to n−1. l=0→s(sphere), l=1→p(dumbbell), l=2→d, l=3→f."}, {"h": "Magnetic Quantum Number mₗ", "x": "Orientation of orbital. Values: −l to +l (including 0). Determines number of orbitals per subshell."}, {"h": "Spin Quantum Number mₛ", "x": "Electron spin direction: +½ or −½. Two electrons per orbital must have opposite spins."}, {"h": "s Orbitals", "x": "Spherical. 1 per shell. Present at all energy levels (1s, 2s, 3s...). Each successively larger."}, {"h": "p Orbitals", "x": "Dumbbell/two balloons. 3 per shell (px, py, pz). Start at n=2. Each along different axis."}, {"h": "d Orbitals", "x": "Clover/complex shapes. 5 per shell. Start at n=3. Important for transition metals."}, {"h": "f Orbitals", "x": "Complex shapes. 7 per shell. Start at n=4. Important for lanthanides/actinides."}, {"h": "Aufbau Principle", "x": "Fill lowest energy orbitals first. Order: 1s→2s→2p→3s→3p→4s→3d→4p→5s→4d... Use diagonal rule."}, {"h": "Pauli Exclusion Principle", "x": "Maximum 2 electrons per orbital. Must have opposite spins (+½ and −½). No two electrons same 4 quantum numbers."}, {"h": "Hund's Rule", "x": "When filling equal-energy orbitals, place 1 electron in each before pairing. All unpaired have same spin."}, {"h": "Electron Configuration Notation", "x": "Use n, letter for l, superscript for electron count. Example: 1s²2s²2p⁶3s²3p⁶ for Argon."}, {"h": "Core vs Valence Electrons", "x": "Core: inner shell, not involved in bonding. Valence: outermost shell (highest n), determine chemical behavior."}, {"h": "Periodic Trends: Atomic Radius", "x": "Increases DOWN (more shells). Decreases LEFT→RIGHT (more protons, same shell, stronger pull)."}, {"h": "Periodic Trends: Ionization Energy", "x": "Energy to remove electron. Increases RIGHT and UP. Metals low IE, nonmetals high IE."}, {"h": "Isoelectronic Series", "x": "Same electron configuration. Size order: more protons = smaller (Al³⁺ < Mg²⁺ < Na⁺ < Ne < F⁻ < O²⁻ < N³⁻)."}], "q": [{"q": "c = λν relates:", "a": ["Mass/energy", "Speed/wavelength/frequency", "Charge/voltage", "P/V"], "c": 1}, {"q": "E = hν calculates:", "a": ["Mass", "Photon energy", "Velocity", "Volume"], "c": 1}, {"q": "n determines:", "a": ["Shape", "Orientation", "Energy and size", "Spin"], "c": 2}, {"q": "p orbitals per shell:", "a": ["1", "3", "5", "7"], "c": 1}, {"q": "Aufbau: fill ___ energy first:", "a": ["Highest", "Lowest", "Random", "Middle"], "c": 1}, {"q": "Hund's rule:", "a": ["Pair immediately", "1 e⁻ each before pairing", "Fill d before p", "Skip orbitals"], "c": 1}, {"q": "l determines:", "a": ["Energy", "Shape", "Orientation", "Spin"], "c": 1}, {"q": "d orbitals start at n=:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Isoelectronic: more nuclear charge =:", "a": ["Larger", "Smaller", "Same", "Unknown"], "c": 1}, {"q": "Pauli: max ___ e⁻ per orbital:", "a": ["1", "2", "3", "4"], "c": 1}, {"q": "Shorter wavelength means:", "a": ["Lower energy", "Higher energy", "No change", "Lower frequency"], "c": 1}, {"q": "Planck's constant h =:", "a": ["3×10⁸", "6.626×10⁻³⁴", "6.022×10²³", "1.602×10⁻¹⁹"], "c": 1}, {"q": "Bohr model: E = −k/:", "a": ["n", "n²", "n³", "√n"], "c": 1}, {"q": "s orbitals are:", "a": ["Dumbbell", "Spherical", "Clover", "Complex"], "c": 1}, {"q": "f orbitals: ___ per shell:", "a": ["1", "3", "5", "7"], "c": 3}, {"q": "Spin values:", "a": ["0, 1", "±½", "±1", "0 only"], "c": 1}, {"q": "mₗ values range:", "a": ["0 to n", "−l to +l", "1 to l", "0 only"], "c": 1}, {"q": "Valence electrons are in:", "a": ["Inner shells", "Outermost shell", "Nucleus", "All shells"], "c": 1}, {"q": "Atomic radius increases:", "a": ["Up and right", "Down and left", "Down only", "Right only"], "c": 1}, {"q": "IE increases:", "a": ["Down and left", "Up and right", "Down only", "Left only"], "c": 1}, {"q": "Core electrons are:", "a": ["Outermost", "Inner shell", "In nucleus", "Bonding"], "c": 1}, {"q": "Speed of light =:", "a": ["3×10⁶", "3×10⁸", "3×10¹⁰", "6×10²³"], "c": 1}, {"q": "Emission: electron goes:", "a": ["Up levels", "Down levels", "Nowhere", "Out of atom"], "c": 1}, {"q": "De Broglie: λ = h/:", "a": ["mc", "mv", "mc²", "hν"], "c": 1}, {"q": "1s²2s²2p⁶ is ___ config:", "a": ["Ne", "Ar", "He", "Li"], "c": 0}, {"q": "Most energetic radiation:", "a": ["Radio", "Visible", "UV", "Gamma"], "c": 3}, {"q": "Visible light order (low→high E):", "a": ["ROYGBIV", "VIBGYOR", "Random", "All same"], "c": 0}, {"q": "Quantized means:", "a": ["Continuous", "Discrete packets", "Random", "Infinite"], "c": 1}, {"q": "Metals have ___ IE:", "a": ["High", "Low", "Zero", "Variable"], "c": 1}, {"q": "Anion is ___ than parent atom:", "a": ["Smaller", "Larger", "Same", "Cannot tell"], "c": 1}, {"q": "Cation is ___ than parent atom:", "a": ["Smaller", "Larger", "Same", "Cannot tell"], "c": 0}, {"q": "3p has how many orbitals?", "a": ["1", "3", "5", "7"], "c": 1}, {"q": "Config of H:", "a": ["1s¹", "1s²", "2s¹", "1p¹"], "c": 0}, {"q": "n=3 can have l values:", "a": ["0,1,2", "0,1", "0,1,2,3", "0 only"], "c": 0}, {"q": "Wavelength unit:", "a": ["Hz", "m or nm", "J", "mol"], "c": 1}, {"q": "Frequency unit:", "a": ["m", "Hz (s⁻¹)", "J", "mol"], "c": 1}, {"q": "Threshold energy: light must ___ it:", "a": ["Equal", "Exceed", "Be below", "Ignore"], "c": 1}, {"q": "Diagonal rule helps with:", "a": ["Filling order", "Naming", "Bonding", "Reactions"], "c": 0}, {"q": "Na electron config:", "a": ["1s²2s²2p⁶3s¹", "1s²2s²2p⁶", "1s²2s²2p⁵", "1s²2s²2p⁶3s²"], "c": 0}, {"q": "Mg²⁺ is smaller than Na⁺ because:", "a": ["Fewer electrons", "More protons for same e⁻", "Less mass", "Different element"], "c": 1}, {"q": "Which subshell fills after 3p?", "a": ["3d", "4s", "4p", "4d"], "c": 1}, {"q": "Ground state: electrons in:", "a": ["Highest energy", "Lowest energy", "Random", "Excited"], "c": 1}, {"q": "Excited state: electron has been:", "a": ["Removed", "Promoted to higher level", "Paired", "Destroyed"], "c": 1}, {"q": "Line spectrum shows:", "a": ["Continuous colors", "Discrete wavelengths", "White light", "No light"], "c": 1}, {"q": "Config of Cl:", "a": ["1s²2s²2p⁶3s²3p⁵", "1s²2s²2p⁶3s²3p⁶", "1s²2s²2p⁶3s²3p³", "1s²2s²2p⁵3s²"], "c": 0}, {"q": "4s fills before:", "a": ["3p", "3d", "2p", "2s"], "c": 1}, {"q": "Heisenberg uncertainty: can't know both:", "a": ["Mass and charge", "Position and momentum precisely", "Energy and time", "Name and symbol"], "c": 1}, {"q": "Number of orbitals for l=2:", "a": ["1", "3", "5", "7"], "c": 2}, {"q": "Phosphorus has ___ valence e⁻:", "a": ["3", "5", "7", "15"], "c": 1}, {"q": "Paramagnetic means:", "a": ["All paired", "Has unpaired electrons", "No electrons", "Diamagnetic"], "c": 1}]}, {"t": "Lesson 7: Chemical Bonding", "ln": "CHEM 260 · Ch 7", "s": [{"h": "Ionic Bonds", "x": "Metal + nonmetal. Electron transfer. Electrostatic attraction between cation and anion. Generally strong bonds."}, {"h": "Covalent Bonds", "x": "Nonmetal + nonmetal. Mutual attraction for SHARED electron pair. Bond length at lowest potential energy."}, {"h": "Pure (Nonpolar) Covalent", "x": "Identical atoms share equally. H₂, Cl₂, N₂. No partial charges. ΔEN = 0."}, {"h": "Polar Covalent", "x": "Different atoms, unequal sharing. Partial charges δ+ and δ−. HCl, HF, CO. 0.4 < ΔEN < 1.8."}, {"h": "Electronegativity", "x": "Tendency to attract electrons. Increases UP and RIGHT on periodic table. F is most electronegative."}, {"h": "ΔEN and Bond Type", "x": "~0: nonpolar covalent. 0.4-1.8: polar covalent. >1.8: ionic. Continuous spectrum, not rigid boundaries."}, {"h": "Lewis Symbols", "x": "Element symbol + dots for valence electrons. Shows bonding capacity. Na has 1 dot, O has 6 dots."}, {"h": "Lewis Structures", "x": "Diagrams showing bonding pairs (dashes) and lone pairs (dots). Show how atoms connect in molecule."}, {"h": "Octet Rule", "x": "Main group atoms form bonds to get 8 valence electrons (noble gas config). H satisfied with 2."}, {"h": "Drawing Lewis Structures", "x": "1) Count total valence e⁻. 2) Skeleton (least EN center). 3) Distribute lone pairs. 4) Remaining on center. 5) Multiple bonds if needed."}, {"h": "Exceptions to Octet", "x": "Incomplete: BF₃ (6 e⁻ on B). Expanded: PCl₅, SF₆ (>8 e⁻). Odd electron: NO (free radical)."}, {"h": "Multiple Bonds", "x": "Double bond: 2 shared pairs. Triple bond: 3 shared pairs. Shorter and stronger than single bonds."}, {"h": "Formal Charge", "x": "FC = valence e⁻ − (lone e⁻ + ½ bonding e⁻). Preferred: all FC=0, smallest possible, negative on more EN atom."}, {"h": "Resonance", "x": "Multiple valid Lewis structures for same molecule. Real structure = average. Neither structure is 'correct' alone."}, {"h": "Resonance Example", "x": "NO₂⁻ has 2 resonance forms. Both N-O bonds equal length/strength experimentally, proving resonance."}, {"h": "Bond Energy", "x": "Energy to break 1 mol of bonds (always positive). Stronger bond = higher bond energy. Triple > double > single."}, {"h": "ΔH from Bond Energies", "x": "ΔH ≈ Σ(bonds broken) − Σ(bonds formed). Positive = endothermic. Negative = exothermic."}, {"h": "Lattice Energy", "x": "Energy released when gaseous ions form ionic solid. Larger charges and smaller ions = greater lattice energy."}, {"h": "VSEPR Theory", "x": "Electron pairs repel → maximize distance. Predicts molecular geometry. Count electron regions around central atom."}, {"h": "Electron-Pair Geometries", "x": "2: linear(180°). 3: trigonal planar(120°). 4: tetrahedral(109.5°). 5: trigonal bipyramidal. 6: octahedral."}, {"h": "Lone Pair Effects", "x": "Lone pairs take up MORE space than bonding pairs. Compress bond angles. LP-LP > LP-BP > BP-BP repulsion."}, {"h": "Molecular Shapes with Lone Pairs", "x": "4 regions: 3BP+1LP = trigonal pyramidal. 2BP+2LP = bent. 5 regions: various. Shape ≠ e-pair geometry when LPs present."}, {"h": "Molecular Polarity", "x": "Polar molecule: has net dipole moment. Nonpolar: dipoles cancel (symmetric). Depends on both bond polarity AND geometry."}, {"h": "Bond Angles", "x": "Ideal angles from VSEPR. Lone pairs compress below ideal. NH₃: 107° (not 109.5°). H₂O: 104.5° (not 109.5°)."}, {"h": "Summary", "x": "Ionic(transfer) vs covalent(share). Lewis structures show e⁻. VSEPR predicts shape. Formal charge guides best structure. Resonance = average."}], "q": [{"q": "Ionic bonds form between:", "a": ["Nonmetals", "Metals", "Metal+nonmetal", "Noble gases"], "c": 2}, {"q": "EN increases going:", "a": ["Down+left", "Up+right", "Down+right", "Up+left"], "c": 1}, {"q": "Center atom in Lewis:", "a": ["Most EN", "Least EN", "Smallest", "Hydrogen"], "c": 1}, {"q": "4 regions no LP =:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Octahedral"], "c": 2}, {"q": "Resonance:", "a": ["Atoms vibrate", "Multiple valid Lewis structures", "Bonds break", "Electrons lost"], "c": 1}, {"q": "VSEPR based on:", "a": ["Mass", "E-pair repulsion", "Bond energy", "EN"], "c": 1}, {"q": "Strongest repulsion:", "a": ["BP-BP", "LP-BP", "LP-LP", "All equal"], "c": 2}, {"q": "ΔEN > 1.8 =:", "a": ["Nonpolar covalent", "Polar covalent", "Ionic", "Metallic"], "c": 2}, {"q": "FC formula:", "a": ["Valence−(lone+½bond)", "Valence+lone+bond", "Protons−electrons", "Mass−charge"], "c": 0}, {"q": "3BP+1LP shape:", "a": ["Tetrahedral", "Trigonal planar", "Trigonal pyramidal", "Bent"], "c": 2}, {"q": "Triple bond has ___ shared pairs:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Bond energy: triple vs single:", "a": ["Triple weaker", "Triple stronger", "Equal", "No comparison"], "c": 1}, {"q": "Most EN element:", "a": ["O", "N", "F", "Cl"], "c": 2}, {"q": "H satisfies with ___ e⁻:", "a": ["2", "4", "6", "8"], "c": 0}, {"q": "Octet =:", "a": ["2 e⁻", "4 e⁻", "6 e⁻", "8 e⁻"], "c": 3}, {"q": "BF₃ is exception because B has:", "a": ["10 e⁻", "8 e⁻", "6 e⁻", "4 e⁻"], "c": 2}, {"q": "ΔEN=0 means:", "a": ["Ionic", "Polar covalent", "Nonpolar covalent", "No bond"], "c": 2}, {"q": "Lewis structure step 1:", "a": ["Draw skeleton", "Count valence e⁻", "Add lone pairs", "Make multiple bonds"], "c": 1}, {"q": "Lattice energy: larger charges =:", "a": ["Weaker", "Stronger", "Same", "No effect"], "c": 1}, {"q": "Linear angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 3}, {"q": "Tetrahedral angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 1}, {"q": "Trigonal planar angle:", "a": ["90°", "109.5°", "120°", "180°"], "c": 2}, {"q": "Water shape:", "a": ["Linear", "Trigonal planar", "Tetrahedral", "Bent"], "c": 3}, {"q": "NH₃ shape:", "a": ["Tetrahedral", "Trigonal pyramidal", "Linear", "Bent"], "c": 1}, {"q": "CO₂ shape:", "a": ["Bent", "Trigonal", "Linear", "Tetrahedral"], "c": 2}, {"q": "Polar molecule needs:", "a": ["Symmetric dipoles", "Net dipole moment", "No bonds", "Only ionic bonds"], "c": 1}, {"q": "Bond order: single < double < triple means:", "a": ["Weaker to stronger", "Stronger to weaker", "All equal", "No trend"], "c": 0}, {"q": "ΔH from bonds: broken − formed. Negative =:", "a": ["Endothermic", "Exothermic", "No reaction", "Equilibrium"], "c": 1}, {"q": "Lone pairs on O in H₂O:", "a": ["0", "1", "2", "3"], "c": 2}, {"q": "NO₂⁻ resonance forms show bonds are:", "a": ["Different lengths", "All equal", "Nonexistent", "Triple"], "c": 1}, {"q": "PCl₅ is exception: P has ___ bonds:", "a": ["3", "4", "5", "6"], "c": 2}, {"q": "Covalent bond length:", "a": ["Distance between nuclei", "Electron cloud size", "Atom diameter", "Ion radius"], "c": 0}, {"q": "Sigma bond in Lewis shown as:", "a": ["Dot", "Dash/line", "Arrow", "Wave"], "c": 1}, {"q": "Count of e⁻ regions includes:", "a": ["Only bonds", "Only LPs", "Bonds AND lone pairs", "Only multiple bonds"], "c": 2}, {"q": "Which is nonpolar?", "a": ["HCl", "H₂O", "CO₂", "NH₃"], "c": 2}, {"q": "Electronegativity difference determines:", "a": ["Bond color", "Bond type", "Bond length only", "Atomic mass"], "c": 1}, {"q": "Formal charge helps choose:", "a": ["Best Lewis structure", "Molecular mass", "Bond energy", "Atomic radius"], "c": 0}, {"q": "Born-Haber cycle calculates:", "a": ["Bond energy", "Lattice energy", "ΔH°f", "EN"], "c": 1}, {"q": "5 electron regions =:", "a": ["Linear", "Tetrahedral", "Trigonal bipyramidal", "Octahedral"], "c": 2}, {"q": "6 electron regions =:", "a": ["Linear", "Tetrahedral", "Trigonal bipyramidal", "Octahedral"], "c": 3}, {"q": "HF is:", "a": ["Nonpolar", "Polar covalent", "Ionic", "Metallic"], "c": 1}, {"q": "NaCl is:", "a": ["Nonpolar", "Polar covalent", "Ionic", "Metallic"], "c": 2}, {"q": "LP compresses angles:", "a": ["Above ideal", "Below ideal", "No change", "To 180°"], "c": 1}, {"q": "Actual H₂O angle:", "a": ["180°", "120°", "109.5°", "104.5°"], "c": 3}, {"q": "Which has resonance?", "a": ["H₂O", "CO₂", "O₃", "CH₄"], "c": 2}, {"q": "Ionic lattice is:", "a": ["Soft", "Strong crystal", "Gas", "Liquid"], "c": 1}, {"q": "Valence e⁻ of C:", "a": ["2", "4", "6", "8"], "c": 1}, {"q": "Drawing Lewis: least EN except ___ never center:", "a": ["C", "N", "H", "O"], "c": 2}, {"q": "Double bond is ___ and ___ than single:", "a": ["Longer/weaker", "Shorter/stronger", "Same", "Longer/stronger"], "c": 1}, {"q": "Free radicals have:", "a": ["All paired e⁻", "Odd number of e⁻", "No electrons", "8 e⁻"], "c": 1}]}, {"t": "Lesson 8: Advanced Bonding", "ln": "CHEM 260 · Ch 8", "s": [{"h": "Valence Bond Theory", "x": "Covalent bonds: atomic orbitals overlap. Single e⁻ in each combine to shared pair. Greater overlap = stronger bond."}, {"h": "VB Theory Limits", "x": "Only works for diatomic molecules directly. Need hybridization concept for molecules with 3+ atoms."}, {"h": "Sigma (σ) Bonds", "x": "End-to-end overlap. Types: s+s (H₂), s+p (HCl), p+p end-to-end (Cl₂). ALL single bonds are σ."}, {"h": "Pi (π) Bonds", "x": "Side-by-side p orbital overlap. Found in multiple bonds alongside σ. Generally weaker than σ bonds."}, {"h": "Single Bond", "x": "One σ bond only. Free rotation around bond axis. Longest and weakest of bond types."}, {"h": "Double Bond", "x": "1σ + 1π. Restricts rotation. Shorter and stronger than single. Found in C=C, C=O, etc."}, {"h": "Triple Bond", "x": "1σ + 2π. Shortest, strongest. No rotation. Found in N≡N, C≡C (acetylene)."}, {"h": "Counting σ and π", "x": "Every single bond = 1σ. Double = 1σ+1π. Triple = 1σ+2π. Count all bonds in molecule."}, {"h": "Hybridization Concept", "x": "Atomic orbitals mix to form new hybrid orbitals for bonding. Number of hybrids = number of atomic orbitals combined."}, {"h": "sp Hybridization", "x": "Mix 1s + 1p → 2 sp hybrids. Linear geometry (180°). 2 electron regions. Examples: BeCl₂, CO₂."}, {"h": "sp² Hybridization", "x": "Mix 1s + 2p → 3 sp² hybrids. Trigonal planar (120°). 3 electron regions. Examples: BF₃, C₂H₄."}, {"h": "sp³ Hybridization", "x": "Mix 1s + 3p → 4 sp³ hybrids. Tetrahedral (109.5°). 4 electron regions. Examples: CH₄, NH₃, H₂O."}, {"h": "sp³d Hybridization", "x": "5 hybrid orbitals. Trigonal bipyramidal. 5 electron regions. Example: PCl₅."}, {"h": "sp³d² Hybridization", "x": "6 hybrid orbitals. Octahedral. 6 electron regions. Example: SF₆."}, {"h": "Identifying Hybridization", "x": "Count electron regions (bonds + lone pairs). 2→sp, 3→sp², 4→sp³, 5→sp³d, 6→sp³d². Quick method."}, {"h": "Unhybridized p Orbitals", "x": "After hybridization, leftover p orbitals form π bonds. sp has 2 unhybridized p; sp² has 1."}, {"h": "Hybrid Orbitals Only in Bonded Atoms", "x": "Isolated atoms don't hybridize. Hybridization occurs during bond formation to minimize energy."}, {"h": "Molecular Orbital Theory", "x": "Alternative to VB. Atomic orbitals combine to form molecular orbitals spanning entire molecule."}, {"h": "Bonding vs Antibonding MOs", "x": "Bonding MO: lower energy, electrons stabilize molecule. Antibonding MO (*): higher energy, destabilize."}, {"h": "Bond Order in MO", "x": "Bond order = (bonding e⁻ − antibonding e⁻)/2. Higher = stronger/shorter. Zero = no bond forms."}, {"h": "MO Diagram for O₂", "x": "Shows O₂ has 2 unpaired electrons → paramagnetic. VB theory can't explain this. MO theory can."}, {"h": "Paramagnetism vs Diamagnetism", "x": "Paramagnetic: unpaired electrons, attracted to magnetic field. Diamagnetic: all paired, slightly repelled."}, {"h": "Sigma MOs", "x": "From head-on overlap of s or p orbitals. σ and σ* (bonding and antibonding)."}, {"h": "Pi MOs", "x": "From side-by-side overlap of p orbitals. π and π*. Always 2 degenerate π MOs."}, {"h": "Summary", "x": "σ bonds: end-to-end, all single bon ering: staphylo (clusters), strepto (chains)."}, {"h": "Microscopes (Part 1)", "x": "Light/brightfield: transmitted light + stains, most common.. Phase contrast/DIC: unstained samples visible.. Fluorescent: emitted light from special chemicals.."}, {"h": "Microscopes (Part 2)", "x": "Confocal: lasers + fluorescence → 3D.. Super-resolution: fluorescence + quantum mechanics.. SEM: surface imaging, gold sputter, 3D, non-living.. TEM: electrons through thin sample, highest magnification, internal structures, non-living.."}, {"h": "Key Organelles (Part 1)", "x": "Plasma membrane: lipid bilayer, semi-permeable, in both pro/eukaryotes.. Nucleus: 'brain,' holds DNA, nuclear pores, chromosomes replicated here.."}, {"h": "Key Organelles (Part 2)", "x": "Cytoskeleton: structural support + transport highway.. Three fibers: microfilaments (actin, 5-6nm, cleavage furrow, muscle), intermediate filaments (~10nm, mechanical stress), microtubules (tubulin, 25nm, highway, cell division).."}, {"h": "Membrane Organelles (Part 1)", "x": "Rough ER: ribosomes on surface, membrane/secreted protein synthesis.. Smooth ER: membrane lipid synthesis.. Golgi: processes proteins/lipids, adds carbohydrates, sorting center.."}, {"h": "Membrane Organelles (Part 2)", "x": "Lysosomes: digestive, break down waste.. Peroxisomes: generate/degrade H₂O₂, detoxify.. Vacuoles: storage (huge in plants for turgor pressure).."}, {"h": "Energy Organelles (Part 1)", "x": "Mitochondria: 2 membranes, cristae (inner folds), matrix, oxidize sugars → ATP.. Own circular DNA.."}, {"h": "Energy Organelles (Part 2)", "x": "Chloroplasts: plants only, 3 membranes (inner/outer/thylakoid), grana (thylakoid stacks), stroma, photosynthesis.. Both support endosymbiont theory — similar to prokaryotes in size, DNA, ribosomes.."}, {"h": "Cell Structures (Part 1)", "x": "Cilia: short, oar-like beating (microtubule core).. Flagella: long, propeller-like spinning.. Centrosomes: organize microtubules during division.."}, {"h": "Cell Str ll division → cancer.."}, {"h": "Cell Cycle Control (Part 2)", "x": "Checkpoints verify key events.. Rb must be phosphorylated to enter S phase.. Growth factors bind receptors to signal division.."}, {"h": "Inhibition & Tumors (Part 1)", "x": "Contact (density-dependent) inhibition: blocks division when crowded.. Anchorage-dependent inhibition: cells must be attached.."}, {"h": "Inhibition & Tumors (Part 2)", "x": "Loss of contact inhibition → benign tumors (extra divisions but stop).. Loss of contact + cycle control → malignant tumors.. Loss of anchorage dependence → metastatic tumors (spread).."}, {"h": "Meiosis Overview (Part 1)", "x": "Reduces chromosomes by half (diploid→haploid) for gametes.. Occurs after normal division with NO second S phase.. Mitosis: 46→46.."}, {"h": "Meiosis Overview (Part 2)", "x": "Meiosis: 46→23.. Recombination combines parental traits — only when tetrad (4 chromosomes) lined up.. Random → different children get different mixes.."}, {"h": "Prophase I Stages (Part 1)", "x": "Leptotene: initial condensation, thin threads with chromomeres.. Zygotene: synapsis (lateral pairing) of homologs → bivalent.."}, {"h": "Prophase I Stages (Part 2)", "x": "Pachytene ⭐: further condensation, tetrad forms, CROSSING OVER begins — genetic exchange between chromosomes.. Diplotene: chromosomes separate, chiasmata visible.. Diakinesis: homologs repel (except at chiasmata), max condensation, nuclear membrane breaks.."}, {"h": "Where Meiosis Occurs (Part 1)", "x": "Meiocytes: primary spermatocytes and oocytes.. Females: only 1 of 4 daughters survives as oocyte (other 3 = polar bodies, absorbed).."}, {"h": "Where Meiosis Occurs (Part 2)", "x": "Males: all 4 become sperm.. Plants: haploid daughters → spores → mitosis → gametophyte → gametes by mitosis → fusion → diploid zygote → sporophyte.."}, {"h": "Binary Fission (Part 1)", "x": "Bacteria use origins of replication (like centrosomes).. DNA replicates and moves to cell ends.."}, {"h": "Binary Fission (Part 2 var scr="home",selC=null,selT=null,tab="study",expS=null,shuf=[],pS={cq:0,sel:null,sh:false,sc:0,an:0},tS={a:{},sub:false,sc:0};

function sf(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp}return a}
function rq(){pS={cq:0,sel:null,sh:false,sc:0,an:0};tS={a:{},sub:false,sc:0};if(selT)shuf=sf(selT.q)}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function render(){
  var el=document.getElementById("ct"),nav=document.getElementById("nav");
  var mt=document.getElementById("mt"),ms=document.getElementById("ms");

  if(scr==="home"){
    mt.innerHTML="Anhelina's Study Hub";ms.textContent="Pick a class to start studying";nav.innerHTML="";
    var h="<div style='text-align:center'>";
    var keys=Object.keys(D);
    for(var ki=0;ki<keys.length;ki++){
      var k=keys[ki],v=D[k];
      h+="<div class='cc' onclick=\"selC='"+k+"';scr='topics';render();scrollTo({top:0,behavior:'smooth'})\">";
      h+="<div style='font-size:48px;margin-bottom:10px'>"+v.icon+"</div>";
      h+="<div style='font-size:20px;font-weight:800;color:var(--hi)'>"+v.name+"</div>";
      h+="<div style='font-size:13px;color:var(--txd);margin:4px 0'>"+v.sub+"</div>";
      h+="<div style='margin-top:12px;font-size:12px;padding:4px 14px;border-radius:99px;background:rgba(155,89,255,.1);color:var(--glow);display:inline-block'>"+v.topics.length+" Lessons</div>";
      h+="</div>";
    }
    h+="</div>";el.innerHTML=h;return;
  }

  if(scr==="topics"){
    var d=D[selC];mt.innerHTML=d.name;ms.textContent=d.sub+" \u2014 Pick a topic";
    nav.innerHTML="<button class='bbtn' onclick=\"scr='home';render()\">\u2190 Classes</button>";
    var h="";
    for(var i=0;i<d.topics.length;i++){
      var tp=d.topics[i];
      h+="<div class='tc' onclick=\"selT=D['"+selC+"'].topics["+i+"];scr='study';tab='study';expS=null;rq();render();scrollTo({top:0,behavior:'smooth'})\" style='animation:slideIn .3s ease "+(i*.04)+"s both'>";
      h+="<span class='ln'>"+tp.ln+"</span>";
      h+="<div style='flex:1'><div style='font-size:15px;font-weight:700'>"+tp.t+"</div>";
      h+="<div style='font-size:12px;color:var(--txd);margin-top:2px'>"+tp.s.length+" sections \u00B7 "+tp.q.length+" questions</div></div>";
      h+="<span style='color:var(--accent);font-size:18px'>\u2192</span></div>";
    }
    el.innerHTML=h;return;
  }

  // Study screen
  mt.innerHTML=selT.t;ms.textContent="";
  var nh="<div style='display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap'>";
  nh+="<button class='bbtn' onclick=\"scr='topics';render()\">\u2190 "+D[selC].name+"</button>";
  nh+="<button class='pill "+(tab==="study"?"pill-a":"pill-i")+"' onclick=\"tab='study';render()\">\uD83D\uDCD6 Study</button>";
  nh+="<button class='pill "+(tab==="practice"?"pill-a":"pill-i")+"' onclick=\"tab='practice';rq();render()\">\u270F\uFE0F Practice</button>";
  nh+="<button class='pill "+(tab==="test"?"pill-a":"pill-i")+"' onclick=\"tab='test';rq();render()\">\uD83D\uDCDD Test</button>";
  nh+="</div><div style='margin-top:8px'><span class='ln' style='font-size:12px'>"+selT.ln+"</span></div>";
  nav.innerHTML=nh;

  if(tab==="study"){
    var h="";
    for(var i=0;i<selT.s.length;i++){
      var sec=selT.s[i],e=(expS===i);
      h+="<div class='card "+(e?"exp":"")+"' onclick='expS=(expS==="+i+"?null:"+i+");render()' style='animation:slideIn .35s ease "+(i*.06)+"s both'>";
      h+="<div style='display:flex;align-items:center;justify-content:space-between'>";
      h+="<span style='font-size:16px;font-weight:700;"+(e?"color:var(--hi)":"")+"'>"+sec.h+"</span>";
      h+="<span class='arrow'>\u25BC</span></div>";
      if(e){h+="<div style='margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr)'><div class='st'>"+sec.x+"</div></div>";}
      h+="</div>";
    }
    el.innerHTML=h;return;
  }

  if(tab==="practice"){
    if(pS.cq>=shuf.length){
      var p=shuf.length?Math.round(pS.sc/shuf.length*100):0;
      var em=p>=80?"\uD83C\uDFC6":p>=60?"\uD83D\uDC4D":"\uD83D\uDCDA";
      var msg=p>=90?"Amazing, Anhelina! \uD83C\uDF1F":p>=70?"Great job!":"Keep reviewing!";
      el.innerHTML="<div style='background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:40px 28px;text-align:center;animation:fadeUp .5s ease'><div style='font-size:48px;margin-bottom:12px'>"+em+"</div><div style='font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--hi),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent'>"+pS.sc+"/"+shuf.length+"</div><p style='color:var(--txd);font-size:16px;margin:8px 0 24px'>"+msg+"</p><button class='abtn' onclick='rq();render()'>Try Again</button></div>";
      return;
    }
    var qq=shuf[pS.cq];
    var h="<div style='background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:32px 28px;animation:fadeUp .4s ease'>";
    h+="<div style='display:flex;justify-content:space-between;margin-bottom:20px'><span style='font-size:13px;color:var(--txd);font-weight:600'>Question "+(pS.cq+1)+"/"+shuf.length+"</span></div>";
    h+="<div class='pbar'><div class='pfill' style='width:"+(pS.cq/shuf.length*100)+"%'></div></div>";
    h+="<div style='font-size:18px;font-weight:700;margin-bottom:22px;line-height:1.45'>"+qq.q+"</div>";
    for(var i=0;i<qq.a.length;i++){
