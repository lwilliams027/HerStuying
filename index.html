rences in recurrence</b>. <b>Developmental psychopathology:</b> genetic predisposition + early life trauma + magnitude/timing of negative factors + resilience."}, {"heading": "Comparison Table", "body": "<b>Major depressive:</b> 8% prevalence, F:M 2:1, onset 18-29. <b>Persistent depressive:</b> 1.5-5%, F:M ~2:1, onset 10-25. <b>Bipolar I:</b> 1.6%, F:M 1:1, onset 15-44. <b>Bipolar II:</b> 1.0%, F:M 1:1, onset 15-44. <b>Cyclothymic:</b> 0.4%, F:M 1:1, onset 15-25. All show elevated rates in first-degree relatives."}, {"heading": "Mania Symptoms — 5 Domains", "body": "<b>Emotional:</b> active, powerful emotions seeking outlet. <b>Motivational:</b> need for constant excitement/companionship. <b>Behavioral:</b> very active, talk loudly/rapidly, flamboyant. <b>Cognitive:</b> poor judgment/planning, may lose touch with reality. <b>Physical:</b> high energy with little or no rest."}, {"heading": "Manic Episode Criteria", "body": "For <b>1+ week:</b> continually abnormal, inflated, or irritable mood AND heightened energy/activity most of every day. Plus <b>3+ symptoms:</b> grandiosity, reduced sleep need, racing thoughts, distractibility, increased activity/agitation, excessive risky behavior. Must cause significant distress/impairment."}, {"heading": "Bipolar I vs Bipolar II", "body": "<b>Bipolar I:</b> occurrence of a <b>manic episode</b>. Hypomanic or depressive episodes may precede/follow. <b>Bipolar II:</b> presence/history of <b>major depressive episode(s)</b> AND <b>hypomanic episode(s)</b>, but <b>NO full manic episode</b>. Hypomania is less severe than mania. Both: 1-2.6% prevalence, no gender difference."}, {"heading": "Cyclothymic Disorder", "body": "Numerous periods of <b>hypomanic symptoms</b> and <b>mild depressive symptoms</b> for <b>2+ years</b>, with normal moods in between. Less severe than Bipolar I or II. No gender differences. May evolve into Bipolar I or II. Prevalence: <b>0.4%</b>."}, {"heading": "Bipolar Course & Rapid Cycling", "body": "Without treatment, mood episodes tend to <b>recur</b>. <b>Rapid cycling:</b> 4+ episodes within one year. Depression is experienced more than mania and lasts longer. Intervening periods of normality <b>grow shorter</b> over time. Onset usually <b>ages 15-44</b>."}, {"heading": "Causes of Bipolar — Neurotransmitters", "body": "<b>Permissive theory:</b> low serotonin 'opens the door' to mood disorder; norepinephrine level determines which form. <b>Low serotonin + low norepinephrine = depression.</b> <b>Low serotonin + high norepinephrine = mania.</b> <b>Ion activity:</b> improper ion transport → neurons fire too easily (mania) or resist firing (depression)."}, {"heading": "Causes of Bipolar — Brain & Genetics", "body": "<b>Brain:</b> abnormalities in basal ganglia and cerebellum identified. Role unclear. <b>Genetics:</b> strong hereditary component. <b>MZ twins:</b> 40% concordance. <b>DZ twins/siblings:</b> 5-10%. <b>General population:</b> 1-2.6%. Multiple genetic abnormalities likely combine. Genetic linkage studies ongoing."}, {"heading": "Integrating All Models", "body": "<b>Unipolar depression factors:</b> biological abnormalities + reduced positive reinforcement + negative thinking + perceived helplessness + life stress + sociocultural influences. <b>Bipolar factors:</b> primarily biological abnormalities (inherited) + stress-triggered episodes. Both benefit from a developmental psychopathology perspective."}, {"heading": "Key Concepts Summary", "body": "<b>Unipolar:</b> depression only. <b>Bipolar:</b> depression + mania. <b>Major depressive:</b> 2+ weeks, 8%, F:M 2:1. <b>Persistent:</b> 2+ years. <b>NTs:</b> low serotonin + norepinephrine. <b>Beck's triad:</b> negative experiences/self/future. <b>Helplessness:</b> internal/global/stable attributions. <b>Mania:</b> 1+ week. <b>Bipolar I:</b> full mania. <b>II:</b> hypomania only. <b>Cyclothymic:</b> 2+ years mild. <b>Permissive theory:</b> low 5-HT + NE level determines disorder type."}], "quiz": [{"q": "Unipolar depression is depression WITHOUT history of:", "a": ["Anxiety", "Mania", "Trauma", "Insomnia"], "c": 1}, {"q": "Bipolar disorder involves:", "a": ["Only depression", "Only mania", "Alternating depression and mania", "Only anxiety"], "c": 2}, {"q": "___% of US adults have severe unipolar depression per year:", "a": ["2", "5", "8", "15"], "c": 2}, {"q": "___% of adults experience depression at some point:", "a": ["5", "10", "20", "50"], "c": 2}, {"q": "Average onset age of depression:", "a": ["10", "19", "35", "50"], "c": 1}, {"q": "Women are ___ as likely as men to have unipolar depression:", "a": ["Equally", "Twice", "Three times", "Half"], "c": 1}, {"q": "6-15% of severely depressed people die by:", "a": ["Heart disease", "Suicide", "Cancer", "Accident"], "c": 1}, {"q": "Major depressive episode requires symptoms for:", "a": ["1 day", "1 week", "2+ weeks", "6 months"], "c": 2}, {"q": "Persistent depressive disorder lasts:", "a": ["2 weeks", "6 months", "At least 2 years", "1 month"], "c": 2}, {"q": "'Double depression' is persistent leading to:", "a": ["Mania", "Major depressive disorder", "Anxiety", "Bipolar"], "c": 1}, {"q": "Low ___ and ___ are linked to depression:", "a": ["Dopamine/GABA", "Serotonin/norepinephrine", "Acetylcholine/glutamate", "Endorphins/melatonin"], "c": 1}, {"q": "Depression brain circuit includes all EXCEPT:", "a": ["Prefrontal cortex", "Hippocampus", "Cerebellum", "Subgenual cingulate"], "c": 2}, {"q": "'Dracula hormone' refers to:", "a": ["Cortisol", "Melatonin", "Serotonin", "Dopamine"], "c": 1}, {"q": "Seasonal affective disorder is linked to:", "a": ["Serotonin only", "Abnormal melatonin", "Only genetics", "Only stress"], "c": 1}, {"q": "Immune dysregulation during stress can contribute to:", "a": ["Better health", "Depression", "Mania only", "Nothing"], "c": 1}, {"q": "Freud's introjection means directing feelings onto:", "a": ["Others", "Oneself", "Objects", "Animals"], "c": 1}, {"q": "Symbolic loss is ___ loss:", "a": ["Physical", "Imagined", "Financial", "Always real"], "c": 1}, {"q": "Object relations theorists link depression to:", "a": ["Brain chemistry", "Insecure early relationships", "Genetics only", "Diet"], "c": 1}, {"q": "Beck's cognitive triad: negative views of:", "a": ["Past, present, future", "Experiences, self, future", "Family, work, health", "None"], "c": 1}, {"q": "Learned helplessness: depression from feeling loss of:", "a": ["Money", "Control over reinforcements", "Memory", "Friends"], "c": 1}, {"q": "Internal, global, stable attributions lead to:", "a": ["Happiness", "Depression", "Mania", "No effect"], "c": 1}, {"q": "External, specific, unstable attributions lead to:", "a": ["More depression", "Less depression/helplessness", "Mania", "Psychosis"], "c": 1}, {"q": "Divorced/separated people have ___× depression rate of married:", "a": ["1", "2", "3", "5"], "c": 2}, {"q": "Rumination theory explains gender differences because women:", "a": ["Seek help more", "Ruminate more when mood darkens", "Have more hormones", "Exercise less"], "c": 1}, {"q": "In non-Western countries, depression shows more:", "a": ["Cognitive symptoms", "Physical symptoms", "Mania", "No symptoms"], "c": 1}, {"q": "Bipolar I prevalence:", "a": ["0.4%", "1.6%", "8%", "20%"], "c": 1}, {"q": "Bipolar disorders show ___ gender difference:", "a": ["Large (2:1 women)", "No", "Large (2:1 men)", "Only in children"], "c": 1}, {"q": "Mania symptoms last at least:", "a": ["1 day", "1 week", "2 weeks", "1 month"], "c": 1}, {"q": "Manic symptoms include all EXCEPT:", "a": ["Grandiosity", "Reduced sleep need", "Racing thoughts", "Excessive sadness"], "c": 3}, {"q": "Bipolar I requires occurrence of a:", "a": ["Depressive episode only", "Manic episode", "Hypomanic episode only", "Cyclothymic episode"], "c": 1}, {"q": "Bipolar II has hypomania but NO:", "a": ["Depression", "Full manic episode", "Sleep problems", "Cognitive symptoms"], "c": 1}, {"q": "Hypomania is ___ severe than mania:", "a": ["More", "Less", "Equally", "Not at all"], "c": 1}, {"q": "Cyclothymic disorder lasts:", "a": ["2 weeks", "6 months", "2+ years", "1 month"], "c": 2}, {"q": "Rapid cycling = ___ or more episodes per year:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "In bipolar, ___ is experienced more than mania:", "a": ["Anxiety", "Depression", "Psychosis", "Nothing"], "c": 1}, {"q": "Permissive theory: low serotonin + low norepinephrine =:", "a": ["Mania", "Depression", "No disorder", "Anxiety"], "c": 1}, {"q": "Permissive theory: low serotonin + high norepinephrine =:", "a": ["Depression", "Mania", "No disorder", "Anxiety"], "c": 1}, {"q": "Improper ion transport: neurons fire too easily =:", "a": ["Depression", "Mania", "Neither", "Both"], "c": 1}, {"q": "MZ twin concordance for bipolar:", "a": ["5%", "10%", "40%", "100%"], "c": 2}, {"q": "DZ twin/sibling concordance for bipolar:", "a": ["1%", "5-10%", "40%", "80%"], "c": 1}, {"q": "Premenstrual dysphoric disorder is now classified as:", "a": ["Anxiety disorder", "Depressive disorder", "Bipolar disorder", "Personality disorder"], "c": 1}, {"q": "Behavioral view: depression from reduction in:", "a": ["Negative events", "Positive life rewards", "Medications", "Sleep"], "c": 1}, {"q": "Social deficits in depressed people cause others to:", "a": ["Approach them more", "Avoid them", "Ignore depression", "Feel happy"], "c": 1}, {"q": "Depression tied to unavailable:", "a": ["Medication", "Social support", "TV", "Internet"], "c": 1}, {"q": "Bipolar disorders onset usually between ages:", "a": ["5-10", "15-44", "50-70", "Over 75"], "c": 1}, {"q": "Without treatment, bipolar episodes tend to:", "a": ["Disappear", "Recur with shorter normal periods", "Stay the same", "Get milder"], "c": 1}, {"q": "Bipolar causes are primarily:", "a": ["Psychological", "Social", "Biological (inherited)", "Environmental only"], "c": 2}, {"q": "CRP production and inflammation are linked to:", "a": ["Mania only", "Depression via immune dysfunction", "Only physical illness", "Nothing psychological"], "c": 1}, {"q": "Artifact theory suggests male depression is:", "a": ["Nonexistent", "Often undetected by clinicians", "Always detected", "More common"], "c": 1}, {"q": "Cyclothymic disorder may evolve into:", "a": ["Schizophrenia", "Bipolar I or II", "PTSD", "OCD"], "c": 1}]}, {"id": "psy-ch9", "title": "Chapter 9: Suicide", "ln": "PSY 309 · Ch 9", "notes": [{"heading": "Suicide — Overview", "body": "One of the <b>leading causes of death</b> worldwide. ~1 million deaths/year globally, <b>>42,000 in the US</b>. NOT officially classified as a mental disorder in DSM-5, but <b>suicidal behavior disorder</b> has been proposed. Definition: self-inflicted death with <b>intentional, direct, and conscious</b> effort to end one's life."}, {"heading": "Shneidman's Intentional Death Types", "body": "<b>Death seeker:</b> clearly intends to end life. <b>Death initiator:</b> believes they're already dying and hastens the process. <b>Death ignorer:</b> doesn't believe death is the end (believes in afterlife). <b>Death darer:</b> ambivalent — takes risky actions leaving outcome to chance. Also: <b>subintentional death</b> — indirect, covert, partial, or unconscious self-destructive behavior."}, {"heading": "Studying Suicide", "body": "<b>Retrospective analysis (psychological autopsy):</b> piecing together information about a person after death. Also studied through <b>survivors of suicide attempts</b>. Self-injury/mutilation: at least <b>17% of teenagers</b> purposely injure themselves, especially skin cutting. Internet concerns: pro-suicide websites have <b>tripled</b>; live-streaming suicides occur."}, {"heading": "Patterns & Statistics", "body": "Rates vary by: <b>country, gender, marital status, race/ethnicity, social environment, religious devoutness</b>. In the US, <b>American Indians</b> have the highest rates for both males and females. Under-reporting likely exists. Males complete suicide more often; females attempt more often."}, {"heading": "Triggers: Stressful Events", "body": "<b>Immediate stressors:</b> loss of loved one (death, divorce, rejection), job loss, significant financial loss, natural disasters. <b>Long-term stressors:</b> social isolation, serious illness, abusive/repressive environment, occupational stress. More stressful events found in lives of attempters vs non-attempters."}, {"heading": "Triggers: Mood & Thought Changes", "body": "Many attempts preceded by mood shifts and thinking changes. Key factors: <b>Hopelessness</b> (strongest predictor), sadness, anxiety, tension, frustration, shame. <b>Psychache:</b> intense psychological pain (Shneidman's term). <b>Dichotomous thinking:</b> all-or-nothing, black-and-white thinking — seeing no middle ground."}, {"heading": "Triggers: Alcohol, Drugs & Mental Disorders", "body": "<b>70%</b> of attempters drink alcohol just before the act; 1/4 are legally intoxicated. Other drug use has similar ties, especially in teens. <b>Majority of attempters have a psychological disorder:</b> unipolar/bipolar depression (<b>70%</b>), chronic alcoholism (<b>20%</b>), schizophrenia (<b>10%</b>). Risk increases with <b>multiple disorders</b>."}, {"heading": "Common Predictors of Suicide", "body": "Key predictors: depressive disorder, substance abuse, <b>suicidal ideation/talk/preparation</b>, <b>prior suicide attempts</b>, availability of lethal weapons, social withdrawal/isolation, <b>hopelessness</b>, impulsivity, being an older white American male, family history/modeling/genetics, economic/work problems, marital/family problems, dramatic mood changes, anxiety, psychosis, physical illness, sleep problems."}, {"heading": "Modeling & Contagion", "body": "A suicidal act serves as a <b>model</b> for others, especially among <b>teens</b>. Models include: family members and friends, celebrities, highly publicized cases, coworkers/colleagues. This is called <b>suicide contagion</b> — clusters of suicides following a publicized case."}, {"heading": "Psychodynamic View", "body": "Suicide results from: <b>Depression and anger at others redirected toward self</b> (Stekel). <b>Introjection of lost person</b> (Freud/Abraham) — anger over a lost loved one turns to self-hatred → depression → suicide. Later suicidal behaviors related to <b>childhood losses</b>. Freud also proposed <b>death instincts (Thanatos)</b>."}, {"heading": "Durkheim's Sociocultural View", "body": "Suicide probability determined by <b>attachment to social groups</b> (family, religion, community). Four categories based on social regulation and integration: <b>Egoistic:</b> weak ties to society (e.g., divorce). <b>Altruistic:</b> extreme ties (e.g., seppuku, suttee). <b>Anomic:</b> weak regulation, unstable structures (e.g., Great Depression). <b>Fatalistic:</b> complete regulation (e.g., slavery)."}, {"heading": "Joiner's Interpersonal Theory", "body": "<b>Interpersonal-psychological theory:</b> two perceptions create desire for suicide: <b>1) Perceived burdensomeness</b> — belief that one is a burden on others. <b>2) Thwarted belongingness</b> — feeling disconnected from others. Plus: <b>acquired capability</b> — psychological ability to carry out suicide (developed through habituation to pain/fear). All three must be examined together."}, {"heading": "Biological View", "body": "<b>Genetics:</b> twin studies show genetic links. <b>Brain:</b> low <b>serotonin</b> activity and abnormalities in depression-related brain circuits contribute. Both produce <b>aggressive feelings and impulsive behavior</b>. Biology interacts with key psychosocial factors — neither alone is sufficient."}, {"heading": "Age: Children & Adolescents", "body": "<b>Children:</b> suicide infrequent but preceded by behavioral struggles. Many understand death clearly and wish to die. <b>Adolescents:</b> much more common after age 13. ~<b>8 per 100,000</b> US teens die by suicide yearly. <b>12%</b> have persistent suicidal thoughts. <b>4-8%</b> make attempts. Attempt-to-completion ratio may be <b>200:1</b>."}, {"heading": "Teen Suicide Factors", "body": "Links: developmental stress of adolescence, long/short-term stressors (<b>especially LGBTQ teens</b>), depression, low self-esteem, hopelessness, anger, impulsiveness, alcohol/drugs, internet and in-person modeling. Contributing societal factors: competition for jobs/college, weakening family ties, availability of substances, mass media influence."}, {"heading": "Teen Suicide by Ethnicity", "body": "US teen rates vary: young <b>white Americans</b> more suicide-prone than African Americans or Hispanic Americans. <b>American Indians</b> have the highest rates. Incidence rates are <b>closing among all groups</b> (differences shrinking over time)."}, {"heading": "Age: The Elderly", "body": "US elderly are <b>most likely to commit suicide</b> and <b>most successful</b> when they attempt. Contributing factors: <b>illness</b>, loss of close friends/relatives, loss of control over one's life, loss of social status. Right-to-die debate is relevant (euthanasia, physician-assisted suicide)."}, {"heading": "Treatment After Attempts", "body": "<b>Medical care</b> first, then appropriate follow-up with psychotherapy or drug therapy. Goals: <b>keep patient alive, reduce psychological pain</b>, achieve nonsuicidal state of mind and <b>hope</b>, develop better stress management. Therapies: psychodynamic, drug therapy, group/family, <b>CBT (Beck)</b>, mindfulness-based, <b>dialectical behavior therapy (DBT)</b>."}, {"heading": "Suicide Prevention", "body": "Prevention programs and <b>crisis hotlines</b> staffed by professionals or paraprofessionals. Goals for initial contact: <b>1)</b> Establish positive relationship. <b>2)</b> Understand/clarify the problem. <b>3)</b> Assess suicide potential. <b>4)</b> Assess/mobilize caller's resources. <b>5)</b> Formulate a plan. Longer-term: referral, therapy, <b>reducing access</b> to means (gun control, safer meds, bridge barriers)."}, {"heading": "Prevention Effectiveness", "body": "Assessment of programs is <b>difficult</b> — many variables, confounds, mixed results. Accurate suicide risk assessment remains <b>elusive</b>. Newer approaches: analyzing <b>nonverbal behaviors</b>, psychophysiological measures, brain scans, <b>Self-Injury Implicit Association Test</b> (Nock). Research continues to improve prediction."}, {"heading": "Self-Injury vs Suicide", "body": "<b>Self-injury/self-mutilation:</b> deliberate harming of one's body (cutting, burning) typically <b>WITHOUT intent to die</b>. Different from suicide attempts. At least 17% of teens engage in it. Often used to cope with emotional pain, feel something, or communicate distress. Requires its own treatment approach."}, {"heading": "Key Concepts Summary", "body": "<b>~42,000 US deaths/year.</b> Shneidman's 4 types: seeker/initiator/ignorer/darer. <b>Triggers:</b> stress, hopelessness, psychache, alcohol (70%), mental disorders (depression 70%). <b>Durkheim:</b> egoistic/altruistic/anomic/fatalistic. <b>Joiner:</b> burdensomeness + thwarted belonging + acquired capability. <b>Biology:</b> low serotonin, genetics. <b>Teens:</b> 200:1 attempt-to-completion. <b>Elderly:</b> highest success rate. <b>Prevention:</b> crisis hotlines, reduce access to means."}], "quiz": [{"q": "Approximately ___ people die by suicide in the US annually:", "a": ["5,000", "20,000", "42,000", "100,000"], "c": 2}, {"q": "Suicide is classified in DSM-5 as:", "a": ["A mental disorder", "Not officially a mental disorder", "An anxiety disorder", "A mood disorder"], "c": 1}, {"q": "Death seeker:", "a": ["Doesn't believe in death", "Clearly intends to end life", "Takes risky chances", "Is already dying"], "c": 1}, {"q": "Death ignorer:", "a": ["Intends to die", "Doesn't believe death is the end", "Hastens dying process", "Is ambivalent"], "c": 1}, {"q": "Death darer:", "a": ["Clearly wants to die", "Is ambivalent, leaves outcome to chance", "Ignores death", "Initiates dying"], "c": 1}, {"q": "Psychological autopsy is a:", "a": ["Brain scan", "Retrospective analysis after death", "Treatment method", "Prevention program"], "c": 1}, {"q": "___% of teenagers purposely injure themselves:", "a": ["5", "10", "17", "30"], "c": 2}, {"q": "Pro-suicide websites have ___ over recent years:", "a": ["Decreased", "Stayed same", "Tripled", "Disappeared"], "c": 2}, {"q": "In the US, ___ have the highest suicide rates:", "a": ["White Americans", "African Americans", "Hispanic Americans", "American Indians"], "c": 3}, {"q": "___% of suicide attempters drink alcohol before the act:", "a": ["20", "40", "70", "90"], "c": 2}, {"q": "Most common mental disorder in suicide attempters:", "a": ["Schizophrenia", "Depression (70%)", "PTSD", "OCD"], "c": 1}, {"q": "Chronic alcoholism accounts for ___% of suicides:", "a": ["5", "10", "20", "50"], "c": 2}, {"q": "Hopelessness is considered the ___ predictor:", "a": ["Weakest", "Moderate", "Strongest", "Least important"], "c": 2}, {"q": "Psychache refers to:", "a": ["Physical pain", "Intense psychological pain", "Headache", "Brain damage"], "c": 1}, {"q": "Dichotomous thinking means:", "a": ["Creative thinking", "All-or-nothing thinking", "Positive thinking", "No thinking"], "c": 1}, {"q": "Suicide contagion means:", "a": ["Suicide is a disease", "Suicidal acts model other suicidal acts", "Suicide is genetic only", "Nothing"], "c": 1}, {"q": "Modeling of suicide is especially common among:", "a": ["Elderly", "Teens", "Infants", "Middle-aged"], "c": 1}, {"q": "Freud's Thanatos refers to:", "a": ["Life instinct", "Death instinct", "Love", "Ego"], "c": 1}, {"q": "Stekel proposed suicide results from anger redirected at:", "a": ["Others", "Self", "Objects", "Society"], "c": 1}, {"q": "Durkheim's egoistic suicide: ___ ties to society:", "a": ["Strong", "Weak", "No", "Extreme"], "c": 1}, {"q": "Altruistic suicide: ___ ties to society's norms:", "a": ["Weak", "No", "Extreme", "Normal"], "c": 2}, {"q": "Anomic suicide: ___ social regulation:", "a": ["Strong", "Weak", "Complete", "Perfect"], "c": 1}, {"q": "Fatalistic suicide: ___ regulation:", "a": ["No", "Weak", "Moderate", "Complete"], "c": 3}, {"q": "Seppuku is an example of ___ suicide:", "a": ["Egoistic", "Altruistic", "Anomic", "Fatalistic"], "c": 1}, {"q": "Joiner's theory: perceived burdensomeness means:", "a": ["Feeling unconnected", "Belief you're a burden on others", "Having pain tolerance", "Being angry"], "c": 1}, {"q": "Thwarted belongingness means:", "a": ["Being a burden", "Feeling disconnected from others", "Having no pain", "Being happy"], "c": 1}, {"q": "Acquired capability means:", "a": ["Having money", "Psychological ability to carry out suicide", "Education", "Social skills"], "c": 1}, {"q": "Low ___ activity is linked to suicide biologically:", "a": ["Dopamine", "GABA", "Serotonin", "Acetylcholine"], "c": 2}, {"q": "Low serotonin produces ___ and ___:", "a": ["Calm and peace", "Aggression and impulsivity", "Happiness and energy", "Sleep and relaxation"], "c": 1}, {"q": "Suicide becomes much more common after age:", "a": ["5", "10", "13", "18"], "c": 2}, {"q": "Teen suicide attempt-to-completion ratio may be:", "a": ["5:1", "20:1", "50:1", "200:1"], "c": 3}, {"q": "___% of US teens have persistent suicidal thoughts:", "a": ["2", "5", "12", "25"], "c": 2}, {"q": "___% of US teens make suicide attempts:", "a": ["1", "4-8", "15", "25"], "c": 1}, {"q": "LGBTQ teens face ___ risk:", "a": ["Lower", "Equal", "Elevated", "No"], "c": 2}, {"q": "US elderly are most likely to ___ at suicide:", "a": ["Fail", "Succeed", "Not attempt", "Recover"], "c": 1}, {"q": "Elderly suicide factors include loss of:", "a": ["Only money", "Health, friends, control, status", "Only friends", "Only status"], "c": 1}, {"q": "First goal of treatment after attempt:", "a": ["Diagnose disorder", "Keep patient alive", "Family therapy", "Drug therapy"], "c": 1}, {"q": "DBT stands for:", "a": ["Direct Behavioral Training", "Dialectical Behavior Therapy", "Diagnostic Baseline Testing", "None"], "c": 1}, {"q": "Crisis hotline goals include all EXCEPT:", "a": ["Establish relationship", "Assess potential", "Formulate plan", "Prescribe medication"], "c": 3}, {"q": "Reducing access to means includes:", "a": ["Gun control, safer meds, bridge barriers", "Only therapy", "Only medication", "Nothing works"], "c": 0}, {"q": "Self-Injury IAT was developed by:", "a": ["Freud", "Beck", "Nock", "Durkheim"], "c": 2}, {"q": "Accurate suicide risk assessment is currently:", "a": ["Perfect", "Elusive (difficult)", "Not needed", "100% reliable"], "c": 1}, {"q": "Self-injury is typically done ___ intent to die:", "a": ["With", "Without", "Always with", "Only with"], "c": 1}, {"q": "Prior suicide attempts are a ___ predictor:", "a": ["Weak", "Moderate", "Strong/key", "Irrelevant"], "c": 2}, {"q": "Schizophrenia accounts for ___% of suicides:", "a": ["5", "10", "20", "70"], "c": 1}, {"q": "Risk increases with ___ disorders:", "a": ["No", "Single", "Multiple", "Only depression"], "c": 2}, {"q": "Suicide prevention staffed by:", "a": ["Only psychiatrists", "Professionals or paraprofessionals", "Only volunteers", "Only nurses"], "c": 1}, {"q": "Treatment aims to develop better:", "a": ["Physical strength", "Stress management", "Appetite", "Sleep only"], "c": 1}, {"q": "Suicidal behavior disorder is proposed for:", "a": ["Current DSM-5", "Next DSM revision", "ICD-10", "Removal"], "c": 1}, {"q": "Subintentional death is:", "a": ["Clearly intentional", "Indirect or unconscious self-destruction", "Accidental only", "Not real"], "c": 1}]}, {"id": "psy-ch8", "title": "Chapter 8: Treatment for Depressive & Bipolar Disorders", "ln": "PSY 309 · Ch 8", "notes": [{"heading": "Treatment Overview", "body": "~Half of people with unipolar depression receive treatment each year. Access <b>differs among ethnic/racial groups</b>. Much of therapy today is for unipolar depression — it's one of the <b>most treatable</b> kinds of psychological disorders. Over 80% of Americans believe depression is a serious condition requiring treatment; 19% still consider it a personal weakness."}, {"heading": "Psychodynamic Therapy for Depression", "body": "Depression results from <b>unconscious grief</b> over real/imagined losses + excessive dependence on others. Techniques: <b>free association</b>, therapist interpretation, review of past events/feelings. Goal: gain awareness of losses, become less dependent, cope more effectively. <b>Strengths:</b> successful case reports, best with moderate depression + abuse history. <b>Limitations:</b> clients often too passive/weary; may quit early. Less effective than other approaches."}, {"heading": "CBT: Behavioral Activation", "body": "Therapist systematically <b>increases constructive and pleasurable activities</b> in the client's life. Steps: reintroduce pleasurable events, appropriately reward nondepressive behaviors, <b>improve social skills</b> (Lewinsohn). Most effective when <b>combined with cognitive techniques</b>. Behavioral techniques alone are of limited help; combining 2+ techniques reduces symptoms."}, {"heading": "Beck's Cognitive Therapy — 4 Phases", "body": "Guides clients through four phases: <b>1)</b> Increasing activities and elevating mood. <b>2)</b> Challenging <b>automatic thoughts</b>. <b>3)</b> Identifying negative thinking and biases. <b>4)</b> Changing primary (core) attitudes. Targets the <b>cognitive triad:</b> negative views of oneself, the world, and the future. Similar to Ellis's rational-emotive therapy."}, {"heading": "CBT Effectiveness", "body": "<b>50-60% show significant improvement</b> or elimination of symptoms. Depressed adults improve much more than those receiving placebos or no treatment. Average: ~20 sessions. New-wave CBT (mindfulness training) helps clients see negative cognitions as <b>'streams of thinking'</b> rather than facts — particularly useful for <b>preventing recurrence</b>."}, {"heading": "Culture-Sensitive Therapies", "body": "Address unique issues of cultural minority groups. Clinicians receive <b>special training on cultural values and stressors</b>. Often <b>combined with traditional psychotherapy</b> to maximize effectiveness for minority clients. Recognizes that culture shapes how depression is experienced and expressed."}, {"heading": "Interpersonal Psychotherapy (IPT)", "body": "Developed by <b>Klerman and Weissman</b>. Focuses on interpersonal problems that lead to depression. Four problem areas: <b>1) Interpersonal loss.</b> <b>2) Interpersonal role dispute.</b> <b>3) Interpersonal role transition.</b> <b>4) Interpersonal deficits.</b> Studies show IPT is <b>as effective as cognitive therapy</b>. ~20 sessions, 50-60% improve."}, {"heading": "Couple Therapy", "body": "<b>Integrative behavioral couples therapy:</b> combines CBT and sociocultural techniques to teach communication and problem-solving. More effective than other techniques when one partner is depressed. If marriage is filled with conflict, as effective as other therapies for reducing depression. Can also <b>enhance marriage satisfaction</b>."}, {"heading": "Antidepressant Drugs — Three Classes", "body": "Discovered in the 1950s. Three major classes: <b>1) MAO inhibitors</b> (Nardil, Parnate). <b>2) Tricyclics</b> (Elavil, Tofranil). <b>3) Second-generation</b> (Prozac, Zoloft, Lexapro, Wellbutrin, Cymbalta). All help ~50-60% of patients. Treatment duration: often <b>indefinite</b> to prevent relapse."}, {"heading": "MAO Inhibitors", "body": "Work by <b>slowing the body's production of MAO</b> (monoamine oxidase). MAO normally breaks down norepinephrine → inhibiting MAO = more norepinephrine activity → reduced depression. <b>Danger:</b> dangerous blood pressure rise when combined with foods containing <b>tyramine</b> (cheeses, bananas, certain wines). ~50% of patients helped."}, {"heading": "Tricyclics", "body": "Block an overly vigorous <b>reuptake process</b> → serotonin and norepinephrine remain in synapses longer → increased NT activity. Named for their <b>three-ring molecular structure</b>. Side effects exist. <b>Relapse risk</b> if stopped too quickly: patients should continue for 5+ months after recovery (continuation therapy) or 3+ years (maintenance therapy)."}, {"heading": "Reuptake Mechanism Explained", "body": "Normally after release, a <b>pumplike reuptake mechanism</b> reabsorbs excess neurotransmitters from the synapse. In depression, this reuptake is <b>too active</b> — removing too many NTs before they can bind to receiving neurons. Tricyclics and most second-gen antidepressants <b>block this reuptake</b>, keeping NTs available longer."}, {"heading": "Second-Generation Antidepressants (SSRIs)", "body": "<b>SSRIs</b> (Selective Serotonin Reuptake Inhibitors): increase serotonin specifically without affecting other NTs. Examples: fluoxetine (<b>Prozac</b>), sertraline (<b>Zoloft</b>), escitalopram (<b>Lexapro</b>). Also: SNRIs, selective NE reuptake inhibitors. Preferred because: <b>harder to overdose, no dietary restrictions, fewer side effects</b>. May reduce sex drive. Failure rate may be 40%+."}, {"heading": "Antidepressant Effectiveness Debate", "body": "<b>Publication bias:</b> studies with positive results published more often than negative ones. When BOTH published and unpublished studies are analyzed, effectiveness drops to <b>30-35%</b> (Kirsch; Turner et al.). Similar trends found for psychotherapy. This doesn't mean drugs don't work — but real-world effectiveness may be lower than reported."}, {"heading": "Electroconvulsive Therapy (ECT)", "body": "One of the most <b>controversial</b> treatments. Targeted electrical stimulation causes a brain seizure. <b>6-12 sessions</b> over 2-4 weeks; bilateral or unilateral. Discovery was accidental (based on a false link between psychosis and epilepsy). Modified over time to reduce negative effects. Patients report some <b>memory loss</b>. Effective in <b>60-80%</b> of patients — more effective than drugs."}, {"heading": "Vagus Nerve Stimulation (VNS)", "body": "Vagus nerve = primary communication link between brain and major organs. An <b>implanted pulse generator</b> sends regular electrical signals to the vagus nerve → stimulates the brain. Achieves positive effects of ECT <b>without the negative side effects</b>. Significant relief for <b>~40%</b> of treatment-resistant depression cases. Mechanism not fully understood."}, {"heading": "Transcranial Magnetic Stimulation (TMS)", "body": "<b>Electromagnetic coil</b> placed on/above patient's head sends current into the brain. <b>Increases neuron activity</b> in prefrontal cortex and improves function in the depression-related brain circuit. Administered <b>daily for 4-6 weeks</b> (~25 sessions). Non-invasive. Reduces depression effectively."}, {"heading": "Deep Brain Stimulation (DBS)", "body": "<b>Experimental:</b> electrodes implanted in the <b>subgenual cingulate</b> (key depression circuit component) and attached to a battery. Repeated stimulation reduces abnormal activity to normal levels and <b>recalibrates the brain circuit</b>. Successful with small number of severely depressed clients. Developed by Mayberg et al."}, {"heading": "Comparing Depression Treatments", "body": "CBT, IPT, and biological therapies are all effective (50-60% improve). <b>CBT and IPT have lower relapse rates</b> but aren't relapse-proof. Psychodynamic therapy less effective than others. <b>Combination of psychotherapy + drugs is most helpful</b>, especially for severe depression. Among biological treatments, <b>ECT is most effective</b> but drugs are prescribed first."}, {"heading": "Treatment Comparison Table", "body": "<b>CBT:</b> 20 sessions, 50-60% improve. <b>IPT:</b> 20 sessions, 50-60%. <b>Antidepressants:</b> indefinite, 50-60%. <b>ECT:</b> 9 sessions, 50-60%. <b>VNS:</b> 1 session + follow-up, 50-60%. <b>TMS:</b> 25 sessions, 50-60%. <b>Bipolar (mood stabilizers + antipsychotics + antidepressants):</b> indefinite, 60%."}, {"heading": "Lithium for Bipolar", "body": "FDA approved in <b>1970</b>. A metallic element occurring as a mineral salt. Very effective for bipolar/mania. <b>Dosage is delicate:</b> too low = no effect; too high = <b>lithium intoxication (poisoning)</b>. Only 49% of people with bipolar receive treatment in a given year. Some respond better to other mood stabilizers or combinations."}, {"heading": "Mood Stabilizer Effectiveness", "body": "<b>>60% of manic patients improve</b> on mood stabilizers. Most experience <b>fewer new episodes</b> while on drugs. Also help prevent episodes from developing. Help with depressive episodes too, but <b>less powerfully</b> — often combined with antidepressants (though antidepressants may trigger manic episodes in some patients)."}, {"heading": "How Mood Stabilizers Work", "body": "Mechanism not fully understood. Theories: <b>1)</b> Change synaptic activity differently than antidepressants (affect <b>second messengers</b> inside neurons, not initial NT reception). <b>2)</b> Increase production of <b>neuroprotective proteins</b>. <b>3)</b> Directly change <b>sodium/potassium ion activity</b> in neurons."}, {"heading": "Adjunctive Psychotherapy for Bipolar", "body": "Medication alone or psychotherapy alone is <b>rarely sufficient</b> for bipolar. Individual, group, or family therapy used <b>alongside medication</b>. Benefits: improves medication adherence, reduces hospitalization, improves social function, increases ability to hold a job. 30%+ of patients may not respond to lithium alone."}, {"heading": "Key Concepts Summary", "body": "<b>Psychodynamic:</b> unconscious grief, less effective. <b>CBT:</b> behavioral activation + Beck's 4 phases, 50-60%, mindfulness prevents recurrence. <b>IPT:</b> 4 interpersonal problem areas, equally effective as CBT. <b>Drugs:</b> MAO inhibitors (tyramine danger), tricyclics (reuptake blockers), SSRIs (Prozac/Zoloft, preferred). <b>Brain stim:</b> ECT (60-80%, memory loss), VNS (implanted), TMS (magnetic), DBS (experimental). <b>Bipolar:</b> lithium (1970, dosing delicate), mood stabilizers >60%, adjunctive psychotherapy essential."}], "quiz": [{"q": "~___% of depressed people receive treatment each year:", "a": ["10", "25", "50", "80"], "c": 2}, {"q": "___% of Americans believe depression requires treatment:", "a": ["50", "65", "80+", "95"], "c": 2}, {"q": "Psychodynamic therapy sees depression as unconscious:", "a": ["Anger", "Grief over losses", "Brain damage", "Genetics"], "c": 1}, {"q": "Behavioral activation increases:", "a": ["Medications", "Pleasurable activities and events", "Sleep only", "Nothing"], "c": 1}, {"q": "Beck's cognitive therapy has ___ phases:", "a": ["2", "3", "4", "6"], "c": 2}, {"q": "Beck's cognitive triad: negative views of:", "a": ["Self, world, future", "Past, present, future", "Family, work, health", "None"], "c": 0}, {"q": "CBT for depression: ___% show significant improvement:", "a": ["20-30", "30-40", "50-60", "80-90"], "c": 2}, {"q": "Average CBT treatment duration:", "a": ["5 sessions", "10 sessions", "20 sessions", "50 sessions"], "c": 2}, {"q": "New-wave CBT uses ___ training:", "a": ["Physical", "Mindfulness", "Surgical", "Medication"], "c": 1}, {"q": "Mindfulness CBT is especially useful for preventing:", "a": ["First episodes", "Recurrence of depression", "Mania", "Anxiety only"], "c": 1}, {"q": "IPT was developed by:", "a": ["Beck", "Freud", "Klerman and Weissman", "Seligman"], "c": 2}, {"q": "IPT focuses on ___ problems:", "a": ["Biological", "Interpersonal", "Genetic", "Cognitive only"], "c": 1}, {"q": "IPT effectiveness compared to cognitive therapy:", "a": ["Much less effective", "About equal", "Much more effective", "Not comparable"], "c": 1}, {"q": "Four IPT problem areas include all EXCEPT:", "a": ["Interpersonal loss", "Role dispute", "Role transition", "Genetic predisposition"], "c": 3}, {"q": "Couple therapy is most effective when one partner is:", "a": ["Manic", "Depressed", "Anxious", "Psychotic"], "c": 1}, {"q": "Three classes of antidepressants:", "a": ["MAO inhibitors, tricyclics, second-generation", "Only SSRIs", "Only MAO inhibitors", "Only tricyclics"], "c": 0}, {"q": "MAO inhibitors work by slowing production of:", "a": ["Serotonin", "MAO (monoamine oxidase)", "Dopamine", "GABA"], "c": 1}, {"q": "MAO inhibitors are dangerous with foods containing:", "a": ["Glucose", "Tyramine", "Sodium", "Potassium"], "c": 1}, {"q": "Foods to avoid with MAO inhibitors:", "a": ["Bread and rice", "Cheeses, bananas, certain wines", "Only water", "Vegetables"], "c": 1}, {"q": "Tricyclics are named for their:", "a": ["Three uses", "Three-ring molecular structure", "Three side effects", "Three doses"], "c": 1}, {"q": "Tricyclics block the ___ process:", "a": ["Production", "Reuptake", "Destruction", "Creation"], "c": 1}, {"q": "Reuptake in depression is too:", "a": ["Slow", "Active (removes too many NTs)", "Inactive", "Normal"], "c": 1}, {"q": "Stopping tricyclics too quickly leads to:", "a": ["Improvement", "Relapse", "No change", "Mania"], "c": 1}, {"q": "Continuation therapy lasts ___ months after recovery:", "a": ["1", "3", "5+", "12"], "c": 2}, {"q": "SSRIs specifically increase:", "a": ["Norepinephrine", "Dopamine", "Serotonin", "All NTs"], "c": 2}, {"q": "Prozac is the trade name for:", "a": ["Sertraline", "Fluoxetine", "Paroxetine", "Citalopram"], "c": 1}, {"q": "Zoloft is the trade name for:", "a": ["Fluoxetine", "Sertraline", "Escitalopram", "Bupropion"], "c": 1}, {"q": "SSRIs are preferred because they are:", "a": ["More effective", "Harder to overdose, fewer side effects, no dietary restrictions", "Cheaper", "Faster"], "c": 1}, {"q": "Common SSRI side effect:", "a": ["Weight gain only", "Reduced sex drive", "Tyramine reactions", "Seizures"], "c": 1}, {"q": "When unpublished studies are included, antidepressant effectiveness drops to:", "a": ["10-15%", "30-35%", "50-60%", "70-80%"], "c": 1}, {"q": "Publication bias means ___ results are published more:", "a": ["Negative", "Positive", "Neutral", "All equally"], "c": 1}, {"q": "ECT involves causing a brain:", "a": ["Scan", "Seizure", "Hemorrhage", "Tumor"], "c": 1}, {"q": "ECT: ___ sessions over 2-4 weeks:", "a": ["1-2", "6-12", "20-30", "50+"], "c": 1}, {"q": "ECT is effective in ___% of patients:", "a": ["20-30", "40-50", "60-80", "95-100"], "c": 2}, {"q": "ECT's main side effect:", "a": ["Nausea", "Memory loss", "Weight gain", "Insomnia"], "c": 1}, {"q": "VNS uses an implanted:", "a": ["Electrode in brain", "Pulse generator sending signals to vagus nerve", "Magnetic coil", "Drug pump"], "c": 1}, {"q": "VNS helps ___% of treatment-resistant depression:", "a": ["10", "25", "40", "80"], "c": 2}, {"q": "TMS uses:", "a": ["Electrical shock", "Electromagnetic coil on head", "Surgery", "Medication"], "c": 1}, {"q": "TMS is administered daily for:", "a": ["1 week", "4-6 weeks", "6 months", "1 year"], "c": 1}, {"q": "Deep brain stimulation targets the:", "a": ["Hippocampus", "Subgenual cingulate", "Cerebellum", "Amygdala only"], "c": 1}, {"q": "DBS is currently:", "a": ["Standard treatment", "Experimental", "Discontinued", "Only for anxiety"], "c": 1}, {"q": "Most helpful treatment for severe depression:", "a": ["Psychotherapy alone", "Drugs alone", "Combination of psychotherapy + drugs", "No treatment"], "c": 2}, {"q": "Among biological treatments, ___ is most effective:", "a": ["Antidepressants", "ECT", "TMS", "VNS"], "c": 1}, {"q": "Lithium was FDA approved in:", "a": ["1954", "1963", "1970", "1989"], "c": 2}, {"q": "Too much lithium causes:", "a": ["Depression", "Lithium intoxication (poisoning)", "Mania", "Nothing"], "c": 1}, {"q": "___% of manic patients improve on mood stabilizers:", "a": ["20", "40", "60+", "90"], "c": 2}, {"q": "Mood stabilizers may affect ___ inside neurons:", "a": ["DNA", "Second messengers", "Only serotonin", "Only dopamine"], "c": 1}, {"q": "Mood stabilizers may change ___ ion activity:", "a": ["Calcium", "Sodium and potassium", "Iron", "Magnesium"], "c": 1}, {"q": "For bipolar, psychotherapy alone is:", "a": ["Very effective", "Rarely sufficient", "The best option", "Always enough"], "c": 1}, {"q": "Adjunctive therapy improves medication:", "a": ["Cost", "Adherence", "Color", "Taste"], "c": 1}]}, {"id": "psy-ch14", "title": "Chapter 14: Schizophrenia & Related Disorders", "ln": "PSY 309 · Ch 14", "notes": [{"heading": "Psychosis & Schizophrenia — Overview", "body": "<b>Psychosis:</b> state where a person loses contact with reality. May include hallucinations (false sensory perceptions) and delusions (false beliefs). Most commonly appears as <b>schizophrenia</b> — a psychotic disorder where personal, social, and occupational functioning deteriorate due to unusual perceptions, odd thoughts, disturbed emotions, and motor abnormalities."}, {"heading": "Schizophrenia Statistics", "body": "<b>1 in 100</b> people experience schizophrenia during their lifetime. 21 million worldwide; <b>3.6 million in the US</b>. <b>Equally distributed</b> between men and women. Average onset: <b>23 for men, 28 for women</b>. 25% attempt suicide; 5% die by suicide. More frequent in <b>lower-SES groups</b>. <b>Downward drift theory:</b> the disorder causes people to fall to lower social levels."}, {"heading": "DSM-5 Diagnostic Criteria", "body": "For <b>1 month</b>, must display <b>2+ of:</b> delusions, hallucinations, disorganized speech, very abnormal motor activity (catatonia), negative symptoms. <b>At least one</b> must be delusions, hallucinations, or disorganized speech. Functioning much worse than before. Impaired functioning continues for <b>at least 5 additional months</b> (6 months total)."}, {"heading": "Positive Symptoms — Delusions", "body": "<b>Positive symptoms:</b> bizarre <b>additions</b> to normal behavior. <b>Delusions</b> (false beliefs): <b>Persecution</b> (others are plotting against me). <b>Reference</b> (events have special personal meaning). <b>Grandeur</b> (I have special powers/importance). <b>Control</b> (outside forces control my thoughts/actions). Can be single or multiple."}, {"heading": "Positive Symptoms — Disorganized Thinking & Speech", "body": "<b>Loose associations (derailment):</b> jumping between unrelated topics. <b>Neologisms:</b> made-up words ('amorition'). <b>Perseveration:</b> repeating words/statements. <b>Clang:</b> speech guided by rhyming ('Well, hell, it's well to tell'). <b>Inappropriate affect:</b> emotional responses that don't match the situation."}, {"heading": "Positive Symptoms — Hallucinations", "body": "<b>Hallucinations:</b> perceptions in the <b>absence of external stimuli</b>. Types: <b>auditory</b> (most common — hearing voices), <b>tactile</b> (feeling things), <b>visual</b> (seeing things), <b>gustatory</b> (tasting things). May occur together. Problems with perception and attention are heightened."}, {"heading": "Negative Symptoms", "body": "<b>Negative symptoms:</b> pathological <b>deficits</b> (things missing from normal behavior). <b>Poverty of speech (alogia):</b> reduced quantity or content of speech. <b>Restricted/blunted/flat affect:</b> less emotion, immobile face, no eye contact. <b>Loss of volition:</b> feeling drained, inability to start or follow through. <b>Ambivalence:</b> conflicted feelings about most things."}, {"heading": "Psychomotor Symptoms & Catatonia", "body": "Awkward movements, repeated grimaces, odd gestures that seem to have a <b>magical quality</b>. Extreme forms = <b>catatonia:</b> includes <b>stupor</b> (unresponsive), <b>rigidity</b> (maintaining a position), <b>posturing</b> (assuming bizarre positions), <b>excitement</b> (frenzied motor activity). Experienced by ~<b>10%</b> of people with schizophrenia."}, {"heading": "Course of Schizophrenia — 3 Phases", "body": "Usually first appears between <b>late teens and mid-30s</b>. Three phases: <b>1) Prodromal:</b> beginning of deterioration, mild symptoms. <b>2) Active:</b> full symptoms become apparent. <b>3) Residual:</b> return to prodromal-like levels. Each phase may last days or years. <b>1/4 fully recover; 3/4 have residual problems</b>."}, {"heading": "Better Recovery Predictors", "body": "Fuller recovery more likely in people with: <b>1)</b> Good <b>premorbid functioning</b> (good functioning before illness). <b>2)</b> Disorder triggered by <b>stress</b>. <b>3)</b> <b>Abrupt onset</b>. <b>4)</b> Later onset (middle age). <b>5)</b> <b>Early treatment</b>. Gradual onset and poor premorbid functioning predict worse outcomes."}, {"heading": "Type I vs Type II Schizophrenia", "body": "<b>Type I:</b> dominated by <b>positive symptoms</b>. Better premorbid adjustment, later onset, greater likelihood of improvement. May be linked to <b>biochemical abnormalities</b>. <b>Type II:</b> dominated by <b>negative symptoms</b>. May be tied to <b>structural brain abnormalities</b>. Worse prognosis overall."}, {"heading": "Schizophrenia Spectrum Disorders", "body": "<b>Brief psychotic disorder:</b> <1 month. <b>Schizophreniform:</b> 1-6 months (0.2%). <b>Schizoaffective:</b> schizophrenia + major depressive or manic episode, 6+ months. <b>Delusional disorder:</b> persistent non-bizarre delusions, 1+ month (0.1%). <b>Psychotic disorder due to medical condition.</b> <b>Substance-induced psychotic disorder.</b>"}, {"heading": "Biological: Genetics", "body": "<b>Diathesis-stress model:</b> inherited biological predisposition triggered by extreme stress. Family risk: general population <b>1%</b>, second-degree relatives <b>3%</b>, first-degree relatives <b>10%</b>. <b>Identical (MZ) twins: 48%</b> concordance. Fraternal (DZ) twins: <b>17%</b>. Adoption studies confirm: biological relatives of adoptees with schizophrenia more likely to develop it."}, {"heading": "Biological: Dopamine Hypothesis", "body": "Certain neurons using <b>dopamine fire too often</b> → schizophrenia symptoms. Messages to <b>D-2 receptors</b> transmitted too easily/often. Based on: antipsychotic drugs are <b>dopamine antagonists</b> (block D-2 receptors). Problem: <b>atypical antipsychotics</b> also bind D-1 and serotonin receptors. Dopamine overactivity may primarily explain <b>positive symptoms</b>; negative symptoms may relate to brain structure."}, {"heading": "Biological: Brain Circuits", "body": "Dysfunctional brain circuit includes: <b>prefrontal cortex, hippocampus, amygdala, thalamus, striatum, substantia nigra</b>. Two subcircuits: <b>1)</b> Substantia nigra + striatum → <b>positive symptoms</b>. <b>2)</b> Hippocampus + amygdala → <b>negative symptoms</b>. Abnormal NT activity is now seen as <b>part of broader circuit dysfunction</b>, not just dopamine alone."}, {"heading": "Biological: Viral Theory", "body": "Exposure to <b>viruses before birth</b> may trigger an immune response that <b>interrupts fetal brain development</b>. Evidence: animal model investigations, links to <b>late winter births</b> (mother exposed to influenza during pregnancy). This prenatal viral exposure may create biological vulnerability to schizophrenia later in life."}, {"heading": "Psychological Views", "body": "<b>Psychodynamic:</b> Fromm-Reichmann proposed <b>'schizophrenogenic mothers'</b> (cold, domineering) — has <b>little research support</b>. Self theorists: biological deficiencies → fragmented self. <b>CBT:</b> operant conditioning (circumstantial support), misinterpreting unusual sensations (no direct research support). Psychological views are considered partial explanations at best."}, {"heading": "Sociocultural Views", "body": "<b>Multicultural:</b> African Americans more likely to receive diagnosis — debate over whether more prone, biased diagnoses, misread cultural differences, or economic hardship effects. <b>Social labeling:</b> diagnosis becomes self-fulfilling prophecy (Rosenhan 'pseudo-patient' study). <b>Family dysfunction:</b> family stress, <b>high expressed emotion</b> (criticism, hostility, intrusion) → patients 4× more likely to relapse."}, {"heading": "Country Differences", "body": "WHO study: in <b>developing countries</b>, patients recover more quickly, more often, and more completely than in developed countries. Prevalence is relatively stable worldwide (~1%), but <b>course and outcomes vary</b>. Possible factors: genetic differences among populations, psychosocial environments, family support structures."}, {"heading": "Developmental Psychopathology View", "body": "Integrative framework: <b>genetic predisposition</b> → implemented by <b>dysfunctional brain circuit</b> → may lead to schizophrenia IF the person experiences significant <b>life stressors, difficult family interactions, and/or negative environmental factors</b> over development. Multiple factors must converge — no single cause is sufficient."}, {"heading": "Key Concepts Summary", "body": "<b>Psychosis:</b> loss of reality contact. <b>Schizophrenia:</b> 1%, onset 23(M)/28(F), 6+ months. <b>Positive:</b> delusions, hallucinations, disorganized speech. <b>Negative:</b> alogia, flat affect, avolition. <b>Catatonia:</b> 10%. <b>3 phases:</b> prodromal→active→residual. <b>Type I:</b> positive (biochemical). <b>Type II:</b> negative (structural). <b>Genetics:</b> MZ 48%. <b>Dopamine hypothesis:</b> D-2 overactivity. <b>Brain circuit:</b> 2 subcircuits. <b>High expressed emotion:</b> 4× relapse."}], "quiz": [{"q": "Psychosis is a loss of contact with:", "a": ["Friends", "Reality", "Memory", "Sleep"], "c": 1}, {"q": "Hallucinations are false ___ perceptions:", "a": ["Belief", "Sensory", "Memory", "Social"], "c": 1}, {"q": "Delusions are false:", "a": ["Perceptions", "Memories", "Beliefs", "Behaviors"], "c": 2}, {"q": "Schizophrenia affects ___ in 100 people:", "a": ["1", "5", "10", "25"], "c": 0}, {"q": "Average onset for men:", "a": ["15", "23", "28", "35"], "c": 1}, {"q": "Average onset for women:", "a": ["15", "23", "28", "35"], "c": 2}, {"q": "Schizophrenia gender distribution:", "a": ["More men", "More women", "Equal", "Unknown"], "c": 2}, {"q": "___% of schizophrenia patients attempt suicide:", "a": ["5", "10", "25", "50"], "c": 2}, {"q": "Downward drift theory: the disorder causes people to:", "a": ["Improve", "Fall to lower social levels", "Rise in status", "Stay the same"], "c": 1}, {"q": "DSM-5 requires symptoms for at least ___ months total:", "a": ["1", "3", "6", "12"], "c": 2}, {"q": "Active symptoms must be present for at least:", "a": ["1 day", "1 week", "1 month", "6 months"], "c": 2}, {"q": "Delusions of persecution: belief that others are:", "a": ["Helping you", "Plotting against you", "Ignoring you", "Praising you"], "c": 1}, {"q": "Delusions of grandeur: belief in:", "a": ["Persecution", "Special powers or importance", "Being controlled", "Reference"], "c": 1}, {"q": "Neologisms are:", "a": ["Real words", "Made-up words", "Repeated words", "Rhyming words"], "c": 1}, {"q": "Loose associations (derailment) means:", "a": ["Tight logical thinking", "Jumping between unrelated topics", "Repeating words", "Making up words"], "c": 1}, {"q": "Clang speech is guided by:", "a": ["Logic", "Meaning", "Rhyming", "Grammar"], "c": 2}, {"q": "Most common type of hallucination:", "a": ["Visual", "Tactile", "Auditory (hearing voices)", "Gustatory"], "c": 2}, {"q": "Positive symptoms are ___ to behavior:", "a": ["Deficits from", "Bizarre additions to", "Normal parts of", "Unrelated"], "c": 1}, {"q": "Negative symptoms are ___ in behavior:", "a": ["Additions", "Deficits", "Improvements", "Changes"], "c": 1}, {"q": "Alogia means:", "a": ["Excessive speech", "Poverty of speech", "Made-up words", "Rhyming"], "c": 1}, {"q": "Flat affect means:", "a": ["Excessive emotion", "No emotional expression", "Inappropriate emotion", "Normal emotion"], "c": 1}, {"q": "Loss of volition means:", "a": ["Loss of memory", "Feeling drained, can't start/follow through", "Loss of speech", "Loss of movement"], "c": 1}, {"q": "Catatonia is experienced by ___% of schizophrenia patients:", "a": ["1", "5", "10", "25"], "c": 2}, {"q": "Catatonic stupor means:", "a": ["Frenzied activity", "Unresponsive", "Bizarre posturing", "Rigidity only"], "c": 1}, {"q": "Three phases of schizophrenia:", "a": ["Mild, moderate, severe", "Prodromal, active, residual", "Early, middle, late", "None"], "c": 1}, {"q": "Prodromal phase features:", "a": ["Full symptoms", "Beginning deterioration, mild symptoms", "Complete recovery", "No symptoms"], "c": 1}, {"q": "___/4 of patients fully recover:", "a": ["1", "2", "3", "4"], "c": 0}, {"q": "Better recovery with ___ onset:", "a": ["Gradual", "Abrupt", "Childhood", "No"], "c": 1}, {"q": "Early ___ predicts better recovery:", "a": ["Deterioration", "Hospitalization", "Treatment", "Onset"], "c": 2}, {"q": "Type I schizophrenia: dominated by ___ symptoms:", "a": ["Negative", "Positive", "Psychomotor", "No"], "c": 1}, {"q": "Type II schizophrenia: dominated by ___ symptoms:", "a": ["Positive", "Negative", "Only delusions", "Only hallucinations"], "c": 1}, {"q": "Type I linked to ___ abnormalities:", "a": ["Structural brain", "Biochemical", "No", "Viral"], "c": 1}, {"q": "Type II linked to ___ abnormalities:", "a": ["Biochemical", "Structural brain", "No", "Hormonal"], "c": 1}, {"q": "Brief psychotic disorder lasts:", "a": ["<1 month", "1-6 months", "6+ months", "Years"], "c": 0}, {"q": "Schizophreniform disorder lasts:", "a": ["<1 month", "1-6 months", "6+ months", "Years"], "c": 1}, {"q": "Schizoaffective = schizophrenia + ___ episode:", "a": ["Anxiety", "Depressive or manic", "Personality", "No other"], "c": 1}, {"q": "MZ twin concordance for schizophrenia:", "a": ["10%", "17%", "48%", "100%"], "c": 2}, {"q": "DZ twin concordance:", "a": ["1%", "10%", "17%", "48%"], "c": 2}, {"q": "First-degree relative risk:", "a": ["1%", "3%", "10%", "48%"], "c": 2}, {"q": "Diathesis-stress: genetic predisposition triggered by:", "a": ["Happiness", "Extreme stress", "Sleep", "Nutrition"], "c": 1}, {"q": "Dopamine hypothesis: ___ fire too often:", "a": ["Serotonin neurons", "Dopamine neurons", "GABA neurons", "Glutamate neurons"], "c": 1}, {"q": "Antipsychotics are dopamine:", "a": ["Agonists", "Antagonists (blockers)", "Producers", "Enhancers"], "c": 1}, {"q": "D-2 receptors are involved in:", "a": ["Only sleep", "Guiding attention", "Only movement", "Only mood"], "c": 1}, {"q": "Atypical antipsychotics also bind to ___ receptors:", "a": ["Only D-2", "D-1 and serotonin", "Only GABA", "Only glutamate"], "c": 1}, {"q": "Positive symptom subcircuit includes:", "a": ["Hippocampus/amygdala", "Substantia nigra/striatum", "Only cortex", "Only thalamus"], "c": 1}, {"q": "Negative symptom subcircuit includes:", "a": ["Substantia nigra/striatum", "Hippocampus/amygdala", "Only cortex", "Only cerebellum"], "c": 1}, {"q": "Viral theory: prenatal exposure to viruses may disrupt:", "a": ["Bone growth", "Fetal brain development", "Heart development", "Muscle growth"], "c": 1}, {"q": "Schizophrenogenic mothers theory has:", "a": ["Strong support", "Little research support", "Universal acceptance", "No critics"], "c": 1}, {"q": "High expressed emotion families: patients ___ more likely to relapse:", "a": ["2×", "3×", "4×", "10×"], "c": 2}, {"q": "Rosenhan study demonstrated dangers of:", "a": ["Medication", "Social labeling", "Genetics", "Brain scans"], "c": 1}]}, {"id": "psy-ch13", "title": "Chapter 13: Sexual Disorders & Gender Variations", "ln": "PSY 309 · Ch 13", "notes": [{"heading": "Sexual Dysfunctions — Overview", "body": "Marked by persistent inability to function normally in some area of the <b>sexual response cycle</b>. Affect up to <b>30% of men</b> and <b>45% of women</b> in the US. Very distressing — lead to frustration, guilt, low self-esteem, interpersonal problems. Often interrelated: having one dysfunction increases risk of another."}, {"heading": "The Sexual Response Cycle", "body": "Four phases (Masters & Johnson/Kaplan): <b>1) Desire:</b> interest in sexual activity. <b>2) Excitement:</b> physical arousal (erection, lubrication). <b>3) Orgasm:</b> peak of pleasure, rhythmic contractions. <b>4) Resolution:</b> return to unaroused state. Sexual dysfunctions affect the <b>first three phases</b>. Similar sequence in both males and females."}, {"heading": "Disorders of Desire", "body": "<b>Male hypoactive sexual desire disorder:</b> few/no sexual thoughts or desires for 6+ months. <b>Female sexual interest/arousal disorder:</b> reduced/absent sexual interest for 6+ months, with reduction in 3+ areas (interest, fantasies, initiation, excitement, responsiveness, sensations). Both cause significant distress."}, {"heading": "Causes of Low Desire", "body": "<b>Biological:</b> abnormal hormones — high <b>prolactin</b>, low <b>testosterone</b>, high/low <b>estrogen</b>. Excessive <b>serotonin/dopamine</b> activity. Medications (birth control, pain meds, psychotropics), illegal drugs, chronic illness. <b>Psychological:</b> anxiety, depression, anger, fears, memories. <b>Sociocultural:</b> relationship problems, cultural standards, trauma from sexual assault."}, {"heading": "Disorders of Excitement", "body": "Excitement phase: pelvic changes, increased heart rate/blood pressure/breathing. Men: <b>erection</b>. Women: swelling of clitoris/labia, vaginal lubrication. <b>Female sexual arousal disorder</b> (formerly 'frigidity'). <b>Male erectile disorder</b> (formerly 'impotence'). Both involve inability to achieve or maintain physical arousal."}, {"heading": "Disorders of Orgasm — Premature Ejaculation", "body": "Ejaculation within <b>1 minute</b> of beginning sex, for 6+ months, earlier than desired. Affects <b>30%</b> of men worldwide. Linked to youth, inexperience, infrequent sex. Biological theories: genetic predisposition, overactive/underactive <b>serotonin receptors</b>, greater penis sensitivity. Treatment: <b>stop-start (pause) procedure</b>, SSRIs."}, {"heading": "Disorders of Orgasm — Delayed Ejaculation & Female Orgasmic", "body": "<b>Delayed ejaculation:</b> significant delay/absence for 6+ months. Affects ~10% of men. Linked to low testosterone, neurological diseases. <b>Female orgasmic disorder:</b> significant delay/absence/reduced intensity for 6+ months. Affects <b>21%</b> of women. 10%+ have never had orgasm. Causes: biological (diabetes, MS, drugs, menopause), psychological (depression, trauma), sociocultural (restrictive messages)."}, {"heading": "Disorders of Sexual Pain", "body": "<b>Genito-pelvic pain/penetration disorder:</b> pain, fear, or muscle tensing during intercourse for 6+ months. Includes <b>vaginismus</b> (involuntary vaginal muscle contractions, <1% of women) and <b>dyspareunia</b> (severe genital pain, ~14% of women, ~3% of men). Vaginismus: learned fear response (CBT view). Dyspareunia: usually physical cause (childbirth injury)."}, {"heading": "Treatment History", "body": "<b>Early 1900s:</b> psychodynamic therapy (insight into psychosexual development) — generally unhelpful. <b>1950s-60s:</b> behavioral therapy (relaxation, desensitization) — some success. <b>1970:</b> Masters & Johnson's <i>Human Sexual Inadequacy</i> launched modern sex therapy — short-term, instructive, problem-focused. Evolved into today's complex integrated approach."}, {"heading": "Modern Sex Therapy", "body": "Typically <b>15-20 sessions</b>. Foci: assess the problem, mutual responsibility, sexuality education, emotion identification, attitude change, <b>eliminate performance anxiety and spectator role</b>, improve communication, address destructive lifestyles, address medical factors. Specific techniques for each dysfunction."}, {"heading": "Treatment of Specific Dysfunctions", "body": "<b>Desire disorders:</b> affectual awareness, self-instruction, behavioral techniques, hormones, pharmaceuticals. <b>Erectile disorder:</b> reduce performance anxiety, sensate-focus exercises, <b>Viagra (sildenafil)</b>; second-line: injections, implants, VED. <b>Female orgasmic:</b> self-exploration, body awareness, directed masturbation, Viagra. <b>Pain disorders:</b> muscle control exercises, gradual exposure, Botox, surgery."}, {"heading": "Current Trends in Sex Therapy", "body": "Integrated approach used with diverse clients: unmarried couples, those with other disorders, elderly, intellectually disabled, physically handicapped, <b>LGBTQ clients</b>, clients without long-term partners. Growing concern about increased reliance on <b>drugs and medical interventions</b> over psychotherapy. Treatment of excessive sexuality (hypersexuality/'sexual addiction') is emerging."}, {"heading": "Paraphilic Disorders — Overview", "body": "Characterized by intense sexual urges, fantasies, or behaviors involving <b>objects or situations outside usual sexual norms</b>: nonhuman objects, children, nonconsenting adults, or suffering/humiliation. Must last <b>6+ months</b> with significant distress/impairment. For some (pedophilic, exhibitionistic, voyeuristic, frotteuristic, sadism): performing the behavior = disorder even without distress."}, {"heading": "Fetishistic & Transvestic Disorders", "body": "<b>Fetishistic disorder:</b> intense sexual urges involving nonliving objects or nongenital body parts. Theory: classical conditioning. Treatment: aversion therapy, covert sensitization, masturbatory satiation. <b>Transvestic disorder:</b> arousal from cross-dressing. Typically heterosexual males who began in childhood. Does NOT involve transgender feelings. Theory: classical conditioning in early life."}, {"heading": "Exhibitionistic & Voyeuristic Disorders", "body": "<b>Exhibitionistic:</b> arousal from exposing genitals publicly. Rarely desires contact. Usually begins before 18, mostly males. <b>Voyeuristic:</b> intense urges to observe people undressing/having sex. Risk of discovery adds excitement. Theories: inadequacy/shyness drives power-seeking (psychodynamic); chance observation leads to learned behavior (CBT)."}, {"heading": "Frotteuristic & Pedophilic Disorders", "body": "<b>Frotteuristic:</b> touching/rubbing against nonconsenting persons. Almost always male. Begins in teens, usually decreases after 25. <b>Pedophilic:</b> sexual activity fantasies/urges involving children. 2/3 of victims are girls. Emerges in adolescence. Some were abused as children. Most are immature with distorted thinking. Treatment: aversion therapy, antiandrogen drugs, <b>relapse-prevention training</b>."}, {"heading": "Sexual Masochism & Sadism Disorders", "body": "<b>Masochism:</b> arousal from being humiliated, beaten, bound. May include <b>hypoxyphilia/autoerotic asphyxia</b> (dangerous). Fantasies often begin in childhood; may develop through classical conditioning. <b>Sadism:</b> arousal from causing psychological/physical suffering. Appears in childhood/adolescence, usually males. Theories: conditioning, modeling (internet/media), sense of sexual inadequacy, brain/hormonal abnormalities."}, {"heading": "Gender Variations — Overview", "body": "Most people have identity consistent with assigned gender. <b>Transgender individuals:</b> gender identity differs from assigned gender. Affects <b>25 million</b> people worldwide. Transgender women outnumber transgender men <b>2:1</b>. Feelings may emerge in childhood. The DSM-5 category is <b>controversial</b> — many view transgender experience as alternative, not pathological."}, {"heading": "Gender Dysphoria (DSM-5)", "body": "For <b>6+ months</b>, gender feelings/behaviors at odds with assigned gender, with 2+ symptoms: feelings contradict sex characteristics, wish to eliminate own sex characteristics, yearning for other gender's characteristics, wish to be treated as another gender, belief one's reactions match another gender. Must cause significant distress/impairment. Diagnosis remains highly debated."}, {"heading": "Transgender: Discrimination & Treatment", "body": "<b>80-90%</b> harassed or attacked. <b>50%</b> fired/not hired/not promoted. <b>20%</b> denied housing. Brain studies show some biological basis. Treatment options: <b>psychotherapy</b> (build awareness, reduce anxiety/depression, coping skills), <b>hormone administration</b>, <b>gender reassignment surgery</b>. Irreversible physical procedures not recommended before age 14-16; pharmacologic intervention acceptable earlier."}, {"heading": "Key Concepts Summary", "body": "<b>Sexual response:</b> desire→excitement→orgasm→resolution. <b>Dysfunctions:</b> desire (hypoactive), excitement (erectile, arousal), orgasm (premature/delayed ejaculation, female orgasmic), pain (vaginismus, dyspareunia). <b>Sex therapy:</b> 15-20 sessions, performance anxiety, Viagra. <b>Paraphilias:</b> fetishistic, transvestic, exhibitionistic, voyeuristic, frotteuristic, pedophilic, masochism, sadism. <b>Gender dysphoria:</b> 6+ months, controversial, 25M worldwide."}], "quiz": [{"q": "Sexual dysfunctions affect up to ___% of women:", "a": ["10", "20", "30", "45"], "c": 3}, {"q": "Sexual dysfunctions affect up to ___% of men:", "a": ["10", "20", "30", "45"], "c": 2}, {"q": "The four phases of sexual response:", "a": ["Desire, excitement, orgasm, resolution", "Arousal, plateau, orgasm, rest", "Interest, action, climax, sleep", "None"], "c": 0}, {"q": "Disorders affect the first ___ phases:", "a": ["1", "2", "3", "4"], "c": 2}, {"q": "Male hypoactive desire requires symptoms for:", "a": ["1 month", "3 months", "6+ months", "1 year"], "c": 2}, {"q": "High prolactin levels can cause:", "a": ["Increased desire", "Low sexual desire", "Mania", "Psychosis"], "c": 1}, {"q": "Low testosterone is linked to:", "a": ["Increased desire", "Decreased desire", "Mania", "No effect"], "c": 1}, {"q": "Excessive ___ activity can lower desire:", "a": ["Dopamine and serotonin", "Testosterone", "Estrogen only", "None"], "c": 0}, {"q": "Male erectile disorder was formerly called:", "a": ["Frigidity", "Impotence", "Premature ejaculation", "Dyspareunia"], "c": 1}, {"q": "Female sexual arousal disorder was formerly called:", "a": ["Impotence", "Frigidity", "Vaginismus", "Dyspareunia"], "c": 1}, {"q": "Premature ejaculation: within ___ minute(s):", "a": ["1", "5", "10", "30"], "c": 0}, {"q": "Premature ejaculation affects ___% of men worldwide:", "a": ["5", "10", "20", "30"], "c": 3}, {"q": "Stop-start procedure treats:", "a": ["Delayed ejaculation", "Premature ejaculation", "Erectile disorder", "Low desire"], "c": 1}, {"q": "SSRIs can treat premature ejaculation by affecting:", "a": ["Dopamine", "Serotonin", "Testosterone", "Estrogen"], "c": 1}, {"q": "Female orgasmic disorder affects ___% of women:", "a": ["5", "10", "21", "45"], "c": 2}, {"q": "___% of women have never had an orgasm:", "a": ["1", "5", "10+", "25"], "c": 2}, {"q": "Vaginismus involves involuntary:", "a": ["Pain", "Vaginal muscle contractions", "Bleeding", "Swelling"], "c": 1}, {"q": "Vaginismus affects fewer than ___% of women:", "a": ["1", "5", "10", "20"], "c": 0}, {"q": "Dyspareunia usually has a ___ cause:", "a": ["Psychological", "Physical", "Spiritual", "No"], "c": 1}, {"q": "Dyspareunia affects ~___% of women:", "a": ["1", "5", "14", "30"], "c": 2}, {"q": "Masters & Johnson published in:", "a": ["1950", "1960", "1970", "1980"], "c": 2}, {"q": "Modern sex therapy typically lasts:", "a": ["1-5 sessions", "15-20 sessions", "50 sessions", "Years"], "c": 1}, {"q": "Performance anxiety creates the ___ role:", "a": ["Actor", "Spectator", "Director", "Producer"], "c": 1}, {"q": "Viagra (sildenafil) treats:", "a": ["Low desire", "Erectile disorder", "Premature ejaculation", "Pain disorders"], "c": 1}, {"q": "Sensate-focus exercises reduce:", "a": ["Physical strength", "Performance anxiety", "Medication need", "Nothing"], "c": 1}, {"q": "Directed masturbation training treats:", "a": ["Male erectile disorder", "Female orgasmic disorder", "Premature ejaculation", "Pain disorders"], "c": 1}, {"q": "Paraphilic disorders last at least:", "a": ["1 month", "3 months", "6 months", "1 year"], "c": 2}, {"q": "Paraphilias involve objects/situations outside:", "a": ["The home", "Usual sexual norms", "Work", "School"], "c": 1}, {"q": "Fetishistic disorder involves arousal from:", "a": ["Children", "Nonliving objects or nongenital body parts", "Nonconsenting adults", "Pain"], "c": 1}, {"q": "Transvestic disorder involves:", "a": ["Transgender identity", "Cross-dressing for arousal", "Exposing genitals", "Voyeurism"], "c": 1}, {"q": "Transvestic disorder does NOT involve:", "a": ["Cross-dressing", "Sexual arousal", "Transgender feelings", "Clothing"], "c": 2}, {"q": "Exhibitionistic disorder: arousal from:", "a": ["Watching others", "Exposing genitals publicly", "Pain", "Objects"], "c": 1}, {"q": "Voyeuristic disorder: arousal from:", "a": ["Exposing self", "Observing others undressing/having sex", "Cross-dressing", "Pain"], "c": 1}, {"q": "Frotteuristic disorder: arousal from:", "a": ["Watching", "Touching/rubbing nonconsenting persons", "Pain", "Objects"], "c": 1}, {"q": "Frotteuristic behavior usually decreases after age:", "a": ["18", "21", "25", "30"], "c": 2}, {"q": "In pedophilic disorder, ___/3 of victims are girls:", "a": ["1", "2", "All", "None"], "c": 1}, {"q": "Pedophilic disorder typically emerges in:", "a": ["Childhood", "Adolescence", "Middle age", "Old age"], "c": 1}, {"q": "Antiandrogen drugs are used to treat:", "a": ["Depression", "Pedophilic disorder", "Anxiety", "Schizophrenia"], "c": 1}, {"q": "Autoerotic asphyxia is associated with:", "a": ["Sadism", "Masochism (hypoxyphilia)", "Voyeurism", "Exhibitionism"], "c": 1}, {"q": "Sexual sadism involves arousal from:", "a": ["Being hurt", "Causing suffering to others", "Watching others", "Objects"], "c": 1}, {"q": "Transgender affects ___ million people worldwide:", "a": ["1", "5", "25", "100"], "c": 2}, {"q": "Transgender women outnumber transgender men:", "a": ["1:1", "2:1", "3:1", "5:1"], "c": 1}, {"q": "Gender dysphoria requires symptoms for:", "a": ["1 month", "3 months", "6+ months", "1 year"], "c": 2}, {"q": "___% of transgender people have been harassed or attacked:", "a": ["20", "50", "80-90", "100"], "c": 2}, {"q": "___% of transgender people have been fired/not hired:", "a": ["10", "20", "50", "80"], "c": 2}, {"q": "Irreversible physical procedures not recommended before age:", "a": ["10", "14-16", "18", "21"], "c": 1}, {"q": "Gender dysphoria diagnosis is:", "a": ["Universally accepted", "Controversial", "No longer used", "Required"], "c": 1}, {"q": "Treatment for gender dysphoria may include:", "a": ["Only surgery", "Psychotherapy, hormones, surgery", "Only medication", "No treatment available"], "c": 1}, {"q": "Relapse-prevention training for paraphilias is modeled after:", "a": ["Depression treatment", "Substance dependence programs", "Anxiety treatment", "PTSD treatment"], "c": 1}, {"q": "Aversion therapy is commonly used for:", "a": ["Depression", "Paraphilic disorders", "Anxiety", "Bipolar"], "c": 1}]}, {"id": "psy-ch16", "title": "Chapter 16: Personality Disorders", "ln": "PSY 309 · Ch 16", "notes": [{"heading": "Personality Disorders — Overview", "body": "<b>Personality:</b> uniquely expressed characteristics influencing behaviors, emotions, thoughts, interactions. <b>Personality disorder:</b> an <b>enduring, rigid</b> pattern of inner experience and outward behavior → significant problems and psychological pain. Must affect 2+ of: cognition, emotion, social interactions, impulsivity. Significantly different from culture. Affects ~<b>15%</b> of US population. Among the <b>most difficult</b> disorders to treat. <b>Comorbidity is common</b>."}, {"heading": "Three Clusters", "body": "DSM-5 organizes 10 personality disorders into 3 clusters: <b>Cluster A — 'Odd/Eccentric':</b> paranoid, schizoid, schizotypal. <b>Cluster B — 'Dramatic/Emotional/Erratic':</b> antisocial, borderline, histrionic, narcissistic. <b>Cluster C — 'Anxious/Fearful':</b> avoidant, dependent, obsessive-compulsive. Disorders overlap significantly → difficult to distinguish. Diagnoses can easily be overdone."}, {"heading": "Cluster A: Paranoid PD", "body": "<b>Deep distrust and suspicion</b> of others. Limited close relationships; cold, distant. Excessive trust in own ideas; critical of weakness in others. <b>4.4%</b> of US adults; more common in <b>men</b>. Theories: psychodynamic (demanding parents), cognitive (maladaptive assumptions like 'people are evil'), biological (genetic). Treatment: limited effectiveness — clients distrust therapists. Object relations therapy, CBT for anxiety/interpretations, antipsychotics."}, {"heading": "Cluster A: Schizoid PD", "body": "Persistent <b>avoidance of social relationships</b>; little emotional demonstration. Focused on self; unaffected by praise/criticism. Preference for being alone; weak social skills; no interest in intimacy. <b>3.1%</b> of adults; slightly more men. Theories: psychodynamic (unsatisfied need for contact, abusive parents), cognitive (can't pick up emotional cues). Treatment: social skills training, role-playing, group therapy."}, {"heading": "Cluster A: Schizotypal PD", "body": "Extreme discomfort in close relationships + <b>odd/bizarre thinking</b> and behavioral eccentricities. Believe unrelated events pertain to them. Digressive, vague conversation with loose associations. <b>3.9%</b> of adults; slightly more males. Linked to same biological factors as schizophrenia (<b>high dopamine</b>). Also linked to mood disorders/depression. Treatment: CBT to evaluate thoughts, speech/social skills training, low-dose antipsychotics."}, {"heading": "Cluster B: Antisocial PD", "body": "Persistently <b>disregard and violate others' rights</b>. Also called psychopaths/sociopaths. Must be <b>18+</b> to diagnose. Lie repeatedly, reckless, impulsive, cruel, aggressive. Higher rates of alcoholism, substance use, childhood conduct disorder, ADHD. <b>3.6%</b> of adults; <b>4× more common in men</b>. Most linked to adult criminal behavior. Most showed misbehavior before age 15."}, {"heading": "Antisocial PD — Causes & Treatment", "body": "<b>Psychodynamic:</b> absence of parental love → no basic trust. <b>Behavioral:</b> learned through operant conditioning/modeling. <b>Cognitive:</b> can't recognize others' viewpoints/feelings. <b>Biological:</b> lower serotonin, dysfunctional brain circuit (prefrontal cortex, anterior cingulate, amygdala, hippocampus, temporal cortex → chronic low arousal, weak stress reactions, poor empathy). Treatment: typically <b>ineffective</b> due to lack of conscience and desire to change. Therapeutic communities, psychotropics."}, {"heading": "Cluster B: Borderline PD", "body": "<b>Instability</b> — major mood shifts, unstable self-image, impulsivity. Unstable relationships. Bouts of anger → aggression toward others or <b>self-harm</b> (cutting, reckless behavior, suicide attempts). <b>5.9%</b> of adults; <b>75% women</b>. Theories: psychodynamic (lack of early acceptance, abuse/neglect), biological (genetic, low serotonin, abnormal brain circuits), sociocultural (rapidly changing cultures)."}, {"heading": "Borderline PD — Integrative & Treatment", "body": "<b>Biosocial:</b> children have intrinsic difficulty controlling emotions + parents teach them to ignore feelings. <b>Developmental psychopathology:</b> childhood traumas + dysfunctional parental attachments → flawed capacity for relationships; positive factors can counter. <b>Mentalization deficits.</b> Treatment: <b>Dialectical Behavior Therapy (DBT)</b> — most effective; relational psychoanalytic therapy; adjunctive medications (antidepressants, mood stabilizers, antianxiety, antipsychotics)."}, {"heading": "Cluster B: Histrionic PD", "body": "Extremely emotional; constantly seek to be <b>center of attention</b>. Attention-getting behaviors — 'always on stage.' Approval/praise are lifeblood. Vain, self-centered, demanding. Some make manipulative suicide attempts. <b>3.6%</b> of adults; 4× more in men. Theories: psychodynamic (cold parents → fear of abandonment), cognitive (helplessness → seek others to meet needs), sociocultural (cultural norms, exaggeration of femininity)."}, {"heading": "Cluster B: Narcissistic PD", "body": "<b>Grandiose</b>, need much admiration, <b>no empathy</b>. Exaggerate achievements/talents; arrogant. Selective about friends. Common in normal teens but doesn't usually lead to adult narcissism. <b>6.2%</b> of adults; up to <b>75% men</b>. Theories: psychodynamic (cold, rejecting parents → abuse/loss), cognitive (treated <b>too positively</b> → overvalue self), sociocultural (eras of narcissism in society). Treatment: one of the <b>most difficult</b> to treat. Seek help usually for depression."}, {"heading": "Cluster C: Avoidant PD", "body": "Consistent <b>discomfort in social situations</b>, overwhelming feelings of inadequacy, extreme sensitivity to negative evaluation. Similar to social anxiety disorder — some argue they should be combined. <b>2%+</b> of adults; equal gender ratio. Theories: psychodynamic (shame from childhood), cognitive (harsh criticism → expect rejection → no social skills). Treatment: CBT, group therapy for social practice, antianxiety/antidepressant drugs (symptoms return when stopped)."}, {"heading": "Cluster C: Dependent PD", "body": "Pervasive, excessive <b>need to be cared for</b>. Clinging, obedient; fear separation. Can't make smallest decisions alone. <b>Separation is the central fear.</b> <b><1%</b> of population; equal gender. Theories: Freudian (oral stage), object relations (early parental loss/rejection), behavioral (clinging rewarded), cognitive (believe self inadequate/helpless). Treatment: assertiveness training, challenge helplessness assumptions, group therapy."}, {"heading": "Cluster C: Obsessive-Compulsive PD", "body": "Intense focus on <b>orderliness, perfectionism, and control</b> → loss of flexibility. Unreasonably high standards; afraid to make decisions. Rigid, stubborn. Difficulty expressing affection. <b>7.9%</b> of adults; <b>2× more men</b>. Related to OCD but distinct — more likely comorbid with depression/anxiety than OCD. Theories: Freudian (harsh toilet training → anal retentive), cognitive (illogical thinking). Treatment: psychodynamic, CBT, <b>SSRIs</b>."}, {"heading": "Multicultural Considerations", "body": "DSM-5 states personality disorder must <b>'deviate markedly from cul
