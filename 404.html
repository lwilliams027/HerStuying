<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
// GitHub Pages SPA redirect: preserves the path so index.html can parse it
var path = location.pathname;
sessionStorage.setItem('spa-redirect', path);
location.replace('/');
</script>
</head>
<body>Redirecting...</body>
</html>
